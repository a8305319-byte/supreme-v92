<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="cargo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099bb"/>
    </linearGradient>
    <linearGradient id="cabin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <line x1="48" y1="0" x2="48" y2="192" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>
  <line x1="96" y1="0" x2="96" y2="192" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>
  <line x1="144" y1="0" x2="144" y2="192" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="64" x2="192" y2="64" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="128" x2="192" y2="128" stroke="#00d4ff" stroke-width="0.3" opacity="0.08"/>

  <!-- Border glow -->
  <rect x="2" y="2" width="188" height="188" rx="36" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>

  <!-- Speed lines (left) -->
  <line x1="16" y1="82" x2="40" y2="82" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <line x1="16" y1="96" x2="34" y2="96" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="110" x2="28" y2="110" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Truck cargo body -->
  <rect x="40" y="62" width="84" height="68" rx="4" fill="url(#cargo)" filter="url(#glow)"/>

  <!-- Cargo door details -->
  <line x1="82" y1="62" x2="82" y2="130" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <rect x="44" y="66" width="34" height="4" rx="2" fill="#fff" opacity="0.1"/>
  <rect x="82" y="66" width="38" height="4" rx="2" fill="#fff" opacity="0.1"/>

  <!-- Truck cabin -->
  <path d="M124 80 L124 130 L172 130 L172 104 L158 80 Z" fill="url(#cabin)" filter="url(#glow)"/>

  <!-- Cabin window -->
  <path d="M130 83 L130 104 L168 104 L168 106 L155 83 Z" fill="#00d4ff" opacity="0.35" rx="2"/>
  <path d="M132 85 L132 102 L165 102 L152 85 Z" fill="#00d4ff" opacity="0.2"/>

  <!-- Window shine -->
  <line x1="136" y1="86" x2="140" y2="101" stroke="#fff" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Chassis -->
  <rect x="40" y="128" width="134" height="8" rx="2" fill="#1a1a3a"/>

  <!-- Wheel back -->
  <circle cx="72" cy="142" r="18" fill="#0d0d1a" stroke="#00d4ff" stroke-width="3" filter="url(#glow)"/>
  <circle cx="72" cy="142" r="10" fill="#0d0d1a" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="72" cy="142" r="4" fill="#00d4ff" opacity="0.9"/>
  <!-- Wheel spokes -->
  <line x1="72" y1="128" x2="72" y2="156" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="58" y1="142" x2="86" y2="142" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="62" y1="132" x2="82" y2="152" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="82" y1="132" x2="62" y2="152" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>

  <!-- Wheel front -->
  <circle cx="148" cy="142" r="18" fill="#0d0d1a" stroke="#7c3aed" stroke-width="3" filter="url(#glow)"/>
  <circle cx="148" cy="142" r="10" fill="#0d0d1a" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <circle cx="148" cy="142" r="4" fill="#7c3aed" opacity="0.9"/>
  <!-- Wheel spokes -->
  <line x1="148" y1="128" x2="148" y2="156" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="134" y1="142" x2="162" y2="142" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="132" x2="158" y2="152" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="158" y1="132" x2="138" y2="152" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>

  <!-- Headlight -->
  <rect x="168" y="108" width="8" height="12" rx="2" fill="#fbbf24" opacity="0.9" filter="url(#glow)"/>
  <rect x="169" y="109" width="6" height="10" rx="1" fill="#fef3c7" opacity="0.6"/>

  <!-- Company text -->
  <text x="96" y="174" font-family="Arial,sans-serif" font-size="14" font-weight="bold"
        fill="#00d4ff" text-anchor="middle" letter-spacing="2" opacity="0.9">在地物流</text>
</svg>