<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>入職資料表 — 在地物流有限公司</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050505;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
.wrap{width:100%;max-width:520px}
.hdr{text-align:center;padding:24px 0 16px}
.logo{font-size:28px;margin-bottom:6px}
.title{font-size:18px;font-weight:700;color:#e2e8f0}
.sub{font-size:12px;color:#64748b;margin-top:4px}
.steps{display:flex;justify-content:center;gap:6px;margin:16px 0}
.step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,0.1);color:#64748b;transition:.3s}
.step.active{border-color:#00d4ff;color:#00d4ff;background:rgba(0,212,255,0.1)}
.step.done{border-color:#34d399;color:#34d399;background:rgba(52,211,153,0.1)}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:700;color:#00d4ff;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(0,212,255,0.15)}
.f-grp{margin-bottom:12px}
.f-lbl{font-size:11px;color:#94a3b8;display:block;margin-bottom:5px}
.f-inp{width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;transition:.2s}
.f-inp:focus{border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.03)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:10px;margin-top:6px}
.btn{padding:11px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.2s;flex:1}
.btn-p{background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);color:#00d4ff}
.btn-g{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94a3b8}
.bsb{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#34d399}
.sig-box{width:100%;height:160px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.12);border-radius:8px;cursor:crosshair;touch-action:none}
.sig-hint{font-size:10px;color:#64748b;text-align:center;margin-top:4px}
.pg{display:none}.pg.act{display:block}
.bdr{font-family:'JetBrains Mono',monospace}
#suc{display:none;text-align:center;padding:40px 20px}
.si{font-size:56px;margin-bottom:16px}
.stt{font-size:20px;font-weight:700;margin-bottom:8px}
.ssb{font-size:13px;color:#94a3b8;line-height:1.6}
.srf{font-size:11px;color:#64748b;margin-top:10px;font-family:'JetBrains Mono',monospace}
.photo-preview{width:100%;max-height:120px;object-fit:cover;border-radius:6px;margin-top:6px;display:none}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="logo">📋</div>
  <div class="title">在地物流有限公司</div>
  <div class="sub">員工入職資料表</div>
</div>

<!-- STEPS -->
<div class="steps">
  <div class="step active" id="s1">1</div>
  <div class="step" id="s2">2</div>
  <div class="step" id="s3">3</div>
  <div class="step" id="s4">4</div>
  <div class="step" id="s5">5</div>
</div>

<!-- FORM PAGES -->
<div id="pg1" class="pg act">
  <div class="card">
    <div class="sec-title">👤 基本資料</div>
    <div class="f-grp"><label class="f-lbl">姓名 *</label><input class="f-inp" id="f-name" placeholder="王大明"></div>
    <div class="f-row">
      <div class="f-grp"><label class="f-lbl">身分證字號 *</label><input class="f-inp" id="f-id" placeholder="A123456789"></div>

      <div class="f-grp"><label class="f-lbl">手機 *</label><input class="f-inp" id="f-phone" placeholder="0912345678"></div>
      <div class="f-grp"><label class="f-lbl">緊急聯絡人</label><input class="f-inp" id="f-emg" placeholder="家人姓名/電話"></div>
    </div>
    <div class="f-grp"><label class="f-lbl">戶籍地址</label><input class="f-inp" id="f-addr" placeholder="縣市區里街"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-p" onclick="goStep(2)">下一步 →</button>

</div>

<div id="pg2" class="pg">
  <div class="card">
    <div class="sec-title">🚗 駕照與車輛</div>
    <div class="f-row">
      <div class="f-grp"><label class="f-lbl">駕照類別</label>
        <select class="f-inp" id="f-lic">
          <option value="">請選擇</option>
          <option>普通小型車</option>
          <option>普通重機</option>
          <option>大型重機</option>
          <option>普通貨車</option>
          <option>大貨車</option>
        </select>
      </div>
      <div class="f-grp"><label class="f-lbl">駕照到期日</label><input class="f-inp" id="f-lic-exp" type="date"></div>
    </div>
    <div class="f-row">
      <div class="f-grp"><label class="f-lbl">駕駛年資</label><input class="f-inp" id="f-exp" placeholder="例：3年"></div>
      <div class="f-grp"><label class="f-lbl">自備車輛</label>
        <select class="f-inp" id="f-vehicle">
          <option value="">請選擇</option>
          <option>機車</option>

      </div>
    </div>
    <div class="f-row">
      <div class="f-grp"><label class="f-lbl">車牌號碼</label><input class="f-inp" id="f-plate" placeholder="AAA-0000"></div>
      <div class="f-grp"><label class="f-lbl">強制險到期</label><input class="f-inp" id="f-ins-exp" type="date"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-g" onclick="goStep(1)">← 上一步</button>
    <button class="btn btn-p" onclick="goStep(3)">下一步 →</button>
  </div>
</div>

<div id="pg3" class="pg">
  <div class="card">
    <div class="sec-title">🏦 薪資帳戶</div>
    <div class="f-grp"><label class="f-lbl">銀行名稱</label><input class="f-inp" id="f-bank" placeholder="台灣銀行"></div>
    <div class="f-row">
      <div class="f-grp"><label class="f-lbl">分行</label><input class="f-inp" id="f-branch" placeholder="板橋分行"></div>
      <div class="f-grp"><label class="f-lbl">帳號</label><input class="f-inp" id="f-acct" placeholder="0000000000000"></div>
    </div>
    <div class="f-grp"><label class="f-lbl">戶名</label><input class="f-inp" id="f-acct-name" placeholder="需與身分證姓名相同"></div>
  </div>
  <div class="card">
    <div class="sec-title">📄 勞健保設定</div>
    <div class="f-row">
      <div class="f-grp"><label class="f-lbl">工作類型</label>
        <select class="f-inp" id="f-type">
          <option value="employee">正職員工（投保）</option>
          <option value="contractor">承攬（不投保）</option>
        </select>
      </div>
      <div class="f-grp"><label class="f-lbl">眷屬人數</label><input class="f-inp" id="f-deps" type="number" min="0" max="10" value="0" placeholder="0"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-g" onclick="goStep(2)">← 上一步</button>
    <button class="btn btn-p" onclick="goStep(4)">下一步 →</button>
  </div>
</div>

<div id="pg4" class="pg">
  <div class="card">
    <div class="sec-title">📎 證件上傳</div>
    <div class="f-grp">
      <label class="f-lbl">身分證正面</label>
      <input class="f-inp" type="file" id="f-id-front" accept="image/*" onchange="previewPhoto(this,'prev-id-f')">
      <img id="prev-id-f" class="photo-preview">
    </div>
    <div class="f-grp">
      <label class="f-lbl">駕照正面</label>
      <input class="f-inp" type="file" id="f-lic-img" accept="image/*" onchange="previewPhoto(this,'prev-lic')">
      <img id="prev-lic" class="photo-preview">
    </div>
    <div class="f-grp">
      <label class="f-lbl">備註</label>
      <textarea class="f-inp" id="f-note" rows="3" placeholder="其他說明..."></textarea>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-g" onclick="goStep(3)">← 上一步</button>
    <button class="btn btn-p" onclick="goStep(5)">下一步 →</button>
  </div>
</div>

<div id="pg5" class="pg">
  <div class="card">
    <div class="sec-title">✍️ 同意書與簽名</div>
    <div style="font-size:11px;color:#94a3b8;line-height:1.7;margin-bottom:14px;padding:10px;background:rgba(255,255,255,0.02);border-radius:6px">
      本人確認以上所填資料均屬實，同意在地物流有限公司依相關法規處理本人個人資料，並遵守公司規章及配送相關規定。
    </div>
    <div class="f-grp">
      <label class="f-lbl">請在下方簽名</label>
      <canvas id="sig-canvas" class="sig-box" width="480" height="160"></canvas>
      <div class="sig-hint">用手指或滑鼠在上方簽名 | <span onclick="clrSig()" style="color:#00d4ff;cursor:pointer">清除重簽</span></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-g" onclick="goStep(4)">← 上一步</button>
    <button class="btn bsb" id="sub-btn" onclick="submitForm()">✓ 確認送出入職資料</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="suc">
  <div class="si">✅</div>
  <div class="stt">入職資料已成功送出！</div>
  <div class="ssb">感謝您加入在地物流有限公司</div>
  <div class="srf" id="srf">資料編號：載入中...</div>

  <!-- 帳號設定區（現有員工） -->
  <div id="acct-setup" style="margin-top:20px;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.2);border-radius:12px;padding:16px;text-align:left">
    <div style="font-size:14px;font-weight:700;color:#00d4ff;margin-bottom:4px">🔐 設定登入帳號</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:12px">請設定您的系統登入 Email 和密碼</div>
    <div style="margin-bottom:8px">
      <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px">Email（登入帳號）</label>
      <input id="acct-email" type="email" placeholder="your@email.com" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:13px;box-sizing:border-box">
    </div>
    <div style="margin-bottom:8px">
      <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px">密碼（至少6位）</label>
      <input id="acct-pass" type="password" placeholder="至少6位" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:13px;box-sizing:border-box">
    </div>
    <div style="margin-bottom:12px">
      <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px">確認密碼</label>
      <input id="acct-pass2" type="password" placeholder="再輸入一次" style="width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;font-size:13px;box-sizing:border-box">
    </div>
    <button id="acct-btn" onclick="createOnboardAccount()" style="width:100%;padding:11px;background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);border-radius:8px;color:#00d4ff;font-size:13px;font-weight:600;cursor:pointer">建立帳號並登入 →</button>
    <div id="acct-msg" style="font-size:11px;margin-top:8px;text-align:center;color:#64748b"></div>
  </div>

  <button onclick="window.location.href='./'" style="margin-top:12px;padding:8px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#64748b;font-size:12px;cursor:pointer">稍後再說，返回首頁</button>
</div>
</div>

<script>
// 全域橋接
function goStep(n){ if(window._goStep) window._goStep(n); }
function clrSig(){ if(window.clrSig_fn) window.clrSig_fn(); }
function submitForm(){ if(window.submitForm_fn) window.submitForm_fn(); }
function previewPhoto(t,i){ if(window.previewPhoto_fn) window.previewPhoto_fn(t,i); }
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

const FB = {
  apiKey:"AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
  authDomain:"supreme-v92.firebaseapp.com",
  projectId:"supreme-v92",
  storageBucket:"supreme-v92.firebasestorage.app",
  messagingSenderId:"485530156296",
  appId:"1:485530156296:web:6728c0ee08b98dedd800bd"
};
const app = initializeApp(FB);
const db = getFirestore(app);

// ── 步驟控制 ──────────────────────────────────────────────
let currentStep = 1;
const TOTAL = 5;

window._goStep = function(n) {
  if(n < 1 || n > TOTAL) return;
  if(n > currentStep && !validateStep(currentStep)) return;

  document.getElementById('pg'+currentStep)?.classList.remove('act');
  document.getElementById('s'+currentStep)?.classList.remove('active');
  document.getElementById('s'+currentStep)?.classList.add('done');

  currentStep = n;
  document.getElementById('pg'+currentStep)?.classList.add('act');
  document.getElementById('s'+currentStep)?.classList.add('active');
  document.getElementById('s'+currentStep)?.classList.remove('done');

  if(n === 5) resizeSig();
  window.scrollTo(0,0);
};

function validateStep(n) {
  if(n === 1) {
    const name = document.getElementById('f-name')?.value.trim();
    const id   = document.getElementById('f-id')?.value.trim();
    const phone= document.getElementById('f-phone')?.value.trim();
    if(!name){ alert('請填寫姓名'); return false; }
    if(!id)  { alert('請填寫身分證字號'); return false; }
    if(!phone){ alert('請填寫手機'); return false; }
  }
  return true;
}

// ── 簽名 ──────────────────────────────────────────────────
let drawing = false, lastX = 0, lastY = 0;
let strokeCount = 0, strokeLength = 0;

function getCanvas() { return document.getElementById('sig-canvas'); }

function resizeSig() {
  const c = getCanvas(); if(!c) return;
  const rect = c.parentElement.getBoundingClientRect();
  const w = Math.floor(rect.width) || 480;
  const img = c.toDataURL();
  c.width = w; c.height = 160;
  const ctx = c.getContext('2d');
  const i = new Image(); i.onload = ()=>ctx.drawImage(i,0,0); i.src = img;
}

function getPos(e, c) {
  const r = c.getBoundingClientRect();
  const t = e.touches?.[0] || e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

function initSig() {
  const c = getCanvas(); if(!c) return;
  const ctx = c.getContext('2d');
  ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 2; ctx.lineCap = 'round';

  const start = (e)=>{ e.preventDefault(); drawing=true; strokeCount++;
    const p=getPos(e,c); lastX=p.x; lastY=p.y; };
  const draw  = (e)=>{ e.preventDefault(); if(!drawing) return;
    const p=getPos(e,c); ctx.beginPath(); ctx.moveTo(lastX,lastY);
    ctx.lineTo(p.x,p.y); ctx.stroke();
    strokeLength+=Math.hypot(p.x-lastX,p.y-lastY);
    lastX=p.x; lastY=p.y; };
  const stop  = ()=>{ drawing=false; };

  c.addEventListener('mousedown',start); c.addEventListener('mousemove',draw);
  c.addEventListener('mouseup',stop); c.addEventListener('mouseleave',stop);
  c.addEventListener('touchstart',start,{passive:false});
  c.addEventListener('touchmove',draw,{passive:false});
  c.addEventListener('touchend',stop);
}

window.clrSig_fn = function() {
  const c = getCanvas(); if(!c) return;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  strokeCount=0; strokeLength=0;
};

function sigValid() {
  if(strokeCount < 3) return {ok:false, msg:'簽名太簡單，請完整簽名（至少3筆）'};
  if(strokeLength < 100) return {ok:false, msg:'簽名筆畫太短，請完整簽名'};
  return {ok:true};
}

// ── 照片預覽 ────────────────────────────────────────────────
window.previewPhoto_fn = function(input, previewId) {
  const file = input.files?.[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(previewId);
    if(img){ img.src = e.target.result; img.style.display='block'; }
  };
  reader.readAsDataURL(file);
};

// ── 提交表單 ────────────────────────────────────────────────
window.submitForm_fn = async function() {
  const sv = sigValid();
  if(!sv.ok){ alert(sv.msg); return; }

  const btn = document.getElementById('sub-btn');
  btn.disabled = true; btn.textContent = '送出中...';

  try {
    const name  = document.getElementById('f-name')?.value.trim();
    const docRef = await addDoc(collection(db,'onboardingForms'), {
      name,
      idNumber:  document.getElementById('f-id')?.value.trim(),
      birthDate: document.getElementById('f-birth')?.value,
      phone:     document.getElementById('f-phone')?.value.trim(),
      emergency: document.getElementById('f-emg')?.value.trim(),
      address:   document.getElementById('f-addr')?.value.trim(),
      license:   document.getElementById('f-lic')?.value,
      licenseExpiry: document.getElementById('f-lic-exp')?.value,
      experience: document.getElementById('f-exp')?.value.trim(),
      vehicle:   document.getElementById('f-vehicle')?.value,
      plate:     document.getElementById('f-plate')?.value.trim(),
      insuranceExpiry: document.getElementById('f-ins-exp')?.value,
      bankName:  document.getElementById('f-bank')?.value.trim(),
      bankBranch:document.getElementById('f-branch')?.value.trim(),
      bankAccount:document.getElementById('f-acct')?.value.trim(),
      bankHolder:document.getElementById('f-acct-name')?.value.trim(),
      type:      document.getElementById('f-type')?.value,
      dependents:+document.getElementById('f-deps')?.value||0,
      note:      document.getElementById('f-note')?.value.trim(),
      signature: getCanvas()?.toDataURL('image/png'),
      status:    'pending',
      createdAt: serverTimestamp(),
    });

    // Show success + account setup
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('act'));
    document.querySelector('.steps').style.display = 'none';
    document.getElementById('suc').style.display = 'block';
    document.getElementById('srf').textContent = '資料編號：' + docRef.id.slice(0,8).toUpperCase();

    // Pre-fill email from form if available
    const phoneVal = document.getElementById('f-phone')?.value.trim();
    window._onboardName = name;
    window._onboardPhone = phoneVal;

  } catch(e) {
    alert('送出失敗：'+e.message);
    btn.disabled = false;
    btn.textContent = '✓ 確認送出入職資料';
  }
};

// ── 建立帳號（送出入職後設定）──────────────────────────────
window.createOnboardAccount = async function() {
  const email = document.getElementById('acct-email')?.value.trim();
  const pass1 = document.getElementById('acct-pass')?.value;
  const pass2 = document.getElementById('acct-pass2')?.value;
  const msgEl = document.getElementById('acct-msg');
  const btn   = document.getElementById('acct-btn');

  if(!email){ msgEl.textContent='請輸入 Email'; msgEl.style.color='#f87171'; return; }
  if(!pass1||pass1.length<6){ msgEl.textContent='密碼至少6位'; msgEl.style.color='#f87171'; return; }
  if(pass1!==pass2){ msgEl.textContent='兩次密碼不一致'; msgEl.style.color='#f87171'; return; }

  btn.disabled = true;
  btn.textContent = '建立中...';

  try {
    const name  = window._onboardName || '新員工';
    const phone = window._onboardPhone || '';

    // 透過 Cloud Function 建立帳號
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
