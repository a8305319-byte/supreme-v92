<nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[300px] h-20 bg-black/80 backdrop-blur-3xl border border-white/20 rounded-[2.5rem] flex justify-around items-center px-4 shadow-[0_0_40px_rgba(0,0,0,1)] z-[9999]">
    
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/3 h-[1.5px] bg-gradient-to-r from-transparent via-cyan-400 to-transparent shadow-[0_0_10px_rgba(34,211,238,0.5)]"></div>

    <button onclick="switchTab('monitor')" id="btn-monitor" class="nav-btn group relative flex flex-col items-center justify-center transition-all duration-300">
        <div class="p-3 rounded-2xl bg-cyan-400/10 text-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)]">
            <i class="fas fa-eye text-xl drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]"></i>
        </div>
        <div class="active-dot absolute -bottom-2 w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_8px_cyan]"></div>
    </button>

    <button onclick="switchTab('salary')" id="btn-salary" class="nav-btn group relative flex flex-col items-center justify-center transition-all duration-300 opacity-60 hover:opacity-100">
        <div class="p-3 rounded-2xl text-white">
            <i class="fas fa-calculator text-xl"></i>
        </div>
        <div class="active-dot absolute -bottom-2 w-1.5 h-1.5 bg-white rounded-full hidden"></div>
    </button>

    <button onclick="switchTab('fleet')" id="btn-fleet" class="nav-btn group relative flex flex-col items-center justify-center transition-all duration-300 opacity-60 hover:opacity-100">
        <div class="p-3 rounded-2xl text-white">
            <i class="fas fa-truck text-xl"></i>
        </div>
        <div class="active-dot absolute -bottom-2 w-1.5 h-1.5 bg-white rounded-full hidden"></div>
    </button>

</nav>

<div class="h-40"></div>

<script>
    /**
     * Supreme-V92 分頁切換核心 (整合 UI 反饋)
     */
    function switchTab(tabId) {
        console.log(`%c[Alpha Core] 讀取 ${tabId.toUpperCase()} 資訊庫...`, "color: #22d3ee; font-weight: bold;");
        
        // 1. 面板顯示控制
        const panels = ['monitor', 'salary', 'fleet'];
        panels.forEach(id => {
            const el = document.getElementById(`panel-${id}`);
            if (el) el.style.display = 'none';
        });

        const targetEl = document.getElementById(`panel-${tabId}`);
        if (targetEl) {
            targetEl.style.display = 'block';
        } else {
            console.warn(`[!] 未檢測到 panel-${tabId}，請確認 HTML 結構。`);
        }

        // 2. UI 按鈕狀態切換 (視覺同步)
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.add('opacity-60');
            btn.querySelector('.active-dot')?.classList.add('hidden');
            // 移除 Cyan 高亮色
            const iconDiv = btn.querySelector('div:first-child');
            iconDiv.classList.remove('bg-cyan-400/10', 'text-cyan-400', 'shadow-[0_0_15px_rgba(34,211,238,0.2)]');
            iconDiv.classList.add('text-white');
        });

        // 3. 啟動目標按鈕視覺
        const activeBtn = document.getElementById(`btn-${tabId}`);
        if (activeBtn) {
            activeBtn.classList.remove('opacity-60');
            activeBtn.querySelector('.active-dot')?.classList.remove('hidden');
            const iconDiv = activeBtn.querySelector('div:first-child');
            iconDiv.classList.add('bg-cyan-400/10', 'text-cyan-400', 'shadow-[0_0_15px_rgba(34,211,238,0.2)]');
            iconDiv.classList.remove('text-white');
        }
    }
</script>
