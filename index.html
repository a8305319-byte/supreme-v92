<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC 行政指揮部</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; font-weight: 900; }
    .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(255,255,255,0.05); }
    .agent-active { border: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.1); }
    input { background: #111; border: 1px solid #222; border-radius: 8px; padding: 10px; color: #3b82f6; font-size: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 隨機姓氏庫
    const SURNAMES = ['陳', '林', '黃', '張', '李', '王', '吳', '劉', '蔡', '楊'];
    const NAMES = ['小姐', '先生', '專員', '助理', '客服', '核心'];

    function App() {
      const [agent, setAgent] = useState({ id: '801', name: '陳小姐', gender: '女' });
      const [customName, setCustomName] = useState('');

      // 一鍵輪換身分邏輯
      const rotateAgent = () => {
        const randomId = Math.floor(800 + Math.random() * 200);
        const randomName = SURNAMES[Math.floor(Math.random() * SURNAMES.length)] + 
                           NAMES[Math.floor(Math.random() * NAMES.length)];
        const gender = randomName.includes('小姐') ? '女' : '男';
        setAgent({ id: randomId.toString(), name: randomName, gender });
      };

      const applyManualName = () => {
        if(!customName) return;
        setAgent({ ...agent, name: customName });
        setCustomName('');
      };

      return (
        <div className="h-screen flex flex-col p-6 bg-black">
          <header className="border-b border-white/5 pb-6 mb-8 flex justify-between items-center">
            <div>
              <h1 className="text-xl italic font-black text-zinc-500 uppercase">Identity_Rotation</h1>
              <p className="text-[10px] text-zinc-700">CURRENT_PERSONA: {agent.id}</p>
            </div>
            <button onClick={rotateAgent} className="bg-blue-600 text-[10px] px-4 py-2 rounded-full btn-active">隨機更換身分</button>
          </header>

          <div className="glass p-8 rounded-[2.5rem] border-white/5 border mb-8">
            <div className="flex items-center gap-6 mb-8">
              <div className="w-16 h-16 bg-zinc-900 rounded-3xl flex items-center justify-center text-3xl">
                {agent.gender === '女' ? '👩‍💼' : '👨‍💼'}
              </div>
              <div>
                <h2 className="text-2xl font-black text-blue-500 italic">{agent.name}</h2>
                <p className="text-[10px] text-zinc-600 uppercase">編號: {agent.id} | 性別: {agent.gender}</p>
              </div>
            </div>

            <div className="space-y-4">
              <p className="text-[10px] text-zinc-700 italic uppercase">手動指定新姓氏/稱呼</p>
              <div className="flex gap-2">
                <input 
                  value={customName} 
                  onChange={(e) => setCustomName(e.target.value)}
                  placeholder="例如：趙小姐" 
                  className="flex-1"
                />
                <button onClick={applyManualName} className="bg-zinc-800 px-4 rounded-xl text-[10px]">更換</button>
              </div>
            </div>
          </div>

          <div className="bg-blue-900/5 p-6 rounded-3xl border border-blue-500/10">
            <h3 className="text-xs font-black text-blue-900 mb-4 italic tracking-widest uppercase">對外預設語氣</h3>
            <p className="text-xs text-zinc-500 italic leading-relaxed">
              「您好，我是行政中心編號 <span className="text-blue-500">{agent.id}</span> 的 <span className="text-blue-500">{agent.name}</span>。有關您的財務確權異常，會計部已交由我處理，請依循系統指令完成操作。」
            </p>
          </div>

          <div className="mt-auto text-center py-6">
            <p className="text-[8px] text-zinc-800 font-mono tracking-[0.5em] uppercase">No Head Mode / Stealth Command</p>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
