            value={input} 
            onChange={e => setInput(e.target.value)} 
            onKeyPress={e => e.key === 'Enter' && handleSend()} 
            placeholder="下達指令 (例：分析數據)..." 
            className="flex-1 bg-slate-900 border border-white/10 p-4 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition-all font-black font-mono" 
          />
          <button 
            onClick={handleSend} 
            disabled={isTyping || !input.trim()} 
            className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 text-white p-4 rounded-xl active:scale-95 transition-all shadow-[0_0_15px_rgba(37,99,235,0.4)]"
          >
            <Send size={20} />
          </button>
        </div>
      </div>
    </div>
  );
}

// ==========================================
// 📊 財務與審核詳情組件 (包含 2026 勞健保新制)
// ==========================================
function AdminDriverDetailModal({ partner, onClose, onUpdate, authRole }) {
  const [tab, setTab] = useState('finance');
  const [insuranceBracket, setInsuranceBracket] = useState(partner.insurance_bracket || "0");
  const [dependents, setDependents] = useState(partner.dependents || 0);
  const [enableSecGen, setEnableSecGen] = useState(partner.enable_sec_gen || false);
  const [deductionAmount, setDeductionAmount] = useState(partner.current_deduction || "");
  const [deductionReason, setDeductionReason] = useState(partner.deduction_reason || "");
  const [bonusAmount, setBonusAmount] = useState(partner.current_bonus || "");
  const [isTaskDone, setIsTaskDone] = useState(partner.task_5000_done || false);

  const handleSaveFinance = () => {
    const entry = INSURANCE_TABLE_2026[insuranceBracket] || { labor: 0, health: 0 };
    const laborFee = entry.labor;
    const healthFee = Math.round(entry.health * (1 + Number(dependents)));
    const finalBonus = Number(bonusAmount) + (isTaskDone ? 5000 : 0);
    const baseIncome = (Number(partner.total_del)||0) * (partner.custom_del_price||15) + (Number(partner.total_pkp)||0) * (partner.custom_pkp_price||10);
    const totalForSecGen = baseIncome + finalBonus;
    const secGenFee = enableSecGen && totalForSecGen >= 20000 ? Math.round(totalForSecGen * 0.0211) : 0;

    const payload = { current_deduction: Number(deductionAmount), deduction_reason: deductionReason, current_bonus: finalBonus, task_5000_done: isTaskDone, insurance_bracket: Number(insuranceBracket), enable_sec_gen: enableSecGen, dependents: Number(dependents), labor_fee: laborFee, health_fee: healthFee, sec_gen_fee: secGenFee };

    if (authRole === 'super_admin') { payload.salary_status = 'pending_sign'; showToast("⚡ 神諭降臨：財務結算已強制覆寫並放行"); } 
    else showToast("✅ 2026 財務核算數據已存入草稿");
    onUpdate(partner.id, null, payload);
  };

  if (!partner) return null;

  return (
    <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 animate-zoom" onClick={onClose}>
      <div className="bg-[#050505] border border-blue-500/30 p-6 rounded-[2rem] w-full max-w-lg h-[85vh] flex flex-col relative" onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-6 right-6 p-2 bg-black rounded-full text-slate-500 hover:text-rose-500"><X size={20}/></button>
        <div className="mb-4 border-b border-white/5 pb-4"><h3 className="text-2xl text-blue-500 italic font-black mb-1 flex items-center gap-2"><User size={24}/> {partner.name}</h3><p className="text-xs text-slate-500 font-mono tracking-widest">{partner.phone} | 正件 {partner.total_del||0} | 逆收 {partner.total_pkp||0}</p></div>
        <div className="flex gap-2 mb-6 bg-black p-2 rounded-2xl border border-white/5">
          <button onClick={()=>setTab('finance')} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${tab==='finance'?'bg-blue-600 text-white':'text-slate-500 hover:bg-white/5'}`}>財務核算</button>
          <button onClick={()=>setTab('audit')} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${tab==='audit'?'bg-amber-600 text-white':'text-slate-500 hover:bg-white/5'}`}>異常審核</button>
        </div>
        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-6">
          {tab === 'finance' && (
            <div className="space-y-6 animate-[fadeIn_0.3s]">
              <div className="bg-blue-950/10 p-5 rounded-3xl border border-blue-500/30 shadow-[inner_0_0_20px_rgba(59,130,246,0.05)]">
                <p className="text-[11px] text-blue-400 mb-4 font-black tracking-widest flex items-center gap-2"><Shield size={14}/> 2026 社會成本與眷屬核算</p>
                <div>
                  <select className="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-sm outline-none mb-4" value={insuranceBracket} onChange={e=>setInsuranceBracket(e.target.value)}>
                    <option value="0">--- 職業工會自理 / 未投保 ---</option>
                    {Object.keys(INSURANCE_TABLE_2026).map(b => <option key={b} value={b}>分級：${Number(b).toLocaleString()} (勞:${INSURANCE_TABLE_2026[b].labor} 健:${INSURANCE_TABLE_2026[b].health})</option>)}
                  </select>
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-black p-4 rounded-xl border border-white/5"><label className="text-[10px] text-slate-500 mb-2 block uppercase">健保依附眷屬</label><div className="flex items-center gap-3"><input type="number" min="0" max="9" className="w-full bg-transparent text-white text-xl font-black outline-none" value={dependents} onChange={e=>setDependents(e.target.value)} /><span className="text-xs text-slate-600">人</span></div><p className="text-[8px] text-blue-500/70 mt-2 font-black italic">※ 計費人數：{1 + Number(dependents || 0)} 人</p></div>
                    <div className="bg-black p-4 rounded-xl border border-white/5 flex flex-col justify-center"><label className="flex items-center gap-3 cursor-pointer group mb-1"><input type="checkbox" checked={enableSecGen} onChange={e=>setEnableSecGen(e.target.checked)} className="w-5 h-5 accent-blue-500" /><span className="text-xs text-slate-300 font-black">代扣二代健保</span></label><p className="text-[9px] text-slate-500 pl-8 leading-relaxed">費率 2.11%<br/>達 20,000 門檻啟動</p></div>
                  </div>
                </div>
              </div>
              <div className="grid grid-cols-1 gap-4">
                <div className="bg-rose-950/10 p-5 rounded-3xl border border-rose-500/30"><div className="flex gap-2"><input type="number" placeholder="扣款金額" className="flex-1 bg-black p-4 rounded-xl text-white text-sm border border-white/5" value={deductionAmount} onChange={e=>setDeductionAmount(e.target.value)} /><input placeholder="事由..." className="flex-[2] bg-black p-4 rounded-xl text-white text-sm border border-white/5" value={deductionReason} onChange={e=>setDeductionReason(e.target.value)} /></div></div>
                <div className="bg-amber-950/10 p-5 rounded-3xl border border-amber-500/30"><label className="flex items-center gap-3 bg-black p-4 rounded-xl mb-3 cursor-pointer border border-white/5"><input type="checkbox" className="w-5 h-5 accent-amber-500" checked={isTaskDone} onChange={e=>setIsTaskDone(e.target.checked)} /><span className="text-sm text-amber-100 font-black">5,000 元品質達成獎金</span></label><input type="number" placeholder="額外激勵獎金..." className="w-full bg-black p-4 rounded-xl text-white text-sm border border-white/5" value={bonusAmount} onChange={e=>setBonusAmount(e.target.value)} /></div>
              </div>
              <button onClick={handleSaveFinance} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black active:scale-95">💾 執行財務核算寫入</button>
            </div>
          )}
          {tab === 'audit' && (
            <div className="space-y-4 animate-[fadeIn_0.3s]">
              <div className="bg-black p-5 rounded-3xl border border-white/5 text-center"><Alert size={48} className="text-amber-500 mx-auto mb-4" /><h4 className="text-white font-black mb-2">爭議與異常審核</h4><button onClick={()=>{ onUpdate(partner.id, null, { has_conflict: true, conflict_reason: "營運總部標記異常：需複核" }); showToast("已標記異常"); }} className="w-full py-4 bg-amber-900/30 text-amber-500 rounded-xl border border-amber-500/30 text-sm font-black">🚨 強制標記為異常狀態</button></div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ==========================================
// 👑 營運指揮中心 (AdminHub)
// ==========================================
function AdminHub({ authRole, partners, onLogout, updateField, db, appId, writeGodLog, globalSettings }) {
  const [adminTab, setAdminTab] = useState('formal'); 
  const [sq, setSq] = useState("");
  const [mT, setMT] = useState(null);
  const [chatTarget, setChatTarget] = useState(null);
  const [detailTarget, setDetailTarget] = useState(null);
  const [isSyncing, setIsSyncing] = useState(false);
  const [showAiCopilot, setShowAiCopilot] = useState(false);
  const [showGemini, setShowGemini] = useState(false);
  const [geminiToken, setGeminiToken] = useState(localStorage.getItem('ggsoc_gemini_token') || "");
  const [expressData, setExpressData] = useState({ phone: '', name: '', id_number: '', priority_access: false });
  const [lineToken, setLineToken] = useState(localStorage.getItem('ggsoc_line_token') || "");
  const [godLogs, setGodLogs] = useState([]);

  useEffect(() => {
    if(authRole !== 'super_admin') return;
    const unsub = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'god_log'), orderBy('timestamp', 'desc')), (snap) => {
      setGodLogs(snap.docs.map(d => ({id: d.id, ...d.data()})));
    });
    return () => unsub();
  }, [authRole]);

  const filteredList = useMemo(() => {
    if (!partners) return [];
    let list = partners.filter(p => p.phone !== '0976017938');
    if (globalSettings?.ghost_mode) list = list.filter(p => p.is_blacklisted !== true);
    return list;
  }, [partners, globalSettings?.ghost_mode]);

  const aiInsights = useMemo(() => {
    if (!filteredList || !filteredList.length) return { topDriver: null, conflictCount: 0, zeroYield: [], riskList: [] };
    const active = filteredList.filter(p => p.status === 'approved');
    const top = active.reduce((p, c) => ((Number(p.total_del)||0) + (Number(p.total_pkp)||0)) > ((Number(c.total_del)||0) + (Number(c.total_pkp)||0)) ? p : c, active[0] || null);
    const zero = active.filter(x => ((Number(x.total_del)||0) + (Number(x.total_pkp)||0)) === 0);
    const conflicts = filteredList.filter(x => x.has_conflict);
    const riskList = active.filter(x => x.salary_status === 'disputed' || (x.has_conflict && ((Number(x.total_del)||0) + (Number(x.total_pkp)||0) < 10)));
    return { topDriver: top, conflictCount: conflicts.length, zeroYield: zero, riskList };
  }, [filteredList]);

  const handleToggleSwitch = async (field, currentValue) => {
    if (isSyncing) return; setIsSyncing(true);
    try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { [field]: !currentValue }); if(writeGodLog) writeGodLog("系統開關", `切換 [${field}]`); showToast("⚡ 設定已同步"); } 
    catch (err) { showToast("❌ 同步失敗", true); } finally { setIsSyncing(false); }
  };

  useEffect(() => {
    if (globalSettings?.ai_auto_pilot && authRole === 'super_admin') {
      const autoTask = async () => {
        const candidates = filteredList.filter(p => p.status === 'pending' && ((Number(p.total_del)||0) + (Number(p.total_pkp)||0)) > 0 && !p.has_conflict && !p.is_blacklisted);
        for (const p of candidates) await updateField(p.id, 'status', 'approved');
      }; autoTask();
    }
  }, [filteredList, globalSettings?.ai_auto_pilot]);

  const displayList = useMemo(() => {
    const s = sq.toLowerCase();
    const list = filteredList.filter(p => (p.name||'').includes(s) || (p.phone||'').includes(s));
    if (adminTab === 'pending') return list.filter(p => p.status === 'pending');
    if (adminTab === 'intercept') return list.filter(p => p.salary_status === 'intercepted_by_boss');
    return list.filter(p => p.status === 'approved' || p.status === 'frozen');
  }, [filteredList, adminTab, sq]);

  const toggleLivenessCheck = async (p) => {
    if(!window.confirm(`要對 ${p.name} 啟動 60 秒活性突擊檢查嗎？`)) return;
    await updateField(p.id, null, { pending_liveness_check: true, liveness_failed: false });
    showToast(`🎯 已對 ${p.name} 發射活性檢查指令`);
  };

  return (
    <div className="p-4 md:p-10 max-w-full mx-auto bg-black min-h-screen animate-[fadeIn_0.5s]">
      {chatTarget && <ChatModal target={chatTarget} currentUserRole={authRole} onClose={()=>setChatTarget(null)} />}
      {detailTarget && <AdminDriverDetailModal partner={detailTarget} onClose={()=>setDetailTarget(null)} onUpdate={updateField} authRole={authRole} />}
      {showGemini && <GeminiCopilotModal onClose={()=>setShowGemini(false)} systemData={filteredList} writeGodLog={writeGodLog} />}
      
      <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6">
        <div>
          <h2 className="text-white text-5xl italic font-black uppercase tracking-tighter">{globalSettings?.ghost_mode ? '數據監控終端' : '營運指揮中心'}</h2>
          <div className="flex items-center gap-2 mt-2"><span className={`text-[10px] px-3 py-1 rounded-full border ${authRole==='super_admin'?'text-amber-500 border-amber-500/30 bg-amber-900/20':'text-blue-400 border-blue-500/30 bg-blue-900/20'}`}>{globalSettings?.ghost_mode ? '🔍 STATUS: STABLE' : (authRole==='super_admin'?'👑 總裁模式':'👑 營運總部')}</span></div>
        </div>
        <div className="flex gap-2 w-full xl:w-auto flex-wrap">
          {authRole === 'super_admin' && <button onClick={()=>setShowGemini(true)} className="flex-1 xl:flex-none bg-blue-900/20 border border-blue-500/30 px-6 py-3 rounded-xl text-xs font-black text-blue-400 hover:bg-blue-600 hover:text-white transition-all">🧠 喚醒 Gemini</button>}
          {authRole === 'super_admin' && <button onClick={()=>setShowAiCopilot(!showAiCopilot)} className={`flex-1 xl:flex-none border px-6 py-3 rounded-xl text-xs transition-all ${showAiCopilot ? 'bg-cyan-600/30 border-cyan-400 text-cyan-300' : 'bg-slate-800 border-white/10 text-cyan-500'}`}>🤖 AI 戰情分析</button>}
          <button onClick={()=>setMT('tools')} className="flex-1 xl:flex-none bg-[#0a0a0a] border border-white/5 px-6 py-3 rounded-xl text-xs text-white hover:bg-slate-900 transition-all"><Settings size={16}/> 系統工具</button>
          <button onClick={onLogout} className="flex-1 xl:flex-none bg-rose-950/20 text-rose-500 px-6 py-3 rounded-xl text-xs border border-rose-500/10">安全退出</button>
        </div>
      </div>

      {showAiCopilot && (
        <div className="glass-panel p-6 md:p-8 rounded-[2.5rem] mb-6 border border-cyan-500/30 bg-cyan-950/10 relative overflow-hidden">
          <div className="scan-line bg-cyan-500/50 shadow-[0_0_15px_#06b6d4]"></div>

            <div className="bg-[#050505] p-6 rounded-3xl border border-white/5"><p className="text-[10px] text-amber-500 mb-3 font-black"><Alert size={12} className="inline"/> 系統異常警示</p><p className="text-3xl text-white italic font-black">{aiInsights.conflictCount} CASES</p></div>
            <div className="bg-[#050505] p-6 rounded-3xl border border-rose-500/20"><p className="text-[10px] text-rose-500 mb-3 font-black"><Skull size={12} className="inline"/> AI 高風險預測</p><p className="text-3xl text-rose-400 italic font-black">{aiInsights.riskList.length} TARGETS</p></div>
          </div>
        </div>

        <div className="flex gap-2">{['formal', 'pending', 'intercept'].map(t => (<button key={t} onClick={()=>setAdminTab(t)} className={`flex-1 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${adminTab===t?'bg-blue-600 text-white shadow-lg':'bg-black text-slate-500'}`}>{t==='formal'?'現役':t==='pending'?'待審':'攔截'}</button>))}</div>
        <div className="flex items-center gap-3 bg-black p-4 rounded-2xl border border-white/5"><Search size={18} className="text-blue-500" /><input placeholder="搜尋實體識別碼..." className="bg-transparent border-none outline-none text-white text-sm w-full" value={sq} onChange={e=>setSq(e.target.value)} /></div>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-32">
        {displayList.map(p => (
          <div key={p.id} className={`p-6 rounded-[2rem] bg-[#050505] border ${p.is_blacklisted ? 'border-rose-900' : 'border-white/5'} relative group hover:border-white/20 transition-all`}>

              <button onClick={(e)=>{e.stopPropagation(); setChatTarget(p);}} className="bg-blue-900/20 text-blue-500 p-2 rounded-xl border border-blue-500/20"><Message size={14}/></button>

              <div className="bg-[#00c300]/10 p-5 rounded-3xl border border-[#00c300]/30 shadow-inner">
                <p className="text-[10px] text-[#00c300] mb-3 uppercase font-black italic">🟢 LINE 上帝戰情網連線</p>
                <div className="flex gap-2 mb-2"><input type="password" placeholder="LINE Notify Token..." className="flex-1 bg-black p-3 rounded-xl text-xs text-white outline-none border border-white/5" value={lineToken} onChange={e=>{setLineToken(e.target.value); localStorage.setItem('ggsoc_line_token', e.target.value);}} /><button onClick={()=>{showToast("✅ 戰情已同步至 LINE");}} className="bg-[#00c300] text-white px-4 py-3 rounded-xl text-[10px] font-black">測試</button></div>
              </div>

              <div className="bg-fuchsia-950/20 p-5 rounded-3xl border border-fuchsia-500/30">
                <p className="text-[10px] text-fuchsia-400 mb-3 uppercase font-black italic">⚡ 核心成員免試授權</p>
                <div className="grid grid-cols-2 gap-2 mb-3">
                  <input placeholder="姓名" className="bg-black border border-white/5 p-3 rounded-xl text-xs text-white" value={expressData.name} onChange={e=>setExpressData({...expressData, name: e.target.value})} />
                  <input placeholder="手機" className="bg-black border border-white/5 p-3 rounded-xl text-xs text-white" value={expressData.phone} onChange={e=>setExpressData({...expressData, phone: e.target.value})} />
                </div>
                <button onClick={async()=>{
                  if(!expressData.phone || !expressData.name) return showToast("姓名與手機必填", true);
                  await setDoc(doc(db,'artifacts',appId,'public','data','partners',`p_${expressData.phone}`), { id:`p_${expressData.phone}`, name:expressData.name, phone:expressData.phone, status:'approved', total_del:0, total_pkp:0, pin:'0000', created_at: Date.now(), priority_access: expressData.priority_access });
                  showToast("✅ 免試授權成功 (預設密碼 0000)"); setExpressData({phone:'', name:'', id_number:'', priority_access: false});
                }} className="w-full py-3 bg-fuchsia-600 text-white rounded-xl text-xs font-black">寫入上帝名單</button>
              </div>

              <div className={`p-5 rounded-3xl border transition-all ${globalSettings?.ai_auto_pilot ? 'bg-cyan-950/20 border-cyan-500/30' : 'bg-black border-white/5'}`}><div className="flex justify-between items-center"><span className="text-xs text-white font-black">AI_AUTO_PILOT / 自動駕駛</span><button onClick={()=>handleToggleSwitch('ai_auto_pilot', globalSettings?.ai_auto_pilot)} className={`w-12 h-6 rounded-full p-1 transition-all ${globalSettings?.ai_auto_pilot?'bg-cyan-500':'bg-slate-800'}`}><div className={`w-4 h-4 bg-white rounded-full transition-transform ${globalSettings?.ai_auto_pilot?'translate-x-6':'translate-x-0'}`} /></button></div></div>
              <div className={`p-5 rounded-3xl border transition-all ${globalSettings?.ghost_mode ? 'bg-fuchsia-950/20 border-fuchsia-500/30' : 'bg-black border-white/5'}`}><div className="flex justify-between items-center"><span className="text-xs text-white font-black">GHOST_MODE / 總裁隱身</span><button onClick={()=>handleToggleSwitch('ghost_mode', globalSettings?.ghost_mode)} className={`w-12 h-6 rounded-full p-1 transition-all ${globalSettings?.ghost_mode?'bg-fuchsia-600':'bg-slate-800'}`}><div className={`w-4 h-4 bg-white rounded-full transition-transform ${globalSettings?.ghost_mode?'translate-x-6':'translate-x-0'}`} /></button></div></div>
              
              {authRole === 'super_admin' && (
                <div className="bg-black p-4 rounded-3xl border border-white/5">
                  <p className="text-[10px] text-slate-500 mb-3 font-black flex items-center gap-1"><HistoryLog size={12}/> 上帝日誌 (God Log)</p>
                  <div className="max-h-40 overflow-y-auto space-y-2 custom-scrollbar">
                    {godLogs.map(log => (<div key={log.id} className="text-[9px] border-b border-white/5 pb-1"><span className="text-blue-500">[{new Date(log.timestamp).toLocaleTimeString()}]</span> <span className="text-white">{log.action}:</span> <span className="text-slate-400">{log.details}</span></div>))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ==========================================
// 🚀 核心重建區：門禁系統 (Gate)
// ==========================================
function Gate({ onLogin }) {
  const [phone, setPhone] = useState("");
  const [pin, setPin] = useState("");

  return (
    <div className="h-screen flex items-center justify-center bg-black p-6 animate-zoom relative overflow-hidden">
      {/* 門禁背景特效 */}
      <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/10 via-black to-black -z-10"></div>
      
      <div className="bg-[#050505] border border-white/5 p-10 rounded-[3rem] w-full max-w-sm text-center shadow-[0_0_50px_rgba(0,0,0,1)] relative z-10">
         <Bot size={48} className="text-blue-500 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)] animate-pulse" />
         <h1 className="text-2xl italic font-black mb-2 tracking-tighter text-white">GGSOC_TERMINAL</h1>
         <p className="text-[10px] text-slate-500 font-mono tracking-[0.2em] mb-10">AUTHORIZATION REQUIRED</p>
         
         <div className="space-y-4 mb-8">
           <input 
             value={phone} 
             onChange={e => setPhone(e.target.value)} 
             placeholder="PHONE / 終端識別碼" 
             className="w-full bg-black p-4 rounded-2xl border border-white/5 text-center text-sm outline-none focus:border-blue-500 transition-all font-mono text-white placeholder:text-slate-700" 
           />
           <input 
             type="password" 
             value={pin} 
             onChange={e => setPin(e.target.value)} 
             placeholder="PIN / 安全密鑰" 
             className="w-full bg-black p-4 rounded-2xl border border-white/5 text-center text-sm outline-none focus:border-blue-500 transition-all font-mono text-white placeholder:text-slate-700" 
             onKeyPress={e => e.key === 'Enter' && onLogin(phone, pin)}
           />
         </div>
         
         <button onClick={() => onLogin(phone, pin)} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black italic shadow-[0_0_20px_rgba(37,99,235,0.4)] active:scale-95 transition-all text-white tracking-widest text-lg">
           ESTABLISH_LINK
         </button>
      </div>
    </div>
  );
}

// ==========================================
// 🚀 核心重建區：司機回報總端 (DriverHub)
// ==========================================
function DriverHub({ user, currentPartner, onLogout, db, appId, setLayer, globalSettings }) {
  const [del, setDel] = useState("");
  const [pkp, setPkp] = useState("");
  const [showSalary, setShowSalary] = useState(false);
  const [isSyncing, setIsSyncing] = useState(false);

  const handleSubmit = async () => {
    if (isSyncing) return;
    if (!del && !pkp) return showToast("⚠️ 請至少輸入一項回報數據", true);
    setIsSyncing(true);
    try {
      const ref = doc(db, 'artifacts', appId, 'public', 'data', 'partners', currentPartner.id);
      await updateDoc(ref, {
         total_del: (Number(currentPartner.total_del) || 0) + Number(del),
         total_pkp: (Number(currentPartner.total_pkp) || 0) + Number(pkp),
         last_update: Date.now()
      });
      showToast("✅ 數據已成功同步至總部核算");
      setDel(""); setPkp("");
    } catch (err) {
      showToast("❌ 數據同步失敗", true);
    } finally {
      setIsSyncing(false);
    }
  };

  return (
    <div className="p-4 md:p-8 max-w-md mx-auto bg-black min-h-screen text-white font-black animate-[fadeIn_0.5s]">
       {/* 如果有待處理的活性檢查 */}
       {currentPartner.pending_liveness_check && (
         <LivenessCheckModal 
           partnerId={currentPartner.id} 
           onVerify={() => { updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), {pending_liveness_check: false, liveness_failed: false}); showToast("✅ 活性驗證通過，權限已恢復"); }} 
           db={db} appId={appId} 
         />
       )}
       
       <div className="flex justify-between items-center mb-10 border-b border-white/5 pb-4">
         <div>
           <h2 className="text-4xl italic text-white tracking-tighter">TERMINAL</h2>
           <p className="text-blue-500 text-[10px] tracking-widest font-mono mt-1">ENTITY: {currentPartner.name} / {currentPartner.phone}</p>
         </div>
         <button onClick={onLogout} className="bg-rose-950/30 text-rose-500 p-3 rounded-2xl border border-rose-500/20 hover:bg-rose-600 hover:text-white transition-colors active:scale-90"><LogOut size={18}/></button>
       </div>

       {/* 回報區塊 */}
       <div className="bg-[#050505] p-6 rounded-[2rem] border border-white/5 mb-6 shadow-2xl relative overflow-hidden group">
         <div className="absolute top-0 left-0 w-full h-1 bg-blue-500/30 group-hover:bg-blue-500 transition-colors"></div>
         <h3 className="text-slate-400 text-xs mb-6 uppercase tracking-widest flex items-center gap-2"><Send size={14} className="text-blue-500"/> 今日產能回報</h3>
         
         <div className="flex gap-4 mb-6">
           <div className="flex-1">
             <label className="text-[10px] text-slate-500 block mb-2 text-center uppercase tracking-widest">正件 (DEL)</label>
             <input type="number" value={del} onChange={e=>setDel(e.target.value)} placeholder="0" className="w-full bg-black border border-white/10 rounded-2xl p-4 text-center text-white text-2xl outline-none focus:border-blue-500 transition-colors font-mono" />
           </div>
           <div className="flex-1">
             <label className="text-[10px] text-slate-500 block mb-2 text-center uppercase tracking-widest">逆收 (PKP)</label>
             <input type="number" value={pkp} onChange={e=>setPkp(e.target.value)} placeholder="0" className="w-full bg-black border border-white/10 rounded-2xl p-4 text-center text-white text-2xl outline-none focus:border-amber-500 transition-colors font-mono" />
           </div>
         </div>
         <button onClick={handleSubmit} disabled={isSyncing} className="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl text-white shadow-[0_0_20px_rgba(37,99,235,0.3)] active:scale-95 transition-all text-lg tracking-widest italic disabled:opacity-50">
           {isSyncing ? 'TRANSMITTING...' : '提交數據至核心'}
         </button>
       </div>

       {/* 統計區塊 */}
       <div className="grid grid-cols-2 gap-4 mb-6">
         <div className="bg-[#050505] p-6 rounded-[2rem] border border-white/5 text-center">
           <p className="text-[10px] text-slate-500 mb-2 uppercase tracking-widest">目前累積正件</p>
           <p className="text-3xl text-blue-400 italic font-mono">{currentPartner.total_del || 0}</p>
         </div>
         <div className="bg-[#050505] p-6 rounded-[2rem] border border-white/5 text-center">
           <p className="text-[10px] text-slate-500 mb-2 uppercase tracking-widest">目前累積逆收</p>
           <p className="text-3xl text-amber-400 italic font-mono">{currentPartner.total_pkp || 0}</p>
         </div>
       </div>

       {/* 薪資狀態與異常報備提示 */}
       {currentPartner.salary_status === 'pending_sign' && (
         <button onClick={()=>setShowSalary(true)} className="w-full py-5 bg-emerald-600/20 border border-emerald-500 text-emerald-400 rounded-[2rem] animate-pulse font-black tracking-widest text-sm shadow-[0_0_15px_rgba(16,185,129,0.2)]">
           💰 薪資單已核發，請點擊檢視並簽收
         </button>
       )}
       
       {currentPartner.has_conflict && (
         <div className="w-full py-4 bg-amber-900/30 border border-amber-500/50 text-amber-400 rounded-2xl text-center text-xs tracking-widest mt-4">
           ⚠️ 系統已標記您的帳號異常，請靜候總部審核
         </div>
       )}

       {showSalary && (
         <SalarySignModal 
           partner={currentPartner} 
           onClose={()=>setShowSalary(false)} 
           onAction={async (action, data) => {
             if(action==='confirm') {
               await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), {salary_status: 'signed', signature: data.sig});
               showToast("✅ 已成功簽收"); setShowSalary(false);
             } else {
               await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), {salary_status: 'disputed', salary_dispute_reason: data.reason});
               showToast("⚠️ 已送出異議至總部"); setShowSalary(false);
             }
           }} 
         />
       )}
    </div>
  );
}

// ==========================================
// 🚀 核心包裹器 (AppWrapper)
// ==========================================
function AppWrapper() {
  const [u, setU] = useState(null); 
  const [aR, setAR] = useState('guest'); 
  const [ps, setPs] = useState([]); 
  const [l, setL] = useState('gate'); 
  const [ld, setLd] = useState(true); 
  const [spI, setSpI] = useState(null);
  const [gs, setGs] = useState(null); 

  const cp = useMemo(() => ps.find(p => p.id === spI), [ps, spI]);

  useEffect(() => {
    if(!auth) return;
    const unA = onAuthStateChanged(auth, async (user) => { 
      if(user) { 
        setU(user); 
        const s = JSON.parse(localStorage.getItem('ggsoc_auth')) || {}; 
        if(s.phone) { setAR(s.role); setSpI(`p_${s.phone}`); setL(s.role==='driver'?'driver':'admin'); } 
      } else {
        signInAnonymously(auth);
      }
      setTimeout(() => setLd(false), 800);
    });
    return () => unA();
  }, []);

  useEffect(() => {
    if(!u || !db) return;
    const unP = onSnapshot(collection(db,'artifacts',window.__app_id,'public','data','partners'), (s) => {
      setPs(s.docs.map(d=>({id:d.id,...d.data()})));
      if(!s.docs.find(d => d.data().phone === '0976017938')) {
        setDoc(doc(db,'artifacts',window.__app_id,'public','data','partners','p_0976017938'), { id:'p_0976017938', name:'系統總裁', phone:'0976017938', pin:'8305319', status:'approved', total_del:0, total_pkp:0, priority_access: true });
      }
    });
    const unG = onSnapshot(doc(db,'artifacts',window.__app_id,'public','data','settings','global'), (d) => { if(d.exists()) setGs(d.data()); });
    return () => { unP(); unG(); };
  }, [u, db]);

  const writeGodLog = async (action, details) => { 
    if(!db) return;
    await addDoc(collection(db, 'artifacts', window.__app_id, 'public', 'data', 'god_log'), { action, details, timestamp: Date.now() }); 
  };

  const handleLogin = (phone, pin) => {
    if (phone === "0976017938" && pin === "8305319") { 
      localStorage.setItem('ggsoc_auth', JSON.stringify({ phone, role: 'super_admin' })); 
      setAR('super_admin'); setL('admin'); setSpI(`p_${phone}`); showToast("👑 造物主降臨，最高權限解鎖");
    } else {
      const p = ps.find(x => x.phone === phone && x.pin === pin); 
      if (p && p.status === 'approved') { 
        if(p.liveness_failed) return showToast("🚫 帳號校驗失敗鎖定", true);
        localStorage.setItem('ggsoc_auth', JSON.stringify({ phone, role: 'driver' })); 
        setAR('driver'); setSpI(p.id); setL('driver'); showToast(`✅ 實體連線成功: ${p.name}`);
      } else showToast("⚠️ 識別失敗或權限不足", true);
    }
  };

  if (ld) return (<div className="h-screen flex flex-col items-center justify-center bg-black"><div className="loader mb-4"></div><p className="text-blue-500 text-[10px] tracking-[0.5em] animate-pulse uppercase mt-4 font-mono font-black">GGSOC_SYSTEM_IGNITING...</p></div>);

  return (
    <div className="min-h-screen text-slate-200">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none transition-all text-white"></div>
      
      {/* 判斷並渲染對應模組 */}
      {l === 'gate' && <Gate onLogin={handleLogin} />}
      
      {l === 'admin' && <AdminHub authRole={aR} partners={ps} onLogout={()=>{localStorage.removeItem('ggsoc_auth'); setL('gate');}} updateField={async (id, f, v) => { const ref = doc(db, 'artifacts', window.__app_id, 'public', 'data', 'partners', id); await updateDoc(ref, f === null ? v : { [f]: v }); }} db={db} appId={window.__app_id} writeGodLog={writeGodLog} globalSettings={gs} />}
      
      {l === 'driver' && cp && <DriverHub user={u} currentPartner={cp} onLogout={()=>{localStorage.removeItem('ggsoc_auth'); setL('gate');}} db={db} appId={window.__app_id} setLayer={setL} globalSettings={gs} />}
    </div>
  );
}

// ==========================================
// 🛡️ 錯誤攔截保護 (防止單一組件崩潰導致全站白屏)
// ==========================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  render() {
    if (this.state.hasError) return <div className="min-h-screen bg-black text-white flex items-center justify-center font-black"><div className="bg-rose-950/20 border border-rose-500 p-8 rounded-[2rem] text-center"><h2 className="text-3xl text-rose-500 mb-4">🚨 顯示層發生嚴重異常</h2><button onClick={() => window.location.reload()} className="bg-rose-600 px-6 py-3 rounded-xl text-white">強制重新載入系統</button></div></div>;
    return this.props.children;
  }
}

  </script>
