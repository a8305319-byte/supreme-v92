<div class="hero-metric-label">預估總營收</div>
      </div>
      <div class="hero-metric">
        <div class="hero-metric-value hmv-green" id="heroNetProfit">0%</div>
        <div class="hero-metric-label">人事穩定度</div>
      </div>
    </div>
  </div>

  <section class="glass-card">
    <div class="card-header">
      <div class="card-title">◈ 財務稽核矩陣 / 薪資核算</div>
      <div class="card-badge cb-blue">SYNCED</div>
    </div>
    <div class="input-group">
      <label class="input-label">配送單價設定 (TWD)</label>
      <div class="input-field-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="baseRate" class="neon-input" value="12" placeholder="預設 12">
      </div>
    </div>
    <div class="result-grid" id="driverList">
      </div>
  </section>

  <aside class="space-y-6">
    <div class="glass-card">
      <div class="card-header">
        <div class="card-title">◈ 維度防禦矩陣 / SYSTEM MATRIX</div>
        <div class="card-badge cb-amber">LEVEL 4</div>
      </div>
      <div class="switch-list" id="matrixContainer">
        </div>
    </div>
  </aside>
</main>

<div class="toast-container" id="toastContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = { 
    apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
    authDomain: "supreme-v92.firebaseapp.com", 
    projectId: "supreme-v92" 
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 1. 載入遮罩邏輯
  const loadingOverlay = document.getElementById('loadingOverlay');
  const loadingBar = document.getElementById('loadingBar');
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 10;
    loadingBar.style.width = `${Math.min(progress, 100)}%`;
    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => loadingOverlay.classList.add('hidden'), 500);
    }
  }, 50);

  // 2. 時鐘更新
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
  }, 1000);

  // 3. 監聽維度矩陣
  const matrixKeys = [
    { id: 'kill_switch', name: '緊急熔斷開關', desc: 'INSTANT SYSTEM SHUTDOWN', color: 'danger' },
    { id: 'empire_dial', name: '物流撥盤授權', desc: 'SENTINEL DATA ENTRY LOCK', color: 'amber' },
    { id: 'admin_rate_edit', name: '財務稽核修改權', desc: 'FINANCIAL PARAMETER EDIT', color: 'blue' }
  ];

  onSnapshot(doc(db, "system", "matrix"), (snap) => {
    const data = snap.exists() ? snap.data() : {};
    const container = document.getElementById('matrixContainer');
    container.innerHTML = matrixKeys.map(k => `
      <div class="switch-item ${data[k.id] ? 'active' : ''}">
        <div class="switch-info">
          <div class="switch-name">${k.name}</div>
          <div class="switch-desc">${k.desc}</div>
        </div>
        <div class="switch-right">
          <div class="switch-status-text">${data[k.id] ? 'ON' : 'OFF'}</div>
          <div class="toggle-wrap ${k.color}">
            <input type="checkbox" ${data[k.id] ? 'checked' : ''} onchange="toggleMatrix('${k.id}', this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
    `).join('');
    document.getElementById('firebaseDot').className = 'status-dot online';
    document.getElementById('firebaseStatusText').textContent = 'CORE SYNCED';
  });

  window.toggleMatrix = async (key, val) => {
    const snap = await (await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js")).getDoc(doc(db, "system", "matrix"));
    const current = snap.exists() ? snap.data() : {};
    await setDoc(doc(db, "system", "matrix"), { ...current, [key]: val });
  };

  // 4. 司機數據核算
  onSnapshot(collection(db, "drivers"), (snap) => {
    const drivers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const list = document.getElementById('driverList');
    const rate = document.getElementById('baseRate').value || 12;
    list.innerHTML = drivers.map(d => `
      <div class="result-cell rc-blue">
        <div class="result-value rv-blue">$${((d.delivered || 0) * rate).toLocaleString()}</div>
        <div class="result-label">${d.name} / ${d.phone}</div>
      </div>
    `).join('');
    document.getElementById('heroTotalOrders').textContent = drivers.reduce((a, b) => a + (b.delivered || 0), 0);
  });

</script>
</body>
</html>
