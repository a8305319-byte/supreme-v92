<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME V92 AI-ENTERPRISE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: ui-monospace, monospace; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; border-radius: 0.8rem; padding: 12px; width: 100%; color: white; outline: none; margin-bottom: 10px; font-size: 14px; transition: all 0.3s; }
        .input-box:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .label-sky { font-size: 10px; color: #38bdf8; font-weight: bold; margin-bottom: 4px; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .photo-slot { background: #0f172a; border: 1px dashed #334155; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; display: none; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1rem; background: #0ea5e9; color: #020617; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
        .btn-prime:active { scale: 0.98; opacity: 0.9; }
        .loading-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: .5; } }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-black text-white italic mb-1 tracking-tighter">SUPREME</h1>
        <p class="text-[9px] text-slate-600 tracking-[0.5em] mb-12 uppercase font-bold">AI Logistics Fleet</p>
        
        <div class="w-full max-w-[320px] space-y-4">
            <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center text-lg">
            <input type="password" id="login_pin" placeholder="PIN CODE" inputmode="numeric" class="input-box text-center text-lg tracking-[0.5em]">
            <button onclick="boot()" class="btn-prime">驗證登入</button>
            <button onclick="showApply()" class="text-[10px] text-slate-700 underline uppercase tracking-widest mt-4 block mx-auto">New Driver Application / 司機入職</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card">
            <h2 class="text-xl font-black text-white italic mb-6 text-center uppercase tracking-widest">智能人事建檔</h2>
            
            <span class="label-sky">第一步：證件拍照 (AI 會自動讀取資料)</span>
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-[10px] text-slate-500">身分證 (正)</span><img id="p_id_f"></div>
                <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-[10px] text-slate-500">身分證 (反)</span><img id="p_id_b"></div>
                <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-[10px] text-slate-500">駕駛執照</span><img id="p_lic"></div>
                <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-[10px] text-slate-500">行車執照</span><img id="p_car"></div>
                <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
            </div>

            <span class="label-sky">第二步：確認 AI 辨識資料</span>
            <input type="text" id="app_name" placeholder="姓名 (自動辨識)" class="input-box">
            <input type="text" id="app_idnum" placeholder="身分證字號 (自動辨識)" class="input-box">
            <input type="tel" id="app_phone" placeholder="聯絡電話 (登入帳號)" class="input-box">
            <input type="password" id="app_pin" placeholder="自訂登入 PIN (4碼)" maxlength="4" class="input-box">

            <span class="label-sky">第三步：通訊資訊</span>
            <input type="text" id="app_h_addr" placeholder="戶籍地址" class="input-box">
            <input type="text" id="app_c_addr" placeholder="通訊地址 (同上免填)" class="input-box">

            <button onclick="submitApply()" id="subBtn" class="btn-prime mt-4">提交完整資料</button>
            <button onclick="location.reload()" class="w-full mt-4 text-[10px] text-slate-600 uppercase">返回</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-8 mb-10 text-slate-800 font-bold text-[10px] uppercase underline">Sign Out System</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
            authDomain: "supreme-v92.firebaseapp.com",
            projectId: "supreme-v92",
            storageBucket: "supreme-v92.firebasestorage.app",
            messagingSenderId: "485530156296",
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // AI 設定
        const AI_KEY = "AIzaSyAOYllgLJPKNIKMRxg1FiZVjUb1CkfMPyA";
        let rates = { del: 50, ret: 20, labor: 1500, health: 800 };
        let partners = [];
        let currentF = '';
        const photos = {};

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); });

        window.boot = () => {
            const phone = document.getElementById('login_phone').value;
            const pin = document.getElementById('login_pin').value;
            if(phone === "0900000000" && pin === "9999") return renderAdmin();
            const p = partners.find(x => x.phone === phone && x.uid === pin && x.status === "approved");
            if(p) return renderDriverUI(p);
            alert("帳號驗證失敗或審核中");
        };

        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';

        window.triggerCam = (f) => { currentF = f; document.getElementById('cam').click(); };
        
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                photos[currentF] = base64;
                document.getElementById('p_'+currentF).src = base64;
                document.getElementById('p_'+currentF).style.display = 'block';
                document.getElementById('t_'+currentF).style.display = 'none';

                if (currentF === 'id_f') {
                    await window.aiProcess(base64);
                }
            };
            reader.readAsDataURL(input.files[0]);
        };

        // AI OCR 辨識邏輯
        window.aiProcess = async (base64) => {
            const btn = document.getElementById('subBtn');
            btn.innerHTML = "🤖 AI 正在辨識證件...";
            btn.classList.add('loading-pulse');
            
            try {
                const raw = base64.split(',')[1];
                const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${AI_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        requests: [{ image: { content: raw }, features: [{ type: "TEXT_DETECTION" }] }]
                    })
                });
                const data = await res.json();
                const text = data.responses[0].fullTextAnnotation.text;

                // 抓取證號 (A123456789)
                const idMatch = text.match(/[A-Z][1-2]\d{8}/);
                if (idMatch) document.getElementById('app_idnum').value = idMatch[0];

                // 抓取姓名 (身分證關鍵字後的繁體中文)
                const nameMatch = text.replace(/姓名|身分證|性別/g, "").match(/[\u4e00-\u9fa5]{2,3}/);
                if (nameMatch) document.getElementById('app_name').value = nameMatch[0];

                alert("✨ AI 辨識完成！已自動帶入資料。");
            } catch (e) {
                alert("AI 連線失敗，請手動輸入資料");
            } finally {
                btn.innerHTML = "提交完整資料";
                btn.classList.remove('loading-pulse');
            }
        };

        window.submitApply = async () => {
            const phone = document.getElementById('app_phone').value;
            if(partners.some(x => x.phone === phone)) return alert("此手機號碼已註冊過！");

            const data = {
                name: document.getElementById('app_name').value,
                phone: phone,
                uid: document.getElementById('app_pin').value,
                id_num: document.getElementById('app_idnum').value,
                home_addr: document.getElementById('app_h_addr').value,
                mail_addr: document.getElementById('app_c_addr').value || document.getElementById('app_h_addr').value,
                docs: photos,
                status: "pending",
                l_cnt: 1, h_cnt: 1, 
                total_del: 0, total_ret: 0, applyTime: serverTimestamp()
            };
            await addDoc(collection(db, 'partners'), data);
            alert("提交成功！請等候管理員審核。"); location.reload();
        };

        function renderDriverUI(p) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card">
                    <p class="text-sky-500 font-bold text-[10px] tracking-widest uppercase mb-1">Unit Operator</p>
                    <h2 class="text-3xl font-black text-white italic mb-8">${p.name}</h2>
                    <img id="job_p" class="w-full h-44 object-cover rounded-2xl mb-6 border border-slate-800" style="display:none">
                    <label class="btn-prime bg-slate-800 text-white mb-6 flex items-center justify-center cursor-pointer">
                        📸 拍攝作業憑證 <input type="file" accept="image/*" capture="camera" class="hidden" onchange="window.handleJob(this)">
                    </label>
                    <div class="space-y-4">
                        <input type="number" id="dc" placeholder="配送件數" class="input-box text-center text-2xl font-black text-sky-400">
                        <input type="number" id="rc" placeholder="逆物流量" class="input-box text-center text-2xl font-black text-orange-400">
                        <button onclick="window.sendJob('${p.id}')" class="btn-prime bg-sky-600 shadow-xl shadow-sky-900/20">Sync Data</button>
                    </div>
                </div>`;
        }

        let jobBase64 = null;
        window.handleJob = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                jobBase64 = e.target.result;
                document.getElementById('job_p').src = jobBase64;
                document.getElementById('job_p').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.sendJob = async (id) => {
            if(!jobBase64) return alert("請拍照！");
            const d = parseInt(document.getElementById('dc').value) || 0;
            const r = parseInt(document.getElementById('rc').value) || 0;
            await addDoc(collection(db, 'logs'), { driverId: id, d: d, r: r, photo: jobBase64, time: serverTimestamp() });
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("回報完成！"); location.reload();
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const pending = partners.filter(x => x.status === "pending");
            const approved = partners.filter(x => x.status === "approved");

            let html = `<h2 class="text-white font-black italic mb-8 tracking-tighter text-2xl">CONTROL PANEL</h2>`;
            
            // 審核卡片
            html += pending.map(p => `
                <div class="id-card !bg-slate-900 border-orange-500/20">
                    <div class="flex justify-between items-start mb-4">
                        <p class="text-white font-bold text-lg">${p.name}</p>
                        <span class="text-[9px] bg-orange-950 text-orange-400 px-2 py-1 rounded">待核准</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <label class="text-[10px] text-slate-500">勞保: <select id="l_${p.id}" class="bg-slate-800 text-white rounded px-1"><option value="1">1人</option><option value="2">2人</option></select></label>
                        <label class="text-[10px] text-slate-500">健保: <select id="h_${p.id}" class="bg-slate-800 text-white rounded px-1"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></label>
                    </div>
                    <div class="flex gap-1 mb-6">
                        <img src="${p.docs.id_f}" class="h-10 w-full object-cover rounded" onclick="window.open(this.src)">
                        <img src="${p.docs.lic}" class="h-10 w-full object-cover rounded" onclick="window.open(this.src)">
                    </div>
                    <button onclick="window.finalApprove('${p.id}')" class="btn-prime h-10 py-0 text-xs bg-green-600 text-white">核准並記錄保險</button>
                </div>
            `).join('');

            // 薪資結算
            html += `<h3 class="text-slate-600 font-bold text-[10px] my-8 tracking-widest uppercase">Fleet Payroll Matrix</h3>`;
            html += approved.map(p => {
                const pay = (p.total_del * rates.del) + (p.total_ret * rates.ret) - rates.labor - (p.h_cnt * rates.health);
                return `
                <div class="id-card !bg-slate-900/40 border-slate-800">
                    <div class="flex justify-between items-center">
                        <p class="text-white font-bold">${p.name}</p>
                        <p class="text-sky-400 font-black text-2xl tracking-tighter">$${pay.toLocaleString()}</p>
                    </div>
                    <div class="text-[9px] text-slate-600 mt-2 flex gap-3">
                        <span>📦 ${p.total_del}</span> <span>🔄 ${p.total_ret}</span> <span class="text-slate-500 italic">L${p.l_cnt} H${p.h_cnt}</span>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('render-target').innerHTML = html;
        }

        window.finalApprove = async (id) => {
            const l = parseInt(document.getElementById('l_'+id).value);
            const h = parseInt(document.getElementById('h_'+id).value);
            await updateDoc(doc(db, 'partners', id), { status: "approved", l_cnt: l, h_cnt: h });
            alert("帳號已啟用！"); renderAdmin();
        };
    </script>
</body>
</html>
