<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 數位管理中控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #fff; outline: none; margin-bottom: 12px; transition: 0.3s; }
        .input-box:focus { border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; }
        .btn-outline { width: 100%; padding: 15px; border-radius: 1rem; border: 2px solid #334155; color: #94a3b8; font-weight: 700; margin-top: 10px; }
        .label-sky { font-size: 12px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 12px; height: 90px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .score-badge { padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 950; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-12 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">數位營運管理中控系統</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center">
                <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center">
                <button onclick="boot()" class="btn-prime">登入系統</button>
            </div>

            <div class="pt-8 space-y-3">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-2">── 夥伴招募與入職 ──</p>
                <button onclick="showLayer('interview-page')" class="btn-outline !border-sky-500/50 !text-sky-400">一、線上適性測驗與評估</button>
                <button onclick="showLayer('apply-page')" class="btn-outline">二、正式入職資料補件</button>
            </div>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 border-b-4 border-sky-500 pb-2 italic">線上適性評估</h2>
                <p class="text-[11px] text-slate-400 mb-6 leading-relaxed">請完成基本資訊與下方的「營運模擬題」，系統將根據您的應變邏輯進行初步篩選，通過者將由專人聯繫。</p>
                
                <span class="label-sky">基本聯絡資料</span>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 my-6 shadow-inner">
                    <span class="label-sky !text-orange-400">營運模擬情境題：</span>
                    <p id="int_q_text" class="text-white text-sm font-bold leading-relaxed mb-4">
                       「若您在配送中途車輛發生爆胎，且車內還有 15 件包裹需在 30 分鐘內送達，請問您第一時間的處理步驟為何？」
                    </p>
                    <textarea id="int_answer" class="input-box h-36 !text-left text-sm mb-0 shadow-inner" placeholder="請詳細說明您的應變方式..."></textarea>
                </div>
                
                <button onclick="submitInterview()" class="btn-prime">送出評估資料</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-8 border-b-4 border-orange-500 pb-2 italic">入職資料補件</h2>
                
                <span class="label-sky">第一步：證件與行照拍照</span>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-[10px]">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-[10px]">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-[10px]">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-[10px]">行照影本</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <span class="label-sky">第二步：核心人資檔案</span>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="戶籍地址" class="input-box">
                <input type="password" id="app_pin" placeholder="設定 4 位登入 PIN 碼" maxlength="4" class="input-box">
                
                <span class="label-sky">第三步：車輛與車種</span>
                <select id="app_vehicle" class="input-box bg-slate-900 text-white font-bold">
                    <option value="機車">自有機車</option>
                    <option value="自有貨車">自有貨車</option>
                    <option value="公司車">公司車 (公司配發)</option>
                </select>
                <input type="text" id="app_plate" placeholder="車牌號碼" class="input-box">

                <span class="label-sky">第四步：匯款帳戶資訊</span>
                <div class="flex gap-2">
                    <input type="text" id="app_bank_code" placeholder="銀行代碼" class="input-box w-1/3">
                    <input type="text" id="app_bank_acc" placeholder="匯款帳號" class="input-box w-2/3">
                </div>

                <button onclick="submitApply()" class="btn-prime bg-orange-600">提交入職審核</button>
            </div>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-10 mb-20 text-slate-700 text-xs underline uppercase tracking-widest font-black">安全登出系統</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], currentImgField = '';
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        // 自動化面試分析 (邏輯模擬)
        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value;
            const phone = document.getElementById('int_phone').value;
            const ans = document.getElementById('int_answer').value;

            if(!name || !ans || ans.length < 10) return alert("請完整填寫適性評估題目。");

            // AI 自動邏輯評分引擎
            let score = 50; 
            let keywords = [];
            if(ans.includes("回報") || ans.includes("聯繫公司")) { score += 20; keywords.push("回報意識高"); }
            if(ans.includes("拍照") || ans.includes("證據")) { score += 10; keywords.push("細心"); }
            if(ans.includes("救援") || ans.includes("代送") || ans.includes("支援")) { score += 20; keywords.push("積極解決問題"); }
            
            const data = {
                name: name,
                phone: phone,
                ai_response: ans,
                ai_score: score,
                ai_tags: keywords.join(", "),
                status: "interviewing",
                time: serverTimestamp()
            };
            await addDoc(collection(db, 'partners'), data);
            alert("您的評估資料已成功送出！請靜候系統通知。"); location.reload();
        };

        // 正式入職提交
        window.submitApply = async () => {
            const data = {
                name: document.getElementById('app_name').value,
                id_num: document.getElementById('app_idnum').value,
                h_addr: document.getElementById('app_h_addr').value,
                v_type: document.getElementById('app_vehicle').value,
                plate: document.getElementById('app_plate').value,
                bank_code: document.getElementById('app_bank_code').value,
                bank_acc: document.getElementById('app_bank_acc').value,
                uid: document.getElementById('app_pin').value,
                docs: photosCache,
                status: "pending",
                total_del: 0,
                time: serverTimestamp()
            };
            if(!data.name || !data.uid) return alert("請完整填寫入職資料");
            await addDoc(collection(db, 'partners'), data);
            alert("入職資料已送出，管理員將於核對後為您開通帳號！"); location.reload();
        };

        // 管理員後台 (自動面試官審核)
        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const ints = partners.filter(x => x.status === "interviewing");
            const pends = partners.filter(x => x.status === "pending");
            
            let html = `<div class="w-full max-w-[500px]"><h2 class="text-white font-black text-4xl mb-10 italic border-l-8 border-sky-500 pl-6 uppercase">招募總控</h2>`;

            html += `<p class="label-sky">待審核測驗結果 (${ints.length})</p>`;
            ints.forEach(p => {
                const color = p.ai_score >= 80 ? 'bg-green-600' : (p.ai_score >= 60 ? 'bg-orange-600' : 'bg-red-600');
                html += `<div class="id-card !p-6 mb-4">
                    <div class="flex justify-between items-start mb-4">
                        <p class="text-white font-black text-xl">${p.name}</p>
                        <span class="${color} score-badge text-white">邏輯分: ${p.ai_score}</span>
                    </div>
                    <p class="text-[10px] text-sky-400 font-bold mb-2">AI 分析標籤：${p.ai_tags || '無'}</p>
                    <p class="text-xs text-slate-400 italic bg-black/40 p-4 rounded-xl border border-slate-800">"${p.ai_response}"</p>
                    <button onclick="approveP('${p.id}')" class="btn-prime !py-3 !text-sm mt-4">通過測驗</button>
                </div>`;
            });

            html += `<p class="label-sky mt-8">入職文件審核 (${pends.length})</p>`;
            pends.forEach(p => {
                html += `<div class="id-card !p-6 mb-2 flex justify-between items-center">
                    <p class="text-white font-bold">${p.name}</p>
                    <button onclick="approveP('${p.id}')" class="bg-orange-600 text-white px-4 py-2 rounded-xl text-xs font-black">正式開通帳號</button>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // 基本組件
        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderHub(p);
            if(ph && pi) alert("登入失敗：審核中或資料錯誤");
        };
        window.showLayer = id => document.getElementById(id).style.display = 'flex';
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l => l.style.display='none'); };
        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                photosCache[currentImgField] = e.target.result;
                const p = document.getElementById('p_' + currentImgField);
                p.src = e.target.result; p.style.display = 'block';
                document.getElementById('t_' + currentImgField).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };
        window.approveP = async id => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("操作成功！"); };
        
        function renderHub(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `<div class="id-card text-center">
                <h2 class="text-6xl font-black text-white italic underline mb-4">${p.name}</h2>
                <p class="text-slate-500 text-xs mb-12 uppercase tracking-widest font-black">配送回報中心</p>
                <label class="label-sky">回報今日配送件數</label><input type="number" id="v_del" class="input-box text-center text-7xl h-36 font-black text-sky-400" placeholder="0">
                <button onclick="commitJob('${p.id}')" class="btn-prime mt-10 shadow-2xl">同步雲端數據</button>
            </div>`;
        }
    </script>
</body>
</html>
