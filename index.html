<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流有限公司 - 經營管理中控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 580px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 3rem; padding: 40px; border: 1px solid #1e293b; margin-bottom: 35px; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1); position: relative; }
        .input-box { background: rgba(15, 23, 42, 0.98); border: 2px solid #334155; border-radius: 1.3rem; padding: 20px; width: 100%; color: #fff; outline: none; margin-bottom: 20px; font-size: 16px; transition: 0.3s; }
        .input-box:focus { border-color: #0ea5e9; box-shadow: 0 0 20px rgba(14, 165, 233, 0.3); }
        .btn-prime { width: 100%; padding: 22px; border-radius: 1.5rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 15px 30px -5px rgba(14, 165, 233, 0.5); }
        .label-sky { font-size: 14px; color: #38bdf8; font-weight: 900; margin-bottom: 12px; display: block; letter-spacing: 2px; text-transform: uppercase; margin-top: 25px; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 20px; height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
        .info-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-4">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.5em] mb-20 uppercase">物流夥伴管理系統 PRO</p>
        <div class="w-full max-w-[380px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center">
            <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center">
            <button onclick="boot()" class="btn-prime">進入系統</button>
            <button onclick="showApply()" class="text-sm text-slate-600 underline mt-16 block mx-auto font-black">新夥伴入職申請</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card">
            <h2 class="text-4xl font-black text-white mb-10 text-center italic border-b-4 border-sky-500 pb-4">夥伴入職資料填寫</h2>
            
            <span class="label-sky">第一階段：證件影像上傳</span>
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-xs">身分證正面</span><img id="p_id_f"></div>
                <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-xs">身分證反面</span><img id="p_id_b"></div>
                <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-xs">駕照影本</span><img id="p_lic"></div>
                <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-xs">行照影本</span><img id="p_car"></div>
                <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
            </div>

            <span class="label-sky">第二階段：員工基本資料</span>
            <input type="text" id="app_name" placeholder="真實姓名 (必填)" class="input-box">
            <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
            <input type="tel" id="app_phone" placeholder="行動電話 (登入帳號)" class="input-box">
            <input type="password" id="app_pin" placeholder="自訂 4 位數 PIN 碼" maxlength="4" class="input-box">
            
            <span class="label-sky">第三階段：居住與通訊地址</span>
            <input type="text" id="app_h_addr" placeholder="戶籍地址 (請完整填寫)" class="input-box">
            <input type="text" id="app_c_addr" placeholder="通訊地址 (現居地址)" class="input-box">
            
            <span class="label-sky">第四階段：緊急聯絡人資訊</span>
            <div class="info-grid">
                <input type="text" id="app_em_name" placeholder="聯絡人姓名" class="input-box">
                <input type="text" id="app_em_rel" placeholder="關係 (如: 父子)" class="input-box">
            </div>
            <input type="tel" id="app_em_tel" placeholder="聯絡人行動電話" class="input-box">
            
            <span class="label-sky">第五階段：營運車輛與銀行</span>
            <select id="app_vehicle" class="input-box bg-slate-900">
                <option value="機車">自有機車</option>
                <option value="自有貨車">自有貨車</option>
                <option value="公司車">公司配發車</option>
            </select>
            <input type="text" id="app_plate" placeholder="車牌號碼" class="input-box">
            <div class="info-grid">
                <input type="text" id="app_bank_code" placeholder="銀行代碼" class="input-box">
                <input type="text" id="app_bank_acc" placeholder="匯款帳號" class="input-box">
            </div>

            <button onclick="submitApply()" class="btn-prime mt-10">確認提交入職資料</button>
            <button onclick="location.reload()" class="w-full mt-6 text-xs text-slate-500 font-black underline text-center block">取消返回</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-20 mb-20 text-slate-700 font-black text-xs underline uppercase">登出系統</button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-10" id="detail-content"></div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-6 max-w-[560px] mx-auto block">關閉視窗</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], currentImgField = '';
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        onSnapshot(collection(db, 'partners'), s => { 
            partners = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            if(document.getElementById('main').style.display === 'flex') boot(); 
        });

        async function compressImg(base64) {
            return new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 800; let w = img.width, h = img.height;
                    if(w > MAX || h > MAX) {
                        if(w > h) { h *= MAX/w; w = MAX; } else { w *= MAX/h; h = MAX; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        }

        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = async input => {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const compressed = await compressImg(e.target.result);
                photosCache[currentImgField] = compressed;
                const p = document.getElementById('p_' + currentImgField);
                p.src = compressed; p.style.display = 'block';
                document.getElementById('t_' + currentImgField).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderHub(p);
            if(ph && pi) alert("登入失敗，請確認帳密或等待審核。");
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const apped = partners.filter(x => x.status === "approved"), pend = partners.filter(x => x.status === "pending");
            let html = `<div class="w-full max-w-[550px] px-2"><h2 class="text-white font-black text-5xl mb-10 italic border-l-8 border-sky-500 pl-6 uppercase">管理中心</h2>`;

            if(pend.length > 0) {
                html += `<p class="label-sky !text-orange-500">待核准入職單 (${pend.length})</p>`;
                pend.forEach(p => {
                    html += `<div class="id-card !p-8 !bg-slate-900 border-orange-900 flex justify-between items-center mb-6">
                        <p class="text-white font-black text-xl">${p.name}</p>
                        <button onclick="approvePartner('${p.id}')" class="bg-sky-600 text-white px-8 py-3 rounded-xl font-black">核准開通</button>
                    </div>`;
                });
            }

            html += `<p class="label-sky">現役夥伴檔案</p>`;
            apped.forEach(p => {
                html += `<div class="id-card !p-8 !bg-slate-900/50 mb-10 border-slate-800">
                    <div class="flex justify-between items-start mb-6">
                        <div onclick="viewDoc('${p.id}')" class="cursor-pointer group"><p class="text-white font-black text-3xl group-hover:text-sky-400 transition-colors">${p.name}</p><p class="text-xs text-sky-500 underline font-black">點擊開啟詳細人資檔案</p></div>
                        <div class="text-right text-slate-500 text-xs font-bold">${p.v_type}<br>${p.plate}</div>
                    </div>
                    <button onclick="delP('${p.id}')" class="text-red-900 font-black text-xs underline">永久移除員工</button>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        window.submitApply = async () => {
            const data = {
                name: document.getElementById('app_name').value, 
                phone: document.getElementById('app_phone').value, 
                uid: document.getElementById('app_pin').value,
                id_num: document.getElementById('app_idnum').value,
                h_addr: document.getElementById('app_h_addr').value,
                c_addr: document.getElementById('app_c_addr').value,
                em_name: document.getElementById('app_em_name').value,
                em_rel: document.getElementById('app_em_rel').value,
                em_tel: document.getElementById('app_em_tel').value,
                v_type: document.getElementById('app_vehicle').value, 
                plate: document.getElementById('app_plate').value,
                bank_code: document.getElementById('app_bank_code').value, 
                bank_acc: document.getElementById('app_bank_acc').value,
                docs: photosCache, status: "pending", total_del: 0, time: serverTimestamp()
            };
            if(!data.name || !data.phone) return alert("姓名與手機為必填");
            await addDoc(collection(db, 'partners'), data);
            alert("入職資料提交成功，請連繫管理員。"); location.reload();
        };

        window.viewDoc = id => {
            const p = partners.find(x => x.id === id); 
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `
                <h3 class="text-white font-black mb-6 border-b-2 border-slate-800 pb-4 text-xl">員工詳細人資檔案</h3>
                <div class="text-[13px] space-y-4 mb-8 text-slate-400 leading-relaxed">
                    <p>姓名：<span class="text-white font-bold">${p.name}</span> | 身分證：<span class="text-white">${p.id_num}</span></p>
                    <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                        <p>戶籍：<span class="text-white">${p.h_addr || '未填'}</span></p>
                        <p>通訊：<span class="text-white">${p.c_addr || '未填'}</span></p>
                    </div>
                    <div class="bg-orange-900/20 p-4 rounded-2xl border border-orange-900/30">
                        <p class="text-orange-500 font-black mb-1">緊急聯絡人資訊</p>
                        <p>姓名：<span class="text-white">${p.em_name}</span> (${p.em_rel})</p>
                        <p>電話：<span class="text-white font-bold">${p.em_tel}</span></p>
                    </div>
                    <p>車型：<span class="text-white">${p.v_type}</span> | 車牌：<span class="text-white">${p.plate}</span></p>
                    <p class="text-sky-500 font-bold">匯款銀行：(${p.bank_code}) ${p.bank_acc}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <img src="${p.docs?.id_f}" class="rounded-2xl border border-slate-700"><img src="${p.docs?.id_b}" class="rounded-2xl border border-slate-700">
                    <img src="${p.docs?.lic}" class="rounded-2xl border border-slate-700"><img src="${p.docs?.car}" class="rounded-2xl border border-slate-700">
                </div>`;
        };

        window.approvePartner = async id => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("已通過審核。"); };
        window.delP = async id => { if(confirm("確定刪除？")) await deleteDoc(doc(db, 'partners', id)); };
        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
        
        function renderHub(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `<div class="id-card">
                <h2 class="text-6xl font-black text-white italic underline mb-4">${p.name}</h2>
                <p class="text-slate-500 text-xs mb-12 uppercase tracking-widest">配送件數回報中心</p>
                <label class="label-sky">回報今日配送件數</label><input type="number" id="v_del" class="input-box text-center text-7xl h-36 font-black text-sky-400" placeholder="0">
                <button onclick="commitJob('${p.id}')" class="btn-prime mt-10">確認同步數據</button>
            </div>`;
        }
        window.commitJob = async id => {
            const d = parseInt(document.getElementById('v_del').value)||0;
            if(d <= 0) return alert("請輸入正確件數");
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d) });
            await addDoc(collection(db, 'logs'), { driverId: id, del: d, time: serverTimestamp() });
            alert("同步成功。"); location.reload();
        };
    </script>
</body>
</html>
