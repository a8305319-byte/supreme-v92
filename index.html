<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 職業夥伴中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #334155; margin-bottom: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #ffffff; outline: none; margin-bottom: 12px; font-size: 16px; }
        .input-box::placeholder { color: #64748b; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; border-left: 4px solid #0ea5e9; padding-left: 8px; margin-top: 15px; text-align: left; }
        .q-box { background: rgba(255,255,255,0.03); border: 1px solid #1e293b; padding: 15px; border-radius: 1.5rem; margin-bottom: 10px; text-align: left; }
        .opt-label { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 12px; font-size: 14px; color: #e2e8f0; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 15px; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-slot span { color: #38bdf8; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-12 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">夥伴共榮管理系統</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <button onclick="showLayer('interview-page')" class="btn-prime">一、AI 職能實務評估</button>
            <button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border-2 border-slate-700 text-slate-500 font-black">二、正式入職資料補件</button>
            <button onclick="alert('請先聯繫管理員開通帳號')" class="mt-8 text-slate-500 text-xs underline">已有帳號？登入工作台</button>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 italic border-b-4 border-sky-500 pb-2">AI 職能評估</h2>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <span class="label-sky">情境測驗 (共4題)</span>
                <div class="q-box">
                    <p class="text-white text-sm mb-2 font-bold">1. 配送途中遇輕微擦撞，你會？</p>
                    <label class="opt-label"><input type="radio" name="q1" value="1"> 報警、拍照並即時回報公司</label>
                    <label class="opt-label"><input type="radio" name="q1" value="0"> 趕快送完，事後再自行處理</label>
                </div>
                <div class="q-box">
                    <p class="text-white text-sm mb-2 font-bold">2. 遇大雨且貨多怕濕，你會？</p>
                    <label class="opt-label"><input type="radio" name="q2" value="1"> 確實蓋好雨布繼續配送</label>
                    <label class="opt-label"><input type="radio" name="q2" value="0"> 找地方躲雨，等雨停再送</label>
                </div>
                <div class="q-box">
                    <p class="text-white text-sm mb-2 font-bold">3. 結帳多出代收款但不確定來源？</p>
                    <label class="opt-label"><input type="radio" name="q3" value="1"> 主動回報公司並上繳</label>
                    <label class="opt-label"><input type="radio" name="q3" value="0"> 先收著，沒人發現就當小費</label>
                </div>
                <div class="q-box">
                    <p class="text-white text-sm mb-2 font-bold">4. 還有急件但車輛突然故障？</p>
                    <label class="opt-label"><input type="radio" name="q4" value="1"> 第一時間回報尋求支援</label>
                    <label class="opt-label"><input type="radio" name="q4" value="0"> 攔計程車去送，晚點再修車</label>
                </div>

                <button onclick="submitInterview()" id="sub_btn" class="btn-prime mt-6">送出 AI 評估</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 border-b-4 border-orange-500 pb-2 italic text-left">正式入職資料</h2>
                
                <span class="label-sky">證件與車輛影像</span>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">駕駛執照</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">車輛行照</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <span class="label-sky">個人核心資訊</span>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="tel" id="app_phone" placeholder="行動電話" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="戶籍地址" class="input-box">
                
                <span class="label-sky">營運與薪資資訊</span>
                <select id="app_vehicle" class="input-box bg-slate-900 text-white font-bold" onchange="togglePlate(this.value)">
                    <option value="機車">個人機車</option>
                    <option value="貨車">個人貨車</option>
                    <option value="公司車">公司配車 (免填車號)</option>
                </select>
                <div id="plate_box">
                    <input type="text" id="app_plate" placeholder="營運車牌號碼" class="input-box">
                </div>

                <div class="flex gap-2">
                    <input type="text" id="app_bank_code" placeholder="銀行代碼" class="input-box w-1/3">
                    <input type="text" id="app_bank_acc" placeholder="匯款帳號" class="input-box w-2/3">
                </div>
                <input type="password" id="app_pin" placeholder="自訂 4 位數 PIN 碼" maxlength="4" class="input-box">

                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-orange-600 mt-6">確認提交資料</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 🔥 Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentImgField = '';
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        // 邏輯：公司車免填車牌
        window.togglePlate = (val) => {
            document.getElementById('plate_box').style.display = (val === '公司車') ? 'none' : 'block';
        };

        // 提交 AI 面試
        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value;
            const phone = document.getElementById('int_phone').value;
            const q = [
                document.querySelector('input[name="q1"]:checked')?.value,
                document.querySelector('input[name="q2"]:checked')?.value,
                document.querySelector('input[name="q3"]:checked')?.value,
                document.querySelector('input[name="q4"]:checked')?.value
            ];

            if(!name || !phone || q.includes(undefined)) return alert("請完成所有情境測驗題目！");

            const score = q.reduce((a, b) => a + parseInt(b), 0) * 25;
            try {
                await addDoc(collection(db, 'partners'), { name, phone, ai_score: score, status: "interviewing", time: serverTimestamp() });
                alert("AI 評估完成！請繼續完成第二步資料補件。");
                showLayer('apply-page');
            } catch(e) { alert("傳送失敗"); }
        };

        // 提交正式入職
        window.submitApply = async () => {
            const name = document.getElementById('app_name').value;
            const pin = document.getElementById('app_pin').value;
            if(!name || !pin) return alert("請完整填寫姓名與 PIN 碼！");

            try {
                await addDoc(collection(db, 'partners'), {
                    name, phone: document.getElementById('app_phone').value,
                    v_type: document.getElementById('app_vehicle').value,
                    plate: document.getElementById('app_vehicle').value === '公司車' ? "公司配車" : document.getElementById('app_plate').value,
                    bank: document.getElementById('app_bank_acc').value,
                    uid: pin, docs: photosCache, status: "pending", time: serverTimestamp()
                });
                alert("入職建檔成功！"); location.reload();
            } catch(e) { alert("上傳失敗"); }
        };

        window.showLayer = id => { hideAll(); document.getElementById(id).style.display = 'flex'; };
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l => l.style.display='none'); };
        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                photosCache[currentImgField] = e.target.result;
                const p = document.getElementById('p_' + currentImgField);
                p.src = e.target.result; p.style.display = 'block';
                document.getElementById('t_' + currentImgField).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };
    </script>
</body>
</html>
