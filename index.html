<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 行政總控系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1rem; padding: 12px; width: 100%; color: #ffffff; outline: none; margin-bottom: 10px; font-size: 14px; text-align: center; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.5rem; background: #0ea5e9; color: #ffffff; font-weight: 800; font-size: 18px; cursor: pointer; border: none; }
        
        /* 1:1 截圖還原樣式 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .photo-slot { background: transparent; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-slot span { color: #64748b; font-size: 12px; }
        .divider-orange { width: 100%; height: 4px; background: #f97316; margin-bottom: 25px; border-radius: 99px; }
        
        /* 後台表格優化 */
        .admin-table td { font-size: 10px; padding: 10px 4px; border-bottom: 1px solid #1e293b; }
        .input-mini { background: #020617; border: 1px solid #334155; border-radius: 4px; color: #38bdf8; text-align: center; font-weight: bold; width: 45px; }
        .btn-del { color: #ef4444; border: 1px solid #450a0a; padding: 2px 4px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 italic tracking-tighter">在地物流</h1>
        <div class="w-full max-w-[340px] mt-10">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box">
                <input type="password" id="login_pin" placeholder="PIN 碼" class="input-box">
                <div class="flex items-center justify-center gap-2 mb-6 text-sm text-slate-500">
                    <input type="checkbox" id="remember_me"> <label for="remember_me">記住我的帳號</label>
                </div>
                <button onclick="boot()" class="btn-prime w-full shadow-lg">進入系統</button>
            </div>
            <div class="pt-8 flex flex-col gap-3">
                <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border border-sky-500 text-sky-400 font-bold">一、營運職能測驗</button>
                <div id="apply-lock-box">
                    <button disabled class="w-full py-4 rounded-2xl border border-slate-800 text-slate-700 font-bold">二、人事建檔 🔒</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin" class="layer">
        <div class="w-full max-w-[980px]">
            <h2 class="text-white font-black text-3xl mb-8 border-l-8 border-sky-500 pl-4 uppercase italic">行政總控與薪資報表</h2>
            <div class="bg-slate-900 p-4 rounded-3xl overflow-x-auto border border-slate-800 shadow-2xl">
                <table class="w-full text-left admin-table">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr>
                            <th>狀態</th><th>姓名</th><th>正/逆件數</th><th>單價設定</th><th>投保額/眷屬</th><th>保費扣繳</th><th>應付淨額</th><th>管理</th>
                        </tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="mt-10 text-slate-500 underline text-xs">退出系統</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-2 italic">入職與勞資建檔</h2>
                <div class="divider-orange"></div>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">車輛行照</span><img id="p_car"></div>
                </div>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">
                <div class="flex gap-2">
                    <input type="text" id="app_bc" placeholder="代碼" class="input-box w-1/3">
                    <input type="text" id="app_ba" placeholder="銀行帳號" class="input-box w-2/3">
                </div>
                <input type="password" id="app_pin" placeholder="設定 4 位登入 PIN 碼" maxlength="4" class="input-box">
                <button onclick="submitApply()" class="btn-prime bg-sky-600 mt-4 shadow-xl">提交完整資料</button>
            </div>
        </div>
    </div>

    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, deleteDoc, increment, serverTimestamp, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let partners = [], photosCache = {};

        // 監聽數據
        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); if(document.getElementById('admin').style.display==='flex') renderAdmin(); });

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(document.getElementById('remember_me').checked) localStorage.setItem('delivery_ph', ph);
            else localStorage.removeItem('delivery_ph');

            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            // 夥伴登入邏輯...
        };

        // 行政後台渲染：自動化勞健保運算
        window.renderAdmin = () => {
            document.getElementById('gate').style.display='none'; document.getElementById('admin').style.display='flex';
            let html = '';
            partners.forEach(p => {
                // 1. 單價自動記憶邏輯 (若無則預設 15/10)
                const dp = p.custom_del || 15; const rp = p.custom_rev || 10;
                const income = ((p.total_del || 0) * dp) + ((p.total_rev || 0) * rp);
                
                // 2. 勞健保自動化運算 (2026 最新費率模擬)
                const ins_base = p.ins_base || 0; // 投保薪資額
                const fm_count = p.ins_fm || 0;  // 眷屬人數
                
                // 勞保 (約 2.5%) + 健保 (約 1.5% * (1 + 眷屬數))
                const labor_fee = Math.round(ins_base * 0.025);
                const health_fee = Math.round(ins_base * 0.015 * (1 + parseInt(fm_count)));
                const total_ins = (ins_base > 0) ? (labor_fee + health_fee) : 0;

                html += `
                <tr class="border-b border-slate-800">
                    <td>${p.status==='approved'?'✅':'⏳'}</td>
                    <td class="font-bold text-white">${p.name}</td>
                    <td>${p.total_del||0} / ${p.total_rev||0}</td>
                    <td>
                        <input type="number" value="${dp}" onchange="upData('${p.id}','custom_del',this.value)" class="input-mini"> / 
                        <input type="number" value="${rp}" onchange="upData('${p.id}','custom_rev',this.value)" class="input-mini text-orange-400">
                    </td>
                    <td>
                        <input type="number" placeholder="投保額" value="${ins_base}" onchange="upData('${p.id}','ins_base',this.value)" class="input-mini !w-16"> / 
                        <input type="number" placeholder="眷屬" value="${fm_count}" onchange="upData('${p.id}','ins_fm',this.value)" class="input-mini">
                    </td>
                    <td class="text-red-400">-$${total_ins}</td>
                    <td class="text-sky-400 font-black">$${income - total_ins}</td>
                    <td><span class="btn-del" onclick="delPartner('${p.id}','${p.name}')">🗑️</span></td>
                </tr>`;
            });
            document.getElementById('admin-render').innerHTML = html;
        };

        // 更新數據並記憶至雲端
        window.upData = async (id, field, val) => {
            await updateDoc(doc(db, 'partners', id), { [field]: parseFloat(val) });
            // 更新後不需重新整理，onSnapshot 會自動重繪
        };

        window.delPartner = async (id, name) => { if(confirm(`確定移除 ${name}？`)) await deleteDoc(doc(db, 'partners', id)); };
        window.showLayer = id => { document.querySelectorAll('.layer').forEach(l=>l.style.display='none'); document.getElementById(id).style.display='flex'; };
        window.onload = () => { if(localStorage.getItem('delivery_ph')) document.getElementById('login_phone').value = localStorage.getItem('delivery_ph'); };
        window.triggerCam = f => { window.currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = i => { const r = new FileReader(); r.onload = e => { photosCache[window.currentImgField] = e.target.result; const p = document.getElementById('p_'+window.currentImgField); p.src = e.target.result; p.style.display='block'; document.getElementById('t_'+window.currentImgField).style.display='none'; }; r.readAsDataURL(i.files[0]); };
    </script>
</body>
</html>
