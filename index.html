<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - AI 智慧招募系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2.5rem; padding: 35px; border: 1px solid #1e293b; margin-bottom: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 18px; width: 100%; color: #fff; outline: none; margin-bottom: 15px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 20px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 15px; }
        .ai-chat-box { background: #020617; border: 1px solid #0ea5e9; border-radius: 1.5rem; padding: 20px; margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 15px; height: 100px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-4">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.5em] mb-16 uppercase italic">AI 邏輯評測與營運中控系統</p>
        <div class="w-full max-w-[320px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center">
            <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center">
            <button onclick="boot()" class="btn-prime">進入系統</button>
            <button onclick="showApply()" class="text-sm text-slate-600 underline mt-16 block font-black uppercase">新夥伴 AI 面試申請</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-6 cursor-pointer text-slate-500 font-bold" onclick="location.reload()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-8 text-center italic border-b-4 border-sky-500 pb-2">AI 入職邏輯面試</h2>
                
                <div class="ai-chat-box">
                    <p class="text-sky-400 font-bold text-sm mb-2">AI 面試官問：</p>
                    <p id="ai-question" class="text-white text-md italic mb-4">「如果您今天有 50 件包裹要送，但機車突然爆胎了，您會如何處理？請簡述您的應變步驟。」</p>
                    <textarea id="ai-answer" class="input-box h-32 !text-left text-sm" placeholder="請在此輸入您的回答..."></textarea>
                </div>

                <span class="label-sky">第一步：證件拍照上傳</span>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-xs">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-xs">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-xs">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-xs">行照影本</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <span class="label-sky">第二步：個人核心檔案</span>
                <input type="text" id="app_name" placeholder="真實姓名 (必填)" class="input-box">
                <input type="tel" id="app_phone" placeholder="手機號碼 (登入帳號)" class="input-box">
                <input type="password" id="app_pin" placeholder="自訂 4 位 PIN 碼" maxlength="4" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">

                <span class="label-sky">第三步：營運車種與銀行</span>
                <select id="app_vehicle" class="input-box bg-slate-900 font-bold text-white">
                    <option value="機車">自有機車</option>
                    <option value="自有貨車">自有貨車</option>
                    <option value="公司車">公司車</option>
                </select>
                <input type="text" id="app_plate" placeholder="營運車牌號碼" class="input-box">
                <div class="flex gap-2">
                    <input type="text" id="app_bank_code" placeholder="銀行代碼" class="input-box w-1/3">
                    <input type="text" id="app_bank_acc" placeholder="匯款帳號" class="input-box w-2/3">
                </div>

                <button onclick="submitApply()" class="btn-prime mt-6">提交 AI 面試申請</button>
            </div>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-10 mb-20 text-slate-700 text-xs underline font-black uppercase tracking-widest">安全登出系統</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], currentImgField = '';
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.submitApply = async () => {
            const ans = document.getElementById('ai-answer').value;
            if(!ans || ans.length < 10) return alert("AI 面試回答太簡短，請多寫一點應變細節！");
            
            // 簡易模擬 AI 評分邏輯 (可根據關鍵字判定)
            let score = 60;
            if(ans.includes("聯繫公司") || ans.includes("回報")) score += 20;
            if(ans.includes("換車") || ans.includes("救援")) score += 20;

            const data = {
                name: document.getElementById('app_name').value, phone: document.getElementById('app_phone').value, uid: document.getElementById('app_pin').value,
                id_num: document.getElementById('app_idnum').value, h_addr: document.getElementById('app_h_addr').value,
                v_type: document.getElementById('app_vehicle').value, plate: document.getElementById('app_plate').value,
                bank_code: document.getElementById('app_bank_code').value, bank_acc: document.getElementById('app_bank_acc').value,
                ai_response: ans, ai_score: score, status: "pending", total_del: 0, docs: photosCache, time: serverTimestamp()
            };
            await addDoc(collection(db, 'partners'), data);
            alert("AI 面試資料已提交，系統正在評分中，請等候通知！"); location.reload();
        };

        // 核心邏輯 (與前版保持一致，補齊缺失)
        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                photosCache[currentImgField] = e.target.result;
                document.getElementById('p_' + currentImgField).src = e.target.result;
                document.getElementById('p_' + currentImgField).style.display = 'block';
                document.getElementById('t_' + currentImgField).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };
        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderHub(p);
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const pend = partners.filter(x => x.status === "pending");
            let html = `<div class="w-full max-w-[500px]"><h2 class="text-white font-black text-3xl mb-8 border-l-4 border-sky-500 pl-4 uppercase text-left">招募審核牆</h2>`;
            pend.forEach(p => {
                html += `<div class="id-card !p-6 mb-4 !text-left">
                    <div class="flex justify-between items-start mb-4">
                        <p class="text-white font-black text-2xl">${p.name}</p>
                        <span class="bg-sky-900 text-sky-400 px-3 py-1 rounded-full text-xs font-black">AI 評分: ${p.ai_score}分</span>
                    </div>
                    <p class="text-xs text-slate-500 mb-2">應變回答：</p>
                    <p class="text-sm text-slate-300 italic bg-slate-900/50 p-4 rounded-xl mb-4 border border-slate-800">"${p.ai_response}"</p>
                    <button onclick="approveP('${p.id}')" class="btn-prime !py-3">准許入職</button>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }
        window.approveP = async id => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("已核准開通。"); };
        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
    </script>
</body>
</html>
