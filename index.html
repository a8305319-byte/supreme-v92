<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#020617">
  <title>在地物流營運總部 v45.0 - 企業旗艦版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass-panel { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(245, 158, 11, 0.25); }
    .gold-border { border: 1px solid #f59e0b; box-shadow: 0 0 30px rgba(245, 158, 11, 0.15); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 1rem; font-weight: bold; outline: none; transition: border 0.3s; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: black; font-weight: 900; padding: 1.2rem; border-radius: 1.2rem; width: 100%; transition: all 0.3s; box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3); cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 1px; }
    .btn-prime:active { transform: scale(0.98); opacity: 0.9; }
    .admin-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    .admin-table th { padding: 16px 12px; background: rgba(0,0,0,0.5); color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .admin-table td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .receipt-paper { background: #fff; color: #111; padding: 25px; border-radius: 4px; font-family: 'Courier New', Courier, monospace; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .receipt-paper::before { content: ''; position: absolute; top: -10px; left: 0; right: 0; height: 10px; background: linear-gradient(-45deg, transparent 5px, #fff 5px), linear-gradient(45deg, transparent 5px, #fff 5px); background-size: 10px 10px; }
    .copy-btn { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; transition: 0.2s; }
    .copy-btn:hover { background: #f59e0b; color: black; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 🎯 環境變量與安全配置
    const firebaseConfig = window.__firebase_config || {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();
    const appId = 'supreme-v92';

    const INSURANCE_BRACKETS = [
      { salary: 29500, labor: 738, health: 458 }, { salary: 30300, labor: 758, health: 470 },
      { salary: 31800, labor: 795, health: 493 }, { salary: 33300, labor: 833, health: 516 },
      { salary: 34800, labor: 870, health: 540 }, { salary: 36300, labor: 908, health: 563 },
      { salary: 38200, labor: 955, health: 592 }, { salary: 40100, labor: 1002, health: 622 },
      { salary: 42000, labor: 1050, health: 651 }, { salary: 43900, labor: 1098, health: 681 },
      { salary: 45800, labor: 1145, health: 710 }, { salary: 48200, labor: 1145, health: 748 },
      { salary: 50600, labor: 1145, health: 785 }, { salary: 53000, labor: 1145, health: 822 },
      { salary: 55400, labor: 1145, health: 859 }, { salary: 57800, labor: 1145, health: 896 },
      { salary: 60800, labor: 1145, health: 943 }, { salary: 63800, labor: 1145, health: 990 },
      { salary: 66800, labor: 1145, health: 1036 }, { salary: 69800, labor: 1145, health: 1083 },
      { salary: 72800, labor: 1145, health: 1129 }
    ];

    const compressImage = (file, maxWidth = 1000) => {
      return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image(); img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            const scale = Math.min(maxWidth / img.width, 1);
            canvas.width = img.width * scale; canvas.height = img.height * scale;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6);
          };
        };
      });
    };

    const copyText = (text, callback) => {
      navigator.clipboard.writeText(text).then(() => callback("📋 已複製"));
    };

    function App() {
      const [user, setUser] = useState(null); const [partners, setPartners] = useState([]);
      const [layer, setLayer] = useState('gate'); const [loading, setLoading] = useState(true);
      const [announcement, setAnnouncement] = useState(""); const [toastMsg, setToastMsg] = useState("");

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 2500); };

      useEffect(() => {
        auth.signInAnonymously();
        const unlockTimer = setTimeout(() => setLoading(false), 5000);
        const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners')
          .onSnapshot(snap => { 
            setPartners(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); 
            setLoading(false); clearTimeout(unlockTimer); 
          });
        db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('announcement')
          .onSnapshot(snap => { if (snap.exists) setAnnouncement(snap.data().content); });
        return () => unsub();
      }, []);

      const handleLogin = (phone, pin) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          setLayer('admin'); return;
        }
        const p = partners.find(x => x.phone === phone && x.pin === pin);
        if (p) {
          if (p.status === 'inactive') return alert("帳號停權中");
          if (p.status === 'active') { setUser(p); setLayer('driver'); }
          else alert("帳號審核中或資料未齊全");
        } else alert("帳號或密碼錯誤");
      };

      if (loading) return <div className="min-h-screen flex flex-col items-center justify-center bg-black"><div className="w-10 h-10 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin mb-4"></div><p className="text-amber-500 font-black animate-pulse tracking-widest">在地物流 SECURING...</p></div>;

      return (
        <div className="min-h-screen">
          <div className={`fixed left-1/2 -translate-x-1/2 bg-amber-500 text-black px-6 py-3 rounded-full font-black z-[9999] transition-all duration-500 ${toastMsg ? 'top-10 opacity-100 shadow-2xl' : '-top-20 opacity-0'}`}>{toastMsg}</div>
          {layer === 'gate' && <Gate onLogin={handleLogin} announcement={announcement} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={partners} setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
          {layer === 'driver' && <DriverHub user={user} setLayer={setLayer} db={db} appId={appId} showToast={showToast} storage={storage} />}
          {layer === 'onboarding' && <OnboardingFlow setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
          {layer === 'upload' && <UploadFlow setLayer={setLayer} db={db} appId={appId} showToast={showToast} storage={storage} />}
        </div>
      );
    }

    // --- 1. 入口層 ---
    function Gate({ onLogin, announcement, setLayer }) {
      const [ph, setPh] = useState(""); const [pin, setPin] = useState("");
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-950">
          <div className="mb-12 text-center">
            <h1 className="text-7xl font-black text-white italic tracking-tighter mb-2 drop-shadow-2xl">在地物流</h1>
            <p className="text-amber-500 text-xs tracking-[0.4em] font-black border border-amber-500/30 px-4 py-1.5 rounded-full uppercase inline-block bg-amber-900/10">Operation Hub v45.0</p>
          </div>
          <div className="w-full max-w-[340px] space-y-4">
            <div className="glass-panel p-8 rounded-[2.5rem] gold-border">
              <input type="tel" placeholder="手機號碼" className="input-box" value={ph} onChange={e=>setPh(e.target.value)} maxLength={10} />
              <input type="password" placeholder="PIN 安全碼" className="input-box" value={pin} onChange={e=>setPin(e.target.value)} maxLength={4} />
              <button onClick={() => onLogin(ph, pin)} className="btn-prime italic tracking-widest text-lg">登入系統</button>
            </div>
            {announcement && <div className="bg-amber-900/20 border border-amber-500/20 p-4 rounded-2xl text-center"><p className="text-white text-sm font-bold">{announcement}</p></div>}
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => setLayer('onboarding')} className="py-4 rounded-2xl border border-amber-500/20 text-amber-500 font-black text-xs bg-amber-900/5">📋 線上初試</button>
              <button onClick={() => setLayer('upload')} className="py-4 rounded-2xl border border-orange-500/20 text-orange-400 font-black text-xs bg-orange-900/5">📁 建檔/補填</button>
            </div>
            <button onClick={() => alert("📱 安裝教學：\n\n蘋果 iOS: 分享按鈕 -> 加入主畫面\n安卓 Android: 右上選單 -> 安裝應用程式")} className="w-full text-slate-600 text-[10px] mt-4 uppercase tracking-tighter">APP Download & Install Instructions</button>
          </div>
        </div>
      );
    }

    // --- 2. 指揮中心 ---
    function AdminHub({ partners, setLayer, db, appId, showToast }) {
      const [search, setSearch] = useState(""); const [filter, setFilter] = useState("active");
      const [reviewReport, setReviewReport] = useState(null);
      const [paySlip, setPaySlip] = useState(null);

      const filtered = partners.filter(p => {
        const match = p.name?.includes(search) || p.phone?.includes(search);
        if (filter === 'active') return match && p.status === 'active';
        if (filter === 'interview') return match && p.status === 'interview_reviewing';
        return match;
      });

      const getToday = () => new Date().toLocaleDateString('en-CA');
      const calcNet = (p) => (p.total_del*p.custom_del_price + p.total_pkp*p.custom_pkp_price + (p.custom_adj||0) - p.labor_fee - p.health_fee);

      const updateCount = async (p, field, val) => {
        const today = getToday(); const num = Number(val);
        const batch = db.batch();
        batch.update(db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id), { [field]: num });
        batch.set(db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).collection('history').doc(today), { [field==='total_del'?'del':'pkp']: num, date: today }, { merge: true });
        await batch.commit(); showToast("✅ 件數已修正");
      };

      return (
        <div className="p-4 lg:p-10 max-w-[1800px] mx-auto overflow-x-auto">
          <div className="flex justify-between items-center mb-8">
            <h2 className="text-4xl font-black text-white italic tracking-tighter">指揮中心<span className="text-amber-500">.</span></h2>
            <div className="flex gap-2">
              <button onClick={() => setLayer('gate')} className="bg-slate-800 text-rose-500 px-4 py-2 rounded-xl text-xs font-black border border-rose-950">安全登出</button>
            </div>
          </div>

          <div className="glass-panel p-4 rounded-3xl mb-6 flex gap-4 gold-border">
            <input type="text" placeholder="搜尋姓名或電話..." className="input-box !mb-0 flex-1" value={search} onChange={e=>setSearch(e.target.value)} />
            <select className="bg-slate-800 text-white rounded-xl px-4 font-bold outline-none" value={filter} onChange={e=>setFilter(e.target.value)}>
              <option value="active">現役夥伴</option>
              <option value="interview">初試待核</option>
              <option value="all">全體名單</option>
            </select>
          </div>

          <div className="glass-panel rounded-[2rem] overflow-hidden overflow-x-auto">
            <table className="admin-table">
              <thead>
                <tr>
                  <th>狀態/單據</th><th>夥伴</th><th>今日件數 (強制對帳)</th><th>正/逆單價</th><th>薪資級距</th><th>加扣款</th><th>今日預計</th><th>操作</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => (
                  <tr key={p.id} className="hover:bg-white/5 transition">
                    <td>
                      <div className="flex flex-col items-center">
                        <span className={`text-[10px] font-black ${p.last_report?.date===getToday()?'text-emerald-400':'text-slate-500'}`}>{p.last_report?.date===getToday()?'🟢 已報工':'⚪ 送貨中'}</span>
                        {p.report_img && <button onClick={()=>setReviewReport(p)} className="mt-1 text-[9px] bg-amber-600 text-black px-2 py-0.5 rounded-full font-black">📸 看單</button>}
                      </div>
                    </td>
                    <td className="text-left font-black">
                      <div className="text-lg text-white">{p.name}</div>
                      <div className="text-[10px] text-slate-500">{p.phone?.replace(/(\d{4})\d{3}(\d{3})/, "$1***$2")} <span className="cursor-pointer" onClick={()=>copyText(p.phone, showToast)}>📋</span></div>
                    </td>
                    <td className="bg-amber-900/5 px-4">
                      <div className="flex gap-2 justify-center">
                        <input type="number" defaultValue={p.total_del} onBlur={e=>updateCount(p, 'total_del', e.target.value)} className="ghost-input w-10 text-sky-400 border-b border-sky-900/50" />
                        <input type="number" defaultValue={p.total_pkp} onBlur={e=>updateCount(p, 'total_pkp', e.target.value)} className="ghost-input w-10 text-orange-400 border-b border-orange-900/50" />
                      </div>
                    </td>
                    <td>{p.custom_del_price}/{p.custom_pkp_price}</td>
                    <td>${p.insured_salary||0}</td>
                    <td><input type="number" defaultValue={p.custom_adj||0} onBlur={e=>db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({custom_adj:Number(e.target.value)})} className="ghost-input w-12 text-emerald-400" /></td>
                    <td className="text-amber-500 font-black text-xl italic">${calcNet(p).toLocaleString()}</td>
                    <td>
                      <div className="flex gap-1 justify-center">
                         <button onClick={()=>setPaySlip(p)} className="bg-emerald-600 text-white px-2 py-1 rounded text-[10px] font-black">💰 薪資</button>
                         {p.status==='interview_reviewing' && <button onClick={()=>db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({status:'pending_upload'})} className="bg-sky-600 text-white px-2 py-1 rounded text-[10px] font-black">✅ 核准</button>}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* 薪資條視窗 */}
          {paySlip && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[900] backdrop-blur-md">
              <div className="glass-panel p-8 rounded-[2rem] w-full max-w-sm gold-border relative">
                <button onClick={()=>setPaySlip(null)} className="absolute top-6 right-6 text-slate-500">✕</button>
                <div className="receipt-paper mb-6">
                  <div className="text-center font-black border-b border-black pb-2 mb-4">在地物流 - 營運薪資單</div>
                  <div className="text-xs space-y-1 mb-4">
                    <p>夥伴：{paySlip.name}</p><p>日期：{getToday()}</p>
                    <p>帳號：({paySlip.bank_code}) {paySlip.bank_account}</p>
                  </div>
                  <div className="text-xs space-y-1">
                    <div className="flex justify-between"><span>正件 x {paySlip.total_del}</span><span>${paySlip.total_del*paySlip.custom_del_price}</span></div>
                    <div className="flex justify-between"><span>逆收 x {paySlip.total_pkp}</span><span>${paySlip.total_pkp*paySlip.custom_pkp_price}</span></div>
                    <div className="flex justify-between text-red-600 font-bold"><span>勞健保扣除</span><span>-${paySlip.labor_fee+paySlip.health_fee}</span></div>
                    <div className="border-t border-black my-2"></div>
                    <div className="flex justify-between font-black text-lg"><span>總計</span><span>${calcNet(paySlip).toLocaleString()}</span></div>
                  </div>
                  <div className="mt-10 flex justify-between text-[8px] text-slate-400"><span>簽章：__________</span><span>日期：__________</span></div>
                </div>
                <button onClick={()=>window.print()} className="btn-prime">🖨️ 列印憑證</button>
              </div>
            </div>
          )}

          {reviewReport && (
            <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[900]">
              <div className="glass-panel p-6 rounded-[2rem] w-full max-w-md gold-border">
                <h3 className="font-black text-white mb-4">今日單據審核 - {reviewReport.name}</h3>
                <img src={reviewReport.report_img} className="w-full h-auto rounded-xl mb-6 shadow-2xl" />
                <div className="flex gap-3">
                  <button onClick={()=>setReviewReport(null)} className="flex-1 bg-slate-700 text-white py-3 rounded-xl font-black">返回</button>
                  <button onClick={()=>db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(reviewReport.id).update({report_status:'approved'}).then(()=>setReviewReport(null))} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-black">✅ 通過審核</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 3. 司機端 ---
    function DriverHub({ user, setLayer, db, appId, showToast, storage }) {
      const [del, setDel] = useState(""); const [pkp, setPkp] = useState("");
      const [img, setImg] = useState(null); const [prev, setPrev] = useState(null);
      const [uping, setUping] = useState(false);

      const submit = async () => {
        if (!del || !pkp || !img) return alert("資料不完整");
        setUping(true);
        const blob = await compressImage(img);
        const ref = storage.ref(`rep/${appId}/${user.id}_${Date.now()}`);
        await ref.put(blob); const url = await ref.getDownloadURL();
        const batch = db.batch();
        batch.update(db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(user.id), { total_del:Number(del), total_pkp:Number(pkp), last_report:{date:new Date().toLocaleDateString('en-CA')}, report_img:url, report_status:'pending' });
        await batch.commit(); showToast("🚀 數據已傳輸"); setUping(false); setLayer('gate');
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[440px] text-center gold-border shadow-2xl">
            <h2 className="text-3xl text-white italic mb-2">夥伴工作台</h2>
            <p className="text-amber-500 text-xs mb-8">{user.name} 您好</p>
            <label className="block mb-6 cursor-pointer border-2 border-dashed border-slate-700 p-8 rounded-3xl hover:border-amber-500 transition relative overflow-hidden">
               {prev ? <img src={prev} className="absolute inset-0 w-full h-full object-cover opacity-40" /> : <p className="text-amber-500 text-sm">📸 點擊拍照今日報表</p>}
               <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e=>{setImg(e.target.files[0]); setPrev(URL.createObjectURL(e.target.files[0]));}} />
            </label>
            <div className="grid grid-cols-2 gap-4 mb-8">
              <div className="bg-slate-900 p-4 rounded-3xl"><p className="text-[10px] text-sky-400 mb-1">今日配送</p><input type="number" className="ghost-input w-full text-3xl" value={del} onChange={e=>setDel(e.target.value)} /></div>
              <div className="bg-slate-900 p-4 rounded-3xl"><p className="text-[10px] text-orange-400 mb-1">今日逆收</p><input type="number" className="ghost-input w-full text-3xl" value={pkp} onChange={e=>setPkp(e.target.value)} /></div>
            </div>
            <button onClick={submit} disabled={uping} className="btn-prime italic">{uping?'上傳中...':'🚀 提交單據與數據'}</button>
            <button onClick={()=>setLayer('gate')} className="text-slate-600 text-xs mt-10 underline">登出系統</button>
          </div>
        </div>
      );
    }

    // --- 4. 初試系統 (10題 + 3問答) ---
    function OnboardingFlow({ setLayer, db, appId, showToast }) {
      const [step, setStep] = useState('info'); // info, quiz, qna, done
      const [name, setName] = useState(""); const [phone, setPhone] = useState("");
      const [curr, setCurr] = useState(0); const [att, setAtt] = useState("良好");
      const [qa, setQa] = useState(["","",""]);
      const quiz = [
        { q: "發生事故流程？", o: ["報警回報", "私下解決"] }, { q: "挪用 COD 貨款？", o: ["絕對禁止", "明天補回"] },
        { q: "客戶未接電話？", o: ["異常帶回", "丟在門口"] }, { q: "包裹損壞？", o: ["回報主管", "照樣送"] },
        { q: "無法上班？", o: ["提早請假", "消失"] }, { q: "闖紅燈趕件？", o: ["絕不違規", "可以變通"] },
        { q: "態度差客戶？", o: ["冷靜專業", "吵回去"] }, { q: "送錯地址？", o: ["立即收回", "裝死"] },
        { q: "出車檢查？", o: ["檢查五油三水", "直接開走"] }, { q: "疑似違禁品？", o: ["通報主管", "自己拆開"] }
      ];
      const questions = ["簡述過往經驗？", "如何調適日曬雨淋體力？", "為什麼想加入？"];

      const finish = async () => {
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(`p_${phone}`).set({
          id:`p_${phone}`, name, phone, pin:"0000", status:'interview_reviewing', ai_comment:att, qna_answer:qa.join('\n'), created_at:firebase.firestore.FieldValue.serverTimestamp(), total_del:0, total_pkp:0, custom_del_price:15, custom_pkp_price:10, labor_fee:0, health_fee:0, dependents:0
        });
        setStep('done');
      };

      return (
        <div className="h-screen flex flex-col bg-black font-black p-4">
          <header className="p-4 flex justify-between items-center"><button onClick={()=>setLayer('gate')} className="text-slate-500">← 返回</button><h2 className="text-white">線上初試系統</h2><div></div></header>
          <div className="flex-1 overflow-y-auto p-4 space-y-4">
             <div className="chat-bubble bubble-bot">您好，歡迎進入初試系統。請務必填寫真實資料以供審核。</div>
             {step==='quiz' && <div className="chat-bubble bubble-bot">測驗開始：{quiz[curr].q}</div>}
             {step==='qna' && <div className="chat-bubble bubble-bot">最後關卡：請填寫問答題。</div>}
          </div>
          <div className="glass-panel p-8 rounded-[2.5rem] gold-border">
            {step==='info' && <div className="space-y-4"><input className="input-box" placeholder="姓名" value={name} onChange={e=>setName(e.target.value)} /><input className="input-box" placeholder="手機" value={phone} onChange={e=>setPhone(e.target.value)} /><button onClick={()=>setStep('quiz')} className="btn-prime">開始測驗</button></div>}
            {step==='quiz' && <div className="space-y-4">{quiz[curr].o.map((o,i)=><button key={i} onClick={()=>{if(i===1)setAtt("需注意"); if(curr<9)setCurr(curr+1); else setStep('qna');}} className="w-full py-4 bg-slate-800 rounded-2xl text-amber-500">{o}</button>)}</div>}
            {step==='qna' && <div className="space-y-2">{questions.map((q,i)=><textarea key={i} className="input-box text-xs h-20" placeholder={q} value={qa[i]} onChange={e=>{const n=[...qa];n[i]=e.target.value;setQa(n);}} />)}<button onClick={finish} className="btn-prime">送出審核</button></div>}
            {step==='done' && <button onClick={()=>setLayer('gate')} className="btn-prime">初試完成，請等通知</button>}
          </div>
        </div>
      );
    }

    // --- 5. 建檔通道 (物流常規) ---
    function UploadFlow({ setLayer, db, appId, showToast, storage }) {
      const [ph, setPh] = useState(""); const [cand, setCand] = useState(null); const [up, setUp] = useState(false);
      const [form, setForm] = useState({ em:" ", emTel:" ", bank:" ", acc:" ", addrP:" ", addrM:" " });
      const [file, setFile] = useState(null);

      const find = async () => {
        const d = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(`p_${ph}`).get();
        if(d.exists && (d.data().status==='pending_upload' || d.data().status==='active')) setCand(d.data());
        else alert("查無可建檔資料，或審核未通過");
      };

      const submit = async () => {
        if(!file) return alert("請上傳證件"); setUp(true);
        const blob = await compressImage(file, 1200);
        const ref = storage.ref(`docs/${appId}/${cand.id}_docs`);
        await ref.put(blob); const url = await ref.getDownloadURL();
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(cand.id).update({ ...form, document_img:url, status:'active' });
        showToast("✅ 建檔完成"); setLayer('gate');
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 font-black">
          <div className="glass-panel w-full max-w-[480px] p-8 rounded-[3rem] gold-border relative">
            <button onClick={()=>setLayer('gate')} className="absolute top-6 left-6 text-slate-500">← 返回</button>
            <h2 className="text-2xl text-center mb-6 text-white">資料建檔通道</h2>
            {!cand ? (
              <div className="space-y-4"><input className="input-box" placeholder="輸入手機號碼" value={ph} onChange={e=>setPh(e.target.value)} /><button onClick={find} className="btn-prime">驗證身分</button></div>
            ) : (
              <div className="space-y-2 text-xs">
                <input className="input-box text-sm" placeholder="緊急聯絡人" onChange={e=>setForm({...form, em:e.target.value})} />
                <input className="input-box text-sm" placeholder="聯絡人電話" onChange={e=>setForm({...form, emTel:e.target.value})} />
                <div className="flex gap-2"><input className="input-box w-1/3" placeholder="銀行代碼" onChange={e=>setForm({...form, bank:e.target.value})} /><input className="input-box flex-1" placeholder="匯款帳號" onChange={e=>setForm({...form, acc:e.target.value})} /></div>
                <input className="input-box" placeholder="戶籍地址" onChange={e=>setForm({...form, addrP:e.target.value})} />
                <input className="input-box" placeholder="通訊地址" onChange={e=>setForm({...form, addrM:e.target.value})} />
                <div className="border-2 border-dashed border-slate-700 p-6 rounded-2xl text-center"><p className="mb-2 text-amber-500">📸 拍攝五證一摺合照</p><input type="file" accept="image/*" onChange={e=>setFile(e.target.files[0])} /></div>
                <button onClick={submit} className="btn-prime mt-4">{up?'檔案傳輸中...':'確認建檔開通'}</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
