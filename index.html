<nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[320px] h-20 bg-black/90 backdrop-blur-3xl border border-white/20 rounded-[2.5rem] flex justify-around items-center px-4 shadow-[0_0_50px_rgba(0,0,0,1)] z-[9999]">
    
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/3 h-[1.5px] bg-gradient-to-r from-transparent via-cyan-400 to-transparent shadow-[0_0_15px_rgba(34,211,238,0.6)]"></div>

    <button onclick="switchTab('monitor')" id="btn-monitor" class="nav-btn group relative flex flex-col items-center justify-center transition-all duration-300">
        <div class="p-3 rounded-2xl bg-cyan-400/10 text-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.3)]">
            <i class="fas fa-eye text-xl drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]"></i>
        </div>
        <div class="active-dot absolute -bottom-2 w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_8px_cyan]"></div>
    </button>

    <button onclick="switchTab('salary')" id="btn-salary" class="nav-btn group relative flex flex-col items-center justify-center transition-all duration-300 opacity-50 hover:opacity-100">
        <div class="p-3 rounded-2xl text-white">
            <i class="fas fa-calculator text-xl"></i>
        </div>
        <div class="active-dot absolute -bottom-2 w-1.5 h-1.5 bg-white rounded-full hidden"></div>
    </button>

    <button onclick="switchTab('fleet')" id="btn-fleet" class="nav-btn group relative flex flex-col items-center justify-center transition-all duration-300 opacity-50 hover:opacity-100">
        <div class="p-3 rounded-2xl text-white">
            <i class="fas fa-truck text-xl"></i>
        </div>
        <div class="active-dot absolute -bottom-2 w-1.5 h-1.5 bg-white rounded-full hidden"></div>
    </button>
</nav>

<div class="h-44 bg-transparent pointer-events-none"></div>

<script>
    /**
     * Supreme-V92 分頁切換核心
     * 自動處理：頁面隱藏/顯示、按鈕高亮、狀態燈切換
     */
    function switchTab(tabId) {
        // 系統日誌輸出
        console.log(`%c[Alpha Core] 讀取 ${tabId.toUpperCase()} 儲存庫...`, "color: #22d3ee; font-weight: bold; background: #000; padding: 2px 5px;");
        
        // --- A. 面板顯示邏輯 ---
        const panels = ['monitor', 'salary', 'fleet'];
        panels.forEach(id => {
            const el = document.getElementById(`panel-${id}`);
            if (el) {
                el.style.display = 'none';
                el.style.opacity = '0';
            }
        });

        const targetEl = document.getElementById(`panel-${tabId}`);
        if (targetEl) {
            targetEl.style.display = 'block';
            // 平滑進入效果
            setTimeout(() => { targetEl.style.opacity = '1'; }, 10);
        } else {
            console.warn(`[!] 未檢測到 panel-${tabId} 面板，請確認 HTML 中有對應 ID。`);
        }

        // --- B. 全域按鈕視覺重置 ---
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.add('opacity-50');
            btn.querySelector('.active-dot')?.classList.add('hidden');
            
            const iconDiv = btn.querySelector('div:first-child');
            iconDiv.className = "p-3 rounded-2xl text-white transition-all duration-300";
        });

        // --- C. 指定按鈕啟動視覺 ---
        const activeBtn = document.getElementById(`btn-${tabId}`);
        if (activeBtn) {
            activeBtn.classList.remove('opacity-50');
            activeBtn.classList.add('opacity-100');
            
            activeBtn.querySelector('.active-dot')?.classList.remove('hidden');
            
            const iconDiv = activeBtn.querySelector('div:first-child');
            // 注入 Cyan 核心色
            iconDiv.className = "p-3 rounded-2xl bg-cyan-400/10 text-cyan-400 shadow-[0_0_20px_rgba(34,211,238,0.3)] transition-all duration-300";
        }
    }

    // 初始化：預設開啟監控中心
    window.addEventListener('DOMContentLoaded', () => {
        // 如果有需要，可以在這裡加入設備指紋驗證邏輯
        switchTab('monitor');
    });
</script>
