<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
    /* 強制覆蓋所有可能的背景衝突 */
    #v92-global-nav {
        position: fixed !important;
        bottom: 40px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: 320px !important;
        height: 76px !important;
        background: rgba(5, 5, 5, 0.9) !important;
        backdrop-filter: blur(25px) !important;
        -webkit-backdrop-filter: blur(25px) !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        border-radius: 40px !important;
        display: flex !important;
        justify-content: space-around !important;
        align-items: center !important;
        padding: 0 15px !important;
        box-shadow: 0 20px 50px rgba(0,0,0,1) !important;
        z-index: 999999 !important;
    }

    /* 頂部掃描發光線 */
    .v92-scanline {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 40%;
        height: 1.5px;
        background: linear-gradient(90deg, transparent, #22d3ee, transparent);
        box-shadow: 0 0 15px #22d3ee;
    }

    .v92-nav-btn {
        background: none !important;
        border: none !important;
        padding: 12px !important;
        border-radius: 18px !important;
        cursor: pointer !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        color: rgba(255, 255, 255, 0.3) !important;
        position: relative !important;
    }

    /* 啟用狀態樣式 */
    .v92-nav-btn.active {
        color: #22d3ee !important;
        background: rgba(34, 211, 238, 0.08) !important;
        box-shadow: inset 0 0 15px rgba(34, 211, 238, 0.05) !important;
    }

    .v92-nav-btn i {
        font-size: 20px !important;
    }

    /* 指示燈動畫 */
    .active-light {
        position: absolute;
        bottom: -6px;
        width: 4px;
        height: 4px;
        background: #22d3ee;
        border-radius: 50%;
        box-shadow: 0 0 8px #22d3ee;
        display: none;
    }

    .v92-nav-btn.active .active-light {
        display: block;
    }

    /* 底部間距填充 */
    .v92-spacer {
        height: 140px !important;
        width: 100% !important;
        pointer-events: none !important;
    }
</style>

<nav id="v92-global-nav">
    <div class="v92-scanline"></div>
    
    <button onclick="switchTab('monitor')" id="v92-btn-monitor" class="v92-nav-btn active">
        <i class="fas fa-eye"></i>
        <div class="active-light"></div>
    </button>

    <button onclick="switchTab('salary')" id="v92-btn-salary" class="v92-nav-btn">
        <i class="fas fa-calculator"></i>
        <div class="active-light"></div>
    </button>

    <button onclick="switchTab('fleet')" id="v92-btn-fleet" class="v92-nav-btn">
        <i class="fas fa-truck"></i>
        <div class="active-light"></div>
    </button>
</nav>

<div class="v92-spacer"></div>

<script>
    /**
     * Supreme-V92 核心路由切換
     */
    function switchTab(tabId) {
        console.log(`%c[Alpha Core] 切換至: ${tabId.toUpperCase()}`, "color: #22d3ee; font-weight: bold; background: #000; padding: 2px 5px;");

        // 1. 處理頁面面板切換
        const panels = ['monitor', 'salary', 'fleet'];
        panels.forEach(id => {
            const panel = document.getElementById(`panel-${id}`);
            if (panel) {
                panel.style.display = 'none';
                panel.style.opacity = '0';
            }
        });

        const targetPanel = document.getElementById(`panel-${tabId}`);
        if (targetPanel) {
            targetPanel.style.display = 'block';
            setTimeout(() => { targetPanel.style.opacity = '1'; }, 20);
        }

        // 2. 處理按鈕 UI 狀態切換
        document.querySelectorAll('.v92-nav-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        const activeBtn = document.getElementById(`v92-btn-${tabId}`);
        if (activeBtn) {
            activeBtn.classList.add('active');
        }
    }

    // 初始化默認分頁
    window.addEventListener('load', () => switchTab('monitor'));
</script>
