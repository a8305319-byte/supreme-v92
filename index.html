<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 旗艦中控台 V92</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background-color: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .input-box { background-color: rgba(15, 23, 42, 0.9); border: 1px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #fff; outline: none; margin-bottom: 15px; font-size: 16px; }
        .label-sky { font-size: 14px; color: #38bdf8; font-weight: bold; margin-bottom: 8px; display: block; margin-top: 15px; text-transform: uppercase; }
        .btn-prime { width: 100%; padding: 20px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 900; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
        .remember-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; width: 100%; padding-left: 10px; }
        .remember-wrap input { width: 22px; height: 22px; accent-color: #0ea5e9; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .photo-slot { background-color: #0f172a; border: 2px dashed #334155; border-radius: 15px; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-wall { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 30px; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; border: 1px solid #1e293b; }
        .del-badge { position: absolute; top: 5px; right: 5px; background: rgba(220, 38, 38, 0.9); color: #fff; font-size: 10px; padding: 3px 6px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #slip-box { position: absolute; left: -9999px; background: #fff; color: #000; padding: 50px; width: 500px; border: 1px solid #ddd; }
        .slip-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 12px 0; font-size: 16px; }
        .v-badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; border: 1px solid #0ea5e9; color: #0ea5e9; margin-left: 8px; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.98); z-index: 500; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-7xl font-black text-white italic mb-4 tracking-tighter">SUPREME</h1>
        <p class="text-sky-500 text-xs font-bold tracking-[0.4em] mb-16 uppercase">Enterprise Management V92</p>
        <div class="w-full max-w-[360px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center shadow-2xl">
            <input type="password" id="login_pin" placeholder="PIN 密 碼" class="input-box text-center shadow-2xl">
            <div class="remember-wrap">
                <input type="checkbox" id="remember_me">
                <label for="remember_me" class="text-sm text-slate-500">記住登入資訊</label>
            </div>
            <button onclick="boot()" class="btn-prime">進入系統中控台</button>
            <button onclick="showApply()" class="text-sm text-slate-700 underline mt-12 block mx-auto uppercase">Partner Onboarding / 夥伴入職</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card">
            <h2 class="text-3xl font-black text-white mb-8 text-center italic">詳細入職申請</h2>
            <span class="label-sky">第一階段：證件影像上傳</span>
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-xs">身分證正面</span><img id="p_id_f"></div>
                <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-xs">身分證反面</span><img id="p_id_b"></div>
                <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-xs">夥伴駕照</span><img id="p_lic"></div>
                <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-xs">車輛行照</span><img id="p_car"></div>
                <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
            </div>
            <span class="label-sky">第二階段：核心人事資料</span>
            <input type="text" id="app_name" placeholder="中文真實姓名" class="input-box">
            <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
            <input type="tel" id="app_phone" placeholder="手機號碼 (帳號)" class="input-box">
            <input type="password" id="app_pin" placeholder="自訂 PIN 碼 (4位)" maxlength="4" class="input-box">
            <span class="label-sky">第三階段：地址與聯繫人</span>
            <input type="text" id="app_h_addr" placeholder="戶籍完整地址" class="input-box">
            <input type="text" id="app_emergency" placeholder="緊急聯絡人姓名與電話" class="input-box">
            <button onclick="submitApply()" class="btn-prime mt-6">提交入職申請資料</button>
            <button onclick="location.reload()" class="w-full mt-6 text-sm text-slate-500 text-center font-bold">返回登入</button>
        </div>
    </div>

    <div id="edit-page" class="layer">
        <div class="id-card">
            <h2 class="text-2xl font-black text-white mb-6 text-center italic">✏️ 修改夥伴檔案</h2>
            <div id="edit-container">
                <label class="label-sky">姓名</label><input type="text" id="ed_name" class="input-box">
                <label class="label-sky">手機帳號</label><input type="tel" id="ed_phone" class="input-box">
                <label class="label-sky">登入 PIN 碼</label><input type="text" id="ed_pin" class="input-box">
                <label class="label-sky">身分證號</label><input type="text" id="ed_idnum" class="input-box">
                <label class="label-sky">詳細地址</label><input type="text" id="ed_addr" class="input-box">
            </div>
            <button onclick="window.commitEdit()" class="btn-prime mt-6">確認存檔</button>
            <button onclick="document.getElementById('edit-page').style.display='none'" class="w-full mt-6 text-sm text-slate-500 font-bold">放棄返回</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-16 mb-24 text-slate-700 font-bold text-xs underline uppercase tracking-widest">Logout / 登出</button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-12" id="detail-content"></div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-4 max-w-[500px] mx-auto block shadow-none">關閉詳情</button>
    </div>

    <div id="slip-box">
        <div style="text-align:center; border-bottom:4px solid #000; padding-bottom:15px; margin-bottom:25px;">
            <h2 style="margin:0; font-size: 24px;">SUPREME 酬勞結算明細</h2>
            <p id="slip-date" style="margin:8px 0; font-size:12px; color:#555; font-weight:bold;"></p>
        </div>
        <div id="slip-body"></div>
        <div style="margin-top:30px; border-top:4px solid #000; padding-top:20px; font-size:22px; font-weight:900; display:flex; justify-content:space-between;">
            <span>應領實發總額</span><span id="slip-total-val"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], logs = [], curField = '', editId = '', photos = {};
        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });
        onSnapshot(collection(db, 'logs'), s => { logs = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.addEventListener('DOMContentLoaded', () => {
            const sp = localStorage.getItem('s_ph'), si = localStorage.getItem('s_pi');
            if(sp && si) { document.getElementById('login_phone').value = sp; document.getElementById('login_pin').value = atob(si); document.getElementById('remember_me').checked = true; }
        });

        window.boot = () => {
            const ph = document.getElementById('login_phone').value, pi = document.getElementById('login_pin').value;
            if(document.getElementById('remember_me').checked) { localStorage.setItem('s_ph', ph); localStorage.setItem('s_pi', btoa(pi)); }
            else { localStorage.removeItem('s_ph'); localStorage.removeItem('s_pi'); }
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderPartner(p);
            alert("驗證失敗：手機 PIN 錯誤或未核准。");
        };

        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
        window.triggerCam = (f) => { curField = f; document.getElementById('cam').click(); };
        window.handleFile = (i) => {
            const r = new FileReader();
            r.onload = (e) => { photos[curField] = e.target.result; const p = document.getElementById('p_' + curField); p.src = e.target.result; p.style.display = 'block'; document.getElementById('t_' + curField).style.display = 'none'; };
            r.readAsDataURL(i.files[0]);
        };

        window.submitApply = async () => {
            const payload = {
                name: document.getElementById('app_name').value, phone: document.getElementById('app_phone').value,
                uid: document.getElementById('app_pin').value, id_num: document.getElementById('app_idnum').value,
                h_addr: document.getElementById('app_h_addr').value, emergency: document.getElementById('app_emergency').value,
                v_type: document.getElementById('app_vehicle').value, docs: photos, status: "pending", 
                rate_del: 50, rate_ret: 20, labor_fee: 1500, health_fee: 800, health_cnt: 1, bonus: 0, penalty: 0, total_del: 0, total_ret: 0, time: serverTimestamp()
            };
            if(!payload.name || !payload.phone) return alert("必填欄位不得為空！");
            await addDoc(collection(db, 'partners'), payload); alert("申請已提交雲端。"); location.reload();
        };

        // 老闆後台渲染 (補回消失的會計欄位與健保人數自由輸入)
        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved"), pending = partners.filter(x => x.status === "pending");
            let html = `<div class="w-full max-w-[520px] px-2"><h2 class="text-white font-black text-5xl mb-12 italic border-l-8 border-sky-500 pl-5 uppercase">Elite Admin</h2>`;
            
            // 影像查核牆
            html += `<p class="text-sky-500 font-bold text-[12px] mb-4 uppercase">影像審核牆</p>`;
            html += `<div class="photo-wall">${logs.slice(-9).reverse().map(l => `<div class="photo-item"><img src="${l.photo}" class="w-full h-full object-cover"><div class="del-badge" onclick="window.delLog('${l.id}')">移除</div></div>`).join('')}</div>`;

            html += `<div class="flex gap-4 mb-14"><button onclick="window.resetData()" class="flex-1 bg-red-900/30 text-red-500 border border-red-900/60 py-5 rounded-2xl text-[12px] font-bold">月底結算歸零數據</button></div>`;

            if(pending.length > 0) {
                html += `<p class="text-orange-500 font-bold mb-6 text-sm">新入職待核准 (${pending.length})</p>`;
                pending.forEach(p => { html += `<div class="id-card !p-6 !bg-slate-900 mb-8 flex justify-between items-center border-orange-500/30"><div><p class="text-white font-bold text-lg">${p.name}</p></div><button onclick="window.approveP('${p.id}')" class="bg-sky-600 text-white px-8 py-3 rounded-2xl text-xs font-bold">核准入職</button></div>`; });
            }

            html += `<p class="text-slate-600 font-bold text-[12px] uppercase mb-10">會計結算中心</p>`;
            approved.forEach(p => {
                const pay = (p.total_del*(p.rate_del||50)) + (p.total_ret*(p.rate_ret||20)) - (p.labor_fee||1500) - ((p.health_cnt||1)*(p.health_fee||800)) + (p.bonus||0) - (p.penalty||0);
                html += `
                <div class="id-card !p-8 !bg-slate-900/40 border-slate-800 mb-12 shadow-2xl">
                    <div class="flex justify-between items-start mb-8">
                        <div onclick="window.viewP('${p.id}')" class="cursor-pointer"><p class="text-white font-black text-2xl">${p.name} <span class="v-badge">${p.v_type}</span></p><p class="text-[11px] text-slate-500 underline mt-2 italic">點擊查看證件影像詳情</p></div>
                        <div class="text-right"><p class="text-sky-400 font-black text-3xl">$${pay.toLocaleString()}</p><button onclick="window.initModify('${p.id}')" class="text-[11px] text-orange-500 underline font-bold mt-2 block">✏️ 修改人事資料</button></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div><label class="text-[10px] text-slate-600 uppercase font-bold">配送費率</label><input id="rd_${p.id}" type="number" value="${p.rate_del||50}" class="input-box !py-2 !text-sm !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-slate-600 uppercase font-bold">逆物費率</label><input id="rr_${p.id}" type="number" value="${p.rate_ret||20}" class="input-box !py-2 !text-sm !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-orange-600 uppercase font-bold">勞保扣款</label><input id="rl_${p.id}" type="number" value="${p.labor_fee||1500}" class="input-box !py-2 !text-sm !mb-0 shadow-inner !border-orange-900/50"></div>
                        <div><label class="text-[10px] text-orange-600 uppercase font-bold">健保人數(可填0)</label><div class="flex gap-1"><input id="rhf_${p.id}" type="number" value="${p.health_fee||800}" class="input-box !py-2 !text-sm !mb-0 !w-2/3 shadow-inner"><input id="rhc_${p.id}" type="number" value="${p.health_cnt||1}" class="input-box !py-2 !text-sm !mb-0 !w-1/3 shadow-inner"></div></div>
                        <div><label class="text-[10px] text-green-600 uppercase font-bold">加給補貼</label><input id="rb_${p.id}" type="number" value="${p.bonus||0}" class="input-box !py-2 !text-sm !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-red-600 uppercase font-bold">罰金扣除</label><input id="rp_${p.id}" type="number" value="${p.penalty||0}" class="input-box !py-2 !text-sm !mb-0 shadow-inner"></div>
                    </div>
                    <div class="flex gap-3 mt-8 pt-4 border-t border-slate-800">
                        <button onclick="window.saveAcct('${p.id}')" class="flex-1 bg-slate-800 text-sky-500 py-3 rounded-xl text-[11px] font-bold border border-sky-900/50 uppercase tracking-widest shadow-xl">同步更新會計參數</button>
                        <button onclick='window.exportSlip(${JSON.stringify(p)})' class="px-5 bg-sky-600/10 text-sky-500 py-3 rounded-xl text-[11px] font-bold border border-sky-600/20">薪資單</button>
                        <button onclick="window.delPartner('${p.id}')" class="px-3 text-red-900 text-[10px] underline">移除</button>
                    </div>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // 修改人事檔案核心邏輯
        window.initModify = (id) => {
            const p = partners.find(x => x.id === id); editId = id; document.getElementById('edit-page').style.display = 'flex';
            document.getElementById('ed_name').value = p.name; document.getElementById('ed_phone').value = p.phone;
            document.getElementById('ed_pin').value = p.uid; document.getElementById('ed_idnum').value = p.id_num;
            document.getElementById('ed_addr').value = p.h_addr;
        };
        window.commitEdit = async () => {
            const upd = { name: document.getElementById('ed_name').value, phone: document.getElementById('ed_phone').value, uid: document.getElementById('ed_pin').value, id_num: document.getElementById('ed_idnum').value, h_addr: document.getElementById('ed_addr').value };
            await updateDoc(doc(db, 'partners', editId), upd); alert("人事資料修正存檔完成。"); document.getElementById('edit-page').style.display = 'none'; renderAdmin();
        };

        window.saveAcct = async (id) => {
            const upd = { rate_del: parseInt(document.getElementById('rd_'+id).value), rate_ret: parseInt(document.getElementById('rr_'+id).value), labor_fee: parseInt(document.getElementById('rl_'+id).value), health_fee: parseInt(document.getElementById('rhf_'+id).value), health_cnt: parseInt(document.getElementById('rhc_'+id).value), bonus: parseInt(document.getElementById('rb_'+id).value), penalty: parseInt(document.getElementById('rp_'+id).value) };
            await updateDoc(doc(db, 'partners', id), upd); alert("會計參數同步成功。"); renderAdmin();
        };

        window.delLog = async (id) => { if(confirm("移除影像？")) await deleteDoc(doc(db, 'logs', id)); };
        window.delPartner = async (id) => { if(confirm("永久移除此夥伴及其所有薪資數據？")) await deleteDoc(doc(db, 'partners', id)); };
        window.approveP = async (id) => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("入職核准成功。"); renderAdmin(); };
        window.resetData = async () => { if(confirm("數據歸零？")) { for(let p of partners) { await updateDoc(doc(db, 'partners', p.id), { total_del: 0, total_ret: 0, bonus: 0, penalty: 0 }); } alert("結算歸零完成。"); location.reload(); } };

        window.viewP = (id) => {
            const p = partners.find(x => x.id === id); document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `<h3 class="text-white font-black mb-10 border-b-2 border-slate-800 pb-4 text-sm italic uppercase">Partner HR Details</h3>
            <div class="grid grid-cols-2 gap-y-6 text-xs text-slate-400 mb-12 leading-loose"><p>真實姓名：<span class="text-white font-bold ml-2">${p.name}</span></p><p>身分證號：<span class="text-white ml-2">${p.id_num}</span></p><p class="col-span-2">詳細地址：<span class="text-white ml-2">${p.h_addr}</span></p><p class="col-span-2">緊急聯繫：<span class="text-white font-bold ml-2 text-orange-400">${p.emergency}</span></p></div>
            <div class="grid grid-cols-2 gap-4"><img src="${p.docs?.id_f}" class="rounded-2xl border border-slate-800 shadow-2xl"><img src="${p.docs?.id_b}" class="rounded-2xl border border-slate-800 shadow-2xl"><img src="${p.docs?.lic}" class="rounded-2xl border border-slate-800 shadow-2xl"><img src="${p.docs?.car}" class="rounded-2xl border border-slate-800 shadow-2xl"></div>`;
        };

        window.exportSlip = async (p) => {
            const net = (p.total_del*(p.rate_del||50))+(p.total_ret*(p.rate_ret||20))+p.bonus-p.penalty-p.labor_fee-((p.health_cnt||1)*p.health_fee);
            document.getElementById('slip-date').innerText = "結算期間：" + (new Date().getMonth()+1) + " 月份";
            document.getElementById('slip-body').innerHTML = `<div class="slip-row"><span>夥伴(領款人)姓名</span><b>${p.name}</b></div><div class="slip-row"><span>配送件數報酬 ($${p.rate_del})</span><span>$${(p.total_del*p.rate_del).toLocaleString()}</span></div><div class="slip-row"><span>逆物件數報酬 ($${p.rate_ret})</span><span>$${(p.total_ret*p.rate_ret).toLocaleString()}</span></div><div class="slip-row" style="color:green"><span>本月津貼加給項目</span><span>+$${p.bonus.toLocaleString()}</span></div><div class="slip-row" style="color:#d00"><span>勞工保險費扣費項目</span><span>-$${p.labor_fee.toLocaleString()}</span></div><div class="slip-row" style="color:#d00"><span>健康保險費扣費項目 (${p.health_cnt}人)</span><span>-$${((p.health_cnt||1)*p.health_fee).toLocaleString()}</span></div><div class="slip-row" style="color:#d00"><span>行政罰金與損壞扣除</span><span>-$${p.penalty.toLocaleString()}</span></div>`;
            document.getElementById('slip-total-val').innerText = "TWD $ " + net.toLocaleString();
            const s = document.getElementById('slip-box'); s.style.left = "0"; const canvas = await html2canvas(s, { scale: 3 }); s.style.left = "-9999px";
            const a = document.createElement('a'); a.download = `SUPREME_SLIP_${p.name}.png`; a.href = canvas.toDataURL(); a.click();
        };

        function renderPartner(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card shadow-sky-500/20 shadow-2xl">
                    <h2 class="text-4xl font-black text-white mb-2 italic underline decoration-sky-600 decoration-4">${p.name} 夥伴</h2>
                    <p class="text-[12px] text-slate-500 uppercase tracking-[0.2em] mb-12"> Operational Hub </p>
                    <div class="space-y-8">
                        <div><label class="label-sky">回報今日配送件數</label><input type="number" id="v_del" placeholder="0" class="input-box text-center text-5xl font-black text-sky-400 h-24 shadow-2xl"></div>
                        <div><label class="label-sky">回報今日逆物數量</label><input type="number" id="v_ret" placeholder="0" class="input-box text-center text-5xl font-black text-orange-400 h-24 shadow-2xl"></div>
                        <div class="pt-8 border-t-4 border-slate-800"><button onclick="window.commitSync('${p.id}')" class="btn-prime">確認數據同步中控台</button></div>
                    </div>
                </div>`;
        }

        window.commitSync = async (id) => {
            const d = parseInt(document.getElementById('v_del').value)||0, r = parseInt(document.getElementById('v_ret').value)||0;
            await addDoc(collection(db, 'logs'), { driverId: id, del: d, ret: r, photo: "https://via.placeholder.com/600", time: serverTimestamp() });
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("數據同步成功。"); location.reload();
        };
    </script>
</body>
</html>
