<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supreme-V92 Alpha Core v3.0 | 企業正式版</title>
    <!-- 依賴庫載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --oled-black: #000000;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-cyan: #22d3ee;
            --neon-rose: #f43f5e;
            --neon-amber: #fbbf24;
            --neon-emerald: #10b981;
        }
        body {
            background-color: var(--oled-black);
            color: #ffffff;
            overflow: hidden;
            font-family: 'Inter', "Microsoft JhengHei", sans-serif;
            user-select: none;
        }
        /* 基本佈局樣式 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.9);
            border-radius: 2.5rem;
        }
        .btn-tactile {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-tactile:active { transform: scale(0.94); filter: brightness(1.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanner-active::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--neon-cyan); box-shadow: 0 0 25px var(--neon-cyan);
            animation: scanline 3s linear infinite; opacity: 0.4; z-index: 50;
            pointer-events: none;
        }

        .switch-matrix {
            width: 48px; height: 26px; background: rgba(255,255,255,0.1);
            border-radius: 13px; position: relative; cursor: pointer; transition: 0.3s;
        }
        .switch-matrix.active { background: var(--neon-cyan); box-shadow: 0 0 12px rgba(34,211,238,0.5); }
        .knob {
            width: 22px; height: 22px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 2px; transition: 0.3s;
        }
        .switch-matrix.active .knob { left: 24px; }

        .manual-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--neon-cyan);
            font-size: 1.25rem;
            font-weight: 900;
            width: 100%;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }
        .manual-input:focus { border-color: var(--neon-cyan); background: rgba(34, 211, 238, 0.05); }

        .checkbox-custom {
            width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .checkbox-custom.active { background: var(--neon-cyan); border-color: var(--neon-cyan); }
        
        .alert-pulse { border: 2px solid var(--neon-rose) !important; animation: alert-glow 1.5s infinite; }
        @keyframes alert-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(244, 63, 94, 0.2); }
            50% { box-shadow: 0 0 30px rgba(244, 63, 94, 0.5); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // 1. 核心底層組件 (Fix: ReferenceErrors)
        // ==========================================
        
        /** 全域樣式占位組件 */
        const GlobalStyles = () => null;

        /** 統一圖標映射 */
        const Icon = ({ name, size = 18, className = "" }) => {
            const mapping = {
                ShieldCheck: "fa-shield-check",
                Truck: "fa-truck-fast",
                Activity: "fa-wave-square",
                RefreshCcw: "fa-arrows-rotate",
                BarChart3: "fa-chart-simple",
                Database: "fa-database",
                CheckCircle2: "fa-circle-check",
                Camera: "fa-camera",
                Lock: "fa-lock",
                Eye: "fa-eye",
                Zap: "fa-bolt",
                MessageSquare: "fa-comment-dots",
                Settings2: "fa-sliders",
                UserPlus: "fa-user-plus",
                MapPin: "fa-location-dot",
                Calculator: "fa-calculator",
                Send: "fa-paper-plane",
                X: "fa-xmark",
                ShieldAlert: "fa-shield-halved",
                LockKeyhole: "fa-lock-open",
                UserCog: "fa-user-gear",
                Headset: "fa-headset",
                Briefcase: "fa-briefcase",
                Ghost: "fa-ghost",
                Monitor: "fa-desktop",
                LogOut: "fa-right-from-bracket",
                Bell: "fa-bell",
                Sparkles: "fa-sparkles",
                Megaphone: "fa-bullhorn",
                ChevronRight: "fa-chevron-right",
                Building2: "fa-building",
                History: "fa-history",
                BadgeDollarSign: "fa-file-invoice-dollar",
                ShieldX: "fa-shield-xmark",
                Plus: "fa-plus"
            };
            return <i className={`fas ${mapping[name] || 'fa-question'} ${className}`} style={{ fontSize: size }}></i>;
        };

        /** 玻璃擬態卡片 */
        const GlassCard = ({ children, className = "", style = {} }) => (
            <section className={`glass-card ${className}`} style={style}>
                {children}
            </section>
        );

        /** 霓虹數據撥盤 */
        const EmpireDial = ({ value, label, color, onChange }) => {
            const [isDragging, setIsDragging] = useState(false);
            const dialRef = useRef(null);
            const handleUpdate = (e) => {
                if (!isDragging && e.type !== 'click') return;
                if (!dialRef.current) return;
                const rect = dialRef.current.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
                let angle = Math.atan2(clientY - (rect.top + rect.height / 2), clientX - (rect.left + rect.width / 2)) * (180 / Math.PI) + 90;
                if (angle < 0) angle += 360;
                onChange(Math.round((angle / 360) * 150));
            };
            return (
                <div className="flex flex-col items-center gap-4">
                    <div ref={dialRef} className="w-24 h-24 sm:w-28 sm:h-28 rounded-full border-2 relative cursor-pointer active:scale-95 touch-none"
                         style={{ borderColor: color, boxShadow: `0 0 20px ${color}33`, transform: `rotate(${(value / 150) * 360}deg)` }}
                         onMouseDown={() => setIsDragging(true)} onMouseUp={() => setIsDragging(false)} onMouseMove={handleUpdate}
                         onTouchStart={() => setIsDragging(true)} onTouchEnd={() => setIsDragging(false)} onTouchMove={handleUpdate}>
                        <div className="w-1.5 h-6 absolute top-1.5 rounded-full left-1/2 -translate-x-1/2 shadow-lg shadow-black/50" style={{ background: color }}></div>
                    </div>
                    <div className="flex flex-col items-center text-center">
                        <input type="number" value={value} onChange={(e) => onChange(parseInt(e.target.value) || 0)}
                               className="bg-transparent text-2xl font-black font-mono text-center w-24 outline-none" style={{ color }} />
                        <span className="text-[9px] uppercase tracking-widest opacity-40 font-bold mt-1 tracking-tighter">{label}</span>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2. 主應用程式 (App)
        // ==========================================
        const App = () => {
            // 正式管理憑證 (寫死不可更動)
            const SYSTEM_AUTH = { id: '0976017938', key: '8305319' };

            const [view, setView] = useState('splash');
            const [role, setRole] = useState('sovereign');
            const [isVerified, setIsVerified] = useState(false);
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [isBulletinOpen, setIsBulletinOpen] = useState(false);
            const [bulletin, setBulletin] = useState("歡迎回到在地物流系統，請保持安全駕駛。");
            const [tempBulletin, setTempBulletin] = useState("");
            const [eraserProgress, setEraserProgress] = useState(0);
            const [isEraserHolding, setIsEraserHolding] = useState(false);
            const [notification, setNotification] = useState(null);
            const [chatInput, setChatInput] = useState("");
            const [chatHistory, setChatHistory] = useState([]);
            const chatEndRef = useRef(null);

            const showMsg = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const [auditLogs, setAuditLogs] = useState([
                { time: '05:30:00', action: '核心版本佈署', details: '企業正式版 v3.0 啟動', id: 1 }
            ]);
            const logAction = (action, details) => {
                const newEntry = { time: new Date().toLocaleTimeString(), action, details, id: Math.random() };
                setAuditLogs(prev => [newEntry, ...prev].slice(0, 12));
            };

            // --- 司機數據矩陣 ---
            const [drivers, setDrivers] = useState([
                { id: 'D-882', name: '林智強', stability: 92, has_photo: true, delivered: 124, returned: 12, history_avg: 120, is_insured: true, insurance_base: 30000, person_count: 1, piece_unit_delivered: 1.0, piece_unit_returned: 0.5 },
                { id: 'D-773', name: '陳志明', stability: 85, has_photo: false, delivered: 156, returned: 5, history_avg: 110, is_insured: true, insurance_base: 45800, person_count: 2, piece_unit_delivered: 1.2, piece_unit_returned: 0.8 },
                { id: 'D-901', name: '王大同', stability: 78, has_photo: true, delivered: 98, returned: 15, history_avg: 95, is_insured: false, insurance_base: 0, person_count: 0, piece_unit_delivered: 1.0, piece_unit_returned: 0.5 }
            ]);
            const [selectedDriverId, setSelectedDriverId] = useState('D-882');
            const activeDriver = drivers.find(d => d.id === selectedDriverId) || drivers[0];

            const updateDriverData = (id, field, value) => {
                setDrivers(prev => prev.map(d => d.id === id ? { ...d, [field]: value } : d));
            };

            const [matrix, setMatrix] = useState({
                admin_rate_edit: false,
                kill_switch: false,
                ai_audit_active: true,
                recruitment_portal: true,
                gps_tracking: true,
                snapshot_pro: true,
                empire_dial: true
            });

            const handleMatrixToggle = (key) => {
                setMatrix(prev => {
                    const newState = { ...prev, [key]: !prev[key] };
                    logAction(`權限變更: ${key}`, `狀態更新為: ${newState[key] ? '是' : '否'}`);
                    return newState;
                });
            };

            const metrics = useMemo(() => {
                const d = activeDriver;
                const pieceBonus = (d.delivered * d.piece_unit_delivered) + (d.returned * d.piece_unit_returned);
                const baseWage = 45000;
                const gross = baseWage + pieceBonus;
                const supplement_deduction = gross >= 20000 ? gross * 0.0211 : 0;
                const labor_employer = d.is_insured ? (d.insurance_base * 0.06 * d.person_count) : 0;
                const nhi_employer = d.is_insured ? (d.insurance_base * 0.0211 * d.person_count) : 0;
                const total_shadow_cost = gross + labor_employer + nhi_employer + 3200;
                const deviation = d.history_avg > 0 ? (Math.abs(d.delivered - d.history_avg) / d.history_avg) : 0;

                return {
                    net: Math.round(gross).toLocaleString(),
                    real_payout: Math.round(gross - supplement_deduction).toLocaleString(),
                    shadow: Math.round(total_shadow_cost).toLocaleString(),
                    margin: Math.round(total_shadow_cost * 0.23).toLocaleString(),
                    supplement_value: Math.round(supplement_deduction).toLocaleString(),
                    isAnomaly: deviation > 0.20,
                    deviation_percent: (deviation * 100).toFixed(1)
                };
            }, [activeDriver]);

            const [geminiRole, setGeminiRole] = useState('assistant');
            const geminiProfiles = {
                assistant: { title: "老闆特助", icon: "UserCog", color: "var(--neon-cyan)", greeting: `報告，數據已同步。影子淨利預估為 23%。` },
                recruiter: { title: "AI 獵頭", icon: "Briefcase", color: "var(--neon-emerald)", greeting: "正在篩選儲備庫司機。人才品質穩定。" },
                support: { title: "司機客服", icon: "Headset", color: "var(--neon-amber)", greeting: `你好 ${activeDriver.name}，路上請小心。` }
            };

            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const handleLogin = () => {
                if (loginForm.user === SYSTEM_AUTH.id && loginForm.pass === SYSTEM_AUTH.key) {
                    setView('core');
                    setIsVerified(false);
                    logAction('管理認證', '正式金鑰驗證通過');
                } else alert("認證失敗。");
            };

            useEffect(() => {
                const timer = setTimeout(() => setView('login'), 3000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                if (view === 'core' && !isVerified) {
                    const timer = setTimeout(() => setIsVerified(true), 2000);
                    return () => clearTimeout(timer);
                }
            }, [view, isVerified]);

            // ==========================================
            // 子視圖渲染 (Fix: Component Scoping)
            // ==========================================
            
            const renderLogin = () => (
                <div className="flex flex-col items-center justify-center h-screen px-8 space-y-12 animate-in fade-in duration-1000">
                    <div className="text-center">
                        <Icon name="Building2" size={64} className="text-cyan-400 mx-auto mb-6" />
                        <h1 className="text-4xl font-black italic tracking-tighter text-white/95 uppercase text-center">在地物流 <span className="text-cyan-400 block not-italic mt-1 opacity-50 tracking-[0.4em] text-xl">ENTERPRISE CORE</span></h1>
                    </div>
                    <div className="w-full max-w-sm space-y-5">
                        <input type="text" placeholder="管理員識別碼" className="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm text-white outline-none focus:border-cyan-500/50 transition-all font-mono text-center" value={loginForm.user} onChange={e => setLoginForm({...loginForm, user: e.target.value})} />
                        <input type="password" placeholder="安全性授權金鑰" className="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm text-white outline-none focus:border-cyan-500/50 transition-all font-mono text-center" value={loginForm.pass} onChange={e => setLoginForm({...loginForm, pass: e.target.value})} />
                        <button onClick={handleLogin} className="w-full btn-tactile py-5 rounded-2xl bg-white text-black font-black uppercase tracking-widest shadow-xl">啟動主權驗證</button>
                    </div>
                </div>
            );

            const renderSovereign = () => (
                <div className="space-y-6 animate-in fade-in duration-500 pb-32 pt-6 px-4 text-left">
                    <div className="flex justify-between items-center px-4">
                        <h2 className="text-2xl font-black italic text-rose-500 uppercase tracking-tighter">決策核心</h2>
                        <div className="flex gap-2">
                           <button onClick={() => handleMatrixToggle('kill_switch')} className={`btn-tactile px-4 py-2 rounded-xl text-[10px] font-black uppercase ${matrix.kill_switch ? 'bg-rose-600' : 'bg-white/5 border border-white/10'}`}>
                             <Icon name="Zap" size={14} /> {matrix.kill_switch ? '解除熔斷' : '緊急熔斷'}
                           </button>
                           <button onClick={() => setIsBulletinOpen(true)} className="btn-tactile bg-amber-500/10 text-amber-400 border border-amber-500/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                             <Icon name="Megaphone" size={14} /> 廣播指令
                           </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5 px-4 text-left">
                        <GlassCard className="p-6 border-l-4 border-l-cyan-500/50">
                            <p className="text-[10px] text-white/30 uppercase mb-1 font-mono tracking-widest">本週利潤預估</p>
                            <div className="text-3xl font-black font-mono text-cyan-400">${metrics.margin}</div>
                        </GlassCard>
                        <div className={`glass-card p-6 border-l-4 ${metrics.isAnomaly ? 'alert-pulse border-l-rose-500' : 'border-l-amber-500/50'}`}>
                            <p className="text-[10px] text-white/30 uppercase mb-1 font-mono tracking-widest">數據偏差案件</p>
                            <div className={`text-3xl font-black font-mono ${metrics.isAnomaly ? 'text-rose-500' : 'text-amber-400'}`}>
                                {metrics.isAnomaly ? '1' : '0'} <span className="text-xs text-white/20 italic">待查</span>
                            </div>
                        </div>
                        <GlassCard className="p-6 border-l-4 border-l-emerald-500/50">
                            <p className="text-[10px] text-white/30 uppercase mb-1 font-mono tracking-widest">人事穩定度</p>
                            <div className="text-3xl font-black font-mono text-emerald-400">92%</div>
                        </GlassCard>
                    </div>

                    <div className="glass-card p-8 mx-4">
                        <div className="flex justify-between items-center mb-6 border-b border-white/5 pb-4">
                            <h3 className="text-[10px] font-black text-cyan-400 uppercase tracking-widest flex items-center gap-2"><Icon name="Users" size={14}/> 司機與費率控制矩陣</h3>
                            <select value={selectedDriverId} onChange={e => setSelectedDriverId(e.target.value)} className="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs font-black text-cyan-400 outline-none">
                                {drivers.map(d => <option key={d.id} value={d.id} className="bg-black text-white">{d.name}</option>)}
                            </select>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div className="space-y-6">
                                <div className={`flex justify-between items-center p-4 rounded-2xl bg-black/40 border transition-all ${activeDriver.is_insured ? 'border-white/5' : 'border-rose-500/20 shadow-2xl'}`}>
                                   <div className="flex items-center gap-4 text-left">
                                      <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${activeDriver.is_insured ? 'bg-cyan-500/10 text-cyan-400' : 'bg-rose-500/10 text-rose-400'}`}><Icon name={activeDriver.is_insured ? 'ShieldCheck' : 'ShieldX'} size={20}/></div>
                                      <div><p className="text-sm font-bold text-white/90">{activeDriver.name}</p><p className="text-[9px] text-white/20 uppercase tracking-widest">{activeDriver.is_insured ? '勞健保已投報' : '外部承攬模式'}</p></div>
                                   </div>
                                   <div onClick={() => updateDriverData(activeDriver.id, 'is_insured', !activeDriver.is_insured)} className={`switch-matrix ${activeDriver.is_insured ? 'active' : ''}`}><div className="knob"></div></div>
                                </div>
                                <div className={`grid grid-cols-2 gap-4 transition-all ${!activeDriver.is_insured ? 'opacity-20 grayscale pointer-events-none' : ''}`}>
                                    <div className="space-y-2 text-left"><label className="text-[9px] text-white/40 uppercase font-bold">投保月額設定</label><input type="number" value={activeDriver.insurance_base} onChange={e => updateDriverData(activeDriver.id, 'insurance_base', parseInt(e.target.value))} className="manual-input" /></div>
                                    <div className="space-y-2 text-left"><label className="text-[9px] text-white/40 uppercase font-bold">加保人數</label><input type="number" value={activeDriver.person_count} onChange={e => updateDriverData(activeDriver.id, 'person_count', parseInt(e.target.value))} className="manual-input" /></div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 lg:border-l border-white/5 lg:pl-8">
                               <div className="space-y-2 text-left"><label className="text-[9px] text-white/40 uppercase font-bold">配送單價精算</label><input type="number" step="0.05" value={activeDriver.piece_unit_delivered} onChange={e => updateDriverData(activeDriver.id, 'piece_unit_delivered', parseFloat(e.target.value))} className="manual-input" /></div>
                               <div className="space-y-2 text-left"><label className="text-[9px] text-white/40 uppercase font-bold">回收單價精算</label><input type="number" step="0.05" value={activeDriver.piece_unit_returned} onChange={e => updateDriverData(activeDriver.id, 'piece_unit_returned', parseFloat(e.target.value))} className="manual-input !text-orange-400" /></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderAdmin = () => (
                <div className="space-y-6 animate-in fade-in duration-500 pb-24 pt-6 px-4 text-center">
                    <div className="flex justify-between items-center px-4">
                        <h2 className="text-2xl font-black uppercase text-white/80 tracking-tighter">稽核系統</h2>
                        <select value={selectedDriverId} onChange={e => setSelectedDriverId(e.target.value)} className="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs font-black text-cyan-400 outline-none">
                            {drivers.map(d => <option key={d.id} value={d.id} className="bg-black text-white">{d.name}</option>)}
                        </select>
                    </div>
                    <div className={`glass-card p-8 mx-4 space-y-6 relative overflow-hidden transition-all ${metrics.isAnomaly ? 'border-rose-500/40 alert-pulse' : ''}`}>
                        {!matrix.admin_rate_edit && (
                            <div className="absolute inset-0 z-10 bg-black/60 backdrop-blur-[3px] flex items-center justify-center p-6 text-center">
                               <div className="bg-rose-500/20 text-rose-500 px-8 py-4 rounded-full border border-rose-500/30 font-black uppercase text-xs tracking-widest shadow-2xl">費率由指揮官鎖定</div>
                            </div>
                        )}
                        <h3 className="text-xs font-black text-white/40 uppercase tracking-widest flex items-center gap-3"><Icon name="BadgeDollarSign" size={16}/> 核銷稽核二級覆核</h3>
                        <div className="grid grid-cols-2 gap-4 pt-2">
                           <div className="space-y-2 text-center">
                               <label className="text-[10px] text-white/30 uppercase block font-bold tracking-widest">核定配送數</label>
                               <input type="number" value={activeDriver.delivered} onChange={e => updateDriverData(selectedDriverId, 'delivered', parseInt(e.target.value)||0)} className="manual-input" />
                           </div>
                           <div className="space-y-2 text-center">
                               <label className="text-[10px] text-white/30 uppercase block font-bold tracking-widest">核定回收數</label>
                               <input type="number" value={activeDriver.returned} onChange={e => updateDriverData(selectedDriverId, 'returned', parseInt(e.target.value)||0)} className="manual-input !text-orange-400" />
                           </div>
                        </div>
                        <button onClick={() => showMsg("數據稽核同步完成")} className={`w-full py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl btn-tactile ${(!activeDriver.has_photo || matrix.kill_switch || metrics.isAnomaly) ? 'bg-white/5 text-white/10 grayscale' : 'bg-emerald-600 text-white shadow-emerald-900/40'}`}>確認核銷並入帳 (VERIFY)</button>
                    </div>
                </div>
            );

            const renderSentinel = () => (
                <div className="space-y-6 animate-in fade-in duration-500 pt-6 pb-32 px-4 text-center">
                    <div className="glass-card p-6 border-l-4 border-amber-500 shadow-amber-900/10 relative text-left">
                        <div className="flex items-center gap-3 mb-3 text-amber-400">
                            <Icon name="Bell" size={16} className="animate-bounce" />
                            <span className="text-[10px] font-black uppercase tracking-widest font-mono">系統公告</span>
                        </div>
                        <p className="text-sm font-bold text-white/95 italic">"{bulletin}"</p>
                    </div>
                    <div className="text-center pt-4">
                        <h2 className="text-2xl font-black tracking-widest text-white/90 uppercase italic font-mono">TERMINAL</h2>
                        <p className="text-[10px] text-white/30 tracking-[0.4em] uppercase mt-2 font-mono">{activeDriver.name}</p>
                    </div>
                    <div className="glass-card p-12 flex justify-around items-center mx-4">
                        {matrix.empire_dial ? (
                            <div className="flex gap-4 sm:gap-12 text-center w-full justify-center">
                                <EmpireDial value={activeDriver.delivered} label="配送數" color="#22d3ee" onChange={(v) => updateDriverData(selectedDriverId, 'delivered', v)} />
                                <EmpireDial value={activeDriver.returned} label="回收數" color="#fbbf24" onChange={(v) => updateDriverData(selectedDriverId, 'returned', v)} />
                            </div>
                        ) : (
                            <div className="py-12 flex flex-col items-center">
                                <Icon name="ShieldAlert" size={64} className="text-rose-500 mb-6 animate-pulse" /><p className="text-rose-500 text-xs font-black uppercase tracking-widest">操作已被遠端鎖定</p>
                            </div>
                        )}
                    </div>
                    <div className="px-4 space-y-4 pt-4">
                        <button onClick={() => showMsg("數據提交成功")} className="w-full btn-tactile py-6 rounded-2xl bg-cyan-600 text-white font-black text-xs uppercase tracking-[0.6em] shadow-xl shadow-cyan-900/20">提交數據 (COMMIT)</button>
                    </div>
                </div>
            );

            // ==========================================
            // 主頁面框架
            // ==========================================
            return (
                <div className="h-screen w-screen flex flex-col no-scrollbar relative font-sans overflow-hidden">
                    <GlobalStyles />
                    <div className="fixed -bottom-40 -right-40 w-96 h-96 bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
                    <div className="fixed -top-40 -left-40 w-96 h-96 bg-rose-500/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

                    {view === 'splash' && (
                        <div className="h-screen w-screen bg-black flex flex-col items-center justify-center scanner-active overflow-hidden">
                            <Icon name="Fingerprint" size={80} className="text-cyan-400 animate-pulse mb-8" />
                            <h2 className="text-2xl font-black tracking-[0.6em] text-white/90 uppercase italic text-center">在地物流有限公司</h2>
                            <p className="text-[10px] text-cyan-500/50 mt-4 font-mono uppercase tracking-[0.3em]">Alpha Core V3.0 Final Ready...</p>
                        </div>
                    )}

                    {view === 'login' && renderLogin()}

                    {view === 'core' && (
                        <React.Fragment>
                            <header className="px-6 pt-12 pb-4 flex justify-between items-center z-50 bg-gradient-to-b from-black to-transparent">
                                <div className="flex items-center gap-3">
                                    <Icon name="ShieldCheck" size={18} className="text-cyan-400/60" />
                                    <span className="text-[10px] font-black tracking-widest uppercase text-white/40 font-mono italic tracking-tighter">Supreme V92 v3.0</span>
                                </div>
                                <div className="flex items-center gap-4">
                                    <Icon name="Fingerprint" size={18} className={isVerified ? 'text-cyan-400 shadow-[0_0_10px_#22d3ee]' : 'text-white/10'} />
                                    <button onClick={() => {setView('login'); setIsVerified(false);}} className="text-white/20 hover:text-rose-500 transition-colors"><Icon name="LogOut" size={16} /></button>
                                </div>
                            </header>
                            
                            <main className="flex-1 overflow-y-auto no-scrollbar relative z-10 px-1">
                                {role === 'sovereign' && renderSovereign()}
                                {role === 'admin' && renderAdmin()}
                                {role === 'sentinel' && renderSentinel()}
                            </main>

                            <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50 animate-in slide-in-from-bottom duration-700">
                                <div className="glass-card !rounded-full p-1.5 flex justify-between shadow-2xl bg-black/60 border-white/10 backdrop-blur-[40px]">
                                    {[
                                        { id: 'sovereign', label: '決策指揮', icon: 'Eye' },
                                        { id: 'admin', label: '合規稽核', icon: 'Calculator' },
                                        { id: 'sentinel', label: '哨兵終端', icon: 'Truck' }
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setRole(tab.id)} className={`flex-1 py-3 rounded-full flex flex-col items-center gap-1 transition-all duration-300 btn-tactile ${role === tab.id ? 'bg-white text-black shadow-lg scale-100' : 'text-white/25 hover:text-white/40'}`}>
                                            <Icon name={tab.icon} size={16} strokeWidth={role === tab.id ? 3 : 2} />
                                            <span className="text-[9px] font-black uppercase tracking-tighter">{tab.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </nav>
                        </React.Fragment>
                    )}

                    {notification && (
                        <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[300] animate-in zoom-in duration-300">
                            <GlassCard className="px-8 py-4 border-cyan-500/50 bg-black/90 shadow-2xl">
                                <p className="text-sm font-bold text-cyan-400 tracking-widest uppercase flex items-center gap-3 font-mono">
                                    <Icon name="Bell" size={16} className="animate-pulse" /> {notification}
                                </p>
                            </GlassCard>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
