<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC 2026 指揮中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; font-weight: 900; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    .sig-canvas { background: #050505; border: 1px dashed #333; border-radius: 20px; touch-action: none; cursor: crosshair; }
    .camera-stream { width: 100%; height: 260px; background: #000; border-radius: 24px; object-fit: cover; border: 1px solid #3b82f6; }
    input, select { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; color: #3b82f6; font-weight: 900; width: 100%; outline: none; }
    .scroll-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 🖋️ 核心組件：數位簽名板 (修復觸控) ---
    const SignaturePad = ({ onSave }) => {
      const canvasRef = useRef(null);
      const [drawing, setDrawing] = useState(false);
      const [ctx, setCtx] = useState(null);

      useEffect(() => {
        const c = canvasRef.current;
        const x = c.getContext("2d");
        x.strokeStyle = "#3b82f6"; x.lineWidth = 4; x.lineCap = "round";
        setCtx(x);
      }, []);

      const getPos = (e) => {
        const r = canvasRef.current.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
      };

      return <canvas ref={canvasRef} width={300} height={150} className="sig-canvas w-full" 
        onTouchStart={(e)=>{e.preventDefault(); setDrawing(true); const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);}}
        onTouchMove={(e)=>{e.preventDefault(); if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();}}
        onTouchEnd={()=>{setDrawing(false); onSave(canvasRef.current.toDataURL());}}
      />;
    };

    function App() {
      const [view, setView] = useState('gate'); // gate, dash, payroll, leave, chat
      const [partners, setPartners] = useState([]);
      const [target, setTarget] = useState(null);
      const [snap, setSnap] = useState(null);
      const [wageBracket, setWageBracket] = useState(29500);
      const [family, setFamily] = useState(0);
      const videoRef = useRef(null);

      useEffect(() => {
        // 模擬數據獲取
        setPartners([
          {id: '1', name: '王大明', phone: '0912345678', del: 120, pkp: 45},
          {id: '2', name: '李小華', phone: '0987654321', del: 98, pkp: 30}
        ]);
      }, []);

      const startCam = async () => {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        if(videoRef.current) videoRef.current.srcObject = s;
      };

      const capture = () => {
        const c = document.createElement('canvas');
        c.width = 400; c.height = 300;
        c.getContext('2d').drawImage(videoRef.current, 0, 0, 400, 300);
        setSnap(c.toDataURL());
        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
      };

      if (view === 'gate') return (
        <div className="h-screen flex items-center justify-center p-8 bg-black">
          <div className="glass w-full max-w-sm p-12 rounded-[3.5rem] border-blue-500/20 border text-center shadow-2xl">
            <h1 className="text-3xl font-black text-blue-600 mb-10 italic">GGSOC_2026</h1>
            <button onClick={() => setView('dash')} className="w-full py-5 bg-blue-600 rounded-2xl font-black btn-active">啟動指揮權限</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen p-6 pb-32 scroll-hide">
          {/* Header */}
          <div className="flex justify-between items-end mb-8">
            <h2 className="text-2xl font-black italic">最高指揮中心</h2>
            <button onClick={()=>setView('chat')} className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-xl btn-active">🤖</button>
          </div>

          {/* 功能切換 */}
          <div className="flex gap-2 mb-8 bg-zinc-900 p-2 rounded-2xl">
            {['dash','payroll','leave'].map(t => (
              <button key={t} onClick={()=>setView(t)} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase ${view===t?'bg-blue-600':'text-zinc-500'}`}>{t}</button>
            ))}
          </div>

          {/* 1. 列表與下班結算拍照 */}
          {view === 'dash' && (
            <div className="space-y-4">
              {partners.map(p => (
                <div key={p.id} onClick={() => {setTarget(p); startCam();}} className="glass p-7 rounded-[2.5rem] flex justify-between items-center btn-active">
                  <div><h4 className="text-xl font-black italic">{p.name}</h4><p className="text-[10px] text-zinc-600">{p.phone}</p></div>
                  <div className="text-right"><p className="text-2xl font-black text-blue-500">{p.del+p.pkp}</p></div>
                </div>
              ))}
            </div>
          )}

          {/* 2. 薪資精算與雙向確認 */}
          {view === 'payroll' && target && (
            <div className="space-y-6 animate-[fadeIn_0.3s]">
              <div className="glass p-8 rounded-[3rem] border-emerald-500/20 border">
                <h3 className="text-xl font-black text-emerald-500 mb-6 italic">薪資條調閱: {target.name}</h3>
                <div className="space-y-4">
                   <select value={wageBracket} onChange={(e)=>setWageBracket(e.target.value)}><option value="29500">$29,500 (2026級距)</option></select>
                   <select value={family} onChange={(e)=>setFamily(e.target.value)}><option value="0">無眷屬</option><option value="1">1位家屬</option></select>
                   <div className="pt-4 border-t border-white/5 flex justify-between text-2xl text-emerald-400 font-black">
                     <span>實領</span><span>${(target.del*15 + target.pkp*10 - 1137 - (family*458)).toLocaleString()}</span>
                   </div>
                </div>
                <div className="grid grid-cols-2 gap-2 mt-8">
                   <button className="bg-emerald-600 py-4 rounded-xl text-[10px] font-black btn-active">✔️ 沒意見</button>
                   <button onClick={()=>setView('chat')} className="bg-rose-900/30 text-rose-500 py-4 rounded-xl text-[10px] font-black btn-active">❌ 有意見退回</button>
                </div>
              </div>
            </div>
          )}

          {/* 3. 萬事通隨扈視窗 (總裁隱身處) */}
          {view === 'chat' && (
            <div className="fixed inset-0 bg-black z-[999] p-6 flex flex-col">
               <div className="flex justify-between items-center mb-8">
                 <h3 className="text-xl font-black text-blue-500">萬事通_SERVICE</h3>
                 <button onClick={()=>setView('dash')} className="text-zinc-600 text-xs">EXIT</button>
               </div>
               <div className="flex-1 overflow-y-auto space-y-4 mb-6">
                 <div className="bg-zinc-900/50 p-5 rounded-2xl text-sm border-l-4 border-blue-600">您好，我是萬事通。系統已偵測到您的請求，請輸入指令。</div>
               </div>
               <div className="flex gap-2">
                 <input className="flex-1 bg-zinc-900 p-5 rounded-2xl text-sm" placeholder="輸入傳令..." />
                 <button className="bg-blue-600 px-8 rounded-2xl font-black italic btn-active">GO</button>
               </div>
            </div>
          )}

          {/* 拍照 Modal */}
          {target && view === 'dash' && !snap && (
            <div className="fixed inset-0 bg-black z-[9999] p-6 flex flex-col">
               <video ref={videoRef} autoPlay playsInline className="camera-stream mb-6" />
               <button onClick={capture} className="w-full py-6 bg-blue-600 rounded-3xl font-black text-xl btn-active">📸 拍下報表存證</button>
               <button onClick={()=>setTarget(null)} className="mt-4 text-zinc-600">取消</button>
            </div>
          )}

          {/* 簽名 Modal */}
          {snap && (
            <div className="fixed inset-0 bg-black z-[10000] p-6 flex flex-col overflow-y-auto">
               <img src={snap} className="w-full rounded-3xl mb-6 border border-white/10" />
               <div className="glass p-6 rounded-3xl mb-6">
                 <p className="text-[10px] text-zinc-500 mb-4 uppercase">決策確權簽章</p>
                 <SignaturePad onSave={()=>{}} />
               </div>
               <button onClick={()=>{setSnap(null); setTarget(null); alert('確權成功。');}} className="w-full py-6 bg-emerald-600 rounded-3xl font-black btn-active">🟢 提交存檔</button>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
