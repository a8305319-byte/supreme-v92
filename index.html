<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金耀智慧營運總部</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
    .gold-border { border: 1px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 1rem; font-weight: bold; outline: none; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: #f59e0b; color: black; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
    .btn-prime:active { transform: translateY(2px); }
    .ghost-input { background: transparent; border: none; outline: none; text-align: center; color: white; font-weight: bold;}
    .admin-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    .admin-table th { padding: 12px; background: rgba(0,0,0,0.4); color: #94a3b8; font-size: 12px; }
    .admin-table td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-online { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot-leave { background-color: #f43f5e; box-shadow: 0 0 8px #f43f5e; }
    .chat-bubble { padding: 12px 16px; border-radius: 16px; max-width: 80%; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
    .bubble-bot { background: rgba(255,255,255,0.1); color: white; align-self: flex-start; }
    .bubble-user { background: #f59e0b; color: black; align-self: flex-end; margin-left: auto; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // 模擬資料 (確保介面能渲染)
    const MOCK_PARTNERS = [
      { id: 'p_1', name: '王大明', phone: '0987654321', pin: '1111', total_del: 45, total_pkp: 12, work_status: 'online', custom_del_price: 15, custom_pkp_price: 10, labor_fee: 650, health_fee: 400 },
      { id: 'p_2', name: '李小華', phone: '0912345678', pin: '2222', total_del: 0, total_pkp: 0, work_status: 'leave', custom_del_price: 15, custom_pkp_price: 10, labor_fee: 650, health_fee: 400 }
    ];

    function App() {
      const [layer, setLayer] = useState('gate'); 
      const [toastMsg, setToastMsg] = useState("");
      const [currentUser, setCurrentUser] = useState(null);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 3000);
      };

      const handleLogin = (phone, pin) => {
        if (phone === "0976017938" && pin === "0531") {
          setLayer('admin');
          showToast("🔑 管理員登入成功");
        } else if (phone === "0987654321" && pin === "1111") {
          setCurrentUser(MOCK_PARTNERS[0]);
          setLayer('driver');
          showToast("🔑 夥伴登入成功");
        } else {
          alert("測試帳號：\n管理員：0976017938 / 0531\n司機：0987654321 / 1111");
        }
      };

      return (
        <div className="min-h-screen text-slate-200">
          <div className={`fixed left-1/2 -translate-x-1/2 bg-amber-500 text-black px-8 py-4 rounded-full font-black z-[10000] shadow-2xl transition-all duration-500 ${toastMsg ? 'top-[40px] opacity-100' : 'top-[-100px] opacity-0 pointer-events-none'}`}>
            {toastMsg}
          </div>
          
          {layer === 'gate' && <Gate onLogin={handleLogin} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={MOCK_PARTNERS} onLogout={() => setLayer('gate')} showToast={showToast} />}
          {layer === 'driver' && <DriverHub partner={currentUser} onLogout={() => setLayer('gate')} showToast={showToast} />}
          {layer === 'onboarding' && <OnboardingFlow setLayer={setLayer} />}
        </div>
      );
    }

    // --- 登入頁面 ---
    function Gate({ onLogin, setLayer }) {
      const [ph, setPh] = useState("");
      const [pin, setPin] = useState("");
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6">
          <div className="mb-12 text-center">
            <h1 className="text-7xl font-black text-white italic tracking-tighter mb-2">在地物流</h1>
            <p className="text-amber-500 text-[10px] tracking-[0.5em] font-black border border-amber-500/30 px-4 py-1.5 rounded-full inline-block">穩定展示版</p>
          </div>
          <div className="w-full max-w-[340px] space-y-5 font-bold">
            <div className="glass-panel p-8 rounded-[2.5rem] gold-border">
              <input type="tel" placeholder="手機 (試打:0976017938)" className="input-box" value={ph} onChange={e => setPh(e.target.value)} maxLength={10} />
              <input type="password" placeholder="PIN (試打:0531)" className="input-box" value={pin} onChange={e => setPin(e.target.value)} maxLength={4} />
              <button onClick={() => onLogin(ph, pin)} className="btn-prime italic tracking-widest mt-2">進入中心</button>
            </div>
            <button onClick={() => setLayer('onboarding')} className="w-full py-4 rounded-2xl border border-amber-500/30 text-amber-500 font-bold text-sm bg-slate-900">📋 司機面試：AI 實務對話</button>
          </div>
        </div>
      );
    }

    // --- 指揮中心 ---
    function AdminHub({ partners, onLogout, showToast }) {
      const [searchQuery, setSearchQuery] = useState("");
      
      const filtered = useMemo(() => {
        return partners.filter(p => p.name.includes(searchQuery) || p.phone.includes(searchQuery));
      }, [partners, searchQuery]);

      return (
        <div className="p-4 lg:p-10 max-w-[1200px] mx-auto overflow-x-auto">
          <div className="flex justify-between items-center mb-10">
            <h2 className="text-white font-black text-3xl md:text-5xl italic tracking-tighter">指揮中心</h2>
            <button onClick={onLogout} className="bg-slate-800 text-rose-500 px-4 py-2 rounded-xl text-xs font-black border border-rose-500/20">退出</button>
          </div>
          
          <div className="glass-panel p-4 rounded-[2rem] mb-6 flex items-center gap-4 gold-border">
            <input type="text" placeholder="🔍 搜尋姓名..." className="bg-slate-900 p-3 rounded-2xl border border-slate-700 text-white flex-1 outline-none" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}/>
          </div>

          <div className="glass-panel rounded-3xl overflow-hidden overflow-x-auto">
            <table className="admin-table">
              <thead>
                <tr><th>狀態</th><th>夥伴資訊</th><th>預計實領</th><th>功能</th></tr>
              </thead>
              <tbody>
                {filtered.map(p => {
                  const net = (p.total_del * p.custom_del_price) + (p.total_pkp * p.custom_pkp_price) - p.labor_fee - p.health_fee;
                  return (
                    <tr key={p.id}>
                      <td><span className={`status-dot ${p.work_status === 'leave' ? 'dot-leave' : 'dot-online'}`}></span></td>
                      <td className="text-left">
                        <span className="text-white font-black block">{p.name}</span>
                        <span className="text-slate-500 text-xs">{p.phone}</span>
                      </td>
                      <td className="text-amber-500 font-black italic">${net.toLocaleString()}</td>
                      <td><button onClick={() => showToast("✅ 資料已模擬儲存")} className="bg-amber-600 text-black px-3 py-1 rounded-lg text-xs font-black">儲存</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // --- 司機工作台 ---
    function DriverHub({ partner, onLogout, showToast }) {
      const [delCount, setDelCount] = useState("");
      const [pkpCount, setPkpCount] = useState("");

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[480px] text-center gold-border">
            <h2 className="text-3xl font-black text-white italic mb-2">夥伴工作台</h2>
            <p className="text-amber-500 text-xs mb-10 tracking-widest">{partner?.name} 您好</p>
            <div className="grid grid-cols-2 gap-4 mb-10">
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-white/5">
                <p className="text-[10px] text-sky-500 mb-2">今日配送</p>
                <input type="number" value={delCount} onChange={e=>setDelCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl" />
              </div>
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-white/5">
                <p className="text-[10px] text-orange-500 mb-2">今日逆收</p>
                <input type="number" value={pkpCount} onChange={e=>setPkpCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl" />
              </div>
            </div>
            <button onClick={() => showToast("🚀 數據報帳成功！")} className="btn-prime mb-10">🚀 提交今日數據</button>
            <button onClick={onLogout} className="text-rose-500 text-sm font-black underline underline-offset-8">🔒 安全登出系統</button>
          </div>
        </div>
      );
    }

    // --- AI 招募面試 ---
    function OnboardingFlow({ setLayer }) {
      const [messages, setMessages] = useState([{ type: 'bot', text: "您好！我是營運 AI 助手。這是緊急應變測試題：若發生車禍，處理順序是？" }]);
      return (
        <div className="h-screen flex flex-col p-6">
          <div className="flex justify-between mb-4"><h3 className="text-white">🤖 AI 招募評估</h3><button onClick={() => setLayer('gate')} className="text-slate-400">退出</button></div>
          <div className="flex-1 flex flex-col space-y-4">
            {messages.map((m, i) => <div key={i} className={`chat-bubble ${m.type === 'bot' ? 'bubble-bot' : 'bubble-user'}`}>{m.text}</div>)}
            <button onClick={() => setMessages([...messages, {type:'user', text:'1.報警 2.拍照'}, {type:'bot', text:'實務評估已完成！'}])} className="btn-prime mt-auto">回答並完成測試</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
