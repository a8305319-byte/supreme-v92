<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 V2 - 數位營運總控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: #0f172a; border-radius: 2rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #ffffff; outline: none; margin-bottom: 12px; text-align: center; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #ffffff; font-weight: 800; font-size: 18px; cursor: pointer; border: none; }
        
        /* 行政控盤表 - 增加滾動條樣式 */
        .admin-table th { font-size: 10px; color: #64748b; padding: 10px; border-bottom: 1px solid #1e293b; }
        .admin-table td { font-size: 11px; padding: 12px 8px; border-bottom: 1px solid #0f172a; }

        /* AI 燈號 */
        .status-pill { padding: 2px 8px; border-radius: 99px; font-size: 9px; font-weight: bold; border: 1px solid currentColor; }
        .safe { color: #4ade80; border-color: #166534; background: rgba(22, 101, 52, 0.1); }
        .warning { color: #facc15; border-color: #854d0e; background: rgba(133, 77, 14, 0.1); }
        .danger { color: #f87171; border-color: #7f1d1d; background: rgba(127, 29, 29, 0.1); }

        .loading-overlay { position: fixed; inset: 0; background: #020617; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <p class="text-sky-500 font-bold animate-pulse">數據同步中...</p>
    </div>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-black text-white italic mb-2">在地物流</h1>
        <p class="text-slate-600 text-[10px] tracking-[0.4em] mb-10">CORE OPERATIONS SYSTEM</p>
        
        <div class="w-full max-w-[320px] space-y-4">
            <div class="bg-slate-900 p-6 rounded-[2rem] border border-slate-800">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box">
                <input type="password" id="login_pin" placeholder="PIN 碼" class="input-box">
                <button onclick="window.boot()" class="btn-prime">進入系統</button>
            </div>
            <button onclick="window.showLayer('v2-interview')" class="w-full py-4 rounded-xl border border-sky-500 text-sky-500 font-bold">新夥伴：實務功能評估</button>
        </div>
    </div>

    <div id="admin" class="layer">
        <div class="w-full max-w-[1400px]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white font-black text-3xl italic">老闆行政總控</h2>
                <button onclick="location.reload()" class="text-xs text-slate-500 underline">登出</button>
            </div>
            <div class="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800">
                <table class="w-full admin-table text-center">
                    <thead>
                        <tr>
                            <th>狀態</th><th>姓名/手機</th><th>AI 風險評估</th><th>正/逆件</th><th>加保</th><th>2026 級距</th><th>應付淨額</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="v2-interview" class="layer">
        <div class="w-full max-w-[480px]">
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 border-b border-sky-900 pb-2 italic">夥伴實務職能評估</h2>
                
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="手機號碼" class="input-box" maxlength="10">

                <div class="space-y-6 text-left mt-6">
                    <div class="bg-slate-800/30 p-4 rounded-xl">
                        <p class="text-white text-sm font-bold mb-3">1. 配送時不慎擦撞路邊車輛，包裹沒損壞？</p>
                        <div class="space-y-2 text-xs">
                            <label class="block"><input type="radio" name="q1" value="25"> 報警拍照並即時回報公司</label>
                            <label class="block"><input type="radio" name="q1" value="0"> 沒事就先送完，晚上再說</label>
                        </div>
                    </div>
                    <div class="bg-slate-800/30 p-4 rounded-xl">
                        <p class="text-white text-sm font-bold mb-3">2. 發現包裹內容物有滲漏痕跡？</p>
                        <div class="space-y-2 text-xs">
                            <label class="block"><input type="radio" name="q2" value="25"> 拍照帶回站點，聯繫收件人</label>
                            <label class="block"><input type="radio" name="q2" value="0"> 裝不知道，送達簽收為止</label>
                        </div>
                    </div>
                    <div class="bg-slate-800/30 p-4 rounded-xl">
                        <p class="text-white text-sm font-bold mb-3">3. 客戶要求改送到不同地址（跨區）？</p>
                        <div class="space-y-2 text-xs">
                            <label class="block"><input type="radio" name="q3" value="25"> 請客戶聯繫客服，依規範改派</label>
                            <label class="block"><input type="radio" name="q3" value="10"> 私下幫忙送過去</label>
                        </div>
                    </div>
                    <div class="bg-slate-800/30 p-4 rounded-xl">
                        <p class="text-white text-sm font-bold mb-3">4. 配送中手機電量耗盡無法掃描包裹？</p>
                        <div class="space-y-2 text-xs">
                            <label class="block"><input type="radio" name="q4" value="25"> 找地方充電後過刷，確保數據即時</label>
                            <label class="block"><input type="radio" name="q4" value="5"> 先送完，隔天再請人工補錄</label>
                        </div>
                    </div>
                </div>

                <button onclick="window.submitInterview()" class="btn-prime mt-8">提交評估數據</button>
                <button onclick="window.hideAll()" class="w-full mt-4 text-xs text-slate-600">返回</button>
            </div>
        </div>
    </div>

    <div id="hub" class="layer">
        <div class="w-full max-w-[400px]">
            <h2 id="hub-name" class="text-3xl font-black text-white mb-8">夥伴工作台</h2>
            <div class="id-card">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><span class="text-[10px] block mb-1">配送正件</span><input type="number" id="rep_del" class="input-box text-2xl"></div>
                    <div><span class="text-[10px] block mb-1 text-orange-500">逆物流</span><input type="number" id="rep_rev" class="input-box text-2xl"></div>
                </div>
                <button onclick="window.submitReport()" class="btn-prime bg-green-600">提交今日報表</button>
                <button onclick="location.reload()" class="mt-6 text-xs text-slate-600 underline">登出帳號</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, deleteDoc, increment, serverTimestamp, collection, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const config = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const partnersCol = collection(db, 'artifacts', 'logistics-master-v92', 'public', 'data', 'partners');

        const SALARY_GRADES = [0, 29500, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800];
        let partners = [];
        let isReady = false;
        let activeUser = null;

        window.setLoad = (s) => document.getElementById('loading').style.display = s ? 'flex' : 'none';

        // 登入
        window.boot = () => {
            const ph = document.getElementById('login_phone').value.trim();
            const pi = document.getElementById('login_pin').value.trim();
            if(ph === "0976017938" && pi === "0531") return window.renderAdmin();
            const target = partners.find(x => x.phone === ph);
            if(target && target.status === "approved" && target.pin === pi) {
                activeUser = target;
                window.showLayer('hub');
                document.getElementById('hub-name').innerText = target.name;
            } else alert("資料錯誤或審核中");
        };

        // 行政渲染
        window.renderAdmin = () => {
            window.showLayer('admin');
            const target = document.getElementById('admin-render');
            let html = '';
            partners.forEach(p => {
                const isIns = p.ins_toggle !== false;
                const b = p.ins_base || 29500;
                const fm = p.ins_fm || 1;
                const totalIns = isIns ? Math.round(b * 0.025 + b * 0.01551 * fm) : 0;
                const income = (p.total_del || 0) * (p.custom_del || 15) + (p.total_rev || 0) * (p.custom_rev || 10);
                
                let riskClass = "safe";
                if(p.ai_analysis.includes("風險")) riskClass = "danger";
                if(p.ai_analysis.includes("培訓")) riskClass = "warning";

                html += `<tr>
                    <td>${p.status === 'approved' ? '✅' : `<button onclick="window.upField('${p.id}','status','approved')" class="text-[10px] bg-sky-600 px-2 rounded">核准</button>`}</td>
                    <td>${p.name}<br><small class="text-slate-500">${p.phone}</small></td>
                    <td><span class="status-pill ${riskClass}">${p.ai_analysis}</span></td>
                    <td>${p.total_del || 0}/${p.total_rev || 0}</td>
                    <td><button onclick="window.upField('${p.id}','ins_toggle',${!isIns})" class="text-[10px] ${isIns?'text-green-500':'text-red-500'}">${isIns?'開':'關'}</button></td>
                    <td>${b}</td>
                    <td class="text-sky-400 font-bold">$${income - totalIns}</td>
                    <td><button onclick="window.delPartner('${p.id}')">🗑️</button></td>
                </tr>`;
            });
            target.innerHTML = html;
        };

        // 提交面試 (含邏輯判定)
        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value.trim();
            const ph = document.getElementById('int_phone').value.trim();
            const q = [
                document.querySelector('input[name="q1"]:checked')?.value,
                document.querySelector('input[name="q2"]:checked')?.value,
                document.querySelector('input[name="q3"]:checked')?.value,
                document.querySelector('input[name="q4"]:checked')?.value
            ];
            if(!name || !ph || q.includes(undefined)) return alert("請填齊內容");

            const score = q.reduce((a, b) => parseInt(a) + parseInt(b), 0);
            let analysis = "✅ 穩定可靠";
            if(score < 50) analysis = "🚫 高度風險";
            else if(score < 80) analysis = "⚠️ 需再培訓";
            if(q[1] === "0") analysis += " | 🚩 誠信警示";

            window.setLoad(true);
            await setDoc(doc(partnersCol, `p_${ph}`), {
                id: `p_${ph}`, name, phone: ph, pin: "0000", status: "pending_review", 
                ai_analysis: analysis, total_del: 0, total_rev: 0, custom_del: 15, custom_rev: 10, 
                ins_base: 29500, ins_fm: 1, ins_toggle: true, createdAt: serverTimestamp()
            });
            alert("提交成功，預設 PIN 為 0000");
            location.reload();
        };

        window.submitReport = async () => {
            const d = parseInt(document.getElementById('rep_del').value) || 0;
            const r = parseInt(document.getElementById('rep_rev').value) || 0;
            await updateDoc(doc(partnersCol, activeUser.id), { total_del: increment(d), total_rev: increment(r) });
            alert("回報完成");
            document.getElementById('rep_del').value = ""; document.getElementById('rep_rev').value = "";
        };

        window.upField = async (id, f, v) => { await updateDoc(doc(partnersCol, id), { [f]: v }); };
        window.delPartner = async (id) => { if(confirm("確定刪除?")) await deleteDoc(doc(partnersCol, id)); };
        window.showLayer = id => { window.hideAll(); document.getElementById(id).style.display='flex'; };
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l=>l.style.display='none'); document.getElementById('gate').style.display='flex'; };

        (async () => {
            await signInAnonymously(auth);
            onSnapshot(partnersCol, s => {
                partners = s.docs.map(d => d.data());
                isReady = true;
                if(document.getElementById('admin').style.display === 'flex') window.renderAdmin();
                window.setLoad(false);
            });
        })();
    </script>
</body>
</html>
