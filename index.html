<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 旗艦中控台 V92</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 核心介面定義 */
        body { 
            background-color: #020617; 
            color: #94a3b8; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
        }
        
        .layer { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background-color: #020617; 
            z-index: 100; 
            flex-direction: column; 
            align-items: center; 
            padding: 24px; 
            overflow-y: auto; 
        }

        /* 老闆專用卡片樣式 */
        .id-card { 
            width: 100%; 
            max-width: 520px; 
            background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); 
            border-radius: 2rem; 
            padding: 28px; 
            border: 1px solid #1e293b; 
            margin-bottom: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* 專業輸入框定義 */
        .input-box { 
            background-color: rgba(15, 23, 42, 0.9); 
            border: 1px solid #334155; 
            border-radius: 1rem; 
            padding: 14px; 
            width: 100%; 
            color: #ffffff; 
            outline: none; 
            margin-bottom: 12px; 
            font-size: 15px; 
            transition: border 0.3s;
        }
        .input-box:focus { border-color: #0ea5e9; }

        /* 會計參數標籤 */
        .label-sky { 
            font-size: 13px; 
            color: #38bdf8; 
            font-weight: 800; 
            margin-bottom: 8px; 
            display: block; 
            margin-top: 14px;
            letter-spacing: 1px;
        }

        /* 旗艦按鈕 */
        .btn-prime { 
            width: 100%; 
            padding: 18px; 
            border-radius: 1.2rem; 
            background: #0ea5e9; 
            color: #020617; 
            font-weight: 900; 
            font-size: 17px; 
            cursor: pointer; 
            border: none;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }
        .btn-prime:active { transform: scale(0.97); opacity: 0.9; }

        /* 記住我選項 */
        .remember-wrap { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 24px; 
            width: 100%; 
            padding-left: 8px; 
        }
        .remember-wrap input { width: 20px; height: 20px; accent-color: #0ea5e9; cursor: pointer; }
        .remember-wrap label { font-size: 14px; color: #64748b; cursor: pointer; }

        /* 入職拍照網格 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .photo-slot { 
            background-color: #0f172a; 
            border: 2px dashed #334155; 
            border-radius: 16px; 
            height: 110px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
        }
        .photo-slot:hover { border-color: #0ea5e9; background-color: #1e293b; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* 照片審核牆 */
        .photo-wall { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 32px; }
        .photo-item { 
            position: relative; 
            aspect-ratio: 1; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid #1e293b;
        }
        .del-badge { 
            position: absolute; 
            top: 5px; 
            right: 5px; 
            background: rgba(239, 68, 68, 0.95); 
            color: #fff; 
            font-size: 10px; 
            padding: 3px 7px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 900;
        }

        /* 薪資條模板 */
        #slip-box { 
            position: absolute; 
            left: -9999px; 
            background: #ffffff; 
            color: #000000; 
            padding: 45px; 
            width: 420px; 
            border: 1px solid #eee; 
        }
        .slip-header { text-align: center; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 25px; }
        .slip-row { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding: 12px 0; font-size: 15px; }
        .v-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid #0ea5e9; color: #0ea5e9; margin-left: 6px; text-transform: uppercase; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.98); z-index: 300; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-3 tracking-tighter">SUPREME</h1>
        <p class="text-sky-500 text-xs font-black tracking-[0.4em] mb-14 uppercase">Enterprise Management V92</p>
        
        <div class="w-full max-w-[340px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center shadow-inner">
            <input type="password" id="login_pin" placeholder="登 入 密 碼 (PIN)" class="input-box text-center shadow-inner">
            
            <div class="remember-wrap">
                <input type="checkbox" id="remember_me">
                <label for="remember_me">記住帳號資訊 (下次自動填入)</label>
            </div>

            <button onclick="boot()" class="btn-prime">進入管理中控台</button>
            
            <button onclick="showApply()" class="text-xs text-slate-700 underline mt-12 block mx-auto uppercase font-bold tracking-widest hover:text-sky-500 transition-colors">
                Partner Registration / 夥伴入職申請入口
            </button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card">
            <h2 class="text-2xl font-black text-white mb-8 text-center italic tracking-tight">夥伴詳細入職申請表單</h2>
            
            <span class="label-sky">SECTION 1: 證件影像拍照上傳</span>
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-xs text-slate-500">身分證正面</span><img id="p_id_f"></div>
                <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-xs text-slate-500">身分證反面</span><img id="p_id_b"></div>
                <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-xs text-slate-500">駕駛執照</span><img id="p_lic"></div>
                <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-xs text-slate-500">行車執照</span><img id="p_car"></div>
                <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
            </div>

            <span class="label-sky">SECTION 2: 基本人事資料填寫</span>
            <input type="text" id="app_name" placeholder="真實姓名 (需與證件相符)" class="input-box">
            <input type="text" id="app_idnum" placeholder="身分證字號 (用於勞健保)" class="input-box">
            <input type="tel" id="app_phone" placeholder="聯絡手機號碼 (登入帳號)" class="input-box">
            <input type="password" id="app_pin" placeholder="自訂登入密碼 (建議4位數)" maxlength="4" class="input-box">
            
            <span class="label-sky">SECTION 3: 詳細聯繫資訊</span>
            <input type="text" id="app_h_addr" placeholder="戶籍完整地址" class="input-box">
            <input type="text" id="app_c_addr" placeholder="通訊地址 (若與戶籍相同免填)" class="input-box">
            <input type="text" id="app_emergency" placeholder="緊急聯絡人姓名與聯絡電話" class="input-box">
            
            <span class="label-sky">SECTION 4: 營運車種選擇</span>
            <select id="app_vehicle" class="input-box bg-[#0f172a] appearance-none">
                <option value="A機車">類型 A: 夥伴自有機車</option>
                <option value="B自有車">類型 B: 夥伴自有貨車/轎車</option>
                <option value="C公司車">類型 C: 公司提供租賃車</option>
            </select>
            
            <button onclick="submitApply()" class="btn-prime mt-6 shadow-sky-500/20 shadow-lg">提交所有入職資料</button>
            <button onclick="location.reload()" class="w-full mt-6 text-sm text-slate-500 text-center font-bold">返回登入介面</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-12 mb-16 text-slate-700 font-black text-xs underline uppercase tracking-[0.3em]">Sign Out / 登出管理系統</button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-10" id="detail-content"></div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-4 max-w-[520px] mx-auto block">關閉檔案</button>
    </div>

    <div id="slip-box">
        <div class="slip-header">
            <h2 style="margin:0; font-size: 24px; letter-spacing: 2px;">SUPREME 夥伴酬勞明細</h2>
            <p id="slip-date" style="margin:8px 0; font-size:12px; color:#555;"></p>
        </div>
        <div id="slip-body" style="margin-bottom: 20px;"></div>
        <div style="margin-top:20px; border-top: 3px solid #000; padding-top:15px; font-size:20px; font-weight:900; display:flex; justify-content:space-between; color: #000;">
            <span>本月實領金額總結</span>
            <span id="slip-total-val"></span>
        </div>
        <div style="text-align:center; margin-top:40px; font-size:10px; color:#aaa; border-top: 1px solid #eee; padding-top:10px;">
            SUPREME V92 智慧管理系統自動結算
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 資料庫初始化
        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], taskLogs = [], currentF = '', photos = {};
        
        // 即時資料監聽 (功能穩定度核心)
        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); });
        onSnapshot(collection(db, 'logs'), s => { taskLogs = s.docs.map(d => ({id: d.id, ...d.data()})); });

        // 記住我：初始化帶入
        window.addEventListener('DOMContentLoaded', () => {
            const sp = localStorage.getItem('s_phone'), si = localStorage.getItem('s_pin');
            if(sp && si) {
                document.getElementById('login_phone').value = sp;
                document.getElementById('login_pin').value = atob(si);
                document.getElementById('remember_me').checked = true;
            }
        });

        // 登入邏輯
        window.boot = () => {
            const phone = document.getElementById('login_phone').value, pin = document.getElementById('login_pin').value;
            const isRem = document.getElementById('remember_me').checked;

            if(isRem) { localStorage.setItem('s_phone', phone); localStorage.setItem('s_pin', btoa(pin)); }
            else { localStorage.removeItem('s_phone'); localStorage.removeItem('s_pin'); }

            // 老闆權限判斷
            if(phone === "0976017938" && pin === "0531") return renderAdmin();
            
            // 夥伴權限判斷
            const p = partners.find(x => x.phone === phone && x.uid === pin && x.status === "approved");
            if(p) return renderPartnerUI(p);
            
            alert("驗證失敗：手機號碼或 PIN 不正確，或帳號正等待老闆審核核准。");
        };

        // 入職影像處理函數
        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
        window.triggerCam = (f) => { currentF = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                photos[currentF] = e.target.result;
                const prev = document.getElementById('p_' + currentF);
                prev.src = e.target.result; 
                prev.style.display = 'block';
                document.getElementById('t_' + currentF).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };

        // 提交詳細入職申請
        window.submitApply = async () => {
            const data = {
                name: document.getElementById('app_name').value, 
                phone: document.getElementById('app_phone').value,
                uid: document.getElementById('app_pin').value, 
                id_num: document.getElementById('app_idnum').value,
                emergency: document.getElementById('app_emergency').value, 
                v_type: document.getElementById('app_vehicle').value,
                h_addr: document.getElementById('app_h_addr').value, 
                c_addr: document.getElementById('app_c_addr').value || document.getElementById('app_h_addr').value,
                docs: photos, 
                status: "pending", 
                rate_del: 50, rate_ret: 20, labor: 1500, health: 800, h_cnt: 1, 
                bonus: 0, penalty: 0, total_del: 0, total_ret: 0, 
                time: serverTimestamp()
            };
            if(!data.name || !data.phone || !data.id_num) return alert("請填寫姓名、身分證字號與手機號碼");
            await addDoc(collection(db, 'partners'), data);
            alert("申請資料已成功傳送至老闆中控台，請靜候核准。"); 
            location.reload();
        };

        // 老闆旗艦中控台渲染 (行數精華區)
        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved"), pending = partners.filter(x => x.status === "pending");
            
            let html = `<div class="w-full max-w-[520px] px-2"><h2 class="text-white font-black text-3xl mb-10 uppercase italic tracking-tighter">Boss Control Center</h2>`;
            
            // 影像牆模組
            html += `<p class="text-sky-500 font-bold text-[11px] mb-4 uppercase tracking-[0.2em]">影像審核中心 (點擊右上角刪除)</p>`;
            html += `<div class="photo-wall">${taskLogs.slice(-9).reverse().map(l => `
                <div class="photo-item">
                    <img src="${l.photo}" class="w-full h-full object-cover">
                    <div class="del-badge" onclick="window.delPhoto('${l.id}')">刪除影像</div>
                </div>`).join('')}</div>`;

            // 功能操作模組
            html += `<div class="flex gap-3 mb-12">
                <button onclick="window.monthlyReset()" class="flex-1 bg-red-900/20 text-red-500 border border-red-900/50 py-4 rounded-2xl text-[11px] font-black uppercase shadow-lg">月底結算歸零數據</button>
            </div>`;

            // 待審核列表
            if(pending.length > 0) {
                html += `<p class="text-orange-500 font-bold mb-4 text-xs uppercase tracking-widest">新入職待核准夥伴 (${pending.length})</p>`;
                html += pending.map(p => `
                    <div class="id-card !p-5 !bg-slate-900 mb-6 flex justify-between items-center border-orange-500/20">
                        <div><p class="text-white font-bold">${p.name}</p><p class="text-[10px] text-slate-500">${p.phone}</p></div>
                        <button onclick="window.finalApprove('${p.id}')" class="bg-sky-600 text-white px-6 py-2 rounded-xl text-xs font-bold shadow-sky-600/20 shadow-md">核准入職</button>
                    </div>`).join('');
            }

            // 會計與薪資明細列表 (補回缺失的勞健保欄位)
            html += `<p class="text-slate-600 font-bold text-[11px] uppercase mb-5 tracking-[0.2em]">夥伴會計結算明細與勞健保個別參數</p>`;
            html += approved.map(p => {
                const bonus = p.bonus || 0, penalty = p.penalty || 0;
                const r_del = p.rate_del || 50, r_ret = p.rate_ret || 20;
                const lab = p.labor || 1500, hea_u = p.health || 800, h_cnt = p.h_cnt || 1;
                const pay = (p.total_del * r_del) + (p.total_ret * r_ret) - lab - (h_cnt * hea_u) + bonus - penalty;
                
                return `
                <div class="id-card !p-6 !bg-slate-900/40 border-slate-800 mb-8">
                    <div class="flex justify-between items-start mb-6">
                        <div onclick="window.showPartnerDetail('${p.id}')" class="cursor-pointer">
                            <p class="text-white font-bold text-xl">${p.name} <span class="v-badge">${p.v_type}</span></p>
                            <p class="text-[11px] text-slate-500 underline mt-2">點擊查閱詳細人事檔案與證件</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sky-400 font-black text-2xl tracking-tighter">$${pay.toLocaleString()}</p>
                            <button onclick='window.downloadSlip(${JSON.stringify(p)})' class="text-[11px] text-sky-600 underline font-black uppercase mt-1">製作下載薪資單</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[10px] text-slate-600 uppercase font-bold">配送費率</label><input id="rd_${p.id}" type="number" value="${r_del}" class="input-box !py-2 !text-xs !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-slate-600 uppercase font-bold">逆物費率</label><input id="rr_${p.id}" type="number" value="${r_ret}" class="input-box !py-2 !text-xs !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-orange-600 uppercase font-bold">勞保扣款金額</label><input id="rl_${p.id}" type="number" value="${lab}" class="input-box !py-2 !text-xs !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-orange-600 uppercase font-bold">健保眷屬人數</label><input id="rh_${p.id}" type="number" value="${h_cnt}" class="input-box !py-2 !text-xs !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-green-600 uppercase font-bold">本月獎金/補貼</label><input id="bo_${p.id}" type="number" value="${bonus}" class="input-box !py-2 !text-xs !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-red-600 uppercase font-bold">本月扣處罰款</label><input id="pe_${p.id}" type="number" value="${penalty}" class="input-box !py-2 !text-xs !mb-0 shadow-inner"></div>
                    </div>

                    <div class="flex gap-2 mt-6">
                        <button onclick="window.updateFinance('${p.id}')" class="flex-1 bg-slate-800 text-sky-500 py-3 rounded-xl text-[11px] font-black border border-sky-900/50 uppercase">同步儲存會計參數</button>
                        <button onclick="window.delPartner('${p.id}')" class="px-3 text-red-900 text-[10px] underline uppercase">移除</button>
                    </div>
                </div>`;
            }).join('');
            
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // 行政管理核心功能 (刪除影像、移除夥伴、更新會計)
        window.delPhoto = async (id) => { if(confirm("確定要永久刪除此任務影像記錄嗎？")) await deleteDoc(doc(db, 'logs', id)); };
        window.delPartner = async (id) => { if(confirm("警告：此操作將永久刪除夥伴帳號、個人資料與薪資數據且無法恢復！")) await deleteDoc(doc(db, 'partners', id)); };
        
        window.updateFinance = async (id) => {
            await updateDoc(doc(db, 'partners', id), {
                rate_del: parseInt(document.getElementById('rd_'+id).value),
                rate_ret: parseInt(document.getElementById('rr_'+id).value),
                labor: parseInt(document.getElementById('rl_'+id).value),
                h_cnt: parseInt(document.getElementById('rh_'+id).value),
                bonus: parseInt(document.getElementById('bo_'+id).value),
                penalty: parseInt(document.getElementById('pe_'+id).value)
            });
            alert("會計數據更新成功，全系統已即時同步。"); 
            renderAdmin();
        };

        window.monthlyReset = async () => { 
            if(confirm("警告：月底結算歸零將清空所有夥伴的配送/逆物數據與本月獎懲。請確認已下載報表備份。")) {
                for(let p of partners) { await updateDoc(doc(db, 'partners', p.id), { total_del: 0, total_ret: 0, bonus: 0, penalty: 0 }); }
                alert("結算歸零完成，新月份數據統計已重置。"); 
                location.reload(); 
            }
        };

        // 人事詳細檔案展示
        window.showPartnerDetail = (id) => {
            const p = partners.find(x => x.id === id);
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `
                <h3 class="text-white font-black mb-6 border-b border-slate-800 pb-3 text-sm uppercase italic tracking-[0.2em]">Partner Personnel File</h3>
                <div class="text-xs text-slate-400 space-y-3 mb-10 leading-relaxed">
                    <p>姓名：<span class="text-white ml-2">${p.name}</span></p>
                    <p>證號：<span class="text-white ml-2">${p.id_num}</span></p>
                    <p>手機：<span class="text-white ml-2">${p.phone}</span></p>
                    <p>緊急聯繫：<span class="text-white ml-2">${p.emergency}</span></p>
                    <p>戶籍地址：<span class="text-white ml-2">${p.h_addr}</span></p>
                    <p>通訊地址：<span class="text-white ml-2">${p.c_addr}</span></p>
                </div>
                <p class="text-sky-500 font-black text-[10px] mb-3 uppercase italic">Digital Documents / 證件電子檔</p>
                <div class="grid grid-cols-2 gap-3">
                    <img src="${p.docs?.id_f}" class="rounded-xl border border-slate-800" onclick="window.open(this.src)" title="點擊放大">
                    <img src="${p.docs?.id_b}" class="rounded-xl border border-slate-800" onclick="window.open(this.src)" title="點擊放大">
                    <img src="${p.docs?.lic}" class="rounded-xl border border-slate-800" onclick="window.open(this.src)" title="點擊放大">
                    <img src="${p.docs?.car}" class="rounded-xl border border-slate-800" onclick="window.open(this.src)" title="點擊放大">
                </div>
            `;
        };

        // 下載電子薪資條圖片
        window.downloadSlip = async (p) => {
            const r_d = p.rate_del || 50, r_r = p.rate_ret || 20, lab = p.labor || 1500, hea = (p.h_cnt || 1) * (p.health || 800);
            const total = (p.total_del * r_d) + (p.total_ret * r_r) - lab - hea + (p.bonus || 0) - (p.penalty || 0);
            
            document.getElementById('slip-date').innerText = "結算期間：" + new Date().toLocaleDateString();
            document.getElementById('slip-body').innerHTML = `
                <div class="slip-row"><span>夥伴姓名</span><b>${p.name}</b></div>
                <div class="slip-row"><span>配送件數報酬</span><span>$${(p.total_del * r_d).toLocaleString()} (${p.total_del}件)</span></div>
                <div class="slip-row"><span>逆物件數報酬</span><span>$${(p.total_ret * r_r).toLocaleString()} (${p.total_ret}件)</span></div>
                <div class="slip-row"><span>本月加給/津貼</span><span>+$${(p.bonus || 0).toLocaleString()}</span></div>
                <div class="slip-row" style="color:#d00"><span>勞保費扣額項目</span><span>-$${lab.toLocaleString()}</span></div>
                <div class="slip-row" style="color:#d00"><span>健保費扣額項目</span><span>-$${hea.toLocaleString()}</span></div>
                <div class="slip-row" style="color:#d00"><span>其他扣處與罰金</span><span>-$${(p.penalty || 0).toLocaleString()}</span></div>
            `;
            document.getElementById('slip-total-val').innerText = "$" + total.toLocaleString();
            
            const box = document.getElementById('slip-box');
            box.style.left = "0"; 
            const canvas = await html2canvas(box, { scale: 3, backgroundColor: "#fff" }); 
            box.style.left = "-9999px";
            
            const link = document.createElement('a'); 
            link.download = `SUPREME薪資條_${p.name}_${new Date().getMonth()+1}月.png`; 
            link.href = canvas.toDataURL("image/png"); 
            link.click();
        };

        // 夥伴介面
        function renderPartnerUI(p) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card">
                    <h2 class="text-3xl font-black text-white mb-1">${p.name}</h2>
                    <p class="text-[11px] text-slate-500 uppercase italic tracking-widest mb-10">Operational Partner Hub</p>
                    
                    <div class="space-y-6">
                        <div><label class="label-sky">填寫今日配送件數</label><input type="number" id="dc" placeholder="0" class="input-box text-center text-2xl font-black text-sky-400"></div>
                        <div><label class="label-sky">填寫今日逆物流量</label><input type="number" id="rc" placeholder="0" class="input-box text-center text-2xl font-black text-orange-400"></div>
                        
                        <div class="pt-6 border-t border-slate-800">
                            <button onclick="window.sendJob('${p.id}')" class="btn-prime">確認回報並同步數據</button>
                        </div>
                    </div>
                </div>`;
        }

        window.sendJob = async (id) => {
            const d = parseInt(document.getElementById('dc').value) || 0, r = parseInt(document.getElementById('rc').value) || 0;
            const dummy = "https://via.placeholder.com/600/0ea5e9/ffffff?text=SUPREME+LOG+SUCCESS";
            await addDoc(collection(db, 'logs'), { driverId: id, photo: dummy, time: serverTimestamp() });
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("今天的數據已成功同步至系統中控台。"); 
            location.reload();
        };
        
        window.finalApprove = async (id) => { 
            await updateDoc(doc(db, 'partners', id), { status: "approved" }); 
            alert("夥伴入職核准完成。");
            renderAdmin(); 
        };
    </script>
</body>
</html>
