<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 職業夥伴數位中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2.5rem; padding: 30px; border: 1px solid #334155; margin-bottom: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #fff; outline: none; margin-bottom: 12px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 20px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-prime:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 10px; display: block; letter-spacing: 1px; text-transform: uppercase; border-left: 4px solid #0ea5e9; padding-left: 8px; margin-top: 20px; }
        .q-box { background: rgba(255,255,255,0.03); border: 1px solid #1e293b; padding: 15px; border-radius: 1.5rem; margin-bottom: 10px; }
        .opt-label { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 12px; font-size: 14px; transition: 0.2s; }
        .opt-label:hover { background: rgba(14, 165, 233, 0.1); }
        .opt-label input { width: 20px; height: 20px; accent-color: #0ea5e9; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-16 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">職業物流夥伴管理平台</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center">
                <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center">
                <button onclick="boot()" class="btn-prime w-full">進入系統</button>
            </div>
            
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest pt-8">── 職業夥伴引導 ──</p>
            <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border-2 border-sky-500 text-sky-400 font-black">一、職能適性評估 (4題測驗)</button>
            <button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border-2 border-slate-700 text-slate-500 font-black">二、正式入職資料補件</button>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 italic border-b-4 border-sky-500 pb-2">夥伴職能評估</h2>
                
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <span class="label-sky">應徵車種類型</span>
                <select id="int_v_type" class="input-box bg-slate-900 text-white font-bold" onchange="checkTruck(this.value)">
                    <option value="機車">機車配送夥伴</option>
                    <option value="貨車">貨車專業夥伴 (職業小型車以上)</option>
                </select>

                <div id="truck_box" class="hidden mb-6 p-4 bg-orange-900/20 border border-orange-500/30 rounded-2xl">
                    <label class="flex items-center gap-2 cursor-pointer text-white font-bold text-sm">
                        <input type="checkbox" id="pro_lic_check" class="w-5 h-5"> 我確認持有有效「職業駕照」
                    </label>
                </div>

                <span class="label-sky">1. 安全：配送途中輕微擦撞，你會？</span>
                <div class="q-box">
                    <label class="opt-label"><input type="radio" name="q1" value="1"> 報警、拍照存證並同步回報調度</label>
                    <label class="opt-label"><input type="radio" name="q1" value="0"> 趕快送完包裹，晚點再私下處理</label>
                </div>

                <span class="label-sky">2. 責任：遇突發大雨且載貨量大，你會？</span>
                <div class="q-box">
                    <label class="opt-label"><input type="radio" name="q2" value="1"> 確實覆蓋雨布，穿雨衣繼續配送</label>
                    <label class="opt-label"><input type="radio" name="q2" value="0"> 為了貨物不濕，先回站所暫緩配送</label>
                </div>

                <span class="label-sky">3. 誠信：代收貨款多了錢但不確定來源？</span>
                <div class="q-box">
                    <label class="opt-label"><input type="radio" name="q3" value="1"> 主動聯繫回報公司並上繳</label>
                    <label class="opt-label"><input type="radio" name="q3" value="0"> 先收著，如果沒人反應就當小費</label>
                </div>

                <span class="label-sky">4. 危機：車輛故障且還有 10 件急件？</span>
                <div class="q-box">
                    <label class="opt-label"><input type="radio" name="q4" value="1"> 第一時間回報公司，尋求鄰近支援</label>
                    <label class="opt-label"><input type="radio" name="q4" value="0"> 自行攔計程車去送，晚點再去修車</label>
                </div>

                <button onclick="submitInterview()" id="sub_btn" class="btn-prime w-full mt-6 shadow-xl">送出完整評估結果</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkTruck = (v) => { document.getElementById('truck_box').style.display = (v==='貨車')?'block':'none'; };

        window.submitInterview = async () => {
            const btn = document.getElementById('sub_btn');
            const name = document.getElementById('int_name').value;
            const phone = document.getElementById('int_phone').value;
            const vType = document.getElementById('int_v_type').value;

            // 抓取 4 題答案
            const q1 = document.querySelector('input[name="q1"]:checked')?.value;
            const q2 = document.querySelector('input[name="q2"]:checked')?.value;
            const q3 = document.querySelector('input[name="q3"]:checked')?.value;
            const q4 = document.querySelector('input[name="q4"]:checked')?.value;

            if(!name || !phone || !q1 || !q2 || !q3 || !q4) return alert("請完整填寫基本資料並完成 4 題評估！");
            
            if(vType === '貨車' && !document.getElementById('pro_lic_check').checked) {
                return alert("應徵貨車夥伴必須確認持有「職業駕照」！");
            }

            btn.disabled = true; btn.innerText = "正在傳送專業數據...";

            const finalScore = (parseInt(q1) + parseInt(q2) + parseInt(q3) + parseInt(q4)) * 25;

            try {
                await addDoc(collection(db, 'partners'), {
                    name, phone, v_type: vType, ai_score: finalScore, status: "interviewing", time: serverTimestamp()
                });
                alert(`評估完成！您的專業度評分為：${finalScore} 分。請等候審核。`);
                location.reload();
            } catch(e) { alert("提交失敗"); btn.disabled = false; btn.innerText = "送出完整評估結果"; }
        };

        window.showLayer = id => document.getElementById(id).style.display = 'flex';
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l => l.style.display='none'); };
    </script>
</body>
</html>
