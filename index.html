<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 營運管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2.5rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1.2rem; padding: 18px; width: 100%; color: #ffffff; outline: none; margin-bottom: 15px; font-size: 16px; text-align: center; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.5rem; background: #0ea5e9; color: #ffffff; font-weight: 800; font-size: 18px; cursor: pointer; border: none; transition: 0.1s; }
        .btn-prime:active { transform: scale(0.96); }
        
        /* 1:1 截圖還原：藍色虛線框 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .photo-slot { background: transparent; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-slot span { color: #64748b; font-size: 13px; font-weight: 500; }
        
        .divider-orange { width: 100%; height: 4px; background: #f97316; margin-bottom: 25px; border-radius: 99px; }
        .label-blue { font-size: 14px; color: #38bdf8; font-weight: bold; margin-bottom: 10px; display: block; text-align: left; }
        
        /* 管理後台表格 */
        .admin-table td { font-size: 11px; padding: 12px 4px; border-bottom: 1px solid #1e293b; }
        .btn-del { color: #ef4444; font-size: 10px; border: 1px solid #450a0a; padding: 2px 4px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 italic tracking-tighter">在地物流</h1>
        <div class="w-full max-w-[340px] mt-10">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box">
                <input type="password" id="login_pin" placeholder="PIN 碼 (管理員專用)" class="input-box">
                <div class="flex items-center justify-center gap-2 mb-6 text-sm text-slate-500">
                    <input type="checkbox" id="remember_me" class="w-4 h-4"> <label for="remember_me">記住我的手機號碼</label>
                </div>
                <button onclick="boot()" class="btn-prime w-full">進入系統</button>
            </div>
            <div class="pt-8 flex flex-col gap-3">
                <button onclick="showLayer('interview-page')" class="w-full py-3 rounded-2xl border border-sky-500 text-sky-400 font-bold">一、營運實務測驗</button>
                <div id="apply-lock-box">
                    <button disabled class="w-full py-3 rounded-2xl border border-slate-800 text-slate-700 font-bold">二、人事建檔 (測驗後開啟) 🔒</button>
                </div>
            </div>
        </div>
    </div>

    <div id="hub" class="layer">
        <div class="w-full max-w-[450px]">
            <h2 id="hub-name" class="text-4xl font-black text-white italic mb-10 text-center">夥伴工作台</h2>
            <div class="id-card">
                <h3 class="text-sky-400 font-black mb-4 border-b border-sky-900 pb-2 italic">每日數據回報</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="label-blue">配送件數(正)</span><input type="number" id="rep_del" placeholder="0" class="input-box"></div>
                    <div><span class="label-blue">逆物件數(逆)</span><input type="number" id="rep_rev" placeholder="0" class="input-box"></div>
                </div>
                <span class="label-blue">拍攝「配送總表 / 簽單明細」</span>
                <div class="photo-slot !h-32" onclick="triggerCam('rep_img')"><span id="t_rep_img">點擊拍照</span><img id="p_rep_img"></div>
                <button onclick="submitReport()" id="rep_btn" class="btn-prime mt-4 bg-green-600">提交報表數據</button>
            </div>
            <button onclick="location.reload()" class="text-slate-600 underline text-xs">登出</button>
        </div>
    </div>

    <div id="admin" class="layer">
        <div class="w-full max-w-[950px]">
            <h2 class="text-white font-black text-3xl mb-10 border-l-8 border-sky-500 pl-4 uppercase italic">老闆行政總控台</h2>
            <div class="bg-slate-900 p-4 rounded-3xl overflow-x-auto border border-slate-800 shadow-2xl">
                <table class="w-full text-left admin-table">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr><th>狀態/核准</th><th>姓名</th><th>正向/逆物</th><th>單價(正/逆)</th><th>應付淨額</th><th>總表</th><th>管理</th></tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="mt-10 text-slate-500 underline text-xs italic">退出總控中心</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-2 italic">入職與勞資建檔</h2>
                <div class="divider-orange"></div>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">車輛行照</span><img id="p_car"></div>
                </div>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">
                <div class="flex gap-2"><input type="text" id="app_bc" placeholder="代碼" class="input-box w-1/3"><input type="text" id="app_ba" placeholder="銀行帳號" class="input-box w-2/3"></div>
                <input type="password" id="app_pin" placeholder="設定 4 位登入 PIN 碼" maxlength="4" class="input-box">
                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-sky-600 mt-4 shadow-xl">提交完整資料</button>
            </div>
            <button onclick="hideAll()" class="text-slate-600 text-xs">← 返回首頁</button>
        </div>
    </div>

    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, deleteDoc, increment, serverTimestamp, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let partners = [], currentUser = null, photosCache = {};

        window.onload = () => {
            const saved = localStorage.getItem('login_phone');
            if(saved) { document.getElementById('login_phone').value = saved; document.getElementById('remember_me').checked = true; }
        };

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(document.getElementById('remember_me').checked) localStorage.setItem('login_phone', ph);
            else localStorage.removeItem('login_phone');

            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            currentUser = partners.find(x => x.phone === ph);
            if(!currentUser) return alert("手機號碼尚未參與測驗");
            if(currentUser.status === "approved") {
                document.getElementById('gate').style.display='none'; document.getElementById('hub').style.display='flex';
                document.getElementById('hub-name').innerText = `夥伴 ${currentUser.name}`;
            } else if(currentUser.status === "interviewed") {
                document.getElementById('apply-lock-box').innerHTML = `<button onclick="showLayer('apply-page')" class="w-full py-3 rounded-2xl border border-orange-500 text-orange-500 font-bold shadow-lg">二、人事建檔 (已開啟)</button>`;
                alert("營運評估通過！請點擊橘色按鈕建檔。");
            } else { alert("審核中，請等候通知。"); }
        };

        function renderAdmin() {
            document.getElementById('gate').style.display='none'; document.getElementById('admin').style.display='flex';
            let html = '';
            partners.forEach(p => {
                const dp = p.custom_del || 15; const rp = p.custom_rev || 10;
                const net = ((p.total_del || 0) * dp) + ((p.total_rev || 0) * rp);
                html += `
                <tr class="border-b border-slate-800">
                    <td class="p-2">
                        ${p.status==='pending_review'?`<button onclick="upStat('${p.id}','interviewed')" class="bg-sky-600 px-2 rounded-md">核准測驗</button>`:''}
                        ${p.status==='pending'?`<button onclick="upStat('${p.id}','approved')" class="bg-green-600 px-2 rounded-md">開通營運</button>`:''}
                    </td>
                    <td class="font-bold">${p.name}</td>
                    <td>${p.total_del||0} / ${p.total_rev||0}</td>
                    <td>
                        <input type="number" value="${dp}" onchange="updP('${p.id}','custom_del',this.value)" class="w-8 bg-slate-800 text-center"> / 
                        <input type="number" value="${rp}" onchange="updP('${p.id}','custom_rev',this.value)" class="w-8 bg-slate-800 text-center">
                    </td>
                    <td class="text-sky-400 font-bold">$${net}</td>
                    <td>${p.last_report ? `<img src="${p.last_report}" class="w-6 h-6 rounded cursor-pointer" onclick="window.open(this.src)">` : '-'}</td>
                    <td><span class="btn-del" onclick="delP('${p.id}','${p.name}')">🗑️ 刪除</span></td>
                </tr>`;
            });
            document.getElementById('admin-render').innerHTML = html;
        }

        window.upStat = async (id, s) => { await updateDoc(doc(db, 'partners', id), { status: s }); alert("狀態已更新"); };
        window.updP = async (id, f, v) => { await updateDoc(doc(db, 'partners', id), { [f]: parseFloat(v) }); renderAdmin(); };
        window.delP = async (id, n) => { if(confirm(`確定刪除 ${n} 嗎？`)) { await deleteDoc(doc(db, 'partners', id)); alert("已移除"); } };
        window.submitReport = async () => { /* 提交邏輯... */ };
        window.showLayer = id => { hideAll(); document.getElementById(id).style.display='flex'; };
        window.hideAll = () => document.querySelectorAll('.layer').forEach(l=>l.style.display='none');
        window.triggerCam = f => { window.currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = i => { const r = new FileReader(); r.onload = e => { photosCache[window.currentImgField] = e.target.result; const p = document.getElementById('p_'+window.currentImgField); p.src = e.target.result; p.style.display='block'; document.getElementById('t_'+window.currentImgField).style.display='none'; }; r.readAsDataURL(i.files[0]); };
    </script>
</body>
</html>
