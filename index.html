<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>在地物流 - GGSOC 終極完全體</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #020617; color: white; margin: 0; padding: 0; min-height: 100vh; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-zoom { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    // 🚀 核心大腦匯入
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, doc, setDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    const { useState, useEffect, useRef, useMemo } = React;
    const createRoot = ReactDOM.createRoot;

    // 🌟 Firebase 配置
    const firebaseConfig = { 
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
      authDomain: "supreme-v92.firebaseapp.com", 
      projectId: "supreme-v92", 
      storageBucket: "supreme-v92.firebasestorage.app", 
      messagingSenderId: "485530156296", 
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
    };
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()}) });
    const auth = getAuth(app);
    const appId = 'ggsoc-trinity-master-v1';

    // 🤖 AI 總裁特助組件
    const LocalLogisticsAI = ({ data }) => {
      const [q, setQ] = useState("");
      const [ans, setAns] = useState("");
      const [loading, setLoading] = useState(false);
      const [show, setShow] = useState(false);

      const diagnostic = async () => {
  setLoading(true);
  try {
    const genAI = new GoogleGenerativeAI("AIzaSyC1gz8HGm75lp_tR55UGDuETDuU8dAKMLo");
    const model = genAI.getGenerativeModel({ 
      model: "gemini-1.5-flash",
      systemInstruction: "你是在地物流的老闆特助。請分析數據並回報：1. 今日 COD 總金額。2. 異常司機名單與原因。3. 表現最穩定的前三名。請用條列式，語氣要精煉、霸氣，像是在跟總裁匯報。"
    });
    // 這裡我多幫你加了一個安全檢查，防止 data 是空的
    const res = await model.generateContent(`目前全體司機數據快照：${JSON.stringify(data || [])}`);
    setAns(res.response.text());
  } catch (e) {
    setAns("報告總裁：AI 能量不足，請檢查連線或金鑰。");
  }
  setLoading(false);
};
      if (!show) return <button onClick={() => setShow(true)} style={{ position: 'fixed', bottom: '100px', right: '20px', zIndex: 99999, background: '#3b82f6', color: '#fff', width: '50px', height: '50px', borderRadius: '50%', border: 'none', fontSize: '24px', boxShadow: '0 4px 15px rgba(0,0,0,0.5)' }}>🤖</button>;

      return (
        <div className="animate-zoom" style={{ position: 'fixed', bottom: '100px', right: '20px', zIndex: 99999, width: '280px', background: '#1e293b', border: '1px solid #3b82f6', borderRadius: '20px', padding: '15px', color: '#fff', boxShadow: '0 10px 30px rgba(0,0,0,0.6)' }}>
          <div className="flex justify-between items-center mb-3">
            <span className="text-xs text-blue-400 font-bold">GGSOC AI 助理</span>
            <button onClick={() => setShow(false)} className="text-slate-400">✕</button>
          </div>
          <input className="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-white text-sm mb-2" value={q} onChange={e => setQ(e.target.value)} placeholder="分析數據..." />
          <button onClick={askAI} className="w-full py-2 bg-blue-600 rounded-lg font-bold text-sm" disabled={loading}>{loading ? "..." : "問 AI"}</button>
          {ans && <div className="mt-3 text-[11px] bg-black/30 p-2 rounded-lg max-h-32 overflow-y-auto leading-relaxed border border-white/5">{ans}</div>}
        </div>
      );
    };

    // 🛡️ 錯誤攔截器
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError() { return { hasError: true }; }
      render() {
        if (this.state.hasError) return <div className="h-screen bg-slate-950 text-white flex flex-col items-center justify-center p-10 text-center"><h2 className="text-2xl text-rose-500 mb-4">🛡️ 核心保護啟動</h2><button onClick={() => window.location.reload()} className="bg-rose-600 px-6 py-3 rounded-xl">重啟系統</button></div>;
        return this.props.children;
      }
    }

    // 🚐 司機端與管理端邏輯 (精簡版)
    function AppWrapper() {
      const [u, setU] = useState(null);
      const [l, setL] = useState('gate');
      const [ps, setPs] = useState([]);
      const [role, setRole] = useState('guest');

      useEffect(() => {
        onAuthStateChanged(auth, (user) => { if(user) setU(user); });
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'partners'), (s) => {
          setPs(s.docs.map(d => ({ id: d.id, ...d.data() })));
        });
      }, []);

      const handleLogin = (phone, pin) => {
        if (phone === "0976017938" && pin === "8305319") { setRole('super_admin'); setL('admin'); }
        else {
          const p = ps.find(x => x.phone === phone && x.pin === pin);
          if (p) { setRole('driver'); setL('driver'); }
          else alert("登入失敗");
        }
      };

      return (
        <div className="relative min-h-screen bg-[#020617]">
          <LocalLogisticsAI data={ps} />
          {l === 'gate' && <div className="h-screen flex flex-col items-center justify-center p-8">
            <h1 className="text-5xl italic font-black mb-10">在地物流</h1>
            <input id="lp" type="tel" placeholder="手機" className="w-full max-w-xs bg-slate-900 p-4 rounded-xl mb-4 border border-white/10" />
            <input id="li" type="password" placeholder="PIN" className="w-full max-w-xs bg-slate-900 p-4 rounded-xl mb-6 border border-white/10" />
            <button onClick={() => handleLogin(document.getElementById('lp').value, document.getElementById('li').value)} className="w-full max-w-xs bg-blue-600 py-4 rounded-xl font-bold">進入系統</button>
          </div>}
          {l === 'admin' && <div className="p-8"><h2 className="text-3xl italic text-amber-500">👑 營運總部</h2><div className="mt-8 grid gap-4">{ps.map(p => <div key={p.id} className="glass-panel p-4 rounded-2xl">{p.name} - {p.phone}</div>)}</div></div>}
          {l === 'driver' && <div className="p-8 flex flex-col items-center"><h2 className="text-3xl italic">🚐 工作台</h2><p className="mt-10 text-slate-500 italic">系統運行中，請於下班前報帳</p></div>}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<ErrorBoundary><AppWrapper /></ErrorBoundary>);
  </script>
</body>
</html>
