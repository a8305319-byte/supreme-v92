<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 旗艦經營中控台 V92-Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* [0] 全系統樣式定義 - 全展開模式 */
        body { background-color: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; overflow-x: hidden; }
        .layer { display: none; position: fixed; inset: 0; background-color: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; transition: all 0.4s ease; }
        .id-card { width: 100%; max-width: 580px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 3rem; padding: 45px; border: 1px solid #1e293b; margin-bottom: 35px; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1); position: relative; }
        .input-box { background-color: rgba(15, 23, 42, 0.98); border: 2px solid #334155; border-radius: 1.3rem; padding: 22px; width: 100%; color: #ffffff; outline: none; margin-bottom: 22px; font-size: 17px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-box:focus { border-color: #0ea5e9; box-shadow: 0 0 25px rgba(14, 165, 233, 0.4); background-color: #0f172a; }
        .label-sky { font-size: 15px; color: #38bdf8; font-weight: 900; margin-bottom: 15px; display: block; margin-top: 25px; letter-spacing: 2.5px; text-transform: uppercase; }
        .btn-prime { width: 100%; padding: 24px; border-radius: 1.6rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 19px; cursor: pointer; border: none; box-shadow: 0 18px 30px -5px rgba(14, 165, 233, 0.6); transition: all 0.3s ease; }
        .btn-prime:active { transform: scale(0.94); opacity: 0.92; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 18px; margin-bottom: 35px; }
        .photo-slot { background-color: #0f172a; border: 2.5px dashed #334155; border-radius: 24px; height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; transition: all 0.3s ease; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-wall { display: grid; grid-template-cols: repeat(3, 1fr); gap: 15px; width: 100%; margin-bottom: 45px; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: 14px; overflow: hidden; border: 1px solid #1e293b; }
        .del-badge { position: absolute; top: 8px; right: 8px; background: rgba(220, 38, 38, 0.98); color: #ffffff; font-size: 10px; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-weight: 900; z-index: 100; }
        #slip-box { position: absolute; left: -9999px; background: #ffffff; color: #000000; padding: 65px; width: 550px; border: 1.5px solid #ccc; border-radius: 12px; }
        .slip-header { text-align: center; border-bottom: 6px solid #000; padding-bottom: 30px; margin-bottom: 45px; }
        .slip-row { display: flex; justify-content: space-between; border-bottom: 1.8px solid #eeeeee; padding: 18px 0; font-size: 19px; }
        .v-badge { font-size: 12px; padding: 5px 15px; border-radius: 99px; border: 1.5px solid #0ea5e9; color: #0ea5e9; margin-left: 12px; font-weight: 900; background: rgba(14,165,233,0.15); text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.99); z-index: 1000; padding: 24px; overflow-y: auto; }
        .finance-detail { font-size: 12px; color: #64748b; margin-top: 4px; display: block; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-9xl font-black text-white italic mb-5 tracking-tighter">SUPREME</h1>
        <p class="text-sky-500 text-base font-black tracking-[0.7em] mb-24 uppercase italic underline decoration-sky-600 decoration-4">Elite Control Hub V92</p>
        <div class="w-full max-w-[400px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center">
            <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center">
            <div class="flex items-center gap-3 mb-8 ml-3"><input type="checkbox" id="remember_me" class="w-6 h-6"><label for="remember_me">記住登入帳密</label></div>
            <button onclick="boot()" class="btn-prime">進入系統中控台</button>
            <button onclick="showApply()" class="text-base text-slate-600 underline mt-20 block mx-auto font-black uppercase tracking-[0.3em]">Partner Onboarding</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card shadow-sky-500/20">
            <h2 class="text-4xl font-black text-white mb-10 text-center italic border-b-4 border-sky-500 pb-4">詳細入職申請</h2>
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-xs">身分證正面</span><img id="p_id_f"></div>
                <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-xs">身分證反面</span><img id="p_id_b"></div>
                <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-xs">夥伴駕照</span><img id="p_lic"></div>
                <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-xs">營運行照</span><img id="p_car"></div>
                <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
            </div>
            <input type="text" id="app_name" placeholder="中文全名" class="input-box">
            <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
            <input type="tel" id="app_phone" placeholder="登入手機" class="input-box">
            <input type="password" id="app_pin" placeholder="自訂 PIN" maxlength="4" class="input-box">
            <input type="text" id="app_addr" placeholder="完整戶籍地址" class="input-box">
            <input type="text" id="app_emer" placeholder="緊急聯絡人/電話" class="input-box">
            <button onclick="submitApply()" class="btn-prime mt-6">確認提交申請</button>
            <button onclick="location.reload()" class="w-full mt-6 text-slate-500">返回登入</button>
        </div>
    </div>

    <div id="edit-page" class="layer">
        <div class="id-card shadow-orange-500/20 border-orange-900/20">
            <h2 class="text-4xl font-black text-white mb-10 text-center italic border-b-8 border-orange-600 pb-5">✏️ 修改夥伴人事資料</h2>
            <div id="edit-form">
                <label class="label-sky">修改姓名</label><input type="text" id="edit_name" class="input-box">
                <label class="label-sky">修改帳號 (手機)</label><input type="tel" id="edit_phone" class="input-box">
                <label class="label-sky">重設密碼 (PIN)</label><input type="text" id="edit_pin" class="input-box">
                <label class="label-sky">修改身分證號</label><input type="text" id="edit_idnum" class="input-box">
                <label class="label-sky">修改詳細地址</label><input type="text" id="edit_addr" class="input-box">
                <label class="label-sky">修改緊急聯絡人</label><input type="text" id="edit_emer" class="input-box">
            </div>
            <button onclick="window.commitPersonnelUpdate()" class="btn-prime !bg-orange-600 !text-white shadow-orange-600/30">確認修正內容並存檔</button>
            <button onclick="document.getElementById('edit-page').style.display='none'" class="w-full mt-8 text-sm text-slate-500 font-bold uppercase underline">放棄修改返回</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-28 mb-44 text-slate-700 font-black text-sm underline uppercase hover:text-red-600 transition-all">安全登出 SUPREME 中控台</button>
    </div>

    <div id="detail-modal" class="modal"><div class="id-card mx-auto mt-16 shadow-sky-500/30" id="detail-content"></div><button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-12 max-w-[580px] mx-auto block font-black border-2 border-slate-700">CLOSE</button></div>

    <div id="slip-box">
        <div class="slip-header"><h2 style="margin:0; font-size: 32px; font-weight: 950; letter-spacing: 10px;">SUPREME 酬勞結算明細</h2><p id="slip-date" style="margin:15px 0; font-size:16px; color:#222; font-weight: 900; border: 3px solid #000; display: inline-block; padding: 4px 15px;"></p></div>
        <div id="slip-body"></div>
        <div style="margin-top:50px; border-top: 10px double #000; padding-top:30px; font-size:28px; font-weight:950; display:flex; justify-content:space-between; color: #000; background: #ffffd0; padding: 15px;"><span>本月結算應領實額</span><span id="slip-total-val" style="border-bottom: 4px solid #000;"></span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], taskLogs = [], curImgField = '', globalEditId = '', photosCache = { id_f: null, id_b: null, lic: null, car: null };

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });
        onSnapshot(collection(db, 'logs'), s => { taskLogs = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.addEventListener('DOMContentLoaded', () => {
            const sp = localStorage.getItem('s_p'), si = localStorage.getItem('s_i');
            if(sp && si) { document.getElementById('login_phone').value = sp; document.getElementById('login_pin').value = atob(si); document.getElementById('remember_me').checked = true; }
        });

        window.boot = () => {
            const ph = document.getElementById('login_phone').value, pi = document.getElementById('login_pin').value, rm = document.getElementById('remember_me').checked;
            if(rm) { localStorage.setItem('s_p', ph); localStorage.setItem('s_i', btoa(pi)); }
            else { localStorage.removeItem('s_p'); localStorage.removeItem('s_i'); }
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderPartner(p);
            alert("驗證錯誤：手機、PIN 不正確或帳號尚未開通。");
        };

        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
        window.triggerCam = (f) => { curImgField = f; document.getElementById('cam').click(); };
        window.handleFile = (i) => {
            const r = new FileReader(); r.onload = (e) => { photosCache[curImgField] = e.target.result; const p = document.getElementById('p_' + curImgField); p.src = e.target.result; p.style.display = 'block'; document.getElementById('t_' + curImgField).style.display = 'none'; };
            r.readAsDataURL(i.files[0]);
        };

        window.submitApply = async () => {
            const n = document.getElementById('app_name').value, ph = document.getElementById('app_phone').value, pi = document.getElementById('app_pin').value, id = document.getElementById('app_idnum').value;
            if(!n || !ph || !pi || !id) return alert("核心人事資料為必填！");
            const data = { name: n, phone: ph, uid: pi, id_num: id, h_addr: document.getElementById('app_addr').value, emergency: document.getElementById('app_emer').value, v_type: document.getElementById('app_vehicle').value, docs: photosCache, status: "pending", rate_del: 50, rate_ret: 20, labor_fee: 1500, health_fee: 800, health_cnt: 1, bonus: 0, penalty: 0, total_del: 0, total_ret: 0, time: serverTimestamp() };
            await addDoc(collection(db, 'partners'), data); alert("申請已提交中控台，請等待老闆核准。"); location.reload();
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved"), pending = partners.filter(x => x.status === "pending");
            
            let html = `<div class="w-full max-w-[550px] px-2"><h2 class="text-white font-black text-6xl mb-14 uppercase italic border-l-[15px] border-sky-500 pl-8">Elite Admin</h2>`;
            html += `<p class="text-sky-500 font-black text-[13px] mb-6 uppercase tracking-[0.4em]">LIVE AUDIT / 影像審核牆</p>`;
            html += `<div class="photo-wall">${taskLogs.slice(-12).reverse().map(l => `<div class="photo-item"><img src="${l.photo}" class="w-full h-full object-cover"><div class="del-badge" onclick="window.delLog('${l.id}')">移除</div></div>`).join('')}</div>`;
            html += `<div class="flex gap-4 mb-20"><button onclick="window.globalReset()" class="flex-1 bg-red-900/30 text-red-500 border border-red-900/60 py-7 rounded-3xl text-[12px] font-black uppercase">月底結算數據歸零</button></div>`;

            if(pending.length > 0) {
                html += `<p class="text-orange-500 font-black mb-6 uppercase tracking-widest">待核准名單 (${pending.length})</p>`;
                pending.forEach(p => { html += `<div class="id-card !p-8 !bg-slate-900 mb-10 flex justify-between items-center border-orange-500/40 border-2"><div><p class="text-white font-black text-2xl">${p.name}</p></div><button onclick="window.approveReq('${p.id}')" class="bg-sky-600 text-white px-12 py-4 rounded-2xl text-base font-black shadow-sky-600/40 shadow-xl">核准入職</button></div>`; });
            }

            html += `<p class="text-slate-600 font-black text-[13px] uppercase mb-10 tracking-[0.3em]">Accounting & HR Hub</p>`;
            approved.forEach(p => {
                const pay = (p.total_del*(p.rate_del||50))+(p.total_ret*(p.rate_ret||20))-(p.labor_fee||1500)-((p.health_cnt||1)*(p.health_fee||800))+(p.bonus||0)-(p.penalty||0);
                html += `
                <div class="id-card !p-10 !bg-slate-900/60 border-slate-800 mb-16 shadow-2xl">
                    <div class="flex justify-between items-start mb-10">
                        <div onclick="window.viewProfile('${p.id}')" class="cursor-pointer group"><p class="text-white font-black text-3xl group-hover:text-sky-400 transition-colors">${p.name} <span class="v-badge">${p.v_type}</span></p><p class="text-[12px] text-slate-500 underline mt-2 font-bold italic tracking-widest">VIEW HR PROFILE / 查閱詳情</p></div>
                        <div class="text-right"><p class="text-sky-400 font-black text-4xl tracking-tighter">$${pay.toLocaleString()}</p><button onclick="window.initModifyData('${p.id}')" class="text-[11px] text-orange-500 underline font-black uppercase mt-2 block hover:text-orange-300">✏️ 修改人事資料</button></div>
                    </div>
                    <div class="grid grid-cols-2 gap-6 mb-4">
                        <div><label class="text-[10px] text-slate-600 font-black uppercase mb-1 block">配送費率 ($)</label><input id="acc_rd_${p.id}" type="number" value="${p.rate_del||50}" class="input-box !py-3 !text-sm !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-slate-600 font-black uppercase mb-1 block">逆物費率 ($)</label><input id="acc_rr_${p.id}" type="number" value="${p.rate_ret||20}" class="input-box !py-3 !text-sm !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-orange-600 font-black uppercase mb-1 block">夥伴勞保費用</label><input id="acc_lf_${p.id}" type="number" value="${p.labor_fee||1500}" class="input-box !py-3 !text-sm !mb-0 shadow-inner"><span class="finance-detail">夥伴自付應繳項目</span></div>
                        <div><label class="text-[10px] text-orange-600 font-black uppercase mb-1 block">健保單價 / 加保人數</label>
                            <div class="flex gap-1"><input id="acc_hf_${p.id}" type="number" value="${p.health_fee||800}" class="input-box !py-3 !text-sm !mb-0 !w-2/3 shadow-inner"><input id="acc_hc_${p.id}" type="number" value="${p.health_cnt||1}" class="input-box !py-3 !text-sm !mb-0 !w-1/3 shadow-inner" placeholder="人數"></div><span class="finance-detail">自動計算：${(p.health_fee||800)}x${(p.health_cnt||1)}</span></div>
                        <div><label class="text-[10px] text-green-600 font-black uppercase mb-1 block">本月獎懲加給</label><input id="acc_bn_${p.id}" type="number" value="${p.bonus||0}" class="input-box !py-3 !text-sm !mb-0 shadow-inner"></div>
                        <div><label class="text-[10px] text-red-600 font-black uppercase mb-1 block">本月罰金扣除</label><input id="acc_pn_${p.id}" type="number" value="${p.penalty||0}" class="input-box !py-3 !text-sm !mb-0 shadow-inner"></div>
                    </div>
                    <div class="flex gap-3 mt-10 pt-5 border-t border-slate-800">
                        <button onclick="window.saveAccountingSync('${p.id}')" class="flex-1 bg-slate-800 text-sky-500 py-4 rounded-2xl text-[12px] font-black border border-sky-900/50 uppercase tracking-widest shadow-xl">同步更新會計參數</button>
                        <button onclick='window.executeSlip(${JSON.stringify(p)})' class="px-5 bg-sky-600/10 text-sky-500 py-4 rounded-2xl text-[12px] font-black border border-sky-600/20">薪資單</button>
                        <button onclick="window.delPartnerPermanently('${p.id}')" class="px-5 text-red-900 text-[11px] font-bold underline">移除夥伴</button>
                    </div>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // 修改人事模組實體化控制 (修正無反應問題)
        window.initModifyData = (id) => {
            const p = partners.find(x => x.id === id); globalEditId = id; document.getElementById('edit-page').style.display = 'flex';
            document.getElementById('edit_name').value = p.name || ''; document.getElementById('edit_phone').value = p.phone || ''; document.getElementById('edit_pin').value = p.uid || '';
            document.getElementById('edit_idnum').value = p.id_num || ''; document.getElementById('edit_addr').value = p.h_addr || ''; document.getElementById('edit_emergency').value = p.emergency || '';
        };

        window.commitPersonnelUpdate = async () => {
            if(!confirm("確定變更該夥伴的人事資料嗎？")) return;
            const updated = { name: document.getElementById('edit_name').value, phone: document.getElementById('edit_phone').value, uid: document.getElementById('edit_pin').value, id_num: document.getElementById('edit_idnum').value, h_addr: document.getElementById('edit_addr').value, emergency: document.getElementById('edit_emergency').value };
            await updateDoc(doc(db, 'partners', globalEditId), updated); alert("人事檔案已同步存檔成功。"); document.getElementById('edit-page').style.display = 'none'; renderAdmin();
        };

        window.saveAccountingSync = async (id) => {
            const batch = { rate_del: parseInt(document.getElementById('acc_rd_'+id).value)||0, rate_ret: parseInt(document.getElementById('acc_rr_'+id).value)||0, labor_fee: parseInt(document.getElementById('acc_lf_'+id).value)||0, health_fee: parseInt(document.getElementById('acc_hf_'+id).value)||0, health_cnt: parseInt(document.getElementById('acc_hc_'+id).value)||0, bonus: parseInt(document.getElementById('acc_bn_'+id).value)||0, penalty: parseInt(document.getElementById('acc_pn_'+id).value)||0 };
            await updateDoc(doc(db, 'partners', id), batch); alert("該夥伴會計與自付額參數同步完成。"); renderAdmin();
        };

        window.delLog = async (id) => { if(confirm("移除影像？")) await deleteDoc(doc(db, 'logs', id)); };
        window.delPartnerPermanently = async (id) => { if(confirm("極度警告：永久移除夥伴帳號及其所有數據？")) await deleteDoc(doc(db, 'partners', id)); };
        window.approveReq = async (id) => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("入職核准成功。"); renderAdmin(); };
        window.globalReset = async () => { if(confirm("歸零數據？")) { for(let p of partners) { await updateDoc(doc(db, 'partners', p.id), { total_del: 0, total_ret: 0, bonus: 0, penalty: 0 }); } alert("月底結算歸零完成。"); location.reload(); } };

        window.viewProfile = (id) => {
            const p = partners.find(x => x.id === id); document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `<h3 class="text-white font-black mb-10 border-b-4 border-slate-800 pb-6 text-base uppercase italic tracking-[0.4em]">Partner Full File</h3>
            <div class="grid grid-cols-2 gap-y-7 text-xs text-slate-400 mb-14 leading-relaxed"><p>姓名：<span class="text-white font-black text-2xl ml-2 underline decoration-sky-600">${p.name}</span></p><p>車種：<span class="text-white font-black text-2xl ml-2">${p.v_type}</span></p><p>身分證：<span class="text-white ml-2">${p.id_num}</span></p><p>手機：<span class="text-white ml-2">${p.phone}</span></p><p class="col-span-2">戶籍：<span class="text-white ml-2 text-sm">${p.h_addr}</span></p><p class="col-span-2 text-orange-500 font-black">緊急：<span class="ml-2">${p.emergency}</span></p></div>
            <div class="grid grid-cols-2 gap-8">
                <img src="${p.docs?.id_f}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)"><img src="${p.docs?.id_b}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)">
                <img src="${p.docs?.lic}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)"><img src="${p.docs?.car}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)">
            </div>`;
        };

        window.executeSlip = async (p) => {
            const net = (p.total_del*(p.rate_del||50))+(p.total_ret*(p.rate_ret||20))+(p.bonus||0)-(p.penalty||0)-(p.labor_fee||1500)-((p.health_cnt||1)*(p.health_fee||800));
            document.getElementById('slip-date').innerText = "結算期間：" + (new Date().getMonth()+1) + " 月份";
            document.getElementById('slip-body').innerHTML = `
                <div class="slip-row" style="font-weight:950; background:#f0f0f0; padding:25px 15px; border-radius:8px;"><span>領款夥伴姓名</span><b style="font-size:22px;">${p.name}</b></div>
                <div class="slip-row"><span>配送件數報酬 ($${p.rate_del||50}/件)</span><span>$${(p.total_del*(p.rate_del||50)).toLocaleString()} (${p.total_del}件)</span></div>
                <div class="slip-row"><span>逆物件數報酬 ($${p.rate_ret||20}/件)</span><span>$${(p.total_ret*(p.rate_ret||20)).toLocaleString()} (${p.total_ret}件)</span></div>
                <div class="slip-row" style="background:rgba(0,128,0,0.05)"><span>行政補助/加給津貼</span><span style="color:green; font-weight:900;">+$${(p.bonus||0).toLocaleString()}</span></div>
                <div class="slip-row" style="color:#e11d48; font-weight:bold; border-top:2px dashed #000; margin-top:20px;"><span>勞工保險費自付項目</span><span>-$${(p.labor_fee||1500).toLocaleString()}</span></div>
                <div class="slip-row" style="color:#e11d48; font-weight:bold;"><span>健康保險費自付項目 (${p.health_cnt}人)</span><span>-$${((p.health_cnt||1)*(p.health_fee||800)).toLocaleString()}</span></div>
                <div class="slip-row" style="color:#e11d48; font-weight:bold;"><span>行政罰金與扣款</span><span>-$${(p.penalty||0).toLocaleString()}</span></div>`;
            document.getElementById('slip-total-val').innerText = "TWD $ " + net.toLocaleString();
            const s = document.getElementById('slip-box'); s.style.left = "0"; const canvas = await html2canvas(s, { scale: 3, backgroundColor: "#ffffff" }); s.style.left = "-9999px";
            const a = document.createElement('a'); a.download = `SUPREME_SLIP_${p.name}.png`; a.href = canvas.toDataURL("image/png"); a.click();
        };

        function renderPartner(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card shadow-sky-500/20 shadow-2xl">
                    <h2 class="text-6xl font-black text-white mb-2 italic underline decoration-sky-600 decoration-4">${p.name} 夥伴</h2>
                    <div class="space-y-14 mt-16">
                        <div><label class="label-sky">今日成功配送件數</label><input type="number" id="v_del" placeholder="0" class="input-box text-center text-7xl font-black text-sky-400 h-36"></div>
                        <div><label class="label-sky">今日逆物退回數量</label><input type="number" id="v_ret" placeholder="0" class="input-box text-center text-7xl font-black text-orange-400 h-36"></div>
                        <div class="pt-16 border-t-4 border-slate-800"><button onclick="window.commitJobSync('${p.id}')" class="btn-prime">確認數據同步至中控台</button></div>
                    </div>
                </div>`;
        }

        window.commitJobSync = async (id) => {
            const d = parseInt(document.getElementById('v_del').value)||0, r = parseInt(document.getElementById('v_ret').value)||0;
            await addDoc(collection(db, 'logs'), { driverId: id, del: d, ret: r, photo: "https://via.placeholder.com/600", time: serverTimestamp() });
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("作業數據同步成功。"); location.reload();
        };
    </script>
</body>
</html>
