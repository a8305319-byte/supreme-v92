<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGSOC 急救版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const createRoot = ReactDOM.createRoot;

    // --- [ 這裡不變，保證能動 ] ---
    function AppWrapper() {
      const [l, setL] = useState('gate');
      const [ps, setPs] = useState([
        { id: '1', name: '測試司機', phone: '0900000000', last_report: { cod_amount: 20000 } }
      ]);

      const handleLogin = (p, i) => {
        if (p === "0976017938" && i === "8305319") setL('admin');
        else alert("密碼錯誤");
      };

      // 📡 異常雷達：找出超過 15,000 的人
      const anomalies = ps.filter(p => p.last_report?.cod_amount > 15000);

      return (
        <div className="p-6 font-sans">
          {l === 'gate' ? (
            <div className="flex flex-col items-center justify-center h-screen">
              <h1 className="text-4xl mb-8">在地物流</h1>
              <input id="p" placeholder="門號" className="bg-slate-800 p-4 rounded mb-2 text-center" />
              <input id="i" type="password" placeholder="PIN" className="bg-slate-800 p-4 rounded mb-4 text-center" />
              <button onClick={() => handleLogin(document.getElementById('p').value, document.getElementById('i').value)} className="bg-blue-600 px-10 py-4 rounded">進入</button>
            </div>
          ) : (
            <div>
              <h2 className="text-2xl mb-4">營運指揮中心</h2>
              <p className="text-rose-500 mb-6">🚨 異常預警：{anomalies.length} 位風險司機</p>
              <div className="grid gap-4">
                {ps.map(p => (
                  <div key={p.id} className="bg-slate-900 p-4 rounded border border-white/10">
                    <p className="text-xl">{p.name}</p>
                    <p className="text-xs text-slate-500">{p.phone}</p>
                    {p.last_report.cod_amount > 15000 && <span className="text-rose-500 text-[10px]">⚠️ 金額異常: {p.last_report.cod_amount}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<AppWrapper />);
  </script>
</body>
