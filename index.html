<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC 萬事通服務中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #050505; color: #fff; font-family: sans-serif; font-weight: 900; -webkit-tap-highlight-color: transparent; }
    .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(25px); }
    /* 隨扈客服風：親和但有底線 */
    .chat-bubble-ai { background: #1e1e1e; border-radius: 0 24px 24px 24px; padding: 18px; margin-right: 40px; border: 1px solid #333; font-size: 14px; line-height: 1.6; }
    .chat-bubble-user { background: #3b82f6; border-radius: 24px 24px 0 24px; padding: 15px; margin-left: 40px; font-size: 14px; text-align: right; }
    .input-area { background: #111; border: 1px solid #222; border-radius: 20px; padding: 5px 15px; }
    .btn-send { background: #3b82f6; width: 45px; height: 45px; border-radius: 15px; display: flex; items-center: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [messages, setMessages] = useState([
        {role: 'ai', text: '您好，我是萬事通服務中心。為了提供精準協助，請詳細說明您的問題，我將為您調閱系統紀錄。'}
      ]);
      const endRef = useRef(null);

      const handleSend = (text) => {
        if(!text) return;
        const newMsgs = [...messages, {role: 'user', text}];
        setMessages(newMsgs);
        // 此處不設自動回覆，預留給總裁後台介入
        document.getElementById('msg-input').value = '';
      };

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      return (
        <div className="h-screen flex flex-col max-w-md mx-auto relative overflow-hidden">
          {/* Header：真人客服感 */}
          <div className="p-6 border-b border-white/5 flex items-center gap-4 bg-black/50">
            <div className="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-lg shadow-blue-500/30">🤖</div>
            <div>
              <h1 className="text-lg font-black italic">萬事通服務中心</h1>
              <p className="text-[10px] text-emerald-500 font-mono animate-pulse uppercase tracking-widest">● 在線為您服務</p>
            </div>
          </div>

          {/* 對話流 */}
          <div className="flex-1 overflow-y-auto p-6 space-y-6">
            {messages.map((m, i) => (
              <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={m.role === 'ai' ? 'chat-bubble-ai shadow-2xl' : 'chat-bubble-user shadow-lg'}>
                  {m.text}
                </div>
              </div>
            ))}
            <div ref={endRef} />
          </div>

          {/* 固定入口與輸入 */}
          <div className="p-6 glass">
            <div className="input-area flex items-center gap-3">
              <input id="msg-input" className="flex-1 bg-transparent py-4 text-sm outline-none font-bold" placeholder="輸入訊息..." onKeyPress={(e)=>e.key==='Enter' && handleSend(e.target.value)} />
              <button onClick={() => handleSend(document.getElementById('msg-input').value)} className="btn-send btn-active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              </button>
            </div>
            <p className="text-[8px] text-zinc-700 mt-4 text-center font-mono">系統已啟動端對端加密 · 確保溝通隱私</p>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
