<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>在地物流 營運總部 v2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root { --gold: #f59e0b; --bg: #020617; }
        body { background-color: var(--bg); color: #f1f5f9; font-family: 'PingFang TC', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .gold-glow { box-shadow: 0 20px 50px rgba(245, 158, 11, 0.05); border: 1px solid rgba(245, 158, 11, 0.1); }
        .btn-main { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #000; font-weight: 900; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }
        input::placeholder { color: #475569; }
        .page-enter { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Firebase 配置 (請更換為你的實際金鑰)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            appId: "YOUR_APP_ID"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = 'supreme-v92';

        function App() {
            const [u, setU] = useState(null); 
            const [ps, setPs] = useState([]);
            const [layer, setLayer] = useState('gate'); 
            const [role, setRole] = useState(null); // 'OWNER', 'EXECUTIVE', 'DRIVER'
            const [toast, setToast] = useState("");

            const showToast = (m) => { setToast(m); setTimeout(()=>setToast(""), 3000); };

            // 數據監聽
            useEffect(() => {
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners')
                    .onSnapshot(snap => { 
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() })); 
                        setPs(data); 
                        if(u) setU(data.find(x => x.id === u.id) || u);
                    });
                return () => unsub();
            }, [u?.id]);

            // 全域修改函數
            const adminUpdateAny = async (id, data) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(id).update(data);
                    showToast("✅ 資料更新成功");
                    return true;
                } catch (e) { alert("更新失敗"); return false; }
            };

            return (
                <div className="min-h-screen">
                    <div className={`fixed left-1/2 -translate-x-1/2 z-[9999] transition-all duration-500 bg-amber-500 text-black px-8 py-3 rounded-full font-black shadow-2xl ${toast ? 'top-8 opacity-100' : '-top-20 opacity-0'}`}>{toast}</div>
                    
                    <div className="page-enter">
                        {layer === 'gate' && <Gate onLogin={(cleanPhone, pin) => {
                            // 1. 管理員 (Owner)
                            if (cleanPhone === "0976017938" && pin === "8305319") {
                                setRole('OWNER'); setLayer('admin'); return;
                            }
                            // 2. 營運總監 (Accountant)
                            if (cleanPhone === "0988128172" && pin === "0172") {
                                setRole('EXECUTIVE'); setLayer('admin'); return;
                            }
                            // 3. 一般夥伴
                            const t = ps.find(p => p.phone === cleanPhone && p.pin === pin);
                            if(t) { setU(t); setRole('DRIVER'); setLayer('driver'); } else alert("資訊錯誤，請重新輸入");
                        }} />}
                        
                        {layer === 'admin' && <AdminHub ps={ps} role={role} setLayer={setLayer} showToast={showToast} adminUpdateAny={adminUpdateAny} />}
                        {layer === 'driver' && <DriverHub u={u} setLayer={setLayer} showToast={showToast} />}
                    </div>
                </div>
            );
        }

        // --- 門戶頁 (Gate) ---
        function Gate({ onLogin }) {
            const [ph, setPh] = useState(""); 
            const [pin, setPin] = useState("");
            const [remember, setRemember] = useState(false);

            useEffect(() => {
                const sp = localStorage.getItem('log_ph');
                const si = localStorage.getItem('log_pin');
                if(sp && si) { setPh(sp); setPin(si); setRemember(true); }
            }, []);

            const handleLogin = () => {
                const cp = ph.replace(/-/g, '');
                if(!cp || !pin) return;
                if(remember) { localStorage.setItem('log_ph', ph); localStorage.setItem('log_pin', pin); }
                else { localStorage.removeItem('log_ph'); localStorage.removeItem('log_pin'); }
                onLogin(cp, pin);
            };

            return (
                <div className="h-screen flex flex-col items-center justify-center p-6 bg-[#020617]">
                    <div className="text-center mb-10">
                        <h1 className="text-4xl font-black text-white italic tracking-tighter">在地物流</h1>
                        <p className="text-amber-500 text-[10px] font-bold tracking-[0.5em] mt-2">營運總部 v2026</p>
                    </div>
                    <div className="w-full max-w-sm glass p-8 rounded-[3rem] gold-glow">
                        <input type="tel" className="w-full bg-slate-900/50 p-5 rounded-2xl mb-4 text-white outline-none focus:ring-1 ring-amber-500" placeholder="手機號碼" value={ph} onChange={e=>setPh(e.target.value)} />
                        <input type="password" title="PIN" className="w-full bg-slate-900/50 p-5 rounded-2xl mb-6 text-amber-500 text-center tracking-widest font-black outline-none focus:ring-1 ring-amber-500" placeholder="PIN 碼" value={pin} onChange={e=>setPin(e.target.value)} />
                        
                        <div className="flex items-center justify-center mb-8 cursor-pointer" onClick={()=>setRemember(!remember)}>
                            <div className={`w-4 h-4 rounded border ${remember?'bg-amber-500 border-amber-500':'border-slate-600'}`}></div>
                            <span className="ml-2 text-slate-500 text-[10px] font-bold uppercase">記住登入資訊</span>
                        </div>

                        <button onClick={handleLogin} className="btn-main w-full py-5 text-lg shadow-xl uppercase">進入系統</button>
                    </div>
                </div>
            );
        }

        // --- 營運管理大盤 (AdminHub) ---
        function AdminHub({ ps, role, setLayer, showToast, adminUpdateAny }) {
            const [editTarget, setEditTarget] = useState(null);
            const [formData, setFormData] = useState({});
            const isOwner = role === 'OWNER';

            // 💡 影子權限邏輯：若是會計登入，強制濾除管理員的門號
            const displayList = useMemo(() => {
                return role === 'EXECUTIVE' ? ps.filter(p => p.phone !== "0976017938") : ps;
            }, [ps, role]);

            return (
                <div className="p-6 lg:p-10 max-w-7xl mx-auto pb-24 page-enter">
                    <header className="flex justify-between items-end mb-12 border-b border-white/5 pb-8">
                        <div>
                            <h2 className="text-3xl font-black italic text-white">營運管理總部</h2>
                            <p className="text-amber-500 text-[9px] font-black tracking-widest mt-1 uppercase">
                                {isOwner ? "系統最高權限已載入" : "營運總監決策模式"}
                            </p>
                        </div>
                        <button onClick={()=>setLayer('gate')} className="text-slate-600 font-black text-[10px] uppercase underline">離線登出</button>
                    </header>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 text-center">
                        <div className="glass p-6 rounded-3xl">
                            <p className="text-slate-500 text-[9px] font-black mb-1">財務核算</p>
                            <p className="font-bold text-sm">薪資報表</p>
                        </div>
                        <div className="glass p-6 rounded-3xl">
                            <p className="text-slate-500 text-[9px] font-black mb-1">人員管理</p>
                            <p className="font-bold text-sm">權限維護</p>
                        </div>
                        {isOwner && (
                            <div className="glass p-6 rounded-3xl border border-rose-500/20 bg-rose-500/5">
                                <p className="text-rose-500/50 text-[9px] font-black mb-1">系統核心</p>
                                <p className="font-bold text-sm text-rose-500">數據庫重置</p>
                            </div>
                        )}
                        {!isOwner && (
                            <div className="glass p-6 rounded-3xl border border-sky-500/20">
                                <p className="text-sky-500 text-[9px] font-black mb-1">營運報告</p>
                                <p className="font-bold text-sm text-sky-400">下載結算單</p>
                            </div>
                        )}
                    </div>

                    <div className="glass rounded-[2.5rem] overflow-hidden">
                        <table className="w-full text-center">
                            <thead className="bg-slate-900/50 text-[9px] text-slate-500 font-black uppercase">
                                <tr><th className="p-5">夥伴</th><th>手機</th><th>狀態</th><th>管理</th></tr>
                            </thead>
                            <tbody className="text-sm">
                                {displayList.map(p => (
                                    <tr key={p.id} className="border-b border-white/5 hover:bg-white/5">
                                        <td className="p-5 font-bold">{p.name}</td>
                                        <td className="p-5 text-slate-400 font-mono text-xs">{p.phone}</td>
                                        <td className="p-5"><span className="bg-emerald-500/10 text-emerald-500 px-3 py-1 rounded-full text-[9px]">正常連線</span></td>
                                        <td className="p-5">
                                            <button onClick={()=>{setEditTarget(p); setFormData(p);}} className="bg-white text-black px-4 py-1.5 rounded-full font-black text-[10px]">編輯</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {editTarget && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[9999] backdrop-blur-xl">
                            <div className="glass p-10 rounded-[3.5rem] w-full max-w-sm border border-white/10">
                                <h3 className="text-xl font-black text-white mb-6 italic">修改夥伴資料</h3>
                                <div className="space-y-4">
                                    <input className="w-full bg-slate-900 p-4 rounded-xl text-white outline-none" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} placeholder="姓名" />
                                    <input className="w-full bg-slate-900 p-4 rounded-xl text-white outline-none" value={formData.phone} onChange={e=>setFormData({...formData, phone:e.target.value})} placeholder="手機" />
                                    <input className="w-full bg-slate-900 p-4 rounded-xl text-amber-500 font-black outline-none" value={formData.pin} onChange={e=>setFormData({...formData, pin:e.target.value})} placeholder="PIN" />
                                </div>
                                <div className="flex gap-4 mt-10">
                                    <button onClick={()=>setEditTarget(null)} className="flex-1 text-slate-500 font-bold text-xs">取消</button>
                                    <button onClick={async ()=>{
                                        await adminUpdateAny(editTarget.id, formData);
                                        setEditTarget(null);
                                    }} className="btn-main flex-[2] py-4 rounded-xl text-xs">儲存變更</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- 夥伴工作台 (DriverHub) ---
        function DriverHub({ u, setLayer, showToast }) {
            return (
                <div className="p-6 max-w-lg mx-auto page-enter text-center pt-20">
                    <h2 className="text-2xl font-black italic mb-2">夥伴工作台</h2>
                    <p className="text-amber-500 text-xs font-bold mb-10">歡迎回來，{u.name}</p>
                    
                    <div className="glass p-10 rounded-[3rem] gold-glow mb-6">
                        <p className="text-slate-500 text-[10px] font-black uppercase mb-8">今日配送進度</p>
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-900 p-6 rounded-3xl">
                                <p className="text-sky-400 text-[9px] font-black mb-2">正件</p>
                                <p className="text-3xl font-black">{u.total_del || 0}</p>
                            </div>
                            <div className="bg-slate-900 p-6 rounded-3xl">
                                <p className="text-orange-400 text-[9px] font-black mb-2">逆向</p>
                                <p className="text-3xl font-black">{u.total_pkp || 0}</p>
                            </div>
                        </div>
                        <button onClick={()=>showToast("🚀 數據已成功回報")} className="btn-main w-full py-5 text-lg">提交今日報單</button>
                    </div>
                    
                    <button onClick={()=>setLayer('gate')} className="text-slate-600 text-xs font-black underline">安全登出</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
