<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME V92 FLOW</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: ui-monospace, monospace; user-select: none; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 40px 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 400px; background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #1e293b; }
        .btn-action { width: 100%; padding: 22px; border-radius: 1.2rem; font-weight: 900; text-transform: uppercase; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        #preview { width: 100%; height: 220px; object-fit: cover; border-radius: 1rem; margin-bottom: 20px; display: none; border: 2px solid #334155; }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-3xl font-black text-white tracking-widest italic mb-2 uppercase">Supreme</h1>
        <p class="text-[9px] text-slate-600 tracking-[0.5em] mb-12 uppercase">Logistics Matrix</p>
        <input type="password" id="pin" placeholder="••••" inputmode="numeric" class="bg-transparent border-b-2 border-slate-800 text-center text-3xl text-sky-400 w-48 outline-none pb-2">
        <button onclick="boot()" class="mt-16 px-12 py-3 rounded-full border border-slate-800 text-slate-500 font-bold text-[10px] tracking-widest uppercase active:bg-white active:text-black transition">Authenticate</button>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-10 mb-10 text-slate-800 font-bold text-[9px] uppercase border-b border-slate-900">Disconnect System</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
            authDomain: "supreme-v92.firebaseapp.com",
            projectId: "supreme-v92",
            storageBucket: "supreme-v92.firebasestorage.app",
            messagingSenderId: "485530156296",
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let partners = [];
        let base64Photo = null;

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); });

        window.boot = () => {
            const entry = document.getElementById('pin').value;
            const p = partners.find(x => x.uid === entry);
            if(p) return renderDriver(p);
            alert("ACCESS DENIED");
        };

        function renderDriver(p) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card">
                    <p class="text-[10px] text-sky-500 font-black mb-1 tracking-widest">DRIVER UNIT</p>
                    <h2 class="text-3xl font-black text-white italic mb-8 uppercase">${p.name}</h2>
                    
                    <img id="preview" src="">
                    
                    <label class="btn-action bg-slate-800 text-white border border-slate-700 cursor-pointer mb-6">
                        📷 啟動相機拍攝憑證
                        <input type="file" accept="image/*" capture="camera" class="hidden" onchange="window.processImg(this)">
                    </label>
                    
                    <div id="actions" class="hidden flex flex-col">
                        <button onclick="window.send('${p.id}', 'DELIVERY')" class="btn-action bg-sky-600 text-slate-900">📦 正向配送完成</button>
                        <button onclick="window.send('${p.id}', 'RETURN')" class="btn-action bg-orange-600 text-white">🔄 逆物流回收回報</button>
                    </div>
                </div>`;
        }

        window.processImg = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        // 壓縮圖片大小
                        const scale = Math.min(600 / img.width, 600 / img.height);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        base64Photo = canvas.toDataURL('image/jpeg', 0.6); // 60% 質量壓縮
                        
                        const pre = document.getElementById('preview');
                        pre.src = base64Photo;
                        pre.style.display = 'block';
                        document.getElementById('actions').classList.remove('hidden');
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.send = async (id, type) => {
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = "SYSTEM SYNCING...";
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                // 1. 寫入任務日誌
                await addDoc(collection(db, 'logs'), {
                    driverId: id,
                    task: type,
                    photoData: base64Photo, // 直接存入 Base64 字串
                    time: serverTimestamp()
                });

                // 2. 增加司機績效
                await updateDoc(doc(db, 'partners', id), { 
                    count: increment(1),
                    lastSync: serverTimestamp() 
                });

                alert("任務已上傳！");
                location.reload();
            } catch (e) {
                alert("連線中斷，請稍後再試");
                btn.innerHTML = originalText;
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
