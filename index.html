<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC Supreme v92 - 像素確權版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; font-weight: 900; overflow: hidden; }
    .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    .camera-screen { width: 100%; height: 240px; background: #000; border-radius: 24px; object-fit: cover; border: 2px solid #3b82f6; }
    canvas { border-radius: 16px; background: #111; touch-action: none; border: 1px dashed rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const config = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.firestore();

    // --- 📸 實時相機 + 像素水印組件 ---
    const RealtimeCamera = ({ onCaptured }) => {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);

      const startCamera = async () => {
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
          videoRef.current.srcObject = s;
          setStream(s);
        } catch (e) { alert("無法調動相機，請檢查權限"); }
      };

      const capture = () => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        // 1. 繪製原始影像
        ctx.drawImage(video, 0, 0, 400, 300);
        // 2. 注入像素級防修圖水印
        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
        const now = new Date().toLocaleString();
        ctx.fillText(`GGSOC_SECURE_VERIFIED`, 10, 260);
        ctx.fillText(`TIME: ${now}`, 10, 280);
        ctx.fillText(`ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}`, 10, 240);
        
        const data = canvas.toDataURL("image/jpeg", 0.7);
        // 停止串流省電
        stream.getTracks().forEach(t => t.stop());
        onCaptured(data);
      };

      useEffect(() => { startCamera(); return () => stream?.getTracks().forEach(t => t.stop()); }, []);

      return (
        <div className="space-y-4">
          <video ref={videoRef} autoPlay playsInline className="camera-screen" />
          <canvas ref={canvasRef} width={400} height={300} className="hidden" />
          <button onClick={capture} className="w-full py-4 bg-blue-600 rounded-2xl font-black btn-active">📸 拍下並注入防偽水印</button>
        </div>
      );
    };

    function App() {
      const [view, setView] = useState('gate');
      const [partners, setPartners] = useState([]);
      const [detail, setDetail] = useState(null);
      const [capturedImg, setCapturedImg] = useState(null);

      useEffect(() => {
        return db.collection('partners').onSnapshot(s => setPartners(s.docs.map(d => ({id:d.id, ...d.data()}))));
      }, []);

      if(view === 'gate') return (
        <div className="h-screen flex items-center justify-center p-8 bg-black">
          <div className="glass w-full max-w-sm p-10 rounded-[3rem] text-center border-blue-500/20 border shadow-2xl">
            <h1 className="text-3xl font-black text-blue-600 mb-10 italic">GGSOC_PRO</h1>
            <button onClick={() => setView('admin')} className="w-full py-5 bg-blue-600 rounded-2xl font-black btn-active italic">ENTER_SYSTEM</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen p-5 pb-24 overflow-y-auto">
          <h2 className="text-2xl font-black mb-8 border-l-4 border-blue-600 pl-4 italic uppercase">指揮中心 / 實體確權</h2>

          <div className="space-y-4">
            {partners.map(p => (
              <div key={p.id} onClick={() => setDetail(p)} className="glass p-7 rounded-[2.5rem] flex justify-between items-center btn-active">
                <span className="text-xl font-black italic">{p.name}</span>
                <span className="text-blue-500 text-xs">點擊確權 ></span>
              </div>
            ))}
          </div>

          {detail && (
            <div className="fixed inset-0 bg-black z-[999] p-6 flex flex-col overflow-y-auto" style={{WebkitOverflowScrolling:'touch'}}>
               <div className="flex justify-between items-center mb-8">
                  <h3 className="text-2xl font-black text-blue-400 italic">確權程序：{detail.name}</h3>
                  <button onClick={()=>{setDetail(null); setCapturedImg(null);}} className="text-zinc-500 text-xs">取消</button>
               </div>

               {!capturedImg ? (
                 <RealtimeCamera onCaptured={(data) => setCapturedImg(data)} />
               ) : (
                 <div className="space-y-6">
                    <p className="text-[10px] text-green-500 font-black italic">✅ 已生成不可竄改之防偽快照：</p>
                    <img src={capturedImg} className="w-full rounded-3xl border border-green-500/30 shadow-2xl" />
                    
                    <div className="bg-zinc-900 p-6 rounded-3xl space-y-4">
                       <p className="text-[10px] text-zinc-500 uppercase">總裁決策簽章</p>
                       <canvas width={300} height={120} className="w-full h-32" id="sig-pad"></canvas>
                    </div>

                    <button className="w-full py-5 bg-blue-600 rounded-2xl font-black btn-active" onClick={()=>{alert('✅ 照片、簽名、數據已同步至冷錢庫'); setDetail(null); setCapturedImg(null);}}>
                       完成最終確權並存檔
                    </button>
                 </div>
               )}
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
