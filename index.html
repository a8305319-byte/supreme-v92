<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 物流管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; user-select: none; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); border-radius: 1.5rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; border-radius: 0.8rem; padding: 12px; width: 100%; color: white; outline: none; margin-bottom: 10px; font-size: 16px; }
        .label-sky { font-size: 14px; color: #38bdf8; font-weight: bold; margin-bottom: 8px; display: block; }
        .btn-prime { width: 100%; padding: 16px; border-radius: 1rem; background: #0ea5e9; color: #020617; font-weight: 900; font-size: 16px; transition: all 0.2s; border: none; }
        .btn-prime:active { scale: 0.96; }
        .admin-section { width: 100%; max-width: 480px; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .setting-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-black text-white italic mb-2">SUPREME</h1>
        <p class="text-slate-500 text-sm mb-10 tracking-widest">物流管理系統</p>
        <div class="w-full max-w-[320px]">
            <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center">
            <input type="password" id="login_pin" placeholder="密碼 (PIN)" class="input-box text-center">
            <div class="flex items-center gap-2 mb-4 justify-start p-1 text-xs text-slate-500">
                <input type="checkbox" id="remember_me" class="accent-sky-500"> <label for="remember_me">記住帳號密碼</label>
            </div>
            <button onclick="boot()" class="btn-prime">確認登入</button>
            <button onclick="showApply()" class="text-sm text-slate-600 underline mt-10 block mx-auto">夥伴入職申請</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card">
            <h2 class="text-xl font-bold text-white mb-6 text-center">夥伴入職申請</h2>
            <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
            <input type="tel" id="app_phone" placeholder="手機號碼" class="input-box">
            <input type="password" id="app_pin" placeholder="自訂登入密碼 (4位數)" maxlength="4" class="input-box">
            <button onclick="submitApply()" class="btn-prime mt-4">提交申請資料</button>
            <button onclick="location.reload()" class="w-full mt-4 text-sm text-slate-500">返回</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-8 mb-10 text-slate-600 font-bold text-sm">登出系統</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
            authDomain: "supreme-v92.firebaseapp.com",
            projectId: "supreme-v92",
            storageBucket: "supreme-v92.firebasestorage.app",
            messagingSenderId: "485530156296",
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [];
        let config = { del: 50, ret: 20, labor: 1500, health: 800 };

        // 讀取費率設定與夥伴資料
        onSnapshot(doc(db, 'settings', 'rates'), d => { if(d.exists()) config = d.data(); });
        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); });

        window.addEventListener('DOMContentLoaded', () => {
            const sp = localStorage.getItem('supreme_phone'), si = localStorage.getItem('supreme_pin');
            if (sp && si) { 
                document.getElementById('login_phone').value = sp; 
                document.getElementById('login_pin').value = atob(si); 
                document.getElementById('remember_me').checked = true; 
            }
        });

        window.boot = () => {
            const phone = document.getElementById('login_phone').value, pin = document.getElementById('login_pin').value;
            if (document.getElementById('remember_me').checked) { localStorage.setItem('supreme_phone', phone); localStorage.setItem('supreme_pin', btoa(pin)); }
            else { localStorage.removeItem('supreme_phone'); localStorage.removeItem('supreme_pin'); }

            if(phone === "0976017938" && pin === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === phone && x.uid === pin && x.status === "approved");
            if(p) return renderPartnerUI(p);
            alert("登入失敗");
        };

        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
        window.submitApply = async () => {
            const phone = document.getElementById('app_phone').value;
            if(partners.some(x => x.phone === phone)) return alert("此號碼已註冊");
            await addDoc(collection(db, 'partners'), {
                name: document.getElementById('app_name').value,
                phone: phone, uid: document.getElementById('app_pin').value,
                status: "pending", l_cnt: 1, h_cnt: 1, total_del: 0, total_ret: 0, time: serverTimestamp()
            });
            alert("已提交申請"); location.reload();
        };

        function renderPartnerUI(p) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card">
                    <h2 class="text-2xl font-bold text-white mb-6">${p.name} 夥伴</h2>
                    <div class="space-y-4">
                        <div><span class="label-sky">配送件數</span><input type="number" id="dc" placeholder="0" class="input-box text-center text-2xl font-black text-sky-400"></div>
                        <div><span class="label-sky">逆物流量</span><input type="number" id="rc" placeholder="0" class="input-box text-center text-2xl font-black text-orange-400"></div>
                        <button onclick="window.sendJob('${p.id}')" class="btn-prime">同步作業數據</button>
                    </div>
                </div>`;
        }

        window.sendJob = async (id) => {
            const d = parseInt(document.getElementById('dc').value) || 0, r = parseInt(document.getElementById('rc').value) || 0;
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("數據已更新"); location.reload();
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved"), pending = partners.filter(x => x.status === "pending");
            
            let html = `
                <div class="w-full max-w-[480px]">
                    <h2 class="text-white font-bold text-xl mb-6">管理中心</h2>
                    
                    <div class="admin-section">
                        <p class="text-sky-400 font-bold mb-3 text-sm">⚙️ 費率設定 (全體同步)</p>
                        <div class="setting-grid">
                            <div><label class="text-[10px]">配送單價</label><input type="number" id="s_del" value="${config.del}" class="input-box !py-2"></div>
                            <div><label class="text-[10px]">逆物流單價</label><input type="number" id="s_ret" value="${config.ret}" class="input-box !py-2"></div>
                            <div><label class="text-[10px]">基本勞保</label><input type="number" id="s_lab" value="${config.labor}" class="input-box !py-2"></div>
                            <div><label class="text-[10px]">健保單價</label><input type="number" id="s_hea" value="${config.health}" class="input-box !py-2"></div>
                        </div>
                        <button onclick="window.saveRates()" class="w-full bg-sky-900 text-sky-200 py-2 rounded-lg text-xs font-bold mt-2">儲存所有設定</button>
                    </div>`;

            if(pending.length > 0) {
                html += `<p class="text-orange-500 font-bold mb-3 text-sm">待核准夥伴</p>`;
                html += pending.map(p => `
                    <div class="id-card !p-4 !bg-slate-900 mb-4">
                        <p class="text-white font-bold">${p.name} (${p.phone})</p>
                        <button onclick="window.finalApprove('${p.id}')" class="btn-prime !py-2 !text-xs mt-3">核准入職</button>
                    </div>`).join('');
            }

            html += `<div class="flex justify-between items-center mb-3"><p class="text-slate-500 font-bold text-sm">夥伴管理與薪資</p><button onclick="window.exportCSV()" class="text-green-500 text-xs font-bold">匯出報表</button></div>`;
            html += approved.map(p => {
                const pay = (p.total_del * config.del) + (p.total_ret * config.ret) - config.labor - (p.h_cnt * config.health);
                return `
                <div class="id-card !p-5 !bg-slate-900/40 border-slate-800">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-white font-bold">${p.name}</p>
                            <p class="text-[10px] text-slate-500">${p.phone} | PIN:${p.uid}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sky-400 font-black text-xl">$${pay.toLocaleString()}</p>
                            <div class="flex gap-2 mt-2">
                                <button onclick="window.editPartner('${p.id}')" class="text-slate-500 text-[10px] underline">修改</button>
                                <button onclick="window.delPartner('${p.id}')" class="text-red-900 text-[10px] underline">刪除</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            html += `</div>`;
            document.getElementById('render-target').innerHTML = html;
        }

        window.saveRates = async () => {
            const data = {
                del: parseInt(document.getElementById('s_del').value),
                ret: parseInt(document.getElementById('s_ret').value),
                labor: parseInt(document.getElementById('s_lab').value),
                health: parseInt(document.getElementById('s_hea').value)
            };
            await setDoc(doc(db, 'settings', 'rates'), data);
            alert("費率設定已生效"); renderAdmin();
        };

        window.editPartner = async (id) => {
            const p = partners.find(x => x.id === id);
            const newName = prompt("修改姓名:", p.name);
            const newPin = prompt("修改密碼 (PIN):", p.uid);
            if(newName && newPin) {
                await updateDoc(doc(db, 'partners', id), { name: newName, uid: newPin });
                renderAdmin();
            }
        };

        window.delPartner = async (id) => {
            if(confirm("確定要刪除這位夥伴嗎？數據將無法恢復。")) {
                await deleteDoc(doc(db, 'partners', id));
                renderAdmin();
            }
        };

        window.finalApprove = async (id) => {
            await updateDoc(doc(db, 'partners', id), { status: "approved" });
            renderAdmin();
        };

        window.exportCSV = () => {
            let csv = "\ufeff夥伴姓名,手機,實領薪資\n";
            partners.filter(x => x.status === "approved").forEach(p => {
                const pay = (p.total_del * config.del) + (p.total_ret * config.ret) - config.labor - (p.h_cnt * config.health);
                csv += `${p.name},${p.phone},${pay}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `SUPREME_夥伴薪資_${new Date().toLocaleDateString()}.csv`;
            link.click();
        };
    </script>
</body>
</html>
