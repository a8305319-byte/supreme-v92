<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 人事與營運管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        
        /* 視覺還原：台灣企業常用深色主題 */
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2.5rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1rem; padding: 18px; width: 100%; color: #ffffff; outline: none; margin-bottom: 15px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #ffffff; font-weight: 800; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-prime:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
        
        /* 證件拍照區：藍色虛線框 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .photo-slot { background: transparent; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-slot span { color: #64748b; font-size: 13px; font-weight: 500; }

        .label-blue { font-size: 14px; color: #38bdf8; font-weight: bold; margin-bottom: 10px; display: block; text-align: left; }
        .divider-orange { width: 100%; h: 2px; background: #f97316; margin-bottom: 25px; border-radius: 99px; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-xs font-black tracking-[0.4em] mb-12 uppercase italic">物流夥伴數位管理平台</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center shadow-2xl">
                <button onclick="boot()" class="btn-prime w-full">進入系統 / 查詢進度</button>
            </div>
            
            <div class="pt-8 flex flex-col gap-4">
                <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border border-sky-500 text-sky-400 font-bold">一、營運職能實務測驗</button>
                <div id="apply-lock-container">
                    <button disabled class="w-full py-4 rounded-2xl border border-slate-800 text-slate-700 font-bold flex items-center justify-center gap-2">
                        二、正式人事資料建檔 🔒
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[480px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回主頁</div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 italic border-b-2 border-sky-500 pb-2">夥伴營運職能評估</h2>
                <input type="text" id="int_name" placeholder="真實姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <div class="space-y-4 text-left mb-6">
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <p class="text-white text-sm font-bold mb-3">1. 配送途中遇交通事故，首要流程為何？</p>
                        <label class="block text-sm mb-2"><input type="radio" name="q1" value="1"> 報警、拍照存證並即時回報公司</label>
                        <label class="block text-sm"><input type="radio" name="q1" value="0"> 趕快送完包裹，事後再自行處理</label>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <p class="text-white text-sm font-bold mb-3">2. 遇大雨且載貨多，你會如何處理？</p>
                        <label class="block text-sm mb-2"><input type="radio" name="q2" value="1"> 確實蓋好雨布，依安全速度繼續配送</label>
                        <label class="block text-sm"><input type="radio" name="q2" value="0"> 找地方躲雨，等雨停再說</label>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <p class="text-white text-sm font-bold mb-3">3. 結帳時發現代收款多出，你會？</p>
                        <label class="block text-sm mb-2"><input type="radio" name="q3" value="1"> 主動聯繫回報公司並如實上繳</label>
                        <label class="block text-sm"><input type="radio" name="q3" value="0"> 自己收著，沒人發現就算了</label>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <p class="text-white text-sm font-bold mb-3">4. 車輛故障且尚有 10 件急件？</p>
                        <label class="block text-sm mb-2"><input type="radio" name="q4" value="1"> 第一時間回報尋求鄰近支援</label>
                        <label class="block text-sm"><input type="radio" name="q4" value="0"> 攔計程車去送，晚點再修車</label>
                    </div>
                </div>
                <button onclick="submitInterview()" id="sub_btn" class="btn-prime">提交評估資料</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回主頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-2 italic">人員職務建檔卡</h2>
                <div class="divider-orange"></div>
                
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">駕照/職照</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">車輛行照</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <span class="label-blue">基本身分資料</span>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">
                
                <span class="label-blue">營運車輛資訊</span>
                <select id="app_v" class="input-box bg-slate-900" onchange="togglePlate(this.value)">
                    <option value="個人機車">個人機車</option>
                    <option value="個人貨車">個人貨車</option>
                    <option value="公司車">公司車 (免填車號)</option>
                </select>
                <div id="plate_box"><input type="text" id="app_plate" placeholder="營運車牌號碼" class="input-box"></div>
                
                <span class="label-blue">發薪匯款帳戶</span>
                <div class="flex gap-2">
                    <input type="text" id="app_bc" placeholder="代碼" class="input-box w-1/4 text-center">
                    <input type="text" id="app_ba" placeholder="銀行帳號" class="input-box w-3/4">
                </div>
                <input type="password" id="app_pin" placeholder="自訂 4 位登入 PIN 碼" maxlength="4" class="input-box">
                
                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-sky-600 mt-4 shadow-xl">提交完整人事資料</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let partners = [], currentUser = null, photosCache = {};

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        // 登入邏輯：判斷面試狀態
        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            currentUser = partners.find(x => x.phone === ph);
            if(!currentUser) return alert("手機號碼尚未參與營運評估");
            
            if(currentUser.status === "interviewed" || currentUser.status === "approved") {
                document.getElementById('apply-lock-container').innerHTML = `
                    <button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border border-orange-500 text-orange-500 font-bold shadow-lg shadow-orange-900/20">
                        二、正式人事資料建檔 (已開啟)
                    </button>`;
                alert("營運評估已通過！請進行人事建檔。");
            } else {
                alert("營運評估審核中，請等候通知解鎖。");
            }
        };

        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value;
            const phone = document.getElementById('int_phone').value;
            const q = [
                document.querySelector('input[name="q1"]:checked'),
                document.querySelector('input[name="q2"]:checked'),
                document.querySelector('input[name="q3"]:checked'),
                document.querySelector('input[name="q4"]:checked')
            ];
            if(!name || !phone || q.includes(null)) return alert("請完成所有實務評估題目！");
            
            await addDoc(collection(db, 'partners'), { 
                name, phone, status: "pending_review", time: serverTimestamp() 
            });
            alert("評估資料提交成功！請等候管理員審核並解鎖建檔權限。");
            location.reload();
        };

        window.togglePlate = v => document.getElementById('plate_box').style.display = (v==='公司車')?'none':'block';
        window.showLayer = id => { hideAll(); document.getElementById(id).style.display = 'flex'; };
        window.hideAll = () => document.querySelectorAll('.layer').forEach(l => l.style.display='none');
        window.triggerCam = f => { window.currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = i => {
            const r = new FileReader();
            r.onload = e => {
                photosCache[window.currentImgField] = e.target.result;
                const p = document.getElementById('p_' + window.currentImgField);
                p.src = e.target.result; p.style.display = 'block';
                document.getElementById('t_' + window.currentImgField).style.display = 'none';
            };
            r.readAsDataURL(i.files[0]);
        };
    </script>
</body>
</html>
