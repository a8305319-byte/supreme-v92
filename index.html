<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 營運總控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2.5rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1rem; padding: 12px; width: 100%; color: #ffffff; outline: none; margin-bottom: 10px; font-size: 14px; text-align: center; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #ffffff; font-weight: 800; font-size: 18px; cursor: pointer; border: none; }
        .btn-action { padding: 6px 12px; border-radius: 0.6rem; font-weight: 800; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .photo-slot { background: transparent; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .label-blue { font-size: 13px; color: #38bdf8; font-weight: bold; margin-bottom: 8px; display: block; text-align: left; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-xs font-black tracking-[0.4em] mb-12 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">承攬夥伴數位中心</p>
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box">
                <input type="password" id="login_pin" placeholder="PIN 碼 (管理員專用)" class="input-box">
                <button onclick="boot()" class="btn-prime w-full">進入系統</button>
            </div>
            <div class="pt-6 flex flex-col gap-3">
                <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border border-sky-500 text-sky-400 font-bold">一、營運職能實務測驗</button>
                <div id="apply-lock-box">
                    <button disabled class="w-full py-4 rounded-2xl border border-slate-800 text-slate-700 font-bold cursor-not-allowed">二、正式人事建檔 🔒</button>
                </div>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-2 italic">人事資料建檔 (承攬制)</h2>
                <div class="w-full h-1 bg-orange-500 mb-6 rounded-full"></div>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">車輛行照</span><img id="p_car"></div>
                </div>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="戶籍地址" class="input-box">
                <select id="app_v" class="input-box bg-slate-900" onchange="togglePlate(this.value)">
                    <option value="機車">機車</option><option value="貨車">貨車</option><option value="公司車">公司車</option>
                </select>
                <div id="plate_box"><input type="text" id="app_plate" placeholder="車牌號碼" class="input-box"></div>
                <div class="flex gap-2"><input type="text" id="app_bc" placeholder="代碼" class="input-box w-1/3"><input type="text" id="app_ba" placeholder="帳號" class="input-box w-2/3"></div>
                <input type="password" id="app_pin" placeholder="設定 4 位登入 PIN" maxlength="4" class="input-box">
                <button onclick="submitApply()" class="btn-prime bg-sky-600 mt-2">確認提交</button>
            </div>
        </div>
    </div>

    <div id="hub" class="layer">
        <div class="w-full max-w-[450px]">
            <h2 id="hub-name" class="text-3xl font-black text-white italic mb-8">夥伴</h2>
            <div class="id-card">
                <h3 class="text-sky-400 font-black mb-4 border-b border-sky-900 pb-2">每日營運回報</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div><span class="label-blue">配送(正)</span><input type="number" id="rep_del" placeholder="0" class="input-box"></div>
                    <div><span class="label-blue">逆物(逆)</span><input type="number" id="rep_rev" placeholder="0" class="input-box"></div>
                </div>
                <span class="label-blue">拍攝「今日總表」照片</span>
                <div class="photo-slot !h-32" onclick="triggerCam('rep_img')"><span id="t_rep_img">點擊相機</span><img id="p_rep_img"></div>
                <button onclick="submitReport()" class="btn-prime bg-green-600 mt-4">提交數據</button>
            </div>
            <button onclick="location.reload()" class="text-slate-500 underline text-xs">登出</button>
        </div>
    </div>

    <div id="admin" class="layer">
        <div class="w-full max-w-[950px]">
            <h2 class="text-white font-black text-2xl mb-6 border-l-8 border-sky-500 pl-4 uppercase">老闆總控台</h2>
            <div class="bg-slate-900 p-4 rounded-3xl overflow-x-auto border border-slate-800">
                <table class="w-full text-[10px] text-left">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr><th>操作/狀態</th><th>姓名</th><th>正向</th><th>逆物</th><th>單價(正/逆)</th><th>應付淨額</th><th>總表</th></tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="mt-8 text-slate-500 underline text-xs">關閉後台</button>
        </div>
    </div>

    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        let partners = [], currentUser = null, photosCache = {};

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            currentUser = partners.find(x => x.phone === ph);
            if(!currentUser) return alert("手機尚未參與評估");
            if(currentUser.status === "approved") {
                document.getElementById('gate').style.display='none'; document.getElementById('hub').style.display='flex';
            } else if(currentUser.status === "interviewed") {
                document.getElementById('apply-lock-box').innerHTML = `<button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border border-orange-500 text-orange-500 font-bold">二、正式人事建檔 (已解鎖)</button>`;
                alert("評估通過！請點擊橘色按鈕建檔。");
            } else { alert("審核中，請等候通知。"); }
        };

        function renderAdmin() {
            document.getElementById('gate').style.display='none'; document.getElementById('admin').style.display='flex';
            let html = '';
            partners.forEach(p => {
                const del_p = p.custom_del || 15; const rev_p = p.custom_rev || 10;
                const net = ((p.total_del || 0) * del_p) + ((p.total_rev || 0) * rev_p);
                html += `<tr class="border-b border-slate-800">
                    <td class="p-2">
                        ${p.status==='pending_review'?`<button onclick="chStat('${p.id}','interviewed')" class="bg-sky-600 px-2 rounded">核准測驗</button>`:''}
                        ${p.status==='pending'?`<button onclick="chStat('${p.id}','approved')" class="bg-green-600 px-2 rounded">開通營運</button>`:''}
                    </td>
                    <td class="font-bold">${p.name}</td><td>${p.total_del||0}</td><td>${p.total_rev||0}</td>
                    <td>
                        <input type="number" value="${del_p}" onchange="updP('${p.id}','custom_del',this.value)" class="w-8 bg-slate-800 text-center">/
                        <input type="number" value="${rev_p}" onchange="updP('${p.id}','custom_rev',this.value)" class="w-8 bg-slate-800 text-center">
                    </td>
                    <td class="text-sky-400 font-bold">$${net}</td>
                    <td>${p.last_report ? `<img src="${p.last_report}" class="w-6 h-6" onclick="window.open(this.src)">` : '-'}</td>
                </tr>`;
            });
            document.getElementById('admin-render').innerHTML = html;
        }

        window.chStat = async (id, s) => { await updateDoc(doc(db, 'partners', id), { status: s }); alert("已變更"); };
        window.updP = async (id, field, val) => { await updateDoc(doc(db, 'partners', id), { [field]: parseFloat(val) }); renderAdmin(); };
        window.submitReport = async () => { /* 配送與逆物流分流提交邏輯... */ };
        window.showLayer = id => { hideAll(); document.getElementById(id).style.display='flex'; };
        window.hideAll = () => document.querySelectorAll('.layer').forEach(l=>l.style.display='none');
        window.togglePlate = v => document.getElementById('plate_box').style.display = (v==='公司車')?'none':'block';
        window.triggerCam = f => { window.currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = i => { const r = new FileReader(); r.onload = e => { photosCache[window.currentImgField] = e.target.result; const p = document.getElementById('p_'+window.currentImgField); p.src = e.target.result; p.style.display='block'; document.getElementById('t_'+window.currentImgField).style.display='none'; }; r.readAsDataURL(i.files[0]); };
    </script>
</body>
</html>
