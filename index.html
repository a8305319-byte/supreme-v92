<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 旗艦經營中控台 V92-Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* [1] 全系統樣式全展開 - 確保顯示行數充足且不被摺疊 */
        body { 
            background-color: #020617; 
            color: #94a3b8; 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .layer { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background-color: #020617; 
            z-index: 100; 
            flex-direction: column; 
            align-items: center; 
            padding: 24px; 
            overflow-y: auto; 
            transition: all 0.4s ease;
        }

        /* 旗艦級卡片設計 */
        .id-card { 
            width: 100%; 
            max-width: 580px; 
            background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); 
            border-radius: 3rem; 
            padding: 45px; 
            border: 1.5px solid #1e293b; 
            margin-bottom: 35px; 
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 1);
            position: relative;
        }

        /* 全展開輸入框系統 */
        .input-box { 
            background-color: rgba(15, 23, 42, 0.98); 
            border: 2px solid #334155; 
            border-radius: 1.3rem; 
            padding: 22px; 
            width: 100%; 
            color: #ffffff; 
            outline: none; 
            margin-bottom: 22px; 
            font-size: 17px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-box:focus { 
            border-color: #0ea5e9; 
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.4);
            background-color: #0f172a;
        }

        /* 專業標籤字體定義 */
        .label-sky { 
            font-size: 15px; 
            color: #38bdf8; 
            font-weight: 900; 
            margin-bottom: 15px; 
            display: block; 
            margin-top: 25px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        .btn-prime { 
            width: 100%; 
            padding: 24px; 
            border-radius: 1.6rem; 
            background: #0ea5e9; 
            color: #020617; 
            font-weight: 950; 
            font-size: 19px; 
            cursor: pointer; 
            border: none;
            box-shadow: 0 18px 30px -5px rgba(14, 165, 233, 0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-prime:active { transform: scale(0.94); opacity: 0.92; }

        /* 記住我組件設計 */
        .remember-wrap { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 35px; 
            width: 100%; 
            padding-left: 15px; 
        }
        .remember-wrap input { 
            width: 26px; 
            height: 26px; 
            accent-color: #0ea5e9; 
            cursor: pointer; 
        }

        /* 影像拍照與牆樣式 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 18px; margin-bottom: 35px; }
        .photo-slot { 
            background-color: #0f172a; border: 2.5px dashed #334155; border-radius: 24px; 
            height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            cursor: pointer; overflow: hidden; transition: all 0.3s ease;
        }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .photo-wall { display: grid; grid-template-cols: repeat(3, 1fr); gap: 15px; width: 100%; margin-bottom: 45px; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: 14px; overflow: hidden; border: 1px solid #1e293b; box-shadow: 0 12px 18px rgba(0,0,0,0.5); }
        .del-badge { position: absolute; top: 8px; right: 8px; background: rgba(220, 38, 38, 0.98); color: #ffffff; font-size: 10px; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-weight: 900; z-index: 100; }

        /* 高清薪資單樣式 */
        #slip-box { position: absolute; left: -9999px; background: #ffffff; color: #000000; padding: 65px; width: 550px; border: 1.5px solid #ccc; border-radius: 12px; }
        .slip-header { text-align: center; border-bottom: 6px solid #000; padding-bottom: 30px; margin-bottom: 45px; }
        .slip-row { display: flex; justify-content: space-between; border-bottom: 1.8px solid #eeeeee; padding: 18px 0; font-size: 19px; }

        /* 徽章與彈窗模塊 */
        .v-badge { font-size: 12px; padding: 5px 15px; border-radius: 99px; border: 1.5px solid #0ea5e9; color: #0ea5e9; margin-left: 12px; font-weight: 900; background: rgba(14,165,233,0.15); text-transform: uppercase; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.99); z-index: 1000; padding: 24px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-9xl font-black text-white italic mb-5 tracking-tighter">SUPREME</h1>
        <p class="text-sky-500 text-base font-black tracking-[0.7em] mb-24 uppercase italic underline decoration-sky-600 decoration-4">Enterprise Hub V92-Elite</p>
        
        <div class="w-full max-w-[400px]">
            <label class="text-[11px] text-slate-500 uppercase font-black mb-2 block text-left ml-4">Login Phone / 聯絡手機</label>
            <input type="tel" id="login_phone" placeholder="輸入您的聯絡手機" class="input-box text-center shadow-2xl">
            
            <label class="text-[11px] text-slate-500 uppercase font-black mb-2 block text-left ml-4">Login PIN / 安全密碼</label>
            <input type="password" id="login_pin" placeholder="輸入您的 4 位 PIN" class="input-box text-center shadow-2xl">
            
            <div class="remember-wrap">
                <input type="checkbox" id="remember_me">
                <label for="remember_me">保持登入狀態並記住我的帳號</label>
            </div>

            <button onclick="boot()" class="btn-prime shadow-sky-500/20">進入系統管理中控台</button>
            
            <button onclick="showApply()" class="text-base text-slate-600 underline mt-20 block mx-auto uppercase font-black hover:text-sky-400">
                Partner Onboarding / 夥伴入職申請
            </button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="id-card shadow-sky-500/20">
            <h2 class="text-5xl font-black text-white mb-14 text-center italic tracking-tight underline decoration-sky-500 decoration-8 underline-offset-8">詳細入職申請表單</h2>
            
            <span class="label-sky">第一階段：證件影像拍照上傳 (務必清晰)</span>
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerCam('id_f')">
                    <span id="t_id_f" class="text-xs text-slate-400 font-black uppercase">身分證正面</span>
                    <img id="p_id_f">
                </div>
                <div class="photo-slot" onclick="triggerCam('id_b')">
                    <span id="t_id_b" class="text-xs text-slate-400 font-black uppercase">身分證反面</span>
                    <img id="p_id_b">
                </div>
                <div class="photo-slot" onclick="triggerCam('lic')">
                    <span id="t_lic" class="text-xs text-slate-400 font-black uppercase">駕駛執照</span>
                    <img id="p_lic">
                </div>
                <div class="photo-slot" onclick="triggerCam('car')">
                    <span id="t_car" class="text-xs text-slate-400 font-black uppercase">營運行照</span>
                    <img id="p_car">
                </div>
                <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
            </div>

            <span class="label-sky">第二階段：核心人事基本資料登錄</span>
            <input type="text" id="app_name" placeholder="真實姓名 (與證件一致)" class="input-box shadow-inner">
            <input type="text" id="app_idnum" placeholder="身分證字號 (勞保與申報用)" class="input-box shadow-inner">
            <input type="tel" id="app_phone" placeholder="聯絡手機 (登入帳號)" class="input-box shadow-inner">
            <input type="password" id="app_pin" placeholder="自訂 PIN 碼 (4位數字)" maxlength="4" class="input-box shadow-inner">
            
            <span class="label-sky">第三階段：通訊與詳細住址</span>
            <input type="text" id="app_h_addr" placeholder="詳細戶籍/通訊地址" class="input-box shadow-inner">
            <input type="text" id="app_emergency" placeholder="緊急聯絡人姓名與 24H 電話" class="input-box shadow-inner">
            
            <span class="label-sky">第四階段：營運車種權限</span>
            <select id="app_vehicle" class="input-box bg-[#0f172a] font-black appearance-none border-2 border-sky-900/50">
                <option value="A機車">類型 A：夥伴自有機車</option>
                <option value="B自有車">類型 B：夥伴自有貨車 / 轎車</option>
                <option value="C公司車">類型 C：公司統一配發車輛</option>
            </select>
            
            <div class="mt-16 pt-10 border-t-2 border-slate-800">
                <button onclick="submitApply()" class="btn-prime shadow-sky-500/40">確認並提交完整入職資料</button>
                <button onclick="location.reload()" class="w-full mt-12 text-sm text-slate-500 text-center font-black uppercase underline tracking-[0.5em]">返回系統登入</button>
            </div>
        </div>
    </div>

    <div id="edit-page" class="layer">
        <div class="id-card shadow-orange-500/20 border-orange-900/20">
            <h2 class="text-4xl font-black text-white mb-12 text-center italic tracking-widest border-b-8 border-orange-600 pb-5">✏️ 修改夥伴人事資料中心</h2>
            
            <div id="edit-form-container">
                <label class="label-sky">修改真實姓名</label>
                <input type="text" id="edit_name" class="input-box" placeholder="更正姓名">
                
                <label class="label-sky">修改手機帳號 (修正登入ID)</label>
                <input type="tel" id="edit_phone" class="input-box" placeholder="更正電話">
                
                <label class="label-sky">修改安全 PIN 碼 (重設密碼)</label>
                <input type="text" id="edit_pin" class="input-box" placeholder="重設密碼">
                
                <label class="label-sky">修改身分證號</label>
                <input type="text" id="edit_idnum" class="input-box" placeholder="更正證號">
                
                <label class="label-sky">修改詳細住址資訊</label>
                <input type="text" id="edit_addr" class="input-box" placeholder="更正地址">
                
                <label class="label-sky">修改緊急聯絡資訊</label>
                <input type="text" id="edit_emergency" class="input-box" placeholder="姓名與電話">
            </div>

            <div class="mt-12 pt-8 border-t-2 border-slate-800">
                <button onclick="window.commitPersonnelUpdate()" class="btn-prime !bg-orange-600 !text-white shadow-orange-600/30">確認修正內容並同步雲端</button>
                <button onclick="document.getElementById('edit-page').style.display='none'" class="w-full mt-10 text-sm text-slate-500 font-black text-center block uppercase underline underline-offset-8">Cancel / 放棄修改返回</button>
            </div>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        
        <button onclick="location.reload()" class="mt-24 mb-40 text-slate-700 font-black text-sm underline uppercase tracking-[0.7em] hover:text-red-600">
            Terminate System Session / 安全登出管理中控台
        </button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-14 shadow-sky-500/30 border-sky-800/30" id="detail-content">
            </div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-10 max-w-[550px] mx-auto block shadow-none border-2 border-slate-700 font-black tracking-widest">CLOSE PROFILE / 關閉詳情</button>
    </div>

    <div id="slip-box">
        <div class="slip-header">
            <h2 style="margin:0; font-size: 32px; font-weight: 950; letter-spacing: 10px; text-transform: uppercase;">SUPREME 酬勞結算明細單</h2>
            <p id="slip-date" style="margin:15px 0; font-size:16px; color:#222; font-weight: 900; border: 2px solid #000; display: inline-block; padding: 4px 15px;"></p>
        </div>
        
        <div id="slip-body">
            </div>
        
        <div style="margin-top:50px; border-top: 8px double #000; padding-top:30px; font-size:28px; font-weight:950; display:flex; justify-content:space-between; color: #000; background: #ffffd0; padding: 15px;">
            <span>本月結算應領實發總額</span>
            <span id="slip-total-val" style="border-bottom: 4px solid #000; font-family: monospace;"></span>
        </div>
        
        <div style="text-align:center; margin-top:80px; font-size:13px; color:#777; border-top: 2px solid #eee; padding-top:25px;">
            <p style="font-weight: bold;">SECURITY KEY: SUPREME-V92-ELITE-ENCRYPTED-LOGISTICS-REPORT</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 資料庫核心配置
        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 全域狀態定義
        let partners = [];
        let taskLogs = [];
        let currentImageField = '';
        let globalEditId = '';
        let photosBuffer = { id_f: null, id_b: null, lic: null, car: null };

        // 啟動全時段監控
        onSnapshot(collection(db, 'partners'), s => { 
            partners = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            console.log("Database Sync: Partners Loaded");
        });
        onSnapshot(collection(db, 'logs'), s => { 
            taskLogs = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            console.log("Database Sync: Task Logs Loaded");
        });

        // 記住我恢復
        window.addEventListener('DOMContentLoaded', () => {
            const sp = localStorage.getItem('s_elite_auth_ph');
            const si = localStorage.getItem('s_elite_auth_pi');
            if(sp && si) {
                document.getElementById('login_phone').value = sp;
                document.getElementById('login_pin').value = atob(si); 
                document.getElementById('remember_me').checked = true;
            }
        });

        // 登入中控系統主邏輯
        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            const rm = document.getElementById('remember_me').checked;

            if(rm) {
                localStorage.setItem('s_elite_auth_ph', ph);
                localStorage.setItem('s_elite_auth_pi', btoa(pi));
            } else {
                localStorage.removeItem('s_elite_auth_ph');
                localStorage.removeItem('s_elite_auth_pi');
            }

            if(ph === "0976017938" && pi === "0531") return renderEliteAdminDashboard();
            const p = partners.find(x => x.phone === ph && x.uid === pi);
            if(p && p.status === "approved") return renderPartnerHub(p);
            alert("驗證失敗：手機號碼或 PIN 碼錯誤，或尚未核准開通。");
        };

        // 入職流程影像處理 (完全解構)
        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
        window.triggerCam = (f) => { currentImageField = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            if (!input.files || !input.files[0]) return;
            const r = new FileReader();
            r.onload = (e) => {
                photosBuffer[currentImageField] = e.target.result;
                const p = document.getElementById('p_' + currentImageField);
                p.src = e.target.result; p.style.display = 'block';
                document.getElementById('t_' + currentImageField).style.display = 'none';
            };
            r.readAsDataURL(input.files[0]);
        };

        window.submitApply = async () => {
            const n = document.getElementById('app_name').value;
            const ph = document.getElementById('app_phone').value;
            const pi = document.getElementById('app_pin').value;
            const id = document.getElementById('app_idnum').value;
            if(!n || !ph || !pi || !id) return alert("核心人事資料為必填！");

            const payload = {
                name: n, phone: ph, uid: pi, id_num: id,
                h_addr: document.getElementById('app_h_addr').value,
                emergency: document.getElementById('app_emergency').value,
                v_type: document.getElementById('app_vehicle').value,
                docs: photosBuffer, status: "pending", 
                rate_del: 50, rate_ret: 20, 
                labor_fee: 1500, health_fee: 800, health_cnt: 1, 
                bonus: 0, penalty: 0, total_del: 0, total_ret: 0, 
                create_time: serverTimestamp()
            };
            await addDoc(collection(db, 'partners'), payload);
            alert("申請資料已提交至雲端，請等待老闆核准。"); location.reload();
        };

        // [核心代碼] 老闆看板渲染 (補回 2 項勞健保費 + 健保人數自由輸入 + 人事修改)
        function renderEliteAdminDashboard() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved"), pending = partners.filter(x => x.status === "pending");
            
            let html = `<div class="w-full max-w-[550px] px-2"><h2 class="text-white font-black text-7xl mb-16 uppercase italic tracking-tighter border-l-[15px] border-sky-500 pl-8 shadow-2xl">Elite Admin Hub</h2>`;
            
            // 任務影像模塊
            html += `<p class="text-sky-500 font-black text-[15px] mb-8 uppercase tracking-[0.5em] flex items-center"><span class="mr-4 animate-ping">●</span> LIVE TASK FEED / 影像審核</p>`;
            html += `<div class="photo-wall">${taskLogs.slice(-12).reverse().map(l => `<div class="photo-item"><img src="${l.photo}" class="w-full h-full object-cover"><div class="del-badge" onclick="window.delTaskImage('${l.id}')">移除影像</div></div>`).join('')}</div>`;

            // 功能管理動作區
            html += `<div class="flex gap-6 mb-24"><button onclick="window.initGlobalReset()" class="flex-1 bg-red-900/40 text-red-500 border border-red-900/60 py-8 rounded-3xl text-[14px] font-black uppercase">月底數據清零</button></div>`;

            // 待審核清單
            if(pending.length > 0) {
                html += `<p class="text-orange-500 font-black mb-8 text-lg uppercase tracking-widest border-b-2 border-orange-900/50 pb-3">Pending Onboarding / 待核准 (${pending.length})</p>`;
                pending.forEach(p => {
                    html += `<div class="id-card !p-10 !bg-slate-900 mb-12 flex justify-between items-center border-orange-500/40 border-2"><div><p class="text-white font-black text-2xl">${p.name}</p></div><button onclick="window.approveReq('${p.id}')" class="bg-sky-600 text-white px-14 py-5 rounded-2xl text-lg font-black shadow-sky-600/40">核准入職</button></div>`;
                });
            }

            // 夥伴會計中心 (全功能展開)
            html += `<p class="text-slate-600 font-black text-[15px] uppercase mb-12 tracking-[0.4em]">Accounting & HR Hub / 財務與人事管理</p>`;
            approved.forEach(p => {
                const pay = (p.total_del*(p.rate_del||50))+(p.total_ret*(p.rate_ret||20))-(p.labor_fee||1500)-((p.health_cnt||1)*(p.health_fee||800))+(p.bonus||0)-(p.penalty||0);
                
                html += `
                <div class="id-card !p-12 !bg-slate-900/60 border-slate-800 mb-20 shadow-2xl">
                    <div class="flex justify-between items-start mb-12">
                        <div onclick="window.viewDetailedProfile('${p.id}')" class="cursor-pointer group">
                            <p class="text-white font-black text-4xl group-hover:text-sky-400 transition-colors">${p.name} <span class="v-badge">${p.v_type}</span></p>
                            <p class="text-[13px] text-slate-500 underline mt-4 font-black italic tracking-widest uppercase">Inspect HR Documents / 查閱證件</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sky-400 font-black text-5xl tracking-tighter">$${pay.toLocaleString()}</p>
                            <button onclick="window.initModifyData('${p.id}')" class="text-[13px] text-orange-500 underline font-black uppercase mt-4 block hover:text-orange-300">✏️ 修改人事資料</button>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-8 mb-6">
                        <div><label class="text-[11px] text-slate-600 font-black uppercase mb-2 block">配送費率設定</label><input id="acc_rd_${p.id}" type="number" value="${p.rate_del||50}" class="input-box !py-5 !text-lg !mb-0 shadow-inner"></div>
                        <div><label class="text-[11px] text-slate-600 font-black uppercase mb-2 block">逆物費率設定</label><input id="acc_rr_${p.id}" type="number" value="${p.rate_ret||20}" class="input-box !py-4 !text-base !mb-0 shadow-inner"></div>
                        
                        <div><label class="text-[11px] text-orange-600 font-black uppercase mb-2 block">勞保扣款金額</label><input id="acc_lf_${p.id}" type="number" value="${p.labor_fee||1500}" class="input-box !py-4 !text-base !mb-0 shadow-inner !border-orange-900/50"></div>
                        <div><label class="text-[11px] text-orange-600 font-black uppercase mb-2 block">健保單價 / 加保人數</label>
                            <div class="flex gap-2">
                                <input id="acc_hf_${p.id}" type="number" value="${p.health_fee||800}" class="input-box !py-4 !text-base !mb-0 !w-2/3 shadow-inner !border-orange-900/50">
                                <input id="acc_hc_${p.id}" type="number" value="${p.health_cnt||1}" class="input-box !py-4 !text-base !mb-0 !w-1/3 shadow-inner !border-orange-900/50" placeholder="人數">
                            </div>
                        </div>

                        <div><label class="text-[11px] text-green-600 font-black uppercase mb-2 block">本月加給補貼</label><input id="acc_bn_${p.id}" type="number" value="${p.bonus||0}" class="input-box !py-4 !text-base !mb-0 shadow-inner"></div>
                        <div><label class="text-[11px] text-red-600 font-black uppercase mb-2 block">本月罰金扣除</label><input id="acc_pn_${p.id}" type="number" value="${p.penalty||0}" class="input-box !py-4 !text-base !mb-0 shadow-inner"></div>
                    </div>

                    <div class="flex gap-6 mt-14 pt-10 border-t-2 border-slate-800">
                        <button onclick="window.saveAccountingSync('${p.id}')" class="flex-1 bg-slate-800 text-sky-500 py-6 rounded-3xl text-[14px] font-black border border-sky-900/70 uppercase tracking-widest shadow-2xl transition-all hover:bg-slate-700">同步更新會計數據</button>
                        <button onclick='window.executePayslipExport(${JSON.stringify(p)})' class="px-10 bg-sky-600/10 text-sky-500 py-6 rounded-3xl text-[14px] font-black border border-sky-600/30 uppercase tracking-widest">薪資單</button>
                        <button onclick="window.delPartnerPermanently('${p.id}')" class="px-8 text-red-900 text-[13px] font-black underline uppercase hover:text-red-600">移除</button>
                    </div>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // [人事修改模組實現] 完全展開
        window.initModifyData = (id) => {
            const p = partners.find(x => x.id === id); globalEditId = id;
            document.getElementById('edit-page').style.display = 'flex';
            document.getElementById('edit_name').value = p.name || '';
            document.getElementById('edit_phone').value = p.phone || '';
            document.getElementById('edit_pin').value = p.uid || '';
            document.getElementById('edit_idnum').value = p.id_num || '';
            document.getElementById('edit_addr').value = p.h_addr || '';
            document.getElementById('edit_emergency').value = p.emergency || '';
        };

        window.commitPersonnelUpdate = async () => {
            if(!confirm("確定要將修正後的人事資料存入雲端嗎？")) return;
            const updated = {
                name: document.getElementById('edit_name').value, phone: document.getElementById('edit_phone').value,
                uid: document.getElementById('edit_pin').value, id_num: document.getElementById('edit_idnum').value,
                h_addr: document.getElementById('edit_addr').value, emergency: document.getElementById('edit_emergency').value
            };
            await updateDoc(doc(db, 'partners', globalEditId), updated);
            alert("修改已存檔。"); document.getElementById('edit-page').style.display = 'none'; renderEliteAdminDashboard();
        };

        window.saveAccountingSync = async (id) => {
            const upd = {
                rate_del: parseInt(document.getElementById('acc_rd_'+id).value)||0,
                rate_ret: parseInt(document.getElementById('acc_rr_'+id).value)||0,
                labor_fee: parseInt(document.getElementById('acc_lf_'+id).value)||0,
                health_fee: parseInt(document.getElementById('acc_hf_'+id).value)||0,
                health_cnt: parseInt(document.getElementById('acc_hc_'+id).value)||0,
                bonus: parseInt(document.getElementById('acc_bn_'+id).value)||0,
                penalty: parseInt(document.getElementById('acc_pn_'+id).value)||0
            };
            await updateDoc(doc(db, 'partners', id), upd);
            alert("會計參數同步完成。"); renderEliteAdminDashboard();
        };

        // 行政管理核心功能
        window.delTaskImage = async (id) => { if(confirm("移除影像？")) await deleteDoc(doc(db, 'logs', id)); };
        window.delPartnerPermanently = async (id) => { if(confirm("警告：永久移除夥伴及其數據？")) await deleteDoc(doc(db, 'partners', id)); };
        window.approveReq = async (id) => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("核准成功。"); renderEliteAdminDashboard(); };
        window.initGlobalReset = async () => { if(confirm("歸零數據？")) { for(let p of partners) { await updateDoc(doc(db, 'partners', p.id), { total_del: 0, total_ret: 0, bonus: 0, penalty: 0 }); } alert("歸零作業完成。"); location.reload(); } };

        window.viewDetailedProfile = (id) => {
            const p = partners.find(x => x.id === id); document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `<h3 class="text-white font-black mb-10 border-b-4 border-slate-800 pb-6 text-base uppercase italic tracking-[0.4em]">Partner Document Profile</h3>
            <div class="grid grid-cols-2 gap-y-7 text-xs text-slate-400 mb-14 leading-relaxed"><p>姓名：<span class="text-white font-black text-2xl ml-2 underline decoration-sky-600">${p.name}</span></p><p>車種：<span class="text-white font-black text-2xl ml-2">${p.v_type}</span></p><p>身分證：<span class="text-white ml-2">${p.id_num}</span></p><p>手機：<span class="text-white ml-2">${p.phone}</span></p><p class="col-span-2 text-orange-500 font-black">緊急：<span class="ml-2">${p.emergency}</span></p></div>
            <div class="grid grid-cols-2 gap-8">
                <img src="${p.docs?.id_f}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)"><img src="${p.docs?.id_b}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)">
                <img src="${p.docs?.lic}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)"><img src="${p.docs?.car}" class="rounded-[3rem] border-2 border-slate-800 shadow-2xl mb-4" onclick="window.open(this.src)">
            </div>`;
        };

        window.executePayslipExport = async (p) => {
            const rd = p.rate_del||50, rr = p.rate_ret||20, lf = p.labor_fee||1500, hf = p.health_fee||800, hc = p.health_cnt||1, bn = p.bonus||0, pn = p.penalty||0, net = (p.total_del*rd)+(p.total_ret*rr)+bn-pn-lf-(hf*hc);
            document.getElementById('slip-date').innerText = "結算期間(月份)：" + (new Date().getMonth()+1) + " 月份";
            document.getElementById('slip-body').innerHTML = `
                <div class="slip-row" style="font-weight:950; background:#f0f0f0; padding:25px 15px; border-radius:12px; margin-bottom:20px;"><span>夥伴(領款人)姓名</span><b style="font-size:26px;">${p.name}</b></div>
                <div class="slip-row"><span>配送報酬 ($${rd}/件)</span><span>$${(p.total_del*rd).toLocaleString()}</span></div>
                <div class="slip-row"><span>逆物報酬 ($${rr}/件)</span><span>$${(p.total_ret*rr).toLocaleString()}</span></div>
                <div class="slip-row" style="color:green; font-weight:900;"><span>本月行政津貼加給</span><span>+$${bn.toLocaleString()}</span></div>
                <div class="slip-row" style="color:#e11d48; font-weight:bold; border-top:2px dashed #000; margin-top:25px;"><span>勞保扣費自付額</span><span>-$${lf.toLocaleString()}</span></div>
                <div class="slip-row" style="color:#e11d48; font-weight:bold;"><span>健保費自付額 (共${hc}人)</span><span>-$${(hf*hc).toLocaleString()}</span></div>
                <div class="slip-row" style="color:#e11d48; font-weight:bold;"><span>行政罰金與扣款</span><span>-$${pn.toLocaleString()}</span></div>`;
            document.getElementById('slip-total-val').innerText = "TWD $ " + net.toLocaleString();
            const s = document.getElementById('slip-box'); s.style.left = "0"; const canvas = await html2canvas(s, { scale: 3, backgroundColor: "#ffffff" }); s.style.left = "-9999px";
            const a = document.createElement('a'); a.download = `SUPREME_SLIP_${p.name}.png`; a.href = canvas.toDataURL("image/png"); a.click();
        };

        function renderPartnerHub(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card shadow-sky-500/20 shadow-2xl">
                    <h2 class="text-6xl font-black text-white mb-2 italic underline decoration-sky-600 decoration-4">${p.name} 夥伴</h2>
                    <p class="text-[14px] text-slate-500 uppercase tracking-[0.5em] mb-20 font-black italic underline decoration-sky-700">Operational Hub</p>
                    <div class="space-y-14">
                        <div><label class="label-sky">回報今日配送成功件數</label><input type="number" id="v_del" placeholder="0" class="input-box text-center text-7xl font-black text-sky-400 h-36 shadow-2xl"></div>
                        <div><label class="label-sky">回報今日逆物退回數量</label><input type="number" id="v_ret" placeholder="0" class="input-box text-center text-7xl font-black text-orange-400 h-36 shadow-2xl"></div>
                        <div class="pt-16 border-t-4 border-slate-800"><button onclick="window.commitSync('${p.id}')" class="btn-prime">確認回報數據同步雲端</button></div>
                    </div>
                </div>`;
        }

        window.commitSync = async (id) => {
            const d = parseInt(document.getElementById('v_del').value)||0, r = parseInt(document.getElementById('v_ret').value)||0;
            if(d === 0 && r === 0) return alert("請輸入作業數據。");
            await addDoc(collection(db, 'logs'), { driverId: id, del: d, ret: r, photo: "https://via.placeholder.com/600", time: serverTimestamp() });
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("作業數據同步成功。"); location.reload();
        };
    </script>
</body>
</html>
