<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GGSOC Mobile Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; }
    .modal { background: #0a0a0a; border: 1px solid #3b82f633; border-radius: 32px; padding: 30px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Firebase 配置
    const config = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    function App() {
      const [view, setView] = useState('gate');
      const [partners, setPartners] = useState([]);
      const [detail, setDetail] = useState(null);
      const [showAi, setShowAi] = useState(false);

      useEffect(() => {
        firebase.auth().signInAnonymously();
        return db.collection('partners').onSnapshot(s => setPartners(s.docs.map(d => ({id:d.id, ...d.data()}))));
      }, []);

      // 免試建檔
      const addDriver = async () => {
        const n = prompt("姓名:"), p = prompt("手機:");
        if(n && p) await db.collection('partners').add({ name: n, phone: p, total_del: 0, total_pkp: 0, status: 'approved' });
      };

      if(view === 'gate') return (
        <div className="h-screen flex items-center justify-center p-6 text-center">
          <div className="card w-full max-w-sm">
            <h1 className="text-2xl font-black text-blue-500 mb-8 tracking-tighter italic">GGSOC_TERMINAL</h1>
            <input id="u" placeholder="PHONE" className="w-full bg-zinc-900 p-4 rounded-xl mb-3 text-center border border-white/10" />
            <input id="p" type="password" placeholder="PIN" className="w-full bg-zinc-900 p-4 rounded-xl mb-8 text-center border border-white/10" />
            <button onClick={() => { if(document.getElementById('u').value==='0976017938') setView('admin'); }} className="w-full py-4 bg-blue-600 rounded-xl font-black">LOGIN</button>
          </div>
        </div>
      );

      return (
        <div className="p-4 min-h-screen">
          <div className="flex justify-between items-center mb-8">
            <h2 className="text-xl font-black italic">指揮中心</h2>
            <div className="flex gap-2">
              <button onClick={addDriver} className="bg-white/10 px-3 py-2 rounded-xl text-[10px] border border-white/10">➕ 建檔</button>
              <button onClick={() => setShowAi(true)} className="bg-blue-600 px-3 py-2 rounded-xl text-[10px] font-black">🧠 AI</button>
            </div>
          </div>

          <div className="grid grid-cols-1 gap-4">
            {partners.map(p => (
              <div key={p.id} onClick={() => setDetail(p)} className="card active:scale-95 transition-all">
                <div className="flex justify-between items-start">
                  <div>
                    <h4 className="text-lg font-black">{p.name}</h4>
                    <p className="text-[10px] text-zinc-500 font-mono">{p.phone}</p>
                  </div>
                  <span className="text-blue-500 font-black text-sm italic">{ (p.total_del||0) + (p.total_pkp||0) } 件</span>
                </div>
              </div>
            ))}
          </div>

          {/* 財務與簽章詳情 */}
          {detail && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[50]" onClick={()=>setDetail(null)}>
              <div className="modal" onClick={e=>e.stopPropagation()}>
                <h3 className="text-2xl font-black text-blue-400 mb-6 italic">{detail.name}</h3>
                <div className="space-y-4 text-sm mb-10">
                  <div className="flex justify-between border-b border-white/10 pb-2"><span>預估報酬</span><span className="font-mono">${(detail.total_del*15 + detail.total_pkp*10).toLocaleString()}</span></div>
                  <div className="flex justify-between text-rose-500"><span>2026 勞保扣繳</span><span>-$679</span></div>
                  <div className="flex justify-between text-rose-500"><span>2026 健保扣繳</span><span>-$458</span></div>
                  <div className="flex justify-between text-emerald-400 font-black pt-4 border-t border-white/10 text-lg"><span>實領淨額</span><span>${(detail.total_del*15 + detail.total_pkp*10 - 1137).toLocaleString()}</span></div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button className="bg-zinc-800 py-3 rounded-xl text-[10px]" onClick={()=>alert('戰情已發送')}>LINE 戰情</button>
                  <button className="bg-blue-600 py-3 rounded-xl text-[10px] font-black" onClick={()=>setDetail(null)}>關閉</button>
                </div>
              </div>
            </div>
          )}

          {/* AI 幕僚對話 */}
          {showAi && (
            <div className="fixed inset-y-0 right-0 w-full bg-black z-[100] p-8 flex flex-col">
              <div className="flex justify-between items-center mb-8">
                <span className="text-blue-500 font-black italic">AI_COPILOT</span>
                <button onClick={()=>setShowAi(false)} className="text-zinc-500">CLOSE</button>
              </div>
              <div className="flex-1 bg-zinc-900 rounded-2xl p-4 text-xs italic text-zinc-500 mb-6">
                總裁您好。目前系統中有 {partners.length} 個實體。請問需要分析哪個區域？
              </div>
              <input onKeyPress={e => e.key==='Enter' && alert('AI 正在分析...')} placeholder="下達營運指令..." className="w-full bg-zinc-900 p-5 rounded-2xl text-sm border border-white/10 outline-none focus:border-blue-500" />
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
