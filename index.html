<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 旗艦經營中控台 V92-Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 強迫物理展開防止 GitHub 摺疊 */
        html { margin: 0px; }
        body { 
            background-color: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        .layer { 
            display: none; position: fixed; inset: 0px; background-color: #020617; 
            z-index: 100; flex-direction: column; align-items: center; padding: 25px; overflow-y: auto; 
        }

        .id-card { 
            width: 100%; max-width: 580px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); 
            border-radius: 3.5rem; padding: 50px; border: 2px solid #1e293b; margin-bottom: 45px; 
            box-shadow: 0px 50px 100px -20px rgba(0, 0, 0, 1); position: relative;
        }

        .input-box { 
            background-color: rgba(15, 23, 42, 0.98); border: 2.5px solid #334155; border-radius: 1.5rem; 
            padding: 22px; width: 100%; color: #ffffff; outline: none; margin-bottom: 25px; font-size: 18px; 
        }

        .label-sky { font-size: 16px; color: #38bdf8; font-weight: 900; margin-bottom: 15px; display: block; margin-top: 30px; letter-spacing: 4px; text-transform: uppercase; }

        .btn-prime { 
            width: 100%; padding: 25px; border-radius: 2rem; background-color: #0ea5e9; color: #020617; 
            font-weight: 950; font-size: 20px; cursor: pointer; border: none;
            box-shadow: 0px 15px 30px -5px rgba(14, 165, 233, 0.5); transition: 0.3s ease;
        }

        .photo-wall { display: grid; grid-template-cols: repeat(3, 1fr); gap: 15px; width: 100%; margin-bottom: 55px; }

        .photo-item { position: relative; aspect-ratio: 1; border-radius: 18px; overflow: hidden; border: 1.5px solid #1e293b; box-shadow: 0px 15px 30px rgba(0,0,0,0.7); }

        #slip-box { position: absolute; left: -9999px; background-color: #ffffff; color: #000; padding: 90px; width: 620px; border: 2px solid #ccc; border-radius: 18px; }

        .slip-header { text-align: center; border-bottom: 8px solid #000; padding-bottom: 40px; margin-bottom: 55px; }

        .slip-row { display: flex; justify-content: space-between; border-bottom: 2px solid #eeeeee; padding: 24px 0; font-size: 20px; }

        .modal { display: none; position: fixed; inset: 0px; background-color: rgba(0, 0, 0, 0.99); z-index: 1000; padding: 24px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-9xl font-black text-white italic mb-8 tracking-tighter">SUPREME</h1>
        <p class="text-sky-500 text-base font-black tracking-[0.8em] mb-28 uppercase underline decoration-sky-600 decoration-8 underline-offset-8">Elite Hub V92-Elite</p>
        <div class="w-full max-w-[420px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center shadow-2xl">
            <input type="password" id="login_pin" placeholder="PIN 安全認證碼" class="input-box text-center shadow-2xl">
            <div class="flex items-center gap-4 mb-12 ml-6">
                <input type="checkbox" id="remember_me" class="w-8 h-8 accent-sky-500 cursor-pointer"><label for="remember_me">保持登入</label>
            </div>
            <button onclick="boot()" class="btn-prime">進入管理中控台</button>
            <button onclick="showApply()" class="text-base text-slate-600 underline mt-24 block mx-auto font-black uppercase tracking-[0.3em] hover:text-sky-400">Partner Onboarding</button>
        </div>
    </div>

    <div id="edit-page" class="layer">
        <div class="id-card shadow-orange-500/30 border-orange-900/30">
            <h2 class="text-5xl font-black text-white mb-16 text-center italic border-b-8 border-orange-600 pb-8">✏️ 修正夥伴人事資料</h2>
            <label class="label-sky">真實姓名</label>
            <input type="text" id="ed_n" class="input-box">
            <label class="label-sky">修改手機號碼</label>
            <input type="tel" id="ed_ph" class="input-box">
            <label class="label-sky">重設 PIN 碼</label>
            <input type="text" id="ed_pi" class="input-box">
            <label class="label-sky">修正身分證號碼</label>
            <input type="text" id="ed_id" class="input-box">
            <label class="label-sky">修正戶籍地址</label>
            <input type="text" id="ed_ha" class="input-box">
            <label class="label-sky">修正緊急聯絡</label>
            <input type="text" id="ed_em" class="input-box">
            <div class="mt-16 pt-10 border-t-4 border-slate-800">
                <button onclick="window.commitPersonnelUpdate()" class="btn-prime !bg-orange-600 !text-white">確認修正並儲存雲端</button>
                <button onclick="document.getElementById('edit-page').style.display='none'" class="w-full mt-12 text-sm text-slate-500 font-black text-center uppercase underline underline-offset-8">取消返回看板</button>
            </div>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-32 mb-48 text-slate-700 font-black text-sm underline uppercase tracking-[0.8em] hover:text-red-600 transition-all duration-700">Logout SUPREME 管理系統</button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-20 shadow-sky-500/40 border-sky-800/30" id="detail-content"></div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-12 max-w-[580px] mx-auto block font-black border-4 border-slate-700">CLOSE PROFILE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, setDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [];
        let logs = [];
        let globalEditId = '';

        // 啟動資料庫即時監聽並強制渲染
        onSnapshot(collection(db, 'partners'), s => { 
            partners = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            if(document.getElementById('main').style.display === 'flex') {
                const sp = localStorage.getItem('s_ph_auth');
                if(sp === "0976017938") renderEliteAdmin();
            }
        });
        
        onSnapshot(collection(db, 'logs'), s => { 
            logs = s.docs.map(d => ({ id: d.id, ...d.data() })); 
        });

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") {
                localStorage.setItem('s_ph_auth', ph);
                return renderEliteAdmin();
            }
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderPartnerHub(p);
            alert("驗證失敗：帳號或 PIN 錯誤，或正等待核准。");
        };

        // 老闆看板渲染 (大補帖全邏輯)
        function renderEliteAdmin() {
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved");
            
            let html = `
            <div class="w-full max-w-[580px] px-2">
                <h2 class="text-white font-black text-8xl mb-20 border-l-[20px] border-sky-500 pl-10 uppercase italic shadow-2xl">Elite Admin</h2>
                <p class="text-sky-500 font-black text-[15px] mb-10 uppercase tracking-[0.5em] flex items-center">LIVE FEED / 即時查核牆</p>
                <div class="photo-wall">${logs.slice(-12).reverse().map(l => `<div class="photo-item"><img src="${l.photo}" class="w-full h-full object-cover"></div>`).join('')}</div>
                <div class="flex gap-6 mb-32">
                    <button onclick="window.resetData()" class="flex-1 bg-red-900/40 text-red-500 border-4 border-red-900/70 py-10 rounded-[3rem] text-[15px] font-black uppercase">月底歸零</button>
                </div>`;

            approved.forEach(p => {
                const pay = (p.total_del*(p.rate_del||50))+(p.total_ret*(p.rate_ret||20))+(p.bonus||0)-(p.penalty||0)-(p.labor_fee||1500)-((p.health_cnt||1)*(p.health_fee||800));
                html += `
                <div class="id-card !p-12 !bg-slate-900/60 border-slate-800 mb-24 shadow-2xl">
                    <div class="flex justify-between items-start mb-16">
                        <div onclick="window.viewDocProfile('${p.id}')" class="cursor-pointer group"><p class="text-white font-black text-5xl group-hover:text-sky-400 transition-colors">${p.name}</p><p class="text-[14px] text-slate-500 underline mt-4 font-black italic uppercase">Inspect HR Docs</p></div>
                        <div class="text-right"><p class="text-sky-400 font-black text-6xl tracking-tighter">$${pay.toLocaleString()}</p><button onclick="window.initModifyPanel('${p.id}')" class="text-[14px] text-orange-500 underline font-black uppercase mt-5 block hover:text-white transition-all">✏️ 修改人事資料</button></div>
                    </div>
                    <div class="grid grid-cols-2 gap-10 mb-8">
                        <div><label class="text-[12px] text-slate-600 font-black uppercase mb-3 block">配送報酬單價</label><input id="rd_${p.id}" type="number" value="${p.rate_del||50}" class="input-box shadow-inner"></div>
                        <div><label class="text-[12px] text-orange-600 font-black uppercase mb-3 block">健保人數</label><input id="rhc_${p.id}" type="number" value="${p.health_cnt||1}" class="input-box !border-orange-900/50 shadow-inner text-center" placeholder="人"></div>
                        <div><label class="text-[12px] text-orange-600 font-black uppercase mb-3 block">勞保扣費金額</label><input id="rl_${p.id}" type="number" value="${p.labor_fee||1500}" class="input-box !border-orange-900/50 shadow-inner"></div>
                        <div><label class="text-[12px] text-green-600 font-black uppercase mb-3 block">獎勵補助 ($)</label><input id="rb_${p.id}" type="number" value="${p.bonus||0}" class="input-box shadow-inner"></div>
                    </div>
                    <div class="mt-12"><button onclick="window.saveAccountingSync('${p.id}')" class="btn-prime">同步數據回雲端</button></div>
                    <div class="flex gap-6 mt-16 pt-12 border-t-4 border-slate-800">
                        <button onclick='window.executePayslipExport(${JSON.stringify(p)})' class="px-12 bg-sky-600/10 text-sky-500 py-7 rounded-[2.5rem] text-[15px] font-black border-4 border-sky-600/30 uppercase shadow-2xl">薪資單</button>
                        <button onclick="window.delPartnerPermanently('${p.id}')" class="px-10 text-red-900 text-[14px] font-black underline uppercase hover:text-red-500">永久銷帳</button>
                    </div>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // 修改人事面板邏輯 (補回功能 2)
        window.initModifyPanel = (id) => {
            const p = partners.find(x => x.id === id); 
            globalEditId = id; 
            document.getElementById('edit-page').style.display = 'flex';
            document.getElementById('ed_n').value = p.name || ''; 
            document.getElementById('ed_ph').value = p.phone || ''; 
            document.getElementById('ed_pi').value = p.uid || '';
            document.getElementById('ed_id').value = p.id_num || ''; 
            document.getElementById('ed_ha').value = p.h_addr || ''; 
            document.getElementById('ed_em').value = p.emergency || '';
        };

        window.commitPersonnelUpdate = async () => {
            if(!confirm("確定修正存檔？")) return;
            const u = { name: document.getElementById('ed_n').value, phone: document.getElementById('ed_ph').value, uid: document.getElementById('ed_pi').value, id_num: document.getElementById('ed_id').value, h_addr: document.getElementById('ed_ha').value, emergency: document.getElementById('ed_em').value };
            await updateDoc(doc(db, 'partners', globalEditId), u); 
            alert("修正已完成。"); 
            document.getElementById('edit-page').style.display = 'none'; 
            renderEliteAdmin();
        };

        window.saveAccountingSync = async (id) => {
            const upd = { rate_del: parseInt(document.getElementById('rd_'+id).value)||0, labor_fee: parseInt(document.getElementById('rl_'+id).value)||1500, health_cnt: parseInt(document.getElementById('rhc_'+id).value)||1, bonus: parseInt(document.getElementById('rb_'+id).value)||0 };
            await updateDoc(doc(db, 'partners', id), upd); alert("財務數據已同步。"); renderEliteAdmin();
        };

        // [夥伴介面補齊 - 之前遺失的部分]
        function renderPartnerHub(p) {
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card shadow-sky-500/20 shadow-2xl">
                    <h2 class="text-7xl font-black text-white mb-2 italic underline decoration-sky-600 decoration-8 underline-offset-8">${p.name}</h2>
                    <div class="space-y-16 mt-20">
                        <div><label class="label-sky">回報今日配送成功件數</label><input type="number" id="v_del" placeholder="0" class="input-box text-center text-8xl font-black text-sky-400 h-44 shadow-2xl"></div>
                        <div class="pt-20 border-t-8 border-slate-800"><button onclick="window.commitSync('${p.id}')" class="btn-prime">確認數據同步中控台</button></div>
                    </div>
                </div>`;
        }

        window.commitSync = async (id) => {
            const d = parseInt(document.getElementById('v_del').value)||0;
            if(d === 0) return alert("請輸入件數。");
            await addDoc(collection(db, 'logs'), { driverId: id, del: d, photo: "https://via.placeholder.com/600", time: serverTimestamp() });
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d) });
            alert("回報同步成功。"); location.reload();
        };

        window.delPartnerPermanently = async (id) => { if(confirm("永久銷帳？")) await deleteDoc(doc(db, 'partners', id)); };
        window.resetData = async () => { if(confirm("月底數據清零？")) { for(let p of partners) { await updateDoc(doc(db, 'partners', p.id), { total_del: 0, total_ret: 0, bonus: 0, penalty: 0 }); } alert("已歸零。"); location.reload(); } };
        
        window.viewDocProfile = (id) => {
            const p = partners.find(x => x.id === id); 
            document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `<h3 class="text-white font-black mb-10 border-b-4 border-slate-800 pb-6 text-base italic uppercase">HR Full File</h3><p>姓名：${p.name}</p><div class="grid grid-cols-2 gap-8 mt-10"><img src="${p.docs?.id_f||''}" class="rounded-2xl border border-slate-800 shadow-2xl"><img src="${p.docs?.id_b||''}" class="rounded-2xl border border-slate-800 shadow-2xl"></div>`;
        };
    </script>
</body>
</html>
