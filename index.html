<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GGSOC 2026 夥伴通行證</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: #d4d4d8; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; font-weight: 500; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .rounded-heavy { border-radius: 2.5rem; }
        .typing-dot { width: 5px; height: 5px; background: #60a5fa; border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .signature-pad { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [step, setStep] = useState('gate'); // gate, chat, sign, done
            const [name, setName] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [messages, setMessages] = useState([]);
            const scrollRef = useRef(null);

            // 老陳的對話腳本：不專業、哈拉感、不秒回
            const chatScript = [
                { text: `嘿！${name || '大哥'}你好啊，我是老陳。剛看到你電話了，我先幫你記著喔。這時間還在忙喔？辛苦了捏。`, delay: 2500 },
                { text: "對了，現在 2026 年了，政府那個二代健保 2.11% 扣得真兇。以後領錢電腦會自動幫你扣掉，這東西大家都覺得囉唆，但現在規矩就是這樣。大哥你應該能體諒吧？反正領錢順、跑車平安最重要。", delay: 4500, isQuestion: true },
                { text: "還有喔，如果有時候照片拍糊了，我叫你重傳一張，那也是為了怕會計那邊看不清不發薪水。你會體諒老陳一下吧？大家求個順嘛。", delay: 3500, isQuestion: true },
                { text: "沒問題啦，看你講話這麼投緣。我把這次算好的錢放在下一頁，你有空再去對一下數字，順手簽個名領錢啦！不急啦，你休息時再弄就好。", delay: 3000 }
            ];

            const handleStart = () => {
                if (!name) return alert("大哥，名字填一下啦！");
                setStep('chat');
                runChat(0);
            };

            const runChat = (index) => {
                if (index >= chatScript.length) {
                    setTimeout(() => setStep('sign'), 2500);
                    return;
                }
                setIsTyping(true);
                setTimeout(() => {
                    setIsTyping(false);
                    setMessages(prev => [...prev, chatScript[index]]);
                    if (!chatScript[index].isQuestion) {
                        runChat(index + 1);
                    }
                }, chatScript[index].delay);
            };

            useEffect(() => {
                scrollRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            if (step === 'gate') return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#050505]">
                    <div className="w-full max-w-sm glass p-10 border-zinc-800 shadow-2xl">
                        <h2 className="text-zinc-600 text-[10px] tracking-[0.5em] font-black mb-12 uppercase">GGSOC_2026_GATE</h2>
                        <div className="space-y-6">
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="您的大名" className="w-full bg-zinc-900/50 border-none p-5 rounded-2xl text-white placeholder-zinc-700 outline-none focus:ring-1 focus:ring-zinc-700 transition-all" />
                            <input placeholder="聯絡電話" className="w-full bg-zinc-900/50 border-none p-5 rounded-2xl text-white placeholder-zinc-700 outline-none focus:ring-1 focus:ring-zinc-700 transition-all" />
                            <button onClick={handleStart} className="w-full bg-white text-black font-black py-5 rounded-full shadow-[0_0_30px_rgba(255,255,255,0.1)] hover:scale-[1.02] active:scale-[0.98] transition-all">開始接單</button>
                        </div>
                    </div>
                </div>
            );

            if (step === 'chat') return (
                <div className="h-screen flex flex-col p-6 bg-[#050505]">
                    <div className="flex-1 overflow-y-auto space-y-6 pb-20">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex flex-col ${m.fromUser ? 'items-end' : 'items-start'} animate-in fade-in slide-in-from-bottom-2 duration-500`}>
                                <span className="text-[10px] text-zinc-600 mb-2 ml-2 uppercase tracking-tighter">{m.fromUser ? '你' : '老陳 (812)'}</span>
                                <div className={`${m.fromUser ? 'bg-white text-black rounded-tr-none' : 'bg-zinc-900 text-zinc-200 rounded-tl-none border border-white/5'} p-5 rounded-3xl text-sm leading-relaxed shadow-lg`}>
                                    {m.text}
                                </div>
                                {m.isQuestion && (
                                    <div className="mt-4 flex gap-3">
                                        <button onClick={() => { setMessages(prev => [...prev, {text: "沒問題啦，老陳你處理就好", fromUser: true}]); runChat(messages.length + 1); }} className="bg-zinc-800 border border-zinc-700 text-zinc-300 px-5 py-2.5 rounded-full text-xs hover:bg-zinc-700">沒問題</button>
                                        <button onClick={() => { setMessages(prev => [...prev, {text: "知道，電腦算好就好", fromUser: true}]); runChat(messages.length + 1); }} className="bg-zinc-800 border border-zinc-700 text-zinc-300 px-5 py-2.5 rounded-full text-xs hover:bg-zinc-700">知道了</button>
                                    </div>
                                )}
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex items-center gap-1.5 p-5 bg-zinc-900/30 rounded-3xl w-20">
                                <div className="typing-dot" style={{animationDelay: '0s'}}></div>
                                <div className="typing-dot" style={{animationDelay: '0.2s'}}></div>
                                <div className="typing-dot" style={{animationDelay: '0.4s'}}></div>
                            </div>
                        )}
                        <div ref={scrollRef} />
                    </div>
                </div>
            );

            if (step === 'sign') return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#050505]">
                    <div className="w-full max-w-sm rounded-heavy glass p-10 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500/50 to-transparent"></div>
                        <span className="text-zinc-600 font-black italic tracking-widest text-[10px] uppercase">夥伴領錢確認</span>
                        <div className="my-10 space-y-2">
                            <p className="text-zinc-500 text-xs">本次實領總額</p>
                            <p className="text-5xl font-black text-white">$9,789</p>
                            <p className="text-[10px] text-zinc-600 mt-2 italic">已由電腦自動處理 2.11% 政府規費</p>
                        </div>
                        <div className="w-full h-48 signature-pad rounded-3xl border border-zinc-800/50 flex items-center justify-center text-zinc-700 text-xs mb-8 shadow-inner">
                            [ 大哥，有空順手劃個名 ]
                        </div>
                        <button onClick={() => setStep('done')} className="w-full bg-white text-black font-black py-5 rounded-full shadow-2xl active:scale-95 transition-all">確認入帳</button>
                        <p className="mt-6 text-[9px] text-zinc-800 font-mono tracking-tighter">
                            $$Net = (Gross - Labor - Health) - \lceil Gross \times 2.11\% \rceil$$
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex items-center justify-center p-10 text-center bg-[#050505]">
                    <div className="animate-in zoom-in duration-700">
                        <div className="text-7xl mb-8">☕</div>
                        <h2 className="text-2xl font-black text-white">謝啦，大哥！</h2>
                        <p className="text-zinc-500 text-sm mt-4 leading-relaxed">錢發下去了，這幾天再去刷本子就好。<br/>辛苦了，開車小心喔！</p>
                        <button onClick={() => window.location.reload()} className="mt-12 text-zinc-700 text-[10px] uppercase tracking-widest border-b border-zinc-800 pb-1">返回門戶</button>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
