<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 終極管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #334155; margin-bottom: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #ffffff; outline: none; margin-bottom: 12px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; border-left: 4px solid #0ea5e9; padding-left: 8px; margin-top: 15px; text-align: left; }
        .q-box { background: rgba(255,255,255,0.03); border: 1px solid #1e293b; padding: 15px; border-radius: 1.5rem; margin-bottom: 10px; text-align: left; }
        .opt-label { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-radius: 12px; font-size: 14px; color: #e2e8f0; }
        .photo-slot { background: #0f172a; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; width: 100%; margin: 15px 0; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        #payslip-box { background: #fff; color: #000; padding: 30px; border-radius: 4px; width: 320px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-12 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">數位行政與營運總控</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center">
                <input type="password" id="login_pin" placeholder="PIN 密碼" class="input-box text-center">
                <button onclick="boot()" class="btn-prime w-full">登入系統</button>
            </div>
            <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border-2 border-sky-500 text-sky-400 font-black">夥伴營運職能評估 (面試)</button>
            <button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border-2 border-slate-700 text-slate-500 font-black">正式入職資料補件</button>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 border-b-4 border-sky-500 pb-2">夥伴營運職能評估</h2>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                <select id="int_v_type" class="input-box bg-slate-900 text-white font-bold" onchange="toggleTruck(this.value)">
                    <option value="機車">應徵：機車配送員</option>
                    <option value="貨車">應徵：貨車司機 (需職業駕照)</option>
                </select>
                <div id="truck_warn" class="hidden mb-6 p-4 bg-orange-900/20 border border-orange-500/30 rounded-2xl">
                    <label class="opt-label"><input type="checkbox" id="pro_confirm"> 我確認持有「職業小型車」以上駕照</label>
                </div>
                <span class="label-sky">情境測驗：配送中遇事故且有急件？</span>
                <div class="q-box">
                    <label class="opt-label"><input type="radio" name="q1" value="100"> 報警拍照並回報公司調度員</label>
                    <label class="opt-label"><input type="radio" name="q1" value="0"> 趕快送完，事後再私下處理</label>
                </div>
                <button onclick="submitInterview()" id="sub_btn" class="btn-prime mt-6">送出評估</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 border-b-4 border-orange-500 pb-2">入職與勞健保建檔</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="photo-slot !h-24" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-[10px]">身分證正</span><img id="p_id_f"></div>
                    <div class="photo-slot !h-24" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-[10px]">身分證反</span><img id="p_id_b"></div>
                    <div class="photo-slot !h-24" onclick="triggerCam('lic')"><span id="t_lic" class="text-[10px]">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot !h-24" onclick="triggerCam('car')"><span id="t_car" class="text-[10px]">車輛行照</span><img id="p_car"></div>
                </div>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="戶籍地址" class="input-box">
                <span class="label-sky">健保眷屬投保人數</span>
                <select id="app_fm" class="input-box bg-slate-900 text-white"><option value="0">0人</option><option value="1">1人</option><option value="2">2人</option></select>
                <select id="app_v" class="input-box bg-slate-900 text-white" onchange="togglePlate(this.value)">
                    <option value="機車">機車</option><option value="貨車">貨車</option><option value="公司車">公司配車 (免填車號)</option>
                </select>
                <div id="plate_box"><input type="text" id="app_plate" placeholder="車牌號碼" class="input-box"></div>
                <div class="flex gap-2"><input type="text" id="app_bc" placeholder="銀行代碼" class="input-box w-1/3"><input type="text" id="app_ba" placeholder="銀行帳號" class="input-box w-2/3"></div>
                <input type="password" id="app_pin" placeholder="設定 4 位 PIN 碼" maxlength="4" class="input-box">
                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-orange-600">確認提交</button>
            </div>
        </div>
    </div>

    <div id="hub" class="layer">
        <div class="w-full max-w-[450px]">
            <h2 id="hub-name" class="text-4xl font-black text-white italic mb-10">夥伴專區</h2>
            <div class="id-card">
                <h3 class="text-sky-400 font-black mb-4 border-b border-sky-900 pb-2">今日下班回報</h3>
                <input type="number" id="rep_qty" placeholder="輸入今日總件數" class="input-box">
                <span class="label-sky">拍一張今日配送總表/清單</span>
                <div class="photo-slot" onclick="triggerCam('rep_img')"><span id="t_rep_img">點擊相機拍照</span><img id="p_rep_img"></div>
                <button onclick="submitReport()" id="rep_btn" class="btn-prime bg-green-600">提交總表報表</button>
            </div>
            <div id="payslip-box" class="mx-auto my-6"><div id="payslip-content"></div></div>
            <button onclick="downloadPayslip()" class="w-full py-3 bg-white text-black font-black rounded-xl mb-10">下載電子薪資條 (JPG)</button>
            <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
        </div>
    </div>

    <div id="admin" class="layer">
        <div class="w-full max-w-[700px]">
            <h2 class="text-white font-black text-3xl mb-8 border-l-8 border-sky-500 pl-4 uppercase">後台薪資與審核</h2>
            <div class="bg-slate-900/80 p-4 rounded-3xl overflow-x-auto mb-10">
                <table class="w-full text-[10px] text-left">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr><th>姓名</th><th>件數</th><th>原始薪資</th><th>勞健保扣繳</th><th>實付淨額</th></tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="text-slate-600 underline">登出後台</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let partners = [], currentUser = null, photosCache = {};

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.toggleTruck = v => document.getElementById('truck_warn').style.display = (v==='貨車')?'block':'none';
        window.togglePlate = v => document.getElementById('plate_box').style.display = (v==='公司車')?'none':'block';

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            currentUser = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(currentUser) return renderHub(currentUser);
            alert("帳號密碼錯誤或尚未開通");
        };

        window.submitInterview = async () => {
            const vType = document.getElementById('int_v_type').value;
            if(vType === '貨車' && !document.getElementById('pro_confirm').checked) return alert("貨車需職業駕照");
            await addDoc(collection(db, 'partners'), { name: document.getElementById('int_name').value, phone: document.getElementById('int_phone').value, v_type: vType, status: "interviewed", time: serverTimestamp() });
            alert("評估提交成功"); location.reload();
        };

        window.submitApply = async () => {
            const vType = document.getElementById('app_v').value;
            await addDoc(collection(db, 'partners'), {
                name: document.getElementById('app_name').value, phone: document.getElementById('app_phone').value,
                id_num: document.getElementById('app_idnum').value, h_addr: document.getElementById('app_h_addr').value,
                fm_count: document.getElementById('app_fm').value, v_type: vType, plate: (vType==='公司車')?'公司配車':document.getElementById('app_plate').value,
                bank: document.getElementById('app_ba').value, uid: document.getElementById('app_pin').value,
                docs: photosCache, status: "pending", total_del: 0, time: serverTimestamp()
            });
            alert("資料建檔成功"); location.reload();
        };

        window.submitReport = async () => {
            const qty = parseInt(document.getElementById('rep_qty').value);
            if(!qty || !photosCache.rep_img) return alert("請輸入件數並拍攝總表照片！");
            await updateDoc(doc(db, 'partners', currentUser.id), { total_del: increment(qty), last_report: photosCache.rep_img });
            alert("報表提交成功"); location.reload();
        };

        function renderHub(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('hub').style.display = 'flex';
            document.getElementById('hub-name').innerText = p.name;
            const income = (p.total_del || 0) * 15;
            const ins = Math.round(income * 0.04 * (1 + parseInt(p.fm_count || 0)));
            document.getElementById('payslip-content').innerHTML = `
                <div style="text-align:center; font-weight:bold; margin-bottom:15px; border-bottom:2px solid #000">在地物流 薪資單</div>
                <div style="display:flex; justify-content:space-between"><span>正向配送件資</span><span>$${income}</span></div>
                <div style="display:flex; justify-content:space-between; color:red"><span>保險扣繳(${p.fm_count}眷)</span><span>-$${ins}</span></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; border-top:1px solid #000; margin-top:10px"><span>實領淨額</span><span>$${income - ins}</span></div>
            `;
        }

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none'; document.getElementById('admin').style.display = 'flex';
            let html = '';
            partners.filter(p => p.status === 'approved').forEach(p => {
                const income = (p.total_del || 0) * 15;
                const ins = Math.round(income * 0.04 * (1 + parseInt(p.fm_count || 0)));
                html += `<tr class="border-b border-slate-900"><td class="p-2">${p.name}</td><td>${p.total_del}</td><td>$${income}</td><td class="text-red-500">-$${ins}</td><td class="text-sky-400 font-bold">$${income-ins}</td></tr>`;
            });
            document.getElementById('admin-render').innerHTML = html;
        }

        window.downloadPayslip = () => html2canvas(document.querySelector("#payslip-box")).then(c => { let a = document.createElement('a'); a.download='薪資條.jpg'; a.href=c.toDataURL(); a.click(); });
        window.showLayer = id => { hideAll(); document.getElementById(id).style.display = 'flex'; };
        window.hideAll = () => document.querySelectorAll('.layer').forEach(l => l.style.display='none');
        window.triggerCam = f => { window.currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = i => { const r = new FileReader(); r.onload = e => { photosCache[window.currentImgField] = e.target.result; const p = document.getElementById('p_'+window.currentImgField); p.src = e.target.result; p.style.display='block'; document.getElementById('t_'+window.currentImgField).style.display='none'; }; r.readAsDataURL(i.files[0]); };
    </script>
</body>
</html>
