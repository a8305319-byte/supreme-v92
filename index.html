<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>在地物流 - GGSOC 終極指揮中心</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    window.__app_id = 'ggsoc-trinity-master-v1';
    window.firebaseConfig = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    firebase.initializeApp(window.firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
  </script>

  <style>
    body { background-color: #000; color: #fff; font-weight: 900; }
    .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    .loader { border: 3px solid rgba(255,255,255,0.05); border-left-color: #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function App() {
      const [view, setView] = useState('gate');
      const [partners, setPartners] = useState([]);
      const [godLogs, setGodLogs] = useState([]); // 📜 上帝日誌狀態
      const [showGemini, setShowGemini] = useState(false);
      const [detailDriver, setDetailDriver] = useState(null);

      useEffect(() => {
        auth.signInAnonymously();
        // 監聽司機數據
        const unsubPartners = db.collection('partners').onSnapshot(snap => {
          setPartners(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });
        // 📜 監聽上帝日誌 (最近 10 筆)
        const unsubLogs = db.collection('god_logs').orderBy('timestamp', 'desc').limit(10).onSnapshot(snap => {
          setGodLogs(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });
        return () => { unsubPartners(); unsubLogs(); };
      }, []);

      // 📜 上帝紀錄函式
      const writeGodLog = async (action, details) => {
        await db.collection('god_logs').add({
          action, details, timestamp: new Date()
        });
      };

      const handleLogin = (ph, pi) => {
        if(ph === '0976017938' && pi === '8305319') {
          writeGodLog("系統登入", "總裁身分識別成功");
          setView('admin');
        } else alert('識別失敗');
      };

      if (view === 'gate') return (
        <div className="h-screen flex items-center justify-center bg-black">
          <div className="glass-panel p-10 rounded-[3rem] w-80 text-center border border-white/5">
            <h1 className="text-2xl font-black mb-8 text-blue-500 italic">GGSOC_TERMINAL</h1>
            <input id="ph" placeholder="PHONE" className="w-full bg-slate-900/50 p-4 rounded-xl mb-3 text-center border border-white/5 text-white outline-none" />
            <input id="pi" type="password" placeholder="PIN" className="w-full bg-slate-900/50 p-4 rounded-xl mb-8 text-center border border-white/5 text-white outline-none" />
            <button onClick={() => handleLogin(document.getElementById('ph').value, document.getElementById('pi').value)} className="w-full py-4 bg-blue-600 rounded-xl font-black">ESTABLISH_LINK</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-black text-white p-6 md:p-10 font-black">
          <div className="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <div><h2 className="text-3xl italic tracking-tighter">營運指揮中心</h2><p className="text-[10px] text-blue-500 font-mono">STEALTH_MODE_ACTIVE</p></div>
            <div className="flex gap-3">
               <button onClick={()=>setShowGemini(true)} className="bg-blue-600 px-6 py-2 rounded-xl text-xs shadow-lg">🧠 AI 幕僚</button>
               <button onClick={()=>setView('gate')} className="border border-white/10 px-4 py-2 rounded-xl text-xs">退出</button>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
            {/* 左側：司機列表 (佔 3 欄) */}
            <div className="lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-4">
              {partners.filter(p=>p.phone!=='0976017938').map(p => (
                <div key={p.id} onClick={() => setDetailDriver(p)} className="glass-panel p-8 rounded-[2rem] border border-white/5 hover:border-blue-500/50 transition-all cursor-pointer">
                  <h4 className="text-2xl italic mb-1">{p.name || '司機'}</h4>
                  <div className="flex justify-between items-center mt-4">
                    <span className="text-blue-400 text-xs italic">產能: { (Number(p.total_del)||0) + (Number(p.total_pkp)||0) }</span>
                    <span className="text-[10px] text-slate-600 underline">詳情 ></span>
                  </div>
                </div>
              ))}
            </div>

            {/* 右側：📜 上帝日誌 (佔 1 欄) */}
            <div className="bg-zinc-950/50 p-6 rounded-[2rem] border border-white/5 h-fit">
              <h3 className="text-xs text-slate-500 mb-6 uppercase tracking-widest italic">📜 上帝日誌 (God Log)</h3>
              <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                {godLogs.map(log => (
                  <div key={log.id} className="border-l-2 border-blue-500 pl-3 py-1">
                    <p className="text-[10px] text-white italic">{log.action}</p>
                    <p className="text-[8px] text-slate-500 leading-tight">{log.details}</p>
                    <p className="text-[7px] text-blue-900 mt-1 font-mono">{new Date(log.timestamp?.toDate()).toLocaleTimeString()}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* 💰 財務詳情彈窗 */}
          {detailDriver && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center p-4 z-[10000]" onClick={()=>setDetailDriver(null)}>
              <div className="bg-[#0a0a0a] border border-blue-500/20 p-10 rounded-[3.5rem] w-full max-w-lg shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-3xl text-blue-400 italic font-black mb-8">{detailDriver.name} 財務清單</h3>
                <div className="space-y-4 text-base mb-10">
                   <div className="flex justify-between border-b border-white/5 pb-2">
                     <span className="text-slate-400">2026 勞務報酬</span>
                     <span className="font-mono text-xl">${((Number(detailDriver.total_del)||0)*15 + (Number(detailDriver.total_pkp)||0)*10).toLocaleString()}</span>
                   </div>
                   <div className="flex justify-between text-rose-500"><span>勞保扣繳</span><span className="font-mono">-$679</span></div>
                   <div className="flex justify-between text-rose-500 pb-2 border-b border-white/5"><span>健保扣繳</span><span className="font-mono">-$458</span></div>
                   <div className="flex justify-between text-emerald-400 pt-2">
                     <span>本月實領淨額</span>
                     <span className="font-mono text-2xl">${Math.max(0, (Number(detailDriver.total_del)||0)*15 + (Number(detailDriver.total_pkp)||0)*10 - 1137).toLocaleString()}</span>
                   </div>
                </div>
                <button onClick={async () => {
                   await writeGodLog("薪資查閱", `查閱了 ${detailDriver.name} 的 2026 財務清單`);
                   setDetailDriver(null);
                }} className="w-full py-4 bg-blue-600 rounded-2xl font-black">關閉檢視並紀錄</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
