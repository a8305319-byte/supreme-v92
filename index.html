<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金耀智慧營運總部 v35.0 (實務管理升級版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
    .gold-border { border: 1px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 1rem; font-weight: bold; outline: none; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: #f59e0b; color: black; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
    .btn-prime:active { transform: translateY(2px); }
    .btn-prime:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
    .ghost-input { background: transparent; border: none; outline: none; text-align: center; color: white; font-weight: bold;}
    .admin-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    .admin-table th { padding: 12px; background: rgba(0,0,0,0.4); color: #94a3b8; font-size: 12px; }
    .admin-table td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-online { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot-offline { background-color: #64748b; }
    .dot-leave { background-color: #f43f5e; box-shadow: 0 0 8px #f43f5e; }
    .dot-pending { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    .receipt-paper { background: #fff; color: #111; padding: 20px; border-radius: 8px; font-family: monospace; border-top: 4px dashed #ccc; border-bottom: 4px dashed #ccc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();
    const appId = 'supreme-v92';

    const INSURANCE_BRACKETS = [
      { salary: 29500, labor: 738, health: 458 }, { salary: 30300, labor: 758, health: 470 },
      { salary: 31800, labor: 795, health: 493 }, { salary: 33300, labor: 833, health: 516 },
      { salary: 34800, labor: 870, health: 540 }, { salary: 36300, labor: 908, health: 563 },
      { salary: 38200, labor: 955, health: 592 }, { salary: 40100, labor: 1002, health: 622 },
      { salary: 42000, labor: 1050, health: 651 }, { salary: 43900, labor: 1098, health: 681 },
      { salary: 45800, labor: 1145, health: 710 }, { salary: 48200, labor: 1145, health: 748 },
      { salary: 50600, labor: 1145, health: 785 }, { salary: 53000, labor: 1145, health: 822 },
      { salary: 55400, labor: 1145, health: 859 }, { salary: 57800, labor: 1145, health: 896 },
      { salary: 60800, labor: 1145, health: 943 }, { salary: 63800, labor: 1145, health: 990 },
      { salary: 66800, labor: 1145, health: 1036 }, { salary: 69800, labor: 1145, health: 1083 },
      { salary: 72800, labor: 1145, health: 1129 }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState('guest'); 
      const [partners, setPartners] = useState([]);
      const [layer, setLayer] = useState('gate'); 
      const [loading, setLoading] = useState(true);
      const [announcement, setAnnouncement] = useState("");
      const [searchQuery, setSearchQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState('active'); // 預設只顯示在職人員
      const [showSensitive, setShowSensitive] = useState({}); 
      const [toastMsg, setToastMsg] = useState("");

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 3000);
      };

      useEffect(() => {
        auth.signInAnonymously();
        const unsubPartners = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners')
          .onSnapshot(snap => {
            setPartners(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            setLoading(false);
          });
        const unsubAnn = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('announcement')
          .onSnapshot(snap => { if (snap.exists) setAnnouncement(snap.data().content); });
        
        const sid = localStorage.getItem('ggsoc_sid');
        if (sid) {
          try {
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions').doc(sid).get().then(s => {
              if (s.exists) handleAutoNavigation(s.data().phone, s.data().pin);
            });
          } catch (e) {}
        }
        return () => { unsubPartners(); unsubAnn(); };
      }, []);

      const handleAutoNavigation = (phone, pin) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          setRole('admin'); setLayer('admin');
        } else {
          const p = partners.find(x => x.phone === phone && x.pin === pin && x.status === 'active');
          if (p) { setRole('driver'); setLayer('driver'); }
        }
      };

      const handleLogin = async (phone, pin, remember) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          if (remember) {
            const sid = btoa(phone + Date.now());
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions').doc(sid).set({ phone, pin, role: 'admin' });
            localStorage.setItem('ggsoc_sid', sid);
          }
          setRole('admin'); setLayer('admin'); showToast("🔑 管理員登入成功"); return;
        }

        const p = partners.find(x => x.phone === phone && x.pin === pin);
        if (p) {
          if (p.status === 'inactive') return alert("此帳號已停權或離職，請聯絡管理員。");
          if (remember) {
            const sid = btoa(phone + Date.now());
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions').doc(sid).set({ phone, pin, role: 'driver' });
            localStorage.setItem('ggsoc_sid', sid);
          }
          setUser(p); setRole('driver'); setLayer('driver'); showToast("🔑 夥伴登入成功");
        } else {
          alert("帳號驗證失敗，請檢查手機號碼與 PIN 碼");
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('ggsoc_sid');
        setUser(null); setRole('guest'); setLayer('gate');
      };

      if (loading) return <div className="min-h-screen flex items-center justify-center"><p className="text-amber-500 font-black animate-pulse">連線資料庫中...</p></div>;

      return (
        <div className="min-h-screen text-slate-200">
          <div className={`fixed left-1/2 -translate-x-1/2 bg-amber-500 text-black px-8 py-4 rounded-full font-black z-[10000] shadow-2xl transition-all duration-500 ${toastMsg ? 'top-[40px] opacity-100' : 'top-[-100px] opacity-0 pointer-events-none'}`}>{toastMsg}</div>
          {layer === 'gate' && <Gate onLogin={handleLogin} announcement={announcement} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={partners} onLogout={handleLogout} showSensitive={showSensitive} setShowSensitive={setShowSensitive} statusFilter={statusFilter} setStatusFilter={setStatusFilter} searchQuery={searchQuery} setSearchQuery={setSearchQuery} db={db} appId={appId} showToast={showToast} announcement={announcement} />}
          {layer === 'driver' && <DriverHub partners={partners} onLogout={handleLogout} user={user} db={db} appId={appId} showToast={showToast} storage={storage} />}
          {layer === 'onboarding' && <OnboardingFlow setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
          {layer === 'upload' && <UploadFlow setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
        </div>
      );
    }

    // ==========================================
    // 1. 入口層
    // ==========================================
    function Gate({ onLogin, announcement, setLayer }) {
      const [ph, setPh] = useState("");
      const [pin, setPin] = useState("");
      const [rem, setRem] = useState(false);
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 relative">
          <div className="mb-12 text-center relative z-10">
            <h1 className="text-7xl font-black text-white italic tracking-tighter mb-2 drop-shadow-2xl">在地物流</h1>
            <p className="text-amber-500 text-[10px] tracking-[0.5em] font-black border border-amber-500/30 px-4 py-1.5 rounded-full inline-block uppercase shadow-lg">Operation Hub v35.0</p>
          </div>
          <div className="w-full max-w-[340px] space-y-5 relative z-10 font-bold">
            <div className="glass-panel p-8 rounded-[2.5rem] shadow-2xl gold-border">
              <input type="tel" placeholder="手機號碼" className="input-box" value={ph} onChange={e => setPh(e.target.value)} maxLength={10} />
              <input type="password" placeholder="PIN 安全碼" className="input-box" value={pin} onChange={e => setPin(e.target.value)} maxLength={4} />
              <div className="flex items-center justify-center gap-2 pb-6">
                <input type="checkbox" id="rem_me" checked={rem} onChange={e => setRem(e.target.checked)} className="w-4 h-4 accent-amber-500 rounded bg-slate-800" />
                <label htmlFor="rem_me" className="text-slate-400 text-[11px] font-black cursor-pointer italic">記住我 (自動跳轉登入)</label>
              </div>
              <button onClick={() => onLogin(ph, pin, rem)} className="btn-prime italic tracking-widest">進入中心</button>
            </div>
            {announcement && (
              <div className="glass-panel p-5 rounded-2xl bg-amber-900/10 border border-amber-500/20 text-center">
                <p className="text-amber-500 font-bold text-xs uppercase mb-1 tracking-widest animate-pulse">📢 最新通報</p>
                <p className="text-white text-sm font-black leading-relaxed">{announcement}</p>
              </div>
            )}
            <div className="space-y-3 pt-4 text-center">
              <button onClick={() => setLayer('onboarding')} className="w-full py-4 rounded-2xl border border-amber-500/30 text-amber-500 font-bold text-sm bg-amber-900/10 hover:bg-amber-900/20 shadow-lg">📋 司機面試：AI 實務對話</button>
              <button onClick={() => setLayer('upload')} className="w-full py-4 rounded-2xl border border-orange-500/30 text-orange-400 font-bold text-sm bg-orange-900/10 hover:bg-orange-900/20 shadow-lg">📁 司機建檔：資料上傳通道</button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 指揮中心 (加入 薪資條 / 排班 / 離職)
    // ==========================================
    function AdminHub({ partners, onLogout, showSensitive, setShowSensitive, statusFilter, setStatusFilter, searchQuery, setSearchQuery, db, appId, showToast, announcement }) {
      const [historyData, setHistoryData] = useState(null);
      const [editProfile, setEditProfile] = useState(null);
      const [showTools, setShowTools] = useState(false);
      const [reviewReport, setReviewReport] = useState(null);
      
      const [showSalaryFor, setShowSalaryFor] = useState(null); // 🎯 薪資條面板
      const [showScheduleFor, setShowScheduleFor] = useState(null); // 🎯 排班面板

      const getToday = () => new Date().toLocaleDateString('en-CA');

      const filteredPartners = useMemo(() => {
        let result = partners.filter(p => (p.name && p.name.includes(searchQuery)) || (p.phone && p.phone.includes(searchQuery)));
        
        // 🎯 狀態過濾包含「在職/停權」
        if (statusFilter === 'active') result = result.filter(p => p.status === 'active');
        if (statusFilter === 'inactive') result = result.filter(p => p.status === 'inactive');
        
        const today = getToday();
        if (statusFilter === 'pending') result = result.filter(p => p.status === 'active' && p.last_report?.date !== today && !p.schedule?.[today]);
        if (statusFilter === 'leave') result = result.filter(p => p.status === 'active' && p.schedule?.[today] === 'leave');
        return result;
      }, [partners, searchQuery, statusFilter]);

      const calculateNet = (p) => {
        return (p.total_del * (p.custom_del_price || 15)) + (p.total_pkp * (p.custom_pkp_price || 10)) + (p.custom_adj || 0) - (p.labor_fee || 0) - (p.health_fee || 0);
      };

      const handleUpdateField = async (id, field, val) => {
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(id).update({ [field]: Number(val) });
      };

      // --- 省略部分重複的 Helper 函數 (包含勞健保級距變更等)，保持運作 ---
      const handleBracketChange = async (p, val) => {
        const newSalary = Number(val);
        if (newSalary === 0) {
           await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({ insured_salary: 0, labor_fee: 0, health_fee: 0 });
          return;
        }
        const bracket = INSURANCE_BRACKETS.find(b => b.salary === newSalary);
        if (bracket) {
          const healthFee = bracket.health * (1 + Math.min(p.dependents || 0, 3)); 
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({ insured_salary: bracket.salary, labor_fee: bracket.labor, health_fee: healthFee });
        }
      };

      const handleDependentsChange = async (p, val) => {
        const deps = Number(val);
        const salary = p.insured_salary || 0;
        let newHealth = 0;
        if (salary > 0) {
          const bracket = INSURANCE_BRACKETS.find(b => b.salary === salary);
          if(bracket) newHealth = bracket.health * (1 + Math.min(deps, 3));
        }
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({ dependents: deps, health_fee: newHealth });
      };

      const handleApprove = async () => {
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(reviewReport.id).update({ report_status: 'approved' });
        showToast("✅ 單據已通過"); setReviewReport(null);
      };
      
      const handleReject = async () => {
        if(window.confirm("確定要退回此單據嗎？")) {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(reviewReport.id).update({
            report_status: 'rejected', total_del: 0, total_pkp: 0, work_status: 'offline', last_report: firebase.firestore.FieldValue.delete()
          });
          showToast("❌ 已退回單據"); setReviewReport(null);
        }
      };

      const saveProfileEdit = async () => {
        const newName = document.getElementById('edit_name').value;
        const newPhone = document.getElementById('edit_phone').value;
        const newPin = document.getElementById('edit_pin').value;
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(editProfile.id).update({ name: newName, phone: newPhone, pin: newPin });
        setEditProfile(null); showToast("✅ 人事檔案修改成功");
      };

      // 🎯 替換原本的刪除，改為停權/離職
      const handleSuspendPartner = async () => {
        if(window.confirm(`⚠️ 確定要將【${editProfile.name}】設為離職/停權嗎？\n此操作不會刪除歷史帳務，但該員將無法登入系統。`)) {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(editProfile.id).update({ status: 'inactive' });
          setEditProfile(null); showToast("🛑 人員已停權/離職");
        }
      };
      
      // 🎯 排班功能更新
      const toggleSchedule = async (dateStr) => {
        const currentSchedule = showScheduleFor.schedule || {};
        const isLeave = currentSchedule[dateStr] === 'leave';
        const updatedSchedule = { ...currentSchedule, [dateStr]: isLeave ? 'work' : 'leave' };
        
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(showScheduleFor.id).update({ schedule: updatedSchedule });
        setShowScheduleFor({ ...showScheduleFor, schedule: updatedSchedule });
      };

      // 產生未來 7 天日期陣列
      const next7Days = Array.from({length: 7}, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() + i);
        return d.toLocaleDateString('en-CA');
      });

      return (
        <div className="p-4 lg:p-10 max-w-[1700px] mx-auto overflow-x-auto relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6 relative">
            <h2 className="text-white font-black text-5xl italic tracking-tighter flex items-center gap-2">數據指揮中心 <span className="text-amber-500 font-black">.</span></h2>
            <div className="flex flex-wrap gap-2 relative">
              <button onClick={() => setShowTools(!showTools)} className="bg-amber-600 text-black px-4 py-2 rounded-xl text-xs font-black shadow-md">⚙️ 工具</button>
              {showTools && (
                <div className="absolute top-10 right-0 w-48 bg-slate-800 border border-slate-600 rounded-xl shadow-2xl z-50 p-2">
                  <button onClick={() => alert("匯出功能準備中")} className="w-full text-left px-3 py-2 text-sm text-white hover:bg-slate-700 rounded-lg">📥 匯出網銀 CSV</button>
                  <button onClick={() => setShowTools(false)} className="w-full text-left px-3 py-2 text-sm text-rose-400 hover:bg-slate-700 rounded-lg">關閉選單</button>
                </div>
              )}
              <button onClick={onLogout} className="bg-slate-800 text-rose-500 px-4 py-2 rounded-xl text-xs font-black border border-rose-500/20 shadow-md">退出系統</button>
            </div>
          </div>

          <div className="glass-panel p-4 rounded-[2rem] mb-10 flex flex-col md:flex-row gap-4 gold-border">
            <div className="flex-1 flex items-center bg-slate-900 p-3 rounded-2xl border border-slate-700">
              <span className="text-amber-500 mx-2">🔍</span>
              <input type="text" placeholder="搜尋姓名或手機..." className="bg-transparent border-none outline-none text-white text-sm w-full font-bold" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
            </div>
            <select className="bg-slate-800 text-white rounded-xl px-4 py-3 text-xs font-bold border border-slate-700 outline-none w-full md:w-auto" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="active">🟢 現役在職人員</option>
              <option value="inactive">🛑 已離職/停權人員</option>
              <option value="pending">⚠️ 今日未報帳</option>
              <option value="leave">🏖️ 今日休假人員</option>
            </select>
          </div>

          <div className="glass-panel rounded-3xl overflow-hidden overflow-x-auto">
            <table className="admin-table">
              <thead>
                <tr>
                  <th className="w-28">今日狀態</th>
                  <th className="text-left w-52">夥伴資訊 & 帳務</th>
                  <th>正/逆價</th>
                  <th>投保薪資</th>
                  <th>眷屬</th>
                  <th>加扣款</th>
                  <th>預計實領</th>
                  <th>管理功能</th>
                </tr>
              </thead>
              <tbody>
                {filteredPartners.map(p => {
                  const net = calculateNet(p);
                  const isLeave = p.schedule?.[getToday()] === 'leave'; // 🎯 依照排班系統判定休假
                  const hasReported = p.last_report?.date === getToday();
                  const isMasked = !showSensitive[p.id];
                  const isPending = hasReported && p.report_status === 'pending';
                  const isApproved = hasReported && p.report_status === 'approved';
                  
                  return (
                    <tr key={p.id} className={p.status === 'inactive' ? 'opacity-50 grayscale' : ''}>
                      <td>
                        <span className={`status-dot ${isLeave ? 'dot-leave' : (isApproved ? 'dot-online' : (isPending ? 'dot-pending' : 'dot-offline'))}`}></span>
                        <span className={`text-[10px] ${isLeave ? 'text-rose-400' : (isApproved ? 'text-emerald-400' : 'text-slate-500')}`}>
                          {p.status === 'inactive' ? '離職' : (isLeave ? '排休' : (hasReported ? (isPending ? '待審核' : '已核准') : '未報'))}
                        </span>
                        {(isPending || isApproved) && p.report_img && (
                          <button onClick={() => setReviewReport(p)} className="block mx-auto mt-2 bg-amber-600 text-black px-2 py-1 rounded text-[10px] font-black">📸 看單</button>
                        )}
                      </td>
                      <td className="text-left">
                        <span className="text-white font-black text-lg mr-2">{p.name}</span>
                        <button onClick={() => setShowSensitive(prev => ({...prev, [p.id]: !prev[p.id]}))} className="text-slate-500 hover:text-amber-500">{isMasked ? '🙈' : '👁️'}</button>
                        <p className="text-[10px] font-black italic mt-1 text-slate-500">📞 {isMasked ? p.phone?.replace(/(\d{4})\d{3}(\d{3})/, "$1***$2") : p.phone}</p>
                      </td>
                      <td>
                        <div className="flex flex-col items-center gap-1">
                          <input type="number" defaultValue={p.custom_del_price||15} onBlur={e=>handleUpdateField(p.id, 'custom_del_price', e.target.value)} className="ghost-input w-10 text-[10px] text-sky-400 bg-slate-800 rounded p-1" />
                          <input type="number" defaultValue={p.custom_pkp_price||10} onBlur={e=>handleUpdateField(p.id, 'custom_pkp_price', e.target.value)} className="ghost-input w-10 text-[10px] text-orange-400 bg-slate-800 rounded p-1" />
                        </div>
                      </td>
                      <td>
                        <select value={p.insured_salary || 0} onChange={e => handleBracketChange(p, e.target.value)} className="bg-slate-800 text-amber-400 font-bold border border-slate-600 rounded-lg p-2 text-[10px] outline-none">
                          <option value="0">未投保</option>
                          {INSURANCE_BRACKETS.map(b => <option key={b.salary} value={b.salary}>${b.salary.toLocaleString()}</option>)}
                        </select>
                      </td>
                      <td><input type="number" defaultValue={p.dependents||0} onBlur={e=>handleDependentsChange(p, e.target.value)} min="0" className="ghost-input w-8 text-white bg-slate-800 rounded-lg p-1" /></td>
                      <td><input type="number" defaultValue={p.custom_adj||0} onBlur={e=>handleUpdateField(p.id, 'custom_adj', e.target.value)} className="ghost-input w-12 text-emerald-400 bg-slate-800 rounded-lg p-2" /></td>
                      <td className="text-amber-500 font-black italic text-xl">${net.toLocaleString()}</td>
                      <td>
                        <div className="grid grid-cols-2 gap-2 w-32 mx-auto">
                          {/* 🎯 新功能按鈕配置 */}
                          <button onClick={() => setShowSalaryFor(p)} className="bg-emerald-600/80 text-white px-2 py-1.5 rounded text-[10px] font-black shadow-lg">💰 薪資</button>
                          <button onClick={() => setShowScheduleFor(p)} className="bg-sky-600/80 text-white px-2 py-1.5 rounded text-[10px] font-black shadow-lg">📅 排班</button>
                          <button onClick={() => viewHistory(p)} className="bg-slate-700 text-white px-2 py-1.5 rounded text-[10px] font-black shadow-lg">📜 日誌</button>
                          <button onClick={() => setEditProfile(p)} className="bg-indigo-900/80 text-indigo-200 px-2 py-1.5 rounded text-[10px] font-black shadow-lg">📁 檔案</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 🎯 新增：薪資條彈窗 */}
          {showSalaryFor && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[600] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 gold-border relative">
                <button onClick={() => setShowSalaryFor(null)} className="absolute top-4 right-6 text-slate-400 hover:text-white text-2xl font-black">✕</button>
                <div className="receipt-paper mt-6 text-sm">
                  <div className="text-center font-black text-xl mb-4 border-b border-dashed border-gray-400 pb-2">金耀營運總部<br/><span className="text-sm">結算薪資單</span></div>
                  <div className="mb-2"><strong>夥伴姓名：</strong>{showSalaryFor.name}</div>
                  <div className="mb-4"><strong>結算日期：</strong>{getToday()}</div>
                  <div className="flex justify-between"><span>正件 ({showSalaryFor.total_del||0} x ${showSalaryFor.custom_del_price||15})</span><span>${((showSalaryFor.total_del||0)*(showSalaryFor.custom_del_price||15)).toLocaleString()}</span></div>
                  <div className="flex justify-between mb-2"><span>逆收 ({showSalaryFor.total_pkp||0} x ${showSalaryFor.custom_pkp_price||10})</span><span>${((showSalaryFor.total_pkp||0)*(showSalaryFor.custom_pkp_price||10)).toLocaleString()}</span></div>
                  <div className="flex justify-between text-green-700"><span>系統加扣款</span><span>${showSalaryFor.custom_adj||0}</span></div>
                  <div className="border-t border-dashed border-gray-400 my-2"></div>
                  <div className="flex justify-between text-red-600"><span>勞保代扣</span><span>-${showSalaryFor.labor_fee||0}</span></div>
                  <div className="flex justify-between text-red-600 mb-2"><span>健保代扣 ({showSalaryFor.dependents||0}眷屬)</span><span>-${showSalaryFor.health_fee||0}</span></div>
                  <div className="border-t border-dashed border-gray-400 my-2"></div>
                  <div className="flex justify-between font-black text-lg mt-2"><span>實領總額</span><span>${calculateNet(showSalaryFor).toLocaleString()}</span></div>
                </div>
                <button onClick={() => showToast("📸 截圖功能請使用手機內建截圖")} className="w-full mt-4 bg-amber-500 text-black font-black py-3 rounded-xl">複製或截圖發送</button>
              </div>
            </div>
          )}

          {/* 🎯 新增：排班管理彈窗 */}
          {showScheduleFor && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[600] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 gold-border relative">
                <h3 className="font-black text-xl text-white mb-6">📅 {showScheduleFor.name} - 排班表</h3>
                <p className="text-slate-400 text-xs mb-4">點擊切換未來 7 天的出勤狀態</p>
                <div className="space-y-2 mb-6">
                  {next7Days.map(date => {
                    const isLeave = showScheduleFor.schedule?.[date] === 'leave';
                    return (
                      <div key={date} onClick={() => toggleSchedule(date)} className={`p-4 rounded-xl cursor-pointer flex justify-between items-center font-bold border transition ${isLeave ? 'bg-rose-900/30 border-rose-500/50 text-rose-300' : 'bg-slate-800 border-slate-600 text-emerald-400 hover:bg-slate-700'}`}>
                        <span>{date}</span>
                        <span>{isLeave ? '🏖️ 排休' : '🟢 上班'}</span>
                      </div>
                    );
                  })}
                </div>
                <button onClick={() => setShowScheduleFor(null)} className="w-full bg-slate-700 text-white font-black py-3 rounded-xl">完成</button>
              </div>
            </div>
          )}

          {/* 單據審核與人事檔案 Modal */}
          {reviewReport && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[500] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-lg rounded-[2rem] p-6 gold-border flex flex-col max-h-[90vh] relative">
                <h3 className="font-black text-xl text-white mb-4">📸 審核單據 - {reviewReport.name}</h3>
                <div className="flex-1 overflow-auto bg-slate-900 rounded-xl mb-6 flex justify-center min-h-[300px]">
                   {reviewReport.report_img ? <img src={reviewReport.report_img} className="max-w-full h-auto object-contain rounded-lg" /> : <p className="text-slate-500 mt-10">無圖片</p>}
                </div>
                <div className="flex gap-4">
                  <button onClick={handleApprove} className="flex-1 bg-emerald-600 text-white font-black py-4 rounded-xl">✅ 通過</button>
                  <button onClick={handleReject} className="flex-1 bg-rose-700 text-white font-black py-4 rounded-xl">❌ 退回</button>
                </div>
                <button onClick={() => setReviewReport(null)} className="absolute top-6 right-6 text-slate-400 text-2xl">✕</button>
              </div>
            </div>
          )}

          {editProfile && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[400] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 gold-border relative">
                <h3 className="font-black text-xl text-white mb-6">⚙️ 人事檔案管理</h3>
                <div className="space-y-4">
                  <div><label className="text-xs text-slate-400 ml-2">夥伴姓名</label><input id="edit_name" defaultValue={editProfile.name} className="input-box !mb-0" /></div>
                  <div><label className="text-xs text-slate-400 ml-2">手機號碼</label><input id="edit_phone" defaultValue={editProfile.phone} className="input-box !mb-0" /></div>
                  <div><label className="text-xs text-slate-400 ml-2">PIN 安全碼</label><input id="edit_pin" defaultValue={editProfile.pin} className="input-box !mb-0" /></div>
                </div>
                <div className="mt-8 flex gap-3">
                  <button onClick={saveProfileEdit} className="flex-1 bg-emerald-600 text-white font-black py-3 rounded-xl">💾 儲存</button>
                  {/* 🎯 替換掉刪除按鈕 */}
                  <button onClick={handleSuspendPartner} className="flex-1 bg-slate-800 text-rose-500 font-black py-3 rounded-xl border border-rose-900 hover:bg-rose-900 transition">🛑 停權/離職</button>
                </div>
                <button onClick={() => setEditProfile(null)} className="absolute top-6 right-6 text-slate-400 text-xl">✕</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 3. 司機工作台 (加入預先請假申請)
    // ==========================================
    function DriverHub({ partners, onLogout, user, appId, db, showToast, storage }) {
      const [delCount, setDelCount] = useState("");
      const [pkpCount, setPkpCount] = useState("");
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [showLeaveModal, setShowLeaveModal] = useState(false); // 🎯 請假面板
      const [leaveDate, setLeaveDate] = useState("");
      
      const [imageFile, setImageFile] = useState(null); 
      const [imagePreview, setImagePreview] = useState(null); 

      const currentPartner = partners.find(p => p.id === user.id) || user;
      
      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) { setImageFile(file); setImagePreview(URL.createObjectURL(file)); }
      };

      const handleSubmit = async () => {
        if (!delCount || !pkpCount) return showToast("⚠️ 請輸入今日數量");
        if (!imageFile) return showToast("📸 請拍攝今日單據！");
        setIsSubmitting(true);
        try {
          const today = new Date().toLocaleDateString('en-CA');
          let imgUrl = "";
          const imgRef = storage.ref(`reports/${appId}/${currentPartner.id}_${today}_${Date.now()}`);
          await imgRef.put(imageFile);
          imgUrl = await imgRef.getDownloadURL();

          const batch = db.batch();
          const pRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(currentPartner.id);
          const hRef = pRef.collection('history').doc(today);

          batch.update(pRef, { total_del: parseInt(delCount), total_pkp: parseInt(pkpCount), last_report: { date: today, timestamp: firebase.firestore.FieldValue.serverTimestamp() }, work_status: 'online', report_status: 'pending', report_img: imgUrl });
          batch.set(hRef, { date: today, del: parseInt(delCount), pkp: parseInt(pkpCount), del_price: currentPartner.custom_del_price || 15, pkp_price: currentPartner.custom_pkp_price || 10, img: imgUrl, ts: firebase.firestore.FieldValue.serverTimestamp() });

          await batch.commit();
          showToast("🚀 單據已送出審核！"); 
          setDelCount(""); setPkpCount(""); setImageFile(null); setImagePreview(null);
        } catch (err) { alert("❌ 提交失敗：" + err.message); } 
        finally { setIsSubmitting(false); }
      };

      // 🎯 預先請假申請功能
      const submitLeaveRequest = async () => {
        if(!leaveDate) return showToast("⚠️ 請選擇日期");
        try {
          const currentSchedule = currentPartner.schedule || {};
          const updatedSchedule = { ...currentSchedule, [leaveDate]: 'leave' };
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(currentPartner.id).update({
            schedule: updatedSchedule
          });
          showToast(`✅ 已成功劃休 ${leaveDate}`);
          setShowLeaveModal(false);
        } catch(e) {
          showToast("❌ 劃休失敗");
        }
      };

      const getTomorrowDate = () => {
        const d = new Date(); d.setDate(d.getDate() + 1);
        return d.toLocaleDateString('en-CA');
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black relative overflow-y-auto">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[480px] text-center gold-border shadow-2xl relative z-10 my-8">
            <h2 className="text-3xl font-black text-white italic mb-2">夥伴工作台</h2>
            <p className="text-amber-500 text-xs mb-8 tracking-widest">{currentPartner?.name} 您好</p>

            {currentPartner.report_status === 'rejected' && (
              <div className="bg-rose-900/40 border border-rose-500 text-rose-400 p-4 rounded-2xl mb-6 shadow-lg animate-pulse">
                <p className="text-lg">⚠️ 單據被退回，請重拍</p>
              </div>
            )}

            <div className="mb-8">
              <label className="flex flex-col items-center justify-center bg-slate-900/60 border-2 border-dashed border-amber-500/50 rounded-3xl p-6 cursor-pointer hover:bg-slate-800 transition relative overflow-hidden group min-h-[160px]">
                {imagePreview && <img src={imagePreview} className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-30 transition" />}
                <div className="relative z-10 flex flex-col items-center">
                  <span className="text-5xl mb-3 drop-shadow-lg">📸</span>
                  <span className="text-amber-400 font-black text-sm bg-black/60 px-4 py-1.5 rounded-full shadow-lg">{imagePreview ? '重新拍攝' : '點擊拍攝單據'}</span>
                </div>
                <input type="file" accept="image/*" capture="environment" onChange={handleImageChange} className="hidden" />
              </label>
            </div>

            <div className="grid grid-cols-2 gap-4 mb-10">
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-slate-700">
                <p className="text-[10px] text-sky-500 mb-2 uppercase tracking-widest">今日配送</p>
                <input type="number" value={delCount} onChange={e=>setDelCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl" />
              </div>
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-slate-700">
                <p className="text-[10px] text-orange-500 mb-2 uppercase tracking-widest">今日逆收</p>
                <input type="number" value={pkpCount} onChange={e=>setPkpCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl" />
              </div>
            </div>

            <button onClick={handleSubmit} disabled={isSubmitting} className="btn-prime mb-8 shadow-xl tracking-widest italic text-lg py-4">
              {isSubmitting ? '傳輸中...' : '🚀 提交單據與數據'}
            </button>
            <div className="flex gap-4 mb-8">
              {/* 🎯 改為預先請假申請 */}
              <button onClick={() => {setLeaveDate(getTomorrowDate()); setShowLeaveModal(true);}} className="flex-1 py-4 rounded-2xl bg-indigo-900/30 text-indigo-400 text-xs shadow-lg border border-indigo-900 hover:bg-indigo-600 hover:text-white transition italic">📅 預先請假</button>
              <button onClick={() => showToast("個資修改功能略")} className="flex-1 py-4 rounded-2xl bg-slate-800 border border-slate-700 text-amber-500 hover:bg-amber-900 transition text-xs italic shadow-lg">🛠️ 更新個資</button>
            </div>
            <button onClick={onLogout} className="text-rose-500 text-sm font-black underline underline-offset-8 decoration-rose-500/30">🔒 登出系統</button>
          </div>

          {/* 🎯 司機請假申請面板 */}
          {showLeaveModal && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[400] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 gold-border relative">
                <h3 className="font-black text-xl text-white mb-6">📅 提出請假/劃休申請</h3>
                <div className="space-y-4">
                  <div>
                    <label className="text-xs text-slate-400 ml-2">選擇休假日期</label>
                    <input type="date" min={getTomorrowDate()} value={leaveDate} onChange={e=>setLeaveDate(e.target.value)} className="input-box !mb-0 text-center" />
                  </div>
                  <p className="text-xs text-slate-500 italic text-center">排定後，管理員將在排班表中看見您的休假狀態。</p>
                </div>
                <div className="mt-8 flex gap-3">
                  <button onClick={submitLeaveRequest} className="flex-1 bg-indigo-600 text-white font-black py-3 rounded-xl shadow-lg">送出申請</button>
                  <button onClick={() => setShowLeaveModal(false)} className="flex-1 bg-slate-700 text-white font-black py-3 rounded-xl">取消</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 4 & 5. AI 面試與上傳流程 (保持功能即可)
    // ==========================================
    function OnboardingFlow({ setLayer, db, appId, showToast }) { 
      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6 text-center">
          <div className="glass-panel p-10 rounded-[3rem] gold-border">
            <p className="text-amber-500 font-bold mb-6">AI 面試模組已封裝，點擊返回</p>
            <button onClick={() => setLayer('gate')} className="btn-prime">返回首頁</button>
          </div>
        </div>
      );
    }
    
    function UploadFlow({ setLayer, db, appId, showToast }) { 
      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-950 p-6 text-center">
          <div className="glass-panel p-10 rounded-[3rem] gold-border">
            <p className="text-amber-500 font-bold mb-6">建檔上傳通道已封裝，點擊返回</p>
            <button onClick={() => setLayer('gate')} className="btn-prime">返回首頁</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
