async function loadSheetJS(){
  if(window.XLSX) return window.XLSX;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX);
    s.onerror=rej;
    document.head.appendChild(s);
  });
}

window.exportExcelReport = async (month) => {
  month = month || MONTH;
  showToast('產生 Excel 報表中...');
  const XLSX = await loadSheetJS();
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: 薪資明細表 ──
  const usersSnap = await getDocs(query(collection(db,'users'),where('role','in',['driver','accountant'])));
  const sal_rows = [['姓名','職位','類型','配送件','逆物流件','配送單價','逆物流單價','津貼','應發小計','勞保(員工)','健保(員工)','代扣','實發金額','核發狀態','簽收狀態']];
  let totalGross=0, totalNet=0, totalLabour=0, totalHealth=0;

  for(const d of usersSnap.docs){
    const u=d.data();
    if(u.status==='resigned') continue;
    const mSnap=await getDoc(doc(db,'monthlyStats',`${d.id}_${month}`));
    const td=mSnap.exists()?mSnap.data().totalDelivery||0:0;
    const tr=mSnap.exists()?mSnap.data().totalReverse||0:0;
    const pd=u.priceDelivery||50, pr=u.priceReverse||35, al=u.allowance||0;
    const gross=td*pd+tr*pr+al;
    const labE=u.labourEmployee||0, hlthE=u.healthEmployee||0, ded=u.regularDeduct||0;
    const net=gross-labE-hlthE-ded;
    const psSnap=await getDoc(doc(db,'payslips',`${d.id}_${month}`));
    const sent=psSnap.exists()?'已發送':'未發送';
    const ack=psSnap.exists()?(psSnap.data().acknowledged?'已簽收':psSnap.data().disputed?'有異議':'未簽收'):'—';
    totalGross+=gross; totalNet+=net; totalLabour+=labE; totalHealth+=hlthE;
    sal_rows.push([u.name||'—', u.position||u.role, u.type==='employee'?'員工':'承攬',
      td,tr,pd,pr,al,gross,labE,hlthE,ded,net,sent,ack]);
  }
  sal_rows.push(['','','','','','','','','','','','','','','']);
  sal_rows.push(['合計','','','','','','','',totalGross,totalLabour,totalHealth,'',totalNet,'','']);
  const ws1=XLSX.utils.aoa_to_sheet(sal_rows);
  ws1['!cols']=[{wch:10},{wch:14},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:8},{wch:10},{wch:10},{wch:10},{wch:8},{wch:10},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws1,'薪資明細');

  // ── Sheet 2: 勞健保扣繳總表 ──
  const ins_rows = [['姓名','投保薪資','勞保(員工)','勞保(雇主)','健保(員工)','健保(雇主)','勞退(雇主6%)','員工合計負擔','雇主合計負擔']];
  for(const d of usersSnap.docs){
    const u=d.data();
    if(u.status==='resigned'||u.type==='contractor') continue;
    const sal=u.insuredSalary||29500;
    const labE=u.labourEmployee||0, labEr=u.labourEmployer||0;
    const hlthE=u.healthEmployee||0, hlthEr=u.healthEmployer||0;
    const retire=Math.round(sal*0.06);
    ins_rows.push([u.name,sal,labE,labEr,hlthE,hlthEr,retire,labE+hlthE,labEr+hlthEr+retire]);
  }
  const ws2=XLSX.utils.aoa_to_sheet(ins_rows);
  ws2['!cols']=[{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'勞健保總表');

  // ── Sheet 3: 出勤統計表 ──
  const att_rows = [['姓名','上班天數','打卡紀錄']];
  const ciSnap=await getDocs(query(collection(db,'checkins'),where('date','>=',month+'-01'),where('date','<=',month+'-31')));
  const ciMap={};
  ciSnap.docs.forEach(d=>{
    const c=d.data();
    if(!ciMap[c.name]) ciMap[c.name]=[];
    ciMap[c.name].push(c.checkedInTime+(c.checkedOut?'~'+c.checkedOut:'(未退)'));
  });
  Object.entries(ciMap).forEach(([name,records])=>{
    att_rows.push([name,records.length,records.join(' | ')]);
  });
  const ws3=XLSX.utils.aoa_to_sheet(att_rows);
  ws3['!cols']=[{wch:10},{wch:8},{wch:60}];
  XLSX.utils.book_append_sheet(wb,ws3,'出勤統計');

  // ── Sheet 4: 配送件數統計 ──
  const rep_rows = [['姓名','配送件數','逆物流件數','總件數','配送收入','逆物流收入','合計收入']];
  for(const d of usersSnap.docs){
    const u=d.data();
    if(u.role!=='driver'||u.status==='resigned') continue;
    const mSnap=await getDoc(doc(db,'monthlyStats',`${d.id}_${month}`));
    const td=mSnap.exists()?mSnap.data().totalDelivery||0:0;
    const tr=mSnap.exists()?mSnap.data().totalReverse||0:0;
    const pd=u.priceDelivery||50, pr=u.priceReverse||35;
    rep_rows.push([u.name,td,tr,td+tr,td*pd,tr*pr,td*pd+tr*pr]);
  }
  const ws4=XLSX.utils.aoa_to_sheet(rep_rows);
  ws4['!cols']=[{wch:10},{wch:8},{wch:8},{wch:8},{wch:10},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws4,'配送統計');

  // ── Sheet 5: 月度收支總表 ──
  const fin_rows = [
    ['在地物流有限公司','月度收支報表','','月份：'+month],
    ['','','',''],
    ['支出項目','金額','',''],
    ['薪資總支出（實發）',totalNet,'',''],
    ['勞保雇主負擔','','（詳見勞健保總表）',''],
    ['健保雇主負擔','','',''],
    ['勞退提繳（6%）','','',''],
    ['','','',''],
    ['收入項目','金額','',''],
    ['（請手動填入）','','',''],
  ];
  const ws5=XLSX.utils.aoa_to_sheet(fin_rows);
  ws5['!cols']=[{wch:18},{wch:12},{wch:16},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws5,'月度收支');

  // Download
  XLSX.writeFile(wb,`在地物流_${month}_會計報表.xlsx`);
  showToast('✓ Excel 報表已下載');

window.acknowledgePayslip = async (month, isOk) => {

  const note = document.getElementById('ack-note-'+month)?.value.trim();
  if(!isOk && !reason){
    showToast('請填寫異常原因','err'); return;

  try {
    const psRef = doc(db,'payslips',`${CU.uid}_${month}`);
    if(isOk){
      await updateDoc(psRef,{
        acknowledged: true,
        acknowledgedAt: serverTimestamp(),
        driverNote: note||'',
        read: true
      });
      showToast('✓ 薪資單已簽收確認');
    } else {
      await updateDoc(psRef,{
        disputed: true,

        driverNote: note||'',

// ── 載入異常回報通知（會計端）──────────────────────────
async function loadDisputeNotifications(){
  try {
    const snap = await getDocs(query(
      collection(db,'payslipDisputes'),
      where('status','==','pending')
      // orderBy removed - add Firebase index if needed
    ));
    // Sort client-side instead
    const sortedDocs = snap.docs.sort((a,b) => (b.data().createdAt?.seconds||0) - (a.data().createdAt?.seconds||0));
    const badge = document.getElementById('dispute-badge');
    const card = document.getElementById('dispute-list-card');
    const listEl = document.getElementById('dispute-list-content');

    if(!snap.empty){
      if(badge){ badge.textContent='⚠ '+snap.size+' 筆異常待處理'; badge.style.display='inline-block'; }
      showToast('⚠ 有 '+snap.size+' 筆薪資單異常待確認');

      // Build dispute list
      if(card && listEl){
        card.style.display='block';
        listEl.innerHTML = (sortedDocs||snap.docs).map(d=>{
          const e=d.data();
          const t=e.createdAt?.toDate?.().toLocaleDateString('zh-TW')||'';
          return `<div style="padding:12px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div style="font-size:13px;font-weight:700">${e.name} · ${e.month}</div>
              <span style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${t}</span>
            </div>
            <div style="font-size:12px;color:#fbbf24;margin-bottom:4px">異常原因：${e.reason}</div>
            ${e.note?`<div style="font-size:11px;color:var(--dim)">備註：${e.note}</div>`:''}
            <div style="display:flex;gap:8px;margin-top:8px">
              <button class="btn btn-s btn-sm" onclick="resolveDispute('${d.id}','${e.uid}','${e.month}',true)">✓ 已處理</button>
              <button class="btn btn-p btn-sm" onclick="resolveDispute('${d.id}','${e.uid}','${e.month}',false)">重新發送</button>
            </div>
          </div>`;
        }).join('');
      }
    } else {
      if(badge) badge.style.display='none';
      if(card) card.style.display='none';
    }
  } catch(e){ console.error(e); }
}

window.resolveDispute = async (disputeId, uid, month, resolved) => {
  try {
    await updateDoc(doc(db,'payslipDisputes',disputeId),{
      status: resolved?'resolved':'resent',
      resolvedAt: serverTimestamp(),
      resolvedBy: CD?.name||'會計'
    });
    if(resolved){
      // Mark payslip as resolved
      await updateDoc(doc(db,'payslips',`${uid}_${month}`),{
        disputed: false,
        disputeResolved: true,
        resolvedAt: serverTimestamp()
      });
      showToast('✓ 異常已標記處理完成');
    } else {
      // Resend payslip
      await sendPayslip(uid,'', month);
      showToast('✓ 已重新發送薪資單');
    }
    await addAudit('RESOLVE','處理薪資單異常：'+month);
    loadDisputeNotifications();
  } catch(e){
    showToast('操作失敗：'+e.message,'err');
  }
};

async function loadPayslipStatuses(month){
  const statuses = {};
  try {
    const snap = await getDocs(query(collection(db,'payslips'),where('month','==',month)));
    snap.docs.forEach(d=>{
      const p=d.data();
      statuses[p.uid] = {
        sent: true,
        acknowledged: p.acknowledged||false,
        disputed: p.disputed||false,
        disputeReason: p.disputeReason||''
      };
    });
  } catch(e){}
  return statuses;
}

// ── Geocoding: 地址 → GPS座標 ─────────────────────────
async function geocodeAddress(address) {
  try {
    const query = encodeURIComponent(address + ', 台灣');
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'zh-TW', 'User-Agent': 'ZaLogiApp/1.0' } }
    );
    const data = await res.json();
    if (data.length > 0) {
      return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
    }
  } catch(e) { console.warn('Geocode failed:', e); }
  return null;
}

// ── OCR: 截圖 → 地址清單 (Gemini Flash Lite) ─────────
async function ocrDeliveryImage(imageBase64, mimeType='image/jpeg') {
  const prompt = `這是一張配送單截圖或照片。
請提取所有收件地址，每行一個，只輸出地址，不要其他文字。
格式：每行一個完整地址（包含縣市、鄉鎮、路街、號碼）。`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${AI_MODELS.fast}:generateContent?key=${localStorage.getItem('V92_SECRET_KEY')||GEMINI_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          role: 'user',
          parts: [
            { inline_data: { mime_type: mimeType, data: imageBase64 } },
            { text: prompt }
          ]
        }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 1000 }
      })
    }
  );
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return text.split('\n').map(l => l.trim()).filter(l => l.length > 5);
}

// ── Nearest Neighbor Route Optimizer ─────────────────
function optimizeRoute(missions, startLat=25.0330, startLng=121.5654) {
  if (!missions.length) return missions;
  const withCoord = missions.filter(m => m.coordinate?.lat);
  const noCoord = missions.filter(m => !m.coordinate?.lat);

  let remaining = [...withCoord];
  const ordered = [];
  let curLat = startLat, curLng = startLng;

  while (remaining.length) {
    let minDist = Infinity, minIdx = 0;
    remaining.forEach((m, i) => {
      const d = Math.hypot(m.coordinate.lat - curLat, m.coordinate.lng - curLng);
      if (d < minDist) { minDist = d; minIdx = i; }
    });
    const next = remaining.splice(minIdx, 1)[0];
    ordered.push(next);
    curLat = next.coordinate.lat;
    curLng = next.coordinate.lng;
  }
  return [...ordered, ...noCoord];
}

async function saveMissions(driverUid, missions, date) {
  date = date || TODAY;
  const batch = [];
  for (let i = 0; i < missions.length; i++) {
    const m = missions[i];
    const mRef = doc(db, 'missions', `${driverUid}_${date}_${String(i+1).padStart(3,'0')}`);
    batch.push(setDoc(mRef, {
      uid: driverUid,
      date,
      seq: i + 1,
      address: m.address,
      coordinate: m.coordinate || null,
      status: m.status || 'pending',
      note: m.note || '',
      type: m.type || 'delivery',  // delivery | reverse
      price: m.price || 0,
      shadowProfit: m.shadowProfit || 0,
      createdAt: serverTimestamp()
    }, { merge: true }));
  }
  await Promise.all(batch);
}

// ── Process uploaded screenshot ───────────────────────
window.processMissionImage = async (driverUid, imageFile) => {
  const toastId = showToast('OCR 解析中...');

  try {
    // Convert to base64
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(imageFile);
    });

    // OCR
    const addresses = await ocrDeliveryImage(base64, imageFile.type);
    if (!addresses.length) { showToast('未識別到地址，請重試', 'err'); return []; }

    showToast(`✓ 識別 ${addresses.length} 個地址，Geocoding中...`);

    // Geocode all addresses
    const missions = [];
    for (const addr of addresses) {
      const coord = await geocodeAddressCached(addr);
      // MOMO delivery price ~ $50, shadow profit = 23.4%
      const price = 50;
      missions.push({
        address: addr,
        coordinate: coord,
        status: 'pending',
        type: 'delivery',
        price,
        shadowProfit: calcShadowProfit(price)
      });
      await new Promise(r => setTimeout(r, 300)); // rate limit
    }

    // Optimize route
    const optimized = optimizeRoute(missions);

    // Save to Firestore
    await saveMissions(driverUid, optimized);

    // Update sovereign dashboard
    await updateSovereignStats(driverUid, optimized);

    showToast(`✓ ${optimized.length} 筆任務已排序並儲存`);
    return optimized;

  } catch(e) {
    showToast('處理失敗：' + e.message, 'err');
    console.error(e);
    return [];
  }
};

// ── Admin: Load mission map with Leaflet ──────────────
async function loadMissionMap(date) {
  date = date || TODAY;
  document.getElementById('mission-map-date').value = date;
  const mapEl = document.getElementById('admin-mission-map');
  if (!mapEl) return;

  // Load Leaflet if not loaded
  if (!window.L) {
    await new Promise((res, rej) => {
      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(css);
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  // Get all missions for date
  const snap = await getDocs(query(
    collection(db, 'missions'),
    where('date', '==', date),
    orderBy('seq', 'asc')
  ));
  const missions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  const withCoord = missions.filter(m => m.coordinate?.lat);

  document.getElementById('mission-map-stats').textContent = `${missions.length} 筆任務 · ${withCoord.length} 有座標`;

  // Init or reset map
  if (window._missionMap) { window._missionMap.remove(); window._missionMap = null; }
  mapEl.innerHTML = '';

  const map = L.map(mapEl).setView([25.0330, 121.5654], 11);
  window._missionMap = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Add markers
  const driverColors = {};
  const colorList = ['#f87171','#60a5fa','#34d399','#fbbf24','#a78bfa','#fb923c'];
  let colorIdx = 0;

  withCoord.forEach(m => {
    // Assign color per driver
    if (!driverColors[m.uid]) {
      driverColors[m.uid] = colorList[colorIdx++ % colorList.length];
    }
    const color = m.status === 'done' ? '#34d399' : (m.assignedDriver ? '#60a5fa' : '#f87171');

    const icon = L.divIcon({
      html: `<div style="width:28px;height:28px;border-radius:50%;background:${color};border:3px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;box-shadow:0 2px 6px rgba(0,0,0,0.4)">${m.seq}</div>`,
      className: '',
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });

    L.marker([m.coordinate.lat, m.coordinate.lng], { icon })
      .bindPopup(`<b>#${m.seq}</b><br>${m.address}<br>狀態：${m.status === 'done' ? '✅ 已送' : '📦 待送'}`)
      .addTo(map);
  });

  if (withCoord.length > 0) {
    map.fitBounds(withCoord.map(m => [m.coordinate.lat, m.coordinate.lng]));
  }
}

// ── 座標緩存（避免重複 Geocoding）────────────────────────
const _geoCache = {};
const GEO_CACHE_KEY = 'geo_cache_v1';

// Load cache from localStorage
try {
  const saved = localStorage.getItem(GEO_CACHE_KEY);
  if(saved) Object.assign(_geoCache, JSON.parse(saved));
} catch(e){}

function saveGeoCache(){
  try { localStorage.setItem(GEO_CACHE_KEY, JSON.stringify(_geoCache)); } catch(e){}
}

// ── 指數退避 Gemini 呼叫 ─────────────────────────────────
async function geminiWithBackoff(url, body, maxRetries=3){
  let delay = 2000; // start 2s
  for(let attempt=0; attempt<=maxRetries; attempt++){
    try {
      const res = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if(res.status === 429){
        // Rate limited - read retry-after if available
        const data = await res.json().catch(()=>({}));
        const retryAfter = data.error?.details?.find(d=>d['@type']?.includes('RetryInfo'))?.retryDelay;
        const waitMs = retryAfter ? parseInt(retryAfter)*1000 : delay;
        console.warn(`[Gemini] 429 Rate limit. Retry ${attempt+1}/${maxRetries} in ${waitMs/1000}s`);
        if(attempt < maxRetries){
          showToast(`⏳ API 限流，${Math.round(waitMs/1000)}秒後重試...`);
          await new Promise(r=>setTimeout(r, waitMs));
          delay = Math.min(delay * 2, 30000); // exponential: 2s→4s→8s→max30s
          continue;
        }
        throw new Error('API_QUOTA_EXCEEDED');
      }
      return res;
    } catch(e){
      if(e.message === 'API_QUOTA_EXCEEDED') throw e;
      if(attempt < maxRetries){
        await new Promise(r=>setTimeout(r, delay));
        delay = Math.min(delay*2, 30000);
        continue;
      }
      throw e;
    }
  }
}

// ── 請求佇列（控制並發）──────────────────────────────────
class RequestQueue {
  constructor(concurrency=1, delayMs=1200){
    this.queue = [];
    this.running = 0;
    this.concurrency = concurrency;
    this.delayMs = delayMs;
  }
  add(fn){ return new Promise((res,rej)=>{ this.queue.push({fn,res,rej}); this._run(); }); }
  async _run(){
    if(this.running >= this.concurrency || !this.queue.length) return;
    this.running++;
    const {fn,res,rej} = this.queue.shift();
    try { res(await fn()); } catch(e){ rej(e); }
    finally {
      await new Promise(r=>setTimeout(r, this.delayMs));
      this.running--;
      this._run();
    }
  }
}
const geminiQueue = new RequestQueue(1, 1500); // 1 request per 1.5s
const geocodeQueue = new RequestQueue(1, 500); // 1 geocode per 0.5s

// ── 帶緩存的 Geocoding ────────────────────────────────────
async function geocodeAddressCached(address){
  const key = address.trim();
  if(_geoCache[key]){
    console.log('[GeoCache] HIT:', key.slice(0,20));
    return _geoCache[key];
  }
  // Queue the geocoding request
  const result = await geocodeQueue.add(async () => {
    try {
      const query = encodeURIComponent(key + ', 台灣');
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`,
        { headers: { 'Accept-Language':'zh-TW', 'User-Agent':'ZaLogiApp/1.0' } }
      );
      const data = await res.json();
      if(data.length > 0){
        return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
      }
    } catch(e){ console.warn('[Geocode]', e.message); }
    return null;
  });
  if(result){
    _geoCache[key] = result;
    saveGeoCache();
  }
  return result;
}

// ── 司機端：掃描回報截圖 → 自動填入件數 ─────────────────
window.ocrReportPhoto = async (input) => {
  const file = input.files[0];
  if(!file) return;
  input.value = '';

  const bar = document.getElementById('report-ocr-bar');
  if(bar) bar.style.display = 'block';

  try {
    // Convert to base64
    const base64 = await new Promise((res,rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });

    // OCR prompt - extract delivery count
    const prompt = `這是一張配送單據截圖或手機畫面截圖。
請只輸出以下 JSON 格式，不要其他文字：
{"delivery": 數字, "reverse": 數字, "note": "備註"}

delivery = 配送件數（正向配送）
reverse = 逆物流件數（退件/收件）
如果看不到某個數字，填 0。`;

    // OCR 直接用 geminiWithBackoff（需傳圖片，callGemini 僅支援文字）
    const SECRET_KEY = localStorage.getItem('V92_SECRET_KEY') || GEMINI_KEY;
    const res = await geminiWithBackoff(
      `https://generativelanguage.googleapis.com/v1beta/models/${AI_MODELS.fast}:generateContent?key=${SECRET_KEY}`,
      {
        contents:[{ role:'user', parts:[
          { inline_data:{ mime_type: file.type, data: base64 } },
          { text: prompt }
        ]}],
        generationConfig:{ temperature:0.1, maxOutputTokens:200 }
      }
    );
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    console.log('[Report OCR]', text);

    // Parse JSON
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    // Store photo as evidence for report submission
    window._reportPhotoData = base64;
    // Show photo preview
    const preview = document.getElementById('report-photo-preview');
    if(preview){
      preview.innerHTML = `<img src="data:${file.type};base64,${base64}" style="width:100%;max-height:180px;object-fit:contain;border-radius:8px;border:1px solid rgba(0,212,255,0.3)">
        <div style="font-size:10px;color:#34d399;text-align:center;margin-top:4px;font-family:'JetBrains Mono',monospace">✓ 照片已附加為回報憑證</div>`;
      preview.style.display='block';
    }

    // Fill in the form fields
    const dInput = document.getElementById('m-in-d');
    const rInput = document.getElementById('m-in-r');
    if(dInput && parsed.delivery >= 0){
      dInput.value = parsed.delivery;
      dInput.style.borderColor = 'rgba(0,212,255,0.5)';
      dInput.style.background = 'rgba(0,212,255,0.05)';
    }
    if(rInput && parsed.reverse >= 0){
      rInput.value = parsed.reverse;
      rInput.style.borderColor = 'rgba(0,212,255,0.5)';
      rInput.style.background = 'rgba(0,212,255,0.05)';
    }
    if(typeof mUpdateTotal === 'function') mUpdateTotal();
    showToast(`✓ OCR：配送 ${parsed.delivery} 件，逆物流 ${parsed.reverse} 件`);

  } catch(e) {
    console.error('[Report OCR]', e.message);
    if(e.message.includes('QUOTA') || e.message.includes('429')){
      showToast('API 暫時限流，請手動輸入件數','err');
    } else {
      showToast('OCR 辨識失敗，請手動輸入','err');
    }
  } finally {
    const bar = document.getElementById('report-ocr-bar');
    if(bar) bar.style.display = 'none';
  }
};

    return {month:MONTH, totalGross, totalNet, totalInsEr, totalExp, netProfit};
  },

  // ── 查詢全部員工 ─────────────────────────────────────
  async getAllStaff() {
    const snap = await getDocs(collection(db,'users'));
    const active = snap.docs.filter(d=>d.data().status!=='resigned'&&d.data().role!=='commander');
    const drivers = active.filter(d=>d.data().role==='driver');
    const staff = active.filter(d=>d.data().role!=='driver');
    return {
      total:active.length, driverCount:drivers.length, staffCount:staff.length,
      drivers:drivers.map(d=>d.data().name),
      staff:staff.map(d=>({name:d.data().name, role:d.data().role}))
    };
  },

  // ── 系統警示 ─────────────────────────────────────────
  async getAlerts() {
    const alerts = [];
    // 駕照到期
    const usersSnap = await getDocs(collection(db,'users'));
    usersSnap.docs.forEach(d=>{
      const u=d.data();
      if(u.status==='resigned') return;
      if(u.licenseExpiry){
        const days=Math.ceil((new Date(u.licenseExpiry)-new Date())/86400000);
        if(days<=30) alerts.push({type:'駕照到期',name:u.name,days,date:u.licenseExpiry});
      }
    });
    // 未回報件數
    const rpSnap = await getDocs(query(collection(db,'reports'),where('date','==',TODAY)));
    const reported = rpSnap.docs.map(d=>d.data().uid);
    const driversSnap = await getDocs(query(collection(db,'users'),where('role','==','driver')));
    const notReported = driversSnap.docs
      .filter(d=>d.data().status!=='resigned'&&!reported.includes(d.id))
      .map(d=>d.data().name);
    if(notReported.length) alerts.push({type:'未回報件數',names:notReported});
    // 未簽收薪資單
    const psSnap = await getDocs(query(collection(db,'payslips'),where('month','==',MONTH),where('acknowledged','==',false)));
    if(psSnap.size>0) alerts.push({type:'未簽收薪資單',count:psSnap.size});
    return {date:TODAY, alertCount:alerts.length, alerts};
  }
};

// ── AI 工具調用解析 ────────────────────────────────────
async function parseAndExecuteTool(userText, aiReply) {
  const toolMatch = aiReply.match(/\[TOOL:(\w+)(?::([^\]]+))?\]/);
  if(!toolMatch) return null;

  const toolName = toolMatch[1];
  const toolArgs = toolMatch[2] ? toolMatch[2].split('|') : [];
  let result = null;

  try {
    switch(toolName) {
      case 'GET_SALARY':
        result = await CMD_TOOLS.getSalary();
        const driverLines = result.drivers.map(function(d){
          return '• '+d.name+'：配'+d.delivery+'件 逆'+d.reverse+'件 實發$'+d.net.toLocaleString();
        }).join('\n');
        return '✅ **本月薪資統計 ('+result.month+')**\n共 '+result.driverCount+' 位司機\n薪資總支出：$'+result.totalNet.toLocaleString()+'\n\n'+driverLines;

      case 'SEND_PAYSLIPS':
        showToast('AI 正在發送薪資單...');
        result = await CMD_TOOLS.sendAllPayslips();
        return '✅ 已成功發送 '+result.sent+' 張薪資單（'+result.month+'）';

      case 'GET_ATTENDANCE':
        result = await CMD_TOOLS.getTodayAttendance();
        const attendLines = result.drivers.map(function(d){
          return '• '+d.name+'：'+d.checkedIn+' 上班 / 配'+d.delivery+'件';
        }).join('\n');
        return '✅ **今日出勤 ('+result.date+')**\n已打卡：'+result.checkedIn+' 人\n\n'+attendLines;

      case 'PUBLISH_ANNOUNCE':
        if(toolArgs.length < 2) return '❌ 需要提供公告標題和內容';
        result = await CMD_TOOLS.publishAnnounce(toolArgs[0], toolArgs[1]);
        showPanel('announce');
        return '✅ 公告已發布：「'+result.title+'」';

      case 'GET_EMPLOYEE':
        result = await CMD_TOOLS.getEmployee(toolArgs[0]||'');
        if(result.error) return '❌ '+result.error;
        return '✅ **'+result.name+' 資料**\n職位：'+result.role+' / '+result.type+'\n配送單價：$'+result.priceDelivery+' 逆物流：$'+result.priceReverse+'\n狀態：'+(result.status==='active'?'在職':'離職');

      case 'ADJUST_DELIVERY':
        if(toolArgs.length < 4) return '❌ 格式：姓名|配送數|逆物流數|原因';
        result = await CMD_TOOLS.adjustDelivery(toolArgs[0], +toolArgs[1], +toolArgs[2], toolArgs[3]);
        if(result.error) return '❌ '+result.error;
        return '✅ 已調整 '+result.name+' 件數：配送'+result.delivery+' 逆物流'+result.reverse+'\n原因：'+result.reason;

      case 'RESIGN_EMPLOYEE':
        if(!toolArgs[0]) return '❌ 請提供員工姓名';
        result = await CMD_TOOLS.resignEmployee(toolArgs[0], toolArgs[1]||'自願離職');
        if(result.error) return '❌ '+result.error;
        return '✅ '+result.name+' 離職手續已完成\n日期：'+result.date+'\n原因：'+result.reason;

      case 'GET_FINANCE':
        result = await CMD_TOOLS.getFinance();
        var ps = result.netProfit>=0?'+':'-';
        return '✅ **'+result.month+' 財務摘要**\n配送收入：$'+result.totalGross.toLocaleString()+'\n薪資支出：$'+result.totalNet.toLocaleString()+'\n勞健保(雇主)：$'+result.totalInsEr.toLocaleString()+'\n其他費用：$'+result.totalExp.toLocaleString()+'\n本月淨利：'+ps+'$'+Math.abs(result.netProfit).toLocaleString();

      case 'GET_ALL_STAFF':
        result = await CMD_TOOLS.getAllStaff();
        return '✅ **員工總覽**\n在職共 '+result.total+' 人\n司機 '+result.driverCount+' 人：'+result.drivers.join('、')+'\n內勤 '+result.staffCount+' 人';

      case 'GET_ALERTS':
        result = await CMD_TOOLS.getAlerts();
        if(!result.alertCount) return '✅ 今日無異常，系統運作正常';
        var alertLines = result.alerts.map(function(a){
          if(a.type==='駕照到期') return '🪪 '+a.name+' 駕照 '+a.days+' 天後到期';
          if(a.type==='未回報件數') return '📦 未回報件數：'+a.names.join('、');
          if(a.type==='未簽收薪資單') return '💰 '+a.count+' 張薪資單未簽收';
          return a.type;
        });
        return '⚠️ **發現 '+result.alertCount+' 項警示**\n'+alertLines.join('\n');
    }
  } catch(e) {
    return '❌ 執行失敗：'+e.message;
  }
  return null;
}

const AI_MEMORY_KEY = 'v92_ai_memory';
function loadAIMemory(){
  try{ return JSON.parse(localStorage.getItem(AI_MEMORY_KEY)||'{}'); }
  catch(e){ return {}; }
}
function saveAIMemory(key, value){
  const mem = loadAIMemory();
  mem[key] = value;
  mem['_updated'] = new Date().toISOString();
  localStorage.setItem(AI_MEMORY_KEY, JSON.stringify(mem));
}
function getAIContext(){
  const mem = loadAIMemory();
  if(!Object.keys(mem).filter(k=>k!=='_updated').length) return '';
  return '\n【記憶】' + Object.entries(mem)
    .filter(([k])=>k!=='_updated')
    .map(([k,v])=>`${k}:${v}`).join('、');
}

function initSlide(){
  const wrap=document.getElementById('m-slide-wrap');
  const thumb=document.getElementById('m-slide-thumb');
  if(!wrap||!thumb)return;
  let dragging=false,startX=0,curX=0;
  const maxX=()=>wrap.offsetWidth-thumb.offsetWidth-8;
  const onStart=(x)=>{dragging=true;startX=x-curX;};
  const onMove=(x)=>{
    if(!dragging)return;
    curX=Math.max(0,Math.min(x-startX,maxX()));
    thumb.style.left=(4+curX)+'px';
    const pct=curX/maxX();
    thumb.style.opacity=0.6+pct*0.4;
  };
  const onEnd=async()=>{
    if(!dragging)return;dragging=false;
    if(curX>=maxX()*0.85){await submitReport();}
    else{curX=0;thumb.style.left='4px';}
  };
  thumb.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);},{passive:true});
  thumb.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX);},{passive:true});
  thumb.addEventListener('touchend',onEnd);
  thumb.addEventListener('mousedown',e=>{onStart(e.clientX);});
  document.addEventListener('mousemove',e=>{onMove(e.clientX);});
  document.addEventListener('mouseup',onEnd);
}

async function submitReport(){
  const qd=+document.getElementById('m-in-d')?.value||0;
  const qr=+document.getElementById('m-in-r')?.value||0;
  if(qd===0&&qr===0){showToast('請填寫件數','err');return;}
  try {
    // Save today's report
    // Get photo evidence base64 if captured
    const photoData = window._reportPhotoData || null;
    window._reportPhotoData = null; // clear after use

    await setDoc(doc(db,'reports',`${CU.uid}_${TODAY}`),{
      uid:CU.uid,name:CD.name,date:TODAY,month:MONTH,
      deliveryQty:qd,reverseQty:qr,confirmedAt:serverTimestamp(),
      photoEvidence: photoData ? true : false,
      photoBase64: photoData || null
    });
    // Update monthly stats (upsert)
    const mRef=doc(db,'monthlyStats',`${CU.uid}_${MONTH}`);
    const mSnap=await getDoc(mRef);
    if(mSnap.exists()){
      await updateDoc(mRef,{totalDelivery:increment(qd),totalReverse:increment(qr),lastUpdated:serverTimestamp()});
    } else {
      const gross=qd*(CD.priceDelivery||50)+qr*(CD.priceReverse||35)+(CD.allowance||0);
      const net=gross-(CD.labourEmployee||0)-(CD.healthEmployee||0)-(CD.regularDeduct||0);
      await setDoc(mRef,{uid:CU.uid,name:CD.name,month:MONTH,totalDelivery:qd,totalReverse:qr,estimatedNet:net,lastUpdated:serverTimestamp()});
    }
    await addDoc(collection(db,'auditLog'),{action:'CONFIRM',detail:`${CD.name} 確認回報 配${qd}件/逆${qr}件`,timestamp:serverTimestamp(),hash:Math.random().toString(36).slice(2,8)+'...'});
    // Update UI
    const sw=document.getElementById('m-slide-wrap'),sd=document.getElementById('m-slide-done');
    if(sw)sw.style.display='none';if(sd)sd.style.display='block';
    const td=document.getElementById('m-today-d'),tr2=document.getElementById('m-today-r');
    if(td)td.textContent=qd;if(tr2)tr2.textContent=qr;
    showToast('✓ 件數已回報確認！');
    await loadDriverHome();
  } catch(e){showToast('回報失敗：'+e.message,'err');}
}

async function loadDriverSalary(){
  const mSnap=await getDoc(doc(db,'monthlyStats',`${CU.uid}_${MONTH}`));
  const td=mSnap.exists()?mSnap.data().totalDelivery||0:0;
  const tr2=mSnap.exists()?mSnap.data().totalReverse||0:0;
  const delivery=td*(CD.priceDelivery||50),reverse=tr2*(CD.priceReverse||35),allowance=CD.allowance||0;
  const gross=delivery+reverse+allowance;
  const labEmp=CD.labourEmployee||0,healthEmp=CD.healthEmployee||0,deduct=CD.regularDeduct||0;
  const nhiDeduct=(CD.type==='contractor'&&gross>=20000)?Math.round(gross*0.0211):0;
  const net=gross-labEmp-healthEmp-nhiDeduct-deduct;
  const el=document.getElementById('m-salary-detail');
  if(!el)return;
  el.innerHTML=`
    <div style="font-size:12px;font-weight:600;color:var(--mid);font-family:'JetBrains Mono',monospace;margin-bottom:14px">💰 ${MONTH} 薪資明細</div>
    ${[
      {l:'配送收入 ('+td+'件)',v:'+$'+delivery.toLocaleString(),c:'#34d399'},
      {l:'逆物流收入 ('+tr2+'件)',v:'+$'+reverse.toLocaleString(),c:'#34d399'},
      {l:'津貼',v:'+$'+allowance.toLocaleString(),c:'#34d399'},
      CD.type==='employee'?{l:'勞保員工負擔',v:'-$'+labEmp.toLocaleString(),c:'#f87171'}:null,
      CD.type==='employee'?{l:'健保員工負擔',v:'-$'+healthEmp.toLocaleString(),c:'#f87171'}:null,
      nhiDeduct>0?{l:'二代健保(2.11%)',v:'-$'+nhiDeduct.toLocaleString(),c:'#f87171'}:null,
      {l:'代扣費用',v:'-$'+deduct.toLocaleString(),c:'#f87171'},
    ].filter(Boolean).map(r=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.03)"><span style="font-size:13px;color:var(--mid)">${r.l}</span><span style="font-family:'JetBrains Mono',monospace;color:${r.c}">${r.v}</span></div>`).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.2);border-radius:10px;margin-top:12px">
      <span style="font-size:14px;font-weight:700">預估實發</span>
      <span style="font-family:'Orbitron',monospace;font-size:22px;color:var(--accent)">$${net.toLocaleString()}</span>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">以實際結算為準 · 勞健保由管理端設定</div>
    <button onclick="exportMyPayslip()" style="width:100%;margin-top:12px;padding:11px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:8px;color:var(--accent);font-size:13px;font-family:'JetBrains Mono',monospace;cursor:pointer">📄 下載薪資明細 PDF</button>
    <button onclick="exportDriverSalaryPDF('${CU.uid}','${CD.name}')" style="width:100%;margin-top:12px;padding:10px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:8px;color:var(--accent);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer">📄 下載本月薪資明細</button>`;
}

async function loadDriverAnnounce(){
  const snap=await getDocs(query(collection(db,'announcements'),orderBy('createdAt','desc'),limit(10)));
  const el=document.getElementById('m-ann-list');
  if(!el)return;
  if(snap.empty){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">目前無公告</div>';return;}
  el.innerHTML=snap.docs.filter(d=>{const t=d.data().target;return t==='all'||t==='driver';}).map(d=>{
    const a=d.data();
    const date=a.createdAt?.toDate?a.createdAt.toDate().toLocaleDateString('zh-TW'):'';
    return `<div class="glass-card" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:600;margin-bottom:6px">${a.title}</div>
      <div style="font-size:12.5px;color:var(--mid);line-height:1.7">${a.body}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace">${date} · ${a.createdBy||''}</div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">無您可查看的公告</div>';
}

// ── TOAST ────────────────────────────────────────────────
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=type==='err'?'toast-err':'toast-ok';
  t.style.opacity=1;setTimeout(()=>{t.style.opacity=0;},2800);
}
window.showToast=showToast;



// Init Commander panel when shown
const origShow=window.showPanel;
window.showPanel=(id)=>{origShow(id);if(id==='commander'){buildToggles();loadInterviewQuestions();};};
</script>
