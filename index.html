<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGSOC 2026 結算中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: "PingFang TC", "Noto Sans TC", sans-serif; }
        .payout-card { border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; }
        .signature-box { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 15px 15px; }
        .btn-pay { background: #1e293b; color: white; transition: all 0.2s; }
        .btn-pay:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [step, setStep] = useState('login'); 
            const [data, setData] = useState({ name: '', phone: '' });

            if (step === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="w-full max-w-sm bg-white p-10 rounded-[2.5rem] shadow-2xl text-center">
                        <h1 className="text-2xl font-black text-slate-900 mb-10 italic">GGSOC 2026</h1>
                        <div className="space-y-4">
                            <input onChange={e => setData({...data, name: e.target.value})} placeholder="姓名" className="w-full bg-slate-50 p-5 rounded-2xl text-lg font-bold outline-none border border-slate-100 focus:border-blue-500" />
                            <input onChange={e => setData({...data, phone: e.target.value})} placeholder="電話" className="w-full bg-slate-50 p-5 rounded-2xl text-lg font-bold outline-none border border-slate-100 focus:border-blue-500" />
                            <button onClick={() => data.name && data.phone ? setStep('payout') : null} className="w-full btn-pay font-black py-5 rounded-full text-xl mt-6">進入領錢</button>
                        </div>
                    </div>
                </div>
            );

            if (step === 'payout') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="w-full max-w-md bg-white payout-card p-10 text-center">
                        <div className="text-left mb-10 border-l-4 border-slate-900 pl-5">
                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">本期實領</p>
                            <h2 className="text-5xl font-black text-slate-900 mt-1">$9,789</h2>
                            <p className="text-[10px] text-slate-300 mt-2 font-bold italic">已扣除 2.11% 健保費 (電腦自動對帳)</p>
                        </div>
                        <div className="signature-box w-full h-44 bg-slate-50 rounded-[2rem] border border-slate-100 flex items-center justify-center text-slate-300 font-bold mb-8">
                            [ 劃名領錢 ]
                        </div>
                        <button onClick={() => setStep('done')} className="w-full btn-pay font-black py-5 rounded-full text-xl shadow-xl">確認領取</button>
                        <div className="mt-8 opacity-20 text-[8px] font-mono">
                            $$Net = (Gross - Labor - Health) - \lceil Gross \times 2.11\% \rceil$$
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-10 text-center">
                    <div>
                        <div className="text-7xl mb-8">💰</div>
                        <h2 className="text-2xl font-black text-slate-900">發放成功</h2>
                        <p className="text-slate-500 text-sm mt-4 font-bold tracking-tight">{data.name} 大哥，錢已入帳。<br/>辛苦了，一路平安！</p>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
