<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流有限公司 - 營運管理中控台 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2.5rem; padding: 35px; border: 1px solid #1e293b; margin-bottom: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 18px; width: 100%; color: #fff; outline: none; margin-bottom: 15px; font-size: 16px; transition: 0.3s; }
        .input-box:focus { border-color: #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }
        .btn-prime { width: 100%; padding: 20px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 15px; }
        .back-btn { align-self: flex-start; margin-bottom: 20px; color: #64748b; font-weight: 900; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        /* 圖片上傳區 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 15px; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cam-trigger { width: 100%; height: 220px; background: #020617; border: 3px dashed #1e293b; border-radius: 1.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; margin-bottom: 20px; overflow: hidden; }
        .cam-trigger img { width: 100%; height: 100%; object-fit: contain; display: none; }
        
        /* 管理牆 */
        .report-grid { display: grid; grid-template-cols: repeat(2, 1fr); gap: 12px; width: 100%; margin-bottom: 30px; }
        .report-item { background: #0f172a; border-radius: 15px; overflow: hidden; border: 1px solid #334155; position: relative; aspect-ratio: 3/4; }
        .report-item img { width: 100%; height: 100%; object-fit: cover; }
        .report-tag { position: absolute; bottom: 0; background: rgba(0,0,0,0.8); width: 100%; padding: 6px; font-size: 10px; color: #fff; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; overflow-y: auto; }
        .info-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-4">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.5em] mb-20 uppercase italic underline decoration-sky-600 underline-offset-8">經營管理系統 V92 PRO</p>
        <div class="w-full max-w-[320px]">
            <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center shadow-2xl">
            <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center shadow-2xl">
            <button onclick="boot()" class="btn-prime shadow-sky-500/20">進入系統</button>
            <button onclick="showApply()" class="text-sm text-slate-600 underline mt-16 block mx-auto font-black">新夥伴入職申請 (完整版)</button>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="back-btn" onclick="location.reload()">← 返回登入頁面</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-8 text-center italic border-b-4 border-sky-500 pb-2">新夥伴資料填寫</h2>
                
                <span class="label-sky">第一步：證件拍照 (橫拍為佳)</span>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-[10px]">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-[10px]">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-[10px]">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-[10px]">行照影本</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <span class="label-sky">第二步：個人核心檔案</span>
                <input type="text" id="app_name" placeholder="真實姓名 (必填)" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="tel" id="app_phone" placeholder="行動電話 (登入帳號)" class="input-box">
                <input type="password" id="app_pin" placeholder="自訂 4 位 PIN 碼" maxlength="4" class="input-box">
                
                <span class="label-sky">第三步：地址與緊急聯絡人</span>
                <input type="text" id="app_h_addr" placeholder="戶籍地址 (請完整填寫)" class="input-box">
                <div class="info-grid">
                    <input type="text" id="app_em_name" placeholder="緊急聯絡姓名" class="input-box">
                    <input type="text" id="app_em_rel" placeholder="關係" class="input-box">
                </div>
                <input type="tel" id="app_em_tel" placeholder="聯絡人電話" class="input-box">
                
                <span class="label-sky">第四步：營運車種與匯款帳戶</span>
                <select id="app_vehicle" class="input-box bg-slate-900 font-bold text-white">
                    <option value="" disabled selected>請選擇車種</option>
                    <option value="機車">自有機車</option>
                    <option value="貨車">自有貨車</option>
                    <option value="轎車">自有轎車</option>
                    <option value="公司車">公司車 (公司配發)</option>
                </select>
                <input type="text" id="app_plate" placeholder="車牌號碼 (例: ABC-1234)" class="input-box">
                <div class="info-grid">
                    <input type="text" id="app_bank_code" placeholder="銀行代碼" class="input-box">
                    <input type="text" id="app_bank_acc" placeholder="匯款帳號" class="input-box">
                </div>

                <button onclick="submitApply()" class="btn-prime mt-6">確認並提交入職資料</button>
            </div>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-10 mb-20 text-slate-700 text-xs underline uppercase tracking-widest">登出管理系統</button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-10" id="detail-content"></div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-6 max-w-[500px] mx-auto block">關閉詳細檔案</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], logs = [], currentImgField = '', currentReportPhoto = null;
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });
        onSnapshot(query(collection(db, 'logs'), orderBy('time', 'desc'), limit(12)), s => { 
            logs = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            if(document.getElementById('main').style.display === 'flex') boot();
        });

        // 圖片壓縮邏輯
        async function compressImg(base64) {
            return new Promise(res => {
                const img = new Image(); img.src = base64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1000; let w = img.width, h = img.height;
                    if(w > MAX || h > MAX) {
                        if(w > h) { h *= MAX/w; w = MAX; } else { w *= MAX/h; h = MAX; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        }

        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = async input => {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async e => {
                const compressed = await compressImg(e.target.result);
                if(currentImgField === 'report') {
                    currentReportPhoto = compressed;
                    const pre = document.getElementById('preview-report');
                    pre.src = compressed; pre.style.display = 'block';
                    document.getElementById('cam-tip').style.display = 'none';
                } else {
                    photosCache[currentImgField] = compressed;
                    const p = document.getElementById('p_' + currentImgField);
                    p.src = compressed; p.style.display = 'block';
                    document.getElementById('t_' + currentImgField).style.display = 'none';
                }
            };
            reader.readAsDataURL(input.files[0]);
        };

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(p) return renderHub(p);
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const apped = partners.filter(x => x.status === "approved"), pend = partners.filter(x => x.status === "pending");
            
            let html = `<div class="w-full max-w-[500px]">
                <h2 class="text-white font-black text-3xl mb-8 italic border-l-8 border-sky-500 pl-4 uppercase">今日報表牆</h2>
                <div class="report-grid">`;
            logs.forEach(l => {
                const pname = partners.find(x => x.id === l.driverId)?.name || '未知';
                html += `<div class="report-item"><img src="${l.photo}"><div class="report-tag">${pname} | ${l.del}件</div></div>`;
            });
            html += `</div>`;

            if(pend.length > 0) {
                html += `<p class="label-sky !text-orange-500">待核准入職單 (${pend.length})</p>`;
                pend.forEach(p => {
                    html += `<div class="id-card !p-6 flex justify-between items-center mb-4 border-orange-900 shadow-lg shadow-orange-500/10"><p class="text-white font-black">${p.name}</p><button onclick="approveP('${p.id}')" class="bg-sky-600 text-white px-6 py-2 rounded-xl font-bold">審核通過</button></div>`;
                });
            }

            html += `<p class="label-sky">夥伴資料與當月件數</p>`;
            apped.forEach(p => {
                html += `<div class="id-card !p-6 flex justify-between items-center mb-2 border-slate-800">
                    <div onclick="viewDoc('${p.id}')" class="cursor-pointer"><p class="text-white font-bold text-xl underline">${p.name}</p><p class="text-[10px] text-slate-500">${p.v_type} | ${p.plate}</p></div>
                    <p class="text-sky-400 font-black text-2xl">${p.total_del || 0} 件</p>
                </div>`;
            });
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        function renderHub(p) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            document.getElementById('render-target').innerHTML = `
                <div class="id-card text-center">
                    <h2 class="text-4xl font-black text-white italic mb-2">${p.name} 夥伴</h2>
                    <p class="text-sky-500 text-xs font-black mb-10 tracking-widest uppercase italic">下班報表影像存證</p>
                    
                    <span class="label-sky text-left">1. 拍攝今日紙本報表或簽單</span>
                    <div class="cam-trigger shadow-2xl" onclick="triggerCam('report')">
                        <p id="cam-tip" class="text-slate-500 font-bold italic">點擊開啟相機拍照</p>
                        <img id="preview-report">
                    </div>

                    <span class="label-sky text-left">2. 輸入今日配送總件數</span>
                    <input type="number" id="input_del" class="input-box !text-6xl h-28 font-black text-sky-400 text-center" placeholder="0">
                    
                    <button onclick="submitReport('${p.id}')" class="btn-prime mt-6 shadow-sky-500/20">同步報表並完成結案</button>
                </div>`;
        }

        window.submitReport = async id => {
            const num = parseInt(document.getElementById('input_del').value) || 0;
            if(!currentReportPhoto) return alert("必須拍照報表才能結案！");
            if(num <= 0) return alert("請輸入正確件數！");
            await updateDoc(doc(db, 'partners', id), { total_del: increment(num) });
            await addDoc(collection(db, 'logs'), { driverId: id, del: num, photo: currentReportPhoto, time: serverTimestamp() });
            alert("今日數據已同步，辛苦了！"); location.reload();
        };

        window.submitApply = async () => {
            const v = document.getElementById('app_vehicle').value;
            if(!v) return alert("請選擇營運車種！");
            const data = {
                name: document.getElementById('app_name').value, phone: document.getElementById('app_phone').value, uid: document.getElementById('app_pin').value,
                id_num: document.getElementById('app_idnum').value, h_addr: document.getElementById('app_h_addr').value, 
                em_name: document.getElementById('app_em_name').value, em_rel: document.getElementById('app_em_rel').value, em_tel: document.getElementById('app_em_tel').value,
                v_type: v, plate: document.getElementById('app_plate').value,
                bank_code: document.getElementById('app_bank_code').value, bank_acc: document.getElementById('app_bank_acc').value,
                docs: photosCache, status: "pending", total_del: 0, time: serverTimestamp()
            };
            if(!data.name || !data.phone) return alert("姓名與電話為必填欄位");
            await addDoc(collection(db, 'partners'), data);
            alert("申請已成功送出！請通知管理員審核。"); location.reload();
        };

        window.viewDoc = id => {
            const p = partners.find(x => x.id === id); document.getElementById('detail-modal').style.display = 'block';
            document.getElementById('detail-content').innerHTML = `
                <h3 class="text-white font-black mb-4 text-xl border-b border-slate-700 pb-2">${p.name} 詳細檔案</h3>
                <div class="text-[12px] space-y-3 mb-6 text-slate-400">
                    <p>手機：<span class="text-white">${p.phone}</span> | 身分證：<span class="text-white">${p.id_num}</span></p>
                    <p>戶籍地址：<span class="text-white">${p.h_addr || '未填'}</span></p>
                    <div class="p-3 bg-orange-900/10 rounded-xl border border-orange-900/20">
                        <p class="text-orange-500 font-bold mb-1">緊急聯絡人</p>
                        <p>姓名：<span class="text-white">${p.em_name} (${p.em_rel})</span></p>
                        <p>電話：<span class="text-white font-bold">${p.em_tel}</span></p>
                    </div>
                    <p class="text-sky-400 font-bold">營運：${p.v_type} | ${p.plate}</p>
                    <p class="text-sky-400 font-bold border-t border-slate-700 pt-2">匯款：(${p.bank_code}) ${p.bank_acc}</p>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <img src="${p.docs?.id_f}" class="rounded-lg border border-slate-700">
                    <img src="${p.docs?.id_b}" class="rounded-lg border border-slate-700">
                </div>`;
        };

        window.approveP = async id => { await updateDoc(doc(db, 'partners', id), { status: "approved" }); alert("已核准開通。"); };
        window.showApply = () => document.getElementById('apply-page').style.display = 'flex';
    </script>
</body>
</html>
