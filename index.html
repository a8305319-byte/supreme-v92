<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='%2300d4ff' font-family='Arial' font-weight='bold'>V</text></svg>">
  <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='%2300d4ff' font-family='Arial' font-weight='bold'>V</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<title>在地物流有限公司</title>
<link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="在地物流">
  <meta name="theme-color" content="#000000">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --accent:#00d4ff;--accent2:#7c3aed;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --text:#e2e8f0;--dim:#64748b;--mid:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
canvas#fw{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* ===== LOADING ===== */
#loading-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
.ld-logo{font-family:'Orbitron',monospace;font-size:20px;color:var(--accent);letter-spacing:3px;text-shadow:0 0 30px rgba(0,212,255,0.5);margin-bottom:8px;}
.ld-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;}
.ld-bar{width:220px;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:1px;animation:ldFill 1.8s ease forwards;}
.ld-msg{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-top:12px;letter-spacing:1px;}
@keyframes ldFill{from{width:0}to{width:100%}}
@keyframes ldHide{0%{opacity:1}100%{opacity:0;visibility:hidden;}}

/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.login-box{background:rgba(0,0,0,0.8);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:400px;backdrop-filter:blur(30px);position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px rgba(0,212,255,0.4);}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-top:5px;letter-spacing:2px;}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:9px 13px;font-size:12px;color:#f87171;margin-bottom:12px;display:none;}
.f-label{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:4px;display:block;letter-spacing:1px;text-transform:uppercase;}
.f-input{width:100%;padding:11px 13px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:all 0.2s;margin-bottom:14px;}
.f-input:focus{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.04);}
.btn-login{width:100%;padding:13px;background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.4);border-radius:8px;color:var(--accent);font-size:13px;font-family:'Orbitron',monospace;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn-login:hover{background:rgba(0,212,255,0.22);box-shadow:0 0 20px rgba(0,212,255,0.2);}
.btn-login:disabled{opacity:0.4;cursor:not-allowed;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,212,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== APP LAYOUT ===== */
#app{display:none;position:relative;z-index:1;}

/* --- DESKTOP (Commander/Accountant) --- */
.desktop-layout{display:flex;min-height:100vh;}
.sidebar{width:248px;flex-shrink:0;background:rgba(0,0,0,0.88);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;backdrop-filter:blur(20px);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:2px;}
.logo-area{padding:18px 18px 16px;border-bottom:1px solid var(--border);}
.logo-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;color:var(--accent);letter-spacing:2px;text-shadow:0 0 15px rgba(0,212,255,0.35);}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:1px;}
.role-badge{display:inline-flex;align-items:center;gap:5px;margin-top:9px;padding:3px 9px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;}
.role-commander{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);}
.role-accountant{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#34d399;}
.role-dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite;}
.commander-dot{background:var(--accent);}
.accountant-dot{background:#34d399;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.nav-section{padding:12px 14px 3px;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;transition:all 0.2s;border-left:2px solid transparent;font-size:12.5px;color:var(--mid);position:relative;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);border-left-color:rgba(0,212,255,0.3);}
.nav-item.active{background:rgba(0,212,255,0.08);color:var(--accent);border-left-color:var(--accent);}
.nav-item.disabled{opacity:0.25;cursor:not-allowed;pointer-events:none;}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.nav-logout{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);}
.btn-logout{width:100%;padding:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:#f87171;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.2s;}
.btn-logout:hover{background:rgba(239,68,68,0.15);}
.main-content{flex:1;padding:24px 26px;overflow-y:auto;max-height:100vh;}
.main-content::-webkit-scrollbar{width:4px;}
.main-content::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:2px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;}
.chip{display:flex;align-items:center;gap:6px;padding:5px 11px;background:var(--glass);border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;backdrop-filter:blur(10px);}

/* --- MOBILE (Driver) --- */
.mobile-layout{max-width:480px;margin:0 auto;padding-bottom:72px;}
.mobile-topbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;}
.mobile-logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:var(--accent);letter-spacing:2px;}
.mobile-user{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
.mobile-logout{font-size:10px;color:var(--dim);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;}
.bnav-tab{flex:1;min-width:0;}
.bnav-tab{flex:1;padding:10px 0 8px;text-align:center;cursor:pointer;border:none;background:none;color:var(--dim);transition:all 0.2s;}
.bnav-tab.active{color:var(--accent);}
.bnav-icon{font-size:18px;display:block;}
.bnav-label{font-size:9px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.mobile-content{padding:14px;}

/* ===== RESPONSIVE: MOBILE / TABLET / DESKTOP ===== */

/* --- Tablet (768px - 1024px) --- */
@media (max-width: 1024px) {
  .sidebar { width: 200px; }
  .nav-item { font-size: 11.5px; padding: 8px 14px; }
  .g3 { grid-template-columns: 1fr 1fr !important; }
  .g4 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .main-content { padding: 18px 18px; }
}

/* --- Mobile (< 768px) --- */
@media (max-width: 768px) {
  /* Sidebar becomes top navigation */
  .desktop-layout { flex-direction: column; min-height: 100vh; }
  .sidebar {
    width: 100% !important;
    height: auto !important;
    position: sticky !important;
    top: 0;
    z-index: 200;
    flex-direction: column;
    padding: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    overflow: visible;
  }
  .logo-area {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-direction: row;
    border-bottom: none;
  }
  .logo-title { font-size: 13px; }
  .logo-sub { display: none; }
  .role-badge { margin-top: 0; padding: 2px 8px; font-size: 9px; }

  /* Collapse nav into horizontal scroll */
  .nav-sections-wrap {
    display: flex;
    overflow-x: auto;
    padding: 4px 10px 8px;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-sections-wrap::-webkit-scrollbar { display: none; }
  .nav-section { display: none; }
  .nav-item {
    padding: 6px 10px;
    border-left: none !important;
    border-radius: 6px;
    white-space: nowrap;
    font-size: 11px;
    background: var(--glass);
    border: 1px solid var(--border) !important;
    flex-shrink: 0;
  }
  .nav-item.active {
    background: rgba(0,212,255,0.12);
    border-color: rgba(0,212,255,0.35) !important;
  }
  .nav-item.disabled { display: none; }
  .nav-logout { 
    margin-top: auto;
    border-top: none;
    padding: 4px 10px 8px;
  }
  .btn-logout { padding: 5px 10px; font-size: 10px; }

  /* Main content */
  .main-content {
    max-height: none !important;
    padding: 14px 12px 20px;
    overflow-y: auto;
  }
  .topbar { margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .page-title { font-size: 14px; }
  .topbar-right { flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 10px; padding: 4px 8px; }

  /* Grids */
  .g2, .g3, .g4 { grid-template-columns: 1fr !important; gap: 10px !important; }
  .stat-card { padding: 12px; }
  .stat-val { font-size: 18px !important; }

  /* Tables */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl { font-size: 11px; min-width: 500px; }
  .tbl th, .tbl td { padding: 7px 8px; }

  /* Glass cards */
  .glass-card { padding: 14px; }
  
  /* Forms */
  .f-inp { font-size: 16px; } /* prevent iOS zoom */
}

/* --- Small mobile (< 430px) --- */
@media (max-width: 430px) {
  .main-content { padding: 10px 10px 16px; }
  .page-title { font-size: 13px; }
  .stat-val { font-size: 16px !important; }
  .glass-card { padding: 12px; border-radius: 10px; }
}

/* ===== SHARED COMPONENTS ===== */
.glass-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:18px;backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:border-color 0.3s;}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);}
.glass-card:hover{border-color:rgba(0,212,255,0.15);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:15px;transition:all 0.3s;}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(0,212,255,0.18);}
.stat-lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.stat-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--accent);}
.stat-sub{font-size:11px;color:var(--dim);margin-top:3px;}
.pbar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-top:7px;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-size:12px;font-weight:600;color:var(--mid);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:7px;}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th{padding:8px 12px;text-align:left;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border);text-transform:uppercase;}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.025);color:var(--mid);vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,0.02);color:var(--text);}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;}
.bg{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399;}
.br{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.by{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;}
.bb{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);color:var(--accent);}
.bp{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;}
.bgr{background:rgba(100,116,139,0.15);border:1px solid rgba(100,116,139,0.3);color:var(--dim);}
.btn{padding:7px 13px;border-radius:6px;font-size:11px;cursor:pointer;border:none;font-family:'JetBrains Mono',monospace;transition:all 0.2s;}
.btn-p{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);}
.btn-p:hover{background:rgba(0,212,255,0.2);}
.btn-s{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#34d399;}
.btn-d{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--mid);}
.f-grp{margin-bottom:11px;}
.f-lbl{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:4px;display:block;letter-spacing:0.5px;}
.f-inp{width:100%;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;}
.f-inp:focus{border-color:rgba(0,212,255,0.45);}
select.f-inp{-webkit-appearance:none;cursor:pointer;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.alert-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;margin-bottom:8px;border:1px solid;font-size:12px;line-height:1.5;}
.aw{background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.2);}
.ae{background:rgba(239,68,68,0.07);border-color:rgba(239,68,68,0.2);}
.ai{background:rgba(0,212,255,0.05);border-color:rgba(0,212,255,0.15);}
.as_{background:rgba(16,185,129,0.07);border-color:rgba(16,185,129,0.2);}
.panel{display:none;}
.panel.active{display:block;animation:fadeIn 0.22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.info-box{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.12);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:10px;}
.info-box strong{color:var(--accent);}
.warn-box{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--dim);line-height:1.6;margin-bottom:13px;}

/* SLIDE BUTTON */
.slide-wrap{position:relative;height:52px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:26px;overflow:hidden;margin-top:12px;user-select:none;}
.slide-track{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:1px;pointer-events:none;}
.slide-thumb{position:absolute;left:4px;top:4px;width:44px;height:44px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:grab;box-shadow:0 0 12px rgba(0,212,255,0.25);transition:background 0.3s;}
.slide-thumb:active{cursor:grabbing;}
.slide-done{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center;font-size:13px;color:#34d399;font-family:'JetBrains Mono',monospace;margin-top:12px;display:none;}

/* TOGGLE SWITCH */
.sw{position:relative;width:42px;height:22px;flex-shrink:0;}
.sw input{opacity:0;width:0;height:0;position:absolute;}
.sw-track{position:absolute;inset:0;border-radius:11px;cursor:pointer;transition:0.3s;background:rgba(100,116,139,0.25);border:1px solid rgba(100,116,139,0.2);}
.sw input:checked+.sw-track{background:rgba(0,212,255,0.25);border-color:rgba(0,212,255,0.5);box-shadow:0 0 10px rgba(0,212,255,0.15);}
.sw-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#64748b;transition:0.3s;pointer-events:none;}
.sw input:checked~.sw-thumb{left:23px;background:var(--accent);}

/* TOAST */
.cs-quick-btn{padding:5px 10px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);border-radius:20px;color:#a78bfa;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
.cs-quick-btn:hover{background:rgba(124,58,237,0.2);}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:8px;font-size:12px;font-family:'JetBrains Mono',monospace;z-index:10000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast-ok{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);color:#34d399;}
.toast-err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#f87171;}

/* INS GRADE TABLE */

// ── 下拉更新 (Pull to Refresh) ────────────────────────
let _pullStartY = 0;
let _pulling = false;
const PULL_THRESHOLD = 80;

document.addEventListener('touchstart', (e) => {
  const scrollEl = document.querySelector('.mobile-content');
  if(scrollEl && scrollEl.scrollTop === 0){
    _pullStartY = e.touches[0].clientY;
    _pulling = true;
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if(!_pulling) return;
  const pullEl = document.getElementById('pull-refresh');
  const icon = document.getElementById('pull-icon');
  const text = document.getElementById('pull-text');
  const delta = e.touches[0].clientY - _pullStartY;
  if(delta > 0 && delta < 150){
    const pct = Math.min(delta / PULL_THRESHOLD, 1);
    if(pullEl){
      pullEl.style.transform = `translateY(${-100 + pct*100}%)`;
      pullEl.style.transition = 'none';
    }
    if(icon) icon.style.transform = `rotate(${pct*180}deg)`;
    if(text) text.textContent = delta > PULL_THRESHOLD ? '放開以更新' : '下拉更新';
  }
}, { passive: true });

document.addEventListener('touchend', async (e) => {
  if(!_pulling) return;
  _pulling = false;
  const delta = e.changedTouches[0].clientY - _pullStartY;
  const pullEl = document.getElementById('pull-refresh');
  const icon = document.getElementById('pull-icon');
  const text = document.getElementById('pull-text');

  if(delta > PULL_THRESHOLD){
    // Trigger refresh
    if(pullEl){ pullEl.style.transform='translateY(0)'; pullEl.style.transition='transform 0.2s'; }
    if(icon) icon.textContent = '⟳';
    if(text) text.textContent = '更新中...';
    // Animate spinner
    let angle = 0;
    const spin = setInterval(()=>{ angle+=15; if(icon) icon.style.transform=`rotate(${angle}deg)`; },30);

    // Reload current panel data
    try {
      if(ROLE === 'driver'){
        await loadDriverHome();
        if(document.getElementById('panel-driver_salary')?.classList.contains('active')) await loadDriverSalary();
        if(document.getElementById('panel-driver_announce')?.classList.contains('active')) await loadDriverAnnounce();
      } else {
        const activePanel = document.querySelector('.panel.active');
        if(activePanel){
          const id = activePanel.id.replace('panel-','');
          if(id === 'dashboard') await loadDashboard();
          else if(id === 'hr') await loadHR();
          else if(id === 'salary') await loadSalary();
        }
      }
      showToast('✓ 已更新');
    } catch(e){ showToast('更新失敗','err'); }

    clearInterval(spin);
    setTimeout(()=>{
      if(pullEl){ pullEl.style.transform='translateY(-100%)'; pullEl.style.transition='transform 0.3s'; }
      if(icon){ icon.textContent='↓'; icon.style.transform='rotate(0)'; }
      if(text) text.textContent='下拉更新';
    }, 800);
  } else {
    // Snap back
    if(pullEl){ pullEl.style.transform='translateY(-100%)'; pullEl.style.transition='transform 0.2s'; }
  }
}, { passive: true });

      ldMsg('網路連線中，請稍候...');
      setTimeout(async()=>{
        try {
          const snap2 = await getDoc(doc(db,'users', CU.uid));
          if(snap2.exists()){
            CD = snap2.data();
            ROLE = CD.role;
    // Normalize 'staff' role to accountant for module access
    if(ROLE === 'staff') ROLE = 'accountant';
            if(ROLE==='commander'){
              const cfgSnap=await getDoc(doc(db,'config','modules'));
              if(cfgSnap.exists()) Object.assign(moduleToggles,cfgSnap.data());
            }
            ldMsg('建立介面...');
            await buildApp();
            document.getElementById('loading-screen').style.display='none';
            document.getElementById('app').style.display='block';
            _appReady=true;
            clearTimeout(_hardTimeout);
          } else {
            showToast('帳號未設定角色，請聯絡管理員','err');
            showLogin();
          }
        } catch(e2){
          showToast('網路連線失敗，請檢查網路後重試','err');
          showLogin();
        }
      }, 3000);
    } else {
      showToast('載入失敗：'+e.message,'err');
      showLogin();
    }
  }
});

function showLogin() {
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex'; _loginShown=true;
  document.getElementById('app').style.display='none';

window.doLogin = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('err-box');
  err.style.display='none';
  if (!email||!pass){showErr('請填寫帳號與密碼');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>驗證中...';
  // Timeout if no response in 10s
  const loginTimeout = setTimeout(()=>{
    btn.disabled=false; btn.innerHTML='LOGIN';
    showErr('連線逾時，請重試');
  }, 10000);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    clearTimeout(loginTimeout);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('loading-screen').style.display='flex';
    // Timeout if buildApp takes too long
    setTimeout(()=>{
      if(document.getElementById('loading-screen').style.display!=='none'){
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('login-screen').style.display='flex';
        showErr('載入逾時，請重新登入');
      }
    }, 8000);
  } catch(e) {
    clearTimeout(loginTimeout);
    btn.disabled=false; btn.innerHTML='LOGIN';
    const msgs={
      'auth/invalid-credential':'帳號或密碼錯誤',
      'auth/wrong-password':'密碼錯誤',
      'auth/user-not-found':'找不到此帳號',
      'auth/too-many-requests':'嘗試太多次，請稍後再試',
      'auth/network-request-failed':'網路連線失敗'
    };
    showErr(msgs[e.code]||'登入失敗：'+e.message);
  }
};
document.getElementById('l-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-btn').addEventListener('click', doLogin);
function showErr(m){const e=document.getElementById('err-box');e.textContent='⚠ '+m;e.style.display='block';}
function ldMsg(m){const el=document.getElementById('ld-msg');if(el)el.textContent=m;}

async function buildApp() {
  const app = document.getElementById('app');
  if (ROLE === 'driver') {
    app.innerHTML = buildDriverUI();
    initDriver();
  } else {
    app.innerHTML = buildDesktopUI();
    initDesktop();
    showPanel('dashboard');
  }
  // Commander can switch to driver view
  if(ROLE === 'commander'){
    setTimeout(addDriverViewToggle, 300);
    // 啟動 AI 管家
    setTimeout(()=>{
      butlerMorningBrief();
      startButlerReminders();
    }, 1500);
  }
}

function addDriverViewToggle(){
  // Try multiple selectors
  const logo = document.querySelector('.logo-area') || document.querySelector('.nav-logout');
  if(!logo){ setTimeout(addDriverViewToggle, 500); return; }
  if(document.getElementById('driver-view-toggle')) return;
  const btn = document.createElement('button');
  btn.id = 'driver-view-toggle';
  btn.textContent = '📱 司機視角';
  btn.style.cssText = "padding:4px 10px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);border-radius:5px;color:#a78bfa;font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace;margin-top:6px;width:100%";
  btn.onclick = () => {
    const app = document.getElementById('app');
    if(btn.dataset.mode === 'driver'){
      app.innerHTML = buildDesktopUI();
      initDesktop();
      showPanel('dashboard');
      btn.textContent = '📱 司機視角';
      btn.dataset.mode = '';
    } else {
      app.innerHTML = buildDriverUI();
      initDriver();
      btn.textContent = '🖥️ 管理視角';
      btn.dataset.mode = 'driver';
    }
    // Re-add button after rebuild
    setTimeout(addDriverViewToggle, 100);
  };
  logo.appendChild(btn);
}

function buildDesktopUI() {
  const mods = ROLE==='commander' ? MODS_COMMANDER : MODS_ACCOUNTANT;
  let sections = {};
  mods.forEach(m => {
    if (!moduleToggles[m.id] && m.id !== 'dashboard' && m.id !== 'audit' && m.id !== 'commander') {
      m.disabled = true;
    }
    if (!sections[m.section]) sections[m.section]=[];
    sections[m.section].push(m);
  });

  const roleBadge = ROLE==='commander'
    ? `<div class="role-badge role-commander"><span class="role-dot commander-dot"></span>COMMANDER</div>`
    : `<div class="role-badge role-accountant"><span class="role-dot accountant-dot"></span>ACCOUNTANT</div>`;

  let navHTML = '';
  let lastSection = '';
  mods.forEach(m => {
    if (m.section !== lastSection) {
      navHTML += `<div class="nav-section">${m.section}</div>`;
      lastSection = m.section;
    }
    const dis = m.disabled ? ' disabled' : '';
    navHTML += `<div class="nav-item${dis}" id="nav-${m.id}" onclick="showPanel('${m.id}')">
      <span class="nav-icon">${m.icon}</span><span>${m.name}</span>
    </div>`;
  });

  return `

    <aside class="sidebar">
      <div class="logo-area">
        <div class="logo-title" style="font-size:11px">在地物流</div>
        <div class="logo-sub">在地物流有限公司</div>
        ${roleBadge}
      </div>
      <div class="nav-sections-wrap">${navHTML}</div>
      <div class="nav-logout">
        <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:8px;text-align:center;">${CD.name||CU.email}</div>

    <main class="main-content">
      <div class="topbar">
        <div class="page-title" id="page-title">總覽儀表板</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">

async function loadDashboard() {
  // Staff count
  const staffSnap = await getDocs(collection(db,'users'));
  const drivers = staffSnap.docs.filter(d=>d.data().role==='driver');
  const employees = staffSnap.docs.filter(d=>d.data().type==='employee');
  document.getElementById('ds-staff').textContent = drivers.length;
  document.getElementById('ds-staff-sub').textContent = `員工 ${employees.length} / 承攬 ${drivers.length-employees.length}`;

  // Today's reports
  const rSnap = await getDocs(query(collection(db,'reports'),where('date','==',TODAY)));
  let totalD=0, totalR=0;
  rSnap.docs.forEach(d=>{totalD+=d.data().deliveryQty||0; totalR+=d.data().reverseQty||0;});
  document.getElementById('ds-deliv').textContent = (totalD+totalR).toLocaleString();
  document.getElementById('ds-deliv-sub').textContent = `配 ${totalD} / 逆 ${totalR}`;

  // Expiry warnings
  const expiring = staffSnap.docs.filter(d=>{
    const u=d.data(); const now=new Date();
    const check=(dateStr)=>{if(!dateStr)return false; const diff=(new Date(dateStr)-now)/86400000; return diff>=0&&diff<=30;};
    return check(u.licenseExpiry)||check(u.insuranceExpiry);
  });
  document.getElementById('ds-warn').textContent = expiring.length;

  // Estimated salary
  const monthSnap = await getDocs(query(collection(db,'monthlyStats'),where('month','==',MONTH)));
  let estSalary=0;
  monthSnap.docs.forEach(d=>{estSalary+=d.data().estimatedNet||0;});
  document.getElementById('ds-salary').textContent = '$'+Math.round(estSalary/1000)+'K';

  // Alerts
  let alertsHTML = '';
  expiring.forEach(d=>{
    const u=d.data();
    if(u.licenseExpiry){const days=Math.ceil((new Date(u.licenseExpiry)-new Date())/86400000); if(days<=30) alertsHTML+=`<div class="alert-item ae">🪪 <div><strong>${u.name}</strong> 駕照 ${days} 天後到期 (${u.licenseExpiry})</div></div>`;}
    if(u.insuranceExpiry){const days=Math.ceil((new Date(u.insuranceExpiry)-new Date())/86400000); if(days<=30) alertsHTML+=`<div class="alert-item aw">🛡️ <div><strong>${u.name}</strong> 險種 ${days} 天後到期 (${u.insuranceExpiry})</div></div>`;}
  });
  if(!alertsHTML) alertsHTML='<div class="alert-item as_">✓ <div>目前無緊急警示</div></div>';
  document.getElementById('dash-alerts').innerHTML=alertsHTML;
  // Load CS escalations
  try {
    const escSnap = await getDocs(query(collection(db,'csEscalations'),where('status','==','pending'),orderBy('timestamp','desc'),limit(5)));
    if(!escSnap.empty) {
      let escHTML = '';
      escSnap.docs.forEach(d=>{
        const e=d.data();
        const t=e.timestamp?.toDate?e.timestamp.toDate().toLocaleTimeString('zh-TW'):'';
        escHTML += `<div class="alert-item aw" style="cursor:pointer" onclick="viewEscalation('${d.id}')">
          💬 <div><strong>${e.driverName}</strong> 客服需要關注 · ${t}
          <div style="font-size:11px;color:var(--dim)">${e.triggerMessage?.slice(0,40)||''}...</div></div>
        </div>`;
      });
      document.getElementById('dash-alerts').innerHTML = escHTML + alertsHTML;
    }
  } catch(e) { /* no escalations collection yet */ }

  // Driver status
  let drHTML = '';
  for(const d of drivers.slice(0,6)) {
    const u=d.data();
    const rRef=await getDoc(doc(db,'reports',`${d.id}_${TODAY}`));
    const reported=rRef.exists();
    drHTML+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Orbitron',monospace;flex-shrink:0">${(u.name||'?')[0]}</div>
      <div style="flex:1"><div style="font-size:12.5px;font-weight:600">${u.name}</div>
      <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${reported?(rRef.data().deliveryQty+'件 / 逆'+rRef.data().reverseQty+'件'):'尚未回報'}</div></div>
      <span class="badge ${reported?'bg':'by'}">${reported?'已回報':'待回報'}</span>
    </div>`;
  }
  document.getElementById('dash-drivers').innerHTML = drHTML||'<div style="color:var(--dim);font-size:12px;text-align:center;padding:10px">無司機資料</div>';
  loadRealtimeDriverStatus();

async function loadHR(filter='active') {
  // Update tab UI
  ['active','resigned','all'].forEach(t=>{
    const btn=document.getElementById('hr-tab-'+t);
    if(btn) btn.className = t===filter ? 'btn btn-p btn-sm' : 'btn btn-g btn-sm';
  });
  // Update tab styles
  ['active','resigned','all'].forEach(t=>{
    const btn = document.getElementById('hr-tab-'+t);
    if(btn) btn.className = t===filter ? 'btn btn-p btn-sm' : 'btn btn-g btn-sm';
  });

  const snap = await getDocs(collection(db,'users'));
  if(snap.empty){document.getElementById('hr-table').innerHTML='<div style="color:var(--dim);text-align:center;padding:14px;font-size:12px">尚無人員資料</div>';return;}
  let rows='';
  const filtered = snap.docs.filter(d=>{
    const st = d.data().status;
    const ac = d.data().active;
    if(filter==='resigned') return st==='resigned' || ac===false;
    if(filter==='active') return st!=='resigned' && ac!==false;
    return true; // all
  });

  filtered.forEach(d=>{
    const u=d.data();
    const licExpiry=u.licenseExpiry;const insExpiry=u.insuranceExpiry;
    const licDays=licExpiry?Math.ceil((new Date(licExpiry)-new Date())/86400000):999;
    const insDays=insExpiry?Math.ceil((new Date(insExpiry)-new Date())/86400000):999;
    const licBadge=licDays<=7?'br':licDays<=30?'by':'bg';
    const insBadge=insDays<=7?'br':insDays<=30?'by':'bg';
    const roleLabel={commander:'負責人',accountant:'會計',driver:'司機'}[u.role]||u.role;
    rows+=`<tr>
      <td>${u.name||'—'}</td>
      <td><span class="badge ${u.role==='commander'?'bb':u.role==='accountant'?'bg':'bp'}">${roleLabel}</span></td>
      <td><span class="badge ${u.type==='employee'?'bb':'bp'}">${u.type==='employee'?'員工':'承攬'}</span></td>
      <td><span class="badge ${licBadge}">${licExpiry||'未設定'}</span></td>
      <td><span class="badge ${insBadge}">${insExpiry||'未設定'}</span></td>
      <td><span class="badge ${u.status==='resigned'?'br':u.active===false?'br':'bg'}">${u.status==='resigned'?'已離職':u.active===false?'停用':'在職'}</span></td>
      ${ROLE==='commander'?`<td style='display:flex;gap:4px;flex-wrap:wrap'>
  <button class="btn btn-p" style="font-size:10px;padding:3px 8px" onclick="editUser('${d.id}')">編輯</button>
  <button class="btn btn-g" style="font-size:10px;padding:3px 8px" onclick="showPanel('files');setTimeout(()=>{const s=document.getElementById('upload-person');if(s)s.value='${u.name}';const c=document.getElementById('upload-cat');if(c)c.value='hr';},300)">上傳證件</button>
  <button class="btn" style="font-size:10px;padding:3px 8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:#fbbf24" onclick="openResign('${d.id}','${u.name}')">離職</button>
  <button class="btn btn-d" style="font-size:10px;padding:3px 8px" onclick="confirmDelete('${d.id}','${u.name}')">刪除</button>
</td>`:''}
    </tr>`;
  });
  document.getElementById('hr-table').innerHTML=`
    <table class="tbl"><thead><tr>
      <th>姓名</th><th>角色</th><th>類型</th><th>駕照到期</th><th>險種到期</th><th>狀態</th>${ROLE==='commander'?'<th></th>':''}
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

let _resignUid = '';
let _resignName = '';

window.openResign = (uid, name) => {
  _resignUid = uid;
  _resignName = name;
  document.getElementById('resign-name').textContent = '員工：' + name;
  document.getElementById('resign-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('resign-note').value = '';
  document.getElementById('resign-msg').style.display = 'none';
  document.getElementById('resign-modal').style.display = 'block';
  document.getElementById('add-user-modal').style.display = 'none';
  document.getElementById('direct-onboard-modal').style.display = 'none';
  // Scroll to modal
  document.getElementById('resign-modal').scrollIntoView({behavior:'smooth'});
};

window.processResign = async () => {
  if(!_resignUid){ showToast('錯誤：找不到員工 UID','err'); return; }
  const date = document.getElementById('resign-date').value;
  const reason = document.getElementById('resign-reason').value;
  const note = document.getElementById('resign-note').value.trim();
  const msg = document.getElementById('resign-msg');

  if(!date){ showToast('請填寫離職日期','err'); return; }

  try {
    // Update user status to resigned
    await updateDoc(doc(db,'users',_resignUid), {
      status: 'resigned',
      resignDate: date,
      resignReason: reason,
      resignNote: note,
      resignProcessedBy: CD?.name||'Commander',
      resignProcessedAt: serverTimestamp(),
      active: false
    });

    // Save resignation record
    await addDoc(collection(db,'resignations'), {
      uid: _resignUid,
      name: _resignName,
      resignDate: date,
      reason,
      note,
      processedBy: CD?.name||'Commander',
      createdAt: serverTimestamp()
    });

    await addAudit('RESIGN', _resignName + ' 離職處理完成 · 原因：' + reason + ' · 日期：' + date);

    if(msg){ msg.style.display='block'; msg.style.color='#34d399'; msg.textContent='✓ 離職處理完成，帳號已停用'; }
    showToast('✓ ' + _resignName + ' 已辦理離職');

    setTimeout(()=>{
      document.getElementById('resign-modal').style.display='none';
      loadHR();
    }, 1500);
  } catch(e) {
    showToast('處理失敗：'+e.message,'err');
    if(msg){ msg.style.display='block'; msg.style.color='#f87171'; msg.textContent='失敗：'+e.message; }
  }
};

      </div>
      <div style="display:flex;gap:8px">
        <button id="delete-confirm-btn" style="flex:1;padding:11px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:8px;color:#f87171;font-size:13px;cursor:pointer;font-weight:700;font-family:'Noto Sans TC',sans-serif" 
          onclick="executeDelete('${uid}','${name}',this.closest('div[style]'))">確認永久刪除</button>
        <button style="flex:1;padding:11px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#94a3b8;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif"
          onclick="this.closest('div[style*=fixed]').remove()">取消</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('delete-confirm-input')?.focus(), 100);

window.executeDelete = async (uid, name, modalEl) => {
  const input = document.getElementById('delete-confirm-input');
  if(!input || input.value.trim() !== '確認刪除'){
    showToast('請輸入「確認刪除」以確認操作','err');
    input?.focus();
    return;
  }
  try {
    // Delete user document
    await deleteDoc(doc(db,'users',uid));

    // Log deletion
    await addAudit('DELETE', '永久刪除員工資料：' + name);

    showToast('✓ ' + name + ' 的資料已永久刪除');
    modalEl?.remove();
    loadHR();
  } catch(e) {
    showToast('刪除失敗：'+e.message,'err');

window.calcSalary=async()=>{
  const uid=document.getElementById('sal-person')?.value;
  let labEmp=0,healthEmp=0,empType='contractor';
  if(uid){
    const snap=await getDoc(doc(db,'users',uid));
    if(snap.exists()){
      const u=snap.data();
      labEmp=u.labourEmployee||0;healthEmp=u.healthEmployee||0;empType=u.type||'contractor';
      document.getElementById('s-qd').value=0;document.getElementById('s-qr').value=0;
      document.getElementById('s-pd').value=u.priceDelivery||50;
      document.getElementById('s-pr').value=u.priceReverse||35;
      document.getElementById('s-al').value=u.allowance||2000;
      document.getElementById('s-de').value=u.regularDeduct||500;
      // Load month stats
      const mSnap=await getDoc(doc(db,'monthlyStats',`${uid}_${MONTH}`));
      if(mSnap.exists()){document.getElementById('s-qd').value=mSnap.data().totalDelivery||0;document.getElementById('s-qr').value=mSnap.data().totalReverse||0;}
    }
  }
  const qd=+document.getElementById('s-qd').value||0;
  const qr=+document.getElementById('s-qr').value||0;
  const pd=+document.getElementById('s-pd').value||0;
  const pr=+document.getElementById('s-pr').value||0;
  const al=+document.getElementById('s-al').value||0;
  const de=+document.getElementById('s-de').value||0;
  const delivery=qd*pd, reverse=qr*pr, gross=delivery+reverse+al;
  const nhiDeduct=(empType==='contractor'&&gross>=20000)?Math.round(gross*0.0211):0;
  const net=gross-labEmp-healthEmp-nhiDeduct-de;
  const el=document.getElementById('sal-result');
  if(!el)return;
  el.innerHTML=[
    {l:'配送收入',v:'+$'+delivery.toLocaleString(),cls:'sr-pos',vc:'#34d399'},
    {l:'逆物流收入',v:'+$'+reverse.toLocaleString(),cls:'sr-pos',vc:'#34d399'},
    {l:'津貼',v:'+$'+al.toLocaleString(),cls:'sr-pos',vc:'#34d399'},
    empType==='employee'?{l:'勞保員工負擔（自動）',v:'-$'+labEmp.toLocaleString(),cls:'sr-neg',vc:'#f87171'}:null,
    empType==='employee'?{l:'健保員工負擔（自動）',v:'-$'+healthEmp.toLocaleString(),cls:'sr-neg',vc:'#f87171'}:null,
    nhiDeduct>0?{l:'二代健保(2.11%)',v:'-$'+nhiDeduct.toLocaleString(),cls:'sr-neg',vc:'#f87171'}:null,
    {l:'代扣費用',v:'-$'+de.toLocaleString(),cls:'sr-neg',vc:'#f87171'},
    {l:'🎯 實發金額',v:'$'+net.toLocaleString(),cls:'sr-tot',vc:'var(--accent)',big:true},
  ].filter(Boolean).map(r=>`<div class="sr ${r.cls}"><span class="sr-label" ${r.big?'style="font-size:14px;font-weight:700;color:var(--text)"':''}>${r.l}</span><span class="sr-val" style="color:${r.vc};${r.big?'font-family:Orbitron,monospace;font-size:18px':''}">${r.v}</span></div>`).join('');
};

window.loadFinance = async function loadFinance(month){
  month = month || MONTH;
  document.getElementById('fin-month-label').textContent = month;
  document.getElementById('fin-loading').style.display = 'inline';

  try {
    // 1. 計算所有司機薪資（真實數據）
    const usersSnap = await getDocs(query(collection(db,'users'), where('role','==','driver')));
    let totalGross = 0, totalNet = 0, totalLabourEr = 0, totalHealthEr = 0;

    for(const d of usersSnap.docs){
      const u = d.data();
      if(u.status === 'resigned') continue;
      const mSnap = await getDoc(doc(db,'monthlyStats',`${d.id}_${month}`));
      const td = mSnap.exists() ? mSnap.data().totalDelivery||0 : 0;
      const tr = mSnap.exists() ? mSnap.data().totalReverse||0 : 0;
      const gross = td*(u.priceDelivery||50) + tr*(u.priceReverse||35) + (u.allowance||0);
      const net = gross - (u.labourEmployee||0) - (u.healthEmployee||0) - (u.regularDeduct||0);
      totalGross += gross;
      totalNet += net;
      totalLabourEr += (u.labourEmployer||0);
      totalHealthEr += (u.healthEmployer||0);
    }
    const totalInsEr = totalLabourEr + totalHealthEr;

    // 2. 讀取費用（油資/維修/其他）
    const expSnap = await getDoc(doc(db,'financeExpenses',month));
    const fuel = expSnap.exists() ? expSnap.data().fuel||0 : 0;
    const repair = expSnap.exists() ? expSnap.data().repair||0 : 0;
    const other = expSnap.exists() ? expSnap.data().other||0 : 0;
    const totalExp = fuel + repair + other;

    // Prefill inputs
    if(document.getElementById('fin-fuel')) document.getElementById('fin-fuel').value = fuel||'';
    if(document.getElementById('fin-repair')) document.getElementById('fin-repair').value = repair||'';
    if(document.getElementById('fin-other')) document.getElementById('fin-other').value = other||'';
    if(document.getElementById('fin-note')) document.getElementById('fin-note').value = expSnap.exists()?expSnap.data().note||'':'';

    // 3. Calculate P&L
    const totalDeductions = totalNet + totalInsEr + totalExp; // total cash out
    const netProfit = totalGross - totalNet - totalInsEr - totalExp;

    // 4. Render rows
    const rows = document.getElementById('fin-rows');
    if(!rows) return;

    const row = (label, amount, type='income') => {
      const color = type==='income' ? '#34d399' : type==='expense' ? '#f87171' : 'var(--accent)';
      const bg = type==='income' ? 'rgba(16,185,129,0.06)' : type==='expense' ? 'rgba(239,68,68,0.06)' : 'rgba(0,212,255,0.07)';
      const bdr = type==='income' ? 'rgba(16,185,129,0.15)' : type==='expense' ? 'rgba(239,68,68,0.15)' : 'rgba(0,212,255,0.22)';
      const sign = type==='income' ? '+' : type==='expense' ? '−' : (amount>=0?'+':'');
      const absAmt = Math.abs(amount);
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:${bg};border-radius:7px;border:1px solid ${bdr}">
        <span style="font-size:13px;color:var(--mid)">${label}</span>
        <span style="font-family:'Orbitron',monospace;color:${color};font-size:13px">${sign}$${absAmt.toLocaleString()}</span>
      </div>`;
    };

    rows.innerHTML = `
      ${row('配送總收入（實發前）', totalGross, 'income')}
      ${row('薪資支出（實發合計）', totalNet, 'expense')}
      ${row('勞健保雇主負擔', totalInsEr, 'expense')}
      ${fuel>0||repair>0?row(`油資($${fuel.toLocaleString()}) + 維修($${repair.toLocaleString()})`, fuel+repair, 'expense'):''}
      ${other>0?row('其他費用', other, 'expense'):''}
      <div style="height:1px;background:var(--border);margin:4px 0"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:${netProfit>=0?'rgba(0,212,255,0.07)':'rgba(239,68,68,0.07)'};border-radius:8px;border:1px solid ${netProfit>=0?'rgba(0,212,255,0.22)':'rgba(239,68,68,0.25)'}">
        <span style="font-size:15px;font-weight:700">本月淨利</span>
        <span style="font-family:'Orbitron',monospace;color:${netProfit>=0?'var(--accent)':'#f87171'};font-size:20px;font-weight:700">${netProfit>=0?'+':''}$${netProfit.toLocaleString()}</span>
      </div>
      <div style="font-size:10px;color:var(--dim);text-align:right;margin-top:4px;font-family:'JetBrains Mono',monospace">
        ✓ 數據來源：Firebase 即時計算 · ${new Date().toLocaleTimeString('zh-TW')}
      </div>
    `;

    // Save monthly summary to Firestore
    await setDoc(doc(db,'financeMonthly',month),{
      month, totalGross, totalNet, totalInsEr, totalExp, netProfit,
      updatedAt: serverTimestamp()
    },{merge:true});

    // Load trend
    loadFinanceTrend();

  } catch(e){
    console.error('Finance error:', e);
    showToast('財務計算失敗：'+e.message,'err');
  } finally {
    document.getElementById('fin-loading').style.display = 'none';
  }
}

async function loadFinanceTrend(){
  const el = document.getElementById('fin-trend');
  if(!el) return;
  // Load last 6 months
  const months = [];
  const [yr,mn] = MONTH.split('-').map(Number);
  for(let i=5;i>=0;i--){
    let m=mn-i, y=yr;
    if(m<=0){m+=12;y--;}
    months.push(`${y}-${String(m).padStart(2,'0')}`);
  }
  const data = await Promise.all(months.map(m=>
    getDoc(doc(db,'financeMonthly',m)).then(s=>({month:m,...(s.exists()?s.data():{})}))
  ));
  const maxProfit = Math.max(...data.map(d=>Math.abs(d.netProfit||0)),1);
  el.innerHTML = `<div style="display:flex;gap:6px;align-items:flex-end;height:80px;padding:0 4px">
    ${data.map(d=>{
      const h = d.netProfit ? Math.round(Math.abs(d.netProfit)/maxProfit*70) : 2;
      const color = d.netProfit>0?'#34d399':d.netProfit<0?'#f87171':'rgba(255,255,255,0.1)';
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
        <div style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">${d.netProfit?'$'+(Math.abs(d.netProfit/1000).toFixed(0))+'K':'-'}</div>
        <div style="width:100%;background:${color};border-radius:3px 3px 0 0;height:${h}px;min-height:2px;opacity:0.8"></div>
        <div style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace">${d.month.slice(5)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

  '配送工作經驗與駕駛技術',

async function loadInterviewQuestions(){
  const snap = await getDoc(doc(db,'config','interviewQuestions'));
  const questions = snap.exists() ? snap.data().questions : DEFAULT_IQ;
  renderIQList(questions);
}

function renderIQList(questions){
  const el = document.getElementById('iq-list');
  if(!el) return;
  el.innerHTML = questions.map((q,i) => `
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:22px;height:22px;border-radius:50%;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono',monospace;color:#a78bfa;flex-shrink:0">${i+1}</div>
      <input class="f-inp" style="flex:1" value="${q}" id="iq-${i}" placeholder="面試題目主題">
      <button class="btn btn-d btn-sm" onclick="removeIQ(${i})">✕</button>
    </div>`).join('');
}

window.addInterviewQuestion = () => {
  const list = document.getElementById('iq-list');
  if(!list) return;
  const count = list.children.length;
  if(count >= 8){ showToast('最多 8 題','err'); return; }
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;align-items:center;gap:8px';
  div.innerHTML = `
    <div style="width:22px;height:22px;border-radius:50%;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono',monospace;color:#a78bfa;flex-shrink:0">${count+1}</div>
    <input class="f-inp" style="flex:1" id="iq-${count}" placeholder="輸入面試題目主題">
    <button class="btn btn-d btn-sm" onclick="removeIQ(${count})">✕</button>`;
  list.appendChild(div);
};

window.removeIQ = (i) => {
  try {
    const inputs = Array.from(document.querySelectorAll('[id^="iq-"]'));
    const questions = inputs
      .map(inp => inp ? (inp.value||'').trim() : '')
      .filter(q => q !== '');
    questions.splice(i, 1);
    if(typeof renderIQList === 'function') renderIQList(questions);
    else {
      // fallback: reload
      loadInterviewQuestions();
    }
  } catch(e) {
    console.error('IQ 移除失敗:', e);
  }
};

window.saveInterviewQuestions = async () => {
  const inputs = document.querySelectorAll('[id^="iq-"]');
  const questions = [...inputs].map(inp => inp.value.trim()).filter(Boolean);
  if(questions.length < 3){ showToast('至少需要 3 題','err'); return; }
  await setDoc(doc(db,'config','interviewQuestions'), { questions, updatedAt: serverTimestamp() });
  await addAudit('UPDATE', `更新 面試專員題目：${questions.length} 題`);
  showToast('✓ 面試題目已儲存，面試頁面即時生效');
};

async function buildToggles(){

  if(keyInput) keyInput.placeholder = storedKey ? '已設定（點擊修改）' : '輸入 Gemini API Key (AIza...)';
  if(keyStatus) keyStatus.innerHTML = storedKey
    ? '✅ 已設定 · <button onclick="window.clearApiKey()" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:10px;padding:0">清除</button>'

  const grid=document.getElementById('toggle-grid');

  snap.docs.forEach(d=>{

    const roleLabel={commander:'負責人',accountant:'會計',driver:'司機'}[u.role]||u.role;
    roleRows+=`<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
      <div style="flex:1"><span style="font-size:13px;font-weight:600">${u.name||'未設定'}</span> <span style="font-size:11px;color:var(--dim)">${u.email||''}</span></div>
      <span class="badge ${u.role==='commander'?'bb':u.role==='accountant'?'bg':'bp'}">${roleLabel}</span>
    </div>`;
  });
  const roleEl=document.getElementById('user-role-list');
  if(roleEl)roleEl.innerHTML=roleRows||'<div style="color:var(--dim);text-align:center;padding:10px;font-size:12px">尚無帳號</div>';

  grid.innerHTML=(()=>{
    const sections = [
      {id:'core',   label:'📋 核心模組',   color:'var(--accent)'},
      {id:'ops',    label:'📦 作業模組',   color:'#fbbf24'},
      {id:'driver', label:'📱 司機端功能', color:'#a78bfa'},
      {id:'ai',     label:'🤖 AI 功能',    color:'#34d399'},
      {id:'sys',    label:'⚙️ 系統功能',   color:'#64748b'},
    ];
    const bySection = {};
    TOGGLE_DEFS.forEach(m=>{
      const s=m.section||'core';
      if(!bySection[s]) bySection[s]=[];
      bySection[s].push(m);
    });
    return sections.map(sec=>{
      const items = bySection[sec.id]||[];
      if(!items.length) return '';
      return `<div style="margin-bottom:16px">
        <div style="font-size:9.5px;color:${sec.color};font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase;padding:0 2px">${sec.label}</div>
        ${items.map(m=>`
        <div class="glass-card" style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:6px;${moduleToggles[m.id]!==false?'border-color:rgba(0,212,255,0.15)':'opacity:0.6'}">
          <div style="font-size:20px;width:32px;text-align:center">${m.icon}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600;${moduleToggles[m.id]!==false?'':'color:var(--dim)'}">${m.name}</div>
            <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${m.desc}</div>
          </div>
          <label class="sw">
            <input type="checkbox" ${moduleToggles[m.id]!==false?'checked':''} onchange="toggleMod('${m.id}',this.checked)">
            <div class="sw-track"></div><div class="sw-thumb"></div>
          </label>
        </div>`).join('')}
      </div>`;
    }).join('');

window.toggleMod=async(id,val)=>{
  const def = TOGGLE_DEFS.find(t=>t.id===id);
  const name = def?.name || id;

  // Confirm disable for critical modules
  if(!val && ['salary','hr','insurance'].includes(id)){
    if(!confirm(`確定要停用「${name}」嗎？
停用後側欄選項將隱藏，資料不受影響。`)) {
      // Revert the toggle UI
      buildToggles();
      return;
    }
  }

  moduleToggles[id] = val;
  await setDoc(doc(db,'config','modules'), moduleToggles, {merge:true});
  await addAudit('UPDATE', `${val?'啟用':'停用'} 模組：${name}`);

  // Update sidebar nav item immediately
  const nav = document.getElementById('nav-'+id);
  if(nav){
    nav.classList.toggle('disabled', !val);
    nav.style.opacity = val ? '' : '0.25';
  }

  // Update panel title bar indicator
  const panel = document.getElementById('panel-'+id);
  if(panel && !val){
    panel.style.opacity = '0.5';
    panel.style.pointerEvents = 'none';
  } else if(panel){
    panel.style.opacity = '';
    panel.style.pointerEvents = '';
  }

  showToast((val ? '✅ 已啟用：' : '⛔ 已停用：') + name);
  buildToggles();
};

async function loadApplicants(){
  const el=document.getElementById('applicant-list');
  if(!el)return;
  el.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;padding:14px">載入中...</div>';
  try {
    const snap=await getDocs(query(collection(db,'applicants'),orderBy('createdAt','desc'),limit(50)));
    if(snap.empty){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:14px;font-size:12px">尚無應徵者</div>';return;}
    const docs2 = snap.docs.map(d=>({id:d.id,...d.data()}));
    const total=docs2.length;
    const rec=docs2.filter(a=>a.aiScore>=70).length;
    const pend=docs2.filter(a=>a.aiScore>=50&&a.aiScore<70).length;

    const summary = '<div style="display:flex;gap:10px;margin-bottom:10px;font-size:11px">'
      +'<span style="color:var(--dim)">共 '+total+' 人</span>'

      +'<span style="color:#fbbf24">待定 '+pend+'</span>'
      +'<span style="color:#f87171">不符 '+(total-rec-pend)+'</span></div>';

    let rows='';
    docs2.forEach(function(a){
      const score=a.aiScore||0;
      const bc=score>=70?'bg':score>=50?'by':'br';
      const bt2=score>=70?'推薦':score>=50?'待定':'不符';
      const sc=score>=70?'#34d399':score>=50?'#fbbf24':'#f87171';
      const dt=a.createdAt&&a.createdAt.toDate?a.createdAt.toDate().toLocaleDateString('zh-TW'):'—';
      rows+='<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="font-weight:600">'+(a.name||'—')+'</td>'
        +'<td style="font-size:11px;color:var(--dim)">'+(a.position||'—')+'</td>'
        +'<td style="font-size:11px">'+(a.phone||'—')+'</td>'
        +'<td style="color:'+sc+';font-size:13px;font-weight:700">'+score+'</td>'
        +'<td><span class="badge '+bc+'">'+bt2+'</span></td>'
        +'<td style="font-size:10px;color:var(--dim)">'+dt+'</td>'
        +'<td style="display:flex;gap:4px">'
        +'<button class="btn btn-p btn-sm" onclick="prefillApplicant(this.dataset.id)" data-id="'+a.id+'">帶入</button>'
        +'<button class="btn btn-g btn-sm" onclick="viewApplicantDetail(this.dataset.id)" data-id="'+a.id+'">詳情</button>'
        +'</td></tr>';
    });

    el.innerHTML=summary
      +'<div class="tbl-wrap"><table class="tbl">'
      +'<thead><tr><th>姓名</th><th>職位</th><th>電話</th><th>評分</th><th>結果</th><th>時間</th><th></th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div>';
  } catch(e) {
    el.innerHTML='<div style="color:#f87171;font-size:12px;text-align:center;padding:14px">載入失敗：'+e.message+'</div>';
  }
}

window.createAccountAndSendEmail=async()=>{
  const name=document.getElementById('new-name')?.value.trim();
  const email=document.getElementById('new-email')?.value.trim();
  const phone=document.getElementById('new-phone')?.value.trim();
  const role=document.getElementById('new-role')?.value;
  const msgEl=document.getElementById('create-acc-msg');
  if(!name||!email){showToast('請填寫姓名和Email','err');return;}

  const tempPass=Math.random().toString(36).slice(2,8).toUpperCase()+'@'+Math.floor(Math.random()*900+100);
  if(msgEl){msgEl.style.display='block';msgEl.style.color='var(--accent)';msgEl.textContent='⏳ 建立帳號中...';}

  try{
    // Save to Firestore pendingUsers (Firebase Admin SDK needed for actual auth creation)
    // Store as pending - commander will see it and manually create in Firebase Auth
    await addDoc(collection(db,'pendingUsers'),{
      name,email,phone:phone||'',role,tempPassword:tempPass,
      status:'pending',createdAt:serverTimestamp(),createdBy:CD.name
    });

    // Send email via EmailJS (client-side email service)
    await sendWelcomeEmail(name, email, tempPass);

    await addAudit('CREATE',`建立新帳號申請：\${name} (\${email})`);
    if(msgEl){msgEl.style.color='#34d399';msgEl.textContent='✓ 已發送！請至 Firebase Console 建立帳號，UID建立後在人事模組設定。';}
    showToast('✓ 歡迎信已發送至 '+email);
  }catch(e){
    if(msgEl){msgEl.style.color='#f87171';msgEl.textContent='發送失敗：'+e.message;}
    showToast('失敗：'+e.message,'err');
  }
};

window.uploadPhoto=async(input)=>{
  const file=input.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){showToast('照片不能超過 2MB','err');return;}
  const msg=document.getElementById('photo-msg');
  if(msg)msg.textContent='上傳中...';
  try{
    const {getStorage,ref,uploadBytes,getDownloadURL}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
    const storage=getStorage(fbApp);
    const storageRef=ref(storage,`avatars/\${CU.uid}`);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    await updateDoc(doc(db,'users',CU.uid),{photoURL:url});
    const ph=document.getElementById('profile-photo');
    if(ph)ph.innerHTML=`<img src="\${url}" style="width:100%;height:100%;object-fit:cover">`;
    if(msg)msg.textContent='✓ 照片已更新';
    showToast('✓ 照片上傳成功');
  }catch(e){
    if(msg)msg.textContent='上傳失敗：'+e.message;
    showToast('上傳失敗','err');
  }
};

window.changePassword=async()=>{

async function loadDriverStatus(){
  // Unsubscribe previous listener
  if(_driversUnsubscribe){ _driversUnsubscribe(); _driversUnsubscribe = null; }

  // Get all drivers
  const usersSnap = await getDocs(query(collection(db,'users'), where('role','==','driver')));
  const drivers = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));

  // Real-time listener on today's reports
  const q = query(collection(db,'reports'), where('date','==',TODAY));
  _driversUnsubscribe = onSnapshot(q, (snap) => {
    const reports = {};
    snap.docs.forEach(d => { reports[d.data().uid] = d.data(); });

    let reported = 0, totalD = 0, totalR = 0;
    const cards = drivers.map(driver => {
      const rep = reports[driver.uid];
      if(rep){ reported++; totalD += rep.deliveryQty||0; totalR += rep.reverseQty||0; }

      const statusColor = rep ? '#34d399' : '#fbbf24';
      const statusText  = rep ? '已回報' : '未回報';
      const statusBg    = rep ? 'rgba(16,185,129,0.08)' : 'rgba(245,158,11,0.08)';
      const statusBorder= rep ? 'rgba(16,185,129,0.25)' : 'rgba(245,158,11,0.25)';
      const confTime    = rep?.confirmedAt?.toDate ? rep.confirmedAt.toDate().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '';

      return `<div style="background:${statusBg};border:1px solid ${statusBorder};border-radius:10px;padding:14px;transition:all 0.3s">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:'Orbitron',monospace;flex-shrink:0">${(driver.name||'?')[0]}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${driver.name||'未知'}</div>
            <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${driver.type==='employee'?'員工':'承攬'}</div>
          </div>
          <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${statusBg};border:1px solid ${statusBorder};color:${statusColor};font-family:'JetBrains Mono',monospace;font-weight:600">${statusText}</span>
        </div>
        ${rep ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="text-align:center;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px">配送</div>
            <div style="font-family:'Orbitron',monospace;font-size:18px;color:var(--accent)">${rep.deliveryQty||0}</div>
          </div>
          <div style="text-align:center;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px">
            <div style="font-size:10px;color:var(--dim);margin-bottom:2px">逆物流</div>
            <div style="font-family:'Orbitron',monospace;font-size:18px;color:#a78bfa">${rep.reverseQty||0}</div>
          </div>
        </div>
        <div style="font-size:10px;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace;text-align:right">回報時間 ${confTime}</div>
        ` : `
        <div style="text-align:center;padding:12px;background:rgba(0,0,0,0.15);border-radius:6px;font-size:12px;color:var(--dim)">
          尚未回報今日件數
        </div>`}
      </div>`;
    });

    // Update stats
    const dsR = document.getElementById('ds-reported');
    const dsP = document.getElementById('ds-pending');
    const dsTD = document.getElementById('ds-total-d');
    const dsTR = document.getElementById('ds-total-r');
    const dsSub1 = document.getElementById('ds-reported-sub');
    const dsSub2 = document.getElementById('ds-pending-sub');
    if(dsR) dsR.textContent = reported;
    if(dsP) dsP.textContent = drivers.length - reported;
    if(dsTD) dsTD.textContent = totalD.toLocaleString();
    if(dsTR) dsTR.textContent = totalR.toLocaleString();
    if(dsSub1) dsSub1.textContent = `共 ${drivers.length} 位司機`;
    if(dsSub2) dsSub2.textContent = `剩 ${drivers.length-reported} 位待回報`;

    const grid = document.getElementById('driver-status-grid');
    if(grid) grid.innerHTML = cards.join('') || '<div style="color:var(--dim);text-align:center;padding:20px;font-size:12px;grid-column:1/-1">尚無司機資料</div>';
  });
}

let pendingFiles = [];

window.handleDrop = (e) => {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor='rgba(0,212,255,0.25)';
  addToQueue([...e.dataTransfer.files]);
};
window.handleFileSelect = (input) => { addToQueue([...input.files]); };

function addToQueue(files){
  pendingFiles.push(...files);
  renderQueue();
  document.getElementById('upload-btn').style.display='block';
}

function renderQueue(){
  const el=document.getElementById('upload-queue');
  if(!el)return;
  el.innerHTML=pendingFiles.map((f,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
      <span style="font-size:16px">${getFileIcon(f.name)}</span>
      <div style="flex:1;min-width:0"><div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div>
      <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${formatSize(f.size)}</div></div>
      <div style="width:60px;text-align:right"><div class="badge bgr" id="fstatus-${i}">待上傳</div></div>
      <span style="cursor:pointer;color:var(--dim);font-size:12px" onclick="removeFile(${i})">✕</span>
    </div>`).join('');
}

window.removeFile=(i)=>{ pendingFiles.splice(i,1); renderQueue(); if(!pendingFiles.length)document.getElementById('upload-btn').style.display='none'; };

window.uploadFiles=async()=>{
  if(!pendingFiles.length)return;
  const {getStorage,ref,uploadBytes,getDownloadURL}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
  const storage=getStorage(fbApp);
  const cat=document.getElementById('upload-cat')?.value||'other';
  const note=document.getElementById('upload-note')?.value||'';
  const person=document.getElementById('upload-person')?.value||'';
  const btn=document.getElementById('upload-btn');
  btn.disabled=true; btn.textContent='上傳中...';

  for(let i=0;i<pendingFiles.length;i++){
    const f=pendingFiles[i];
    const statusEl=document.getElementById(`fstatus-${i}`);
    if(statusEl){statusEl.className='badge by';statusEl.textContent='上傳中';}
    try{
      const path=`files/${cat}/${Date.now()}_${f.name}`;
      const storageRef=ref(storage,path);
      await uploadBytes(storageRef,f);
      const url=await getDownloadURL(storageRef);
      await addDoc(collection(db,'files'),{
        name:f.name, size:f.size, type:f.type||'unknown',
        category:cat, note, person, url, path,
        uploadedBy:CD?.name||CU?.email,
        uploadedAt:serverTimestamp()
      });
      await addAudit('UPLOAD',`上傳檔案：${f.name} (${cat})`);
      if(statusEl){statusEl.className='badge bg';statusEl.textContent='✓ 完成';}
    }catch(e){
      if(statusEl){statusEl.className='badge br';statusEl.textContent='失敗';}
    }
  }
  btn.disabled=false; btn.textContent='上傳完成 ✓';
  pendingFiles=[];
  setTimeout(()=>{ loadFiles(); document.getElementById('upload-note').value=''; },800);
};

async function loadFiles(){
  const cat=document.getElementById('filter-cat')?.value||'';
  const {query,where,orderBy,limit,getDocs,collection:col}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  let q;
  if(cat) q=query(collection(db,'files'),where('category','==',cat),orderBy('uploadedAt','desc'),limit(50));
  else q=query(collection(db,'files'),orderBy('uploadedAt','desc'),limit(50));
  const snap=await getDocs(q);
  const el=document.getElementById('files-list');
  if(!el)return;
  if(snap.empty){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:18px;font-size:12px">尚無檔案</div>';return;}
  // Count by category
  const counts={};
  snap.docs.forEach(d=>{ const c=d.data().category||'other'; counts[c]=(counts[c]||0)+1; });
  FILE_CATS.forEach(c=>{ const el2=document.getElementById('count-'+c.id); if(el2)el2.textContent=(counts[c.id]||0)+' 個'; });
  el.innerHTML=`<div class='tbl-wrap'><table class="tbl"><thead><tr><th></th><th>檔名</th><th>分類</th><th>說明</th><th>大小</th><th>上傳者</th><th>時間</th><th></th></tr></thead><tbody>`+
  snap.docs.map(d=>{
    const f=d.data();
    const date=f.uploadedAt?.toDate?f.uploadedAt.toDate().toLocaleDateString('zh-TW'):'';
    const catLabel=FILE_CATS.find(c=>c.id===f.category)?.label||f.category;
    return `<tr>
      <td style="font-size:18px">${getFileIcon(f.name)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</td>
      <td><span class="badge bb" style="font-size:9px">${catLabel}</span></td>
      <td style="color:var(--dim);font-size:11px">${f.note||'—'}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)">${formatSize(f.size)}</td>
      <td style="font-size:11px;color:var(--dim)">${f.uploadedBy||'—'}</td>
      <td style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${date}</td>
      <td style="display:flex;gap:4px">
        <a href="${f.url}" target="_blank" class="btn btn-p btn-sm" style="text-decoration:none;font-size:10px;padding:3px 8px">開啟</a>
        <a href="${f.url}" download="${f.name}" class="btn btn-g btn-sm" style="text-decoration:none;font-size:10px;padding:3px 8px">下載</a>
      </td>
    </tr>`;
  }).join('')+'</tbody></table>';
}

async function loadUploadPersons(){
  const snap=await getDocs(collection(db,'users'));
  const sel=document.getElementById('upload-person');
  if(!sel)return;
  snap.docs.forEach(d=>{
    const opt=document.createElement('option');
    opt.value=d.data().name||d.id;
    opt.textContent=d.data().name||d.id;
    sel.appendChild(opt);
  });
}

function getFileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  const icons={jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',mp4:'🎬',mov:'🎬',zip:'🗜️',rar:'🗜️'};
  return icons[ext]||'📎';
}
function formatSize(bytes){
  if(!bytes)return '—';
  if(bytes<1024)return bytes+'B';
  if(bytes<1024*1024)return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

async function callGemini(prompt, history = [], mode = 'text') {
  const SECRET_KEY = localStorage.getItem('V92_SECRET_KEY') || GEMINI_KEY;
  if (!SECRET_KEY) throw new Error('尚未設定 API 金鑰');
  // 【確認可用】gemini-flash-latest 是此 Key 唯一可用模型
  const modelId = 'gemini-flash-latest';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${SECRET_KEY}`;
  try {
    const res = await geminiWithBackoff(url, {
      contents: [...history, { role: 'user', parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.75, maxOutputTokens: 1000 }
    });
    const data = await res.json();
    if (data.error) throw new Error(`[${data.error.code}] ${data.error.message}`);
    return { reply: data.candidates?.[0]?.content?.parts?.[0]?.text || '', model: modelId };
  } catch (e) {
    console.error('[Supreme-V92]', e.message);
    throw e;
  }
}

function detectEscalation(message) {
  // Check anger / urgency keywords
  const angryWords = ['生氣','不爽','爛','垃圾','投訴','客訴','混蛋','幹','靠','算了','不幹了','嚴重','緊急','馬上','立刻','要求'];
  const isAngry = angryWords.some(w => message.includes(w));

  // Check repeated questions (3+ times same topic)
  const topic = message.slice(0,10);
  csRepeatTracker[topic] = (csRepeatTracker[topic] || 0) + 1;
  const isRepeated = csRepeatTracker[topic] >= 3;

  return isAngry || isRepeated;
}

window.sendCSMessage = async function sendCSMessage() {
  const input = document.getElementById('cs-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';

  addCSMsg('user', text);
  csHistory.push({ role: 'user', parts: [{ text }] });

  // Check escalation (silent)
  if (detectEscalation(text) && !csEscalated) {
    csEscalated = true;
    // Silently notify boss via Firestore - NO UI indication
    await saveCSEscalation(text);
  }

  // Show typing
  addCSMsg('agent', '', true);

  // Add slight random delay (1-2.5s) to feel more human
  const delay = 1000 + Math.random() * 1500;
  await new Promise(r => setTimeout(r, delay));

  try {
    const messages = [
      { role: 'user', parts: [{ text: CS_SYSTEM_PROMPT + '\n\n司機資料：' + JSON.stringify({name: CD?.name, type: CD?.type, priceDelivery: CD?.priceDelivery, priceReverse: CD?.priceReverse, allowance: CD?.allowance}) }] },
      { role: 'model', parts: [{ text: '好的，我是您的客服專員，很高興為您服務！' }] },
      ...csHistory.slice(-8) // keep last 8 messages for context
    ];

    // 使用 callGemini（統一金鑰 + gemini-flash-latest）
    const csCtx = messages.slice(0, -1);
    const { reply: csReply } = await callGemini(text, csCtx, 'text');
    const reply = csReply || '不好意思，我這邊稍微卡住了，可以再說一次嗎？😅';

    csHistory.push({ role: 'model', parts: [{ text: reply }] });
    addCSMsg('agent', reply);

    // Save conversation
    await saveCSSession(text, reply);
  } catch(e) {
    addCSMsg('agent', '不好意思，我這邊網路有點問題，可以稍後再試嗎？');
  }
}

async function checkInDriver(){
  const now = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  
  // Check if already checked in today
  const ciRef = doc(db,'checkins',`${CU.uid}_${TODAY}`);
  const ciSnap = await getDoc(ciRef);
  
  if(ciSnap.exists() && ciSnap.data().checkedIn){
    // Check out
    await updateDoc(ciRef,{
      checkedOut: timeStr,
      checkOutAt: serverTimestamp(),
      status:'completed'
    });
    await addDoc(collection(db,'auditLog'),{
      action:'CHECKOUT', detail:`${CD.name} 下班打卡 ${timeStr}`,
      timestamp:serverTimestamp(), hash:Math.random().toString(36).slice(2,8)
    });
    showToast('✓ 下班打卡：'+timeStr);
    updateCheckinUI(false, ciSnap.data().checkedInTime, timeStr);
  } else {
    // Check in
    await setDoc(ciRef,{
      uid:CU.uid, name:CD.name, date:TODAY,
      checkedIn:true, checkedInTime:timeStr,
      checkInAt:serverTimestamp(), status:'working'
    });
    await addDoc(collection(db,'auditLog'),{
      action:'CHECKIN', detail:`${CD.name} 上班打卡 ${timeStr}`,
      timestamp:serverTimestamp(), hash:Math.random().toString(36).slice(2,8)
    });
    showToast('✓ 上班打卡：'+timeStr);
    updateCheckinUI(true, timeStr, null);
  }
}

function updateCheckinUI(isIn, inTime, outTime){
  const btn = document.getElementById('checkin-btn');
  const status = document.getElementById('checkin-status');
  const inEl = document.getElementById('checkin-in-time');
  const outEl = document.getElementById('checkin-out-time');
  if(btn){
    btn.textContent = isIn ? '📍 下班打卡' : '📍 上班打卡';
    btn.style.background = isIn ? 'rgba(239,68,68,0.15)' : 'rgba(16,185,129,0.15)';
    btn.style.borderColor = isIn ? 'rgba(239,68,68,0.4)' : 'rgba(16,185,129,0.4)';
    btn.style.color = isIn ? '#f87171' : '#34d399';
  }
  if(status) status.textContent = isIn ? '● 上班中' : '○ 已下班';
  if(status) status.style.color = isIn ? '#34d399' : '#64748b';
  if(inEl && inTime) inEl.textContent = '上班：'+inTime;
  if(outEl && outTime) outEl.textContent = '下班：'+outTime;
}

// Send payslip to one driver
window.sendPayslip = async (uid, name, month) => {
  month = month || MONTH;
  try {
    // Get driver data
    const uSnap = await getDoc(doc(db,'users',uid));
    if(!uSnap.exists()){ showToast('找不到員工資料','err'); return; }
    const u = uSnap.data();

    // Get monthly stats
    const mSnap = await getDoc(doc(db,'monthlyStats',`${uid}_${month}`));
    const td = mSnap.exists() ? mSnap.data().totalDelivery||0 : 0;
    const tr = mSnap.exists() ? mSnap.data().totalReverse||0 : 0;
    const gross = td*(u.priceDelivery||50) + tr*(u.priceReverse||35) + (u.allowance||0);
    const labEmp = u.labourEmployee||0;
    const hlthEmp = u.healthEmployee||0;
    const deduct = u.regularDeduct||0;
    const net = gross - labEmp - hlthEmp - deduct;

    // Get last month for comparison
    const [yr,mn] = month.split('-').map(Number);
    const prevMn = mn===1 ? `${yr-1}-12` : `${yr}-${String(mn-1).padStart(2,'0')}`;
    const pmSnap = await getDoc(doc(db,'monthlyStats',`${uid}_${prevMn}`));
    const pmTd = pmSnap.exists() ? pmSnap.data().totalDelivery||0 : 0;
    const pmTr = pmSnap.exists() ? pmSnap.data().totalReverse||0 : 0;
    const pmGross = pmTd*(u.priceDelivery||50) + pmTr*(u.priceReverse||35) + (u.allowance||0);
    const pmNet = pmGross - labEmp - hlthEmp - deduct;

    // Create payslip document in Firestore
    const psRef = doc(db,'payslips',`${uid}_${month}`);
    await setDoc(psRef, {
      uid, name: u.name, month,
      deliveryQty: td, reverseQty: tr,
      priceDelivery: u.priceDelivery||50,
      priceReverse: u.priceReverse||35,
      allowance: u.allowance||0,
      grossIncome: gross,
      labourEmployee: labEmp,
      healthEmployee: hlthEmp,
      regularDeduct: deduct,
      netIncome: net,
      prevMonthNet: pmNet,
      sentAt: serverTimestamp(),
      sentBy: CD?.name||'系統',
      read: false
    });

    await addAudit('PAYSLIP', `發送薪資單：${u.name} ${month} 實發 $${net.toLocaleString()}`);
    showToast('✓ 已發送薪資單給 ' + u.name);
    return true;
  } catch(e) {
    showToast('發送失敗：'+e.message,'err');
    return false;
  }
};
