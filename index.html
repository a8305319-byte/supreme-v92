<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEBUG | Supreme-V92</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        window.FB = { initializeApp, getFirestore, collection, onSnapshot, getAuth, signInAnonymously, onAuthStateChanged };
    </script>
</head>
<body class="bg-[#020617] text-white">
    <div id="root"></div>
    <div id="debug-log" class="fixed bottom-0 left-0 w-full p-4 bg-black/80 text-[10px] font-mono text-rose-400 break-all z-[9999]">系統初始化中...</div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function AppWrapper() {
            const [status, setStatus] = useState("正在連線至 Firebase...");
            const [showGate, setShowGate] = useState(false);

            const log = (msg) => {
                console.log(msg);
                document.getElementById('debug-log').innerText = msg;
            };

            useEffect(() => {
                const firebaseConfig = {
                    apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
                    authDomain: "supreme-v92.firebaseapp.com",
                    projectId: "supreme-v92",
                    storageBucket: "supreme-v92.firebasestorage.app",
                    messagingSenderId: "485530156296",
                    appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
                };

                try {
                    log("1. 正在初始化 App...");
                    const app = window.FB.initializeApp(firebaseConfig);
                    const db = window.FB.getFirestore(app);
                    const auth = window.FB.getAuth(app);

                    log("2. 正在嘗試匿名登入...");
                    window.FB.signInAnonymously(auth)
                        .then(() => {
                            log("3. 匿名登入成功！正在掛載監聽器...");
                            const unsub = window.FB.onSnapshot(window.FB.collection(db, 'artifacts', 'supreme-v92', 'public', 'data', 'partners'), 
                                (snap) => {
                                    log("4. 資料庫連線完全正常！");
                                    setStatus("連線成功");
                                    setShowGate(true);
                                }, 
                                (err) => {
                                    log("❌ 資料庫讀取失敗: " + err.message);
                                }
                            );
                        })
                        .catch((err) => {
                            log("❌ 登入失敗: " + err.message + " (請確認 Firebase 匿名登入已開啟)");
                        });
                } catch (err) {
                    log("❌ 程式碼崩潰: " + err.message);
                }
            }, []);

            return (
                <div class="h-screen flex flex-col items-center justify-center p-6 text-center">
                    {!showGate ? (
                        <div class="space-y-4">
                            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            <h1 class="text-xl font-black italic text-blue-500 tracking-tighter">SUPREME-V92 SECURING</h1>
                            <p class="text-xs text-slate-500">{status}</p>
                        </div>
                    ) : (
                        <div class="animate-bounce text-emerald-500 font-black">
                            ✅ 連線成功！這代表你的網頁跟資料庫通了！
                            <br/><span class="text-white text-sm">（請老闆移除除錯代碼，換回正式版）</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWrapper />);
    </script>
</body>
</html>
