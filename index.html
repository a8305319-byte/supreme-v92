<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGSOC 2026 夥伴結算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f1f5f9; color: #1e293b; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.03); }
        .payout-card { border-radius: 2rem; border: 1px solid #e2e8f0; }
        .signature-area { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        /* 系統處理進度條 */
        .progress-bar { height: 3px; background: #2563eb; animation: load 1.2s ease-in-out; }
        @keyframes load { from { width: 0; } to { width: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState('gate'); // gate, loading, payout, done
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');

            const handleLogin = () => {
                if (!name || !phone) return alert("請輸入姓名與電話");
                setStep('loading');
                setTimeout(() => setStep('payout'), 1200);
            };

            if (step === 'gate') return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="w-full max-w-md bg-white p-10 rounded-[2.5rem] card-shadow border border-slate-200">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter italic">GGSOC 2026</h1>
                            <p className="text-slate-400 text-[10px] font-bold tracking-[0.4em] uppercase mt-2">夥伴結算門戶</p>
                        </div>
                        <div className="space-y-5">
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-500 ml-1">帳戶姓名</label>
                                <input value={name} onChange={e => setName(e.target.value)} placeholder="您的姓名" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-lg font-bold outline-none focus:ring-2 focus:ring-blue-600 transition-all text-center" />
                            </div>
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-500 ml-1">手機號碼</label>
                                <input value={phone} onChange={e => setPhone(e.target.value)} placeholder="09XX-XXX-XXX" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-lg font-bold outline-none focus:ring-2 focus:ring-blue-600 transition-all text-center" />
                            </div>
                            <button onClick={handleLogin} className="w-full bg-blue-600 text-white font-black py-5 rounded-full text-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all mt-8">登入對帳</button>
                        </div>
                    </div>
                </div>
            );

            if (step === 'loading') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-white">
                    <div className="w-64 bg-slate-100 rounded-full overflow-hidden mb-6">
                        <div className="progress-bar"></div>
                    </div>
                    <p className="text-slate-400 text-xs font-black tracking-widest uppercase animate-pulse">正在調閱結算資料...</p>
                </div>
            );

            if (step === 'payout') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <div className="w-full max-w-md bg-white payout-card p-10 card-shadow">
                        <div className="flex justify-between items-center mb-10 pb-6 border-b border-slate-100">
                            <div>
                                <h3 className="text-slate-900 text-lg font-black tracking-tight">{name} 大哥，辛苦了</h3>
                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Payout Details</p>
                            </div>
                            <span className="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase italic">2.11% 系統已結</span>
                        </div>

                        <div className="space-y-5 mb-10">
                            <div className="flex justify-between text-sm font-bold text-slate-500">
                                <span>當期報酬總額</span>
                                <span>$10,000</span>
                            </div>
                            <div className="flex justify-between text-sm font-bold text-red-400">
                                <span>代扣二代健保 (2.11%)</span>
                                <span>-$211</span>
                            </div>
                            <div className="pt-6 border-t border-slate-50 flex justify-between items-end">
                                <span className="text-slate-900 font-black text-lg">本次實領</span>
                                <span className="text-5xl font-black text-slate-900 tracking-tighter">$9,789</span>
                            </div>
                        </div>

                        <div className="signature-area w-full h-44 bg-slate-50 rounded-3xl border border-slate-200 flex flex-col items-center justify-center mb-8 relative">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">在此劃名確認領取</span>
                            <div className="text-5xl opacity-5 font-black italic select-none">CONFIRMED</div>
                        </div>

                        <button onClick={() => setStep('done')} className="w-full bg-slate-900 text-white font-black py-5 rounded-full text-xl shadow-2xl active:scale-95 transition-all">確認領錢</button>
                        
                        <div className="mt-8 text-center opacity-30">
                            <p className="text-[8px] font-mono tracking-tighter">
                                $$Net = (Gross - Labor - Health) - \lceil Gross \times 2.11\% \rceil$$
                            </p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-10 text-center bg-white">
                    <div className="animate-in zoom-in duration-500">
                        <div className="text-6xl mb-8">💰</div>
                        <h2 className="text-2xl font-black text-slate-900 tracking-tight">結算成功</h2>
                        <p className="text-slate-500 text-sm mt-4 font-bold leading-relaxed">
                            {name} 大哥，錢已經發下去了，<br/>
                            系統已自動留存對帳單，辛苦了！
                        </p>
                        <button onClick={() => window.location.reload()} className="mt-12 text-blue-600 text-xs font-black border-b-2 border-blue-600 pb-1 uppercase tracking-widest">返回門戶</button>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
