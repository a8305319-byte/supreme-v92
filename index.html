<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在地物流：上帝系統體驗版</title>
    <style>
        /* CSS：打造極簡、去頭貼化、通訊軟體風 */
        body {
            font-family: "Microsoft JhengHei", "Apple LiGothic", sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-header {
            background-color: #ffffff;
            color: #333;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        /* 司機端（使用者）：綠色泡泡 */
        .message.user {
            align-self: flex-end;
            background-color: #4CAF50;
            color: white;
            border-bottom-right-radius: 5px;
        }

        /* AI 端（客服/面試）：白色泡泡 */
        .message.ai {
            align-self: flex-start;
            background-color: #e9ecef;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        #chat-input-area {
            padding: 10px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            background-color: #f9f9f9;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }

        #send-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #typing-indicator {
            font-style: italic;
            color: #888;
            margin-left: 10px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">在地物流：AI 引路人</div>
    <div id="chat-messages">
        </div>
    <div id="typing-indicator">對方正在輸入...</div>
    <div id="chat-input-area">
        <input type="text" id="user-input" placeholder="請輸入您的回覆...">
        <button id="send-btn">發送</button>
    </div>
</div>

<script>
    /* JavaScript：核心對話邏輯引擎 */
    const messagesContainer = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const header = document.getElementById('chat-header');
    const typingIndicator = document.getElementById('typing-indicator');

    let state = 0; // 0: 面試, 1: 入職後
    const role = { name: "阿翔哥", prefix: "嘿呀" }; // 固定人設

    // 核心需求：擬人化不對稱延遲算法
    function simulateTyping(text, callback) {
        typingIndicator.style.display = 'block';
        // 延遲 = (字數 * 100ms) + 隨機偏移 (0.5s - 1.5s)
        const delay = text.length * 100 + Math.random() * 1000 + 500;
        setTimeout(() => {
            typingIndicator.style.display = 'none';
            callback();
        }, delay);
    }

    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', sender);
        messageDiv.textContent = text;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight; // 自動捲動到底部
    }

    function handleUserInput() {
        const text = userInput.value.trim();
        if (text === "") return;

        addMessage(text, 'user'); // 顯示司機輸入
        userInput.value = ""; // 清空輸入框

        // 簡單的關鍵字識別：偵測台語關鍵字
        const isTaiwanese = /好勢|會使|無代誌|食飽|可以啦/.test(text);

        if (state === 0) {
            handleInterview(text, isTaiwanese);
        } else {
            handleSupport(text, isTaiwanese);
        }
    }

    // 面試引路人邏輯 (專業、專業、非考官)
    function handleInterview(text, isTaiwanese) {
        let response;
        if (text.includes("準備好了") || text.includes("好勢")) {
            response = "收到，專業。第一題：如果配送時客戶沒接電話，現場又不能違停，你會怎麼處理？";
        } else if (text.includes("拍照") || text.includes("回報")) {
            response = "好的，這個處理邏輯很清楚，我們記錄下來了。面試到此結束，請稍候，系統正在核對資料...";
            state = 1; // 自動轉換入職狀態
            setTimeout(() => { header.textContent = `客服專員 - ${role.name}`; }, 1000); // 延遲更換 Header
        } else {
            response = "了解，大哥你照經驗說就好，我這邊都會記錄。";
        }
        
        simulateTyping(response, () => { addMessage(response, 'ai'); });
    }

        const prefix = is
