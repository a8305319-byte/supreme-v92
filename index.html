<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 老闆互動總控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2.5rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1rem; padding: 12px; width: 100%; color: #ffffff; outline: none; margin-bottom: 10px; font-size: 14px; text-align: center; }
        .btn-action { padding: 8px 16px; border-radius: 0.8rem; font-weight: 800; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .btn-approve { background: #0ea5e9; color: white; }
        .btn-settings { background: #f97316; color: white; }
    </style>
</head>
<body>

    <div id="admin" class="layer">
        <div class="w-full max-w-[900px]">
            <h2 class="text-white font-black text-3xl mb-6 italic border-l-8 border-sky-500 pl-4 uppercase">老闆互動中控台</h2>
            
            <div class="id-card !max-w-full !p-6 mb-6 border-orange-500/30 bg-orange-900/5">
                <h3 class="text-orange-400 font-black mb-4 text-sm">⚙️ 營運參數手動設定 (修改後立即重新計算)</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] block mb-1">配送單價($)</label>
                        <input type="number" id="cfg_del_price" value="15" class="input-box">
                    </div>
                    <div>
                        <label class="text-[10px] block mb-1">逆物流單價($)</label>
                        <input type="number" id="cfg_rev_price" value="10" class="input-box">
                    </div>
                    <div>
                        <label class="text-[10px] block mb-1">扣繳比例(%)</label>
                        <input type="number" id="cfg_fee_rate" value="5" class="input-box">
                    </div>
                </div>
                <button onclick="updateSettings()" class="btn-action btn-settings w-full mt-2">儲存並更新所有薪資</button>
            </div>

            <div class="bg-slate-900 p-4 rounded-3xl overflow-x-auto border border-slate-800">
                <table class="w-full text-[11px] text-left">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr>
                            <th>狀態/操作</th><th>姓名</th><th>配送</th><th>逆物</th><th>原始</th><th>扣繳</th><th>應付</th><th>總表</th>
                        </tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
            
            <button onclick="location.reload()" class="mt-10 text-slate-500 underline text-xs">退出後台</button>
        </div>
    </div>

    <script type="module">
        // Firebase 與前版本相同...
        
        let settings = { del_p: 15, rev_p: 10, fee_r: 5 };

        // 老闆手動更新參數
        window.updateSettings = () => {
            settings.del_p = parseFloat(document.getElementById('cfg_del_price').value);
            settings.rev_p = parseFloat(document.getElementById('cfg_rev_price').value);
            settings.fee_r = parseFloat(document.getElementById('cfg_fee_rate').value);
            renderAdmin(); // 重新渲染列表
            alert("營運參數已更新，薪資數據已同步重新計算。");
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('admin').style.display = 'flex';
            let html = '';
            partners.forEach(p => {
                const income = ((p.total_del || 0) * settings.del_p) + ((p.total_rev || 0) * settings.rev_p);
                const fee = Math.round(income * (settings.fee_r / 100));
                const net = income - fee;

                html += `
                <tr class="border-b border-slate-800">
                    <td class="p-2">
                        ${p.status === 'pending_review' ? `<button onclick="changeStatus('${p.id}', 'interviewed')" class="btn-action btn-approve">核准測驗</button>` : ''}
                        ${p.status === 'pending' ? `<button onclick="changeStatus('${p.id}', 'approved')" class="btn-action btn-approve bg-green-600">正式開通</button>` : ''}
                        ${p.status === 'approved' ? '<span class="text-sky-400">營運中</span>' : ''}
                    </td>
                    <td class="font-bold">${p.name}</td>
                    <td>${p.total_del || 0}</td>
                    <td>${p.total_rev || 0}</td>
                    <td>$${income}</td>
                    <td class="text-red-400">-$${fee}</td>
                    <td class="text-sky-400 font-black">$${net}</td>
                    <td>${p.last_report ? `<img src="${p.last_report}" class="w-8 h-8 rounded cursor-pointer" onclick="window.open(this.src)">` : '無'}</td>
                </tr>`;
            });
            document.getElementById('admin-render').innerHTML = html;
        }

        // 手動變更夥伴狀態邏輯
        window.changeStatus = async (id, newStatus) => {
            await updateDoc(doc(db, 'partners', id), { status: newStatus });
            alert("狀態已變更");
        };

        // 登入邏輯維持老闆識別...
    </script>
</body>
</html>
