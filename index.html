<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 智慧薪資系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); border-radius: 1.5rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; border-radius: 0.8rem; padding: 12px; width: 100%; color: white; outline: none; margin-bottom: 10px; font-size: 15px; }
        .btn-prime { width: 100%; padding: 16px; border-radius: 1rem; background: #0ea5e9; color: #020617; font-weight: 900; font-size: 16px; border: none; }
        /* 薪資條樣式 */
        #slip-box { display: none; background: white; color: black; padding: 30px; width: 350px; font-family: sans-serif; }
        .slip-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-black text-white italic mb-2">SUPREME</h1>
        <p class="text-slate-500 text-sm mb-10">薪資與物流管理</p>
        <div class="w-full max-w-[320px]">
            <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center">
            <input type="password" id="login_pin" placeholder="密碼 (PIN)" class="input-box text-center">
            <div class="flex items-center gap-2 mb-4 text-xs text-slate-500 justify-start px-1">
                <input type="checkbox" id="remember_me"> <label for="remember_me">記住我</label>
            </div>
            <button onclick="boot()" class="btn-prime">確認登入</button>
            <button onclick="showApply()" class="text-sm text-slate-600 underline mt-12 block mx-auto">夥伴入職入口</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-8 mb-10 text-slate-600 font-bold text-sm underline">登出系統</button>
    </div>

    <div id="slip-box">
        <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="margin:0">SUPREME 薪資明細單</h2>
            <small id="slip-date"></small>
        </div>
        <div class="slip-row"><span>夥伴姓名</span><b id="slip-name"></b></div>
        <div class="slip-row"><span>配送總件數</span><span id="slip-del-cnt"></span></div>
        <div class="slip-row"><span>配送總報酬</span><span id="slip-del-pay"></span></div>
        <div class="slip-row"><span>逆物流報酬</span><span id="slip-ret-pay"></span></div>
        <div style="margin: 10px 0; font-weight: bold; color: #d00;">扣款項目</div>
        <div class="slip-row"><span>勞保費扣款</span><span id="slip-labor"></span></div>
        <div class="slip-row"><span>健保費扣款</span><span id="slip-health"></span></div>
        <div style="margin-top: 20px; border-top: 2px solid #000; padding-top: 10px; display: flex; justify-content: space-between; font-size: 18px; font-weight: bold;">
            <span>實領總額</span><span id="slip-total"></span>
        </div>
        <p style="font-size: 10px; color: #999; margin-top: 30px; text-align: center;">本單據由 SUPREME 系統自動生成</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        // 引入 html2canvas 用於製作圖片下載
        import html2canvas from "https://jspm.dev/html2canvas";

        const firebaseConfig = {
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
            authDomain: "supreme-v92.firebaseapp.com",
            projectId: "supreme-v92",
            storageBucket: "supreme-v92.firebasestorage.app",
            messagingSenderId: "485530156296",
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [];
        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); });

        window.boot = () => {
            const phone = document.getElementById('login_phone').value, pin = document.getElementById('login_pin').value;
            if(phone === "0976017938" && pin === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === phone && x.uid === pin && x.status === "approved");
            if(p) return renderPartnerUI(p);
            alert("登入失敗");
        };

        function renderPartnerUI(p) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            
            const health_fee = p.h_cnt * p.health;
            const pay = (p.total_del * p.rate_del) + (p.total_ret * p.rate_ret) - p.labor - health_fee;

            document.getElementById('render-target').innerHTML = `
                <div class="id-card">
                    <h2 class="text-2xl font-bold text-white mb-2">${p.name} 夥伴</h2>
                    <p class="text-xs text-slate-500 mb-6 underline">本月預計實領：$${pay.toLocaleString()}</p>
                    <button onclick='window.downloadSlip(${JSON.stringify(p)})' class="w-full bg-white text-black py-3 rounded-lg font-bold mb-8">💾 下載本月電子薪資條</button>
                    
                    <div class="space-y-4 border-t border-slate-800 pt-6">
                        <span class="text-xs text-sky-500 font-bold uppercase">數據回報</span>
                        <input type="number" id="dc" placeholder="當次配送數" class="input-box text-center text-xl">
                        <input type="number" id="rc" placeholder="當次逆物數" class="input-box text-center text-xl">
                        <button onclick="window.sendJob('${p.id}')" class="btn-prime">同步數據</button>
                    </div>
                </div>`;
        }

        window.downloadSlip = async (p) => {
            const health_fee = p.h_cnt * p.health;
            const pay = (p.total_del * p.rate_del) + (p.total_ret * p.rate_ret) - p.labor - health_fee;
            
            // 填入資料到隱藏模板
            document.getElementById('slip-date').innerText = new Date().toLocaleDateString();
            document.getElementById('slip-name').innerText = p.name;
            document.getElementById('slip-del-cnt').innerText = p.total_del + " 件";
            document.getElementById('slip-del-pay').innerText = "$" + (p.total_del * p.rate_del).toLocaleString();
            document.getElementById('slip-ret-pay').innerText = "$" + (p.total_ret * p.rate_ret).toLocaleString();
            document.getElementById('slip-labor').innerText = "-$" + p.labor.toLocaleString();
            document.getElementById('slip-health').innerText = "-$" + health_fee.toLocaleString();
            document.getElementById('slip-total').innerText = "$" + pay.toLocaleString();

            // 轉為圖片並下載
            const slip = document.getElementById('slip-box');
            slip.style.display = 'block';
            const canvas = await html2canvas(slip);
            const link = document.createElement('a');
            link.download = `SUPREME薪資條_${p.name}.png`;
            link.href = canvas.toDataURL();
            link.click();
            slip.style.display = 'none';
        };

        // ... 管理員後台代碼維持不變 ...
        window.sendJob = async (id) => {
            const d = parseInt(document.getElementById('dc').value) || 0, r = parseInt(document.getElementById('rc').value) || 0;
            await updateDoc(doc(db, 'partners', id), { total_del: increment(d), total_ret: increment(r) });
            alert("同步成功"); location.reload();
        };

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved");
            let html = `<div class="w-full max-w-[480px]"><h2 class="text-white font-bold text-xl mb-6">老闆管理後台</h2>`;
            html += approved.map(p => {
                const pay = (p.total_del * p.rate_del) + (p.total_ret * p.rate_ret) - p.labor - (p.h_cnt * p.health);
                return `<div class="id-card !p-5 !bg-slate-900/40 border-slate-800">
                    <div class="flex justify-between items-center">
                        <p class="text-white font-bold">${p.name}</p>
                        <p class="text-sky-400 font-black text-xl">$${pay.toLocaleString()}</p>
                    </div>
                    <button onclick='window.downloadSlip(${JSON.stringify(p)})' class="text-[10px] text-slate-500 underline mt-2">生成並預覽此夥伴薪資條</button>
                </div>`;
            }).join('');
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }
    </script>
</body>
</html>
