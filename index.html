<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 下班回報</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .main-card { width: 100%; max-width: 450px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2.5rem; padding: 35px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1.2rem; padding: 18px; width: 100%; color: #ffffff; outline: none; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: 900; }
        .btn-submit { width: 100%; padding: 20px; border-radius: 1.5rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 20px; cursor: pointer; border: none; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3); }
        .label-text { font-size: 14px; color: #38bdf8; font-weight: 900; margin-bottom: 10px; display: block; text-align: left; letter-spacing: 1px; }
        
        /* 拍照區域 */
        .photo-area { background: #0f172a; border: 3px dashed #38bdf8; border-radius: 2rem; height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; width: 100%; margin: 20px 0; }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-area span { color: #38bdf8; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-8">
        <h1 class="text-5xl font-black text-white italic tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-xs font-black tracking-[0.4em] uppercase mt-2">夥伴下班數據回報</p>
    </div>

    <div class="main-card">
        <span class="label-text">今日配送總件數 (正+逆)</span>
        <input type="number" id="total_qty" placeholder="請輸入件數" class="input-box">

        <span class="label-text">拍攝「配送總表 / 簽單明細」照片</span>
        <div class="photo-area" onclick="document.getElementById('cam').click()">
            <div id="placeholder" class="text-center">
                <p class="text-4xl mb-2">📸</p>
                <span>點擊開啟相機拍照</span>
            </div>
            <img id="preview">
        </div>
        
        <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="previewImg(this)">

        <button onclick="uploadReport()" id="sub_btn" class="btn-submit mt-4">提交下班報表</button>
        <p class="text-center text-[11px] text-slate-600 mt-6 italic font-bold">提交後數據將同步至雲端帳務中心</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase 設定 (請替換成您的設定)
        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let imgData = null;

        // 預覽照片
        window.previewImg = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                imgData = e.target.result;
                document.getElementById('preview').src = imgData;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };

        // 上傳報表
        window.uploadReport = async () => {
            const qty = document.getElementById('total_qty').value;
            
            if(!qty) return alert("請先輸入總件數！");
            if(!imgData) return alert("請拍一張總表照片！");

            const btn = document.getElementById('sub_btn');
            btn.innerText = "上傳中..."; btn.disabled = true;

            try {
                await addDoc(collection(db, 'daily_reports'), {
                    qty: parseInt(qty),
                    evidence: imgData,
                    timestamp: serverTimestamp()
                });
                alert("報表提交成功，辛苦了！");
                location.reload();
            } catch (e) {
                alert("連線失敗，請檢查網路");
                btn.innerText = "提交下班報表"; btn.disabled = false;
            }
        };
    </script>
</body>
</html>
