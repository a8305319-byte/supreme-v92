<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC 下班結算系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; font-weight: 900; -webkit-tap-highlight-color: transparent; }
    .glass { background: rgba(20, 20, 20, 0.95); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
    .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    .input-field { background: #111; border: 1px solid #333; border-radius: 16px; padding: 15px; width: 100%; color: #3b82f6; font-size: 20px; font-weight: 900; text-align: center; outline: none; }
    .input-field:focus { border-color: #3b82f6; }
    .camera-box { width: 100%; height: 280px; background: #000; border-radius: 24px; object-fit: cover; border: 2px solid #333; }
    .sig-canvas { background: #0a0a0a; border-radius: 20px; border: 1px dashed #444; touch-action: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const config = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.firestore();

    function App() {
      const [partners, setPartners] = useState([]);
      const [user, setUser] = useState(null);
      const [step, setStep] = useState(1); // 1:選擇人, 2:登記, 3:拍照, 4:簽名
      
      const [data, setData] = useState({ del: 0, pkp: 0 });
      const [photo, setPhoto] = useState(null);
      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      useEffect(() => {
        return db.collection('partners').onSnapshot(s => setPartners(s.docs.map(d => ({id:d.id, ...d.data()}))));
      }, []);

      const startCamera = async () => {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        if(videoRef.current) videoRef.current.srcObject = s;
      };

      const capture = () => {
        const c = document.createElement('canvas');
        c.width = 600; c.height = 800;
        const x = c.getContext('2d');
        x.drawImage(videoRef.current, 0, 0, 600, 800);
        x.fillStyle = "rgba(0,0,0,0.6)"; x.fillRect(0, 700, 600, 100);
        x.fillStyle = "#fff"; x.font = "bold 24px sans-serif";
        x.fillText(`司機: ${user.name}`, 30, 740);
        x.fillText(`時間: ${new Date().toLocaleString()}`, 30, 775);
        setPhoto(c.toDataURL());
        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
        setStep(4);
      };

      // 簽名邏輯
      const [drawing, setDrawing] = useState(false);
      const getPos = (e) => {
        const r = canvasRef.current.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
      };
      const drawStart = (e) => { 
        e.preventDefault(); setDrawing(true); 
        const ctx = canvasRef.current.getContext('2d');
        ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 4; ctx.lineCap = "round";
        const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); 
      };
      const drawMove = (e) => { 
        if(!drawing) return; e.preventDefault();
        const ctx = canvasRef.current.getContext('2d');
        const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); 
      };

      if (step === 1) return (
        <div className="p-6">
          <h2 className="text-2xl font-black mb-8 italic text-blue-500">GGSOC 下班結算</h2>
          <p className="text-zinc-500 mb-4 text-xs">請點擊您的姓名開始結算流程</p>
          <div className="space-y-3">
            {partners.map(p => (
              <button key={p.id} onClick={() => { setUser(p); setStep(2); }} className="w-full glass p-6 rounded-3xl text-left font-black text-xl btn-active border-white/5 border">
                {p.name} <span className="text-[10px] text-zinc-600 block">{p.phone}</span>
              </button>
            ))}
          </div>
        </div>
      );

      return (
        <div className="fixed inset-0 bg-black p-6 flex flex-col overflow-y-auto pb-20">
          <div className="flex justify-between items-center mb-6">
            <h3 className="text-xl font-black text-blue-400">司機：{user.name}</h3>
            <span className="text-xs bg-zinc-900 px-3 py-1 rounded-full text-zinc-500 font-mono">STEP {step}/4</span>
          </div>

          {step === 2 && (
            <div className="space-y-8 animate-[fadeIn_0.3s]">
              <div>
                <label className="text-xs text-zinc-500 block mb-2 font-black italic">今日配送總件數 (DEL)</label>
                <input type="number" className="input-field" placeholder="0" onChange={e => setData({...data, del: e.target.value})} />
              </div>
              <div>
                <label className="text-xs text-zinc-500 block mb-2 font-black italic">今日取件總件數 (PKP)</label>
                <input type="number" className="input-field" placeholder="0" onChange={e => setData({...data, pkp: e.target.value})} />
              </div>
              <button onClick={() => { setStep(3); setTimeout(startCamera, 100); }} className="w-full py-5 bg-blue-600 rounded-2xl font-black text-xl btn-active">下一步：拍攝報表</button>
            </div>
          )}

          {step === 3 && (
            <div className="space-y-6 animate-[fadeIn_0.3s]">
              <p className="text-xs text-zinc-500 italic">請對準「日結報表」或「App 結算畫面」拍攝</p>
              <video ref={videoRef} autoPlay playsInline className="camera-box shadow-[0_0_20px_rgba(59,130,246,0.1)]" />
              <button onClick={capture} className="w-full py-5 bg-blue-600 rounded-2xl font-black text-xl btn-active">📸 拍下證據並自動壓印</button>
            </div>
          )}

          {step === 4 && (
            <div className="space-y-6 animate-[fadeIn_0.3s]">
              <div className="relative">
                <img src={photo} className="w-full rounded-3xl border border-white/10" />
                <div className="absolute top-4 right-4 bg-emerald-500 text-[10px] px-2 py-1 rounded font-black">數據已鎖定</div>
              </div>
              
              <div className="glass p-5 rounded-3xl">
                <p className="text-[10px] text-zinc-500 mb-4 font-black uppercase tracking-widest">本人確認數據無誤簽章</p>
                <canvas 
                  ref={canvasRef} width={300} height={160} className="sig-canvas w-full"
                  onTouchStart={drawStart} onTouchMove={drawMove} onTouchEnd={() => setDrawing(false)}
                />
              </div>

              <button className="w-full py-5 bg-emerald-600 rounded-2xl font-black text-xl btn-active shadow-lg shadow-emerald-600/20" 
                onClick={() => { 
                  alert(`✅ 結算成功！\n司機：${user.name}\nDEL: ${data.del}\nPKP: ${data.pkp}\n照片與簽名已加密存檔。`); 
                  setStep(1); setPhoto(null); setData({del:0, pkp:0});
                }}>
                完成今日下班結算
              </button>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
