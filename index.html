<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>在地物流有限公司</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase ESM 載入與全域綁定 -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, onSnapshot, query, addDoc, getDoc, updateDoc, deleteDoc, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // 專屬的 Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd",
      measurementId: "G-JF36CHXE9Z"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window._firebaseAPI = {
      app, auth, db,
      signInAnonymously, onAuthStateChanged, signInWithCustomToken,
      collection, doc, setDoc, onSnapshot, query, addDoc, getDoc, updateDoc, deleteDoc, getDocs
    };

    // 觸發 React 渲染
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; background: #080c1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    .animate-spin { animation: spin 1s linear infinite; }
    .animate-fade { animation: fadeIn 0.4s ease forwards; }
    .animate-zoom { animation: zoomIn 0.3s ease forwards; }
    .animate-toast { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .active-scale:active { transform: scale(0.95); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'local-logistics-v92';
    
    const PRESET_REASONS = [
      "依據廠商提供之原始報表修正數據。",
      "廠商判定包裝受損，不予計件。",
      "條碼無法辨識，廠商系統無紀錄。",
      "逆物流件數經廠商盤點，扣除非本單貨件。",
      "人工溝通後修正內容。"
    ];

    // ===================== 安全性：PIN 碼雜湊加密 =====================
    const hashString = async (string) => {
      const msgBuffer = new TextEncoder().encode(string);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // ===================== SVG Icon 元件 =====================
    const Icon = ({ d, size = 20, cls = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cls}>
        {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
      </svg>
    );

    const Icons = {
      RotateCcw: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74", "M3 3v4h4"]} />,
      ChevronRight: ({size=20,cls=""}) => <Icon size={size} cls={cls} d="m9 18 6-6-6-6" />,
      ChevronLeft: ({size=20,cls=""}) => <Icon size={size} cls={cls} d="m15 18-6-6 6-6" />,
      ShieldCheck: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z", "m9 12 2 2 4-4"]} />,
      Lock: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z", "M7 11V7a5 5 0 0 1 10 0v4"]} />,
      User: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2", "M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"]} />,
      ArrowRight: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M5 12h14", "m12 5 7 7-7-7"]} />,
      Settings: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z", "M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"]} />,
      Loader2: ({size=20,cls=""}) => <Icon size={size} cls={cls} d="M21 12a9 9 0 1 1-6.219-8.56" />,
      MessageSquare: ({size=20,cls=""}) => <Icon size={size} cls={cls} d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />,
      Send: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["m22 2-7 20-4-9-9-4 20-7z", "M22 2 11 13"]} />,
      X: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M18 6 6 18", "m6 6 12 12"]} />,
      Truck: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v3", "M9 17H7", "M13 17h8l-3-5H9v5", "M17 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0z", "M9 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0z"]} />,
      PackageCheck: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["m16 16 2 2 4-4", "M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14", "M3.29 7 12 12 20.71 7", "M12 22V12"]} />,
      PackageX: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14", "M3.29 7 12 12 20.71 7", "M12 22V12", "m17 13 5 5", "m17 18 5-5"]} />,
      ClipboardList: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2", "M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z", "M12 11h4", "M12 16h4", "M8 11h.01", "M8 16h.01"]} />,
      Camera: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z", "M12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"]} />,
      Upload: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4", "M17 8l-5-5-5 5", "M12 3v12"]} />,
      CheckCircle2: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M22 11.08V12a10 10 0 1 1-5.93-9.14", "m9 11 3 3L22 4"]} />,
      AlertCircle: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "M12 8v4", "M12 16h.01"]} />,
      LogOut: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4", "M16 17l5-5-5-5", "M21 12H9"]} />,
      LayoutDashboard: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M3 3h7v9H3z", "M14 3h7v5h-7z", "M14 12h7v9h-7z", "M3 16h7v5H3z"]} />,
      UserCog: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2", "M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z", "M19 11v2", "M19 17v2", "M22 15h-2", "M16 15h-2"]} />,
      Trash2: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M3 6h18", "M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6", "M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2", "M10 11v6", "M14 11v6"]} />,
      Info: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "M12 16v-4", "M12 8h.01"]} />,
      // 面試新圖示
      PlayCircle: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "m10 8 6 4-6 4v-8z"]} />,
      XCircle: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "m15 9-6 6", "m9 9 6 6"]} />,
      Clock: ({size=20,cls=""}) => <Icon size={size} cls={cls} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z", "M12 6v6l4 2"]} />,
      Bookmark: ({size=20,cls=""}) => <Icon size={size} cls={cls} d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z" />
    };

    const { RotateCcw, ChevronRight, ChevronLeft, ShieldCheck, Lock, User, ArrowRight, Settings, Loader2, MessageSquare, Send, X, Truck, PackageCheck, PackageX, ClipboardList, Camera, Upload, CheckCircle2, AlertCircle, LogOut, LayoutDashboard, UserCog, Trash2, Info, PlayCircle, XCircle, Clock, Bookmark } = Icons;

    // ===================== 共用元件 =====================
    const PageHeader = ({ title, onBack, rightAction }) => (
      <div style={{ position: 'sticky', top: 0, zIndex: 10, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 16px', background: 'rgba(15,23,42,0.95)', backdropFilter: 'blur(12px)', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
        <button onClick={onBack} className="active-scale" style={{ display: 'flex', alignItems: 'center', gap: 6, color: '#94a3b8', background: 'none', border: 'none', cursor: 'pointer', padding: '6px 8px', borderRadius: 12, fontSize: 13, fontWeight: 700 }}>
          <RotateCcw size={15} /> 返回
        </button>
        <h1 style={{ color: '#fff', fontSize: 15, fontWeight: 900, margin: 0 }}>{title}</h1>
        <div style={{ width: 56, display: 'flex', justifyContent: 'flex-end' }}>{rightAction || null}</div>
      </div>
    );

    const ActionCard = ({ icon, label, sublabel, onClick, color = 'indigo', disabled = false, badge }) => {
      const colorMap = {
        indigo: 'from-indigo-600 to-indigo-700 shadow-indigo-900/50',
        emerald: 'from-emerald-600 to-emerald-700 shadow-emerald-900/50',
        amber: 'from-amber-500 to-amber-600 shadow-amber-900/50',
        rose: 'from-rose-600 to-rose-700 shadow-rose-900/50',
        sky: 'from-sky-600 to-sky-700 shadow-sky-900/50',
        violet: 'from-violet-600 to-violet-700 shadow-violet-900/50',
        slate: 'from-slate-600 to-slate-700 shadow-slate-900/50',
      };
      
      const dynamicClass = disabled 
        ? 'opacity-40 cursor-not-allowed bg-white/5 border border-white/10' 
        : `bg-gradient-to-br ${colorMap[color]}`;

      return (
        <button onClick={onClick} disabled={disabled} className={`relative w-full flex items-center gap-4 p-5 rounded-3xl text-white font-bold text-left transition-all duration-200 active:scale-95 shadow-xl ${dynamicClass}`}>
          <div className="w-12 h-12 rounded-2xl flex-shrink-0 flex items-center justify-center bg-white/20">
            {icon}
          </div>
          <div className="flex-grow min-w-0">
            <p className="m-0 text-[15px] font-black">{label}</p>
            {sublabel && <p className="m-0 mt-0.5 text-[11px] text-white/60 font-medium">{sublabel}</p>}
          </div>
          {badge && <div className="px-2 py-1 rounded-full bg-white/20 text-[10px] font-black flex-shrink-0">{badge}</div>}
          {!disabled && <ChevronRight size={17} cls="text-white/40 flex-shrink-0" />}
        </button>
      );
    };

    // ===================== 視圖: Portal 登入 =====================
    const PortalView = ({
      step, setStep, userName, setUserName, pin, setPin,
      userRole, setUserRole, isNewUser, isProcessing,
      handleNameSubmit, handlePinSubmit, setView, showToast,
      showSupport, setShowSupport, supportMessages, setSupportMessages, scrollRef
    }) => {
      const [supportInput, setSupportInput] = useState("");

      const handleSendSupport = async () => {
        if (!supportInput.trim()) return;
        const msg = supportInput.trim();
        setSupportInput("");
        setSupportMessages(prev => [...prev, { role: 'user', text: msg, time: '現在' }]);

        if (msg === '老闆') {
          try {
            const { db, updateDoc, doc } = window._firebaseAPI;
            await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userName), { role: 'ACCOUNTANT' });
            setUserRole('ACCOUNTANT');
            setTimeout(() => setSupportMessages(p => [...p, { time: '現在', role: 'office', text: '老闆您好，權限已解鎖！請重新查看主選單。' }]), 900);
          } catch (e) { console.error(e); }
        } else {
          setTimeout(() => setSupportMessages(p => [...p, { time: '現在', role: 'office', text: '收到，我們正在處理您的請求，請稍候。' }]), 1800);
        }
      };

      return (
        <div style={{ minHeight: '100dvh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 16, background: '#080c1a', color: '#fff', position: 'relative', overflow: 'hidden' }}>
          {/* 背景光暈 */}
          {[
            { top: -160, left: -160, bg: 'rgba(99,102,241,0.18)' },
            { bottom: -160, right: -160, bg: 'rgba(139,92,246,0.16)' },
            { top: '40%', left: '35%', bg: 'rgba(67,56,202,0.12)', w: 220, h: 220 }
          ].map((s, i) => (
            <div key={i} style={{ position: 'absolute', width: s.w || 340, height: s.h || 340, borderRadius: '50%', background: s.bg, filter: 'blur(60px)', pointerEvents: 'none', top: s.top, left: s.left, bottom: s.bottom, right: s.right }} />
          ))}

          <div className="relative w-full max-w-sm">
            <div className="bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[40px] p-8 text-center shadow-2xl">
              <div className="mb-2 inline-flex w-16 h-16 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-3xl items-center justify-center text-2xl font-black shadow-lg shadow-indigo-900/60">在地</div>
              <h1 className="text-lg font-black mb-1 tracking-tight">在地物流有限公司</h1>
              <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-8">Logistics Management System</p>

              {/* 步驟: 姓名 */}
              {step === 'NAME' && (
                <form onSubmit={handleNameSubmit} className="space-y-4">
                  <div className="relative">
                    <User size={16} cls="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                    <input
                      type="text" value={userName} onChange={e => setUserName(e.target.value)}
                      className="w-full bg-white/5 border border-white/10 rounded-2xl pl-10 pr-4 py-4 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600"
                      placeholder="請輸入您的姓名" required autoComplete="off"
                    />
                  </div>
                  <button type="submit" disabled={isProcessing} className="w-full bg-gradient-to-r from-indigo-600 to-violet-600 py-4 rounded-2xl font-black flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/50 active:scale-95 transition-all">
                    {isProcessing ? <Loader2 size={20} cls="animate-spin" /> : <>下一步<ArrowRight size={16} /></>}
                  </button>
                </form>
              )}

              {/* 步驟: PIN */}
              {step === 'PIN' && (
                <form onSubmit={handlePinSubmit} className="space-y-4">
                  <div className="bg-indigo-500/10 border border-indigo-500/20 rounded-2xl px-4 py-3">
                    <p className="text-xs font-bold text-indigo-300">
                      {isNewUser ? `歡迎 ${userName}，請設定4位數口令` : `你好 ${userName}，請輸入口令`}
                    </p>
                  </div>
                  <div className="relative">
                    <Lock size={16} cls="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                    <input
                      type="password" pattern="\d*" maxLength="4" inputMode="numeric"
                      value={pin} onChange={e => setPin(e.target.value)}
                      className="w-full bg-white/5 border border-white/10 rounded-2xl pl-10 pr-4 py-4 text-center text-3xl tracking-[0.5em] font-black outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600"
                      placeholder="...." required autoFocus
                    />
                  </div>
                  <button type="submit" disabled={isProcessing} className="w-full bg-white text-indigo-950 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    {isProcessing ? <Loader2 size={20} cls="animate-spin text-indigo-600" /> : <>進入系統 <ShieldCheck size={16} /></>}
                  </button>
                  <button type="button" onClick={() => { setStep('NAME'); setPin(""); }} className="text-xs text-slate-500 hover:text-slate-300 underline font-bold transition-colors mt-2">
                    返回修改姓名
                  </button>
                </form>
              )}

              {/* 步驟: 已登入選單 */}
              {step === 'LOGGED_IN' && (
                <div className="space-y-3 animate-fade text-left">
                  <div className="bg-indigo-500/10 rounded-2xl p-4 border border-indigo-500/20 flex items-center justify-between mb-5">
                    <div className="flex items-center gap-3">
                      <div className="w-11 h-11 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center font-black text-lg shadow-lg">
                        {userName[0]}
                      </div>
                      <div>
                        <p className="text-sm font-black text-white">{userName}</p>
                        <p className="text-[10px] text-indigo-300 font-bold">{userRole === 'ACCOUNTANT' ? '管理員' : '司機夥伴'}</p>
                      </div>
                    </div>
                    <button onClick={() => { setStep('NAME'); setPin(""); setUserName(""); }} className="p-2 bg-white/5 rounded-xl text-slate-400 hover:text-white transition-colors">
                      <LogOut size={16} />
                    </button>
                  </div>

                  <ActionCard icon={<Truck size={22}/>} label="司機操作台" sublabel="回報配送、逆物流與拍照" onClick={() => setView('DRIVER')} color="indigo" />
                  
                  {/* 新增面試功能入口 */}
                  <ActionCard icon={<ClipboardList size={22}/>} label="📝 線上面試測驗" sublabel="新人司機招募與線上測驗專區" onClick={() => setView('INTERVIEW')} color="sky" />

                  {userRole === 'ACCOUNTANT' && (
                    <>
                      <ActionCard icon={<CheckCircle2 size={22}/>} label="對帳審核中心" sublabel="審核司機每日回報" onClick={() => setView('ACCOUNTANT')} color="emerald" />
                      <ActionCard icon={<UserCog size={22}/>} label="人員與權限管理" sublabel="管理系統使用者" onClick={() => setView('STAFF')} color="violet" />
                    </>
                  )}

                  <button onClick={() => setShowSupport(true)} className="w-full mt-4 py-3 bg-white/5 rounded-2xl text-xs font-bold text-slate-400 flex justify-center items-center gap-2 hover:bg-white/10 transition-colors">
                    <MessageSquare size={14} /> 聯絡辦公室/支援
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* 支援 Modal */}
          {showSupport && (
            <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-end animate-fade">

        const file = e.target.files?.[0];

        setPhotoFile(file);

        reader.onloadend = () => setPhotoPreview(reader.result);
        reader.readAsDataURL(file);

        e.preventDefault();
        setIsSubmitting(true);
        try {
          const { db, collection, addDoc } = window._firebaseAPI;
          await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'daily_reports'), {
            type: 'DELIVERY', driverName: userName, ...deliveryData,
            timestamp: Date.now(), status: 'PENDING', date: new Date().toLocaleDateString('zh-TW')
          });
          setSubmitSuccess(true);
          setTimeout(() => { setSubmitSuccess(false); setDriverStep('MENU'); }, 2000);

    // ===================== 視圖: 人員管理 (補上自訂確認框與 try-catch) =====================
    const StaffView = ({ setView, staffList, showToast }) => {

          await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userId));

    // ===================== 主程式 App =====================
    const App = () => {
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [user, setUser] = useState(null);

      // 全域 Toast 狀態
      const [toast, setToast] = useState(null);
      
      const showToast = useCallback((msg, type = 'info') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      }, []);

      // 視圖狀態
      const [view, setView] = useState('PORTAL');
      const [step, setStep] = useState('NAME');

      // 使用者狀態
      const [userName, setUserName] = useState("");
      const [pin, setPin] = useState("");
      const [userRole, setUserRole] = useState('DRIVER');
      const [isNewUser, setIsNewUser] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);

      // 支援視窗狀態
      const [showSupport, setShowSupport] = useState(false);
      const [supportMessages, setSupportMessages] = useState([
        { role: 'office', text: '你好！有任何問題請告訴我們。', time: '系統' }
      ]);
      const scrollRef = useRef(null);

      // 系統資料
      const [reports, setReports] = useState([]);
      const [staffList, setStaffList] = useState([]);

      // 監聽 Firebase
      useEffect(() => {
        let unsubscribeAuth = () => {};

        const initFirebase = async () => {
          if (!window._firebaseAPI) return;
          const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window._firebaseAPI;

          unsubscribeAuth = onAuthStateChanged(auth, (u) => {
            setUser(u);
            setFirebaseReady(true);
          });

          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth init error:", error);
            setFirebaseReady(true);
          }
        };

        if (window._firebaseAPI) {
          initFirebase();
        } else {
          const handleFirebaseReady = () => initFirebase();
          window.addEventListener('firebase-ready', handleFirebaseReady);
          return () => {
            window.removeEventListener('firebase-ready', handleFirebaseReady);
            unsubscribeAuth();
          };
        }
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!firebaseReady || !user || userRole !== 'ACCOUNTANT' || step !== 'LOGGED_IN') return;
        const { db, collection, query, onSnapshot } = window._firebaseAPI;

        const unsubReports = onSnapshot(query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'daily_reports')), (snap) => {
          const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.timestamp - a.timestamp);
          setReports(data);
        }, (err) => console.error(err));

        const unsubStaff = onSnapshot(query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'users')), (snap) => {
          const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setStaffList(data);
        }, (err) => console.error(err));

        return () => { unsubReports(); unsubStaff(); };
      }, [firebaseReady, user, userRole, step]);

      useEffect(() => {
        if (showSupport && scrollRef.current) scrollRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [supportMessages, showSupport]);

      // 登入流程 (防堵名稱衝突與實作 PIN 雜湊)
      const handleNameSubmit = async (e) => {
        e.preventDefault();
        if (!userName.trim() || !firebaseReady || !user) return;
        setIsProcessing(true);
        try {
          const { db, getDoc, doc } = window._firebaseAPI;
          const userSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userName));
          
          if (userSnap.exists()) {
            setIsNewUser(false);
          } else {
            setIsNewUser(true);
            showToast('此名稱尚未註冊，請設定您的 PIN 碼', 'info');
          }
          setStep('PIN');
        } catch (err) {
          showToast('網路連線錯誤，請稍後再試', 'error');
        }
        setIsProcessing(false);
      };

      const handlePinSubmit = async (e) => {
        e.preventDefault();
        if (!pin || pin.length !== 4 || !firebaseReady || !user) return;
        setIsProcessing(true);
        try {
          const { db, getDoc, setDoc, doc } = window._firebaseAPI;
          const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', userName);
          const secureHashedPin = await hashString(pin); // 加密使用者的 PIN
          
          if (isNewUser) {
            // 新使用者：存入加密後的密碼
            await setDoc(userRef, { userName, pin: secureHashedPin, role: 'DRIVER', createdAt: Date.now() });
            setUserRole('DRIVER');
            setStep('LOGGED_IN');
            showToast('註冊成功並已登入', 'success');
          } else {
            // 既有使用者驗證
            const userData = (await getDoc(userRef)).data();
            // 相容檢查：舊明文密碼 or 新的雜湊密碼
            if (userData.pin === pin || userData.pin === secureHashedPin) {
              setUserRole(userData.role || 'DRIVER');
              setStep('LOGGED_IN');
            } else {
              showToast('口令錯誤，請重新輸入', 'error');
              setPin("");
            }
          }
        } catch (err) {
          showToast('系統錯誤，請稍後再試', 'error');
        }
        setIsProcessing(false);
      };

      if (!firebaseReady) {
        return <div className="min-h-screen bg-[#080c1a] flex items-center justify-center text-white"><Loader2 size={32} cls="animate-spin text-indigo-500" /></div>;
      }

      return (
        <>
          {/* 全域超有質感的 Toast 提示取代原生 alert */}
          {toast && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] animate-toast">
              <div className={`px-5 py-3 rounded-full shadow-2xl font-black text-sm text-white flex items-center gap-2 border border-white/20 ${toast.type === 'error' ? 'bg-gradient-to-r from-rose-600 to-rose-700 shadow-rose-900/50' : toast.type === 'success' ? 'bg-gradient-to-r from-emerald-600 to-emerald-700 shadow-emerald-900/50' : 'bg-gradient-to-r from-indigo-600 to-violet-600 shadow-indigo-900/50'}`}>
                {toast.type === 'error' ? <AlertCircle size={16} /> : toast.type === 'success' ? <CheckCircle2 size={16} /> : <Info size={16} />}
                {toast.msg}
              </div>
            </div>
          )}

          {/* 路由分發 */}
          {view === 'PORTAL' && <PortalView step={step} setStep={setStep} userName={userName} setUserName={setUserName} pin={pin} setPin={setPin} userRole={userRole} setUserRole={setUserRole} isNewUser={isNewUser} isProcessing={isProcessing} handleNameSubmit={handleNameSubmit} handlePinSubmit={handlePinSubmit} setView={setView} showToast={showToast} showSupport={showSupport} setShowSupport={setShowSupport} supportMessages={supportMessages} setSupportMessages={setSupportMessages} scrollRef={scrollRef} />}
          {view === 'DRIVER' && <DriverView setView={setView} userName={userName} showToast={showToast} />}
          {view === 'ACCOUNTANT' && <AccountantView setView={setView} reports={reports} userName={userName} showToast={showToast} />}
          {view === 'STAFF' && <StaffView setView={setView} staffList={staffList} showToast={showToast} />}
          {view === 'INTERVIEW' && <InterviewView setView={setView} userName={userName} showToast={showToast} />}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
