const processSecureImage = (userId, file, callback) => {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas'); const M = 1000;
      let w=img.width, h=img.height; if(w>M){ h=Math.round(h*M/w); w=M; }
      canvas.width=w; canvas.height=h; const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.04)"; ctx.lineWidth = 1;
      for(let x=0; x<w; x+=30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
      for(let y=0; y<h; y+=30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
      ctx.font = "bold 18px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; ctx.shadowColor = "black"; ctx.shadowBlur = 4;
      ctx.fillText(`[GGSOC AUTH] ${new Date().toLocaleString()} UID:${userId?.slice(-6) || 'NA'}`, 20, h - 30);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    }; img.src = e.target.result;
  }; reader.readAsDataURL(file);
};

const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const getPos = (e) => {
    if (!canvasRef.current) return { x: 0, y: 0 };
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  };
  useEffect(() => { if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } }, []);
  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden shadow-inner"><canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onMouseMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onMouseUp={()=>{setIsDrawing(false); if(canvasRef.current) onSign(canvasRef.current.toDataURL());}} onTouchStart={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onTouchMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onTouchEnd={()=>{setIsDrawing(false); if(canvasRef.current) onSign(canvasRef.current.toDataURL());}} /></div>
      <button onClick={()=>{const ctx=canvasRef.current.getContext('2d'); ctx.clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black uppercase tracking-widest">清除重簽</button>
    </div>
  );
};

           <div className="bg-black/50 p-5 rounded-2xl border border-white/5 shadow-inner font-black">

           <div className="flex items-center justify-center text-3xl text-amber-400 font-black">$<input type="number" placeholder="0" className="w-28 bg-transparent text-center outline-none border-b-4 border-amber-500/50 pb-1 ml-2 font-black" value={cod} onChange={e=>setCod(e.target.value)} /></div>

           </div>
        </div>
        
        {/* 🚨 修復了這裡的 JSX 結構，避免編譯報錯導致全黑屏 */}
        <div className="mb-6 flex gap-3 h-24 font-black">

        <button onClick={submit} disabled={isSubmitting} className="w-full py-5 rounded-[2rem] bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-xl shadow-xl active:scale-95 disabled:opacity-50 tracking-widest uppercase">{isSubmitting?'傳送中...':'確認並同步數據'}</button>

function AppWrapper() {
  const [u,setU]=useState(null); const [aR,setAR]=useState('guest'); const [ps,setPs]=useState([]); const [l,setL]=useState('gate'); const [ld,setLd]=useState(true); const [ann,setAnn]=useState(""); const [gs,setGs]=useState({systemLocked:false,accountantPin:"0172"}); const [spI,setSpI]=useState(null); const [isC,setIsC]=useState(false);
  const [sq,setSq]=useState(""); const [previewImg, setPreviewImg] = useState(null); const [showHistoryFor, setShowHistoryFor] = useState(null); const [chatTarget, setChatTarget] = useState(null); const [showLeave, setShowLeave] = useState(false);
  const [mT,setMT]=useState(null);
  
  const cp = useMemo(() => ps.find(p => p.id === spI), [ps, spI]);

  useEffect(()=>{
    const unA = onAuthStateChanged(auth, async (user)=>{ 
      if(user){ 
        setU(user); 
        const s = safeStorage.get('ggsoc_auth') || {}; 
        if(s.phone){ setAR(s.role); setSpI(`p_${s.phone}`); setL(s.role==='driver'?'driver':'admin'); } 
      } else signInAnonymously(auth).catch(()=>setLd(false)); 
      setTimeout(()=>setLd(false), 500);
    });
    return () => unA();
  },[]);

  useEffect(()=>{
    if(!u) return;
    const unP = onSnapshot(collection(db,'artifacts',appId,'public','data','partners'),(s)=>{
      const data = s.docs.map(d=>({id:d.id,...d.data()}));
      setPs(data); setIsC(true);
      if(data.length === 0 && u) {
         setDoc(doc(db,'artifacts',appId,'public','data','partners','p_0976017938'), { id:'p_0976017938', name:'管理員', phone:'0976017938', pin:'8305319', status:'approved', total_del:0, total_pkp:0, history:[] });
      }
    });
    const unAn = onSnapshot(doc(db,'artifacts',appId,'public','data','settings','announcement'),(sn)=>{if(sn.exists())setAnn(sn.data().content||"");});
    const unS = onSnapshot(doc(db,'artifacts',appId,'public','data','settings','global'),(s)=>{if(s.exists()){setGs(s.data()); if(s.data().systemLocked && safeStorage.get('ggsoc_auth')?.phone!=='0976017938'){ safeStorage.remove('ggsoc_auth'); setAR('guest'); setL('gate'); } }});
    return()=>{unP();unAn();unS();};
  },[u]);

  const handleLogin = (phone,pin,rem)=>{
    if(gs?.systemLocked && phone!=="0976017938") return showToast("🚫 伺服器鎖定中",true);
    if(phone==="0976017938"&&pin==="8305319"){ if(rem)safeStorage.set('ggsoc_auth',{phone,role:'super_admin'}); setAR('super_admin');setL('admin');setSpI(`p_${phone}`); }
    else if(phone==="0988128172"&&pin===(gs?.accountantPin||"0172")){ if(rem)safeStorage.set('ggsoc_auth',{phone,role:'admin'}); setAR('admin');setL('admin'); }
    else{
      const p=ps.find(x=>x.phone===phone&&x.pin===pin); 
      if(p){ if(p.status==='frozen') return showToast("🚫 帳號已凍結",true); if(rem)safeStorage.set('ggsoc_auth',{phone,role:'driver'}); setAR('driver');setSpI(p.id);setL('driver'); } 
      else showToast("⚠️ 帳號或密碼錯誤",true);
    }
  };

  if(ld) return <div className="loading-container"><div className="loader mb-4"></div><p className="text-blue-500 animate-pulse font-black">GGSOC 初始化引擎載入中...</p></div>;

  return (
    <div className="min-h-screen text-slate-200 font-black overflow-x-hidden">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none text-xl shadow-2xl transition-all duration-500 text-white font-black"></div>
      
      {showLeave && <LeaveModal partner={cp} isAdmin={aR!=='driver'} onClose={()=>setShowLeave(false)} />}
      {ann && l !== 'gate' && <div className="fixed top-0 left-0 w-full bg-blue-600/95 backdrop-blur-md z-[5000] py-2 border-b border-white/10 shadow-xl font-black"><div className="animate-marquee whitespace-nowrap text-white text-xs font-black"><Bell size={14}/> {ann}</div></div>}
      
      {l==='gate' ? <Gate onLogin={handleLogin} isConnected={isC} /> : null}
      {l==='admin' && <AdminHub authRole={aR} partners={ps} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} setModalType={setMT} setSelectedPartner={p=>setSpI(p.id)} sq={sq} setSq={setSq} setShowHistoryFor={setShowHistoryFor} db={db} appId={appId} globalSettings={gs} announcement={ann} setChatTarget={setChatTarget} setShowLeave={setShowLeave} setLayer={setL} />}
      {l==='driver' && <DriverHub user={u} currentPartner={cp} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} globalSettings={gs} authRole={aR} db={db} appId={appId} setChatTarget={setChatTarget} setShowLeave={setShowLeave} setLayer={setL} />}
      
      {mT==='tools' && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom font-black" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-md w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative font-black" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full font-black"><X size={20}/></button><h3 className="text-xl text-blue-400 mb-6 text-center italic uppercase font-black">管理中樞</h3><div className="space-y-6 font-black"><div className="bg-black/40 p-5 rounded-[2rem] border border-white/5 shadow-inner font-black"><p className="text-[11px] text-blue-400 mb-4 font-black italic uppercase text-center">● 跑馬燈公告</p><textarea placeholder="內容..." className="w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-white text-sm" rows="2" value={ann} onChange={async(e)=>await setDoc(doc(db,'artifacts',appId,'public','data','settings','announcement'),{content:e.target.value})} /><button onClick={async()=>await setDoc(doc(db,'artifacts',appId,'public','data','settings','announcement'),{content:""})} className="w-full py-2 bg-rose-900/40 text-rose-400 rounded-xl text-xs mt-2 font-black">撤下</button></div>{aR==='super_admin' && <button onClick={async()=>{if(window.confirm("徹底清除全體司機數據？")){ for(const p of ps){ if(p.phone!=='0976017938') await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id),{total_del:0,total_pkp:0,custom_adj:0,history:[],last_report:null,salary_status:'none'}); } showToast("✅數據全清零"); }}} className="w-full py-5 bg-rose-900/20 text-rose-500 rounded-[1.5rem] border border-rose-500/20 text-xs italic font-black">🛑 全局物理數據清空</button>}</div></div></div>}
      
      {mT==='detail' && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom font-black" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-2xl w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative font-black" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full font-black"><X size={20}/></button><h3 className="text-xl text-blue-400 mb-6 font-black italic">帳戶全覽：{ps.find(p=>p.id===spI)?.name}</h3><div className="grid grid-cols-2 gap-4 bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner font-black"><div className="col-span-2 font-black"><label className="text-[10px] text-slate-500 font-black">銀行帳戶</label><p className="text-emerald-400 text-sm font-black">({ps.find(p=>p.id===spI)?.p_bank_code || '---'}) {ps.find(p=>p.id===spI)?.p_bank_acc || '未填'}</p></div></div><div className="mt-6 flex gap-2 font-black"><button onClick={async()=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',spI),{status:ps.find(p=>p.id===spI)?.status==='frozen'?'approved':'frozen'})} className="flex-1 py-4 bg-slate-800 border border-white/10 rounded-xl text-xs font-black">{ps.find(p=>p.id===spI)?.status==='frozen'?'解凍':'凍結'}</button></div></div></div>}
    </div>
  );
}

try {
  const rootElement = document.getElementById('root');
  if (rootElement) createRoot(rootElement).render(<AppWrapper />);
} catch (err) { document.body.innerHTML = `<div style="color:red; padding: 20px; font-weight:bold;">渲染衝突核心錯誤: ${err.message}</div>`; }
  </script>
</body>
</html>
