<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金耀智慧營運總部 v36.0 終極整合版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .gold-border { border: 1px solid rgba(245, 158, 11, 0.3); box-shadow: 0 0 30px rgba(245, 158, 11, 0.05); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; outline: none; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: #f59e0b; color: #000; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; transition: all 0.2s; }
    .btn-prime:hover { background: #fbbf24; transform: translateY(-1px); }
    .ghost-input { background: transparent; border: none; outline: none; text-align: center; color: white; font-weight: bold; width: 100%; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th { padding: 12px; background: rgba(0,0,0,0.3); color: #94a3b8; font-size: 11px; text-transform: uppercase; }
    .admin-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }
    .chat-bubble { padding: 14px 18px; border-radius: 20px; max-width: 85%; margin-bottom: 12px; font-size: 14px; }
    .bubble-bot { background: #1e293b; color: #f1f5f9; align-self: flex-start; }
    .bubble-user { background: #f59e0b; color: #000; align-self: flex-end; margin-left: auto; font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const appId = 'supreme-v92';

    const CONFIG_2026 = {
      BRACKETS: [29500, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800],
      LABOR_RATE: 0.025, HEALTH_RATE: 0.0155
    };

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState('guest'); 
      const [partners, setPartners] = useState([]);
      const [layer, setLayer] = useState('gate'); 
      const [loading, setLoading] = useState(true);
      const [announcement, setAnnouncement] = useState("");
      const [toastMsg, setToastMsg] = useState("");

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 3000);
      };

      useEffect(() => {
        auth.signInAnonymously();
        const unsubPartners = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners')
          .onSnapshot(snap => {
            setPartners(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            setLoading(false);
          });
        const unsubAnn = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('announcement')
          .onSnapshot(snap => { if (snap.exists) setAnnouncement(snap.data().content); });
        return () => { unsubPartners(); unsubAnn(); };
      }, []);

      const handleLogin = (phone, pin) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          setRole('admin'); setLayer('admin'); return;
        }
        const p = partners.find(x => x.phone === phone && x.pin === pin);
        if (p) { setUser(p); setRole('driver'); setLayer('driver'); }
        else alert("資訊錯誤");
      };

      if (loading) return <div className="h-screen flex items-center justify-center text-amber-500 font-black">INITIALIZING...</div>;

      return (
        <div className="min-h-screen">
          <div className={`fixed top-10 left-1/2 -translate-x-1/2 bg-amber-500 text-black px-6 py-3 rounded-full font-bold z-[200] transition-all ${toastMsg ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
            {toastMsg}
          </div>

          {layer === 'gate' && <Gate onLogin={handleLogin} announcement={announcement} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={partners} onLogout={() => setLayer('gate')} db={db} appId={appId} showToast={showToast} config={CONFIG_2026} />}
          {layer === 'driver' && <DriverHub user={user} onLogout={() => setLayer('gate')} db={db} appId={appId} showToast={showToast} />}
          {layer === 'onboarding' && <Onboarding setLayer={setLayer} db={db} appId={appId} />}
          {layer === 'docs' && <DocUpload setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
        </div>
      );
    }

    // --- 1. Gate (入口) ---
    function Gate({ onLogin, announcement, setLayer }) {
      const [ph, setPh] = useState("");
      const [pin, setPin] = useState("");
      return (
        <div className="h-screen flex flex-col items-center justify-center p-6">
          <div className="text-center mb-10">
            <h1 className="text-5xl font-black italic tracking-tighter mb-2">在地物流</h1>
            <span className="text-[10px] text-amber-500 border border-amber-500/30 px-3 py-1 rounded-full uppercase">Ops v36.0</span>
          </div>
          <div className="w-full max-w-[340px] space-y-4">
            <div className="glass-panel p-8 rounded-[2rem] gold-border">
              <input type="tel" placeholder="手機" className="input-box mb-3" onChange={e => setPh(e.target.value)} />
              <input type="password" placeholder="PIN" className="input-box mb-6" onChange={e => setPin(e.target.value)} />
              <button onClick={() => onLogin(ph, pin)} className="btn-prime">進入系統</button>
            </div>
            <div className="flex flex-col gap-2">
              <button onClick={() => setLayer('onboarding')} className="text-xs text-slate-500 py-2">🚚 報到程序確認</button>
              <button onClick={() => setLayer('docs')} className="text-xs text-slate-500 py-2">📁 證件資料建檔</button>
            </div>
          </div>
        </div>
      );
    }

    // --- 2. AdminHub (指揮中心 + 歷史功能) ---
    function AdminHub({ partners, onLogout, db, appId, showToast, config }) {
      const [search, setSearch] = useState("");
      const [history, setHistory] = useState(null);

      const calc = (p) => (p.total_del * (p.custom_del_price || 15)) + (p.total_pkp * (p.custom_pkp_price || 10)) + (p.custom_adj || 0) - (p.labor_fee || 0) - (p.health_fee || 0);

      const viewHistory = async (p) => {
        const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).collection('history').orderBy('date', 'desc').limit(31).get();
        setHistory({ name: p.name, data: snap.docs.map(d => d.data()) });
      };

      const handleUpdate = async (id, field, val) => {
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(id).update({ [field]: Number(val) });
      };

      return (
        <div className="p-4 lg:p-12 max-w-[1400px] mx-auto">
          <div className="flex justify-between items-center mb-10">
            <h2 className="text-3xl font-black italic">數據總部</h2>
            <button onClick={onLogout} className="text-rose-500 font-bold">登出</button>
          </div>
          
          <div className="glass-panel rounded-3xl overflow-hidden overflow-x-auto">
            <table className="admin-table">
              <thead>
                <tr>
                  <th className="text-left">夥伴</th>
                  <th>配送/逆收</th>
                  <th>正件價</th>
                  <th>逆收價</th>
                  <th>扣除額</th>
                  <th>實領預估</th>
                  <th>功能</th>
                </tr>
              </thead>
              <tbody>
                {partners.map(p => (
                  <tr key={p.id}>
                    <td className="text-left font-bold">{p.name}<br/><span className="text-[10px] text-slate-500">{p.phone}</span></td>
                    <td className="text-sky-400 font-mono">{p.total_del || 0} / {p.total_pkp || 0}</td>
                    <td><input type="number" defaultValue={p.custom_del_price || 15} onBlur={e => handleUpdate(p.id, 'custom_del_price', e.target.value)} className="ghost-input" /></td>
                    <td><input type="number" defaultValue={p.custom_pkp_price || 10} onBlur={e => handleUpdate(p.id, 'custom_pkp_price', e.target.value)} className="ghost-input" /></td>
                    <td className="text-rose-400 font-bold">-${(p.labor_fee || 0) + (p.health_fee || 0)}</td>
                    <td className="text-amber-500 font-black text-xl">${calc(p).toLocaleString()}</td>
                    <td><button onClick={() => viewHistory(p)} className="bg-slate-800 px-3 py-1 rounded text-xs">📜 歷史</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {history && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[300] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-xl rounded-[2rem] p-6 max-h-[80vh] overflow-y-auto gold-border">
                <div className="flex justify-between mb-6">
                  <h3 className="font-black text-xl">{history.name} 歷史誌</h3>
                  <button onClick={() => setHistory(null)}>關閉</button>
                </div>
                {history.data.map((r, i) => (
                  <div key={i} className="flex justify-between border-b border-white/5 py-3 text-sm">
                    <span className="font-mono text-slate-400">{r.date}</span>
                    <span className="font-bold">配{r.del} / 逆{r.pkp}</span>
                    <span className="text-amber-500 font-black">${(r.del * r.del_price + r.pkp * r.pkp_price).toLocaleString()}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- 3. DriverHub (夥伴工作台 + 歷史寫入) ---
    function DriverHub({ user, onLogout, db, appId, showToast }) {
      const [del, setDel] = useState("");
      const [pkp, setPkp] = useState("");
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        if(!del || !pkp) return showToast("⚠️ 請填寫數量");
        setLoading(true);
        const today = new Date().toLocaleDateString('en-CA');
        const batch = db.batch();
        const pRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(user.id);
        const hRef = pRef.collection('history').doc(today);

        batch.update(pRef, { total_del: Number(del), total_pkp: Number(pkp), last_report: today });
        batch.set(hRef, { 
          date: today, del: Number(del), pkp: Number(pkp), 
          del_price: user.custom_del_price || 15, pkp_price: user.custom_pkp_price || 10,
          ts: firebase.firestore.FieldValue.serverTimestamp() 
        });

        await batch.commit();
        setLoading(false);
        showToast("🚀 數據已永久存檔");
      };

      return (
        <div className="h-screen flex items-center justify-center p-6">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[380px] text-center gold-border">
            <h2 className="text-2xl font-black mb-8">{user?.name} 作業回報</h2>
            <div className="space-y-4 mb-8">
              <input type="number" placeholder="今日配送總數" className="input-box text-center text-2xl" onChange={e=>setDel(e.target.value)} />
              <input type="number" placeholder="今日逆收總數" className="input-box text-center text-2xl" onChange={e=>setPkp(e.target.value)} />
            </div>
            <button onClick={submit} className="btn-prime mb-4" disabled={loading}>{loading ? '提交中...' : '提交當日數據'}</button>
            <button onClick={onLogout} className="text-xs text-slate-500">登出</button>
          </div>
        </div>
      );
    }

    // --- Onboarding & DocUpload (保持簡化版) ---
    function Onboarding({ setLayer, db, appId }) {
      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const handleNext = async () => {
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(`p_${phone}`).set({
          id: `p_${phone}`, name, phone, pin: "0000", total_del: 0, total_pkp: 0, custom_del_price: 15, custom_pkp_price: 10
        }, { merge: true });
        setLayer('gate');
      };
      return (
        <div className="h-screen flex items-center justify-center p-6">
          <div className="glass-panel p-8 rounded-[2rem] w-full max-w-[340px]">
            <h2 className="mb-6 font-bold">作業規範確認</h2>
            <input className="input-box mb-3" placeholder="姓名" onChange={e=>setName(e.target.value)} />
            <input className="input-box mb-6" placeholder="手機" onChange={e=>setPhone(e.target.value)} />
            <button onClick={handleNext} className="btn-prime">確認並存檔</button>
          </div>
        </div>
      );
    }

    function DocUpload({ setLayer, showToast }) {
      return (
        <div className="h-screen flex items-center justify-center p-6">
          <div className="glass-panel p-8 rounded-[2rem] text-center">
            <h2 className="mb-4">證件上傳通道</h2>
            <div className="w-48 h-48 border-2 border-dashed border-slate-700 rounded-2xl mx-auto flex items-center justify-center text-xs text-slate-500 mb-6">點擊選取相片</div>
            <button onClick={()=>{showToast("✅ 已提交"); setLayer('gate');}} className="btn-prime">送出審核</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
