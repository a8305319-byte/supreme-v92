<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPREME 旗艦經營中控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%); border-radius: 1.5rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; border-radius: 0.8rem; padding: 12px; width: 100%; color: white; outline: none; margin-bottom: 10px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 16px; border-radius: 1rem; background: #0ea5e9; color: #020617; font-weight: 900; font-size: 16px; cursor: pointer; border: none; }
        .btn-prime:active { opacity: 0.8; transform: scale(0.98); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; padding: 20px; overflow-y: auto; }
        .remember-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; width: 100%; justify-content: start; padding-left: 5px; }
        .remember-wrap input { width: 18px; height: 18px; accent-color: #0ea5e9; }
        .remember-wrap label { font-size: 14px; color: #64748b; cursor: pointer; }
        /* 薪資條模板 */
        #slip-box { position: absolute; left: -9999px; background: white; color: black; padding: 40px; width: 400px; }
        .photo-wall { display: grid; grid-template-cols: repeat(3, 1fr); gap: 5px; width: 100%; margin-bottom: 20px; }
        .photo-item { aspect-ratio: 1; background: #0f172a; border-radius: 6px; overflow: hidden; border: 1px solid #1e293b; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-black text-white italic mb-2 tracking-tighter">SUPREME</h1>
        <p class="text-sky-500 text-xs font-bold tracking-[0.3em] mb-12 uppercase">V92 Enterprise Solution</p>
        <div class="w-full max-w-[320px]">
            <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center w-full">
            <input type="password" id="login_pin" placeholder="PIN 碼" class="input-box text-center w-full">
            
            <div class="remember-wrap">
                <input type="checkbox" id="remember_me">
                <label for="remember_me">記住帳號密碼 (加密儲存)</label>
            </div>

            <button onclick="boot()" class="btn-prime w-full">確認登入系統</button>
            <button onclick="showApply()" class="text-xs text-slate-700 underline mt-10 block mx-auto uppercase tracking-widest">Partner Application / 夥伴入職</button>
        </div>
    </div>

    <div id="main" class="layer">
        <div id="render-target" class="w-full flex flex-col items-center"></div>
        <button onclick="location.reload()" class="mt-8 mb-10 text-slate-700 font-bold text-xs underline uppercase">Logout / 登出</button>
    </div>

    <div id="detail-modal" class="modal">
        <div class="id-card mx-auto mt-10" id="detail-content"></div>
        <button onclick="document.getElementById('detail-modal').style.display='none'" class="btn-prime bg-slate-800 text-white mt-4 max-w-[500px] mx-auto block">關閉視窗</button>
    </div>

    <div id="slip-box">
        <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px;">
            <h2 style="margin:0; font-size: 22px;">SUPREME 夥伴酬勞明細單</h2>
            <p id="slip-date" style="margin:5px 0; font-size:12px; color:#666;"></p>
        </div>
        <div id="slip-body" style="font-size:14px; line-height: 2;"></div>
        <div id="slip-total-row" style="margin-top:20px; border-top:2px solid #000; padding-top:10px; font-size:18px; font-weight:bold; display:flex; justify-content:space-between;">
            <span>本月實領金額</span><span id="slip-total-val"></span>
        </div>
        <p style="text-align:center; font-size:10px; color:#999; margin-top:30px;">本報表由 SUPREME V92 系統自動結算</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, onSnapshot, addDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [];
        let taskLogs = [];
        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); });
        onSnapshot(collection(db, 'logs'), s => { taskLogs = s.docs.map(d => ({id: d.id, ...d.data()})); });

        // 初始化「記住我」檢查
        window.addEventListener('DOMContentLoaded', () => {
            const sp = localStorage.getItem('s_phone'), si = localStorage.getItem('s_pin');
            if(sp && si) {
                document.getElementById('login_phone').value = sp;
                document.getElementById('login_pin').value = atob(si);
                document.getElementById('remember_me').checked = true;
            }
        });

        window.boot = () => {
            const phone = document.getElementById('login_phone').value, pin = document.getElementById('login_pin').value;
            const remember = document.getElementById('remember_me').checked;

            if(remember) {
                localStorage.setItem('s_phone', phone);
                localStorage.setItem('s_pin', btoa(pin));
            } else {
                localStorage.removeItem('s_phone');
                localStorage.removeItem('s_pin');
            }

            if(phone === "0976017938" && pin === "0531") return renderAdmin();
            const p = partners.find(x => x.phone === phone && x.uid === pin && x.status === "approved");
            if(p) return renderPartnerUI(p);
            alert("登入失敗：請檢查資料或等待審核");
        };

        // 老闆管理端
        function renderAdmin() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            const approved = partners.filter(x => x.status === "approved");
            const totalDel = approved.reduce((s, p) => s + (p.total_del || 0), 0);
            
            let html = `<div class="w-full max-w-[500px]"><h2 class="text-white font-black text-2xl mb-8">旗艦經營中控台</h2>`;
            
            // 看板數據
            html += `<div class="grid grid-cols-2 gap-3 mb-8">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500 uppercase">Total Items / 總件數</p><p class="text-2xl font-black text-sky-400">${totalDel}</p></div>
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800"><p class="text-[10px] text-slate-500 uppercase">Active Partners / 夥伴數</p><p class="text-2xl font-black text-white">${approved.length}</p></div>
            </div>`;

            // 照片牆 (最近回報)
            html += `<p class="text-sky-500 font-bold text-[10px] mb-3 uppercase tracking-widest">Recent Tasks / 任務查核牆</p>`;
            html += `<div class="photo-wall">${taskLogs.slice(-9).reverse().map(l => `<div class="photo-item"><img src="${l.photo}" class="w-full h-full object-cover" onclick="window.open(this.src)"></div>`).join('')}</div>`;

            // 功能按鈕
            html += `<div class="flex gap-2 mb-10">
                <button onclick="window.monthlyReset()" class="flex-1 bg-red-900/20 text-red-500 border border-red-900/50 py-3 rounded-xl text-[10px] font-bold">月底數據結算歸零</button>
                <button onclick="window.exportCSV()" class="flex-1 bg-sky-900/20 text-sky-500 border border-sky-900/50 py-3 rounded-xl text-[10px] font-bold">匯出財務報表</button>
            </div>`;

            // 夥伴列表
            html += approved.map(p => {
                const bonus = p.bonus || 0, penalty = p.penalty || 0;
                const pay = (p.total_del * (p.rate_del || 50)) + (p.total_ret * (p.rate_ret || 20)) - (p.labor || 1500) - ((p.h_cnt || 1) * (p.health || 800)) + bonus - penalty;
                return `
                <div class="id-card !p-5 !bg-slate-900/40 border-slate-800 mb-4">
                    <div class="flex justify-between items-start mb-4">
                        <div onclick="window.showPartnerDetail('${p.id}')" class="cursor-pointer">
                            <p class="text-white font-bold">${p.name} <span class="v-badge">${p.v_type}</span></p>
                            <p class="text-[10px] text-slate-600 underline">查看完整人事證件</p>
                        </div>
                        <div class="text-right">
                            <p class="text-green-400 font-black text-xl">$${pay.toLocaleString()}</p>
                            <button onclick='window.downloadSlip(${JSON.stringify(p)})' class="text-[9px] text-sky-500 underline">製作薪資條</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input id="bo_${p.id}" type="number" placeholder="加給" value="${bonus}" class="input-box !py-1 !text-xs !mb-0">
                        <input id="pe_${p.id}" type="number" placeholder="扣款" value="${penalty}" class="input-box !py-1 !text-xs !mb-0">
                    </div>
                    <button onclick="window.updateFinance('${p.id}')" class="w-full bg-slate-800 text-sky-500 py-1 rounded mt-2 text-[10px] font-bold">更新本月獎懲</button>
                </div>`;
            }).join('');
            
            document.getElementById('render-target').innerHTML = html + `</div>`;
        }

        // 薪資條下載功能
        window.downloadSlip = async (p) => {
            const r_del = p.rate_del || 50, r_ret = p.rate_ret || 20, lab = p.labor || 1500, hea = (p.h_cnt || 1) * (p.health || 800);
            const bonus = p.bonus || 0, penalty = p.penalty || 0;
            const total = (p.total_del * r_del) + (p.total_ret * r_ret) - lab - hea + bonus - penalty;

            document.getElementById('slip-date').innerText = "結算期間：" + new Date().toLocaleDateString();
            document.getElementById('slip-body').innerHTML = `
                <div class="slip-row"><span>夥伴姓名</span><b>${p.name}</b></div>
                <div class="slip-row"><span>配送件數報酬</span><span>$${(p.total_del * r_del).toLocaleString()} (${p.total_del}件)</span></div>
                <div class="slip-row"><span>逆物流報酬</span><span>$${(p.total_ret * r_ret).toLocaleString()} (${p.total_ret}件)</span></div>
                <div class="slip-row"><span>本月獎金/加給</span><span>+$${bonus.toLocaleString()}</span></div>
                <div class="slip-row" style="color:red"><span>勞保費扣款</span><span>-$${lab.toLocaleString()}</span></div>
                <div class="slip-row" style="color:red"><span>健保費扣款</span><span>-$${hea.toLocaleString()}</span></div>
                <div class="slip-row" style="color:red"><span>其他扣款/處分</span><span>-$${penalty.toLocaleString()}</span></div>
            `;
            document.getElementById('slip-total-val').innerText = "$" + total.toLocaleString();

            const box = document.getElementById('slip-box');
            box.style.left = "0";
            const canvas = await html2canvas(box, { scale: 2 });
            box.style.left = "-9999px";
            const link = document.createElement('a');
            link.download = `SUPREME薪資條_${p.name}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        // 其他功能函式 (與旗艦版相同)
        window.showApply = () => document.getElementById('apply-page').style.display = 'flex'; // 申請頁面
        window.updateFinance = async (id) => {
            const bo = parseInt(document.getElementById('bo_'+id).value) || 0;
            const pe = parseInt(document.getElementById('pe_'+id).value) || 0;
            await updateDoc(doc(db, 'partners', id), { bonus: bo, penalty: pe });
            alert("調整已存檔");
        };
        window.monthlyReset = async () => {
            if(!confirm("確定要將所有件數歸零嗎？")) return;
            for(let p of partners) { await updateDoc(doc(db, 'partners', p.id), { total_del: 0, total_ret: 0, bonus: 0, penalty: 0 }); }
            alert("結算歸零成功");
        };
    </script>
</body>
</html>
