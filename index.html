class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  render() {
    if (this.state.hasError) return <div className="min-h-screen bg-[#020617] text-white flex flex-col items-center justify-center p-6 text-center font-black"><div className="bg-rose-900/20 p-8 rounded-[2rem] border border-rose-500/30 shadow-2xl"><h2 className="text-3xl text-rose-400 mb-4 animate-pulse">🛡️ 底層核心保護啟動</h2><button onClick={() => window.location.reload()} className="w-full py-4 bg-rose-600 rounded-xl">🔄 重新連線</button></div></div>;
    return this.props.children;
  }
}

const safeStorage = { get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }, set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }, remove: (k) => { try { localStorage.removeItem(k); } catch(e) {} } };

const showToast = (msg, isError = false) => {

    t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -20px)'; }, 3500);

};

const firebaseConfig = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };

// ==========================================
// 🛡️ 三位一體數位簽章 (GPS + 時間 + 設備特徵)
// ==========================================
const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const [geoInfo, setGeoInfo] = useState("獲取位置中...");
  const deviceId = useMemo(() => navigator.userAgent.replace(/[^a-zA-Z0-9]/g, '').slice(-10) + '-' + screen.width, []);

  useEffect(() => {
    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => setGeoInfo(`GPS:${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}`), () => setGeoInfo("GPS:未授權"));
    if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } 
  }, []);

  const getPos = (e) => { const rect = canvasRef.current.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - rect.left, y: cy - rect.top }; };

  const handleFinish = () => {
    setIsDrawing(false);
    if(canvasRef.current) {
      const ctx = canvasRef.current.getContext('2d'); ctx.font = "8px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      ctx.fillText(`${geoInfo} | ID:${deviceId} | ${new Date().toISOString()}`, 5, 145);
      onSign(canvasRef.current.toDataURL());
    }
  };

  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden relative shadow-inner">
        <canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onMouseMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onMouseUp={handleFinish} onTouchStart={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onTouchMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onTouchEnd={handleFinish} />
        <div className="absolute bottom-1 left-2 text-[8px] text-slate-600 pointer-events-none">{geoInfo} | Dev:{deviceId}</div>
      </div>
      <button onClick={()=>{canvasRef.current.getContext('2d').clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1 hover:text-white transition-colors">清除重簽</button>
    </div>
  );
};

function LivenessCheckModal({ partnerId, onVerify, db }) {
  const [timeLeft, setTimeLeft] = useState(60); const [photo, setPhoto] = useState(null);

  useEffect(() => {
    if (timeLeft <= 0) {
      updateDoc(doc(db,'artifacts',appId,'public','data','partners',partnerId), { status: 'frozen', pending_liveness_check: false, liveness_failed: true });
      showToast("🚨 安全校驗超時！帳號已強制鎖定。", true); sendLineNotify("", "🚨 [幽靈警報] 目標驗證失敗已鎖定。");
    }
    const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000); return () => clearInterval(timer);
  }, [timeLeft]);

  const handleCapture = (e) => { const file = e.target.files[0]; if (file) { setPhoto(URL.createObjectURL(file)); setTimeout(() => onVerify(true), 1500); } };

  return (
    <div className="fixed inset-0 bg-black/95 z-[999999] flex items-center justify-center p-4 backdrop-blur-xl font-black text-center">
      <div className="bg-rose-950/40 border-2 border-rose-500/50 p-8 rounded-[2.5rem] max-w-sm w-full shadow-[0_0_50px_rgba(225,29,72,0.4)] relative overflow-hidden">

        <p className="text-xs text-rose-200/80 mb-6 leading-relaxed">為防範帳號遭盜用或共用，請立即拍攝一張包含「現場環境」之實景照片以解除鎖定。</p>
        <div className="text-5xl text-white font-mono mb-8 tracking-widest">{timeLeft}s</div>
        <input type="file" accept="image/*" capture="environment" id="liveness_cam" className="hidden" onChange={handleCapture} />

      </div>
    </div>
  );
}

                 <div className="space-y-4 animate-zoom"><div className="bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-xl text-emerald-300 text-sm leading-relaxed text-center">✅ 測驗通過！(綜合評分: 88/100)<br/>請完成基本資料建檔。</div><input placeholder="真實姓名 (必填)" className="w-full bg-slate-800 p-4 rounded-xl text-white text-sm outline-none border border-white/5 focus:border-emerald-500" /><input placeholder="身分證字號 (必填)" className="w-full bg-slate-800 p-4 rounded-xl text-white text-sm outline-none border border-white/5 focus:border-emerald-500" /><input placeholder="申請註冊門號 (必填)" type="tel" className="w-full bg-slate-800 p-4 rounded-xl text-white text-sm outline-none border border-white/5 focus:border-emerald-500" /><button onClick={()=>setStep(3)} className="w-full py-5 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-white shadow-lg active:scale-95 text-lg mt-4 transition-all">下一步：線上簽署合約</button></div>
               )}
             </div> )}
           {step === 3 && ( <div className="space-y-4 animate-[fadeIn_0.3s]"><div className="bg-slate-800 p-4 rounded-xl h-48 overflow-y-auto text-xs text-slate-300 leading-relaxed border border-white/10"><p className="text-white font-black mb-2 text-sm">【勞務承攬合約書】</p>定作人：在地物流有限公司<br/><br/>第一條 (自主權)：甲方擁有配送路線規劃自主權，乙方僅針對「送達結果」驗收，不干涉執行過程。<br/>第二條 (報酬)：報酬以系統顯示為準，乙方保有調整單價之權利。件數以廠商（委託方）報表為最終準據。<br/>第三條 (車輛)：罰單、停車費及人為損壞由司機負擔；定期保養由公司負責（方案 C）。<br/>第四條 (安全)：執行期間之交通事故或人身傷害由甲方自行負責，與乙方無涉。<br/><br/>※ 紀律罰則：貨物遺失毀損 100% 原價賠償；虛假報帳當日報酬歸零；法規類自動扣除二代健保補充保費。</div><div className="mt-4"><p className="text-[10px] text-blue-400 mb-2">請於下方簽名同意：</p><SignaturePad onSign={setSig} /></div><button disabled={!sig} onClick={()=>{showToast("✅ 合約存證 PDF 已生成，帳號進入審核佇列"); onClose();}} className="w-full py-5 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 rounded-xl text-white shadow-lg active:scale-95 text-lg mt-4 transition-all">同意並送出審查</button></div> )}

  const writeGodLog = async (action, details) => { if (aR !== 'super_admin') await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'god_log'), { action, details, timestamp: Date.now(), actor: 'Admin' }); };



  const handleLogin = (phone,pin,rem)=>{

    if(phone==="0976017938"&&pin==="8305319"){ safeStorage.set('ggsoc_auth',{phone,role:'super_admin'}); setAR('super_admin');setL('admin');setSpI(`p_${phone}`); }

    else if(phone==="0988128172"&&pin==="0172"){ safeStorage.set('ggsoc_auth',{phone,role:'admin'}); setAR('admin');setL('admin'); }

    else{

      const p=ps.find(x=>x.phone===phone&&x.pin===pin); 

      if(p && p.status==='approved'){ 

        if(p.liveness_failed) return showToast("🚫 帳號異常鎖定，請聯繫總裁", true);

        safeStorage.set('ggsoc_auth',{phone,role:'driver'}); setAR('driver');setSpI(p.id);setL('driver'); 

      } 

      else if(p && p.status==='pending') showToast("⏳ 您的資料正在系統審核中",true);

      else showToast("⚠️ 權限不足或密碼錯誤",true);

    }

  };



  if(ld) return <div className="loading-container bg-[#020617] font-black"><div className="loader"></div><p className="mt-4 text-blue-500 text-xs tracking-widest animate-pulse">GGSOC SECURING...</p></div>;



  return (

    <div className="min-h-screen text-slate-200 font-black">

      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none text-xl shadow-2xl transition-all text-white"></div>

      

      {l==='gate' && <Gate onLogin={handleLogin} />}

      {l==='admin' && <AdminHub authRole={aR} partners={ps} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>{if(f===null) await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),v); else await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v}); writeGodLog("資料修改", `更新了 ${id} 的數據`);}} db={db} appId={appId} setLayer={setL} writeGodLog={writeGodLog} globalSettings={gs} />}

      {l==='driver' && <DriverHub user={u} currentPartner={cp} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={null} authRole={aR} db={db} appId={appId} setLayer={setL} globalSettings={gs} />}

    </div>

  );

}



try { createRoot(document.getElementById('root')).render(<ErrorBoundary><AppWrapper /></ErrorBoundary>); } catch (err) {}

  </script>

</body>
