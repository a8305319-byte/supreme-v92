class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { console.error("【防禦系統攔截】:", error, errorInfo); }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen bg-[#020617] text-white flex flex-col items-center justify-center p-6 text-center font-black">
          <div className="bg-rose-900/20 border border-rose-500/30 p-8 rounded-[2rem] shadow-2xl max-w-lg w-full">
            <h2 className="text-3xl text-rose-400 mb-4 animate-pulse italic">🛡️ 系統核心防護啟動</h2>

            <div className="bg-black/50 p-4 rounded-xl text-left text-[11px] text-rose-300 overflow-auto max-h-40 mb-6 font-mono border border-white/5">
               {this.state.error?.toString()}
            </div>
            <button onClick={() => window.location.reload()} className="w-full py-4 bg-rose-600 hover:bg-rose-500 transition-all text-white rounded-xl shadow-lg active:scale-95 text-lg tracking-widest">🔄 重新安全連線</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const processSecureImage = (userId, file, callback) => {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas'); const M = 1000;
      let w=img.width, h=img.height; if(w>M){ h=Math.round(h*M/w); w=M; }
      canvas.width=w; canvas.height=h; const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.04)"; ctx.lineWidth = 1;
      for(let x=0; x<w; x+=30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
      for(let y=0; y<h; y+=30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
      ctx.font = "bold 18px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; ctx.shadowColor = "black"; ctx.shadowBlur = 4;
      ctx.fillText(`[GGSOC AUTH] ${new Date().toLocaleString()} UID:${userId?.slice(-6) || 'NA'}`, 20, h - 30);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    }; img.src = e.target.result;
  }; reader.readAsDataURL(file);
};

// 簽名板
const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const getPos = (e) => {
    if (!canvasRef.current) return { x: 0, y: 0 };
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  };
  useEffect(() => { if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } }, []);
  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden shadow-inner"><canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onMouseMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onMouseUp={()=>{setIsDrawing(false); if(canvasRef.current) onSign(canvasRef.current.toDataURL());}} onTouchStart={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onTouchMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onTouchEnd={()=>{setIsDrawing(false); if(canvasRef.current) onSign(canvasRef.current.toDataURL());}} /></div>
      <button onClick={()=>{const ctx=canvasRef.current.getContext('2d'); ctx.clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1 hover:text-white">清除重簽</button>
    </div>
  );
};

  const [msgs, setMsgs] = useState([{ id: 1, sender: 'ai', text: '您好！有任何報帳或異常問題請在此提出。※ 系統提醒：薪資結算最終以廠商提供之統計報表為準，個人回報僅供核對參考。' }]);
  const handleSend = () => {
    if(!input.trim()) return;
    setMsgs(prev => [...prev, { id: Date.now(), sender: 'me', text: input }]);
    setInput("");
    setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: '總部已記錄您的反饋。若是查詢核薪數據，我們一律以廠商月底報表為最終依據。' }]); }, 1000);
  };
  return (
    <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom" onClick={onClose}>
       <div className="bg-slate-900 border border-blue-500/30 w-full max-w-md h-[80vh] rounded-[2.5rem] flex flex-col overflow-hidden shadow-2xl relative font-black" onClick={e=>e.stopPropagation()}>
         <div className="p-4 bg-slate-800 flex justify-between items-center border-b border-white/10 z-10">
           <div className="flex items-center gap-2"><Support size={24} className="text-blue-400"/> <h3 className="text-white italic">客服中心 - {target?.name||'總部'}</h3></div>
           <button onClick={onClose} className="p-2 bg-slate-700 rounded-full text-white active:scale-90"><X size={16}/></button>
         </div>
         <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar bg-[#020617]">{msgs.map(m => (<div key={m.id} className={`flex ${m.sender==='me'?'justify-end':'justify-start'} animate-[fadeInUp_0.3s_ease-out]`}><div className={`p-3 rounded-2xl text-sm max-w-[85%] leading-relaxed shadow-lg ${m.sender==='me'?'bg-blue-600 text-white rounded-tr-none shadow-blue-500/20':'bg-slate-800 text-slate-200 rounded-tl-none border border-white/5'}`}>{m.text}</div></div>))}</div>
         <div className="p-4 bg-slate-800 border-t border-white/10 flex gap-2"><input className="flex-1 bg-slate-900 border border-white/5 rounded-xl px-4 py-3 outline-none text-white text-sm focus:border-blue-500 transition-colors" placeholder="輸入訊息..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} /><button onClick={handleSend} className="bg-blue-600 px-5 py-3 rounded-xl text-white active:scale-95 shadow-lg"><Send size={20}/></button></div>
       </div>
    </div>
  )
}

function DriverHub({ user, currentPartner, onLogout, updateField, globalSettings, authRole, db, appId, setChatTarget, setShowLeave, setLayer }) {
  const [del,setDel]=useState(""); const [pkp,setPkp]=useState(""); const [cod,setCod]=useState(""); 
  const [pData,setPData]=useState(null); const [sData,setSData]=useState(null); 
  const [isSubmitting, setIsSubmitting]=useState(false); const [showProfile, setShowProfile] = useState(false); const [showSalaryConfirm, setShowSalaryConfirm] = useState(false);
  const [isOcrScanning, setIsOcrScanning] = useState(false);
  
  const p_net = useMemo(() => {
    if(!currentPartner) return 0;
    return (currentPartner.total_del*(currentPartner.custom_del_price||15))+(currentPartner.total_pkp*(currentPartner.custom_pkp_price||10))+(currentPartner.custom_adj||0)-(currentPartner.labor_fee||0)-(currentPartner.health_fee||0);
  }, [currentPartner]);

  const submit=async ()=>{ 
    if(globalSettings?.systemLocked&&authRole!=='super_admin') return showToast("⚠️ 伺服器鎖定中",true); 
    const nd=parseInt(del,10)||0, np=parseInt(pkp,10)||0, nc=parseInt(cod,10)||0;
    if(!pData||!sData) return showToast("⚠️ 影像與簽章為必填",true);
    if(!window.confirm(`確認今日數據？\n📦 配送：${nd} | 逆收：${np} | COD：$${nc}`)) return;
    setIsSubmitting(true);
    try {
      const h = { date: new Date().toLocaleDateString('zh-TW'), time: new Date().toLocaleTimeString('zh-TW',{hour12:false}), del:nd, pkp:np, cod:nc };
      const nextH = [...(currentPartner?.history||[]), h].slice(-31);
      await updateField(currentPartner.id,'total_del',(currentPartner.total_del||0)+nd); 
      await updateField(currentPartner.id,'total_pkp',(currentPartner.total_pkp||0)+np); 
      await updateField(currentPartner.id,'history', nextH); 
      await updateField(currentPartner.id,'last_report',{date:new Date().toLocaleDateString('en-CA'),photo:pData,signature:sData,cod_amount:nc}); 
      setDel("");setPkp("");setCod("");setPData(null);setSData(null); showToast("✅ 數據加密傳送成功"); 
    } catch (e) { showToast("❌ 傳送失敗", true); }
    setIsSubmitting(false);
  };

  if(!currentPartner) return <div className="loading-container bg-[#020617] font-black"><div className="loader mb-4"></div><p className="text-blue-500 animate-pulse">GGSOC 數據連線中...</p></div>;

  return (
    <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-start p-4 pb-24 font-black animate-[fadeIn_0.5s_ease-out]">
      <div className="w-full max-w-[500px] mb-6 flex justify-between items-end">
        <div className="flex flex-col">
           {authRole==='super_admin' && <button onClick={()=>setLayer('admin')} className="bg-amber-500/20 text-amber-500 border border-amber-500/30 px-4 py-1 rounded-full text-[10px] w-fit mb-3 active:scale-95 animate-pulse transition-all hover:bg-amber-500/40">🏛️ 返回總部</button>}
           <h2 className="text-3xl text-white italic tracking-tighter uppercase mb-1">在地物流</h2>
           <p className="text-blue-400 text-[11px] tracking-widest">{currentPartner.name} 專屬報帳台</p>
        </div>
        <div className="flex gap-2">

           <button onClick={()=>setShowLeave(true)} className="bg-indigo-600 text-white p-3 rounded-2xl active:scale-95 shadow-xl hover:bg-indigo-500 transition-colors"><Calendar size={18} /></button>

      {currentPartner.salary_status === 'pending_sign' && (

        </div>

      <div className="w-full max-w-[500px] grid grid-cols-2 gap-3 mb-6 animate-[fadeInUp_0.3s_ease-out]">

         <div className="bg-slate-900/80 border border-white/10 p-5 rounded-[2rem] text-center flex flex-col items-center justify-center shadow-2xl"><p className="text-[10px] text-slate-500 uppercase mb-2 tracking-widest">預覽實領</p><p className="text-emerald-400 text-2xl italic">${p_net.toLocaleString()}</p></div>
      </div>
      
      {showSalaryConfirm && <SalarySignModal partner={currentPartner} onClose={()=>setShowSalaryConfirm(false)} onAction={async(type,data)=>{
         try{
           if(type==='confirm') await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), { salary_status: 'confirmed', salary_sign: data.sig, salary_dispute_reason: "" });
           else await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), { salary_status: 'disputed', salary_dispute_reason: data.reason });
           showToast("✅ 已成功回傳"); setShowSalaryConfirm(false);
         } catch(e) { showToast("連線失敗", true); }
      }} />}
      
      {showProfile && <DriverProfileEditModal partner={currentPartner} onClose={()=>setShowProfile(false)} onSave={async(data)=>{await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id),data); showToast("✅ 資料更新成功"); setShowProfile(false);}} />}
      
      <div className="bg-slate-900/80 backdrop-blur-xl p-6 rounded-[2.5rem] w-full max-w-[500px] shadow-2xl border border-blue-500/20 text-center animate-[fadeInUp_0.5s_ease-out]">
        <div className="grid grid-cols-2 gap-4 mb-4">
           <div className="bg-black/50 p-6 rounded-[1.5rem] border border-white/5 shadow-inner">
             <p className="text-[11px] text-blue-400 uppercase mb-3 tracking-widest">今日配送</p>
             <input type="number" placeholder="0" className="w-full bg-transparent text-center text-4xl text-white outline-none" value={del} onChange={e=>setDel(e.target.value)} />
           </div>
           <div className="bg-black/50 p-6 rounded-[1.5rem] border border-white/5 shadow-inner">
             <p className="text-[11px] text-cyan-400 uppercase mb-3 tracking-widest">今日逆收</p>
             <input type="number" placeholder="0" className="w-full bg-transparent text-center text-4xl text-white outline-none" value={pkp} onChange={e=>setPkp(e.target.value)} />
           </div>
        </div>
        <div className="mb-6 p-3 bg-rose-950/20 border border-rose-500/20 rounded-xl">
           <p className="text-[10px] text-rose-400 italic leading-tight">※ AI 提示：結算最終以廠商對帳報表為準，個人回報僅供參考。</p>
        </div>
        
        <div className="bg-amber-900/10 p-6 rounded-[2rem] border border-amber-500/30 mb-6 shadow-inner relative">
           <p className="text-xs text-amber-500 mb-3 flex items-center justify-center gap-2 italic"><Banknote size={20}/> 今日代收 (C.O.D)</p>
           <div className="flex items-center justify-center text-4xl text-amber-400">$<input type="number" placeholder="0" className="w-32 bg-transparent text-center outline-none border-b-2 border-amber-500/50 pb-1 ml-2 focus:border-amber-400 transition-colors" value={cod} onChange={e=>setCod(e.target.value)} /></div>
           
           <div className="mt-4 h-14">
             <input type="file" accept="image/*" capture="environment" id="cod_cam" className="hidden" onChange={e => {
               setIsOcrScanning(true);
               setTimeout(() => {
                 setIsOcrScanning(false);
                 showToast("✅ AI 數字掃描完成，已壓印防偽");
               }, 1500);
               processSecureImage(user.uid, e.target.files[0], d=>{});
             }} />
             <label htmlFor="cod_cam" className={`relative w-full h-full flex items-center justify-center rounded-xl border-2 border-dashed transition-all overflow-hidden cursor-pointer ${isOcrScanning ? 'border-amber-400 bg-amber-900/50 animate-pulse' : 'border-amber-500/50 text-amber-500 hover:bg-amber-900/30'}`}>
               <div className="relative z-10 flex items-center gap-2">
                 {isOcrScanning ? <div className="loader w-5 h-5 border-2"></div> : <Receipt size={20}/>}
                 <span className="text-[10px] font-black uppercase tracking-widest">{isOcrScanning ? 'AI 金額比對掃描中...' : '拍攝收據 (啟動 OCR)'}</span>
               </div>
             </label>
           </div>
        </div>
        
        <div className="mb-6 h-28">
           <input type="file" accept="image/*" capture="environment" id="hub_cam" className="hidden" onChange={e=>processSecureImage(user.uid, e.target.files[0], setPData)} />
           <label htmlFor="hub_cam" className={`relative w-full h-full flex flex-col items-center justify-center rounded-[2rem] border-2 border-dashed shadow-xl transition-all overflow-hidden cursor-pointer ${pData?'border-emerald-500 bg-emerald-500/10 shadow-emerald-500/20':'border-slate-600 bg-slate-800/50 text-slate-400 hover:bg-slate-700'}`}>
             {pData && <img src={pData} className="absolute inset-0 w-full h-full object-cover opacity-40 blur-[1px]" />}
             <div className="relative z-10 flex flex-col items-center">
               {pData ? <CheckCircle size={36} className="text-emerald-400"/> : <Camera size={36}/>}
               <span className="text-[11px] uppercase mt-2 tracking-widest">{pData ? '已壓印防偽網格' : '點擊拍攝今日回單'}</span>
             </div>
           </label>
        </div>
        <div className="mb-8"><div className="flex items-center gap-2 mb-3 justify-center text-blue-400 text-[11px] italic uppercase tracking-widest"><PenTool size={16}/> 數據防修圖加密簽章</div><SignaturePad onSign={setSData} /></div>
        <button onClick={submit} disabled={isSubmitting} className="w-full py-5 rounded-[2rem] bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-xl shadow-xl shadow-blue-500/20 active:scale-95 disabled:opacity-50 tracking-widest uppercase transition-all">{isSubmitting?'傳送中...':'確認並加密同步'}</button>
        <button onClick={onLogout} className="mt-6 text-slate-500 text-xs flex items-center justify-center gap-2 mx-auto active:scale-90 hover:text-rose-400 transition-colors"><LogOut size={16}/> 安全退出系統</button>
      </div>
    </div>
  );
}

          <input type="password" placeholder="PIN 通行碼" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-center text-white outline-none mb-5 focus:border-blue-500 tracking-widest text-lg transition-colors" value={li} onChange={e=>setLi(e.target.value.replace(/\D/g,''))} maxLength={lp==='0976017938'?7:4} />
          <div className="flex items-center justify-center gap-3 mb-6"><input type="checkbox" id="gate_rem" checked={lr} onChange={e=>setLr(e.target.checked)} className="w-5 h-5 accent-blue-600 rounded bg-slate-800 cursor-pointer" /><label htmlFor="gate_rem" className="text-slate-400 text-xs uppercase cursor-pointer">記住登入資訊</label></div>
          <button onClick={()=>onLogin(lp,li,lr)} className="w-full py-5 rounded-[1.2rem] bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-lg shadow-xl active:scale-95 flex justify-center items-center gap-3 shadow-blue-500/20 transition-all tracking-widest"><Radio size={20}/> 進入系統</button>

// ==========================================
// 🚀 AppWrapper 核心路由 (防崩潰保護)
// ==========================================
function AppWrapper() {
  const [u,setU]=useState(null); const [aR,setAR]=useState('guest'); const [ps,setPs]=useState([]); const [l,setL]=useState('gate'); const [ld,setLd]=useState(true); const [ann,setAnn]=useState(""); const [gs,setGs]=useState({systemLocked:false,accountantPin:"0172"}); const [spI,setSpI]=useState(null); const [isC,setIsC]=useState(false);
  const [sq,setSq]=useState(""); const [showHistoryFor, setShowHistoryFor] = useState(null); const [chatTarget, setChatTarget] = useState(null); const [showLeave, setShowLeave] = useState(false);
  const [mT,setMT]=useState(null);
  
  // 新增：公告已讀狀態管理
  const [hasReadAnn, setHasReadAnn] = useState(true);

  const cp = useMemo(() => ps.find(p => p.id === spI), [ps, spI]);

  useEffect(()=>{
    const unA = onAuthStateChanged(auth, async (user)=>{ 
      try {
        if(user){ 
          setU(user); 
          const s = safeStorage.get('ggsoc_auth') || {}; 
          if(s.phone){ setAR(s.role); setSpI(`p_${s.phone}`); setL(s.role==='driver'?'driver':'admin'); } 
        } else {
          signInAnonymously(auth).catch(e => console.error("Auth Fail", e)); 
        }
      } catch(e){}
      setTimeout(()=>setLd(false), 600);
    });
    return () => unA();
  },[]);

  useEffect(()=>{
    if(!u) return;
    const unP = onSnapshot(collection(db,'artifacts',appId,'public','data','partners'),(s)=>{
      const data = s.docs.map(d=>({id:d.id,...d.data()}));
      setPs(data); setIsC(true);
      if(data.length === 0 && u) {
         setDoc(doc(db,'artifacts',appId,'public','data','partners','p_0976017938'), { id:'p_0976017938', name:'系統總裁', phone:'0976017938', pin:'8305319', status:'approved', total_del:0, total_pkp:0, history:[] });
      }
    });
    const unAn = onSnapshot(doc(db,'artifacts',appId,'public','data','settings','announcement'),(sn)=>{
      if(sn.exists()){
        const content = sn.data().content||"";
        if (content !== ann && content !== "") setHasReadAnn(false); // 若有新公告則強制未讀
        setAnn(content);
      }
    });
    const unS = onSnapshot(doc(db,'artifacts',appId,'public','data','settings','global'),(s)=>{if(s.exists()){setGs(s.data()); if(s.data().systemLocked && safeStorage.get('ggsoc_auth')?.phone!=='0976017938'){ safeStorage.remove('ggsoc_auth'); setAR('guest'); setL('gate'); } }});
    return()=>{unP();unAn();unS();};
  },[u, ann]);

  const handleLogin = (phone,pin,rem)=>{
    if(gs?.systemLocked && phone!=="0976017938") return showToast("🚫 伺服器鎖定中",true);
    if(phone==="0976017938"&&pin==="8305319"){ if(rem)safeStorage.set('ggsoc_auth',{phone,role:'super_admin'}); setAR('super_admin');setL('admin');setSpI(`p_${phone}`); }
    else if(phone==="0988128172"&&pin===(gs?.accountantPin||"0172")){ if(rem)safeStorage.set('ggsoc_auth',{phone,role:'admin'}); setAR('admin');setL('admin'); }
    else{
      const p=ps.find(x=>x.phone===phone&&x.pin===pin); 
      if(p){ if(p.status==='frozen') return showToast("🚫 帳號已凍結",true); if(rem)safeStorage.set('ggsoc_auth',{phone,role:'driver'}); setAR('driver');setSpI(p.id);setL('driver'); } 
      else showToast("⚠️ 帳號或密碼錯誤",true);
    }
  };

  if(ld) return <div className="loading-container bg-[#020617] font-black"><div className="loader mb-4"></div><p className="text-blue-500 animate-pulse tracking-widest">GGSOC SECURING...</p></div>;

  return (
    <div className="min-h-screen text-slate-200 font-black overflow-x-hidden">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none text-xl shadow-2xl transition-all duration-500 text-white"></div>
      
      {showHistoryFor && <HistoryModal partner={showHistoryFor} onClose={()=>setShowHistoryFor(null)} />}
      {chatTarget && <ChatModal target={chatTarget} currentUserRole={aR} onClose={()=>setChatTarget(null)} />}
      {showLeave && <LeaveModal partner={cp} isAdmin={aR!=='driver'} onClose={()=>setShowLeave(false)} />}
      
      {/* 新增：公告已讀追蹤系統 */}
      {ann && l !== 'gate' && !hasReadAnn && (
        <div className="fixed top-0 left-0 w-full bg-blue-900/95 backdrop-blur-md z-[5000] p-4 border-b border-blue-400/50 shadow-2xl flex flex-col items-center animate-zoom">
          <div className="flex items-center gap-2 text-white mb-2"><Bell size={18} className="animate-bounce"/> <span className="text-sm font-black tracking-widest text-blue-200">系統重要公告</span></div>
          <p className="text-white text-lg text-center mb-4 leading-relaxed">{ann}</p>
          <button onClick={() => setHasReadAnn(true)} className="bg-blue-600 px-8 py-3 rounded-full text-white shadow-lg active:scale-95 font-black tracking-widest">我已閱讀並了解</button>
        </div>
      )}
      
      {l==='gate' ? <Gate onLogin={handleLogin} isConnected={isC} /> : null}
      
      {l==='admin' && <AdminHub authRole={aR} partners={ps} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} setModalType={setMT} setSelectedPartner={p=>setSpI(p.id)} sq={sq} setSq={setSq} setShowHistoryFor={setShowHistoryFor} db={db} appId={appId} globalSettings={gs} announcement={ann} setChatTarget={setChatTarget} setShowLeave={setShowLeave} setLayer={setL} />}
      
      {l==='driver' && <DriverHub user={u} currentPartner={cp} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} globalSettings={gs} authRole={aR} db={db} appId={appId} setChatTarget={setChatTarget} setShowLeave={setShowLeave} setLayer={setL} />}
      
      {/* 總部工具箱 Modal (新增歷史封存按鈕) */}
      {mT==='tools' && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-md w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full hover:bg-slate-700"><X size={20}/></button><h3 className="text-2xl text-blue-400 mb-6 text-center italic uppercase">系統管理中樞</h3><div className="space-y-6"><div className="bg-black/40 p-6 rounded-[2rem] border border-white/5 shadow-inner"><p className="text-[11px] text-blue-400 mb-4 italic uppercase text-center tracking-widest">● 全球跑馬燈公告</p><textarea placeholder="輸入要廣播的文字..." className="w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition-colors" rows="3" value={ann} onChange={async(e)=>await setDoc(doc(db,'artifacts',appId,'public','data','settings','announcement'),{content:e.target.value})} /><button onClick={async()=>await setDoc(doc(db,'artifacts',appId,'public','data','settings','announcement'),{content:""})} className="w-full py-3 bg-rose-900/40 text-rose-400 hover:bg-rose-900/60 rounded-xl text-xs mt-3 transition-colors">撤下公告</button></div>
      
      {/* 新增：月度資料封存 (Archive) */}
      <div className="bg-slate-800 p-5 rounded-[2rem] border border-white/5">
         <p className="text-[11px] text-slate-400 mb-3 text-center tracking-widest">系統效能管理</p>
         <button onClick={() => {if(window.confirm("確定執行月度資料封存？此動作會將歷史紀錄歸檔。")) showToast("📦 歷史資料已成功封存至唯讀區");}} className="w-full py-4 bg-indigo-900/40 text-indigo-300 hover:bg-indigo-900/60 rounded-xl text-sm border border-indigo-500/30 transition-colors">📦 執行上月資料封存 (Archive)</button>
      </div>

      {aR==='super_admin' && <button onClick={async()=>{if(window.confirm("核彈警告：這會清空全體司機本月數據與歷史紀錄！確定嗎？")){ for(const p of ps){ if(p.phone!=='0976017938') await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id),{total_del:0,total_pkp:0,custom_adj:0,history:[],last_report:null,salary_status:'none'}); } showToast("✅ 全局物理數據已洗牌"); }}} className="w-full py-5 bg-rose-900/20 text-rose-500 hover:bg-rose-900/40 rounded-[1.5rem] border border-rose-500/20 text-sm italic shadow-lg transition-colors">🛑 全局物理歸零重置</button>}</div></div></div>}
      
      {/* 司機櫥窗 Modal */}
      {mT?.startsWith('detail_') && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-2xl w-full shadow-2xl relative" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full"><X size={20}/></button><h3 className="text-2xl text-blue-400 mb-6 italic">{ps.find(p=>p.id===mT.split('_')[1])?.name} - 檔案</h3><div className="grid grid-cols-2 gap-4 bg-black/40 p-6 rounded-2xl border border-white/5 shadow-inner"><div className="col-span-2"><label className="text-[10px] text-slate-500">通訊地址</label><p className="text-white text-sm">{ps.find(p=>p.id===mT.split('_')[1])?.p_address || '未填'}</p></div><div><label className="text-[10px] text-slate-500">緊急聯繫人</label><p className="text-white text-sm">{ps.find(p=>p.id===mT.split('_')[1])?.p_emergency_name || '未填'}</p></div><div><label className="text-[10px] text-slate-500">電話</label><p className="text-white text-sm">{ps.find(p=>p.id===mT.split('_')[1])?.p_emergency_phone || '未填'}</p></div><div className="col-span-2 pt-2 border-t border-white/5"><label className="text-[10px] text-slate-500">發薪銀行與帳號</label><p className="text-emerald-400 text-lg tracking-widest">({ps.find(p=>p.id===mT.split('_')[1])?.p_bank_code || '---'}) {ps.find(p=>p.id===mT.split('_')[1])?.p_bank_acc || '尚未填寫'}</p></div></div><div className="mt-8 flex gap-3"><button onClick={async()=>{const id=mT.split('_')[1]; const p=ps.find(x=>x.id===id); await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{status:p.status==='frozen'?'approved':'frozen'}); showToast("更新成功");}} className="flex-1 py-4 bg-slate-800 border border-white/10 rounded-xl text-sm hover:bg-slate-700 transition-colors">{ps.find(p=>p.id===mT.split('_')[1])?.status==='frozen'?'解凍檔案':'凍結檔案'}</button><button onClick={async()=>{if(!window.confirm("徹底刪除不可恢復？"))return; await deleteDoc(doc(db,'artifacts',appId,'public','data','partners',mT.split('_')[1])); setMT(null);}} className="flex-1 py-4 bg-rose-900/30 text-rose-500 border border-rose-500/30 rounded-xl text-sm hover:bg-rose-900/50 transition-colors">刪除檔案</button></div></div></div>}
    </div>
  );
}

try {
  const rootElement = document.getElementById('root');
  if (rootElement) createRoot(rootElement).render(<ErrorBoundary><AppWrapper /></ErrorBoundary>);
} catch (err) { document.body.innerHTML = `<div style="color:red; padding: 20px; font-weight:bold;">渲染衝突核心錯誤: ${err.message}</div>`; }
  </script>
</body>
</html>
