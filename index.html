<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 夥伴數位中控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2rem; padding: 25px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #ffffff; outline: none; margin-bottom: 12px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-prime:active { transform: scale(0.98); }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; text-align: left; padding-left: 5px; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .photo-slot { background: transparent; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-slot span { color: #94a3b8; font-size: 11px; font-weight: bold; }
        #payslip-box { background: #fff; color: #000; padding: 25px; border-radius: 4px; width: 320px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter italic">在地物流</h1>
        <p class="text-sky-500 text-xs font-black tracking-[0.3em] mb-12 uppercase">專業配送夥伴管理平台</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box text-center">
                <input type="password" id="login_pin" placeholder="PIN 密碼" class="input-box text-center">
                <button onclick="boot()" class="btn-prime w-full">進入系統</button>
            </div>
            <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border border-sky-500 text-sky-400 font-black">一、夥伴職能實務測驗</button>
            <button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border border-slate-700 text-slate-500 font-black">二、入職人事資料建檔</button>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[480px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 italic border-b-2 border-orange-500 pb-2">營運職能評估</h2>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <span class="label-sky">應徵車種</span>
                <select id="int_v_type" class="input-box bg-slate-800" onchange="toggleTruck(this.value)">
                    <option value="機車">機車配送員</option>
                    <option value="貨車">貨車司機 (需職業駕照)</option>
                </select>
                <div id="truck_warn" class="hidden mb-6 p-4 bg-orange-900/20 border border-orange-500/30 rounded-2xl">
                    <label class="flex items-center gap-2 text-white text-sm">
                        <input type="checkbox" id="pro_confirm" class="w-5 h-5"> 我確認持有有效「職業駕照」
                    </label>
                </div>

                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 mb-6 text-left">
                    <p class="text-white text-sm font-bold mb-3 italic">「情境：配送途中遇擦撞且有急件，您的處理流程？」</p>
                    <label class="flex items-center gap-2 mb-2 text-sm"><input type="radio" name="q1" value="100"> 報警拍照並回報調度員</label>
                    <label class="flex items-center gap-2 text-sm"><input type="radio" name="q1" value="0"> 先送完急件，再回來處理</label>
                </div>
                <button onclick="submitInterview()" id="sub_btn" class="btn-prime">送出評估資料</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[480px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回</div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-2 italic">入職與勞資建檔</h2>
                <div class="w-full h-1 bg-orange-500 mb-8"></div>
                
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">車輛行照</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">
                
                <span class="label-sky">健保隨同投保眷屬人數</span>
                <select id="app_fm" class="input-box bg-slate-800"><option value="0">0 人 (僅本人)</option><option value="1">1 人</option><option value="2">2 人</option><option value="3">3 人以上</option></select>
                
                <span class="label-sky">營運工具</span>
                <select id="app_v" class="input-box bg-slate-800" onchange="togglePlate(this.value)">
                    <option value="機車">個人機車</option><option value="貨車">個人貨車</option><option value="公司車">公司配車 (免填車號)</option>
                </select>
                <div id="plate_box"><input type="text" id="app_plate" placeholder="營運車牌號碼" class="input-box"></div>
                
                <span class="label-sky">匯款帳戶</span>
                <div class="flex gap-2"><input type="text" id="app_bc" placeholder="代碼" class="input-box w-1/3"><input type="text" id="app_ba" placeholder="銀行帳號" class="input-box w-2/3"></div>
                <input type="password" id="app_pin" placeholder="設定 4 位登入 PIN 碼" maxlength="4" class="input-box">
                
                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-sky-600 mt-4 shadow-xl">提交完整資料</button>
            </div>
        </div>
    </div>

    <div id="hub" class="layer">
        <div class="w-full max-w-[450px]">
            <h2 id="hub-name" class="text-4xl font-black text-white italic mb-10 text-center">夥伴專區</h2>
            <div class="id-card">
                <h3 class="text-sky-400 font-black mb-4 border-b border-sky-900 pb-2">下班營運回報</h3>
                <input type="number" id="rep_qty" placeholder="今日配送總件數" class="input-box">
                <span class="label-sky">拍攝「今日總表/簽單」存證</span>
                <div class="photo-slot !h-32" onclick="triggerCam('rep_img')"><span id="t_rep_img">開啟相機拍照</span><img id="p_rep_img"></div>
                <button onclick="submitReport()" id="rep_btn" class="btn-prime mt-4 bg-green-600">提交回報</button>
            </div>

            <div id="payslip-box" class="mx-auto my-6"><div id="payslip-content"></div></div>
            <button onclick="downloadPayslip()" class="w-full py-4 bg-white text-black font-black rounded-2xl mb-10 shadow-xl">下載電子薪資單 (JPG)</button>
        </div>
    </div>

    <div id="admin" class="layer">
        <div class="w-full max-w-[700px]">
            <h2 class="text-white font-black text-3xl mb-10 border-l-8 border-sky-500 pl-4 uppercase">後台薪資與保險控管</h2>
            <div class="bg-slate-900 p-4 rounded-3xl overflow-x-auto mb-10 border border-slate-800">
                <table class="w-full text-xs text-left">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr><th class="p-2">姓名</th><th>總件數</th><th>眷屬</th><th class="text-red-400">保費扣繳(黑盒控)</th><th>實付淨額</th></tr>
                    </thead>
                    <tbody id="admin-render" class="text-white"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" class="text-slate-500 underline">安全登出系統</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, serverTimestamp, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let partners = [], currentUser = null, photosCache = {};

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.toggleTruck = v => document.getElementById('truck_warn').style.display = (v==='貨車')?'block':'none';
        window.togglePlate = v => document.getElementById('plate_box').style.display = (v==='公司車')?'none':'block';

        window.boot = () => {
            const ph = document.getElementById('login_phone').value;
            const pi = document.getElementById('login_pin').value;
            if(ph === "0976017938" && pi === "0531") return renderAdmin();
            currentUser = partners.find(x => x.phone === ph && x.uid === pi && x.status === "approved");
            if(currentUser) return renderHub(currentUser);
            alert("帳號驗證失敗");
        };

        window.submitInterview = async () => {
            const vType = document.getElementById('int_v_type').value;
            if(vType === '貨車' && !document.getElementById('pro_confirm').checked) return alert("貨車司機需持有職業駕照");
            await addDoc(collection(db, 'partners'), { name: document.getElementById('int_name').value, phone: document.getElementById('int_phone').value, v_type: vType, status: "interviewed", time: serverTimestamp() });
            alert("評估提交成功"); location.reload();
        };

        window.submitApply = async () => {
            const vType = document.getElementById('app_v').value;
            await addDoc(collection(db, 'partners'), {
                name: document.getElementById('app_name').value, phone: document.getElementById('app_phone').value,
                id_num: document.getElementById('app_idnum').value, h_addr: document.getElementById('app_h_addr').value,
                fm_count: document.getElementById('app_fm').value, v_type: vType, plate: (vType==='公司車')?'公司配車':document.getElementById('app_plate').value,
                bank: document.getElementById('app_ba').value, uid: document.getElementById('app_pin').value,
                docs: photosCache, status: "pending", total_del: 0, time: serverTimestamp()
            });
            alert("建檔提交成功"); location.reload();
        };

        window.submitReport = async () => {
            const qty = parseInt(document.getElementById('rep_qty').value);
            if(!qty || !photosCache.rep_img) return alert("請輸入件數並拍攝照片！");
            await updateDoc(doc(db, 'partners', currentUser.id), { total_del: increment(qty), last_report: photosCache.rep_img });
            alert("回報成功"); location.reload();
        };

        function renderHub(p) {
            document.getElementById('gate').style.display = 'none'; document.getElementById('hub').style.display = 'flex';
            document.getElementById('hub-name').innerText = p.name;
            const income = (p.total_del || 0) * 15;
            // 系統自動根據眷屬數扣繳，不需夥伴選擇
            const ins = Math.round(income * 0.05 * (1 + parseInt(p.fm_count || 0)));
            document.getElementById('payslip-content').innerHTML = `
                <div style="text-align:center; font-weight:bold; border-bottom:2px solid #000; margin-bottom:10px">在地物流 2026年薪資條</div>
                <div style="display:flex; justify-content:space-between"><span>正向配送件資</span><span>$${income}</span></div>
                <div style="display:flex; justify-content:space-between; color:red"><span>勞健保扣繳(含${p.fm_count}眷)</span><span>-$${ins}</span></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; border-top:1px solid #000; margin-top:10px"><span>本月實領淨額</span><span>$${income - ins}</span></div>
            `;
        }

        function renderAdmin() {
            document.getElementById('gate').style.display = 'none'; document.getElementById('admin').style.display = 'flex';
            let html = '';
            partners.filter(p => p.status === 'approved').forEach(p => {
                const income = (p.total_del || 0) * 15;
                const ins = Math.round(income * 0.05 * (1 + parseInt(p.fm_count || 0)));
                html += `<tr class="border-b border-slate-900"><td class="p-2">${p.name}</td><td>${p.total_del}</td><td>${p.fm_count}</td><td class="text-red-500">-$${ins}</td><td class="text-sky-400 font-bold">$${income-ins}</td></tr>`;
            });
            document.getElementById('admin-render').innerHTML = html;
        }

        window.downloadPayslip = () => html2canvas(document.querySelector("#payslip-box")).then(c => { let a = document.createElement('a'); a.download='薪資條.jpg'; a.href=c.toDataURL(); a.click(); });
        window.showLayer = id => { hideAll(); document.getElementById(id).style.display = 'flex'; };
        window.hideAll = () => document.querySelectorAll('.layer').forEach(l => l.style.display='none');
        window.triggerCam = f => { window.currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = i => { const r = new FileReader(); r.onload = e => { photosCache[window.currentImgField] = e.target.result; const p = document.getElementById('p_'+window.currentImgField); p.src = e.target.result; p.style.display='block'; document.getElementById('t_'+window.currentImgField).style.display='none'; }; r.readAsDataURL(i.files[0]); };
    </script>
</body>
</html>
