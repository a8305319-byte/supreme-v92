<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <title>在地物流系統 - 智慧數位營運總部</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --accent: #0ea5e9; --bg-dark: #020617; }
        body { background: radial-gradient(circle at 50% 0%, #0f172a 0%, var(--bg-dark) 100%); background-attachment: fixed; color: #94a3b8; font-family: "Inter", sans-serif; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        input, textarea, .selectable { -webkit-user-select: text; user-select: text; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .layer { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .input-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 16px; width: 100%; color: #fff; text-align: center; margin-bottom: 16px; outline: none; }
        .input-box:focus { border-color: var(--accent); }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; font-weight: 800; cursor: pointer; border: none; }
        .btn-prime:active { transform: scale(0.96); }
        .admin-table-container { width: 100%; overflow-x: auto; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.8); margin-bottom: 100px; }
        .admin-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1300px; }
        .admin-table th { background: rgba(2,6,23,0.95); color: #94a3b8; padding: 18px 10px; font-weight: 900; position: sticky; top: 0; z-index: 20; }
        .admin-table td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; color: #e2e8f0; }
        .photo-slot { background: rgba(0,0,0,0.3); border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 1.2rem; padding: 16px; text-align: center; cursor: pointer; position: relative; min-height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5; }
        .ghost-input { background: transparent; border: 1px solid transparent; color: inherit; text-align: center; outline: none; border-radius: 0.5rem; }
        .ghost-input:focus { background: rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="toast" class="fixed top-[-100px] left-1/2 -translate-x-1/2 bg-sky-500 text-white px-8 py-4 rounded-full font-black z-[10000] transition-all duration-500 shadow-2xl">資訊提示</div>

    <!-- 彈窗區 -->
    <div id="tutorial-modal" class="fixed inset-0 bg-black/80 z-[9000] hidden items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-[2.5rem] max-w-sm w-full relative"><button onclick="window.closeModal('tutorial-modal')" class="absolute top-5 right-6 text-slate-400 text-3xl">&times;</button><h3 class="text-white font-black text-2xl mb-8 text-center">📲 將系統加入桌面</h3><button onclick="window.closeModal('tutorial-modal')" class="w-full mt-8 py-4 rounded-xl bg-slate-800 text-white font-black">完成</button></div>
    </div>
    
    <div id="send-payslip-modal" class="fixed inset-0 bg-black/80 z-[9000] hidden items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-[2.5rem] max-w-sm w-full"><h3 class="text-sky-400 font-black text-2xl mb-6 text-center">📤 薪資核發作業</h3><div id="sp_preview_area" class="bg-slate-950/70 p-5 rounded-2xl mb-5 text-sm text-slate-300 space-y-2 border border-slate-800 font-bold"></div><input type="text" id="sp_remark" placeholder="給司機的留言..." class="input-box !text-left focus:!border-sky-500"><div class="flex gap-4"><button onclick="window.closeModal('send-payslip-modal')" class="flex-1 py-4 rounded-xl bg-slate-800 text-slate-300 font-bold">取消</button><button id="sp_send_btn" onclick="window.confirmSendPayslip()" class="flex-1 py-4 rounded-xl bg-sky-600 text-white font-black">發送憑單</button></div></div>
    </div>

    <div id="delete-modal" class="fixed inset-0 bg-black/80 z-[9000] hidden items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-[2.5rem] max-w-sm w-full text-center"><h3 class="text-rose-500 font-black text-2xl mb-4">⚠️ 確認刪除？</h3><p class="text-slate-300 text-sm mb-6">此操作無法復原，將徹底抹除該名夥伴資料。</p><div class="flex gap-4"><button onclick="window.closeModal('delete-modal')" class="flex-1 py-4 rounded-xl bg-slate-800 text-slate-300 font-bold">取消</button><button onclick="window.executeDelete()" class="flex-1 py-4 rounded-xl bg-rose-600 text-white font-black">確認刪除</button></div></div>
    </div>

    <div id="hr-detail-modal" class="fixed inset-0 bg-black/90 z-[9000] hidden items-center justify-center p-4"><div class="glass-panel p-6 rounded-[2.5rem] max-w-xl w-full relative max-h-[92vh] overflow-y-auto"><button onclick="window.closeModal('hr-detail-modal')" class="absolute top-6 right-6 text-slate-400 text-4xl">&times;</button><h3 class="text-white font-black text-2xl mb-8 flex items-center gap-3 border-b border-slate-700/50 pb-4 italic">司機人事卡片</h3><div id="hr_detail_content"></div><button onclick="window.closeModal('hr-detail-modal')" class="w-full mt-8 py-4 rounded-xl bg-slate-800 text-white font-black">關閉</button></div></div>

    <div id="image-viewer-modal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center p-4" onclick="window.closeModal('image-viewer-modal')"><img id="fullscreen-image" src="" class="rounded-xl max-h-[85vh] object-contain shadow-2xl border border-white/10"></div>

    <!-- 頁面區 -->
    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 relative">
        <div class="mb-12 text-center pt-12"><h1 class="text-7xl font-black text-white italic tracking-tighter mb-2">在地物流</h1><p class="text-sky-400 text-[10px] tracking-[0.5em] font-black bg-sky-900/30 border border-sky-500/30 px-4 py-1.5 rounded-full uppercase">Official System</p></div>
        <div class="w-full max-w-[340px] space-y-5">
            <div class="glass-panel p-8 rounded-[2.5rem]">
                <input type="tel" id="login_phone" placeholder="手機號碼 (10碼)" class="input-box selectable !mb-4" maxlength="10">
                <input type="password" id="login_pin" placeholder="PIN 安全碼" class="input-box selectable !mb-4" maxlength="4">
                <div class="flex items-center justify-center gap-2 pb-6"><input type="checkbox" id="remember_me" class="w-4 h-4 accent-sky-500"><label for="remember_me" class="text-slate-400 text-sm font-bold">記住我 (自動登入)</label></div>
                <button type="button" onclick="window.handleLogin()" class="btn-prime">安全登入系統</button>
            </div>
            <div class="space-y-3 pt-4 text-center">
                <button onclick="window.showLayer('onboarding')" class="w-full py-4 rounded-2xl border border-sky-500/30 text-sky-400 font-black text-sm bg-sky-900/20">📋 夥伴實務與面試評估</button>
                <button onclick="window.showLayer('profile-gate')" class="w-full py-4 rounded-2xl border border-orange-500/30 text-orange-400 font-black text-sm bg-orange-900/20">📁 司機人事建檔通道</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="layer !px-4 lg:!px-8 !pt-6">
        <div class="w-full max-w-[1500px]">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-white font-black text-4xl md:text-5xl italic tracking-tighter">管理後台 <span class="text-sky-500">.</span></h2>
                <div class="flex gap-2">
                    <button onclick="window.exportCSV()" class="bg-emerald-800/80 text-emerald-300 px-4 py-2 rounded-xl text-xs font-black border border-emerald-700">下載CSV</button>
                    <button onclick="window.resetMonthlyData()" class="bg-rose-800/80 text-rose-300 px-4 py-2 rounded-xl text-xs font-black border border-rose-700">月結歸零</button>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center font-black">
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-sky-500/50"><p class="text-slate-400 text-[11px] mb-1">當月配送</p><p class="text-3xl text-sky-400" id="dash_del">0</p></div>
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-orange-500/50"><p class="text-slate-400 text-[11px] mb-1">當月收貨</p><p class="text-3xl text-orange-400" id="dash_pkp">0</p></div>
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-emerald-500/50"><p class="text-slate-400 text-[11px] mb-1">應發總淨額</p><p class="text-3xl text-emerald-400" id="dash_net">$0</p></div>
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-slate-500/50"><p class="text-slate-400 text-[11px] mb-1">現役司機</p><p class="text-3xl text-white" id="dash_count">0</p></div>
            </div>
            <div class="admin-table-container relative"><table class="admin-table"><thead><tr><th class="w-24">狀態</th><th class="text-left w-64">夥伴資訊 & 累計</th><th>配送單價</th><th>收貨單價</th><th>扣款</th><th>加給</th><th>應發實領</th><th>操作</th></tr></thead><tbody id="admin-list"></tbody></table></div>
        </div>
        <button onclick="window.handleLogout()" class="mt-8 text-rose-500 text-sm font-black underline pb-10">登出後台</button>
    </div>

    <div id="partner-hub" class="layer !px-4">
        <div class="w-full max-w-[480px] space-y-6 mt-4 pb-20">
            <h2 id="hub_title" class="text-3xl font-black text-white italic px-2">夥伴工作台</h2>
            <div class="glass-panel p-8 rounded-[2.5rem]">
                <div id="hub-payslip-area" class="mb-6"></div>
                <div class="mb-8 grid grid-cols-2 gap-4 text-center font-black">
                    <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800"><p class="text-[10px] text-sky-500 mb-2">今日配送</p><input type="number" id="rep_del" class="ghost-input w-full text-4xl text-white selectable font-black"></div>
                    <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800"><p class="text-[10px] text-orange-500 mb-2">今日收貨</p><input type="number" id="rep_pkp" class="ghost-input w-full text-4xl text-white selectable font-black"></div>
                </div>
                <div class="mb-10"><label class="photo-slot shadow-inner bg-slate-950/40" id="slot_report" onclick="window.triggerFile('file_report')"><span class="text-4xl mb-1">📸</span><span class="text-sm font-black text-white z-10 relative">拍攝今日報表</span><input type="file" id="file_report" class="hidden" accept="image/*" capture="environment" onchange="window.handleSlotUpload(event, 'slot_report', 'b64_report')"><input type="hidden" id="b64_report"></label></div>
                <button type="button" onclick="window.handleSubmitReport()" id="report_btn" class="btn-prime w-full py-5">🚀 提交今日數據</button>
                <button onclick="window.handleLogout()" class="mt-12 text-rose-500 text-sm font-black block w-full text-center underline">🔒 安全登出系統</button>
            </div>
        </div>
    </div>

    <div id="onboarding" class="layer">
        <div class="w-full max-w-[500px]">
            <button onclick="window.showLayer('gate')" class="text-slate-500 mb-6 text-sm font-bold flex gap-2 px-3 py-1.5 bg-slate-800/50 rounded-xl w-max"><span>←</span> 返回</button>
            <div class="glass-panel p-8 rounded-[2.5rem]">
                <h2 class="text-3xl font-black text-white mb-6 italic border-b border-slate-700/50 pb-5 text-center">夥伴實務評估</h2>
                <div class="flex gap-3 mb-10"><input type="text" id="int_name" placeholder="真實姓名" class="input-box flex-1 selectable"><input type="tel" id="int_phone" placeholder="手機" class="input-box flex-[1.5] selectable" maxlength="10"></div>
                <button type="button" onclick="window.handleSubmitInterview()" id="submit_exam_btn" class="btn-prime mt-4 bg-sky-600">建立帳號 (免評估)</button>
            </div>
        </div>
    </div>

    <div id="profile-gate" class="layer">
        <div class="w-full max-w-[500px]">
            <button onclick="window.showLayer('gate')" class="text-slate-500 mb-6 text-sm font-bold flex gap-2 px-3 py-1.5 bg-slate-800/50 rounded-xl w-max"><span>←</span> 返回</button>
            <div class="glass-panel p-8 rounded-[2.5rem]">
                <h2 class="text-3xl font-black text-white mb-6 italic border-b border-slate-700/50 pb-5 text-center">司機人事建檔</h2>
                <input type="tel" id="prof_phone" placeholder="登入手機號碼" class="input-box selectable mb-4" maxlength="10">
                <input type="text" id="prof_bank_code" placeholder="銀行代碼 (如: 822)" class="input-box selectable mb-4">
                <input type="text" id="prof_bank_acc" placeholder="銀行帳號" class="input-box selectable mb-4">
                <button type="button" onclick="window.handleProfileSubmit()" class="btn-prime bg-orange-600">儲存人事資料</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const APP_ID = 'supreme-logistics-official';
        const FB_CONFIG = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92" };
        const app = initializeApp(FB_CONFIG);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const partnersCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'partners');

        let partners = [], sessionUser = null;
        const getTodayString = () => new Date().toISOString().split('T')[0];

        window.showToast = (m, e = false) => { const t = document.getElementById('toast'); t.innerText = m; t.style.background = e ? '#e11d48' : '#0ea5e9'; t.style.top = '40px'; setTimeout(() => t.style.top = '-100px', 3500); };
        window.showLayer = (id) => { document.querySelectorAll('.layer, #gate').forEach(el => el.style.display = 'none'); document.getElementById(id).style.display = 'flex'; window.scrollTo(0,0); };
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.triggerFile = (id) => document.getElementById(id).click();
        window.viewFullscreen = (src) => { if(!src) return; document.getElementById('fullscreen-image').src = src; window.openModal('image-viewer-modal'); };

        window.handleSlotUpload = (e, slotId, b64Id) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const img = new Image(); img.onload = () => {
                    const c = document.createElement('canvas'); const M = 800; let w = img.width, h = img.height;
                    if(w>h && w>M){ h*=M/w; w=M; } else if(h>M){ w*=M/h; h=M; }
                    c.width=w; c.height=h; const ctx = c.getContext('2d'); ctx.drawImage(img, 0,0,w,h);
                    const du = c.toDataURL('image/jpeg', 0.5); 
                    document.getElementById(b64Id).value = du;
                    const slot = document.getElementById(slotId);
                    if(!slot.querySelector('img')) slot.appendChild(document.createElement('img'));
                    slot.querySelector('img').src = du; window.showToast("✅ 照片已準備");
                }; img.src = ev.target.result;
            }; r.readAsDataURL(f);
        };

        window.handleLogin = () => {
            const ph = document.getElementById('login_phone').value.trim(); const pi = document.getElementById('login_pin').value.trim();
            if((ph === "0976017938" && pi === "0531") || (ph === "0988128172" && pi === "0172")) { 
                if(document.getElementById('remember_me').checked) { localStorage.setItem('admin_ph', ph); localStorage.setItem('admin_pin', pi); }
                window.showLayer('admin-panel'); return; 
            }
            const p = partners.find(x => x.phone === ph && x.pin === pi);
            if(!p) return window.showToast("帳密錯誤", true);
            if(document.getElementById('remember_me').checked) { localStorage.setItem('drv_ph', ph); localStorage.setItem('drv_pin', pi); }
            sessionUser = p; window.renderPartnerHub(); window.showLayer('partner-hub');
        };

        window.handleLogout = () => {
            sessionUser = null; localStorage.clear();
            document.getElementById('login_phone').value = ''; document.getElementById('login_pin').value = '';
            window.showLayer('gate'); window.showToast("🔒 已登出");
        };

        window.handleSubmitReport = async () => {
            if(!sessionUser) return;
            const d = parseInt(document.getElementById('rep_del').value) || 0; const p = parseInt(document.getElementById('rep_pkp').value) || 0;
            const b64 = document.getElementById('b64_report').value;
            if(!b64) return window.showToast("⚠️ 請拍攝今日報表", true);
            const btn = document.getElementById('report_btn'); btn.innerText = "上傳中...";
            try {
                await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', sessionUser.id), { total_del: (sessionUser.total_del||0)+d, total_pkp: (sessionUser.total_pkp||0)+p, last_report: { date: getTodayString(), photo: b64 } });
                window.showToast("✅ 數據已提交");
                document.getElementById('rep_del').value = ''; document.getElementById('rep_pkp').value = ''; document.getElementById('b64_report').value = '';
                if(document.querySelector('#slot_report img')) document.querySelector('#slot_report img').remove();
            } catch(e) { window.showToast("❌ 失敗", true); } finally { btn.innerText = "🚀 提交今日數據"; }
        };

        window.handleSubmitInterview = async () => {
            const ph = document.getElementById('int_phone').value.trim(); const n = document.getElementById('int_name').value.trim();
            if(!n || !ph) return window.showToast("⚠️ 姓名與手機必填", true);
            try { 
                await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', `p_${ph}`), { id:`p_${ph}`, name:n, phone:ph, pin:"0000", status:'approved', total_del:0, total_pkp:0 }); 
                window.showToast("✅ 註冊成功，預設PIN碼為 0000"); setTimeout(() => window.showLayer('gate'), 1500);
            } catch(e) { window.showToast("❌ 錯誤", true); }
        };

        window.handleProfileSubmit = async () => {
            const ph = document.getElementById('prof_phone').value.trim(); const bc = document.getElementById('prof_bank_code').value.trim(); const ba = document.getElementById('prof_bank_acc').value.trim();
            if(!ph || !bc || !ba) return window.showToast("⚠️ 請填寫完整", true);
            try { await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', `p_${ph}`), { bank_code: bc, bank_account: ba }); window.showToast("✅ 更新完成"); setTimeout(() => window.showLayer('gate'), 1500); } catch(e) { window.showToast("❌ 查無此司機", true); }
        };

        window.renderAdmin = () => {
            const tbody = document.getElementById('admin-list'); let html = '', sD = 0, sP = 0, sN = 0;
            partners.forEach(p => {
                const dp = p.custom_del_price || 15; const pkp_p = p.custom_pkp_price || 10;
                const net = (p.total_del || 0) * dp + (p.total_pkp || 0) * pkp_p + (p.custom_adj || 0) - (p.ins_deduction || 0);
                sD += p.total_del || 0; sP += p.total_pkp || 0; sN += net;
                const rI = p.last_report?.photo ? `<button onclick="window.viewFullscreen('${p.last_report.photo}')" class="text-sky-500 ml-1">🖼️</button>` : '';
                html += `<tr class="border-b border-slate-800 hover:bg-white/5">
                    <td>🟢</td>
                    <td class="text-left pl-5"><span class="font-black text-white text-lg selectable">${p.name} ${rI}</span><div class="mt-2 flex gap-2"><div class="bg-sky-900/30 p-2 rounded-lg border border-sky-800/50"><span class="text-[9px] text-sky-500 font-bold">配: </span><input type="number" class="ghost-input w-10 text-white font-black" value="${p.total_del||0}" onchange="window.updateField('${p.id}', 'total_del', Number(this.value))"></div><div class="bg-orange-900/30 p-2 rounded-lg border border-orange-800/50"><span class="text-[9px] text-orange-500 font-bold">收: </span><input type="number" class="ghost-input w-10 text-white font-black" value="${p.total_pkp||0}" onchange="window.updateField('${p.id}', 'total_pkp', Number(this.value))"></div></div></td>
                    <td>$<input type="number" class="ghost-input w-10 text-sky-400 font-black" value="${dp}" onchange="window.updateField('${p.id}','custom_del_price',Number(this.value))"></td>
                    <td>$<input type="number" class="ghost-input w-10 text-orange-400 font-black" value="${pkp_p}" onchange="window.updateField('${p.id}','custom_pkp_price',Number(this.value))"></td>
                    <td>$<input type="number" class="ghost-input w-10 text-rose-500 font-black" value="${p.ins_deduction||0}" onchange="window.updateField('${p.id}','ins_deduction',Number(this.value))"></td>
                    <td>$<input type="number" class="ghost-input w-10 text-emerald-500 font-black" value="${p.custom_adj||0}" onchange="window.updateField('${p.id}','custom_adj',Number(this.value))"></td>
                    <td class="text-sky-400 font-black text-xl">$${net.toLocaleString()}</td>
                    <td><div class="flex gap-2 justify-center"><button onclick="window.openPayslipModal('${p.id}', ${net})" class="bg-emerald-900/40 text-emerald-300 p-2 rounded-xl border border-emerald-800/50 text-xs font-black">發薪</button><button onclick="window.triggerDelete('${p.id}')" class="bg-rose-900/30 p-2 rounded-xl border border-rose-800/50">🗑️</button></div></td>
                </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="8" class="py-10 text-center text-slate-700">無資料</td></tr>';
            document.getElementById('dash_del').innerText = sD; document.getElementById('dash_pkp').innerText = sP; document.getElementById('dash_net').innerText = "$"+sN.toLocaleString(); document.getElementById('dash_count').innerText = partners.length;
        };

        window.renderPartnerHub = () => {
            if(!sessionUser) return;
            const p = partners.find(x => x.id === sessionUser.id); if(!p) return;
            sessionUser = p; document.getElementById('hub_title').innerText = `👋 ${p.name} 的工作台`;
            if(p.payslips?.length > 0) {
                const latest = p.payslips[p.payslips.length - 1];
                document.getElementById('hub-payslip-area').innerHTML = `<div class="bg-emerald-900/20 border border-emerald-500/30 p-4 rounded-2xl"><p class="text-emerald-400 font-black text-sm mb-1">💰 最新薪資憑單 (${latest.date})</p><p class="text-white text-2xl font-black mb-2">$${latest.net.toLocaleString()}</p>${latest.remark ? `<p class="text-slate-400 text-xs">📝 備註：${latest.remark}</p>`:''}</div>`;
            } else { document.getElementById('hub-payslip-area').innerHTML = ''; }
        };

        window.updateField = async (id, f, v) => { try { await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', id), { [f]: v }); } catch(e) {} };
        window.triggerDelete = (id) => { window.delId = id; window.openModal('delete-modal'); };
        window.executeDelete = async () => { try { await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', window.delId)); window.closeModal('delete-modal'); window.showToast("已刪除"); } catch(e) {} };

        window.openPayslipModal = (id, net) => {
            const p = partners.find(x => x.id === id); if(!p) return;
            window.currentPayslipId = id; window.currentPayslipNet = net;
            document.getElementById('sp_preview_area').innerHTML = `<p>對象：${p.name}</p><p>配送：${p.total_del||0} / 收貨：${p.total_pkp||0}</p><p class="text-emerald-400 text-lg mt-2">應發總額：$${net.toLocaleString()}</p>`;
            window.openModal('send-payslip-modal');
        };
        window.confirmSendPayslip = async () => {
            const r = document.getElementById('sp_remark').value; const id = window.currentPayslipId;
            if(!id) return;
            const btn = document.getElementById('sp_send_btn'); btn.innerText = "發送中...";
            try { await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', id), { payslips: arrayUnion({ date: getTodayString(), net: window.currentPayslipNet, remark: r }) }); window.closeModal('send-payslip-modal'); window.showToast("✅ 薪資已發送"); document.getElementById('sp_remark').value = ''; } catch(e) {} finally { btn.innerText = "發送憑單"; }
        };

        window.exportCSV = () => {
            let csv = '\uFEFF司機名稱,手機,銀行代碼,銀行帳號,配送數,收貨數,應發淨額\n';
            partners.forEach(p => {
                const net = (p.total_del||0)*(p.custom_del_price||15) + (p.total_pkp||0)*(p.custom_pkp_price||10) + (p.custom_adj||0) - (p.ins_deduction||0);
                csv += `${p.name},${p.phone},${p.bank_code||''},${p.bank_account||''},${p.total_del||0},${p.total_pkp||0},${net}\n`;
            });
            const l = document.createElement('a'); l.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'})); l.download = `物流月報表_${getTodayString()}.csv`; l.click();
        };

        window.resetMonthlyData = async () => {
            if(!confirm("確定要將所有司機當月的配送與收貨數歸零嗎？")) return;
            window.showToast("歸零處理中...");
            for(let p of partners) await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'partners', p.id), { total_del: 0, total_pkp: 0, custom_adj: 0 });
            window.showToast("✅ 月結歸零完成");
        };

        const init = async () => {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    if(u) {
                        onSnapshot(partnersCol, (s) => { 
                            partners = s.docs.map(d => ({id: d.id, ...d.data()})); 
                            window.renderAdmin(); window.renderPartnerHub();
                            // 檢查自動登入
                            if(!sessionUser && document.getElementById('gate').style.display !== 'none') {
                                if(localStorage.getItem('admin_ph')) { document.getElementById('login_phone').value = localStorage.getItem('admin_ph'); document.getElementById('login_pin').value = localStorage.getItem('admin_pin'); window.handleLogin(); }
                                else if(localStorage.getItem('drv_ph')) { document.getElementById('login_phone').value = localStorage.getItem('drv_ph'); document.getElementById('login_pin').value = localStorage.getItem('drv_pin'); window.handleLogin(); }
                            }
                        });
                    }
                });
            } catch(e) {}
        };
        init();
    </script>
</body>
</html>
