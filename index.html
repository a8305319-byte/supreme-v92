<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GGSOC 2026 數位結算中樞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: "Inter", "PingFang TC", sans-serif; }
        .system-card { border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
        .btn-action { background: #0f172a; color: white; transition: all 0.2s; border-radius: 0.5rem; }
        .btn-action:active { transform: scale(0.98); }
        .grid-bg { background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [step, setStep] = useState('login'); 
            const [user, setUser] = useState({ phone: '', id: '' });

            if (step === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-100 grid-bg">
                    <div className="w-full max-w-sm bg-white p-8 system-card">
                        <div className="mb-8">
                            <h1 className="text-xl font-black text-slate-900 tracking-tight">GGSOC 2026</h1>
                            <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Administrative Access</p>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">手機號碼</label>
                                <input onChange={e => setUser({...user, phone: e.target.value})} placeholder="09XX-XXX-XXX" className="w-full bg-slate-50 p-3 rounded-lg text-sm font-bold border border-slate-200 outline-none focus:border-slate-900" />
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">身分驗證 (工號/末四碼)</label>
                                <input type="password" onChange={e => setUser({...user, id: e.target.value})} placeholder="****" className="w-full bg-slate-50 p-3 rounded-lg text-sm font-bold border border-slate-200 outline-none focus:border-slate-900" />
                            </div>
                            <button onClick={() => user.phone && user.id ? setStep('payout') : null} className="w-full btn-action font-bold py-3 text-sm mt-4 shadow-lg">驗證登入</button>
                        </div>
                    </div>
                </div>
            );

            if (step === 'payout') return (
                <div className="min-h-screen bg-slate-50 p-6 flex flex-col items-center">
                    <div className="w-full max-w-md">
                        <div className="flex justify-between items-end mb-6">
                            <h2 className="text-lg font-black text-slate-900">結算報表</h2>
                            <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">狀態：待簽收</span>
                        </div>
                        
                        <div className="bg-white system-card p-6 mb-4">
                            <div className="flex justify-between items-start mb-6 pb-4 border-b border-slate-50">
                                <div>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase">應撥總額 (Net Payout)</p>
                                    <h3 className="text-4xl font-black text-slate-900 mt-1">$9,789</h3>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] text-slate-400 font-bold">日期</p>
                                    <p className="text-xs font-bold text-slate-900">2026.03.14</p>
                                </div>
                            </div>

                            <div className="space-y-3 mb-8">
                                <div className="flex justify-between text-xs font-bold text-slate-500">
                                    <span>跑車勞務報酬</span>
                                    <span>$10,000</span>
                                </div>
                                <div className="flex justify-between text-xs font-bold text-red-500">
                                    <span>二代健保代扣 (2.11%)</span>
                                    <span>- $211</span>
                                </div>
                            </div>

                            <div className="w-full h-32 bg-slate-50 rounded-lg border border-slate-200 flex items-center justify-center mb-6">
                                <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">數位簽名區 (Signature)</span>
                            </div>

                            <button onClick={() => setStep('done')} className="w-full btn-action font-bold py-4 text-sm shadow-xl">確認領取薪資</button>
                        </div>
                        <p className="text-center text-[8px] text-slate-300 font-mono">HASH: 812-GGSOC-2026-PAYROLL-SECURED</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center p-10 bg-slate-50 text-center">
                    <div className="bg-white p-10 system-card max-w-xs">
                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">✓</div>
                        <h2 className="text-xl font-black text-slate-900">核發完成</h2>
                        <p className="text-slate-500 text-xs mt-3 font-bold leading-relaxed">款項已排入銀行發放流程。<br/>相關紀錄已加密封存。</p>
                        <button onClick={() => window.location.reload()} className="mt-8 text-slate-400 text-[10px] font-bold border-b border-slate-200 pb-1">返回系統</button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
