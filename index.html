  <script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// --- 2026 員工自付費用對照表 (精準對應 2026 法規基本工資 29,500) ---
const INSURANCE_TABLE_2026 = {
  29500: { labor: 679, health: 458 }, // 2026 基本工資起扣點
  30300: { labor: 697, health: 470 },
  31800: { labor: 731, health: 493 },

const Ico = (e) => ({size=24, className=""}) => <span style={{fontSize: size+'px', lineHeight: 1}} className={className}>{e}</span>;
const Package=Ico('📦'), Settings=Ico('⚙️'), Message=Ico('💬'), Banknote=Ico('💵'), Bot=Ico('🤖'), Shield=Ico('🛡️'), HistoryLog=Ico('📜'), Bell=Ico('🔔'), Support=Ico('🆘'), Calendar=Ico('📅'), Send=Ico('✈️'), X=Ico('❌'), Camera=Ico('📷'), Check=Ico('✅'), Alert=Ico('🚨'), Receipt=Ico('🧾'), LogOut=Ico('🚪'), Pen=Ico('🖋️'), Search=Ico('🔍'), Radio=Ico('📻'), FileText=Ico('📄'), Download=Ico('📥'), Eye=Ico('👁️'), Target=Ico('🎯'), User=Ico('👤'), Star=Ico('⭐'), Skull=Ico('💀'), Heart=Ico('❤️');

// --- 載入 Firebase 模組 ---
const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
const { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, query, orderBy, addDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');

// 初始化

// --- 輔助函式：顯示提示 ---
const showToast = (msg, isError = false) => {
  const t = document.getElementById('global-toast');
  if(!t) return;
  t.innerText = msg;
  t.className = `fixed top-10 left-1/2 -translate-x-1/2 px-10 py-5 rounded-full font-black z-[999999] shadow-2xl transition-all duration-500 ${isError ? 'bg-rose-600' : 'bg-blue-600'} text-white text-sm md:text-lg`;
  t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translate(-50%, -20px)'; }, 3000);
};

// ==========================================
// 🧠 總裁專屬：Gemini AI 幕僚對話引擎
// ==========================================
function GeminiCopilotModal({ onClose, systemData, writeGodLog }) {
  const [input, setInput] = useState("");
  const [messages, setMessages] = useState([
    { role: 'model', text: '您好，總裁。我是您的專屬 Gemini 幕僚。我已讀取當前指揮中心的即時營運數據（包含產能、異常報備與黑名單），請隨時下達分析指令。' }
  ]);
  const [isTyping, setIsTyping] = useState(false);
  const chatEndRef = useRef(null);
  
  // 自動捲動到最新訊息
  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const handleSend = async () => {
    if (!input.trim() || isTyping) return;
    const userText = input;
    setInput("");
    setMessages(prev => [...prev, { role: 'user', text: userText }]);
    setIsTyping(true);

    try {
      const apiKey = localStorage.getItem('ggsoc_gemini_token');
      if (!apiKey) {
        setMessages(prev => [...prev, { role: 'model', text: '⚠️ 無法連結神經網路。請先至「系統工具箱」設定您的 Gemini API Key。' }]);
        setIsTyping(false);
        return;
      }

      // 將當前系統數據壓縮餵給 AI
      const contextData = systemData.map(p => ({
        name: p.name, 
        del: Number(p.total_del) || 0, 
        pkp: Number(p.total_pkp) || 0, 
        conflict: p.has_conflict, 
        blacklisted: p.is_blacklisted,
        status: p.status
      }));
      
      const systemPrompt = `你現在是物流營運系統的超級 AI 幕僚，說話風格簡潔、專業、帶有極客科技感，直接稱呼對方為總裁。這是當前的即時營運數據 JSON：${JSON.stringify(contextData)}。請根據這些真實數據精準回答總裁的問題。總裁問：`;

      // 呼叫真實的 Gemini API
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`, {:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt + userText }] }] })
      });

      const data = await res.json();
      
      if (data.error) throw new Error(data.error.message);
      
      const reply = data.candidates[0].content.parts[0].text;
      setMessages(prev => [...prev, { role: 'model', text: reply }]);
      
      if (writeGodLog) writeGodLog("🧠 諮詢 Gemini 幕僚", `指令: ${userText.substring(0, 15)}...`);
    } catch (err) {
      console.error(err);
      setMessages(prev => [...prev, { role: 'model', text: `🚨 核心神經網路連線異常：${err.message}` }]);
    } finally {
      setIsTyping(false);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/95 z-[999999] flex justify-end animate-[fadeIn_0.3s]" onClick={onClose}>
      <div className="bg-[#050505] border-l border-blue-500/30 w-full max-w-md h-full flex flex-col shadow-[0_0_50px_rgba(59,130,246,0.1)] relative" onClick={e=>e.stopPropagation()}>
        <div className="p-6 border-b border-white/5 flex justify-between items-center bg-black">
          <div className="flex items-center gap-3">
            <Bot size={28} className="text-blue-500 animate-pulse drop-shadow-[0_0_10px_rgba(59,130,246,0.8)]" />
            <div>
              <h3 className="text-white italic font-black tracking-widest">GEMINI COPILOT</h3>
              <p className="text-[9px] text-blue-500 font-mono tracking-widest">NEURAL_LINK_ESTABLISHED</p>
            </div>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-white transition-colors p-2"><X size={20}/></button>
        </div>

        <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
          {messages.map((msg, idx) => (
            <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={`max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed font-black ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-none shadow-[0_0_15px_rgba(37,99,235,0.3)]' : 'bg-slate-900 border border-white/5 text-slate-300 rounded-bl-none'}`}>
                {msg.text}
              </div>
            </div>
          ))}
          {isTyping && (
            <div className="flex justify-start">
              <div className="bg-slate-900 border border-white/5 p-4 rounded-2xl rounded-bl-none flex gap-2 items-center">
                <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
                <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0.1s'}}></div>
                <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
              </div>
            </div>
          )}
          <div ref={chatEndRef} />
        </div>

        <div className="p-4 bg-black border-t border-white/5">
          <div className="flex gap-2">
            <input 
              value={input} 
              onChange={e=>setInput(e.target.value)} 
              onKeyPress={e => e.key === 'Enter' && handleSend()}
              placeholder="輸入分析指令..." 
              className="flex-1 bg-slate-900 border border-white/10 p-4 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition-colors font-mono" 
            />
            <button onClick={handleSend} disabled={isTyping || !input.trim()} className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 text-white p-4 rounded-xl transition-all active:scale-95 flex items-center justify-center">
              <Send size={20} />
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==========================================
// 📊 財務與審核詳情組件 (包含 2026 勞健保新制)
// ==========================================
function AdminDriverDetailModal({ partner, onClose, onUpdate, authRole }) {
  const [tab, setTab] = useState('finance');
  
  // 財務狀態 (向下相容)
  const [insuranceBracket, setInsuranceBracket] = useState(partner.insurance_bracket || "0");
  const [dependents, setDependents] = useState(partner.dependents || 0);
  const [enableSecGen, setEnableSecGen] = useState(partner.enable_sec_gen || false);
  const [deductionAmount, setDeductionAmount] = useState(partner.current_deduction || "");
  const [deductionReason, setDeductionReason] = useState(partner.deduction_reason || "");
  const [bonusAmount, setBonusAmount] = useState(partner.current_bonus || "");
  const [isTaskDone, setIsTaskDone] = useState(partner.task_5000_done || false);

  const handleSaveFinance = () => {
    // 2026 勞健保精算邏輯
    const entry = INSURANCE_TABLE_2026[insuranceBracket] || { labor: 0, health: 0 };
    const laborFee = entry.labor;
    // 健保費 = 單人保費 * (1 + 眷屬人數)
    const healthFee = Math.round(entry.health * (1 + Number(dependents)));
    
    // 獎金與基本盤計算
    const finalBonus = Number(bonusAmount) + (isTaskDone ? 5000 : 0);
    const baseIncome = (Number(partner.total_del)||0) * (partner.custom_del_price||15) + (Number(partner.total_pkp)||0) * (partner.custom_pkp_price||10);
    
    // 二代健保計算 (20,000 門檻, 費率 2.11%)
    const totalForSecGen = baseIncome + finalBonus;
    const secGenFee = enableSecGen && totalForSecGen >= 20000 ? Math.round(totalForSecGen * 0.0211) : 0;

    const payload = {
      current_deduction: Number(deductionAmount),
      deduction_reason: deductionReason,
      current_bonus: finalBonus,
      task_5000_done: isTaskDone,
      insurance_bracket: Number(insuranceBracket),
      enable_sec_gen: enableSecGen,
      dependents: Number(dependents),
      labor_fee: laborFee,
      health_fee: healthFee,
      sec_gen_fee: secGenFee
    };

    if (authRole === 'super_admin') {
      payload.salary_status = 'pending_sign';
      showToast("⚡ 神諭降臨：財務結算已強制覆寫並放行");
    } else {
      showToast("✅ 2026 財務核算數據已存入草稿");
    }
    onUpdate(partner.id, null, payload);
  };

  if (!partner) return null;

  return (
    <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 animate-zoom" onClick={onClose}>
      <div className="bg-[#050505] border border-blue-500/30 p-6 rounded-[2rem] w-full max-w-lg h-[85vh] flex flex-col relative shadow-[0_0_50px_rgba(0,0,0,1)]" onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-6 right-6 p-2 bg-black rounded-full text-slate-500 hover:text-rose-500 transition-colors"><X size={20}/></button>
        
        {/* 頭部資訊 */}
        <div className="mb-4 border-b border-white/5 pb-4">
          <h3 className="text-2xl text-blue-500 italic font-black mb-1 flex items-center gap-2"><User size={24}/> {partner.name}</h3>
          <p className="text-xs text-slate-500 font-mono tracking-widest">{partner.phone} | 正件 {partner.total_del||0} | 逆收 {partner.total_pkp||0}</p>
        </div>
        
        {/* 頁籤切換 */}
        <div className="flex gap-2 mb-6 bg-black p-2 rounded-2xl border border-white/5">
          <button onClick={()=>setTab('finance')} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${tab==='finance'?'bg-blue-600 text-white shadow-lg':'text-slate-500 hover:bg-white/5'}`}>財務核算</button>
          <button onClick={()=>setTab('audit')} className={`flex-1 py-3 rounded-xl text-xs font-black transition-all ${tab==='audit'?'bg-amber-600 text-white shadow-lg':'text-slate-500 hover:bg-white/5'}`}>異常審核</button>
        </div>

        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-6">
          {tab === 'finance' && (
            <div className="space-y-6 animate-[fadeIn_0.3s]">
              
              {/* 🛡️ 2026 勞健保與二代健保模組 */}
              <div className="bg-blue-950/10 p-5 rounded-3xl border border-blue-500/30 shadow-[inner_0_0_20px_rgba(59,130,246,0.05)]">
                <p className="text-[11px] text-blue-400 mb-4 font-black tracking-widest flex items-center gap-2">
                  <Shield size={14}/> 2026 社會成本與眷屬核算
                </p>
                <div className="space-y-4">
                  <div>
                    <label className="text-[10px] text-slate-500 mb-2 block uppercase tracking-widest">投保級距 (2026 基本工資 29,500)</label>
                    <select className="w-full bg-black border border-white/10 p-4 rounded-xl text-white text-sm outline-none focus:border-blue-500 transition-all font-mono" value={insuranceBracket} onChange={e=>setInsuranceBracket(e.target.value)}>
                      <option value="0">--- 職業工會自理 / 未投保 ---</option>
                      {Object.keys(INSURANCE_TABLE_2026).map(b => (
                        <option key={b} value={b}>分級：${Number(b).toLocaleString()} (勞:${INSURANCE_TABLE_2026[b].labor} 健:${INSURANCE_TABLE_2026[b].health})</option>
                      ))}
                    </select>
                  </div>
                  
                  {/* 健保眷屬與二代健保 */}
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-black p-4 rounded-xl border border-white/5">
                      <label className="text-[10px] text-slate-500 mb-2 block uppercase">健保依附眷屬</label>
                      <div className="flex items-center gap-3">
                        <User size={16} className="text-blue-500" />
                        <input type="number" min="0" max="9" className="w-full bg-transparent text-white text-xl font-black outline-none" value={dependents} onChange={e=>setDependents(e.target.value)} />
                        <span className="text-xs text-slate-600">人</span>
                      </div>
                      <p className="text-[8px] text-blue-500/70 mt-2 font-black italic">※ 計費人數：{1 + Number(dependents || 0)} 人</p>
                    </div>

                    <div className="bg-black p-4 rounded-xl border border-white/5 flex flex-col justify-center">
                      <label className="flex items-center gap-3 cursor-pointer group mb-1">
                        <input type="checkbox" checked={enableSecGen} onChange={e=>setEnableSecGen(e.target.checked)} className="w-5 h-5 accent-blue-500" />
                        <span className="text-xs text-slate-300 font-black group-hover:text-white transition-colors">代扣二代健保</span>
                      </label>
                      <p className="text-[9px] text-slate-500 pl-8 leading-relaxed">費率 2.11%<br/>達 20,000 門檻啟動</p>
                    </div>
                  </div>
                </div>
              </div>

              {/* 獎懲模組 */}
              <div className="grid grid-cols-1 gap-4">
                <div className="bg-rose-950/10 p-5 rounded-3xl border border-rose-500/30">
                  <p className="text-[10px] text-rose-500 mb-3 font-black tracking-widest uppercase">扣款與理賠錄入</p>
                  <div className="flex gap-2">
                    <input type="number" placeholder="金額" className="flex-1 bg-black p-4 rounded-xl text-white text-sm outline-none border border-white/5" value={deductionAmount} onChange={e=>setDeductionAmount(e.target.value)} />
                    <input placeholder="事由..." className="flex-[2] bg-black p-4 rounded-xl text-white text-sm outline-none border border-white/5" value={deductionReason} onChange={e=>setDeductionReason(e.target.value)} />
                  </div>
                </div>
                
                <div className="bg-amber-950/10 p-5 rounded-3xl border border-amber-500/30">
                  <p className="text-[10px] text-amber-500 mb-3 font-black tracking-widest uppercase">加給與獎金</p>
                  <label className="flex items-center gap-3 bg-black p-4 rounded-xl mb-3 cursor-pointer border border-white/5 hover:border-amber-500/30 transition-all">
                    <input type="checkbox" className="w-5 h-5 accent-amber-500" checked={isTaskDone} onChange={e=>setIsTaskDone(e.target.checked)} />
                    <span className="text-sm text-amber-100 font-black italic">5,000 元品質達成獎金</span>
                  </label>
                  <input type="number" placeholder="額外激勵獎金..." className="w-full bg-black p-4 rounded-xl text-white text-sm outline-none border border-white/5" value={bonusAmount} onChange={e=>setBonusAmount(e.target.value)} />
                </div>
              </div>
              
              <button onClick={handleSaveFinance} className="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black italic shadow-[0_0_20px_rgba(37,99,235,0.3)] active:scale-95 transition-all tracking-widest text-lg">
                💾 執行財務核算寫入
              </button>
            </div>
          )}

          {tab === 'audit' && (
            <div className="space-y-4 animate-[fadeIn_0.3s]">
              <div className="bg-black p-5 rounded-3xl border border-white/5 text-center">
                <Alert size={48} className="text-amber-500 mx-auto mb-4" />
                <h4 className="text-white font-black mb-2">爭議與異常審核</h4>
                <p className="text-xs text-slate-500 mb-6">檢視實體的異常回報或強制標記異常。</p>
                <button onClick={()=>{ onUpdate(partner.id, null, { has_conflict: true, conflict_reason: "營運總部標記異常：需複核" }); showToast("已標記異常"); }} className="w-full py-4 bg-amber-900/30 text-amber-500 rounded-xl border border-amber-500/30 text-sm font-black hover:bg-amber-600 hover:text-white transition-all">🚨 強制標記為異常狀態</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// 👑 營運指揮中心 (AdminHub)
// ==========================================
function AdminHub({ authRole, partners, onLogout, updateField, db, appId, writeGodLog, globalSettings }) {
  const [adminTab, setAdminTab] = useState('formal'); 
  const [sq, setSq] = useState("");
  const [mT, setMT] = useState(null);
  const [chatTarget, setChatTarget] = useState(null);
  const [detailTarget, setDetailTarget] = useState(null);
  const [isSyncing, setIsSyncing] = useState(false);
  const [showAiCopilot, setShowAiCopilot] = useState(false);
  
  // 🧠 Gemini 擴充狀態
  const [showGemini, setShowGemini] = useState(false);
  const [geminiToken, setGeminiToken] = useState(localStorage.getItem('ggsoc_gemini_token') || "");

  // 🛡️ 數據層：隱身過濾與黑名單攔截
  const filteredList = useMemo(() => {
    if (!partners) return [];
    let list = partners.filter(p => p.phone !== '0976017938');
    if (globalSettings?.ghost_mode) {
      list = list.filter(p => p.is_blacklisted !== true);
    }
    return list;
  }, [partners, globalSettings?.ghost_mode]);

  // 🤖 智慧 AI 戰情分析與風險預測模型
  const aiInsights = useMemo(() => {
    if (!filteredList || !filteredList.length) {
      return { topDriver: null, conflictCount: 0, zeroYield: [], riskList: [] };
    }
    const active = filteredList.filter(p => p.status === 'approved');
    const top = active.reduce((p, c) => {
      const pScore = (Number(p.total_del)||0) + (Number(p.total_pkp)||0);
      const cScore = (Number(c.total_del)||0) + (Number(c.total_pkp)||0);
      return pScore > cScore ? p : c;
    }, active[0] || null);
    
    const zero = active.filter(x => ((Number(x.total_del)||0) + (Number(x.total_pkp)||0)) === 0);
    const conflicts = filteredList.filter(x => x.has_conflict);
    const riskList = active.filter(x => 
      x.salary_status === 'disputed' || 
      (x.has_conflict && ((Number(x.total_del)||0) + (Number(x.total_pkp)||0) < 10))
    );

    return { topDriver: top, conflictCount: conflicts.length, zeroYield: zero, riskList };
  }, [filteredList]);

  // 🤖 核心控制：全域開關同步
  const handleToggleSwitch = async (field, currentValue) => {
    if (isSyncing) return;
    setIsSyncing(true);
    try {
      const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
      await updateDoc(settingsRef, { [field]: !currentValue });
      writeGodLog("系統開關", `切換 [${field}] 為 ${!currentValue}`);
      showToast("⚡ 設定已同步");
    } catch (err) {
      showToast("❌ 同步失敗", true);
    } finally {
      setIsSyncing(false);
    }
  };

  // 🤖 AI 自動駕駛 (Auto-Pilot)
  useEffect(() => {
    if (globalSettings?.ai_auto_pilot && authRole === 'super_admin') {
      const autoTask = async () => {
        const candidates = filteredList.filter(p => 
          p.status === 'pending' && 
          ((Number(p.total_del)||0) + (Number(p.total_pkp)||0)) > 0 && 
          !p.has_conflict && !p.is_blacklisted
        );
        for (const p of candidates) {
          await updateField(p.id, 'status', 'approved');
        }
        if(candidates.length > 0) showToast(`🤖 AI 自動核准 ${candidates.length} 位實體`);
      };
      autoTask();
    }
  }, [filteredList, globalSettings?.ai_auto_pilot]);

  // 搜尋過濾
  const displayList = useMemo(() => {
    const s = sq.toLowerCase();
    const list = filteredList.filter(p => (p.name||'').includes(s) || (p.phone||'').includes(s));
    if (adminTab === 'pending') return list.filter(p => p.status === 'pending');
    if (adminTab === 'intercept') return list.filter(p => p.salary_status === 'intercepted_by_boss');
    return list.filter(p => p.status === 'approved' || p.status === 'frozen');
  }, [filteredList, adminTab, sq]);

  return (
    <div className="p-4 md:p-10 max-w-full mx-auto bg-black min-h-screen animate-[fadeIn_0.5s]">
      {chatTarget && <ChatModal target={chatTarget} currentUserRole={authRole} onClose={()=>setChatTarget(null)} />}
      {detailTarget && <AdminDriverDetailModal partner={detailTarget} onClose={()=>setDetailTarget(null)} onUpdate={updateField} authRole={authRole} />}
      
      {/* 🧠 渲染 Gemini AI 幕僚 */}
      {showGemini && <GeminiCopilotModal onClose={()=>setShowGemini(false)} systemData={filteredList} writeGodLog={writeGodLog} />}
      
      {/* 標題區：應用 Ghost Mode 隱身偽裝 */}
      <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6">
        <div>
          <h2 className="text-white text-5xl italic font-black uppercase tracking-tighter">
            {globalSettings?.ghost_mode ? '數據監控終端' : '營運指揮中心'}
          </h2>
          <div className="flex items-center gap-2 mt-2">
            <span className={`text-[10px] px-3 py-1 rounded-full border ${authRole==='super_admin'?'text-amber-500 border-amber-500/30 bg-amber-900/20 shadow-[0_0_10px_#f59e0b33]':'text-blue-400 border-blue-500/30 bg-blue-900/20'}`}>
              {globalSettings?.ghost_mode ? '🔍 STATUS: STABLE' : (authRole==='super_admin'?'👑 總裁模式':'👑 營運總部')}
            </span>
          </div>
        </div>
        <div className="flex gap-2 w-full xl:w-auto flex-wrap">
          {/* 🧠 召喚 Gemini 大腦 (只有造物主可用) */}
          {authRole === 'super_admin' && (
            <button onClick={()=>setShowGemini(true)} className="flex-1 xl:flex-none bg-blue-900/20 border border-blue-500/30 px-6 py-3 rounded-xl text-xs font-black text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-[0_0_15px_rgba(59,130,246,0.1)]">
              🧠 喚醒 Gemini 幕僚
            </button>
          )}
          {authRole === 'super_admin' && (
            <button onClick={()=>setShowAiCopilot(!showAiCopilot)} className={`flex-1 xl:flex-none border px-6 py-3 rounded-xl text-xs transition-all ${showAiCopilot ? 'bg-cyan-600/30 border-cyan-400 text-cyan-300 shadow-[0_0_15px_rgba(34,211,238,0.3)]' : 'bg-slate-800 border-white/10 text-cyan-500 hover:text-white'}`}>🤖 AI 戰情分析</button>
          )}
          <button onClick={()=>setMT('tools')} className="flex-1 xl:flex-none bg-[#0a0a0a] border border-white/5 px-6 py-3 rounded-xl text-xs text-white hover:bg-slate-900 transition-all"><Settings size={16}/> 系統工具</button>
          <button onClick={onLogout} className="flex-1 xl:flex-none bg-rose-950/20 text-rose-500 px-6 py-3 rounded-xl text-xs border border-rose-500/10">安全退出</button>
        </div>
      </div>

      {/* 🤖 智慧 AI 戰情分析面板 (OLED 純黑科技版) */}
      {showAiCopilot && (
        <div className="glass-panel p-6 md:p-8 rounded-[2.5rem] mb-6 border border-cyan-500/30 bg-cyan-950/10 shadow-[0_0_40px_rgba(6,182,212,0.1)] animate-zoom relative overflow-hidden">
          <div className="scan-line bg-cyan-500/50 shadow-[0_0_15px_#06b6d4]"></div>
          
          <div className="flex justify-between items-start mb-8 relative z-10 border-b border-cyan-500/20 pb-4">
            <div className="flex items-center gap-4">
              <Bot size={36} className="text-cyan-400 animate-pulse drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]" />
              <div>
                <h3 className="text-xl text-cyan-300 font-black tracking-[0.2em] italic uppercase">AI Copilot / 核心分析引擎</h3>
                <p className="text-[10px] text-slate-400 font-mono mt-1">NEURAL_NETWORK_ACTIVE // 實時數據深度掃描中...</p>
              </div>
            </div>
            <button onClick={() => setShowAiCopilot(false)} className="text-cyan-500 hover:text-white transition-colors bg-cyan-950/30 p-2 rounded-full border border-cyan-500/30"><X size={16}/></button>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 relative z-10">
            <div className="bg-[#050505] p-6 rounded-3xl border border-white/5 relative overflow-hidden group hover:border-blue-500/30 transition-colors">
              <div className="absolute top-0 right-0 w-20 h-20 bg-blue-500/10 rounded-bl-full -z-10 group-hover:bg-blue-500/20 transition-colors"></div>
              <p className="text-[10px] text-blue-500 mb-3 uppercase font-black tracking-widest flex items-center gap-2"><Star size={12}/> 最佳效能實體</p>
              <p className="text-3xl text-white italic font-black mb-1">{aiInsights.topDriver ? aiInsights.topDriver.name : 'NO_DATA'}</p>
              <p className="text-[10px] text-slate-500 font-mono tracking-widest">
                貢獻總件數: <span className="text-blue-400">{aiInsights.topDriver ? (Number(aiInsights.topDriver.total_del||0) + Number(aiInsights.topDriver.total_pkp||0)) : 0}</span> 件
              </p>
            </div>

            <div className="bg-[#050505] p-6 rounded-3xl border border-white/5 relative overflow-hidden group hover:border-amber-500/30 transition-colors">
              <div className="absolute top-0 right-0 w-20 h-20 bg-amber-500/10 rounded-bl-full -z-10 group-hover:bg-amber-500/20 transition-colors"></div>
              <p className="text-[10px] text-amber-500 mb-3 uppercase font-black tracking-widest flex items-center gap-2"><Alert size={12}/> 系統異常警示</p>
              <p className="text-3xl text-white italic font-black mb-1">{aiInsights.conflictCount} <span className="text-sm text-slate-600 not-italic font-mono">CASES</span></p>
              <p className="text-[10px] text-slate-500 font-mono tracking-widest">未排除之衝突報備與攔截</p>
            </div>

            <div className="bg-[#050505] p-6 rounded-3xl border border-rose-500/20 relative overflow-hidden group hover:border-rose-500/50 shadow-[inset_0_0_20px_rgba(225,29,72,0.05)] transition-colors">
              <div className="absolute top-0 right-0 w-20 h-20 bg-rose-500/10 rounded-bl-full -z-10 group-hover:bg-rose-500/20 transition-colors"></div>
              <p className="text-[10px] text-rose-500 mb-3 uppercase font-black tracking-widest flex items-center gap-2"><Skull size={12}/> AI 高風險預測</p>
              <p className="text-3xl text-rose-400 italic font-black mb-1">{aiInsights.riskList.length} <span className="text-sm text-rose-900 not-italic font-mono">TARGETS</span></p>
              <p className="text-[10px] text-slate-500 font-mono tracking-widest">產出極低且具備潛在流失/造假風險</p>
            </div>
          </div>
        </div>
      )}

      {/* 戰情頁籤與搜尋 */}
      <div className="glass-panel p-5 rounded-[2.5rem] mb-6 space-y-4">
        <div className="flex gap-2">
          {['formal', 'pending', 'intercept'].map(t => (
            <button key={t} onClick={()=>setAdminTab(t)} className={`flex-1 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${adminTab===t?'bg-blue-600 text-white shadow-lg':'bg-black text-slate-500'}`}>
              {t==='formal'?'現役':t==='pending'?'待審':'攔截'}
            </button>
          ))}
        </div>
        <div className="flex items-center gap-3 bg-black p-4 rounded-2xl border border-white/5 shadow-inner">
          <Search size={18} className="text-blue-500" />
          <input placeholder="搜尋實體識別碼..." className="bg-transparent border-none outline-none text-white text-sm w-full" value={sq} onChange={e=>setSq(e.target.value)} />
        </div>
      </div>

      {/* 司機卡片列表 */}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 pb-32">
        {displayList.map(p => (
          <div key={p.id} className={`p-6 rounded-[2rem] bg-[#050505] border ${p.is_blacklisted ? 'border-rose-900 shadow-[0_0_20px_#e11d481a]' : 'border-white/5'} relative group hover:border-white/20 transition-all duration-300`}>
            {/* 按鈕組 */}
            <div className="absolute top-5 right-5 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              {authRole === 'super_admin' && (
                <button 
                  onClick={async (e) => {
                    e.stopPropagation();
                    if(window.confirm(`確定將 ${p.name} 列入黑名單？`)) {
                      await updateField(p.id, 'is_blacklisted', !p.is_blacklisted);
                      writeGodLog("黑名單變動", `實體: ${p.name}`);
                    }
                  }}
                  className="p-2 bg-black border border-white/10 rounded-xl text-slate-600 hover:text-rose-500 transition-all"
                >
                  <Skull size={14}/>
                </button>
              )}
              <button onClick={(e)=>{e.stopPropagation(); setChatTarget(p);}} className="bg-blue-900/20 text-blue-500 p-2 rounded-xl border border-blue-500/20"><Message size={14}/></button>
            </div>

            <div onClick={()=>setDetailTarget(p)} className="cursor-pointer">
              <h4 className="text-xl text-white italic font-black mb-1">{p.name} {p.priority_access && <Shield size={14} className="text-fuchsia-500 inline ml-1" />}</h4>
              <p className="text-[10px] text-slate-600 font-mono mb-6">{p.phone}</p>
              
              <div className="grid grid-cols-2 gap-2 mb-4">
                <div className="bg-black p-3 rounded-2xl border border-white/5 text-center">
                  <p className="text-[8px] text-slate-500 font-black mb-1">正件</p>
                  <p className="text-lg text-blue-500 italic">{(Number(p.total_del)||0)}</p>
                </div>
                <div className="bg-black p-3 rounded-2xl border border-white/5 text-center">
                  <p className="text-[8px] text-slate-500 font-black mb-1">逆收</p>
                  <p className="text-lg text-amber-500 italic">{(Number(p.total_pkp)||0)}</p>
                </div>
              </div>
              
              {/* 狀態標籤 */}
              <div className="flex flex-wrap gap-2">
                {p.is_blacklisted && <span className="text-[8px] bg-rose-600 text-white px-2 py-0.5 rounded-lg italic">BLACKLISTED</span>}
                {p.has_conflict && <span className="text-[8px] bg-amber-600 text-white px-2 py-0.5 rounded-lg animate-pulse italic">CONFLICT</span>}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* ⚙️ 上帝開關面板 (工具箱) */}
      {mT === 'tools' && (
        <div className="fixed inset-0 bg-black/98 z-[9999] flex items-center justify-center p-6 animate-zoom" onClick={()=>setMT(null)}>
          <div className="bg-[#050505] border border-white/10 p-10 rounded-[3rem] max-w-md w-full relative h-[80vh] overflow-y-auto custom-scrollbar" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setMT(null)} className="absolute top-8 right-8 text-white"><X size={20}/></button>
            <p className="text-blue-500 text-center text-[10px] tracking-[0.4em] mb-10 italic font-black">GOD COMMAND PANEL</p>
            
            <div className="space-y-6">
              {/* 🧠 神經網路 API 金鑰設定 */}
              <div className="bg-blue-950/10 p-5 rounded-3xl border border-blue-500/30 shadow-inner">
                <p className="text-[10px] text-blue-400 mb-3 uppercase font-black italic">🧠 Gemini AI 核心連線金鑰</p>
                <div className="flex gap-2 mb-2">
                  <input type="password" placeholder="貼上 Google Gemini API Key..." className="flex-1 bg-black p-3 rounded-xl text-xs text-white outline-none border border-white/5 focus:border-blue-500" value={geminiToken} onChange={e=>{setGeminiToken(e.target.value); localStorage.setItem('ggsoc_gemini_token', e.target.value);}} />
                  <button onClick={()=>{showToast(geminiToken ? "✅ Gemini 神經網路已綁定" : "已清除金鑰");}} className="bg-blue-600 text-white px-4 py-3 rounded-xl text-[10px] font-black hover:bg-blue-500 transition-colors">寫入</button>
                </div>
                <p className="text-[8px] text-slate-500 leading-relaxed">綁定後，即可在主控台喚醒 Gemini 幕僚，進行自然語言營運分析。</p>
              </div>

              {/* 開關：AI 自動駕駛 */}
              <div className={`p-5 rounded-3xl border transition-all ${globalSettings?.ai_auto_pilot ? 'bg-cyan-950/20 border-cyan-500/30' : 'bg-black border-white/5'}`}>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-xs text-white font-black">AI_AUTO_PILOT / 自動駕駛</span>
                  <button onClick={()=>handleToggleSwitch('ai_auto_pilot', globalSettings?.ai_auto_pilot)} className={`w-12 h-6 rounded-full p-1 transition-all ${globalSettings?.ai_auto_pilot?'bg-cyan-500':'bg-slate-800'}`}>
                    <div className={`w-4 h-4 bg-white rounded-full transition-transform ${globalSettings?.ai_auto_pilot?'translate-x-6':'translate-x-0'}`} />
                  </button>
                </div>
                <p className="text-[8px] text-slate-600 italic">開啟後，AI 將自動核准無衝突之入職申請與薪資放行。</p>
              </div>

              {/* 開關：隱身模式 */}
              <div className={`p-5 rounded-3xl border transition-all ${globalSettings?.ghost_mode ? 'bg-fuchsia-950/20 border-fuchsia-500/30' : 'bg-black border-white/5'}`}>
                <div className="flex justify-between items-center mb-1">
                  <span className="text-xs text-white font-black">GHOST_MODE / 總裁隱身</span>
                  <button onClick={()=>handleToggleSwitch('ghost_mode', globalSettings?.ghost_mode)} className={`w-12 h-6 rounded-full p-1 transition-all ${globalSettings?.ghost_mode?'bg-fuchsia-600':'bg-slate-800'}`}>
                    <div className={`w-4 h-4 bg-white rounded-full transition-transform ${globalSettings?.ghost_mode?'translate-x-6':'translate-x-0'}`} />
                  </button>
                </div>
                <p className="text-[8px] text-slate-600 italic">啟動潛行模式，偽裝 UI 標籤並物理隔離黑名單成員。</p>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ==========================================
// 🚀 核心啟動引擎 (AppWrapper)
// ==========================================
function AppWrapper() {
  const [u, setU] = useState(null); 
  const [aR, setAR] = useState('guest'); 
  const [ps, setPs] = useState([]); 
  const [l, setL] = useState('gate'); 
  const [ld, setLd] = useState(true); 
  const [spI, setSpI] = useState(null);
  const [gs, setGs] = useState(null); 

  const cp = useMemo(() => ps.find(p => p.id === spI), [ps, spI]);

  useEffect(() => {
    const unA = onAuthStateChanged(auth, async (user) => { 
      if(user) { 
        setU(user); 
        const s = JSON.parse(localStorage.getItem('ggsoc_auth')) || {}; 
        if(s.phone) { setAR(s.role); setSpI(`p_${s.phone}`); setL(s.role==='driver'?'driver':'admin'); } 
      } else signInAnonymously(auth);
      setTimeout(() => setLd(false), 800);
    });
    return () => unA();
  }, []);

  useEffect(() => {
    if(!u) return;
    const unP = onSnapshot(collection(db,'artifacts',window.__app_id,'public','data','partners'), (s) => {
      setPs(s.docs.map(d=>({id:d.id,...d.data()})));
      // 自動巡檢總裁帳號
      if(!s.docs.find(d => d.data().phone === '0976017938')) {
        setDoc(doc(db,'artifacts',window.__app_id,'public','data','partners','p_0976017938'), { 
          id:'p_0976017938', name:'系統總裁', phone:'0976017938', pin:'8305319', status:'approved', total_del:0, total_pkp:0 
        });
      }
    });
    const unG = onSnapshot(doc(db,'artifacts',window.__app_id,'public','data','settings','global'), (d) => { if(d.exists()) setGs(d.data()); });
    return () => { unP(); unG(); };
  }, [u]);

  const writeGodLog = async (action, details) => { 
    await addDoc(collection(db, 'artifacts', window.__app_id, 'public', 'data', 'god_log'), { action, details, timestamp: Date.now() }); 
  };

  const handleLogin = (phone, pin) => {
    if (phone === "0976017938" && pin === "8305319") { 
      localStorage.setItem('ggsoc_auth', JSON.stringify({ phone, role: 'super_admin' })); 
      setAR('super_admin'); setL('admin'); setSpI(`p_${phone}`); 
      showToast("👑 造物主降臨，最高權限解鎖");
    } else {
      const p = ps.find(x => x.phone === phone && x.pin === pin); 
      if (p && p.status === 'approved') { 
        localStorage.setItem('ggsoc_auth', JSON.stringify({ phone, role: 'driver' })); 
        setAR('driver'); setSpI(p.id); setL('driver'); 
      } else showToast("⚠️ 識別失敗或權限不足", true);
    }
  };

  if (ld) return (
    <div className="h-screen flex flex-col items-center justify-center bg-black">
      <div className="loader mb-4"></div>
      <p className="text-blue-500 text-[10px] tracking-[0.5em] animate-pulse uppercase mt-4">GGSOC_SYSTEM_IGNITING...</p>
    </div>
  );

  return (
    <div className="min-h-screen text-slate-200">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none transition-all text-white"></div>
      
      {/* 門禁系統 */}
      {l === 'gate' && <div className="h-screen flex items-center justify-center bg-black p-6 animate-zoom">
        <div className="bg-[#050505] border border-white/5 p-10 rounded-[3rem] w-full max-w-sm text-center shadow-[0_0_50px_rgba(0,0,0,1)]">
           <Bot size={48} className="text-blue-500 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]" />
           <h1 className="text-2xl italic font-black mb-8 tracking-tighter text-white">GGSOC_TERMINAL</h1>
           <input id="login_phone" placeholder="PHONE" className="w-full bg-black p-4 rounded-2xl border border-white/5 mb-3 text-center text-sm outline-none focus:border-blue-500 transition-all font-mono" />
           <input id="login_pin" type="password" placeholder="PIN" className="w-full bg-black p-4 rounded-2xl border border-white/5 mb-8 text-center text-sm outline-none focus:border-blue-500 transition-all font-mono" />
           <button onClick={()=>handleLogin(document.getElementById('login_phone').value, document.getElementById('login_pin').value)} className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black italic shadow-[0_0_20px_rgba(37,99,235,0.4)] active:scale-95 transition-all text-white">ESTABLISH_LINK</button>
        </div>
      </div>}
      
      {l === 'admin' && (
        <AdminHub 
          authRole={aR} partners={ps} 
          onLogout={()=>{localStorage.removeItem('ggsoc_auth'); setL('gate');}} 
          updateField={async (id, f, v) => {
            const ref = doc(db, 'artifacts', window.__app_id, 'public', 'data', 'partners', id);
            await updateDoc(ref, f === null ? v : { [f]: v });
          }} 
          db={db} appId={window.__app_id} writeGodLog={writeGodLog} globalSettings={gs} 
        />
      )}
    </div>
  );
}

// 啟動引擎
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppWrapper />);
</script>
</body>
</html>
