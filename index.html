<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGI CORE | 智慧物流管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; }
        .aurora-bg {
            background: linear-gradient(135deg, #0f0c29, #1a1a4e, #0d3b4f, #0f2027, #1b0036);
            background-size: 400% 400%;
            animation: auroraShift 14s ease infinite;
        }
        @keyframes auroraShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card {
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.5rem;
        }
    </style>
</head>
<body class="aurora-bg min-h-screen text-white p-6">

    <header class="mb-10 text-center">
        <h1 class="text-4xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">LOGI CORE</h1>
        <p class="text-gray-400 mt-2 text-sm tracking-widest">在地物流有限公司 夥伴作業平台</p>
    </header>

    <main class="max-w-md mx-auto space-y-6">
        <div class="glass-card p-8 shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold">本期薪資預覽</h2>
                <span class="bg-blue-500/20 text-blue-300 text-xs px-2 py-1 rounded">系統自動對帳中</span>
            </div>
            
            <div id="payout-content" class="space-y-4">
                <div class="flex justify-between text-gray-300">
                    <span>核實件數</span>
                    <span id="final-count" class="font-mono">載入中...</span>
                </div>
                <div class="flex justify-between text-gray-300">
                    <span>二代健保 (2.11%)</span>
                    <span id="insurance-deduction" class="text-red-400">-$0</span>
                </div>
                <div class="pt-4 border-t border-white/10 flex justify-between items-baseline">
                    <span class="text-lg">實領總額</span>
                    <span id="net-pay" class="text-3xl font-bold text-green-400">$0</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 border-l-4 border-purple-500">
          <div class="flex items-start space-x-4">
            <div class="bg-purple-600 rounded-full p-2">👩‍💼</div>
            <div>
              <p class="text-sm font-bold text-purple-300">阿翔管家 (行政陳姐)</p>
              <p id="ai-response" class="text-sm mt-1 text-gray-200">
                夥伴辛苦啦！對件數有疑問可以直接問我喔捏～
              </p>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="window.location.reload()" class="glass-card p-4 text-center hover:bg-white/20 transition">🔄 刷新數據</button>
            <button onclick="promptCorrection()" class="glass-card p-4 text-center hover:bg-white/20 transition">✏️ 申請修正</button>
        </div>
    </main>

    <script>
        // --- 1. Firebase 初始化 (請確保 projectId 一致) ---
        const firebaseConfig = {
            projectId: "supreme-v92",
            // 系統會自動抓取你已經連結的 Firebase App
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. 薪資核心引擎 (15元/件, 2萬扣2.11%) ---
        function calculateSalary(count) {
            const UNIT_PRICE = 15;
            const gross = count * UNIT_PRICE;
            const insurance = gross > 20000 ? Math.round(gross * 0.0211) : 0;
            return { gross, insurance, net: gross - insurance };
        }

        // --- 3. 影子帳本寫入功能 ---
        async function writeGodLog(driver, oldVal, newVal, reason) {
            await db.collection('god_logs').add({
                operator: "系統管理員",
                target: driver,
                old_val: oldVal,
                new_val: newVal,
                reason: reason,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        // --- 4. 讀取與渲染數據 ---
        async function loadData() {
            const driverName = "測試夥伴"; // 之後接登入帳號
            const snapshot = await db.collection('ClockOutRecords')
                                     .where('driver', '==', driverName)
                                     .limit(1)
                                     .get();

            if (!snapshot.empty) {
                const doc = snapshot.docs[0];
                const data = doc.data();
                const count = data.momoPackages || 0;
                const salary = calculateSalary(count);

                // 更新介面
                document.getElementById('final-count').innerText = count + " 件";
                document.getElementById('insurance-deduction').innerText = "-$" + salary.insurance.toLocaleString();
                document.getElementById('net-pay').innerText = "$" + salary.net.toLocaleString();

                // 陳姐在地化回覆邏輯
                if (data.modify_reason) {
                    document.getElementById('ai-response').innerText = 
                        `陳姐幫你看了，件數有修正啦，原因是因為：『${data.modify_reason}』。辛苦了捏～`;
                }
            }
        }

        // --- 5. 模擬修正功能 (老闆/會計測試用) ---
        async function promptCorrection() {
            const newCount = prompt("請輸入修正後的件數：");
            const reason = prompt("請輸入修正原因 (將同步至影子帳本)：");
            
            if(newCount && reason) {
                // 這裡執行更新 ClockOutRecords 的動作 (省略細節)
                alert("修正已送出，影子帳本已同步。");
            }
        }

        loadData();
    </script>
</body>
</html>
