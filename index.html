<head>

  <title>金耀智慧營運總部 v37.0 (企業旗艦版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
    .gold-border { border: 1px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 1rem; font-weight: bold; outline: none; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: #f59e0b; color: black; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
    .btn-prime:active { transform: translateY(2px); }
    .btn-prime:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }
    .ghost-input { background: transparent; border: none; outline: none; text-align: center; color: white; font-weight: bold;}
    .admin-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    .admin-table th { padding: 12px; background: rgba(0,0,0,0.4); color: #94a3b8; font-size: 12px; }
    .admin-table td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-online { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot-offline { background-color: #64748b; }
    .dot-leave { background-color: #f43f5e; box-shadow: 0 0 8px #f43f5e; }
    .dot-pending { background-color: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    .receipt-paper { background: #fff; color: #111; padding: 20px; border-radius: 8px; font-family: monospace; border-top: 4px dashed #ccc; border-bottom: 4px dashed #ccc; }
    .chat-bubble { padding: 12px 16px; border-radius: 16px; max-width: 80%; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
    .bubble-bot { background: rgba(255,255,255,0.1); color: white; align-self: flex-start; }
    .bubble-user { background: #f59e0b; color: black; align-self: flex-end; margin-left: auto; }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();
    const appId = 'supreme-v92';

    const INSURANCE_BRACKETS = [
      { salary: 29500, labor: 738, health: 458 }, { salary: 30300, labor: 758, health: 470 },
      { salary: 31800, labor: 795, health: 493 }, { salary: 33300, labor: 833, health: 516 },
      { salary: 34800, labor: 870, health: 540 }, { salary: 36300, labor: 908, health: 563 },
      { salary: 38200, labor: 955, health: 592 }, { salary: 40100, labor: 1002, health: 622 },
      { salary: 42000, labor: 1050, health: 651 }, { salary: 43900, labor: 1098, health: 681 },
      { salary: 45800, labor: 1145, health: 710 }, { salary: 48200, labor: 1145, health: 748 },
      { salary: 50600, labor: 1145, health: 785 }, { salary: 53000, labor: 1145, health: 822 },
      { salary: 55400, labor: 1145, health: 859 }, { salary: 57800, labor: 1145, health: 896 },
      { salary: 60800, labor: 1145, health: 943 }, { salary: 63800, labor: 1145, health: 990 },
      { salary: 66800, labor: 1145, health: 1036 }, { salary: 69800, labor: 1145, health: 1083 },
      { salary: 72800, labor: 1145, health: 1129 }
    ];

    // 🎯 圖片壓縮引擎 (省流量神器)
    const compressImage = (file, maxWidth = 800) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const scaleSize = maxWidth / img.width;
            canvas.width = maxWidth;
            canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => { resolve(blob); }, 'image/jpeg', 0.7); // 70% 壓縮率
          };
        };
      });
    };

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState('guest'); 
      const [partners, setPartners] = useState([]);
      const [layer, setLayer] = useState('gate'); 
      const [loading, setLoading] = useState(true);
      const [announcement, setAnnouncement] = useState("");
      const [searchQuery, setSearchQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState('active'); 
      const [showSensitive, setShowSensitive] = useState({}); 
      const [toastMsg, setToastMsg] = useState("");

      const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(""), 3000); };

      useEffect(() => {
        auth.signInAnonymously();
        
        // 🎯 5秒防卡死解鎖機制
        const unlockTimer = setTimeout(() => { setLoading(false); }, 5000);

        const unsubPartners = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners')
          .onSnapshot(snap => { 
            setPartners(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))); 
            setLoading(false); 
            clearTimeout(unlockTimer);
          });
          
        const unsubAnn = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('announcement')
          .onSnapshot(snap => { if (snap.exists) setAnnouncement(snap.data().content); });
        
        const sid = localStorage.getItem('ggsoc_sid');
        if (sid) {
          try {
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions').doc(sid).get().then(s => {
              if (s.exists) handleAutoNavigation(s.data().phone, s.data().pin);
            });
          } catch (e) {}
        }
        return () => { unsubPartners(); unsubAnn(); clearTimeout(unlockTimer); };
      }, []);

      const handleAutoNavigation = (phone, pin) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          setRole('admin'); setLayer('admin');
        } else {
          const p = partners.find(x => x.phone === phone && x.pin === pin && x.status === 'active');
          if (p) { setRole('driver'); setLayer('driver'); }
        }
      };

      const handleLogin = async (phone, pin, remember) => {
        // 會計/老闆專屬最高權限帳號
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          if (remember) {
            const sid = btoa(phone + Date.now());
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions').doc(sid).set({ phone, pin, role: 'admin' });
            localStorage.setItem('ggsoc_sid', sid);
          }
          setRole('admin'); setLayer('admin'); showToast("🔑 指揮中心權限已開啟"); return;
        }

        const p = partners.find(x => x.phone === phone && x.pin === pin);
        if (p) {
          if (p.status === 'inactive') return alert("此帳號已停權或離職，請聯絡管理員。");
          if (p.status === 'interview_reviewing') return alert("您的資料正在審核中，通過後方可登入建檔。");
          if (p.status === 'pending_upload') return alert("請先完成「第二步：資料建檔通道」再進行登入。");
          
          if (remember) {
            const sid = btoa(phone + Date.now());
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions').doc(sid).set({ phone, pin, role: 'driver' });
            localStorage.setItem('ggsoc_sid', sid);
          }
          setUser(p); setRole('driver'); setLayer('driver'); showToast("🔑 夥伴登入成功");
        } else {
          alert("帳號驗證失敗，請檢查手機號碼與 PIN 碼");
        }
      };

      const handleLogout = () => { localStorage.removeItem('ggsoc_sid'); setUser(null); setRole('guest'); setLayer('gate'); };

      if (loading) return <div className="min-h-screen flex flex-col items-center justify-center"><div className="w-12 h-12 border-4 border-amber-500/10 border-t-amber-500 rounded-full animate-spin mb-4"></div><p className="text-amber-500 font-black animate-pulse">連線資料庫中...</p></div>;

      return (
        <div className="min-h-screen text-slate-200">
          <div className={`fixed left-1/2 -translate-x-1/2 bg-amber-500 text-black px-8 py-4 rounded-full font-black z-[10000] shadow-2xl transition-all duration-500 ${toastMsg ? 'top-[40px] opacity-100' : 'top-[-100px] opacity-0 pointer-events-none'}`}>{toastMsg}</div>
          {layer === 'gate' && <Gate onLogin={handleLogin} announcement={announcement} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={partners} onLogout={handleLogout} showSensitive={showSensitive} setShowSensitive={setShowSensitive} statusFilter={statusFilter} setStatusFilter={setStatusFilter} searchQuery={searchQuery} setSearchQuery={setSearchQuery} db={db} appId={appId} showToast={showToast} announcement={announcement} />}
          {layer === 'driver' && <DriverHub partners={partners} onLogout={handleLogout} user={user} db={db} appId={appId} showToast={showToast} storage={storage} />}
          {layer === 'onboarding' && <OnboardingFlow setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
          {layer === 'upload' && <UploadFlow setLayer={setLayer} db={db} appId={appId} showToast={showToast} storage={storage} />}
        </div>
      );
    }

    // ==========================================
    // 1. 入口層
    // ==========================================
    function Gate({ onLogin, announcement, setLayer }) {
      const [ph, setPh] = useState(""); const [pin, setPin] = useState(""); const [rem, setRem] = useState(false);
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 relative">
          <div className="mb-12 text-center relative z-10">
            <h1 className="text-7xl font-black text-white italic tracking-tighter mb-2 drop-shadow-2xl">在地物流</h1>
            <p className="text-amber-500 text-[10px] tracking-[0.5em] font-black border border-amber-500/30 px-4 py-1.5 rounded-full inline-block uppercase shadow-lg">Operation Hub v37.0</p>
          </div>
          <div className="w-full max-w-[340px] space-y-5 relative z-10 font-bold">
            <div className="glass-panel p-8 rounded-[2.5rem] shadow-2xl gold-border">
              <input type="tel" placeholder="手機號碼" className="input-box" value={ph} onChange={e => setPh(e.target.value)} maxLength={10} />
              <input type="password" placeholder="PIN 安全碼" className="input-box" value={pin} onChange={e => setPin(e.target.value)} maxLength={4} />
              <div className="flex items-center justify-center gap-2 pb-6">
                <input type="checkbox" id="rem_me" checked={rem} onChange={e => setRem(e.target.checked)} className="w-4 h-4 accent-amber-500 rounded bg-slate-800" />
                <label htmlFor="rem_me" className="text-slate-400 text-[11px] font-black cursor-pointer italic">記住我 (自動跳轉登入)</label>
              </div>
              <button onClick={() => onLogin(ph, pin, rem)} className="btn-prime italic tracking-widest">進入中心</button>
            </div>
            {announcement && (
              <div className="glass-panel p-5 rounded-2xl bg-amber-900/10 border border-amber-500/20 text-center">
                <p className="text-amber-500 font-bold text-xs uppercase mb-1 tracking-widest animate-pulse">📢 最新通報</p>
                <p className="text-white text-sm font-black leading-relaxed">{announcement}</p>
              </div>
            )}
            <div className="space-y-3 pt-4 text-center">
              {/* 🎯 修改按鈕名稱，隱藏 AI */}
              <button onClick={() => setLayer('onboarding')} className="w-full py-4 rounded-2xl border border-amber-500/30 text-amber-500 font-bold text-sm bg-amber-900/10 hover:bg-amber-900/20 shadow-lg">📋 第一步：線上初試系統</button>
              <button onClick={() => setLayer('upload')} className="w-full py-4 rounded-2xl border border-orange-500/30 text-orange-400 font-bold text-sm bg-orange-900/10 hover:bg-orange-900/20 shadow-lg">📁 第二步：資料建檔通道</button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 指揮中心 (加入新人審核與銀行資料編輯)
    // ==========================================
    function AdminHub({ partners, onLogout, showSensitive, setShowSensitive, statusFilter, setStatusFilter, searchQuery, setSearchQuery, db, appId, showToast, announcement }) {
      const [historyData, setHistoryData] = useState(null);
      const [editProfile, setEditProfile] = useState(null);
      const [reviewReport, setReviewReport] = useState(null);
      const [showSalaryFor, setShowSalaryFor] = useState(null); 
      const [showScheduleFor, setShowScheduleFor] = useState(null); 
      const [monthlyData, setMonthlyData] = useState(null);
      const [isGeneratingMonth, setIsGeneratingMonth] = useState(false);
      const [showTools, setShowTools] = useState(false);

      const getToday = () => new Date().toLocaleDateString('en-CA');
      const getCurrentMonthStr = () => getToday().substring(0, 7); 

      const filteredPartners = useMemo(() => {
        let result = partners.filter(p => (p.name && p.name.includes(searchQuery)) || (p.phone && p.phone.includes(searchQuery)));
        
        if (statusFilter === 'active') result = result.filter(p => p.status === 'active');
        if (statusFilter === 'inactive') result = result.filter(p => p.status === 'inactive');
        if (statusFilter === 'interview') result = result.filter(p => p.status === 'interview_reviewing'); // 🎯 篩選待審核新人
        
        const today = getToday();
        if (statusFilter === 'pending') result = result.filter(p => p.status === 'active' && p.report_status === 'pending');
        if (statusFilter === 'leave') result = result.filter(p => p.status === 'active' && p.schedule?.[today] === 'leave');
        return result;
      }, [partners, searchQuery, statusFilter]);

      const calculateNet = (p) => (p.total_del * (p.custom_del_price || 15)) + (p.total_pkp * (p.custom_pkp_price || 10)) + (p.custom_adj || 0) - (p.labor_fee || 0) - (p.health_fee || 0);

      const totals = useMemo(() => {
        return filteredPartners.reduce((acc, p) => {
          if (p.report_status === 'rejected' || p.status !== 'active') return acc;
          return { del: acc.del + (p.total_del || 0), pkp: acc.pkp + (p.total_pkp || 0), net: acc.net + calculateNet(p) };
        }, { del: 0, pkp: 0, net: 0 });
      }, [filteredPartners]);

      const handleUpdateField = async (id, field, val) => await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(id).update({ [field]: Number(val) });

      const handleBracketChange = async (p, val) => {
        const newSalary = Number(val);
        if (newSalary === 0) { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({ insured_salary: 0, labor_fee: 0, health_fee: 0 }); return; }
        const bracket = INSURANCE_BRACKETS.find(b => b.salary === newSalary);
        if (bracket) {
          const healthFee = bracket.health * (1 + Math.min(p.dependents || 0, 3)); 
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({ insured_salary: bracket.salary, labor_fee: bracket.labor, health_fee: healthFee });
        }
      };

      const handleDependentsChange = async (p, val) => {
        const deps = Number(val); const salary = p.insured_salary || 0; let newHealth = 0;
        if (salary > 0) { const bracket = INSURANCE_BRACKETS.find(b => b.salary === salary); if(bracket) newHealth = bracket.health * (1 + Math.min(deps, 3)); }
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({ dependents: deps, health_fee: newHealth });
      };

      // 🎯 新人審核通過 (允許建檔)
      const handleApproveOnboard = async (id) => {
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(id).update({ status: 'pending_upload' });
        showToast("✅ 已允許該員進行資料建檔");
      };

      const handleApprove = async () => { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(reviewReport.id).update({ report_status: 'approved' }); showToast("✅ 單據已通過"); setReviewReport(null); };
      const handleReject = async () => {
        if(window.confirm("確定要退回此單據嗎？")) {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(reviewReport.id).update({ report_status: 'rejected', total_del: 0, total_pkp: 0, work_status: 'offline', last_report: firebase.firestore.FieldValue.delete() });
          showToast("❌ 已退回單據"); setReviewReport(null);
        }
      };

      const handleBatchApprove = async () => {
        const pendingPartners = partners.filter(p => p.report_status === 'pending');
        if (pendingPartners.length === 0) return showToast("⚠️ 目前沒有需要審核的單據喔！");
        if(window.confirm(`⚡ 確定要一鍵通過這 ${pendingPartners.length} 筆待審核單據嗎？`)) {
          const batch = db.batch();
          pendingPartners.forEach(p => { batch.update(db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id), { report_status: 'approved' }); });
          await batch.commit(); showToast(`✅ 已成功批次核准 ${pendingPartners.length} 筆單據！`);
        }
      };

      const generateMonthlyReport = async () => { /* ...略...維持上一版的強大功能 */ setIsGeneratingMonth(true); const currentMonth = getCurrentMonthStr(); let generatedReport = []; try { const activePartners = partners.filter(p => p.status === 'active'); for(let p of activePartners) { const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).collection('history').where('date', '>=', `${currentMonth}-01`).where('date', '<=', `${currentMonth}-31`).get(); let mDel = 0, mPkp = 0, workDays = 0; snap.forEach(doc => { mDel += doc.data().del || 0; mPkp += doc.data().pkp || 0; workDays += 1; }); const gross = (mDel * (p.custom_del_price||15)) + (mPkp * (p.custom_pkp_price||10)) + (p.custom_adj||0); const net = gross - (p.labor_fee||0) - (p.health_fee||0); generatedReport.push({ ...p, mDel, mPkp, workDays, gross, net }); } setMonthlyData({ month: currentMonth, data: generatedReport }); showToast("📊 本月結算大表已生成！"); } catch(err) { showToast("❌ 產出報表失敗"); } finally { setIsGeneratingMonth(false); } };

      const exportMonthlyCSV = () => {
        if(!monthlyData) return;
        // 🎯 CSV 匯出新增銀行資訊
        const headers = "夥伴姓名,銀行代碼,銀行帳號,出勤天數,整月正件數,整月逆收數,正件單價,逆收單價,系統獎金,扣勞保,扣健保,本月實領總額\n";
        const rows = monthlyData.data.map(p => `${p.name},${p.bank_code||'未填'},${p.bank_account||'未填'},${p.workDays},${p.mDel},${p.mPkp},${p.custom_del_price||15},${p.custom_pkp_price||10},${p.custom_adj||0},${p.labor_fee||0},${p.health_fee||0},${p.net}`).join("\n");
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), headers + rows], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a"); link.href = url; link.download = `營運總部_${monthlyData.month}_月結總表.csv`; link.click();
        showToast("📥 月結算表已下載完成！");
      };

      const saveProfileEdit = async () => {
        const newName = document.getElementById('edit_name').value;
        const newPhone = document.getElementById('edit_phone').value;
        const newPin = document.getElementById('edit_pin').value;
        const newBankCode = document.getElementById('edit_bank_code').value;
        const newBankAccount = document.getElementById('edit_bank_account').value;
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(editProfile.id).update({ 
          name: newName, phone: newPhone, pin: newPin, bank_code: newBankCode, bank_account: newBankAccount 
        });
        setEditProfile(null); showToast("✅ 人事檔案修改成功");
      };

      const toggleSchedule = async (dateStr) => { /* ...排班功能... */ const currentSchedule = showScheduleFor.schedule || {}; const isLeave = currentSchedule[dateStr] === 'leave'; const updatedSchedule = { ...currentSchedule, [dateStr]: isLeave ? 'work' : 'leave' }; await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(showScheduleFor.id).update({ schedule: updatedSchedule }); setShowScheduleFor({ ...showScheduleFor, schedule: updatedSchedule }); };
      const next7Days = Array.from({length: 7}, (_, i) => { const d = new Date(); d.setDate(d.getDate() + i); return d.toLocaleDateString('en-CA'); });

      return (
        <div className="p-4 lg:p-10 max-w-[1700px] mx-auto overflow-x-auto relative">

                  const net = calculateNet(p);
                  const isLeave = p.schedule?.[getToday()] === 'leave'; 
                  const hasReported = p.last_report?.date === getToday();
                  const isMasked = !showSensitive[p.id];
                  const isPending = hasReported && p.report_status === 'pending';
                  const isApproved = hasReported && p.report_status === 'approved';
                  
                  // 🎯 如果是正在新人審核階段，改變整行外觀
                  if (p.status === 'interview_reviewing') {
                    return (
                      <tr key={p.id} className="border-b border-indigo-900/50 bg-indigo-950/20">

                        <td className="text-left pl-4">

                            <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(p.id).update({status:'inactive'})} className="bg-rose-900 text-rose-300 px-3 py-2 rounded-lg text-xs font-black">❌ 婉拒</button>

                  return (
                    <tr key={p.id} className={`border-b border-slate-800/50 hover:bg-slate-800/30 transition ${p.status === 'inactive' ? 'opacity-50 grayscale' : ''}`}>
                      <td>
                        <div className="flex flex-col items-center justify-center gap-1">
                          <div>
                            <span className={`status-dot ${isLeave ? 'dot-leave' : (isApproved ? 'dot-online' : (isPending ? 'dot-pending' : 'dot-offline'))}`}></span>
                            <span className={`text-xs font-black ${isLeave ? 'text-rose-400' : (isApproved ? 'text-emerald-400' : (isPending ? 'text-amber-400' : 'text-slate-500'))}`}>
                              {p.status === 'inactive' ? '離職' : (isLeave ? '休假' : (hasReported ? (isPending ? '待審核' : '已核准') : '未報'))}
                            </span>
                          </div>
                          {p.report_img && (
                            <button onClick={() => setReviewReport(p)} className="bg-amber-600/20 text-amber-500 border border-amber-500/50 hover:bg-amber-500 hover:text-black px-3 py-1 rounded-full text-[10px] font-black transition shadow-lg mt-1">📸 看單據</button>
                          )}
                        </div>
                      </td>
                      <td className="text-left pl-4">
                        <span className="text-white font-black text-xl mr-2">{p.name}</span>
                        <button onClick={() => setShowSensitive(prev => ({...prev, [p.id]: !prev[p.id]}))} className="text-slate-500 hover:text-amber-500">{isMasked ? '🙈' : '👁️'}</button>
                        <p className="text-xs font-black mt-1 text-slate-500">📞 {isMasked ? p.phone?.replace(/(\d{4})\d{3}(\d{3})/, "$1***$2") : p.phone}</p>
                      </td>

                        <div className="flex flex-col items-center gap-1">

                          <div className="flex items-center"><span className="text-[10px] text-orange-500 mr-1 font-black">逆</span><input type="number" defaultValue={p.custom_pkp_price||10} onBlur={e=>handleUpdateField(p.id, 'custom_pkp_price', e.target.value)} className="ghost-input w-12 text-sm text-orange-400 bg-slate-900 rounded-md p-1 border border-slate-700" /></div>

                      <td>

                          <option value="0">未投保 ($0)</option>

                      <td><input type="number" defaultValue={p.custom_adj||0} onBlur={e=>handleUpdateField(p.id, 'custom_adj', e.target.value)} className="ghost-input w-16 text-emerald-400 bg-slate-900 border border-slate-700 rounded-lg p-2 font-black focus:border-emerald-500" /></td>
                      <td className="text-amber-500 font-black italic text-2xl">${net.toLocaleString()}</td>
                      <td>
                        <div className="grid grid-cols-2 gap-2 w-32 mx-auto">

                          <button onClick={() => setShowScheduleFor(p)} className="bg-sky-900/50 text-sky-400 border border-sky-700/50 hover:bg-sky-600 hover:text-white px-2 py-2 rounded-lg text-[10px] font-black transition">📅 排班</button>
                          <button onClick={() => setEditProfile(p)} className="bg-indigo-900/50 text-indigo-300 border border-indigo-700/50 hover:bg-indigo-600 hover:text-white px-2 py-2 rounded-lg text-[10px] font-black transition">⚙️ 檔案</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* 月結算大表與其他 Modal */}
          {monthlyData && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[800] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-6xl rounded-[2rem] p-8 gold-border relative flex flex-col max-h-[90vh]">
                <button onClick={() => setMonthlyData(null)} className="absolute top-6 right-8 text-slate-400 hover:text-white text-3xl font-black">✕</button>
                <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                  <div><h3 className="font-black text-3xl text-amber-500">📊 營運總部月結算大表</h3><p className="text-white font-bold mt-1">結算月份：{monthlyData.month}</p></div>
                  <button onClick={exportMonthlyCSV} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-black shadow-lg hover:bg-emerald-500 transition">📥 匯出 網銀格式 (CSV)</button>
                </div>
                <div className="flex-1 overflow-auto rounded-xl border border-slate-700">
                  <table className="admin-table w-full">
                    <thead className="bg-slate-900 sticky top-0">
                      <tr>
                        <th className="text-left pl-4">夥伴姓名</th>
                        <th>銀行代碼</th>
                        <th>銀行帳號</th>
                        <th>出勤天數</th>
                        <th>整月正件</th>
                        <th>整月逆收</th>
                        <th className="text-rose-400">月扣勞保</th>
                        <th className="text-rose-400">月扣健保</th>
                        <th className="text-amber-500 text-lg">結算實領總額</th>
                      </tr>
                    </thead>
                    <tbody>
                      {monthlyData.data.map((row, i) => (
                        <tr key={i} className="border-b border-slate-800 hover:bg-slate-800/50">
                          <td className="text-left pl-4 text-white font-black text-lg">{row.name}</td>
                          <td className="font-bold text-slate-400">{row.bank_code || '未填寫'}</td>
                          <td className="font-bold text-slate-400">{row.bank_account || '未填寫'}</td>
                          <td className="font-bold text-sky-300">{row.workDays} 天</td>
                          <td className="font-bold">{row.mDel} 件</td>
                          <td className="font-bold">{row.mPkp} 件</td>
                          <td className="font-bold text-rose-400">-${row.labor_fee||0}</td>
                          <td className="font-bold text-rose-400">-${row.health_fee||0}</td>
                          <td className="font-black text-amber-500 text-2xl italic">${row.net.toLocaleString()}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {reviewReport && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-[500] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-lg rounded-[2rem] p-6 gold-border flex flex-col max-h-[90vh] relative">
                <h3 className="font-black text-xl text-white mb-4">📸 檢視單據 - {reviewReport.name}</h3>
                <div className="flex-1 overflow-auto bg-slate-900 rounded-xl mb-6 flex justify-center items-center min-h-[300px] border border-slate-700">
                   {reviewReport.report_img ? <img src={reviewReport.report_img} className="max-w-full h-auto object-contain rounded-lg shadow-xl" /> : <p className="text-slate-500 font-bold">無圖片資料</p>}
                </div>
                {reviewReport.report_status === 'pending' ? (
                  <div className="flex gap-4">
                    <button onClick={handleApprove} className="flex-1 bg-emerald-600 text-white font-black py-4 rounded-xl shadow-lg">✅ 通過</button>
                    <button onClick={handleReject} className="flex-1 bg-rose-700 text-white font-black py-4 rounded-xl shadow-lg">❌ 退回</button>

                  <div className="text-center text-amber-500 font-black py-2">✅ 此單據已核准完成</div>

          {editProfile && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[400] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 gold-border relative">

                  <div className="flex gap-2">
                    <div className="w-1/3"><label className="text-xs text-slate-400 ml-2">銀行代碼</label><input id="edit_bank_code" defaultValue={editProfile.bank_code} className="input-box !mb-0" maxLength="3"/></div>
                    <div className="flex-1"><label className="text-xs text-slate-400 ml-2">銀行帳號</label><input id="edit_bank_account" defaultValue={editProfile.bank_account} className="input-box !mb-0" /></div>
                  </div>

                  <button onClick={saveProfileEdit} className="flex-1 bg-emerald-600 text-white font-black py-3 rounded-xl shadow-lg">💾 儲存</button>
                  <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(editProfile.id).delete()} className="flex-1 bg-slate-800 text-rose-500 font-black py-3 rounded-xl border border-rose-900 hover:bg-rose-900 transition">🗑️ 刪除</button>
                </div>
                <button onClick={() => setEditProfile(null)} className="absolute top-6 right-6 text-slate-400 text-2xl font-black">✕</button>

    // ==========================================
    // 3. 司機工作台 
    // ==========================================
    function DriverHub({ partners, onLogout, user, appId, db, showToast, storage }) {
      const [delCount, setDelCount] = useState(""); const [pkpCount, setPkpCount] = useState("");
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [showEdit, setShowEdit] = useState(false); 
      const currentPartner = partners.find(p => p.id === user.id) || user;
      const [editName, setEditName] = useState(currentPartner.name);
      const [editPin, setEditPin] = useState(currentPartner.pin);
      const [imageFile, setImageFile] = useState(null); const [imagePreview, setImagePreview] = useState(null); 

      const handleImageChange = (e) => { const file = e.target.files[0]; if (file) { setImageFile(file); setImagePreview(URL.createObjectURL(file)); } };

      const handleSubmit = async () => {
        if (!delCount || !pkpCount) return showToast("⚠️ 請輸入今日數量");
        if (!imageFile) return showToast("📸 請拍攝今日單據！");
        setIsSubmitting(true);
        try {
          const today = new Date().toLocaleDateString('en-CA');
          
          // 🎯 前端照片壓縮再上傳
          const compressedBlob = await compressImage(imageFile, 800);
          
          const imgRef = storage.ref(`reports/${appId}/${currentPartner.id}_${today}_${Date.now()}`);
          await imgRef.put(compressedBlob); 
          const imgUrl = await imgRef.getDownloadURL();

          const batch = db.batch();
          const pRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(currentPartner.id);
          const hRef = pRef.collection('history').doc(today);

          batch.update(pRef, { total_del: parseInt(delCount), total_pkp: parseInt(pkpCount), last_report: { date: today, timestamp: firebase.firestore.FieldValue.serverTimestamp() }, work_status: 'online', report_status: 'pending', report_img: imgUrl });
          batch.set(hRef, { date: today, del: parseInt(delCount), pkp: parseInt(pkpCount), del_price: currentPartner.custom_del_price || 15, pkp_price: currentPartner.custom_pkp_price || 10, img: imgUrl, ts: firebase.firestore.FieldValue.serverTimestamp() });

          await batch.commit(); showToast("🚀 單據已送出審核！"); setDelCount(""); setPkpCount(""); setImageFile(null); setImagePreview(null);
        } catch (err) { alert("❌ 提交失敗：" + err.message); } finally { setIsSubmitting(false); }
      };

      const handleUpdateProfile = async () => {
        if (!editName || !editPin) return showToast("⚠️ 姓名或密碼不能為空");
        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(currentPartner.id).update({ name: editName, pin: editPin });
        showToast("✅ 個資更新成功"); setShowEdit(false);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black relative overflow-y-auto">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[480px] text-center gold-border shadow-2xl relative z-10 my-8">
            <h2 className="text-3xl font-black text-white italic mb-2">夥伴工作台</h2>
            <p className="text-amber-500 text-xs mb-8 tracking-widest">{currentPartner?.name} 您好</p>

            <div className="mb-8">
              <label className="flex flex-col items-center justify-center bg-slate-900/60 border-2 border-dashed border-amber-500/50 rounded-3xl p-6 cursor-pointer hover:bg-slate-800 transition relative overflow-hidden group min-h-[160px]">
                {imagePreview && <img src={imagePreview} className="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-30 transition" />}
                <div className="relative z-10 flex flex-col items-center">
                  <span className="text-5xl mb-3 drop-shadow-lg">📸</span>
                  <span className="text-amber-400 font-black text-sm bg-black/60 px-4 py-1.5 rounded-full shadow-lg">{imagePreview ? '重新拍攝' : '點擊拍攝單據'}</span>
                </div>
                <input type="file" accept="image/*" capture="environment" onChange={handleImageChange} className="hidden" />
              </label>
            </div>

            <div className="grid grid-cols-2 gap-4 mb-10">
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-slate-700"><p className="text-[10px] text-sky-500 mb-2">今日配送</p><input type="number" value={delCount} onChange={e=>setDelCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl" /></div>
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-slate-700"><p className="text-[10px] text-orange-500 mb-2">今日逆收</p><input type="number" value={pkpCount} onChange={e=>setPkpCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl" /></div>
            </div>

            <button onClick={handleSubmit} disabled={isSubmitting} className="btn-prime mb-8 shadow-xl tracking-widest italic text-lg py-4">{isSubmitting ? '壓縮上傳中...' : '🚀 提交單據與數據'}</button>
            <div className="flex gap-4 mb-8">
              <button onClick={() => setShowEdit(true)} className="flex-1 py-4 rounded-2xl bg-slate-800 border border-slate-700 text-amber-500 hover:bg-amber-900 transition text-xs italic shadow-lg">🛠️ 更新個資</button>
            </div>
            <button onClick={onLogout} className="text-rose-500 text-sm font-black underline underline-offset-8 decoration-rose-500/30">🔒 登出系統</button>
          </div>

          {showEdit && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[400] flex items-center justify-center p-4">
              <div className="glass-panel w-full max-w-sm rounded-[2rem] p-6 gold-border relative">
                <h3 className="font-black text-xl text-white mb-6">🛠️ 更新您的資料</h3>
                <div className="space-y-4">
                  <div><label className="text-xs text-slate-400 ml-2">顯示姓名</label><input value={editName} onChange={e=>setEditName(e.target.value)} className="input-box !mb-0" /></div>
                  <div><label className="text-xs text-slate-400 ml-2">登入 PIN 碼 (4碼)</label><input type="password" value={editPin} onChange={e=>setEditPin(e.target.value)} maxLength="4" className="input-box !mb-0" /></div>
                </div>
                <button onClick={handleUpdateProfile} className="mt-8 w-full bg-emerald-600 text-white font-black py-3 rounded-xl shadow-lg">💾 確認儲存</button>
                <button onClick={() => setShowEdit(false)} className="absolute top-6 right-6 text-slate-400 hover:text-white text-xl">✕</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 4. 招募初試系統 (隱藏AI，改為標準問卷式)
    // ==========================================
    function OnboardingFlow({ setLayer, db, appId, showToast }) {
      const [messages, setMessages] = useState([{ type: 'bot', text: "您好，歡迎來到金耀物流線上初試系統。為確保後續流程，請先輸入您的「真實姓名」與「手機號碼」。" }]);
      const [step, setStep] = useState('info'); 
      const [name, setName] = useState(""); const [phone, setPhone] = useState("");
      const [currentQ, setCurrentQ] = useState(0); const [attitude, setAttitude] = useState("良好");
      const chatEndRef = useRef(null);

      const quizDB = [
        { q: "若配送中不幸發生車禍，您的處理順序是？", o: ["1.報警 2.拍照 3.回報管理處", "1.自行私下和解 2.繼續送完貨"] },
        { q: "若發現包裹破損內容物滲漏，會怎麼做？", o: ["拍照回報客服暫緩配送", "裝沒看到直接送達離開"] },
        { q: "收到代收貨款時的操作規範？", o: ["當面點清並存入公款包", "直接塞口袋回家再算"] }
      ];

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
      const addMsg = (type, text) => setMessages(prev => [...prev, { type, text }]);

      const startQuiz = () => {
        if (!name || !phone) return showToast("⚠️ 請輸入姓名與手機");
        setStep('quiz'); addMsg('bot', `資料已確認。測驗開始，第一題：${quizDB[0].q}`);
      };

      const handlePick = async (idx, text) => {
        addMsg('user', text);
        if (idx === 1) setAttitude("需注意");
        if (currentQ < quizDB.length - 1) {
          const next = currentQ + 1; setCurrentQ(next); setTimeout(() => { addMsg('bot', `第 ${next + 1} 題：${quizDB[next].q}`); }, 600);
        } else {
          setStep('done');
          setTimeout(async () => {
            addMsg('bot', "初試已完成！系統已記錄您的資料。請等待後台管理員審核，【審核通過後】方可進入第二步的建檔通道。");
            try {
              // 🎯 狀態設為 interview_reviewing，等待管理員通過
              await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(`p_${phone}`).set({
                id: `p_${phone}`, name, phone, pin: "0000", status: 'interview_reviewing', ai_comment: attitude, 
                total_del: 0, total_pkp: 0, custom_del_price: 15, custom_pkp_price: 10, custom_adj: 0, 
                insured_salary: 0, labor_fee: 0, health_fee: 0, dependents: 0, created_at: firebase.firestore.FieldValue.serverTimestamp()
              });
            } catch (e) { console.error(e); }
          }, 600);
        }
      };

      return (
        <div className="h-screen flex flex-col p-6 bg-[#020617] font-black">
          <header className="p-6 border-b border-white/5 bg-slate-900/50 backdrop-blur-md flex justify-between items-center rounded-t-3xl">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white font-black">HR</div>
              <div><h3 className="text-white text-sm">線上初試系統</h3><p className="text-[9px] text-emerald-400">● 系統服務中</p></div>
            </div>
            <button onClick={() => setLayer('gate')} className="text-slate-400 text-xs px-4 py-2 border border-white/10 rounded-xl">結束退出</button>
          </header>
          <div className="flex-1 overflow-y-auto p-6 space-y-4 mb-4 bg-slate-950">
            {messages.map((m, i) => <div key={i} className={`chat-bubble ${m.type === 'bot' ? 'bubble-bot' : 'bubble-user'}`}>{m.text}</div>)}
            <div ref={chatEndRef} />
          </div>
          <div className="bg-slate-900/80 rounded-b-3xl p-6 gold-border shadow-2xl border-t border-white/5">
            {step === 'info' && (
              <div className="space-y-3 font-bold">
                <input type="text" placeholder="您的姓名" className="input-box !mb-0" value={name} onChange={e => setName(e.target.value)} />
                <input type="tel" placeholder="您的手機" className="input-box" value={phone} onChange={e => setPhone(e.target.value)} maxLength="10"/>
                <button onClick={startQuiz} className="btn-prime">確認並開始測驗</button>
              </div>
            )}
            {step === 'quiz' && (
              <div className="grid gap-3 font-bold">
                {quizDB[currentQ].o.map((o, i) => (
                  <button key={i} onClick={() => handlePick(i, o)} className="w-full py-4 bg-slate-800 border border-white/10 rounded-2xl text-amber-500 text-sm font-bold shadow-lg text-left px-6">{o}</button>
                ))}
              </div>
            )}
            {step === 'done' && <button onClick={() => setLayer('gate')} className="btn-prime font-bold">返回首頁等待通知</button>}
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. 資料建檔通道 (物流五證一摺常規版)
    // ==========================================
    function UploadFlow({ setLayer, db, appId, showToast, storage }) {
      const [searchPhone, setSearchPhone] = useState("");
      const [candidate, setCandidate] = useState(null);
      const [uploading, setUploading] = useState(false);
      
      // 表單資料
      const [emContact, setEmContact] = useState("");
      const [bankCode, setBankCode] = useState("");
      const [bankAccount, setBankAccount] = useState("");
      const [idImage, setIdImage] = useState(null);

      const findCandidate = async () => {
        if(!searchPhone) return;
        try {
          const docRef = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(`p_${searchPhone}`).get();
          if(docRef.exists) {
            const data = docRef.data();
            if(data.status === 'pending_upload') setCandidate(data);
            else if(data.status === 'interview_reviewing') showToast("⚠️ 您的初試正在人工審核中，通過後方可建檔。");
            else showToast("⚠️ 您已建檔完成或資料異常。");
          } else {
            showToast("❌ 查無面試紀錄，請先完成第一步。");
          }
        } catch(e) { showToast("❌ 查詢失敗"); }
      };

      const handleRealUpload = async () => {
        if (!emContact || !bankCode || !bankAccount) return showToast("⚠️ 請填寫完整基本資料");
        if (!idImage) return showToast("📸 請上傳證件照片包");
        
        setUploading(true);
        try {
          const compressedBlob = await compressImage(idImage, 800);
          const imgRef = storage.ref(`onboarding/${appId}/${candidate.id}_docs_${Date.now()}`);
          await imgRef.put(compressedBlob); 
          const imgUrl = await imgRef.getDownloadURL();

          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(candidate.id).update({ 
            status: 'active', emergency_contact: emContact, bank_code: bankCode, bank_account: bankAccount, document_img: imgUrl
          });
          showToast("✅ 建檔完美完成！您現在可用預設密碼 0000 登入。"); setLayer('gate');
        } catch(e) { 
          showToast("❌ 檔案上傳失敗：" + e.message); setUploading(false); 
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black">
          <div className="glass-panel w-full max-w-[440px] rounded-[2rem] p-8 gold-border relative">
            <button onClick={() => setLayer('gate')} className="absolute top-6 left-6 text-slate-400 hover:text-white text-xl">←</button>
            <h2 className="text-2xl font-black text-center text-white mb-2 mt-4">📁 資料上傳通道</h2>
            <p className="text-amber-500 text-xs text-center mb-8 font-bold">請填寫物流常規報到資料</p>

            {!candidate ? (
              <div className="space-y-4">
                <input type="tel" placeholder="輸入面試時的手機號碼" value={searchPhone} onChange={e=>setSearchPhone(e.target.value)} className="input-box" maxLength="10"/>
                <button onClick={findCandidate} className="btn-prime">查詢審核進度</button>
              </div>
            ) : (
              <div className="space-y-4 text-left">
                <p className="text-emerald-400 text-sm text-center mb-4">✅ 審核已通過，歡迎 {candidate.name}</p>
                
                <div><label className="text-xs text-slate-400 ml-2">緊急聯絡人 (稱呼與電話)</label><input value={emContact} onChange={e=>setEmContact(e.target.value)} className="input-box !mb-0 text-sm" placeholder="例如：王小明 0912345678"/></div>
                <div className="flex gap-2">
                  <div className="w-1/3"><label className="text-xs text-slate-400 ml-2">銀行代碼</label><input value={bankCode} onChange={e=>setBankCode(e.target.value)} className="input-box !mb-0 text-sm" placeholder="822" maxLength="3"/></div>
                  <div className="flex-1"><label className="text-xs text-slate-400 ml-2">銀行帳號</label><input value={bankAccount} onChange={e=>setBankAccount(e.target.value)} className="input-box !mb-0 text-sm" placeholder="請輸入完整帳號"/></div>
                </div>

                <div className="border-2 border-dashed border-amber-500/30 bg-slate-900 p-4 rounded-xl relative mt-4">
                  <p className="text-amber-500 font-bold text-xs mb-2">📸 五證一摺 (身分證/駕照/行照/存摺/良民證)</p>
                  <p className="text-slate-500 text-[10px] mb-4 font-normal">為加速流程，請將以上證件放置於同一平面拍成一張清晰照片上傳。</p>
                  <input type="file" accept="image/*" onChange={(e) => setIdImage(e.target.files[0])} className="text-xs text-slate-300 w-full" />
                </div>

                <button onClick={handleRealUpload} disabled={uploading} className="btn-prime mt-6">
                  {uploading ? '壓縮檔案與上傳中...' : '🚀 確認送出建檔'}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
