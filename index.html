const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const [geoInfo, setGeoInfo] = useState("獲取位置中...");
  const deviceId = useMemo(() => navigator.userAgent.replace(/[^a-zA-Z0-9]/g, '').slice(-10) + '-' + screen.width, []);

  useEffect(() => {
    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => setGeoInfo(`GPS:${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}`), () => setGeoInfo("GPS:未授權"));
    if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } 
  }, []);

  const getPos = (e) => { const rect = canvasRef.current.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - rect.left, y: cy - rect.top }; };

  const handleFinish = () => {
    setIsDrawing(false);
    if(canvasRef.current) {
      const ctx = canvasRef.current.getContext('2d'); ctx.font = "8px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      ctx.fillText(`${geoInfo} | ID:${deviceId} | ${new Date().toISOString()}`, 5, 145);
      onSign(canvasRef.current.toDataURL());
    }
  };

  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden relative shadow-inner">
        <canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onMouseMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onMouseUp={handleFinish} onTouchStart={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onTouchMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onTouchEnd={handleFinish} />
        <div className="absolute bottom-1 left-2 text-[8px] text-slate-600 pointer-events-none">{geoInfo} | Dev:{deviceId}</div>
      </div>
      <button onClick={()=>{canvasRef.current.getContext('2d').clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1 hover:text-white transition-colors">清除重簽</button>
    </div>
  );
};

        {!dispute ? (
          <div className="space-y-4">
             <p className="text-[10px] text-center text-slate-500">※ 此快照已具備法律效力，確權後即撥款</p>
             <SignaturePad onSign={setSig} />
             <div className="flex gap-2">
               <button onClick={()=>setDispute(true)} className="w-1/3 py-4 bg-rose-900/40 text-rose-400 rounded-xl border border-rose-500/30 text-sm">異議退回</button>
               <button onClick={()=>onAction('confirm', {sig})} disabled={!sig} className="w-2/3 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl disabled:opacity-30 active:scale-95 transition-all">確認無誤並簽收 (領訖)</button>
             </div>
          </div>
        ) : (
          <div className="space-y-3 animate-zoom">
            <input placeholder="輸入異議理由 (例如：少算一天)..." className="w-full bg-slate-800 p-4 rounded-xl text-white text-sm outline-none border border-rose-500/50" value={reason} onChange={e=>setReason(e.target.value)} />
            <div className="flex gap-2">
              <button onClick={()=>setDispute(false)} className="flex-1 py-4 bg-slate-800 text-slate-300 rounded-xl text-sm">取消</button>
              <button onClick={()=>{ if(!reason)return showToast("需填寫理由",true); onAction('dispute', {reason}); }} className="flex-1 py-4 bg-rose-600 text-white rounded-xl text-sm active:scale-95">送出異議</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    if(!input.trim()) return;
    
    // 會計視角：觸發企業語氣濾鏡
    if (currentUserRole === 'admin') {
       setIsTranslating(true);
       try {
         const response = await callAI({ action: 'tone_filter', payload: input });

       } catch (error) {
         showToast("🚨 AI 核心連線異常", true);
         console.error(error);
       }
       setIsTranslating(false);
       setInput("");
       return;

    setMsgs(prev => [...prev, { id: Date.now(), sender: 'me', text: input }]); setInput("");

    // 總裁視角：影子接管
    if (currentUserRole === 'super_admin') {

       else { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'hq', text: input }]); }
       return;

    // 司機視角：預設自動回覆
    if (isPrivileged) setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'hq', text: '收到，直達總裁窗口，無 AI 介入。' }]); }, 300);
    else setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: '已掛載高階核算模組複核，請稍候。' }]); }, 1800);

function AdminHub({ authRole, partners, onLogout, updateField, db, appId, setLayer, writeGodLog, globalSettings }) {
  const [adminTab, setAdminTab] = useState('formal'); // formal, pending, attendance, intercept
  const [sq, setSq] = useState("");
  const [showSensitive, setShowSensitive] = useState({ global: false }); const [mT, setMT] = useState(null);
  const [chatTarget, setChatTarget] = useState(null);
  const [detailTarget, setDetailTarget] = useState(null); // 開啟會計審核面板
  
  // 🚚 擴充免試建檔特權通道的基本資料欄位
  const [expressData, setExpressData] = useState({ phone: '', name: '', id_number: '', address: '', emergency_contact: '', emergency_phone: '', license_plate: '', priority_access: false });
  
  const [lineToken, setLineToken] = useState(""); const [godLogs, setGodLogs] = useState([]);
  const [payoutLocked, setPayoutLocked] = useState(false); const [ann, setAnn] = useState(globalSettings?.announcement || "");

  // 總裁隱身：絕對過濾 0976017938
  const visiblePartners = useMemo(() => (partners || []).filter(p => p.phone !== '0976017938'), [partners]);
  const formalPartners = useMemo(() => visiblePartners.filter(p => (p.status === 'approved' || p.status === 'frozen') && (p.name?.toLowerCase().includes(sq.toLowerCase()) || p.phone?.includes(sq))), [visiblePartners, sq]);
  const pendingPartners = useMemo(() => visiblePartners.filter(p => p.status === 'pending' && (p.name?.toLowerCase().includes(sq.toLowerCase()) || p.phone?.includes(sq))), [visiblePartners, sq]);
  const interceptedPartners = useMemo(() => visiblePartners.filter(p => p.salary_status === 'intercepted_by_boss'), [visiblePartners]);
  
  const displayList = adminTab === 'formal' ? formalPartners : adminTab === 'pending' ? pendingPartners : interceptedPartners;

  // 🗑️ 徹底刪除 C.O.D 計算邏輯
  const totalStats = useMemo(() => formalPartners.reduce((acc, p) => { return { anomalies: acc.anomalies + (p.has_conflict ? 1 : 0) + (p.liveness_failed ? 1 : 0) + (p.salary_status === 'disputed' ? 1 : 0) }; }, { anomalies: 0 }), [formalPartners]);

  useEffect(() => { if (authRole === 'super_admin') { const unG = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'god_log'), orderBy('timestamp', 'desc')), (s) => setGodLogs(s.docs.map(d => ({id: d.id, ...d.data()})))); return () => unG(); } }, [authRole]);

  // 🎯 總裁隱形點名
  const toggleLivenessCheck = async (p) => {
    if(authRole !== 'super_admin') return;
    const newState = !p.pending_liveness_check; await updateField(p.id, 'pending_liveness_check', newState);
    showToast(`🎯 已${newState?'鎖定':'解除'}目標 [${p.name}]，下次報帳強制活性驗證`); writeGodLog("隱形點名", `標記了 ${p.name} 進行 AI 突擊`);
  };

  // 🧊 虛擬結算權（關鍵攔截邏輯）
  const handlePublishSalary = async () => {
    if(!window.confirm("確認發布薪資？")) return; 
    setPayoutLocked(true);
    
    for(const p of formalPartners) { 
      const del_p = p.custom_del_price || 15; const pkp_p = p.custom_pkp_price || 10; 
      const ded = (p.current_deduction || 0) + (p.labor_fee||0) + (p.health_fee||0);
      const bonus = p.current_bonus || 0;
      const net = (p.total_del * del_p) + (p.total_pkp * pkp_p) + bonus - ded; 
      
      const payload = { 
        salary_record: { net, snapshot: { del_count: p.total_del, del_price: del_p, pkp_count: p.total_pkp, pkp_price: pkp_p, deductions: ded, bonus: bonus }, period: new Date().toLocaleDateString('zh-TW'), timestamp: Date.now() },
        salary_status: authRole === 'admin' ? 'intercepted_by_boss' : 'pending_sign' 
      };
      await updateField(p.id, null, payload);
    } 
    
    if (authRole === 'admin') {
      showToast("✅ 已發送至司機端"); 
      writeGodLog("會計結算", "會計發布了薪資，數據已送入總裁攔截站"); 
    } else {
      showToast("✅ 已放行快照。金庫進入鎖定期。"); 
      writeGodLog("金庫操作", "總裁直接發布薪資凍結快照"); 
    }
    
    setTimeout(() => setPayoutLocked(false), 2000); 
  };

  // 內部特赦建檔
  const handleExpressAdd = async () => {
    if(!expressData.phone || !expressData.name || !expressData.id_number) return showToast("姓名、手機與身分證字號為必填",true); 
    if(formalPartners.some(p => p.phone === expressData.phone)) return showToast("門號已存在", true);
