<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 數位營運總控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 480px; background: #0f172a; border-radius: 2.5rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: rgba(30, 41, 59, 0.4); border: 1px solid #334155; border-radius: 1.2rem; padding: 18px; width: 100%; color: #ffffff; outline: none; margin-bottom: 12px; font-size: 16px; text-align: center; }
        .input-box:focus { border-color: #0ea5e9; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.5rem; background: #0ea5e9; color: #ffffff; font-weight: 800; font-size: 18px; cursor: pointer; border: none; transition: 0.1s; }
        .btn-prime:active { transform: scale(0.96); opacity: 0.8; }
        
        /* 視覺設計 */
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .photo-slot { background: transparent; border: 2px dashed #38bdf8; border-radius: 1.5rem; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; display: none; }
        .photo-slot span { color: #38bdf8; font-size: 12px; font-weight: bold; margin-top: 8px; }
        .divider-orange { width: 100%; height: 4px; background: #f97316; margin-bottom: 25px; border-radius: 99px; }
        .label-blue { font-size: 13px; color: #38bdf8; font-weight: bold; margin-bottom: 8px; display: block; text-align: left; }
        
        /* 表格樣式 */
        .admin-table th { font-size: 11px; padding: 10px 4px; color: #64748b; white-space: nowrap; }
        .admin-table td { font-size: 11px; padding: 12px 4px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
        .input-mini { background: #020617; border: 1px solid #334155; border-radius: 4px; color: #38bdf8; text-align: center; width: 60px; font-weight: bold; padding: 2px 0; }
        .btn-del { color: #ef4444; border: 1px solid #450a0a; padding: 2px 5px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .ai-tag { font-size: 9px; padding: 2px 8px; border-radius: 99px; background: #0c4a6e; color: #38bdf8; font-weight: bold; border: 1px solid #0ea5e9; }
        
        /* 載入動畫 */
        .loading-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #add-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; justify-content: center; align-items: center; padding: 20px; }
        
        /* 故障警告提示 */
        #fix-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 12px 20px; border-radius: 12px; z-index: 2000; display: none; font-size: 12px; font-weight: bold; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- 載入層 -->
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p class="mt-4 text-sky-500 font-bold tracking-widest">在地物流 數據連線中...</p>
        <button onclick="window.forceUnlock()" class="mt-8 text-[10px] text-slate-600 underline">連線超時？點此強制進入系統</button>
    </div>

    <!-- Firebase 設定警告 -->
    <div id="fix-alert">
        ⚠️ 偵測到 Firebase 權限尚未開啟！<br>
        請至 Firebase 控制台啟用「匿名 (Anonymous)」登入方式。
    </div>

    <!-- 快速新增人員彈窗 -->
    <div id="add-modal">
        <div class="id-card !mb-0 w-full max-w-[400px]">
            <h3 class="text-white font-bold mb-6 text-xl italic border-l-4 border-orange-500 pl-3">快速新增現有人員資料</h3>
            <input type="text" id="new_name" placeholder="人員姓名" class="input-box">
            <input type="tel" id="new_phone" placeholder="手機號碼" class="input-box" maxlength="10">
            <input type="password" id="new_pin" placeholder="登入 PIN (預設 0000)" class="input-box" maxlength="4">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input type="number" id="new_del_p" placeholder="正件單價" class="input-box !mb-0" value="15">
                <input type="number" id="new_rev_p" placeholder="逆件單價" class="input-box !mb-0" value="10">
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('add-modal').style.display='none'" class="w-1/2 py-4 rounded-xl border border-slate-700 text-slate-500 font-bold">取消</button>
                <button onclick="window.addPartnerDirectly()" class="w-1/2 py-4 rounded-xl bg-orange-600 text-white font-bold">確認新增</button>
            </div>
        </div>
    </div>

    <!-- 登入閘門 -->
    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-slate-500 font-bold tracking-[0.3em] mb-10 text-xs uppercase italic">Digital Operations System</p>
        
        <div class="w-full max-w-[340px]">
            <div class="bg-slate-900/80 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手機號碼" class="input-box" maxlength="10">
                <input type="password" id="login_pin" placeholder="PIN 碼" class="input-box">
                <button onclick="window.boot()" class="btn-prime w-full shadow-lg">進入系統</button>
            </div>
            
            <div class="pt-8 flex flex-col gap-4">
                <button onclick="window.showLayer('interview-page')" class="w-full py-4 rounded-2xl border border-sky-500 text-sky-400 font-bold">一、營運職能實務評估</button>
                <div id="apply-lock-box">
                    <button disabled class="w-full py-4 rounded-2xl border border-slate-800 text-slate-700 font-bold cursor-not-allowed bg-slate-900/50">二、人事建檔 (測驗後解鎖) 🔒</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 實務評估頁面 -->
    <div id="interview-page" class="layer">
        <div class="w-full max-w-[480px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left flex items-center" onclick="window.hideAll()">
                <span class="mr-2">←</span> 返回
            </div>
            <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 italic border-b-2 border-sky-500 pb-2">夥伴營運職能評估</h2>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="手機號碼" class="input-box" maxlength="10">
                
                <div class="space-y-4 text-left mb-6">
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <p class="text-white text-sm font-bold mb-3">1. 配送途中遇事故，首要流程為何？</p>
                        <label class="block text-xs mb-2 cursor-pointer"><input type="radio" name="q1" value="25"> 報警拍照、聯繫公司回報</label>
                        <label class="block text-xs cursor-pointer"><input type="radio" name="q1" value="0"> 先送完，晚上再處理</label>
                    </div>
                    <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <p class="text-white text-sm font-bold mb-3">2. 客戶要求代收貨款金額不符時？</p>
                        <label class="block text-xs mb-2 cursor-pointer"><input type="radio" name="q2" value="25"> 拒絕交貨，立即回報異常</label>
                        <label class="block text-xs cursor-pointer"><input type="radio" name="q2" value="10"> 先收下，之後再補差額</label>
                    </div>
                </div>
                
                <button onclick="window.submitInterview()" class="btn-prime">提交評估資料</button>
            </div>
        </div>
    </div>

    <!-- 行政總控台 -->
    <div id="admin" class="layer !px-4">
        <div class="w-full max-w-[1380px]">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h2 class="text-white font-black text-4xl border-l-8 border-sky-500 pl-4 uppercase italic">老闆行政總控台</h2>
                    <div class="flex gap-4 mt-2 pl-6">
                        <button onclick="document.getElementById('add-modal').style.display='flex'" class="text-orange-500 text-[10px] font-bold border border-orange-500 px-3 py-1 rounded-full hover:bg-orange-500 hover:text-white transition">+ 快速新增現有人員</button>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-slate-800 px-6 py-2 rounded-full text-xs font-bold text-slate-400">安全登出</button>
            </div>

            <div class="bg-slate-900 p-6 rounded-[2.5rem] overflow-x-auto border border-slate-800 shadow-2xl">
                <table class="w-full text-left admin-table">
                    <thead class="text-slate-500 border-b border-slate-800">
                        <tr>
                            <th>狀態</th><th>姓名/手機</th><th>隱藏 AI 分析</th><th>正件</th><th>逆件</th><th>正價</th><th>逆價</th><th>投保薪資</th><th>眷屬</th><th>扣繳額</th><th>淨額</th><th>管理</th>
                        </tr>
                    </thead>
                    <tbody id="admin-render" class="text-white">
                        <tr><td colspan="12" class="text-center py-20 text-slate-600 font-bold italic">雲端數據讀取中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 其他頁面省略 (邏輯保留) -->
    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
             <div class="id-card">
                <h2 class="text-2xl font-black text-white mb-6 italic border-b-2 border-orange-500 pb-2">人事資料建檔</h2>
                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="password" id="app_pin" placeholder="自訂 4 位 PIN" maxlength="4" class="input-box">
                <button onclick="window.submitApply()" class="btn-prime bg-sky-600">提交資料</button>
                <button onclick="window.hideAll()" class="w-full mt-4 text-xs text-slate-500">取消返回</button>
             </div>
        </div>
    </div>

    <div id="hub" class="layer">
        <div class="w-full max-w-[450px]">
            <h2 id="hub-name" class="text-3xl font-black text-white italic mb-8">夥伴工作台</h2>
            <div class="id-card">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div><span class="label-blue">正向件數</span><input type="number" id="rep_del" placeholder="0" class="input-box"></div>
                    <div><span class="label-blue">逆向件數</span><input type="number" id="rep_rev" placeholder="0" class="input-box"></div>
                </div>
                <button onclick="window.submitReport()" class="btn-prime bg-green-600">提交當日數據</button>
                <button onclick="location.reload()" class="w-full mt-4 text-xs text-slate-500">登出系統</button>
            </div>
        </div>
    </div>

    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, deleteDoc, increment, serverTimestamp, collection, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 完整設定 (根據您的專案截圖校正)
        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'logistics-master-v92';
        const partnersCol = collection(db, 'artifacts', appId, 'public', 'data', 'partners');

        let partners = [];
        let currentUser = null;
        let isFirebaseReady = false;

        window.setLoad = (s) => document.getElementById('loading').style.display = s ? 'flex' : 'none';
        window.forceUnlock = () => { window.setLoad(false); isFirebaseReady = true; };

        // --- 登入邏輯 (包含容錯機制) ---
        window.boot = () => {
            const ph = document.getElementById('login_phone').value.trim();
            const pi = document.getElementById('login_pin').value.trim();
            
            // 老闆模式強制解鎖
            if(ph === "0976017938" && pi === "0531") {
                window.renderAdmin();
                return;
            }

            if (!isFirebaseReady) return alert("系統正在與雲端同步，請稍候重試。");

            currentUser = partners.find(x => x.phone === ph);
            if(currentUser) {
                if(currentUser.status === "approved" && currentUser.pin === pi) {
                    window.showLayer('hub');
                    document.getElementById('hub-name').innerText = `夥伴 ${currentUser.name}`;
                } else if(currentUser.status === "interviewed") {
                    window.showLayer('apply-page');
                } else alert("資料審核中，或 PIN 碼錯誤。");
            } else alert("查無資料，請先提交實務評估測驗。");
        };

        // --- 後台渲染 ---
        window.renderAdmin = () => {
            window.showLayer('admin');
            const target = document.getElementById('admin-render');
            if(partners.length === 0) {
                target.innerHTML = '<tr><td colspan="12" class="text-center py-20 text-slate-600 font-bold">雲端尚未有資料。請確保 Firebase Anonymous Auth 已開啟。</td></tr>';
                return;
            }

            let html = '';
            partners.forEach(p => {
                const dp = p.custom_del || 15; const rp = p.custom_rev || 10;
                const income = ((p.total_del || 0) * dp) + ((p.total_rev || 0) * rp);
                const ins_b = p.ins_base || 0; const fm = p.ins_fm || 0;
                const total_ins = Math.round(ins_b * 0.025 + ins_b * 0.018 * (1 + parseInt(fm)));
                
                let actionBtn = '';
                if(p.status === 'pending_review') actionBtn = `<button onclick="window.upField('${p.id}','status','interviewed')" class="bg-sky-600 px-3 py-1 rounded text-[10px] font-bold">核准面試</button>`;
                else if(p.status === 'pending') actionBtn = `<button onclick="window.upField('${p.id}','status','approved')" class="bg-green-600 px-3 py-1 rounded text-[10px] font-bold">開通營運</button>`;

                html += `<tr class="hover:bg-white/5 transition border-b border-slate-800/50">
                    <td>${actionBtn || p.status}</td>
                    <td><b>${p.name}</b><br>${p.phone}</td>
                    <td><span class="ai-tag">${p.ai_analysis || '分析中'}</span></td>
                    <td class="text-sky-400 font-bold text-center">${p.total_del || 0}</td>
                    <td class="text-orange-400 font-bold text-center">${p.total_rev || 0}</td>
                    <td><input type="number" value="${dp}" onchange="window.upField('${p.id}','custom_del',this.value)" class="input-mini"></td>
                    <td><input type="number" value="${rp}" onchange="window.upField('${p.id}','custom_rev',this.value)" class="input-mini"></td>
                    <td><input type="number" value="${ins_b}" onchange="window.upField('${p.id}','ins_base',this.value)" class="input-mini !w-16"></td>
                    <td><input type="number" value="${fm}" onchange="window.upField('${p.id}','ins_fm',this.value)" class="input-mini"></td>
                    <td class="text-red-400 font-bold">-$${total_ins}</td>
                    <td class="text-sky-400 font-black text-sm">$${income - total_ins}</td>
                    <td><span class="btn-del" onclick="window.delPartner('${p.id}','${p.name}')">🗑️</span></td>
                </tr>`;
            });
            target.innerHTML = html;
        };

        // --- 核心提交 ---
        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value.trim();
            const ph = document.getElementById('int_phone').value.trim();
            const q1 = document.querySelector('input[name="q1"]:checked')?.value;
            const q2 = document.querySelector('input[name="q2"]:checked')?.value;
            if(!name || !ph || !q1 || !q2) return alert("請完成所有項目填寫。");
            
            window.setLoad(true);
            const id = `p_${ph}`;
            let analysis = "✅ 誠信可靠";
            if (q2 === "10") analysis = "❌ 誠信風險"; 
            else if (q1 === "0") analysis = "🚧 事故隱憂";

            try {
                await setDoc(doc(partnersCol, id), {
                    id, name, phone: ph, status: "pending_review", ai_analysis: analysis,
                    total_del: 0, total_rev: 0, custom_del: 15, custom_rev: 10, ins_base: 0, ins_fm: 0,
                    createdAt: serverTimestamp()
                });
                alert("評估提交成功！");
                location.reload();
            } catch (e) { alert("連線失敗，請檢查 Firebase 登入設定。"); }
            window.setLoad(false);
        };

        window.submitReport = async () => {
            if (!currentUser) return;
            const del = parseInt(document.getElementById('rep_del').value) || 0;
            const rev = parseInt(document.getElementById('rep_rev').value) || 0;
            window.setLoad(true);
            try {
                await updateDoc(doc(partnersCol, currentUser.id), { total_del: increment(del), total_rev: increment(rev) });
                alert("提交成功！");
                location.reload();
            } catch (e) { alert("回報失敗"); }
            window.setLoad(false);
        };

        window.addPartnerDirectly = async () => {
            const n = document.getElementById('new_name').value.trim();
            const p = document.getElementById('new_phone').value.trim();
            if(!n || !p) return alert("請填寫姓名與電話。");
            window.setLoad(true);
            try {
                await setDoc(doc(partnersCol, `p_${p}`), {
                    id: `p_${p}`, name: n, phone: p, pin: document.getElementById('new_pin').value || "0000",
                    status: "approved", ai_analysis: "💎 直接新增",
                    total_del: 0, total_rev: 0, custom_del: 15, custom_rev: 10, ins_base: 0, ins_fm: 0
                });
                alert("人員新增成功！");
                document.getElementById('add-modal').style.display='none';
            } catch (e) { alert("操作失敗"); }
            window.setLoad(false);
        };

        window.upField = async (id, f, v) => { await updateDoc(doc(partnersCol, id), { [f]: isNaN(parseFloat(v)) ? v : parseFloat(v) }); };
        window.delPartner = async (id, n) => { if(confirm(`確定刪除 ${n}?`)) await deleteDoc(doc(partnersCol, id)); };
        
        window.showLayer = id => { window.hideAll(); document.getElementById(id).style.display='flex'; };
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l=>l.style.display='none'); document.getElementById('gate').style.display='flex'; };

        // --- 初始化 (加入錯誤捕獲) ---
        const init = async () => {
            try {
                // 優先完成身分驗證
                await signInAnonymously(auth);
                onAuthStateChanged(auth, user => {
                    if(user) {
                        isFirebaseReady = true;
                        onSnapshot(partnersCol, s => {
                            partners = s.docs.map(d => ({ id: d.id, ...d.data() }));
                            if(document.getElementById('admin').style.display === 'flex') window.renderAdmin();
                            window.setLoad(false);
                        }, err => { console.error("Firestore Error:", err); window.setLoad(false); });
                    }
                });
            } catch (err) { 
                console.error("Auth Failed:", err);
                if (err.code === 'auth/configuration-not-found') {
                    document.getElementById('fix-alert').style.display = 'block';
                }
                window.setLoad(false); 
            }
            // 4.5秒強行解鎖
            setTimeout(() => window.setLoad(false), 4500);
        };
        init();
    </script>
</body>
</html>
