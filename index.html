<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 職業夥伴數位中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #334155; margin-bottom: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #ffffff; outline: none; margin-bottom: 12px; font-size: 16px; }
        .input-box::placeholder { color: #64748b; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-prime:disabled { background: #1e293b; color: #475569; }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; border-left: 4px solid #0ea5e9; padding-left: 8px; margin-top: 15px; text-align: left; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 15px; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-slot span { color: #38bdf8; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-12 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">物流夥伴管理平台</p>
        <button onclick="showLayer('apply-page')" class="btn-prime max-w-[340px]">立即開始入職申請</button>
        <button onclick="boot()" class="mt-8 text-slate-500 text-xs underline">已有帳號？登入系統</button>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer text-left" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 border-b-4 border-orange-500 pb-2 italic text-left">正式入職資料補件</h2>
                
                <span class="label-sky">第一步：證件與駕照、行照拍照</span>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic">職業/普通駕照</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car">營運車輛行照</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <span class="label-sky">第二步：核心人事檔案</span>
                <input type="text" id="app_name" placeholder="真實姓名 (必填)" class="input-box">
                <input type="tel" id="app_phone" placeholder="行動電話 (登入帳號)" class="input-box">
                <input type="text" id="app_idnum" placeholder="身分證字號" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">
                
                <span class="label-sky">第三步：緊急聯絡人 (必填)</span>
                <input type="text" id="app_em_name" placeholder="聯絡人姓名" class="input-box">
                <input type="text" id="app_em_rel" placeholder="與本人關係 (如: 父子、配偶)" class="input-box">
                <input type="tel" id="app_em_tel" placeholder="聯絡人電話" class="input-box">

                <span class="label-sky">第四步：營運資訊</span>
                <select id="app_vehicle" class="input-box bg-slate-900 text-white font-bold">
                    <option value="機車">機車配送</option>
                    <option value="貨車">貨車配送 (需職業駕照)</option>
                    <option value="公司車">公司配車</option>
                </select>
                <input type="text" id="app_plate" placeholder="營運車牌號碼" class="input-box">

                <span class="label-sky">第五步：發薪銀行帳戶</span>
                <div class="flex gap-2">
                    <input type="text" id="app_bank_code" placeholder="銀行代碼" class="input-box w-1/3">
                    <input type="text" id="app_bank_acc" placeholder="銀行帳號" class="input-box w-2/3">
                </div>
                
                <input type="password" id="app_pin" placeholder="設定 4 位登入 PIN 碼" maxlength="4" class="input-box">

                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-orange-600 shadow-xl mt-6">提交完整資料</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 🔥 請務必填寫您的 Firebase 設定
        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentImgField = '';
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        // 提交正式入職
        window.submitApply = async () => {
            const name = document.getElementById('app_name').value;
            const phone = document.getElementById('app_phone').value;
            const pin = document.getElementById('app_pin').value;

            if(!name || !phone || !pin) return alert("請完整填寫姓名、電話與登入密碼！");

            const btn = document.getElementById('app_btn');
            btn.innerText = "正在傳送大檔案..."; btn.disabled = true;

            const data = {
                name, phone,
                id_num: document.getElementById('app_idnum').value,
                h_addr: document.getElementById('app_h_addr').value,
                em_name: document.getElementById('app_em_name').value,
                em_rel: document.getElementById('app_em_rel').value,
                em_tel: document.getElementById('app_em_tel').value,
                v_type: document.getElementById('app_vehicle').value,
                plate: document.getElementById('app_plate').value,
                bank_code: document.getElementById('app_bank_code').value,
                bank_acc: document.getElementById('app_bank_acc').value,
                uid: pin,
                docs: photosCache,
                status: "pending",
                total_del: 0,
                time: serverTimestamp()
            };

            try {
                await addDoc(collection(db, 'partners'), data);
                alert("入職資料建檔成功！請通知管理員審核。");
                location.reload();
            } catch(e) {
                alert("提交失敗，請檢查網路連線");
                btn.disabled = false; btn.innerText = "提交完整資料";
            }
        };

        // UI 與相機邏輯
        window.showLayer = id => document.getElementById(id).style.display = 'flex';
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l => l.style.display='none'); };
        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                photosCache[currentImgField] = e.target.result;
                const p = document.getElementById('p_' + currentImgField);
                p.src = e.target.result; p.style.display = 'block';
                document.getElementById('t_' + currentImgField).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };
    </script>
</body>
</html>
