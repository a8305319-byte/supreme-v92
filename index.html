<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>在地物流有限公司</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --accent:#00d4ff;--accent2:#7c3aed;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;
  --text:#e2e8f0;--dim:#64748b;--mid:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
canvas#fw{position:fixed;inset:0;pointer-events:none;z-index:0;}
 
/* ===== LOADING ===== */
#loading-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;}
.ld-logo{font-family:'Orbitron',monospace;font-size:20px;color:var(--accent);letter-spacing:3px;text-shadow:0 0 30px rgba(0,212,255,0.5);margin-bottom:8px;}
.ld-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:28px;}
.ld-bar{width:220px;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:1px;animation:ldFill 1.8s ease forwards;}
.ld-msg{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-top:12px;letter-spacing:1px;}
@keyframes ldFill{from{width:0}to{width:100%}}
@keyframes ldHide{0%{opacity:1}100%{opacity:0;visibility:hidden;}}
 
/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;}
.login-box{background:rgba(0,0,0,0.8);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:400px;backdrop-filter:blur(30px);position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px rgba(0,212,255,0.4);}
.login-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-top:5px;letter-spacing:2px;}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:9px 13px;font-size:12px;color:#f87171;margin-bottom:12px;display:none;}
.f-label{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:4px;display:block;letter-spacing:1px;text-transform:uppercase;}
.f-input{width:100%;padding:11px 13px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:all 0.2s;margin-bottom:14px;}
.f-input:focus{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.04);}
.btn-login{width:100%;padding:13px;background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.4);border-radius:8px;color:var(--accent);font-size:13px;font-family:'Orbitron',monospace;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn-login:hover{background:rgba(0,212,255,0.22);box-shadow:0 0 20px rgba(0,212,255,0.2);}
.btn-login:disabled{opacity:0.4;cursor:not-allowed;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,212,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
 
/* ===== APP LAYOUT ===== */
#app{display:none;position:relative;z-index:1;}
 
/* --- DESKTOP (Commander/Accountant) --- */
.desktop-layout{display:flex;min-height:100vh;}
.sidebar{width:248px;flex-shrink:0;background:rgba(0,0,0,0.88);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;backdrop-filter:blur(20px);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:2px;}
.logo-area{padding:18px 18px 16px;border-bottom:1px solid var(--border);}
.logo-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;color:var(--accent);letter-spacing:2px;text-shadow:0 0 15px rgba(0,212,255,0.35);}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-top:3px;letter-spacing:1px;}
.role-badge{display:inline-flex;align-items:center;gap:5px;margin-top:9px;padding:3px 9px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;}
.role-commander{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);}
.role-accountant{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#34d399;}
.role-dot{width:5px;height:5px;border-radius:50%;animation:pulse 2s infinite;}
.commander-dot{background:var(--accent);}
.accountant-dot{background:#34d399;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.nav-section{padding:12px 14px 3px;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;transition:all 0.2s;border-left:2px solid transparent;font-size:12.5px;color:var(--mid);position:relative;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);border-left-color:rgba(0,212,255,0.3);}
.nav-item.active{background:rgba(0,212,255,0.08);color:var(--accent);border-left-color:var(--accent);}
.nav-item.disabled{opacity:0.25;cursor:not-allowed;pointer-events:none;}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.nav-logout{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);}
.btn-logout{width:100%;padding:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:#f87171;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all 0.2s;}
.btn-logout:hover{background:rgba(239,68,68,0.15);}
.main-content{flex:1;padding:24px 26px;overflow-y:auto;max-height:100vh;}
.main-content::-webkit-scrollbar{width:4px;}
.main-content::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15);border-radius:2px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;}
.chip{display:flex;align-items:center;gap:6px;padding:5px 11px;background:var(--glass);border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;backdrop-filter:blur(10px);}
 
/* --- MOBILE (Driver) --- */
.mobile-layout{max-width:480px;margin:0 auto;padding-bottom:72px;}
.mobile-topbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;}
.mobile-logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:var(--accent);letter-spacing:2px;}
.mobile-user{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
.mobile-logout{font-size:10px;color:var(--dim);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;}
.bnav-tab{flex:1;min-width:0;}
.bnav-tab{flex:1;padding:10px 0 8px;text-align:center;cursor:pointer;border:none;background:none;color:var(--dim);transition:all 0.2s;}
.bnav-tab.active{color:var(--accent);}
.bnav-icon{font-size:18px;display:block;}
.bnav-label{font-size:9px;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.mobile-content{padding:14px;}
 
/* ===== RESPONSIVE: MOBILE / TABLET / DESKTOP ===== */
 
/* --- Tablet (768px - 1024px) --- */
@media (max-width: 1024px) {
  .sidebar { width: 200px; }
  .nav-item { font-size: 11.5px; padding: 8px 14px; }
  .g3 { grid-template-columns: 1fr 1fr !important; }
  .g4 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .main-content { padding: 18px 18px; }
}
 
/* --- Mobile (< 768px) --- */
@media (max-width: 768px) {
  /* Sidebar becomes top navigation */
  .desktop-layout { flex-direction: column; min-height: 100vh; }
  .sidebar {
    width: 100% !important;
    height: auto !important;
    position: sticky !important;
    top: 0;
    z-index: 200;
    flex-direction: column;
    padding: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    overflow: visible;
  }
  .logo-area {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-direction: row;
    border-bottom: none;
  }
  .logo-title { font-size: 13px; }
  .logo-sub { display: none; }
  .role-badge { margin-top: 0; padding: 2px 8px; font-size: 9px; }
 
  /* Collapse nav into horizontal scroll */
  .nav-sections-wrap {
    display: flex;
    overflow-x: auto;
    padding: 4px 10px 8px;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-sections-wrap::-webkit-scrollbar { display: none; }
  .nav-section { display: none; }
  .nav-item {
    padding: 6px 10px;
    border-left: none !important;
    border-radius: 6px;
    white-space: nowrap;
    font-size: 11px;
    background: var(--glass);
    border: 1px solid var(--border) !important;
    flex-shrink: 0;
  }
  .nav-item.active {
    background: rgba(0,212,255,0.12);
    border-color: rgba(0,212,255,0.35) !important;
  }
  .nav-item.disabled { display: none; }
  .nav-logout { 
    margin-top: auto;
    border-top: none;
    padding: 4px 10px 8px;
  }
  .btn-logout { padding: 5px 10px; font-size: 10px; }
 
  /* Main content */
  .main-content {
    max-height: none !important;
    padding: 14px 12px 20px;
    overflow-y: auto;
  }
  .topbar { margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .page-title { font-size: 14px; }
  .topbar-right { flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 10px; padding: 4px 8px; }
 
  /* Grids */
  .g2, .g3, .g4 { grid-template-columns: 1fr !important; gap: 10px !important; }
  .stat-card { padding: 12px; }
  .stat-val { font-size: 18px !important; }
 
  /* Tables */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl { font-size: 11px; min-width: 500px; }
  .tbl th, .tbl td { padding: 7px 8px; }
 
  /* Glass cards */
  .glass-card { padding: 14px; }
  
  /* Forms */
  .f-inp { font-size: 16px; } /* prevent iOS zoom */
}
 
/* --- Small mobile (< 430px) --- */
@media (max-width: 430px) {
  .main-content { padding: 10px 10px 16px; }
  .page-title { font-size: 13px; }
  .stat-val { font-size: 16px !important; }
  .glass-card { padding: 12px; border-radius: 10px; }
}
 
/* ===== SHARED COMPONENTS ===== */
.glass-card{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:18px;backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:border-color 0.3s;}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);}
.glass-card:hover{border-color:rgba(0,212,255,0.15);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:15px;transition:all 0.3s;}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(0,212,255,0.18);}
.stat-lbl{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.stat-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--accent);}
.stat-sub{font-size:11px;color:var(--dim);margin-top:3px;}
.pbar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin-top:7px;}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-size:12px;font-weight:600;color:var(--mid);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:7px;}
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th{padding:8px 12px;text-align:left;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border);text-transform:uppercase;}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.025);color:var(--mid);vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,0.02);color:var(--text);}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;}
.bg{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399;}
.br{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.by{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;}
.bb{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);color:var(--accent);}
.bp{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;}
.bgr{background:rgba(100,116,139,0.15);border:1px solid rgba(100,116,139,0.3);color:var(--dim);}
.btn{padding:7px 13px;border-radius:6px;font-size:11px;cursor:pointer;border:none;font-family:'JetBrains Mono',monospace;transition:all 0.2s;}
.btn-p{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);color:var(--accent);}
.btn-p:hover{background:rgba(0,212,255,0.2);}
.btn-s{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#34d399;}
.btn-d{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--mid);}
.f-grp{margin-bottom:11px;}
.f-lbl{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:4px;display:block;letter-spacing:0.5px;}
.f-inp{width:100%;padding:8px 11px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;}
.f-inp:focus{border-color:rgba(0,212,255,0.45);}
select.f-inp{-webkit-appearance:none;cursor:pointer;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.alert-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;margin-bottom:8px;border:1px solid;font-size:12px;line-height:1.5;}
.aw{background:rgba(245,158,11,0.07);border-color:rgba(245,158,11,0.2);}
.ae{background:rgba(239,68,68,0.07);border-color:rgba(239,68,68,0.2);}
.ai{background:rgba(0,212,255,0.05);border-color:rgba(0,212,255,0.15);}
.as_{background:rgba(16,185,129,0.07);border-color:rgba(16,185,129,0.2);}
.panel{display:none;}
.panel.active{display:block;animation:fadeIn 0.22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.info-box{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.12);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:10px;}
.info-box strong{color:var(--accent);}
.warn-box{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--dim);line-height:1.6;margin-bottom:13px;}
 
/* SLIDE BUTTON */
.slide-wrap{position:relative;height:52px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:26px;overflow:hidden;margin-top:12px;user-select:none;}
.slide-track{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;letter-spacing:1px;pointer-events:none;}
.slide-thumb{position:absolute;left:4px;top:4px;width:44px;height:44px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:grab;box-shadow:0 0 12px rgba(0,212,255,0.25);transition:background 0.3s;}
.slide-thumb:active{cursor:grabbing;}
.slide-done{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px;text-align:center;font-size:13px;color:#34d399;font-family:'JetBrains Mono',monospace;margin-top:12px;display:none;}
 
/* TOGGLE SWITCH */
.sw{position:relative;width:42px;height:22px;flex-shrink:0;}
.sw input{opacity:0;width:0;height:0;position:absolute;}
.sw-track{position:absolute;inset:0;border-radius:11px;cursor:pointer;transition:0.3s;background:rgba(100,116,139,0.25);border:1px solid rgba(100,116,139,0.2);}
.sw input:checked+.sw-track{background:rgba(0,212,255,0.25);border-color:rgba(0,212,255,0.5);box-shadow:0 0 10px rgba(0,212,255,0.15);}
.sw-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#64748b;transition:0.3s;pointer-events:none;}
.sw input:checked~.sw-thumb{left:23px;background:var(--accent);}
 
/* TOAST */
.cs-quick-btn{padding:5px 10px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);border-radius:20px;color:#a78bfa;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.2s;}
.cs-quick-btn:hover{background:rgba(124,58,237,0.2);}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:8px;font-size:12px;font-family:'JetBrains Mono',monospace;z-index:10000;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast-ok{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);color:#34d399;}
.toast-err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#f87171;}
 
/* INS GRADE TABLE */
.grade-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.grade-tbl th{padding:7px 10px;font-size:9px;font-family:'JetBrains Mono',monospace;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border);text-align:left;}
.grade-tbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.025);font-family:'JetBrains Mono',monospace;color:var(--mid);cursor:pointer;}
.grade-tbl tr.sel td{background:rgba(0,212,255,0.07);color:var(--accent);}
.grade-tbl tr:hover td{background:rgba(255,255,255,0.02);}
 
/* SALARY ROWS */
.sr{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:6px;margin-bottom:5px;font-size:12px;}
.sr-label{color:var(--mid);}
.sr-val{font-family:'JetBrains Mono',monospace;font-weight:600;}
.sr-pos{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);}
.sr-neg{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.12);}
.sr-neu{background:rgba(0,0,0,0.2);border:1px solid var(--border);}

window.doLogin = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('err-box');
  err.style.display='none';
  if (!email||!pass){showErr('請填寫帳號與密碼');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>驗證中...';
  // Timeout if no response in 10s
  const loginTimeout = setTimeout(()=>{
    btn.disabled=false; btn.innerHTML='LOGIN';
    showErr('連線逾時，請重試');
  }, 10000);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    clearTimeout(loginTimeout);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('loading-screen').style.display='flex';
    // Timeout if buildApp takes too long
    setTimeout(()=>{
      if(document.getElementById('loading-screen').style.display!=='none'){
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('login-screen').style.display='flex';
        showErr('載入逾時，請重新登入');
      }
    }, 8000);
  } catch(e) {
    clearTimeout(loginTimeout);
    btn.disabled=false; btn.innerHTML='LOGIN';
    const msgs={
      'auth/invalid-credential':'帳號或密碼錯誤',
      'auth/wrong-password':'密碼錯誤',
      'auth/user-not-found':'找不到此帳號',
      'auth/too-many-requests':'嘗試太多次，請稍後再試',
      'auth/network-request-failed':'網路連線失敗'
    };
    showErr(msgs[e.code]||'登入失敗：'+e.message);
  }
};

function buildDesktopUI() {
  const mods = ROLE==='commander' ? MODS_COMMANDER : MODS_ACCOUNTANT;
  let sections = {};
  mods.forEach(m => {
    if (!moduleToggles[m.id] && m.id !== 'dashboard' && m.id !== 'audit' && m.id !== 'commander') {
      m.disabled = true;
    }
    if (!sections[m.section]) sections[m.section]=[];
    sections[m.section].push(m);
  });
 
  const roleBadge = ROLE==='commander'
    ? `<div class="role-badge role-commander"><span class="role-dot commander-dot"></span>COMMANDER</div>`
    : `<div class="role-badge role-accountant"><span class="role-dot accountant-dot"></span>ACCOUNTANT</div>`;
 
  let navHTML = '';
  let lastSection = '';
  mods.forEach(m => {
    if (m.section !== lastSection) {
      navHTML += `<div class="nav-section">${m.section}</div>`;
      lastSection = m.section;
    }
    const dis = m.disabled ? ' disabled' : '';
    navHTML += `<div class="nav-item${dis}" id="nav-${m.id}" onclick="showPanel('${m.id}')">
      <span class="nav-icon">${m.icon}</span><span>${m.name}</span>
    </div>`;
  });
 
  return `
  <div class="desktop-layout">
    <aside class="sidebar">

          <div class="chip" id="live-date"></div>

      </div>
      ${buildAllPanels()}

  </div>`;

async function loadDashboard() {
  // Staff count
  const staffSnap = await getDocs(collection(db,'users'));
  const drivers = staffSnap.docs.filter(d=>d.data().role==='driver');
  const employees = staffSnap.docs.filter(d=>d.data().type==='employee');
  document.getElementById('ds-staff').textContent = drivers.length;
  document.getElementById('ds-staff-sub').textContent = `員工 ${employees.length} / 承攬 ${drivers.length-employees.length}`;
 
  // Today's reports
  const rSnap = await getDocs(query(collection(db,'reports'),where('date','==',TODAY)));
  let totalD=0, totalR=0;
  rSnap.docs.forEach(d=>{totalD+=d.data().deliveryQty||0; totalR+=d.data().reverseQty||0;});
  document.getElementById('ds-deliv').textContent = (totalD+totalR).toLocaleString();
  document.getElementById('ds-deliv-sub').textContent = `配 ${totalD} / 逆 ${totalR}`;
 
  // Expiry warnings
  const expiring = staffSnap.docs.filter(d=>{
    const u=d.data(); const now=new Date();
    const check=(dateStr)=>{if(!dateStr)return false; const diff=(new Date(dateStr)-now)/86400000; return diff>=0&&diff<=30;};
    return check(u.licenseExpiry)||check(u.insuranceExpiry);
  });
  document.getElementById('ds-warn').textContent = expiring.length;
 
  // Estimated salary
  const monthSnap = await getDocs(query(collection(db,'monthlyStats'),where('month','==',MONTH)));
  let estSalary=0;
  monthSnap.docs.forEach(d=>{estSalary+=d.data().estimatedNet||0;});
  document.getElementById('ds-salary').textContent = '$'+Math.round(estSalary/1000)+'K';
 
  // Alerts
  let alertsHTML = '';
  expiring.forEach(d=>{
    const u=d.data();
    if(u.licenseExpiry){const days=Math.ceil((new Date(u.licenseExpiry)-new Date())/86400000); if(days<=30) alertsHTML+=`<div class="alert-item ae">🪪 <div><strong>${u.name}</strong> 駕照 ${days} 天後到期 (${u.licenseExpiry})</div></div>`;}
    if(u.insuranceExpiry){const days=Math.ceil((new Date(u.insuranceExpiry)-new Date())/86400000); if(days<=30) alertsHTML+=`<div class="alert-item aw">🛡️ <div><strong>${u.name}</strong> 險種 ${days} 天後到期 (${u.insuranceExpiry})</div></div>`;}
  });
  if(!alertsHTML) alertsHTML='<div class="alert-item as_">✓ <div>目前無緊急警示</div></div>';
  document.getElementById('dash-alerts').innerHTML=alertsHTML;
  // Load CS escalations
  try {
    const escSnap = await getDocs(query(collection(db,'csEscalations'),where('status','==','pending'),orderBy('timestamp','desc'),limit(5)));
    if(!escSnap.empty) {
      let escHTML = '';
      escSnap.docs.forEach(d=>{
        const e=d.data();
        const t=e.timestamp?.toDate?e.timestamp.toDate().toLocaleTimeString('zh-TW'):'';
        escHTML += `<div class="alert-item aw" style="cursor:pointer" onclick="viewEscalation('${d.id}')">
          💬 <div><strong>${e.driverName}</strong> 客服需要關注 · ${t}
          <div style="font-size:11px;color:var(--dim)">${e.triggerMessage?.slice(0,40)||''}...</div></div>
        </div>`;
      });
      document.getElementById('dash-alerts').innerHTML = escHTML + alertsHTML;
    }
  } catch(e) { /* no escalations collection yet */ }
 
  // Driver status
  let drHTML = '';
  for(const d of drivers.slice(0,6)) {
    const u=d.data();
    const rRef=await getDoc(doc(db,'reports',`${d.id}_${TODAY}`));
    const reported=rRef.exists();
    drHTML+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.03)">
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Orbitron',monospace;flex-shrink:0">${(u.name||'?')[0]}</div>
      <div style="flex:1"><div style="font-size:12.5px;font-weight:600">${u.name}</div>
      <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${reported?(rRef.data().deliveryQty+'件 / 逆'+rRef.data().reverseQty+'件'):'尚未回報'}</div></div>
      <span class="badge ${reported?'bg':'by'}">${reported?'已回報':'待回報'}</span>
    </div>`;
  }
  document.getElementById('dash-drivers').innerHTML = drHTML||'<div style="color:var(--dim);font-size:12px;text-align:center;padding:10px">無司機資料</div>';
  loadRealtimeDriverStatus();
  
  // Set up real-time listener for driver reports
  setupDriverRealtime(drivers);
}

async function loadHR() {
  const snap = await getDocs(collection(db,'users'));
  if(snap.empty){document.getElementById('hr-table').innerHTML='<div style="color:var(--dim);text-align:center;padding:14px;font-size:12px">尚無人員資料</div>';return;}
  let rows='';
  snap.docs.forEach(d=>{
    const u=d.data();
    const licExpiry=u.licenseExpiry;const insExpiry=u.insuranceExpiry;
    const licDays=licExpiry?Math.ceil((new Date(licExpiry)-new Date())/86400000):999;
    const insDays=insExpiry?Math.ceil((new Date(insExpiry)-new Date())/86400000):999;
    const licBadge=licDays<=7?'br':licDays<=30?'by':'bg';
    const insBadge=insDays<=7?'br':insDays<=30?'by':'bg';
    const roleLabel={commander:'負責人',accountant:'會計',driver:'司機'}[u.role]||u.role;
    rows+=`<tr>
      <td>${u.name||'—'}</td>
      <td><span class="badge ${u.role==='commander'?'bb':u.role==='accountant'?'bg':'bp'}">${roleLabel}</span></td>
      <td><span class="badge ${u.type==='employee'?'bb':'bp'}">${u.type==='employee'?'員工':'承攬'}</span></td>
      <td><span class="badge ${licBadge}">${licExpiry||'未設定'}</span></td>
      <td><span class="badge ${insBadge}">${insExpiry||'未設定'}</span></td>
      <td><span class="badge bg">在職</span></td>
      ${ROLE==='commander'?`<td style='display:flex;gap:4px'><button class="btn btn-p" style="font-size:10px;padding:3px 8px" onclick="editUser('${d.id}')">編輯</button><button class="btn btn-g" style="font-size:10px;padding:3px 8px" onclick="showPanel('files');setTimeout(()=>{const s=document.getElementById('upload-person');if(s)s.value='${u.name}';const c=document.getElementById('upload-cat');if(c)c.value='hr';},300)">上傳證件</button></td>`:''}
    </tr>`;
  });
  document.getElementById('hr-table').innerHTML=`
    <table class="tbl"><thead><tr>
      <th>姓名</th><th>角色</th><th>類型</th><th>駕照到期</th><th>險種到期</th><th>狀態</th>${ROLE==='commander'?'<th></th>':''}
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}
 
window.openAddUser=()=>{ document.getElementById('add-user-modal').style.display='block'; };
window.closeAddUser=()=>{ document.getElementById('add-user-modal').style.display='none'; };
window.editUser=async(uid)=>{
  const snap=await getDoc(doc(db,'users',uid));
  if(!snap.exists())return;
  const u=snap.data();
  document.getElementById('u-name').value=u.name||'';
  document.getElementById('u-email').value=u.email||'';
  document.getElementById('u-role').value=u.role||'driver';
  document.getElementById('u-type').value=u.type||'employee';
  document.getElementById('u-price-d').value=u.priceDelivery||50;
  document.getElementById('u-price-r').value=u.priceReverse||35;
  document.getElementById('u-allowance').value=u.allowance||2000;
  document.getElementById('u-deduct').value=u.regularDeduct||500;
  const lt=document.getElementById('u-license-type');
  if(lt)lt.value=u.licenseType||'職業大貨車';
  document.getElementById('u-license').value=u.licenseExpiry||'';
  document.getElementById('u-insurance').value=u.insuranceExpiry||'';
  document.getElementById('add-user-modal').dataset.editUid=uid;
  document.getElementById('add-user-modal').style.display='block';
};
window.saveUser=async()=>{
  const modal=document.getElementById('add-user-modal');
  const uid=modal.dataset.editUid;
  if(!uid){showToast('請至 Firebase Auth 建立帳號後取得 UID','err');return;}
  const data={
    name:document.getElementById('u-name').value,
    email:document.getElementById('u-email').value,
    role:document.getElementById('u-role').value,
    type:document.getElementById('u-type').value,
    priceDelivery:+document.getElementById('u-price-d').value,
    priceReverse:+document.getElementById('u-price-r').value,
    allowance:+document.getElementById('u-allowance').value,
    regularDeduct:+document.getElementById('u-deduct').value,
    licenseType:document.getElementById('u-license-type')?.value||'',
    licenseExpiry:document.getElementById('u-license').value,
    insuranceExpiry:document.getElementById('u-insurance').value,
    updatedAt:serverTimestamp()
  };
  await setDoc(doc(db,'users',uid),data,{merge:true});
  await addAudit('UPDATE',`更新人員資料：${data.name}`);
  showToast('✓ 人員資料已儲存');
  closeAddUser();
  loadHR();
};

window.calcSalary=async()=>{
  const uid=document.getElementById('sal-person')?.value;
  let labEmp=0,healthEmp=0,empType='contractor';
  if(uid){
    const snap=await getDoc(doc(db,'users',uid));
    if(snap.exists()){
      const u=snap.data();
      labEmp=u.labourEmployee||0;healthEmp=u.healthEmployee||0;empType=u.type||'contractor';
      document.getElementById('s-qd').value=0;document.getElementById('s-qr').value=0;
      document.getElementById('s-pd').value=u.priceDelivery||50;
      document.getElementById('s-pr').value=u.priceReverse||35;
      document.getElementById('s-al').value=u.allowance||2000;
      document.getElementById('s-de').value=u.regularDeduct||500;
      // Load month stats
      const mSnap=await getDoc(doc(db,'monthlyStats',`${uid}_${MONTH}`));
      if(mSnap.exists()){document.getElementById('s-qd').value=mSnap.data().totalDelivery||0;document.getElementById('s-qr').value=mSnap.data().totalReverse||0;}
    }
  }
  const qd=+document.getElementById('s-qd').value||0;
  const qr=+document.getElementById('s-qr').value||0;
  const pd=+document.getElementById('s-pd').value||0;
  const pr=+document.getElementById('s-pr').value||0;
  const al=+document.getElementById('s-al').value||0;
  const de=+document.getElementById('s-de').value||0;
  const delivery=qd*pd, reverse=qr*pr, gross=delivery+reverse+al;
  const nhiDeduct=(empType==='contractor'&&gross>=20000)?Math.round(gross*0.0211):0;
  const net=gross-labEmp-healthEmp-nhiDeduct-de;
  const el=document.getElementById('sal-result');
  if(!el)return;
  el.innerHTML=[
    {l:'配送收入',v:'+$'+delivery.toLocaleString(),cls:'sr-pos',vc:'#34d399'},
    {l:'逆物流收入',v:'+$'+reverse.toLocaleString(),cls:'sr-pos',vc:'#34d399'},
    {l:'津貼',v:'+$'+al.toLocaleString(),cls:'sr-pos',vc:'#34d399'},
    empType==='employee'?{l:'勞保員工負擔（自動）',v:'-$'+labEmp.toLocaleString(),cls:'sr-neg',vc:'#f87171'}:null,
    empType==='employee'?{l:'健保員工負擔（自動）',v:'-$'+healthEmp.toLocaleString(),cls:'sr-neg',vc:'#f87171'}:null,
    nhiDeduct>0?{l:'二代健保(2.11%)',v:'-$'+nhiDeduct.toLocaleString(),cls:'sr-neg',vc:'#f87171'}:null,
    {l:'代扣費用',v:'-$'+de.toLocaleString(),cls:'sr-neg',vc:'#f87171'},
    {l:'🎯 實發金額',v:'$'+net.toLocaleString(),cls:'sr-tot',vc:'var(--accent)',big:true},
  ].filter(Boolean).map(r=>`<div class="sr ${r.cls}"><span class="sr-label" ${r.big?'style="font-size:14px;font-weight:700;color:var(--text)"':''}>${r.l}</span><span class="sr-val" style="color:${r.vc};${r.big?'font-family:Orbitron,monospace;font-size:18px':''}">${r.v}</span></div>`).join('');
};
 
async function loadSalaryList(){
  const snap=await getDocs(collection(db,'users'));
  const drivers=snap.docs.filter(d=>d.data().role==='driver');
  let rows='';
  for(const d of drivers){
    const u=d.data();
    const mSnap=await getDoc(doc(db,'monthlyStats',`${d.id}_${MONTH}`));
    const td=mSnap.exists()?mSnap.data().totalDelivery||0:0;
    const tr2=mSnap.exists()?mSnap.data().totalReverse||0:0;
    const gross=td*(u.priceDelivery||50)+tr2*(u.priceReverse||35)+(u.allowance||0);
    const net=gross-(u.labourEmployee||0)-(u.healthEmployee||0)-(u.regularDeduct||0);
    rows+=`<tr><td>${u.name}</td><td><span class="badge ${u.type==='employee'?'bb':'bp'}">${u.type==='employee'?'員工':'承攬'}</span></td><td style="color:var(--mid)">$${gross.toLocaleString()}</td><td style="color:var(--accent);font-family:'JetBrains Mono',monospace">$${net.toLocaleString()}</td><td><button class="btn btn-p" style="font-size:10px;padding:3px 8px" onclick="exportSalaryPDF('${d.id}','${u.name}')">📄 PDF</button></td></tr>`;
  }
  const el=document.getElementById('sal-list');
  if(el)el.innerHTML=`<div class='tbl-wrap'><table class="tbl"><thead><tr><th>姓名</th><th>類型</th><th>毛收入</th><th>預估實發</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

window.createAccountAndSendEmail=async()=>{

  const msg=document.getElementById('photo-msg');

    const storage=getStorage(fbApp);
    const storageRef=ref(storage,`avatars/\${CU.uid}`);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    await updateDoc(doc(db,'users',CU.uid),{photoURL:url});

    if(ph)ph.innerHTML=`<img src="\${url}" style="width:100%;height:100%;object-fit:cover">`;

let pendingFiles = [];
 
window.handleDrop = (e) => {
  e.preventDefault();
  document.getElementById('drop-zone').style.borderColor='rgba(0,212,255,0.25)';
  addToQueue([...e.dataTransfer.files]);
};
window.handleFileSelect = (input) => { addToQueue([...input.files]); };
 
function addToQueue(files){
  pendingFiles.push(...files);
  renderQueue();
  document.getElementById('upload-btn').style.display='block';
}
 
function renderQueue(){
  const el=document.getElementById('upload-queue');
  if(!el)return;
  el.innerHTML=pendingFiles.map((f,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;margin-bottom:6px">
      <span style="font-size:16px">${getFileIcon(f.name)}</span>
      <div style="flex:1;min-width:0"><div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div>
      <div style="font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace">${formatSize(f.size)}</div></div>
      <div style="width:60px;text-align:right"><div class="badge bgr" id="fstatus-${i}">待上傳</div></div>
      <span style="cursor:pointer;color:var(--dim);font-size:12px" onclick="removeFile(${i})">✕</span>
    </div>`).join('');
}
 
window.removeFile=(i)=>{ pendingFiles.splice(i,1); renderQueue(); if(!pendingFiles.length)document.getElementById('upload-btn').style.display='none'; };
 
window.uploadFiles=async()=>{
  if(!pendingFiles.length)return;
  const {getStorage,ref,uploadBytes,getDownloadURL}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js');
  const storage=getStorage(fbApp);
  const cat=document.getElementById('upload-cat')?.value||'other';
  const note=document.getElementById('upload-note')?.value||'';
  const person=document.getElementById('upload-person')?.value||'';
  const btn=document.getElementById('upload-btn');
  btn.disabled=true; btn.textContent='上傳中...';
 
  for(let i=0;i<pendingFiles.length;i++){
    const f=pendingFiles[i];
    const statusEl=document.getElementById(`fstatus-${i}`);
    if(statusEl){statusEl.className='badge by';statusEl.textContent='上傳中';}
    try{
      const path=`files/${cat}/${Date.now()}_${f.name}`;
      const storageRef=ref(storage,path);
      await uploadBytes(storageRef,f);
      const url=await getDownloadURL(storageRef);
      await addDoc(collection(db,'files'),{
        name:f.name, size:f.size, type:f.type||'unknown',
        category:cat, note, person, url, path,
        uploadedBy:CD?.name||CU?.email,
        uploadedAt:serverTimestamp()
      });
      await addAudit('UPLOAD',`上傳檔案：${f.name} (${cat})`);
      if(statusEl){statusEl.className='badge bg';statusEl.textContent='✓ 完成';}
    }catch(e){
      if(statusEl){statusEl.className='badge br';statusEl.textContent='失敗';}
    }
  }
  btn.disabled=false; btn.textContent='上傳完成 ✓';
  pendingFiles=[];
  setTimeout(()=>{ loadFiles(); document.getElementById('upload-note').value=''; },800);
};
 
async function loadFiles(){

  const {query,where,orderBy,limit,getDocs,collection:col}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  let q;
  if(cat) q=query(collection(db,'files'),where('category','==',cat),orderBy('uploadedAt','desc'),limit(50));
  else q=query(collection(db,'files'),orderBy('uploadedAt','desc'),limit(50));
  const snap=await getDocs(q);
  const el=document.getElementById('files-list');
  if(!el)return;
  if(snap.empty){el.innerHTML='<div style="color:var(--dim);text-align:center;padding:18px;font-size:12px">尚無檔案</div>';return;}
  // Count by category
  const counts={};
  snap.docs.forEach(d=>{ const c=d.data().category||'other'; counts[c]=(counts[c]||0)+1; });
  FILE_CATS.forEach(c=>{ const el2=document.getElementById('count-'+c.id); if(el2)el2.textContent=(counts[c.id]||0)+' 個'; });
  el.innerHTML=`<div class='tbl-wrap'><table class="tbl"><thead><tr><th></th><th>檔名</th><th>分類</th><th>說明</th><th>大小</th><th>上傳者</th><th>時間</th><th></th></tr></thead><tbody>`+
  snap.docs.map(d=>{
    const f=d.data();
    const date=f.uploadedAt?.toDate?f.uploadedAt.toDate().toLocaleDateString('zh-TW'):'';
    const catLabel=FILE_CATS.find(c=>c.id===f.category)?.label||f.category;
    return `<tr>
      <td style="font-size:18px">${getFileIcon(f.name)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</td>

function getFileIcon(name){
  const ext=(name||'').split('.').pop().toLowerCase();
  const icons={jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',mp4:'🎬',mov:'🎬',zip:'🗜️',rar:'🗜️'};
  return icons[ext]||'📎';
}
function formatSize(bytes){
  if(!bytes)return '—';
  if(bytes<1024)return bytes+'B';
  if(bytes<1024*1024)return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

function detectEscalation(message) {
  // Check anger / urgency keywords
  const angryWords = ['生氣','不爽','爛','垃圾','投訴','客訴','混蛋','幹','靠','算了','不幹了','嚴重','緊急','馬上','立刻','要求'];
  const isAngry = angryWords.some(w => message.includes(w));
 
  // Check repeated questions (3+ times same topic)
  const topic = message.slice(0,10);
  csRepeatTracker[topic] = (csRepeatTracker[topic] || 0) + 1;
  const isRepeated = csRepeatTracker[topic] >= 3;
 
  return isAngry || isRepeated;
}
 
async function sendCSMessage() {
  const input = document.getElementById('cs-input');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';
 
  addCSMsg('user', text);
  csHistory.push({ role: 'user', parts: [{ text }] });
 
  // Check escalation (silent)
  if (detectEscalation(text) && !csEscalated) {
    csEscalated = true;
    // Silently notify boss via Firestore - NO UI indication
    await saveCSEscalation(text);
  }
 
  // Show typing
  addCSMsg('agent', '', true);
 
  // Add slight random delay (1-2.5s) to feel more human
  const delay = 1000 + Math.random() * 1500;
  await new Promise(r => setTimeout(r, delay));
 
  try {
    const messages = [
      { role: 'user', parts: [{ text: CS_SYSTEM_PROMPT + '\n\n司機資料：' + JSON.stringify({name: CD?.name, type: CD?.type, priceDelivery: CD?.priceDelivery, priceReverse: CD?.priceReverse, allowance: CD?.allowance}) }] },
      { role: 'model', parts: [{ text: '好的，我是徐美玲，很高興為您服務！' }] },
      ...csHistory.slice(-8) // keep last 8 messages for context
    ];
 
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${CS_GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: messages,
        generationConfig: { temperature: 0.85, maxOutputTokens: 300 }
      })
    });
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '不好意思，我這邊稍微卡住了，可以再說一次嗎？😅';
 
    csHistory.push({ role: 'model', parts: [{ text: reply }] });
    addCSMsg('agent', reply);
 
    // Save conversation
    await saveCSSession(text, reply);
  } catch(e) {
    addCSMsg('agent', '不好意思，我這邊網路有點問題，可以稍後再試嗎？');
  }
}

function initSlide(){
  const wrap=document.getElementById('m-slide-wrap');
  const thumb=document.getElementById('m-slide-thumb');
  if(!wrap||!thumb)return;
  let dragging=false,startX=0,curX=0;
  const maxX=()=>wrap.offsetWidth-thumb.offsetWidth-8;
  const onStart=(x)=>{dragging=true;startX=x-curX;};
  const onMove=(x)=>{
    if(!dragging)return;
    curX=Math.max(0,Math.min(x-startX,maxX()));
    thumb.style.left=(4+curX)+'px';
    const pct=curX/maxX();
    thumb.style.opacity=0.6+pct*0.4;
  };
  const onEnd=async()=>{
    if(!dragging)return;dragging=false;
    if(curX>=maxX()*0.85){await submitReport();}
    else{curX=0;thumb.style.left='4px';}
  };
  thumb.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX);},{passive:true});
  thumb.addEventListener('touchmove',e=>{onMove(e.touches[0].clientX);},{passive:true});
  thumb.addEventListener('touchend',onEnd);
  thumb.addEventListener('mousedown',e=>{onStart(e.clientX);});
  document.addEventListener('mousemove',e=>{onMove(e.clientX);});
  document.addEventListener('mouseup',onEnd);
}

  if(!el)return;
  if(snap.empty){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px;font-family:JetBrains Mono,monospace">目前無公告</div>';return;}
  el.innerHTML=snap.docs.filter(d=>{const t=d.data().target;return t==='all'||t==='driver';}).map(d=>{
    const a=d.data();
    const date=a.createdAt?.toDate?a.createdAt.toDate().toLocaleDateString('zh-TW'):'';
    return `<div class="glass-card" style="margin-bottom:10px">
      <div style="font-size:14px;font-weight:600;margin-bottom:6px">${a.title}</div>
      <div style="font-size:12.5px;color:var(--mid);line-height:1.7">${a.body}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:8px;font-family:'JetBrains Mono',monospace">${date} · ${a.createdBy||''}</div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">無您可查看的公告</div>';
}
 
// ── TOAST ────────────────────────────────────────────────
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=type==='err'?'toast-err':'toast-ok';
  t.style.opacity=1;setTimeout(()=>{t.style.opacity=0;},2800);
}
window.showToast=showToast;
 
// ── FIREWORKS ─────────────────────────────────────────────
(function(){
  const c=document.getElementById('fw'),ctx=c.getContext('2d');
  function r(){c.width=innerWidth;c.height=innerHeight;}r();window.addEventListener('resize',r);
  let pts=[],rks=[];
  class P{constructor(x,y,h){this.x=x;this.y=y;this.h=h;this.a=1;this.s=Math.random()*3+1;this.ang=Math.random()*Math.PI*2;this.d=Math.random()*0.013+0.007;this.vx=Math.cos(this.ang)*this.s;this.vy=Math.sin(this.ang)*this.s;}u(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.05;this.a-=this.d;}dr(){ctx.save();ctx.globalAlpha=this.a;ctx.fillStyle=`hsl(${this.h},100%,65%)`;ctx.beginPath();ctx.arc(this.x,this.y,1.5,0,Math.PI*2);ctx.fill();ctx.restore();}}
  class R{constructor(){this.x=Math.random()*innerWidth*.8+innerWidth*.1;this.y=innerHeight;this.vy=-(Math.random()*6+8);this.ty=Math.random()*innerHeight*.4+80;this.h=Math.random()*360;}u(){this.y+=this.vy;}ex(){for(let i=0;i<65;i++)pts.push(new P(this.x,this.y,this.h));}done(){return this.y<=this.ty;}}
  function loop(){ctx.fillStyle='rgba(0,0,0,0.14)';ctx.fillRect(0,0,c.width,c.height);rks=rks.filter(r=>{r.u();if(r.done()){r.ex();return false;}ctx.save();ctx.globalAlpha=0.8;ctx.fillStyle=`hsl(${r.h},100%,70%)`;ctx.beginPath();ctx.arc(r.x,r.y,2,0,Math.PI*2);ctx.fill();ctx.restore();return true;});pts=pts.filter(p=>{p.u();if(p.a>0)p.dr();return p.a>0;});requestAnimationFrame(loop);}
  loop();
  setTimeout(()=>{for(let i=0;i<5;i++)setTimeout(()=>rks.push(new R),i*250);},800);
  const now=new Date();if(now.getMonth()===2&&now.getDate()===19)setInterval(()=>rks.push(new R),800);
  else setInterval(()=>rks.push(new R),5000);
})();
 
// Init Commander panel when shown
const origShow=window.showPanel;
window.showPanel=(id)=>{origShow(id);if(id==='commander'){buildToggles();loadInterviewQuestions();};};
</script>
