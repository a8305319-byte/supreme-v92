<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在地物流有限公司 | Alpha Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { oledBlack: '#000000', neonCyan: '#22d3ee', neonRose: '#f43f5e' } } }
        }
    </script>
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; margin: 0; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        /* 強制讓所有按鈕具備高度與背景色，防止樣式引擎失效 */
        button { min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
