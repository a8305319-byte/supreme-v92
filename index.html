class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  render() {
    if (this.state.hasError) return <div className="min-h-screen bg-[#020617] text-white flex flex-col items-center justify-center p-6 text-center font-black"><div className="bg-rose-900/20 p-8 rounded-[2rem] shadow-2xl"><h2 className="text-3xl text-rose-400 mb-4 animate-pulse">🛡️ 系統底層修復中</h2><button onClick={() => window.location.reload()} className="w-full py-4 bg-rose-600 rounded-xl">🔄 重新連線</button></div></div>;

}

const safeStorage = { get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }, set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }, remove: (k) => { try { localStorage.removeItem(k); } catch(e) {} } };

const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const [geoInfo, setGeoInfo] = useState("獲取位置中...");
  const deviceId = useMemo(() => navigator.userAgent.replace(/[^a-zA-Z0-9]/g, '').slice(-10) + '-' + screen.width, []);

  useEffect(() => {
    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => setGeoInfo(`GPS:${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}`), () => setGeoInfo("GPS:未授權"));
    if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } 
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  };

  const handleFinish = () => {
    setIsDrawing(false);
    if(canvasRef.current) {
      const ctx = canvasRef.current.getContext('2d');
      ctx.font = "8px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      ctx.fillText(`${geoInfo} | ID:${deviceId} | ${new Date().toISOString()}`, 5, 145);
      onSign(canvasRef.current.toDataURL());
    }
  };

  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden relative">
        <canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onMouseMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onMouseUp={handleFinish} onTouchStart={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onTouchMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onTouchEnd={handleFinish} />
        <div className="absolute bottom-1 left-2 text-[8px] text-slate-600 pointer-events-none">{geoInfo} | Dev:{deviceId}</div>
      </div>
      <button onClick={()=>{canvasRef.current.getContext('2d').clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1">清除重簽</button>
    </div>
  );
};

               </div>

// 👻 幽靈對話 (含 Admin AI 語氣轉化器)
function ChatModal({ target, currentUserRole, onClose }) {
  const [input, setInput] = useState("");
  const isPrivileged = target?.priority_access === true; 
  const [msgs, setMsgs] = useState([]);
  const [isTranslating, setIsTranslating] = useState(false);

  if (currentUserRole === 'admin' && isPrivileged) {
    return (
      <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 animate-zoom" onClick={onClose}>
        <div className="bg-slate-900 border border-slate-700 p-8 rounded-[2.5rem] w-full max-w-sm text-center" onClick={e=>e.stopPropagation()}><button onClick={onClose} className="absolute top-4 right-4 p-2"><X size={16}/></button><Shield size={48} className="text-slate-600 mx-auto mb-4" /><p className="text-slate-400 text-sm italic tracking-widest">[ 此通道已轉交系統底層靜默處理 ]</p></div>
      </div>
    );
  }

  useEffect(() => { setMsgs([{ id: 1, sender: isPrivileged ? 'hq' : 'ai', text: isPrivileged ? '【內部特權直連通道已開啟】' : '您好！系統正進行底層日誌校驗。' }]); }, [isPrivileged]);

  const handleSend = () => {
    if(!input.trim()) return;
    
    // Admin 語氣轉化邏輯 (情緒遮罩)
    if (currentUserRole === 'admin') {
       setIsTranslating(true);
       setTimeout(() => {
         setIsTranslating(false);
         // 模擬 AI 把 Admin 的隨便講話，包裝成標準術語
         const translatedText = `[AI 轉化規章語氣]：系統偵測到您的數據提報有誤，請依據第3章第4條規範重新核實。原始備註：(${input})`;
         setMsgs(prev => [...prev, { id: Date.now(), sender: 'hq', text: translatedText }]);
         setInput("");
       }, 1500);
       return;
    }

    setMsgs(prev => [...prev, { id: Date.now(), sender: 'me', text: input }]);
    setInput("");

    if (isPrivileged) {
      setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'hq', text: '收到，直達總部，無 AI 介入。' }]); }, 300);
    } else {
      setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: '已掛載高階核算模組進行複核，請稍候。' }]); }, Math.random() * 1400 + 1800);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 animate-zoom" onClick={onClose}>
       <div className={`bg-slate-900 border ${isPrivileged ? 'border-fuchsia-500/30' : 'border-blue-500/30'} w-full max-w-md h-[80vh] rounded-[2.5rem] flex flex-col overflow-hidden font-black`} onClick={e=>e.stopPropagation()}>
         <div className="p-4 bg-slate-800 flex justify-between items-center z-10"><div className="flex items-center gap-2"><Support size={24} className={isPrivileged?'text-fuchsia-400':'text-blue-400'}/> <h3 className={`text-white italic ${isPrivileged ? 'text-fuchsia-300' : ''}`}>{isPrivileged ? '特權直連' : `客服中心`}</h3></div><button onClick={onClose} className="p-2"><X size={16}/></button></div>
         <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">

// 👑 總裁與行政管理中樞 (AdminHub) 
function AdminHub({ authRole, partners, onLogout, updateField, setModalType, sq, setSq, db, appId, setChatTarget, setLayer, writeGodLog }) {
  const [adminTab, setAdminTab] = useState('formal'); 
  const visiblePartners = useMemo(() => authRole === 'admin' ? (partners || []).filter(p => p.phone !== '0976017938') : (partners || []), [partners, authRole]);
  const formalPartners = useMemo(() => visiblePartners.filter(p => (p.status === 'approved' || p.status === 'frozen') && (p.name?.toLowerCase().includes(sq.toLowerCase()) || p.phone?.includes(sq))), [visiblePartners, sq]);

  // 🧊 發布薪資 (包含凍結快照 Payload)
  const handlePublishSalary = async () => {
    if(!window.confirm("發布薪資並建立凍結快照？")) return; 
    for(const p of formalPartners) { 
      const del_price = p.custom_del_price || 15;
      const pkp_price = p.custom_pkp_price || 10;
      const deductions = (p.labor_fee||0) + (p.health_fee||0);
      const net = (p.total_del * del_price) + (p.total_pkp * pkp_price) - deductions; 
      
      const snapshotPayload = {
         del_count: p.total_del, del_price: del_price,
         pkp_count: p.total_pkp, pkp_price: pkp_price,
         deductions: deductions
      };

      await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id), { 
        salary_status: 'pending_sign', 
        salary_record: { net, snapshot: snapshotPayload, period: new Date().toLocaleDateString('zh-TW'), timestamp: Date.now() } 
      }); 
    } 
    writeGodLog("發布薪資", "建立凍結快照並推播電子薪資單");
    showToast("✅ 已建立快照並推播"); 
  };

  return (
    <div className="p-4 md:p-8 max-w-full mx-auto bg-[#020617] min-h-screen font-black animate-[fadeIn_0.5s_ease-out]">
      <div className="flex justify-between items-center mb-8 gap-6">
         <div><h2 className="text-white text-3xl md:text-4xl italic tracking-tighter uppercase mb-2">營運指揮中心</h2><span className={`inline-block text-xs px-4 py-1 rounded-xl border ${authRole==='super_admin'?'text-amber-500 border-amber-500/30 bg-amber-900/30':'text-fuchsia-400 border-fuchsia-500/30 bg-fuchsia-900/30'}`}>{authRole==='super_admin'?'👑 總裁統帥':'👑 營運總部'}</span></div>
         <div className="flex gap-2">
            {authRole==='super_admin' && <button onClick={()=>setLayer('driver')} className="hidden md:flex bg-amber-500 text-black px-4 py-3 rounded-xl text-xs"><Package size={16}/> 報帳台</button>}
            <button onClick={handlePublishSalary} className="bg-emerald-600 text-white px-4 py-3 rounded-xl text-xs flex gap-1"><Banknote size={16}/> 發薪</button>
            <button onClick={()=>setModalType('tools')} className="bg-slate-800 border border-white/10 px-4 py-3 rounded-xl text-xs text-white flex gap-1"><Settings size={16}/> 工具箱</button>
         </div>
      </div>
      
      <div className="flex items-center gap-4 mb-6"><div className="flex-1 flex items-center gap-3 bg-black/40 p-4 rounded-2xl border border-white/5"><Search size={24} className="text-blue-500" /><input placeholder="搜尋姓名或手機..." className="bg-transparent border-none outline-none text-white text-lg w-full" value={sq} onChange={e=>setSq(e.target.value)} /></div></div>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {formalPartners.map(p => { 
           const p_net = (p.total_del*(p.custom_del_price||15))+(p.total_pkp*(p.custom_pkp_price||10)); 
           return (
             <div key={p.id} className={`bg-slate-900/80 p-5 rounded-[1.5rem] border ${p.has_conflict ? 'border-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.3)]' : 'border-white/5'} relative`}>
               <div className="absolute top-5 right-5 flex gap-2">
                 {p.priority_access && <span className="bg-fuchsia-900/60 text-fuchsia-300 border border-fuchsia-500/30 text-[9px] px-2 py-1 rounded">特權通道</span>}
                 {p.has_conflict && <span className="bg-amber-600 text-white text-[9px] px-2 py-1 rounded animate-pulse">黃燈異常</span>}
                 <button onClick={() => setChatTarget(p)} className="bg-blue-600/30 text-blue-400 p-2 rounded-lg"><Message size={16}/></button>
               </div>

// 🚐 司機工作台 (DriverHub)
function DriverHub({ user, currentPartner, onLogout, updateField, authRole, db, appId, setChatTarget, setLayer }) {
  const [del,setDel]=useState(0); const [pkp,setPkp]=useState(0); const [cod,setCod]=useState(""); 
  const [sData,setSData]=useState(null); 
  const [isConfirming, setIsConfirming] = useState(false); const undoTimerRef = useRef(null);
  
  // 衝突狀態與 UI
  const [showConflict, setShowConflict] = useState(false);
  const [conflictData, setConflictData] = useState(null);
  const [showSalary, setShowSalary] = useState(false);

  const startSubmit = () => {
    if(!sData) return showToast("⚠️ 數位防偽簽章為必填",true);
    
    // 🥊 模擬斷網衝突觸發 (展示用：當配送輸入 99 時，強制觸發衝突報備)
    if (del === 99) {
      setConflictData({ local: { del, pkp }, server: { del: currentPartner.total_del, pkp: currentPartner.total_pkp } });
      setShowConflict(true);
      return;
    }

    setIsConfirming(true);
    undoTimerRef.current = setTimeout(() => { executeSubmit(); }, 3000);
  };

  const cancelSubmit = () => { clearTimeout(undoTimerRef.current); setIsConfirming(false); showToast("🛑 已撤回提交"); };

  const executeSubmit = async (reason = null) => { 
    setIsConfirming(false); setShowConflict(false);
    try {
      const h = { date: new Date().toLocaleDateString('zh-TW'), time: new Date().toLocaleTimeString('zh-TW',{hour12:false}), del, pkp, cod: parseInt(cod)||0 };
      const nextH = [...(currentPartner?.history||[]), h].slice(-31);
      
      let payload = { total_del: (currentPartner.total_del||0)+del, total_pkp: (currentPartner.total_pkp||0)+pkp, history: nextH };
      
      // 如果有報備理由，亮黃燈
      if (reason) { payload.has_conflict = true; payload.conflict_reason = reason; }

      await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), payload); 
      setDel(0); setPkp(0); setCod(""); setSData(null); 
      showToast(reason ? "⚠️ 異常已報備，亮起黃燈" : "✅ 數據加密傳送成功！"); 
      speak(reason ? "異常報備已傳送" : "數據已接收，辛苦了"); 
    } catch (e) { showToast("❌ 離線緩存中，將於背景補傳", true); }
  };

  if(!currentPartner) return <div className="loading-container bg-[#020617] font-black"><div className="loader mb-4"></div><p className="text-blue-500 animate-pulse">連線中...</p></div>;

  return (
    <div className="min-h-screen bg-[#020617] flex flex-col items-center p-4 pb-24 font-black">
      
      {showConflict && <ConflictModal localData={conflictData.local} serverData={conflictData.server} onResolve={(type, reason) => {
        if(type === 'accept_server') { setShowConflict(false); showToast("已捨棄離線數據"); setDel(0); setPkp(0); setSData(null); }
        else { executeSubmit(reason); }
      }} />}
      
      {currentPartner.salary_status === 'pending_sign' && (
        <div className="w-full max-w-[500px] mb-6 bg-emerald-600/90 p-5 rounded-3xl flex justify-between items-center shadow-2xl">
           <div><p className="text-xs">結算快照已產生</p><p className="text-white text-sm">請核對明細並簽收</p></div>
           <button onClick={()=>setShowSalary(true)} className="bg-white text-emerald-700 px-4 py-2 rounded-xl text-sm">前往確權</button>
        </div>
      )}
      
      {showSalary && <SalarySignModal partner={currentPartner} onClose={()=>setShowSalary(false)} onAction={async(type,data)=>{
         await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), { salary_status: 'confirmed' });
         showToast("✅ 已成功回傳存證"); setShowSalary(false);
      }} />}

      <div className="w-full max-w-[500px] mb-6 flex justify-between items-end">
        <div>
           {authRole==='super_admin' && <button onClick={()=>setLayer('admin')} className="text-amber-500 text-[10px] border border-amber-500/30 px-3 py-1 rounded-full mb-2">返回總部</button>}
           <h2 className="text-3xl text-white italic tracking-tighter uppercase mb-1">在地物流</h2>
           <p className="text-slate-500 text-[10px]">(輸入 99 可測試離線衝突)</p>
        </div>
        <button onClick={()=>setChatTarget(currentPartner)} className={`text-white p-3 rounded-2xl ${currentPartner.priority_access ? 'bg-fuchsia-600' : 'bg-blue-600'}`}><Support size={18} /></button>
      </div>

      <div className="bg-slate-900/80 p-6 rounded-[2.5rem] w-full max-w-[500px] shadow-2xl border border-white/5">
        <div className="space-y-4 mb-6">
           <div className="bg-black/50 p-4 rounded-2xl border border-white/5">
             <p className="text-[11px] text-blue-400 uppercase mb-3 text-center">今日配送件數</p>
             <div className="flex items-center justify-between">
               <button onClick={()=>setDel(Math.max(0, del-1))} className="w-12 h-12 bg-slate-700 text-white rounded-xl text-xl">-1</button>
               <span className="text-4xl text-white font-black">{del}</span>
               <div className="flex gap-2">
                 <button onClick={()=>setDel(del+1)} className="w-12 h-12 bg-blue-600 text-white rounded-xl text-xl">+1</button>
                 <button onClick={()=>setDel(del+5)} className="w-12 h-12 bg-indigo-600 text-white rounded-xl text-xl">+5</button>
               </div>
             </div>
           </div>
           
           <div className="bg-black/50 p-4 rounded-2xl border border-white/5">
             <p className="text-[11px] text-cyan-400 uppercase mb-3 text-center">今日逆收件數</p>
             <div className="flex items-center justify-between">
               <button onClick={()=>setPkp(Math.max(0, pkp-1))} className="w-12 h-12 bg-slate-700 text-white rounded-xl text-xl">-1</button>
               <span className="text-4xl text-white font-black">{pkp}</span>
               <div className="flex gap-2">
                 <button onClick={()=>setPkp(pkp+1)} className="w-12 h-12 bg-cyan-600 text-white rounded-xl text-xl">+1</button>
                 <button onClick={()=>setPkp(pkp+5)} className="w-12 h-12 bg-teal-600 text-white rounded-xl text-xl">+5</button>
               </div>
             </div>
           </div>
        </div>

        <div className="bg-amber-900/10 p-6 rounded-2xl border border-amber-500/30 mb-6 text-center">
           <p className="text-xs text-amber-500 mb-2"><Banknote size={16} className="inline"/> 今日代收 (C.O.D)</p>
           <input type="number" placeholder="輸入金額..." className="w-full bg-transparent text-center text-3xl text-amber-400 outline-none border-b border-amber-500/30 pb-2" value={cod} onChange={e=>setCod(e.target.value)} />
        </div>
        
        <div className="mb-6"><p className="text-blue-400 text-[11px] text-center mb-2"><Pen size={14} className="inline"/> 三位一體電子簽章 (含硬體指紋)</p><SignaturePad onSign={setSData} /></div>
        
        {!isConfirming ? (
           <button onClick={startSubmit} className="w-full py-5 rounded-2xl bg-blue-600 text-white text-xl uppercase tracking-widest active:scale-95">提交流程</button>
        ) : (
           <div className="relative w-full py-5 rounded-2xl bg-rose-600 text-white text-xl uppercase tracking-widest overflow-hidden cursor-pointer" onClick={cancelSubmit}>
             <div className="absolute top-0 left-0 h-full bg-rose-800 animate-progress z-0"></div>
             <span className="relative z-10">點擊撤回 (3秒)</span>
           </div>
        )}
      </div>
    </div>
  );
}

                  <div className="space-y-2">
                    <input placeholder="真實姓名" className="w-full bg-slate-800 p-3 rounded-lg text-xs outline-none" value={expressData.name} onChange={e=>setExpressData({...expressData, name: e.target.value})} />
                    <input placeholder="手機門號 (10碼)" type="tel" className="w-full bg-slate-800 p-3 rounded-lg text-xs outline-none" value={expressData.phone} onChange={e=>setExpressData({...expressData, phone: e.target.value})} />
                    <label className="flex items-center gap-2 text-[10px] text-fuchsia-200 py-1"><input type="checkbox" checked={expressData.priority_access} onChange={e=>setExpressData({...expressData, priority_access: e.target.checked})} className="accent-fuchsia-600" /> 開啟特權對話通道 (對會計隱形)</label>
                    <button onClick={async()=>{ if(!expressData.phone || !expressData.name) return showToast("必填",true); await setDoc(doc(db,'artifacts',appId,'public','data','partners',`p_${expressData.phone}`), { id: `p_${expressData.phone}`, name: expressData.name, phone: expressData.phone, pin: '0000', status: 'approved', priority_access: expressData.priority_access, total_del: 0, total_pkp: 0, history: []}); showToast("部署完成"); setExpressData({phone:'',name:'',priority_access:false}); }} className="w-full py-3 bg-fuchsia-600 rounded-lg text-white text-xs">一鍵寫入系統</button>
                  </div>
                </div>
              )}

              {/* 👁️ 上帝日誌 */}
              {aR === 'super_admin' && (
                <div className="bg-slate-800/50 p-4 rounded-xl border border-white/5">
                  <p className="text-[10px] text-emerald-400 mb-2 text-center">👁️ 上帝日誌 (不可抹除)</p>
                  <div className="h-32 overflow-y-auto space-y-1 pr-1 custom-scrollbar">
                    {godLogs.map(g => (<div key={g.id} className="bg-black/50 p-2 rounded border border-white/5 text-[9px]"><div className="flex justify-between text-slate-500 mb-1"><span>{g.actor}</span><span>{new Date(g.timestamp).toLocaleTimeString()}</span></div><p className="text-emerald-300">[{g.action}] <span className="text-slate-300">{g.details}</span></p></div>))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

try { createRoot(document.getElementById('root')).render(<ErrorBoundary><AppWrapper /></ErrorBoundary>); } catch (err) {}
  </script>
</body>
</html>
