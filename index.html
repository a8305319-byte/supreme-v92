<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金耀智慧營運總部 v34.1</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 自訂 UI 樣式 */
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
    .gold-border { border: 1px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 1rem; font-weight: bold; outline: none; transition: border 0.3s; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: #f59e0b; color: black; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); cursor: pointer; }
    .btn-prime:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); }
    .btn-prime:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .ghost-input { background: transparent; border: none; outline: none; text-align: center; }
    .admin-table-container { overflow-x: auto; border-radius: 1.5rem; }
    .admin-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    .admin-table th { padding: 12px; background: rgba(0,0,0,0.4); color: #94a3b8; font-size: 12px; }
    .admin-table td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-online { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot-offline { background-color: #64748b; }
    .dot-leave { background-color: #f43f5e; box-shadow: 0 0 8px #f43f5e; }
    .chat-bubble { padding: 12px 16px; border-radius: 16px; max-width: 80%; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
    .bubble-bot { background: rgba(255,255,255,0.1); color: white; align-self: flex-start; }
    .bubble-user { background: #f59e0b; color: black; align-self: flex-end; margin-left: auto; }
  </style>

  <script>
    // ⚠️ 貼心提醒：請在這裡補上你真實的 Firebase Config
    window.__firebase_config = JSON.stringify({
      apiKey: "你的_API_KEY",
      authDomain: "你的_AUTH_DOMAIN",
      projectId: "你的_PROJECT_ID",
      storageBucket: "你的_STORAGE_BUCKET",
      messagingSenderId: "你的_MESSAGING_SENDER_ID",
      appId: "你的_APP_ID"
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { initializeApp } from 'https://esm.sh/firebase@10/app';
    import { 
      getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot, 
      collection, getDoc, query, where, serverTimestamp 
    } from 'https://esm.sh/firebase@10/firestore';
    import { 
      getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken 
    } from 'https://esm.sh/firebase@10/auth';
    import { 
      Users, Package, TrendingUp, ShieldCheck, LogOut, 
      Settings, MessageSquare, Clipboard, Printer, 
      Search, Eye, EyeOff, Save, UserPlus, Trash2, 
      Download, Image as ImageIcon, CheckCircle, AlertCircle
    } from 'https://esm.sh/lucide-react@0.344.0';

    // ==========================================
    // ⚙️ 系統配置與版本定義 (System Config)
    // ==========================================
    const SYS_NAME = "金耀智慧營運總部";
    const SYS_VER = "v34.1 Optimized";
    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'ggsoc-ultimate-v34';
    const firebaseConfig = typeof window.__firebase_config !== 'undefined' ? JSON.parse(window.__firebase_config) : {};

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function App() {
      const [user, setUser] = useState(null);
      const [role, setRole] = useState('guest'); 
      const [partners, setPartners] = useState([]);
      const [layer, setLayer] = useState('gate'); 
      const [loading, setLoading] = useState(true);
      const [announcement, setAnnouncement] = useState("");
      const [searchQuery, setSearchQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState('all');
      const [showSensitive, setShowSensitive] = useState({}); 
      const [toastMsg, setToastMsg] = useState("");

      const BRACKETS = [29500, 30300, 31800, 33300, 34800, 36300, 38200, 40100, 42000, 43900, 45800];
      const LABOR_RATE = 0.125 * 0.20; 
      const HEALTH_RATE = 0.0517 * 0.30; 

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) {
            console.error("Auth Error", e);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (u) => {
          if (u) {
            setUser(u);
            checkSession(u.uid);
          }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'partners');
        const unsub = onSnapshot(q, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPartners(data);
          setLoading(false);
        }, (err) => {
          console.error("Firestore Error", err);
          setLoading(false); // 避免一直卡在讀取中
        });

        const annRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'announcement');
        onSnapshot(annRef, (snap) => {
          if (snap.exists()) setAnnouncement(snap.data().content);
        });

        return () => unsub();
      }, [user]);

      const checkSession = async (uid) => {
        const sid = localStorage.getItem('ggsoc_sid');
        if (sid) {
          const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', sid));
          if (snap.exists()) {
            const s = snap.data();
            handleAutoNavigation(s.phone, s.pin);
          }
        }
      };

      const handleAutoNavigation = (phone, pin) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          setRole('admin');
          setLayer('admin');
        } else {
          const p = partners.find(x => x.phone === phone && x.pin === pin);
          if (p) {
            setRole('driver');
            setLayer('driver');
          }
        }
      };

      const handleLogin = async (phone, pin, remember) => {
        if ((phone === "0976017938" && pin === "0531") || (phone === "0988128172" && pin === "0172")) {
          if (remember) {
            const sid = btoa(phone + Date.now());
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', sid), { phone, pin, role: 'admin' });
            localStorage.setItem('ggsoc_sid', sid);
          }
          setRole('admin');
          setLayer('admin');
          return;
        }

        const p = partners.find(x => x.phone === phone && x.pin === pin);
        if (p) {
          if (remember) {
            const sid = btoa(phone + Date.now());
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', sid), { phone, pin, role: 'driver' });
            localStorage.setItem('ggsoc_sid', sid);
          }
          setRole('driver');
          setLayer('driver');
        } else {
          alert("帳號驗證失敗，請檢查手機號碼與 PIN 碼");
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('ggsoc_sid');
        setRole('guest');
        setLayer('gate');
      };

      const autoCalculateInsurance = async (partnerId, gross, dependents) => {
        const tier = BRACKETS.find(b => gross <= b) || BRACKETS[BRACKETS.length - 1];
        const labor = Math.round(tier * LABOR_RATE);
        const health = Math.round(tier * HEALTH_RATE * (1 + Math.min(dependents || 0, 3)));
        
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partners', partnerId), {
          labor_fee: labor,
          health_fee: health
        });
        showToast("✨ 2026 級距精算已完成同步");
      };

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => { setToastMsg(""); }, 3000);
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center">
            <div className="w-12 h-12 border-4 border-amber-500/10 border-t-amber-500 rounded-full animate-spin"></div>
            <p className="mt-6 text-amber-500 font-black tracking-widest animate-pulse">GGSOC SECURING...</p>
          </div>
        );
      }

      return (
        <div className="min-h-screen text-slate-200">
          <div className={`fixed left-1/2 -translate-x-1/2 bg-amber-500 text-black px-8 py-4 rounded-full font-black z-[10000] shadow-2xl transition-all duration-500 ${toastMsg ? 'top-[40px] opacity-100' : 'top-[-100px] opacity-0 pointer-events-none'}`}>
            {toastMsg}
          </div>

          {layer === 'gate' && <Gate onLogin={handleLogin} announcement={announcement} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={partners} onLogout={handleLogout} autoInsur={autoCalculateInsurance} showSensitive={showSensitive} setShowSensitive={setShowSensitive} statusFilter={statusFilter} setStatusFilter={setStatusFilter} searchQuery={searchQuery} setSearchQuery={setSearchQuery} />}
          {layer === 'driver' && <DriverHub partners={partners} onLogout={handleLogout} user={user} db={db} appId={appId} showToast={showToast} />}
          {layer === 'onboarding' && <OnboardingFlow setLayer={setLayer} partners={partners} db={db} appId={appId} />}
        </div>
      );
    }

    // ==========================================
    // 1. 入口層 (Gate Layer)
    // ==========================================
    function Gate({ onLogin, announcement, setLayer }) {
      const [ph, setPh] = useState("");
      const [pin, setPin] = useState("");
      const [rem, setRem] = useState(false);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden bg-gradient-to-t from-[#020617] to-[#0f172a]">
          <div className="mb-12 text-center relative z-10">
            <h1 className="text-7xl font-black text-white italic tracking-tighter mb-2 drop-shadow-2xl">在地物流</h1>
            <p className="text-amber-500 text-[10px] tracking-[0.5em] font-black bg-amber-900/20 border border-amber-500/30 px-4 py-1.5 rounded-full inline-block uppercase shadow-lg">Operation Hub v34.1</p>
          </div>

          <div className="w-full max-w-[340px] space-y-5 relative z-10 font-bold">
            <div className="glass-panel p-8 rounded-[2.5rem] shadow-2xl gold-border">
              <input type="tel" placeholder="手機號碼" className="input-box" value={ph} onChange={e => setPh(e.target.value)} maxLength={10} />
              <input type="password" placeholder="PIN 安全碼" className="input-box" value={pin} onChange={e => setPin(e.target.value)} maxLength={4} />
              
              <div className="flex items-center justify-center gap-2 pb-6">
                <input type="checkbox" id="rem_me" checked={rem} onChange={e => setRem(e.target.checked)} className="w-4 h-4 accent-amber-500 rounded bg-slate-800" />
                <label htmlFor="rem_me" className="text-slate-400 text-[11px] font-black cursor-pointer italic">記住我 (自動跳轉登入)</label>
              </div>

              <button onClick={() => onLogin(ph, pin, rem)} className="btn-prime italic tracking-widest">進入中心</button>
            </div>

            {announcement && (
              <div className="glass-panel p-5 rounded-2xl bg-amber-900/10 border border-amber-500/20 text-center">
                <p className="text-amber-500 font-bold text-xs uppercase mb-1 tracking-widest animate-pulse">📢 最新通報</p>
                <p className="text-white text-sm font-black leading-relaxed selectable">{announcement}</p>
              </div>
            )}

            <div className="space-y-3 pt-4 text-center">
              <button onClick={() => setLayer('onboarding')} className="w-full py-4 rounded-2xl border border-amber-500/30 text-amber-500 font-bold text-sm bg-amber-900/10 hover:bg-amber-900/20 transition shadow-lg">📋 司機面試：AI 實務對話</button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 指揮中心 (Admin Hub) 
    // ==========================================
    function AdminHub({ partners, onLogout, autoInsur, showSensitive, setShowSensitive, statusFilter, setStatusFilter, searchQuery, setSearchQuery }) {
      const getToday = () => new Date().toLocaleDateString('en-CA');

      const filteredPartners = useMemo(() => {
        let result = partners.filter(p => 
          (p.name && p.name.toLowerCase().includes(searchQuery.toLowerCase())) || 
          (p.phone && p.phone.includes(searchQuery))
        );

        const today = getToday();
        if (statusFilter === 'pending') {
          result = result.filter(p => p.last_report?.date !== today && p.work_status !== 'leave');
        } else if (statusFilter === 'reported') {
          result = result.filter(p => p.last_report?.date === today);
        } else if (statusFilter === 'leave') {
          result = result.filter(p => p.work_status === 'leave' && p.leave_date === today);
        }
        return result;
      }, [partners, searchQuery, statusFilter]);

      const totals = useMemo(() => {
        return filteredPartners.reduce((acc, p) => {
          const net = (p.total_del * (p.custom_del_price || 15)) + 
                      (p.total_pkp * (p.custom_pkp_price || 10)) + 
                      (p.custom_adj || 0) - (p.labor_fee || 0) - (p.health_fee || 0);
          return {
            del: acc.del + (p.total_del || 0),
            pkp: acc.pkp + (p.total_pkp || 0),
            net: acc.net + net
          };
        }, { del: 0, pkp: 0, net: 0 });
      }, [filteredPartners]);

      return (
        <div className="p-4 lg:p-10 max-w-[1700px] mx-auto">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <h2 className="text-white font-black text-5xl italic tracking-tighter flex items-center gap-2">
              數據指揮中心 <span className="text-amber-500 font-black">.</span>
            </h2>
            <div className="flex flex-wrap gap-2">
              <button onClick={onLogout} className="bg-slate-800 text-rose-500 px-4 py-2 rounded-xl text-xs font-black border border-rose-500/20 shadow-md">退出系統</button>
            </div>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 text-center font-black">
            <div className="glass-panel p-6 rounded-3xl border-t-2 border-t-amber-500/50">
              <p className="text-slate-400 text-[11px] mb-1 font-bold uppercase">總配送數</p>
              <p className="text-3xl font-black text-amber-500">{totals.del.toLocaleString()}</p>
            </div>
            <div className="glass-panel p-6 rounded-3xl border-t-2 border-t-orange-500/50">
              <p className="text-slate-400 text-[11px] mb-1 font-bold uppercase">總逆收數</p>
              <p className="text-3xl font-black text-orange-400">{totals.pkp.toLocaleString()}</p>
            </div>
            <div className="glass-panel p-6 rounded-3xl border-t-2 border-t-emerald-500/50">
              <p className="text-slate-400 text-[11px] mb-1 font-bold uppercase italic">結算撥款預估</p>
              <p className="text-3xl font-black text-emerald-400">${totals.net.toLocaleString()}</p>
            </div>
            <div className="glass-panel p-6 rounded-3xl border-t-2 border-t-slate-500/50">
              <p className="text-slate-400 text-[11px] mb-1 font-bold uppercase">現役夥伴</p>
              <p className="text-3xl font-black text-white">{filteredPartners.length}</p>
            </div>
          </div>

          <div className="glass-panel p-4 rounded-[2rem] mb-10 flex flex-col md:flex-row items-center gap-4 gold-border">
            <div className="flex-1 flex items-center gap-3 bg-black/40 p-3 rounded-2xl border border-slate-700 w-full">
              <Search size={20} className="text-amber-500 ml-2" />
              <input type="text" placeholder="搜尋姓名或手機..." className="bg-transparent border-none outline-none text-white text-sm w-full font-bold selectable" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <select className="bg-slate-800 text-white rounded-xl px-5 py-3 text-xs outline-none font-bold border border-white/10 flex-1 md:flex-none" value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
                <option value="all">全部狀態</option>
                <option value="pending">⚠️ 未報帳人員</option>
                <option value="reported">✅ 已完成報帳</option>
                <option value="leave">🛑 今日休假</option>
              </select>
            </div>
          </div>

          <div className="admin-table-container shadow-2xl relative font-black">
            <table className="admin-table">
              <thead>
                <tr>
                  <th className="w-32">今日狀態</th>
                  <th className="text-left w-72">夥伴資訊 & 帳務資料</th>
                  <th>正件價</th>
                  <th>逆收價</th>
                  <th>眷屬</th>
                  <th>勞保扣</th>
                  <th>健保扣</th>
                  <th>獎金加扣</th>
                  <th>預計實領</th>
                </tr>
              </thead>
              <tbody>
                {filteredPartners.map(p => {
                  const net = (p.total_del * (p.custom_del_price || 15)) + (p.total_pkp * (p.custom_pkp_price || 10)) + (p.custom_adj || 0) - (p.labor_fee || 0) - (p.health_fee || 0);
                  const isLeave = p.work_status === 'leave' && p.leave_date === getToday();
                  const hasReported = p.last_report?.date === getToday();
                  const isMasked = !showSensitive[p.id];
                  
                  return (
                    <tr key={p.id} className="border-b border-slate-800 hover:bg-white/5 transition group">
                      <td>
                        <div className="flex items-center justify-center font-bold">
                          <span className={`status-dot ${isLeave ? 'dot-leave' : (hasReported ? 'dot-online' : 'dot-offline')}`}></span>
                          <span className={`text-[10px] ${hasReported ? 'text-emerald-400' : 'text-slate-500'}`}>
                            {isLeave ? '休假' : (hasReported ? '已報' : '未報')}
                          </span>
                        </div>
                      </td>
                      <td className="text-left border-l border-amber-900/30 pl-4">
                        <div className="flex items-center gap-2 mb-1">
                          <span className="text-white text-lg font-black">{p.name}</span>
                          <button onClick={() => setShowSensitive(prev => ({ ...prev, [p.id]: !prev[p.id] }))} className="text-slate-500 hover:text-amber-500 transition">
                            {isMasked ? <EyeOff size={14} /> : <Eye size={14} />}
                          </button>
                        </div>
                        <p className={`text-[9px] font-black italic ${isMasked ? 'text-slate-700' : 'text-slate-500'}`}>
                          📞 {isMasked ? p.phone?.replace(/(\d{4})\d{3}(\d{3})/, "$1***$2") : p.phone}
                        </p>
                      </td>
                      <td>$<input type="number" defaultValue={p.custom_del_price || 15} className="ghost-input w-10 text-sky-400" /></td>
                      <td>$<input type="number" defaultValue={p.custom_pkp_price || 10} className="ghost-input w-10 text-orange-400" /></td>
                      <td><input type="number" defaultValue={p.dependents || 0} className="ghost-input w-6 text-white" /></td>
                      <td><input type="number" defaultValue={p.labor_fee || 0} className="ghost-input w-12 text-rose-500" /></td>
                      <td>
                        <div className="flex items-center justify-center gap-1">
                          <input type="number" defaultValue={p.health_fee || 0} className="ghost-input w-12 text-rose-500" />
                          <button onClick={() => autoInsur(p.id, net, p.dependents)} className="text-[9px] bg-indigo-900/30 text-indigo-400 px-1 rounded hover:bg-indigo-500 hover:text-white transition">✨</button>
                        </div>
                      </td>
                      <td><input type="number" defaultValue={p.custom_adj || 0} className="ghost-input w-12 text-emerald-500 font-bold" /></td>
                      <td className="text-amber-500 font-black text-2xl tracking-tighter italic">${net.toLocaleString()}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 夥伴工作台 (Driver Hub) 
    // ==========================================
    function DriverHub({ partners, onLogout, user, appId, db, showToast }) {
      const [delCount, setDelCount] = useState("");
      const [pkpCount, setPkpCount] = useState("");
      const [isSubmitting, setIsSubmitting] = useState(false);

      const currentPartner = partners.find(p => p.phone === user?.phoneNumber || p.id === `p_${user?.uid}`);

      const handleSubmit = async () => {
        if (!delCount || !pkpCount) return showToast("⚠️ 請輸入完整的配送與逆收數量");
        setIsSubmitting(true);
        try {
          const today = new Date().toLocaleDateString('en-CA');
          const partnerRef = doc(db, 'artifacts', appId, 'public', 'data', 'partners', currentPartner.id);
          await updateDoc(partnerRef, {
            total_del: parseInt(delCount),
            total_pkp: parseInt(pkpCount),
            last_report: { date: today, timestamp: serverTimestamp() },
            work_status: 'online'
          });
          showToast("🚀 數據報帳成功！指揮中心已同步。");
          setDelCount("");
          setPkpCount("");
        } catch (err) {
          console.error(err);
          showToast("❌ 提交失敗，請檢查網路連線");
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[480px] shadow-2xl border border-amber-500/20 text-center">
            <h2 className="text-3xl font-black text-white italic mb-2 drop-shadow-md">夥伴工作台</h2>
            <p className="text-amber-500 text-xs mb-10 tracking-widest">{currentPartner?.name || '夥伴'} 您好</p>
            
            <div className="grid grid-cols-2 gap-4 mb-10">
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-white/5">
                <p className="text-[10px] text-sky-500 mb-2 uppercase tracking-widest">今日配送</p>
                <input type="number" value={delCount} onChange={e => setDelCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl text-white font-black text-center" />
              </div>
              <div className="bg-slate-900/60 p-5 rounded-3xl border border-white/5">
                <p className="text-[10px] text-orange-500 mb-2 uppercase tracking-widest">今日逆收</p>
                <input type="number" value={pkpCount} onChange={e => setPkpCount(e.target.value)} placeholder="0" className="ghost-input w-full text-4xl text-white font-black text-center" />
              </div>
            </div>

            <button onClick={handleSubmit} disabled={isSubmitting} className="btn-prime mb-10 shadow-xl italic tracking-widest">
              {isSubmitting ? '傳輸中...' : '🚀 提交今日數據'}
            </button>

            <button onClick={onLogout} className="text-rose-500 text-sm font-black underline underline-offset-8 decoration-rose-500/30">🔒 安全登出系統</button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. AI 面試流程 (保持原有不變)
    // ==========================================
    function OnboardingFlow({ setLayer, partners, db, appId }) {
      const [messages, setMessages] = useState([{ type: 'bot', text: "您好！我是營運 AI 助手。在正式開始前，請先告訴我您的姓名與手機號碼。" }]);
      const [step, setStep] = useState('info'); 
      const [name, setName] = useState("");
      const [phone, setPhone] = useState("");
      const [currentQ, setCurrentQ] = useState(0);
      const chatEndRef = useRef(null);

      const quizDB = [
        { q: "若配送中不幸發生車禍，您的處理順序是？", o: ["1.報警 2.拍照 3.回報管理處", "1.自行私下和解 2.繼續送完貨"] }
      ];

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
      const addMsg = (type, text) => setMessages(prev => [...prev, { type, text }]);

      const startQuiz = () => {
        if (!name || !phone) return;
        setStep('quiz');
        addMsg('bot', `太棒了，${name}。第一題：${quizDB[0].q}`);
      };

      const handlePick = async (idx, text) => {
        addMsg('user', text);
        setStep('done');
        setTimeout(() => {
          addMsg('bot', "實務評估已完成！請返回首頁。");
        }, 600);
      };

      return (
        <div className="h-screen bg-[#020617] flex flex-col font-black">
          <header className="p-6 border-b border-white/5 flex justify-between">
            <h3 className="text-white text-sm">AI 招募評估助手</h3>
            <button onClick={() => setLayer('gate')} className="text-slate-400">退出</button>
          </header>
          <div className="flex-1 overflow-y-auto p-6 space-y-4">
            {messages.map((m, i) => <div key={i} className={`chat-bubble ${m.type === 'bot' ? 'bubble-bot' : 'bubble-user'}`}>{m.text}</div>)}
            <div ref={chatEndRef} />
          </div>
          <div className="p-6 bg-slate-900/80">
            {step === 'info' && (
              <div className="space-y-3">
                <input type="text" placeholder="您的姓名" className="input-box" value={name} onChange={e => setName(e.target.value)} />
                <input type="tel" placeholder="您的手機" className="input-box" value={phone} onChange={e => setPhone(e.target.value)} />
                <button onClick={startQuiz} className="btn-prime">確認並開始對話</button>
              </div>
            )}
            {step === 'quiz' && (
              <div className="grid grid-cols-1 gap-3">
                {quizDB[currentQ].o.map((o, i) => <button key={i} onClick={() => handlePick(i, o)} className="w-full py-4 bg-slate-800 rounded-2xl text-amber-500">{o}</button>)}
              </div>
            )}
            {step === 'done' && <button onClick={() => setLayer('gate')} className="btn-prime">返回首頁</button>}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
