<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 夥伴數位中心 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2.5rem; padding: 35px; border: 1px solid #1e293b; margin-bottom: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 18px; width: 100%; color: #fff; outline: none; margin-bottom: 15px; font-size: 16px; }
        .btn-prime { width: 100%; padding: 20px; border-radius: 1.2rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-prime:active { transform: scale(0.96); background: #38bdf8; }
        .label-sky { font-size: 13px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .q-box { background: rgba(255,255,255,0.03); border: 1px solid #1e293b; padding: 15px; border-radius: 1.5rem; margin-bottom: 20px; }
        .opt-label { display: flex; align-items: center; gap: 12px; padding: 12px; cursor: pointer; border-radius: 12px; font-size: 14px; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 15px; height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-16 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">數位服務平台</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center shadow-inner">
                <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center shadow-inner">
                <button onclick="boot()" class="btn-prime">立即登入</button>
            </div>
            
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest pt-8">── 夥伴入職引導 ──</p>
            <button onclick="showLayer('interview-page')" class="w-full py-4 rounded-2xl border-2 border-sky-500 text-sky-400 font-black">一、職能評估 (機車/貨車)</button>
            <button onclick="showLayer('apply-page')" class="w-full py-4 rounded-2xl border-2 border-slate-700 text-slate-500 font-black">二、正式入職資料補件</button>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 italic border-b-4 border-sky-500 pb-2">營運職能評估</h2>
                
                <span class="label-sky">基本資訊</span>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <span class="label-sky">應徵車種</span>
                <select id="int_v_type" class="input-box bg-slate-900 text-white font-bold" onchange="checkTruck(this.value)">
                    <option value="機車">機車配送夥伴</option>
                    <option value="貨車">貨車專業夥伴 (需職業駕照)</option>
                </select>

                <div id="truck_box" class="hidden mb-6 p-4 bg-sky-900/20 border border-sky-500/30 rounded-2xl text-xs">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="pro_lic_check" class="w-5 h-5"> 我已持有「職業小型車」以上有效駕照
                    </label>
                </div>

                <span class="label-sky">情境：配送中遇大雨且貨多？</span>
                <div class="q-box">
                    <label class="opt-label"><input type="radio" name="q1" value="1"> 穿雨衣並蓋好遮雨布繼續送</label>
                    <label class="opt-label"><input type="radio" name="q1" value="0"> 找地方躲雨，等雨小再送</label>
                </div>

                <button onclick="submitInterview()" id="sub_btn" class="btn-prime shadow-xl">送出評估結果</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 border-b-4 border-orange-500 pb-2 italic">正式入職資料</h2>
                
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-[10px]">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-[10px]">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-[10px]">駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-[10px]">行照影本</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>

                <input type="text" id="app_name" placeholder="真實姓名" class="input-box">
                <input type="tel" id="app_phone" placeholder="行動電話" class="input-box">
                <input type="text" id="app_h_addr" placeholder="完整戶籍地址" class="input-box">
                <input type="text" id="app_plate" placeholder="營運車牌號碼" class="input-box">
                <input type="password" id="app_pin" placeholder="設定 4 位登入密碼" maxlength="4" class="input-box">

                <button onclick="submitApply()" id="app_btn" class="btn-prime bg-orange-600 shadow-xl">提交建檔資料</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, serverTimestamp, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // 🔥 請務必填寫您正確的 Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", 
            authDomain: "supreme-v92.firebaseapp.com", 
            projectId: "supreme-v92", 
            storageBucket: "supreme-v92.firebasestorage.app", 
            messagingSenderId: "485530156296", 
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let partners = [], currentImgField = '';
        let photosCache = { id_f: null, id_b: null, lic: null, car: null };

        onSnapshot(collection(db, 'partners'), s => { partners = s.docs.map(d => ({ id: d.id, ...d.data() })); });

        window.checkTruck = (v) => { document.getElementById('truck_box').style.display = (v==='貨車')?'block':'none'; };

        // 修復後的提交邏輯
        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value;
            const phone = document.getElementById('int_phone').value;
            const q1 = document.querySelector('input[name="q1"]:checked')?.value;
            const vType = document.getElementById('int_v_type').value;

            if(!name || !phone || !q1) return alert("請填寫姓名、電話並回答情境題！");
            if(vType === '貨車' && !document.getElementById('pro_lic_check').checked) return alert("貨車夥伴必須持有職業駕照，請勾選確認。");

            const btn = document.getElementById('sub_btn');
            btn.innerText = "傳送中..."; btn.disabled = true;

            try {
                await addDoc(collection(db, 'partners'), {
                    name, phone, v_type: vType, ai_score: parseInt(q1)*100, status: "interviewing", time: serverTimestamp()
                });
                alert("評估已送出，請等候核准通知！"); location.reload();
            } catch(e) { alert("系統繁忙，請稍後再試"); btn.innerText = "送出評估結果"; btn.disabled = false; }
        };

        window.submitApply = async () => {
            const name = document.getElementById('app_name').value;
            const pin = document.getElementById('app_pin').value;
            if(!name || !pin) return alert("請填寫姓名與登入密碼");

            const btn = document.getElementById('app_btn');
            btn.innerText = "正在上傳證件..."; btn.disabled = true;

            try {
                await addDoc(collection(db, 'partners'), {
                    name, phone: document.getElementById('app_phone').value,
                    h_addr: document.getElementById('app_h_addr').value,
                    plate: document.getElementById('app_plate').value,
                    uid: pin, docs: photosCache, status: "pending", total_del: 0, time: serverTimestamp()
                });
                alert("資料已建檔！請通知管理員開通。"); location.reload();
            } catch(e) { alert("上傳失敗"); btn.innerText = "提交建檔資料"; btn.disabled = false; }
        };

        // UI 邏輯
        window.showLayer = id => document.getElementById(id).style.display = 'flex';
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l => l.style.display='none'); };
        window.triggerCam = f => { currentImgField = f; document.getElementById('cam').click(); };
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = e => {
                photosCache[currentImgField] = e.target.result;
                const p = document.getElementById('p_' + currentImgField);
                p.src = e.target.result; p.style.display = 'block';
                document.getElementById('t_' + currentImgField).style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        };
        window.boot = () => { /* 登入邏輯同前版... */ };
    </script>
</body>
</html>
