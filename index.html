const callGemini = async (prompt, imageData = null) => {
  if (!apiKey || apiKey.trim() === "") { return "⚠️ 系統提示：管理員尚未開通 API 金鑰。"; }
  let retryCount = 0; const maxRetries = 2;
  const performRequest = async () => {
    // 升級為最新模型，解決 not found 錯誤
    const model = "gemini-2.5-flash-preview-09-2025"; 
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    let contents = [{ parts: [{ text: prompt }] }];
    if (imageData) {
      const base64Data = imageData.split(',')[1];
      contents[0].parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Data } });
    }
    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents }) });
    const result = await response.json();
    if (result.error) return `⚠️ API 錯誤：${result.error.message}`;
    return result.candidates?.[0]?.content?.parts?.[0]?.text || "暫無回應";
  };
  while (retryCount < maxRetries) {
    try { return await performRequest(); } catch (e) { retryCount++; await new Promise(res => setTimeout(res, 1000 * Math.pow(2, retryCount))); }
  }
  return "⚠️ 網路連線逾時，請稍後再試。";
};

  }
};

const processImage = (file, callback) => {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas'); const M = 800; let w=img.width, h=img.height;
      if(w>M){ h=Math.round(h*M/w); w=M; }
      canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    }; img.src = e.target.result;
  }; reader.readAsDataURL(file);
};

const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);
  const startDrawing = (e) => { setIsDrawing(true); const ctx = canvasRef.current.getContext('2d'); const pos = getPos(canvasRef.current, e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); };
  const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const ctx = canvasRef.current.getContext('2d'); const pos = getPos(canvasRef.current, e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); };
  const endDrawing = () => { setIsDrawing(false); onSign(canvasRef.current.toDataURL()); };
  const getPos = (canvas, e) => { const rect = canvas.getBoundingClientRect(); const clientX = e.touches ? e.touches[0].clientX : e.clientX; const clientY = e.touches ? e.touches[0].clientY : e.clientY; return { x: clientX - rect.left, y: clientY - rect.top }; };
  useEffect(() => { if(canvasRef.current) { const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#fff'; } }, []);
  return (
    <div className="w-full">
      <div className="bg-slate-900 border border-white/20 rounded-2xl overflow-hidden mb-2 relative shadow-inner"><canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={endDrawing} onMouseOut={endDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={endDrawing} /><p className="absolute bottom-2 right-4 text-[10px] text-slate-500 font-black italic opacity-20 pointer-events-none">SIGNATURE</p></div>
      <button onClick={() => { const ctx = canvasRef.current.getContext('2d'); ctx.clearRect(0, 0, 400, 150); onSign(null); }} className="w-full py-3 border border-rose-500/30 text-rose-500 rounded-xl text-sm font-black shadow-md active:scale-95 transition-all">重新簽名</button>
    </div>
  );
};

p.id] ? p.phone.replace(/(\d{4})\d{3}(\d{3})/, "$1***$2") : p.phone}</p></td><td className="p-9 text-amber-400 font-black text-center font-black"><div className="flex items-center justify-center gap-4 font-black"><span className="text-3xl font-black italic font-black font-black">${(hasR?p.last_report?.cod_amount||0:0).toLocaleString()}</span>{p.last_report?.cod_receipt && <button onClick={()=>window.open(p.last_report.cod_receipt,'_blank')} className="text-amber-500 bg-amber-900/30 p-3 rounded-2xl transition-all shadow-xl active:scale-90 hover:bg-amber-800"><Receipt size={28}/></button>}</div></td><td className="p-9 text-center text-sky-400 font-black text-2xl tracking-tighter font-black">$<input type="number" value={p.custom_del_price||15} onChange={e=>updateField(p.id,'custom_del_price',Number(e.target.value))} disabled={p.status==='pending'} className="w-16 bg-transparent text-center font-black outline-none border-b-2 border-white/5 focus:border-sky-500 shadow-sm" /></td><td className="p-9 text-center text-orange-400 font-black text-2xl tracking-tighter font-black font-black font-black">$<input type="number" value={p.custom_pkp_price||10} onChange={e=>updateField(p.id,'custom_pkp_price',Number(e.target.value))} disabled={p.status==='pending'} className="w-16 bg-transparent text-center font-black outline-none border-b-2 border-white/5 focus:border-orange-500 shadow-sm font-black font-black" /></td><td className="p-9 text-center font-black"><input type="number" value={p.dependents||0} onChange={e=>updateField(p.id,'dependents',Number(e.target.value))} disabled={p.status==='pending'} className="w-12 bg-transparent text-center font-black text-2xl outline-none" /></td><td className="p-9 text-center bg-blue-900/5 shadow-inner font-black"><select className="bg-slate-900 text-white text-lg font-black p-4 rounded-2xl border border-blue-500/30 outline-none cursor-pointer hover:border-blue-500 transition-all shadow-xl shadow-blue-500/5" value={p.insurance_bracket||0} disabled={p.status==='pending'} onChange={async(e)=>{if(db){const t=INSURANCE_TABLE.find(x=>x.bracket===Number(e.target.value));if(t)await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id),{insurance_bracket:Number(e.target.value),labor_fee:t.labor,health_fee:Math.round(t.health*(1+Math.min(p.dependents||0,3)))});}}}><option value="0">--- 選取級距 ---</option>{INSURANCE_TABLE.map(t=>(<option key={t.bracket} value={t.bracket}>$ {t.bracket.toLocaleString()}</option>))}</select></td><td className="p-9 text-center text-rose-400 font-black font-black"><div className="flex flex-col gap-2 text-sm italic font-black font-black font-black"><span>勞: -${p.labor_fee||0}</span><span>健: -${p.health_fee||0}</span></div></td><td className="p-9 text-center text-white text-5xl tracking-tighter italic font-black bg-blue-900/5 shadow-inner font-black drop-shadow-[0_10px_20px_rgba(59,130,246,0.3)]" style={{ userSelect:'text' }}>${p.status==='pending' ? '---' : p_net.toLocaleString()}</td><td className="p-9 text-center font-black"><div className="flex gap-4 justify-center font-black">{p.last_report?.photo && <button onClick={()=>window.open(p.last_report.photo,'_blank')} className="text-emerald-400 bg-emerald-900/30 p-4 rounded-[1.5rem] hover:bg-emerald-800 shadow-xl active:scale-90 shadow-emerald-500/10"><ImageIcon size={32}/></button>}<button onClick={()=>{setSelectedPartner(p); setModalType('detail');}} className="bg-blue-900/50 text-blue-300 px-8 py-4 rounded-[1.5rem] text-sm font-black hover:bg-blue-800 transition-all italic border border-blue-500/20 shadow-lg">櫥窗</button></div></td></tr>); })}</tbody></table></div>
      
      {showAIAssistant && <AIAssistant partners={partners} onClose={()=>setShowAIAssistant(false)} />}
      {showMaintenance && <MaintenanceModal partners={partners} onClose={()=>setShowMaintenance(false)} />}
    </div>
  );
}

    if(globalSettings?.systemLocked&&authRole!=='super_admin') return showToast("⚠️ 系統維護中，目前禁止報帳",true);

           <div className="bg-black/50 p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-inner font-black">
             <p className="text-[10px] md:text-xs text-blue-400 mb-2 uppercase font-black">今日配送</p>

           </div>
           <div className="bg-black/50 p-6 md:p-8 rounded-[2rem] border border-white/5 shadow-inner font-black font-black">
             <p className="text-[10px] md:text-xs text-cyan-400 mb-2 uppercase font-black">今日逆收</p>
             <input type="number" placeholder="0" className="w-full bg-transparent text-center text-4xl md:text-6xl text-white outline-none font-black shadow-sm font-black" value={pkp} onChange={e=>setPkp(e.target.value)} />
           </div>
        </div>

        <div className="bg-amber-900/10 p-6 md:p-8 rounded-[2.5rem] border border-amber-500/30 mb-8 shadow-inner font-black font-black">
           <p className="text-xs md:text-sm text-amber-500 mb-4 font-black flex items-center justify-center gap-2 italic font-black font-black font-black"><Banknote size={20}/> 今日代收 (C.O.D)</p>
           <div className="flex items-center justify-center text-3xl md:text-5xl text-amber-400 font-black mb-4 font-black font-black font-black">
             $<input type="number" placeholder="0" className="w-28 md:w-44 bg-transparent text-center outline-none border-b-4 border-amber-500/50 pb-1 md:pb-2 ml-2 font-black shadow-sm font-black font-black" value={cod} onChange={e=>setCod(e.target.value)} />

               <label htmlFor="cod_last_cam" className={`flex-1 flex flex-col items-center justify-center p-4 md:p-5 rounded-2xl border-2 border-dashed transition-all shadow-xl font-black font-black font-black ${cRData?'border-emerald-500 bg-emerald-500/10 text-emerald-400':'border-amber-500/50 text-amber-500'}`}>
                 {cRData ? <CheckCircle size={28}/> : <><Receipt size={28}/><span className="text-[10px] md:text-xs font-black mt-2 font-black font-black">拍照收據</span></>}

           )}

        <div className="mb-8 flex gap-3 md:gap-4 font-black font-black">

               {isAiV ? <span className="animate-spin font-black font-black"><Activity size={28}/></span> : <><Sparkles size={28}/><span className="text-[10px] font-black mt-2 uppercase font-black">系統核對</span></>}

        <div className="mb-10 font-black font-black font-black font-black font-black font-black">

      </div>
    </div>
  );

function OnboardingFlow({ setLayer, db, appId }) {
  const [messages,setMessages]=useState([{type:'bot',text: "您好，歡迎進入招募流程。入職前系統將進行 10 題實務評估。請先輸入您的真實姓名與手機號碼建立檔案。"}]);
  const [step,setStep]=useState('info'); const [n,setN]=useState(""); const [p,setP]=useState(""); const [cQ,setCQ]=useState(0); const [ans,setAns]=useState([]); const [iT,setIT]=useState("");
  const quizDB = ["1/10.若發生車禍？","2/10.包裹破損？","3/10.代收保管？","4/10.違禁品？","5/10.不在家？","6/10.拒收？","7/10.車拋錨？","8/10.下班帳務？","9/10.爆量？","10/10.改址？"];
  const sendAns=()=>{ 
    if(!iT.trim()) return showToast("⚠️ 請輸入回答內容", true); 
    setMessages(prev=>[...prev,{type:'user',text:iT}]); 
    const nA=[...ans,{q:quizDB[cQ],a:iT}]; setAns(nA); setIT(""); 
    if(cQ<9){ 
      const nx=cQ+1; setCQ(nx); 
      setTimeout(()=>setMessages(px=>[...px,{type:'bot',text:quizDB[nx]}]),600); 
    }else{ 
      setStep('done'); 
      setTimeout(async()=>{ 
        setMessages(px=>[...px,{type:'bot',text:"✅ 測驗完成！請返回首頁並繼續補齊證件資料。"}]); 
        if(db){ 
          await setDoc(doc(db,'artifacts',appId,'public','data','partners',`p_${p}`), { 
            id:`p_${p}`, name:n, phone:p, pin:"0000", status:'pending', quiz_results:nA, 
            total_del:0, total_pkp:0, custom_del_price:15, custom_pkp_price:10, custom_adj:0, 
            labor_fee:0, health_fee:0, dependents:0, created_at:serverTimestamp() 
          }); 
        } 
      },800); 
    } 
  };
  return (
    <div className="h-screen bg-[#020617] flex flex-col font-black shadow-2xl animate-[fadeInUp_0.4s_ease-out]">
      <header className="p-6 md:p-8 flex items-center gap-4 bg-slate-900/50 border-b border-white/10 backdrop-blur-md shadow-lg">
        <button onClick={()=>setLayer('gate')} className="p-2 bg-slate-800 rounded-full text-white active:scale-90 transition-all"><ChevronLeft size={28}/></button>
        <h2 className="text-2xl md:text-3xl text-white font-black italic tracking-tighter">📋 線上實務評估</h2>
      </header>
      <div className="flex-1 overflow-y-auto p-6 md:p-8 space-y-6 custom-scrollbar pb-10">
        {messages.map((m,i)=>(
          <div key={i} className={`max-w-[85%] rounded-[1.5rem] text-sm md:text-lg p-5 shadow-2xl leading-relaxed font-black ${m.type==='bot' ? 'bg-[#1e293b] text-slate-100 rounded-bl-sm border border-white/5' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-br-sm self-end ml-auto'}`}>{m.text}</div>
        ))}
      </div>
      <div className="p-6 md:p-8 bg-slate-900/90 border-t border-white/5 pb-10">
        {step==='info'?(
          <div className="space-y-4 font-black">
            <input type="text" placeholder="真實姓名" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-center text-white outline-none font-black text-xl shadow-inner" value={n} onChange={e=>setN(e.target.value)} />
            <input type="tel" placeholder="手機號碼" className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-center text-white outline-none font-black text-xl shadow-inner" value={p} onChange={e=>setP(e.target.value)} maxLength={10} />
            <button onClick={()=>{
              if(!n) return showToast("⚠️ 請輸入真實姓名", true);
              if(p.length<10) return showToast("⚠️ 請輸入完整的10碼手機號碼", true);
              setStep('quiz'); setMessages(px=>[...px,{type:'bot',text:`建檔成功。評估開始：\n${quizDB[0]}`}]);
            }} className="w-full py-5 rounded-2xl bg-blue-600 text-white shadow-2xl font-black text-xl active:scale-95 transition-all italic tracking-widest mt-2">開始進行測驗</button>
          </div>
        ):step==='quiz'?(
          <div className="flex items-center gap-3">
            <input type="text" placeholder="輸入您的處置方式..." className="flex-1 bg-black/50 border border-white/10 p-5 rounded-full text-white outline-none text-base md:text-xl font-black shadow-inner" value={iT} onChange={e=>setIT(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendAns()} />
            <button onClick={sendAns} className="bg-blue-600 text-white p-5 rounded-full shadow-2xl active:scale-90 transition-all"><Send size={24}/></button>
          </div>
        ):(
          <button onClick={()=>setLayer('gate')} className="w-full py-5 rounded-2xl bg-emerald-600 text-white font-black text-xl shadow-xl shadow-emerald-500/10 active:scale-95">測驗完成返回</button>
        )}
      </div>
    </div>
  );
}

function OnboardingDataFlow({ setLayer, db, appId }) {
  const [phVal, setPhVal] = useState(""); const [verified, setVerified] = useState(false); const [loading, setLoading] = useState(false);
  const [formData, setFormData] = useState({ id_num: "", dob: "", address: "", emergency_name: "", emergency_phone: "", bank_code: "", bank_acc: "" });

  const checkVerified = async () => { 
    if(!phVal) return showToast("⚠️ 請輸入手機號碼", true); 
    if(!db) return showToast("⚠️ 無法連線至資料庫",true); 
    const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partners', `p_${phVal}`)); 
    if(snap.exists()) { 
      setVerified(true); 
      setFormData({ id_num: snap.data().p_id_num || "", dob: snap.data().p_dob || "", address: snap.data().p_address || "", emergency_name: snap.data().p_emergency_name || "", emergency_phone: snap.data().p_emergency_phone || "", bank_code: snap.data().p_bank_code || "", bank_acc: snap.data().p_bank_acc || "" }); 
      setDocs({id_f:snap.data().p_id_f,id_b:snap.data().p_id_b,lic:snap.data().p_lic,reg:snap.data().p_reg,book:snap.data().p_book,cr:snap.data().p_cr}); 
      showToast("✅ 身分驗證通過"); 
    } else { 
      showToast("❌ 查無此手機號碼的測驗紀錄", true); 
    } 
  };

    if(!formData.id_num || !formData.dob || !formData.address || !formData.bank_acc) return showToast("⚠️ 標註 * 為必填欄位", true);

      showToast("🚀 檔案同步成功！"); 
      setTimeout(()=>setLayer('gate'), 1500); 
    } catch(e){ showToast("儲存失敗", true); } 
    setLoading(false);

  return (

      <div className="flex-1 p-6 md:p-8 overflow-y-auto pb-24">

          <div className="bg-slate-900/60 p-8 md:p-10 rounded-[2.5rem] mt-12 border border-white/5 shadow-2xl text-center font-black"><p className="text-slate-400 text-sm mb-8 italic">請輸入手機號碼驗證身份</p><input type="tel" placeholder="09XX..." value={phVal} onChange={e=>setPhVal(e.target.value)} className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl text-center text-white text-xl font-black mb-8 shadow-inner" maxLength={10}/><button onClick={checkVerified} className="w-full py-5 rounded-2xl bg-blue-600 text-white font-black text-xl shadow-xl italic tracking-widest uppercase">驗證身份</button></div>
        ) : (
          <div className="space-y-8 animate-in fade-in duration-500 font-black">
            <div className="bg-black/40 p-6 md:p-8 rounded-[2.5rem] border border-white/5 space-y-6 shadow-inner">
               <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="text-[10px] text-slate-500 uppercase">身分證號 *</label><input placeholder="A12..." value={formData.id_num} onChange={e=>setFormData({...formData, id_num:e.target.value.toUpperCase()})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black shadow-sm" /></div><div><label className="text-[10px] text-slate-500 uppercase">出生日期 *</label><input type="date" value={formData.dob} onChange={e=>setFormData({...formData, dob:e.target.value})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black shadow-sm" /></div></div>
               <div><label className="text-[10px] text-slate-500 uppercase">戶籍地址 *</label><input value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black shadow-sm" /></div>
               <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label className="text-[10px] text-slate-500 uppercase">緊急聯絡人 *</label><input value={formData.emergency_name} onChange={e=>setFormData({...formData, emergency_name:e.target.value})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black shadow-sm" /></div><div><label className="text-[10px] text-slate-500 uppercase">電話 *</label><input value={formData.emergency_phone} onChange={e=>setFormData({...formData, emergency_phone:e.target.value})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-white font-black shadow-sm" maxLength={10}/></div></div>
               <div className="grid grid-cols-1 md:grid-cols-3 gap-4"><div><label className="text-[10px] text-slate-500 uppercase">銀行代碼 *</label><input placeholder="822" value={formData.bank_code} onChange={e=>setFormData({...formData, bank_code:e.target.value})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-emerald-400 text-center font-black" maxLength={3}/></div><div className="md:col-span-2"><label className="text-[10px] text-slate-500 uppercase">帳號 *</label><input value={formData.bank_acc} onChange={e=>setFormData({...formData, bank_acc:e.target.value})} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl text-emerald-400 font-black shadow-sm" /></div></div>
            </div>
            <div className="grid grid-cols-2 gap-4 md:gap-6">
              {Object.keys(labels).map(key => (<div key={key} className="bg-slate-900/50 p-4 md:p-6 rounded-[2rem] border border-white/5 text-center relative shadow-lg group"><p className="text-[10px] md:text-[11px] text-slate-500 mb-3 font-black uppercase tracking-widest italic">{labels[key]}</p><input type="file" accept="image/*" capture="environment" id={`file_${key}`} className="hidden" onChange={e=>processImage(e.target.files[0], (data)=>setDocs(prev=>({...prev, [key]:data})))} /><label htmlFor={`file_${key}`} className="cursor-pointer block">{docs[key] ? <img src={docs[key]} className="w-full h-32 md:h-40 object-cover rounded-xl border border-white/10" /> : <div className="h-32 md:h-40 bg-black/30 rounded-xl border-2 border-dashed border-slate-800 flex flex-col items-center justify-center text-slate-700 italic group-hover:text-blue-400 transition-all shadow-inner"><Camera size={36} className="mb-2"/><span className="text-[10px] font-black uppercase">拍照上傳</span></div>}</label></div>))}
            </div>
            <button onClick={saveAll} disabled={loading} className="w-full py-5 md:py-6 rounded-[2rem] bg-indigo-600 text-white font-black text-xl shadow-2xl mt-6 active:scale-95 transition-all italic tracking-widest">{loading ? '正在同步雲端庫...' : '🚀 確認補齊並建檔'}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function AppWrapper() {
  const [lang, setLang] = useState('zh');
  const [u,setU]=useState(null); const [aR,setAR]=useState('guest'); const [ps,setPs]=useState([]); const [l,setL]=useState('gate'); const [ld,setLd]=useState(true); const [ann,setAnn]=useState(""); const [gs,setGs]=useState({systemLocked:false,accountantPin:"0172"}); const [ss,setSs]=useState({global:false}); const [mT,setMT]=useState(null); const [spI,setSpI]=useState(null); const [isC,setIsC]=useState(false);
  const [sq,setSq]=useState(""); 
  const cp=ps.find(p=>p.id===spI);

  useEffect(()=>{
    if(!auth){ setLd(false); return; }
    const initA=async()=>{ 
      try {
        if(initToken){
          await signInWithCustomToken(auth, initToken);
        }else{
          await signInAnonymously(auth);
        }
      } catch(e) {
        setLd(false);
      }
    }; 
    initA();
    const unAuth = onAuthStateChanged(auth,(user)=>{ if(user){setU(user); const s=JSON.parse(localStorage.getItem('ggsoc_auth')||'{}'); if(s.phone){setAR(s.role); if(s.phone)setSpI(`p_${s.phone}`); if(s.role==='super_admin'||s.role==='admin')setL('admin');else setL('driver');}}});
    return () => unAuth();
  },[]);

  useEffect(()=>{
    if(!u || !db) { setLd(false); return; }
    const unP=onSnapshot(collection(db,'artifacts',appId,'public', 'data', 'partners'),(s)=>{setPs(s.docs.map(d=>({id:d.id,...d.data()})));setLd(false);setIsC(true);},()=>setIsC(false));
    const unA=onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'announcement'), (sn)=>{if(sn.exists())setAnn(String(sn.data().content || ""));});
    const unS=onSnapshot(doc(db,'artifacts',appId,'public','data','settings','global'),(s)=>{if(s.exists()){setGs(s.data()); if(s.data().systemLocked && localStorage.getItem('ggsoc_auth')){ const sa=JSON.parse(localStorage.getItem('ggsoc_auth')||'{}'); if(sa.phone!=="0976017938"){ localStorage.removeItem('ggsoc_auth'); setAR('guest'); setL('gate'); alert("Restricted."); } } }});
    const timeout = setTimeout(()=>setLd(false), 5000); return()=>{unP();unA();unS();clearTimeout(timeout);};
  },[u]);

  const handleLogin = (phone,pin,rem)=>{
    if(gs?.systemLocked && phone!=="0976017938") return showToast("🚫 系統維護中，目前限制登入",true);
    if(phone==="0976017938"&&pin==="8305319"){if(rem)localStorage.setItem('ggsoc_auth',JSON.stringify({phone,role:'super_admin'})); setAR('super_admin');setL('admin');}
    else if(phone==="0988128172"&&pin===(gs?.accountantPin||"0172")){if(rem)localStorage.setItem('ggsoc_auth',JSON.stringify({phone,role:'admin'})); setAR('admin');setL('admin');}
    else{
      const p=ps.find(x=>x.phone===phone&&x.pin===pin); 
      if(p){
        if(p.status==='frozen') return showToast("🚫 帳號已被凍結",true); 
        if(p.status==='pending') return showToast("⚠️ 資料尚在人工審核中，開通後即可登入",true); 
        if(rem)localStorage.setItem('ggsoc_auth',JSON.stringify({phone,role:'driver'})); 
        setAR('driver');setSpI(p.id);setL('driver');
      } else {
        showToast("⚠️ 登入失敗：帳號未註冊或密碼錯誤",true);
      }
    }
  };

  const updateField = async (id,f,v)=>{ if(db) await updateDoc(doc(db,'artifacts',appId,'public','data', 'partners', id),{[f]:v}); };

  if(ld)return(<div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center font-black"><div className="w-20 h-20 md:w-24 md:h-24 border-4 border-blue-500/10 border-t-blue-500 rounded-full animate-spin shadow-2xl"></div><p className="mt-8 md:mt-12 text-blue-500 animate-pulse italic text-lg md:text-2xl tracking-[0.5em] font-black">GGSOC SECURING...</p></div>);

  return (
    <div className="min-h-screen text-slate-200 font-black">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[99999] opacity-0 pointer-events-none text-xl shadow-2xl transition-all duration-500"></div>
      
      {l==='gate' && <Gate onLogin={handleLogin} announcement={ann} setLayer={setL} globalSettings={gs} isConnected={isC} />}

      {l==='admin' && ( 
        <AdminHub authRole={aR} partners={ps} onLogout={()=>{localStorage.removeItem('ggsoc_auth');setAR('guest');setL('gate');}} updateField={updateField} setModalType={setMT} setSelectedPartner={p=>setSpI(p.id)} showSensitive={ss} setShowSensitive={setSs} sq={sq} setSq={setSq} autoInsur={async(pId,bv,dp)=>{if(db){const t=INSURANCE_TABLE.find(x=>x.bracket===Number(bv));if(t)await updateDoc(doc(db,'artifacts',appId,'public','data','partners',pId),{insurance_bracket:Number(bv),labor_fee:t.labor,health_fee:Math.round(t.health*(1+Math.min(dp||0,3)))});} }} />
      )}

      {l==='driver' && <DriverHub currentPartner={cp} onLogout={()=>{localStorage.removeItem('ggsoc_auth');setAR('guest');setL('gate');}} updateField={updateField} globalSettings={gs} authRole={aR} />}
      {l==='onboarding' && <OnboardingFlow setLayer={setL} db={db} appId={appId} />}
      {l==='onboarding_data' && <OnboardingDataFlow setLayer={setL} db={db} appId={appId} />}
      {l==='install_tutorial' && <InstallationGuide setLayer={setL} />}
      
      {mT==='system_settings' && aR==='super_admin' && <SystemSettingsModal onClose={()=>setMT(null)} db={db} appId={appId} globalSettings={gs} />}
      {mT==='tools' && <ToolsModal onClose={()=>setMT(null)} db={db} appId={appId} resetData={async()=>{if(db){for(const p of ps)await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id),{total_del:0,total_pkp:0,custom_adj:0}); showToast("數據重置成功");} }} />}
      {mT==='detail' && <PartnerDetail partner={cp} onClose={()=>setMT(null)} updateField={updateField} deletePartner={async id=>{if(db){await deleteDoc(doc(db,'artifacts',appId,'public','data','partners',id));setMT(null);showToast("檔案已刪除");} }} />}
    </div>
  );
}

try {
  const rootElement = document.getElementById('root');
  if (rootElement) {
    createRoot(rootElement).render(<AppWrapper />);
  }
} catch (err) {
  document.body.innerHTML = `<div style="color:red; padding: 20px; font-weight: bold; background: white; margin-top:50px;">系統啟動失敗: <br/><br/>${err.message}</div>`;
}
  </script>
</body>
</html>
