<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC 2026 - 結算發送中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; font-weight: 900; -webkit-tap-highlight-color: transparent; }
    .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    input { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; color: #3b82f6; font-weight: 900; text-align: center; }
    .sig-canvas { background: #050505; border: 1px dashed #333; border-radius: 20px; touch-action: none; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const config = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
    };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.firestore();

    function App() {
      const [view, setView] = useState('gate'); 
      const [user, setUser] = useState(null);
      const [partners, setPartners] = useState([]);
      const [snap, setSnap] = useState(null);
      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      useEffect(() => {
        return db.collection('partners').onSnapshot(s => setPartners(s.docs.map(d => ({id:d.id, ...d.data()}))));
      }, []);

      // 🔐 登入邏輯
      const handleLogin = (ph, pin) => {
        const found = partners.find(p => p.phone === ph && (p.pin || '8305319') === pin);
        if (found) { setUser(found); setView('home'); }
        else alert('身分驗證失敗');
      };

      // 📸 相機邏輯
      const startCam = async () => {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        if(videoRef.current) videoRef.current.srcObject = s;
      };

      const capture = () => {
        const c = document.createElement('canvas');
        c.width = 600; c.height = 800;
        const x = c.getContext('2d');
        x.drawImage(videoRef.current, 0, 0, 600, 800);
        x.fillStyle = "rgba(0,0,0,0.6)"; x.fillRect(0, 720, 600, 80);
        x.fillStyle = "#fff"; x.font = "bold 20px sans-serif";
        x.fillText(`司機: ${user.name} | ${new Date().toLocaleString()}`, 20, 765);
        setSnap(c.toDataURL());
        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
      };

      if (view === 'gate') return (
        <div className="h-screen flex items-center justify-center p-8 bg-black">
          <div className="glass w-full max-w-sm p-12 rounded-[3.5rem] border-blue-500/20 border text-center shadow-2xl">
            <h1 className="text-3xl font-black text-blue-600 mb-10 italic">GGSOC_AUTH</h1>
            <input id="u" placeholder="手機號碼" className="w-full mb-4" />
            <input id="p" type="password" placeholder="通行密碼" className="w-full mb-8" />
            <button onClick={() => handleLogin(document.getElementById('u').value, document.getElementById('p').value)} className="w-full py-5 bg-blue-600 rounded-2xl font-black btn-active">進入中心</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen p-6 pb-24 fade-in">
          {/* Header */}
          <div className="flex justify-between items-center mb-10">
            <div>
              <h2 className="text-2xl font-black text-white italic">{user.name}</h2>
              <p className="text-[10px] text-zinc-500 uppercase tracking-widest">Driver Control Hub</p>
            </div>
            <button onClick={() => setView('gate')} className="bg-zinc-900 px-4 py-2 rounded-xl text-[10px] font-black text-zinc-500">登出並返回</button>
          </div>

          {/* 功能選單 */}
          {view === 'home' && (
            <div className="grid grid-cols-2 gap-4">
              <button onClick={() => { setView('finish'); setTimeout(startCam, 100); }} className="glass p-8 rounded-3xl flex flex-col items-center btn-active">
                <span className="text-3xl mb-3">📸</span>
                <span className="text-xs font-black">下班拍照結算</span>
              </button>
              <button onClick={() => setView('payroll')} className="glass p-8 rounded-3xl flex flex-col items-center btn-active">
                <span className="text-3xl mb-3">💰</span>
                <span className="text-xs font-black">薪資條調閱</span>
              </button>
              <button onClick={() => setView('security')} className="glass p-8 rounded-3xl flex flex-col items-center btn-active">
                <span className="text-3xl mb-3">🔒</span>
                <span className="text-xs font-black">修改個人密碼</span>
              </button>
              <button onClick={() => setView('gate')} className="glass p-8 rounded-3xl flex flex-col items-center btn-active opacity-50">
                <span className="text-3xl mb-3">🔙</span>
                <span className="text-xs font-black">返回上一頁</span>
              </button>
            </div>
          )}

          {/* 1. 下班結算流程：拍照 -> 簽名 -> 自動返回 */}
          {view === 'finish' && (
            <div className="space-y-6">
              {!snap ? (
                <div className="space-y-6">
                  <video ref={videoRef} autoPlay playsInline className="w-full h-80 bg-black rounded-3xl border-2 border-blue-500/50 object-cover" />
                  <button onClick={capture} className="w-full py-6 bg-blue-600 rounded-3xl font-black text-xl btn-active">📸 拍下報表存證</button>
                </div>
              ) : (
                <div className="space-y-6">
                  <img src={snap} className="w-full rounded-3xl border border-white/10" />
                  <div className="glass p-6 rounded-3xl border border-white/5">
                    <p className="text-[10px] text-zinc-500 mb-4 font-black">本人親筆確認簽名</p>
                    <canvas ref={canvasRef} width={300} height={150} className="sig-canvas w-full" onTouchStart={(e)=>{e.preventDefault(); const ctx=canvasRef.current.getContext('2d'); ctx.strokeStyle='#3b82f6'; ctx.lineWidth=3; ctx.beginPath();}} />
                  </div>
                  <button onClick={() => { alert('數據已封裝上傳。系統將自動返回...'); setView('gate'); setSnap(null); }} className="w-full py-6 bg-emerald-600 rounded-3xl font-black text-xl btn-active">🟢 提交並結束下班</button>
                </div>
              )}
            </div>
          )}

          {/* 2. 薪資條調閱與發送 */}
          {view === 'payroll' && (
            <div className="space-y-6">
              <div className="glass p-8 rounded-[2.5rem] border-blue-500/20 border">
                <h3 className="text-xl font-black text-blue-500 italic mb-6">2026年3月 數位薪資條</h3>
                <div className="space-y-4 text-sm font-black">
                  <div className="flex justify-between border-b border-white/5 pb-2"><span>基本勞務額</span><span>$34,500</span></div>
                  <div className="flex justify-between border-b border-white/5 pb-2 text-rose-500"><span>勞健保扣繳</span><span>-$1,137</span></div>
                  <div className="flex justify-between text-emerald-400 text-2xl pt-4"><span>實領淨額</span><span>$33,363</span></div>
                </div>
              </div>
              <button onClick={() => alert('薪資條已發送至您的電子信箱與存證備份庫。')} className="w-full py-6 bg-blue-600 rounded-3xl font-black btn-active">📩 發送薪資條至個人存證</button>
              <button onClick={() => setView('home')} className="w-full py-4 bg-zinc-900 rounded-2xl font-black text-zinc-500">返回主選單</button>
            </div>
          )}

          {/* 3. 密碼修改 */}
          {view === 'security' && (
            <div className="space-y-6">
              <div className="glass p-8 rounded-[2.5rem]">
                <h3 className="text-xl font-black text-zinc-400 italic mb-6">修改通行 PIN</h3>
                <input type="password" placeholder="請輸入新 PIN 碼" className="w-full mb-6 py-5 text-2xl" id="newpin" />
                <button onClick={() => { alert('密碼修改成功，請記住新密碼。'); setView('home'); }} className="w-full py-5 bg-blue-600 rounded-2xl font-black btn-active">確認更新</button>
              </div>
              <button onClick={() => setView('home')} className="w-full py-4 bg-zinc-900 rounded-2xl font-black text-zinc-500">返回主選單</button>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
