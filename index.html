class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false }; }
  static getDerivedStateFromError(error) { return { hasError: true }; }
  render() {
    if (this.state.hasError) return <div className="min-h-screen bg-[#020617] text-white flex flex-col items-center justify-center p-6 text-center font-black"><div className="bg-rose-900/20 p-8 rounded-[2rem] shadow-2xl"><h2 className="text-3xl text-rose-400 mb-4 animate-pulse">🛡️ 系統底層修復中</h2><p className="text-sm text-rose-200 mb-6">已攔截異常，數據安全無虞。</p><button onClick={() => window.location.reload()} className="w-full py-4 bg-rose-600 rounded-xl">🔄 重新連線</button></div></div>;
    return this.props.children;
  }
}

const safeStorage = {

  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },

};

const showToast = (msg, isError = false) => {
  const t = document.getElementById('global-toast');
  if(t) {
    t.innerText = msg;
    t.className = `fixed top-6 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-black z-[999999] shadow-2xl transition-all duration-500 flex items-center text-sm md:text-lg text-center ${isError ? 'bg-rose-600 text-white' : 'bg-indigo-600 text-white'}`;
    t.style.opacity = '1'; t.style.transform = 'translate(-50%, 0)';

};

// 🛡️ 三位一體數位簽章 (擷取 GPS + 時間 + 設備特徵)
const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const [geoInfo, setGeoInfo] = useState("獲取位置中...");
  // 取得簡單設備指紋
  const deviceId = useMemo(() => navigator.userAgent.replace(/[^a-zA-Z0-9]/g, '').slice(-10) + '-' + screen.width, []);

  useEffect(() => {
    if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => setGeoInfo(`GPS:${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)}`), () => setGeoInfo("GPS:未授權"));
    if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } 
  }, []);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  };

  const handleFinish = () => {
    setIsDrawing(false);
    if(canvasRef.current) {
      const ctx = canvasRef.current.getContext('2d');
      ctx.font = "8px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      ctx.fillText(`${geoInfo} | ID:${deviceId} | ${new Date().toISOString()}`, 5, 145);
      onSign(canvasRef.current.toDataURL());
    }
  };

  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden relative">
        <canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onMouseMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onMouseUp={handleFinish} onTouchStart={(e)=>{setIsDrawing(true); const p=getPos(e); canvasRef.current.getContext('2d').beginPath(); canvasRef.current.getContext('2d').moveTo(p.x, p.y);}} onTouchMove={(e)=>{if(!isDrawing)return; const p=getPos(e); canvasRef.current.getContext('2d').lineTo(p.x, p.y); canvasRef.current.getContext('2d').stroke();}} onTouchEnd={handleFinish} />
        <div className="absolute bottom-1 left-2 text-[8px] text-slate-600 pointer-events-none">{geoInfo} | Dev:{deviceId}</div>
      </div>
      <button onClick={()=>{canvasRef.current.getContext('2d').clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1">清除重簽</button>
    </div>
  );
};

// 👻 幽靈對話 (Ghost Chat) - 會計黑箱隔離
function ChatModal({ target, currentUserRole, onClose }) {
  const [input, setInput] = useState("");
  const isPrivileged = target?.priority_access === true; 
  const [msgs, setMsgs] = useState([]);

  // 會計的黑箱：絕對阻斷
  if (currentUserRole === 'admin' && isPrivileged) {
    return (
      <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 animate-zoom" onClick={onClose}>
        <div className="bg-slate-900 border border-slate-700 p-8 rounded-[2.5rem] w-full max-w-sm text-center" onClick={e=>e.stopPropagation()}>
          <button onClick={onClose} className="absolute top-4 right-4 p-2"><X size={16}/></button>
          <Shield size={48} className="text-slate-600 mx-auto mb-4" />
          <p className="text-slate-400 text-sm italic tracking-widest">[ 此通道已轉交系統底層靜默處理 ]</p>
        </div>
      </div>
    );
  }

  useEffect(() => {
    setMsgs([{ id: 1, sender: isPrivileged ? 'hq' : 'ai', text: isPrivileged ? '【內部特權直連通道已開啟】' : '您好！系統正進行底層日誌校驗。' }]);
  }, [isPrivileged]);

  const handleSend = () => {
    if(!input.trim()) return;
    if(["罷工", "法律", "錢不對"].some(w => input.includes(w)) && currentUserRole === 'driver' && !isPrivileged) {
       sendLineNotify(`🔴 [紅燈警報] 司機 ${target?.name} 輸入敏感詞彙：${input}`);
    }

    setMsgs(prev => [...prev, { id: Date.now(), sender: currentUserRole === 'driver' ? 'me' : 'hq', text: input }]);
    setInput("");

    // 特權通道：秒傳無 AI 延遲
    if (isPrivileged && currentUserRole === 'driver') {
      setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'hq', text: '收到，直達總部，無 AI 介入。' }]); }, 300);
    } else if (currentUserRole === 'driver') {
      // 隨機延遲 AI
      setTimeout(() => { setMsgs(prev => [...prev, { id: Date.now()+1, sender: 'ai', text: '已掛載高階核算模組進行複核，請稍候。' }]); }, Math.random() * 1400 + 1800);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/95 z-[99999] flex items-center justify-center p-4 animate-zoom" onClick={onClose}>
       <div className={`bg-slate-900 border ${isPrivileged ? 'border-fuchsia-500/30' : 'border-blue-500/30'} w-full max-w-md h-[80vh] rounded-[2.5rem] flex flex-col overflow-hidden font-black`} onClick={e=>e.stopPropagation()}>
         <div className="p-4 bg-slate-800 flex justify-between items-center z-10">
           <div className="flex items-center gap-2"><Support size={24} className={isPrivileged?'text-fuchsia-400':'text-blue-400'}/> <h3 className={`text-white italic ${isPrivileged ? 'text-fuchsia-300' : ''}`}>{isPrivileged ? '特權直連' : `客服中心`}</h3></div>
           <button onClick={onClose} className="p-2"><X size={16}/></button>
         </div>
         <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
           {msgs.map(m => (<div key={m.id} className={`flex ${m.sender==='me'?'justify-end':'justify-start'}`}><div className={`p-3 rounded-2xl text-sm max-w-[85%] ${m.sender==='me'?'bg-blue-600 text-white rounded-tr-none': m.sender==='hq' ? (isPrivileged ? 'bg-fuchsia-900/60 text-fuchsia-100 rounded-tl-none' : 'bg-amber-600 text-white rounded-tl-none') : 'bg-slate-800 text-slate-200 rounded-tl-none'}`}>{m.text}</div></div>))}
         </div>
         <div className="p-4 bg-slate-800 flex gap-2"><input className="flex-1 bg-slate-900 rounded-xl px-4 py-3 outline-none text-white text-sm" placeholder="輸入訊息..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleSend()} /><button onClick={handleSend} className={`${isPrivileged ? 'bg-fuchsia-600' : 'bg-blue-600'} px-5 py-3 rounded-xl text-white`}><Send size={20}/></button></div>
       </div>
    </div>
  )
}

// 🚐 司機工作台 (DriverHub) - 手套友善與 3 秒撤回
function DriverHub({ user, currentPartner, onLogout, updateField, authRole, db, appId, setChatTarget, setLayer }) {
  const [del,setDel]=useState(0); const [pkp,setPkp]=useState(0); const [cod,setCod]=useState(""); 
  const [sData,setSData]=useState(null); 
  
  // 3秒撤回狀態
  const [isConfirming, setIsConfirming] = useState(false);
  const undoTimerRef = useRef(null);

  const startSubmit = () => {
    if(!sData) return showToast("⚠️ 數位防偽簽章為必填",true);
    setIsConfirming(true);
    undoTimerRef.current = setTimeout(() => { executeSubmit(); }, 3000);
  };

  const cancelSubmit = () => {
    clearTimeout(undoTimerRef.current); setIsConfirming(false);
    showToast("🛑 已撤回提交");
  };

  const executeSubmit = async () => { 
    setIsConfirming(false);
    try {
      const h = { date: new Date().toLocaleDateString('zh-TW'), time: new Date().toLocaleTimeString('zh-TW',{hour12:false}), del, pkp, cod: parseInt(cod)||0 };
      const nextH = [...(currentPartner?.history||[]), h].slice(-31);
      await updateField(currentPartner.id,'total_del',(currentPartner.total_del||0)+del); 
      await updateField(currentPartner.id,'total_pkp',(currentPartner.total_pkp||0)+pkp); 
      await updateField(currentPartner.id,'history', nextH); 
      setDel(0); setPkp(0); setCod(""); setSData(null); 
      showToast("✅ 數據加密傳送成功！"); 
      speak("數據已接收，辛苦了"); // 語音反饋
    } catch (e) { showToast("❌ 傳送失敗，將於背景補傳", true); }
  };

  if(!currentPartner) return <div className="loading-container bg-[#020617] font-black"><div className="loader mb-4"></div><p className="text-blue-500 animate-pulse">連線中...</p></div>;

  return (
    <div className="min-h-screen bg-[#020617] flex flex-col items-center p-4 pb-24 font-black">
      <div className="w-full max-w-[500px] mb-6 flex justify-between items-end">
        <div>
           {authRole==='super_admin' && <button onClick={()=>setLayer('admin')} className="text-amber-500 text-[10px] border border-amber-500/30 px-3 py-1 rounded-full mb-2">返回總部</button>}
           <h2 className="text-3xl text-white italic tracking-tighter uppercase mb-1">在地物流</h2>
        </div>
        <button onClick={()=>setChatTarget(currentPartner)} className={`text-white p-3 rounded-2xl ${currentPartner.priority_access ? 'bg-fuchsia-600' : 'bg-blue-600'}`}><Support size={18} /></button>
      </div>

      <div className="bg-slate-900/80 p-6 rounded-[2.5rem] w-full max-w-[500px] shadow-2xl border border-white/5">
        
        {/* 👷 手套友善極速輸入 (+1, +5) */}
        <div className="space-y-4 mb-6">
           <div className="bg-black/50 p-4 rounded-2xl border border-white/5">
             <p className="text-[11px] text-blue-400 uppercase mb-3 text-center">今日配送件數</p>
             <div className="flex items-center justify-between">
               <button onClick={()=>setDel(Math.max(0, del-1))} className="w-12 h-12 bg-slate-700 text-white rounded-xl text-xl">-1</button>
               <span className="text-4xl text-white font-black">{del}</span>
               <div className="flex gap-2">
                 <button onClick={()=>setDel(del+1)} className="w-12 h-12 bg-blue-600 text-white rounded-xl text-xl">+1</button>
                 <button onClick={()=>setDel(del+5)} className="w-12 h-12 bg-indigo-600 text-white rounded-xl text-xl">+5</button>
               </div>
             </div>
           </div>
           
           <div className="bg-black/50 p-4 rounded-2xl border border-white/5">
             <p className="text-[11px] text-cyan-400 uppercase mb-3 text-center">今日逆收件數</p>
             <div className="flex items-center justify-between">
               <button onClick={()=>setPkp(Math.max(0, pkp-1))} className="w-12 h-12 bg-slate-700 text-white rounded-xl text-xl">-1</button>
               <span className="text-4xl text-white font-black">{pkp}</span>
               <div className="flex gap-2">
                 <button onClick={()=>setPkp(pkp+1)} className="w-12 h-12 bg-cyan-600 text-white rounded-xl text-xl">+1</button>
                 <button onClick={()=>setPkp(pkp+5)} className="w-12 h-12 bg-teal-600 text-white rounded-xl text-xl">+5</button>
               </div>
             </div>
           </div>
        </div>

        <div className="bg-amber-900/10 p-6 rounded-2xl border border-amber-500/30 mb-6 text-center">
           <p className="text-xs text-amber-500 mb-2"><Banknote size={16} className="inline"/> 今日代收 (C.O.D)</p>
           <input type="number" placeholder="輸入金額..." className="w-full bg-transparent text-center text-3xl text-amber-400 outline-none border-b border-amber-500/30 pb-2" value={cod} onChange={e=>setCod(e.target.value)} />
        </div>
        
        <div className="mb-6"><p className="text-blue-400 text-[11px] text-center mb-2"><Pen size={14} className="inline"/> 三位一體電子簽章</p><SignaturePad onSign={setSData} /></div>
        
        {/* 3 秒撤回機制 UI */}
        {!isConfirming ? (
           <button onClick={startSubmit} className="w-full py-5 rounded-2xl bg-blue-600 text-white text-xl uppercase tracking-widest active:scale-95">提交流程</button>
        ) : (
           <div className="relative w-full py-5 rounded-2xl bg-rose-600 text-white text-xl uppercase tracking-widest overflow-hidden cursor-pointer" onClick={cancelSubmit}>
             <div className="absolute top-0 left-0 h-full bg-rose-800 animate-progress z-0"></div>
             <span className="relative z-10">點擊撤回 (3秒)</span>
           </div>
        )}
      </div>
    </div>
  );
}

  const [lp, setLp] = useState(""); const [li, setLi] = useState("");
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#020617] font-black">
      <div className="mb-12 text-center"><h1 className="text-5xl text-white italic tracking-tighter mb-4">在地物流</h1><p className="text-blue-500 text-xs tracking-[0.4em] border border-indigo-500/30 px-6 py-2 rounded-full uppercase">GGSOC 終極隱身版</p></div>
      <div className="w-full max-w-[340px] bg-slate-900/80 p-8 rounded-[2.5rem] border border-white/10">
        <input type="tel" placeholder="手機門號" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-center text-white outline-none mb-4 tracking-widest text-lg" value={lp} onChange={e=>setLp(e.target.value.replace(/\D/g,''))} maxLength={10} />
        <input type="password" placeholder="PIN 通行碼" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-center text-white outline-none mb-6 tracking-widest text-lg" value={li} onChange={e=>setLi(e.target.value.replace(/\D/g,''))} />
        <button onClick={()=>onLogin(lp,li,true)} className="w-full py-5 rounded-2xl bg-blue-600 text-white text-lg tracking-widest">進入系統</button>
      </div>
    </div>
  );
}

// 🚀 AppWrapper
function AppWrapper() {
  const [u,setU]=useState(null); const [aR,setAR]=useState('guest'); const [ps,setPs]=useState([]); const [l,setL]=useState('gate'); const [ld,setLd]=useState(true); const [spI,setSpI]=useState(null);
  const [sq,setSq]=useState(""); const [chatTarget, setChatTarget] = useState(null); const [mT,setMT]=useState(null);
  const [godLogs, setGodLogs] = useState([]); const [expressData, setExpressData] = useState({ phone: '', name: '', priority_access: false });

  const cp = useMemo(() => ps.find(p => p.id === spI), [ps, spI]);

  useEffect(()=>{
    const unA = onAuthStateChanged(auth, async (user)=>{ 
      if(user){ setU(user); const s = safeStorage.get('ggsoc_auth') || {}; if(s.phone){ setAR(s.role); setSpI(`p_${s.phone}`); setL(s.role==='driver'?'driver':'admin'); } } else signInAnonymously(auth);
      setTimeout(()=>setLd(false), 500);
    });
    return () => unA();
  },[]);

  useEffect(()=>{
    if(!u) return;
    const unP = onSnapshot(collection(db,'artifacts',appId,'public','data','partners'),(s)=>{
      const data = s.docs.map(d=>({id:d.id,...d.data()}));
      setPs(data);
      if(data.length === 0) setDoc(doc(db,'artifacts',appId,'public','data','partners','p_0976017938'), { id:'p_0976017938', name:'系統總裁', phone:'0976017938', pin:'8305319', status:'approved', total_del:0, total_pkp:0 });
    });
    let unG = () => {};
    if (aR === 'super_admin') unG = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'god_log'), orderBy('timestamp', 'desc')), (s) => setGodLogs(s.docs.map(d => ({id: d.id, ...d.data()}))));
    return()=>{unP(); unG();};
  },[u, aR]);

  const writeGodLog = async (action, details) => {
    if (aR !== 'super_admin') await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'god_log'), { action, details, timestamp: Date.now(), actor: 'Admin' });
  };

  const handleLogin = (phone,pin,rem)=>{
    if(phone==="0976017938"&&pin==="8305319"){ safeStorage.set('ggsoc_auth',{phone,role:'super_admin'}); setAR('super_admin');setL('admin');setSpI(`p_${phone}`); }
    else if(phone==="0988128172"&&pin==="0172"){ safeStorage.set('ggsoc_auth',{phone,role:'admin'}); setAR('admin');setL('admin'); }
    else{
      const p=ps.find(x=>x.phone===phone&&x.pin===pin); 
      if(p && p.status==='approved'){ safeStorage.set('ggsoc_auth',{phone,role:'driver'}); setAR('driver');setSpI(p.id);setL('driver'); } else showToast("⚠️ 權限不足或密碼錯誤",true);
    }
  };

  if(ld) return <div className="loading-container bg-[#020617] font-black"><div className="loader"></div></div>;

  return (
    <div className="min-h-screen text-slate-200 font-black">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none text-xl shadow-2xl transition-all text-white"></div>
      {chatTarget && <ChatModal target={chatTarget} currentUserRole={aR} onClose={()=>setChatTarget(null)} />}
      
      {l==='gate' && <Gate onLogin={handleLogin} />}
      {l==='admin' && <AdminHub authRole={aR} partners={ps} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>{await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v}); writeGodLog("修改資料", `更新了 ${id} 的 ${f}`);}} setModalType={setMT} sq={sq} setSq={setSq} db={db} appId={appId} setChatTarget={setChatTarget} setLayer={setL} writeGodLog={writeGodLog} />}
      {l==='driver' && <DriverHub user={u} currentPartner={cp} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} authRole={aR} db={db} appId={appId} setChatTarget={setChatTarget} setLayer={setL} />}
      
      {/* 👑 總裁管理中樞 Modal */}
      {mT==='tools' && (
        <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 animate-zoom" onClick={()=>setMT(null)}>
          <div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-lg w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative" onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setMT(null)} className="absolute top-6 right-6 p-2 bg-slate-800 rounded-full"><X size={20}/></button>
            <h3 className="text-2xl text-blue-400 mb-6 text-center italic">系統管理中樞</h3>
            
            <div className="space-y-6">
              {aR === 'super_admin' && (
                <div className="bg-fuchsia-950/20 p-6 rounded-2xl border border-fuchsia-500/30">
                  <p className="text-[11px] text-fuchsia-400 mb-4 text-center">🛡️ 總裁特赦：核心成員授權</p>
                  <div className="space-y-3">
                    <input placeholder="真實姓名" className="w-full bg-slate-800 p-4 rounded-xl text-white text-sm outline-none" value={expressData.name} onChange={e=>setExpressData({...expressData, name: e.target.value})} />
                    <input placeholder="手機門號 (10碼)" type="tel" className="w-full bg-slate-800 p-4 rounded-xl text-white text-sm outline-none" value={expressData.phone} onChange={e=>setExpressData({...expressData, phone: e.target.value})} />
                    <label className="flex items-center gap-2 p-3 bg-black/30 rounded-xl cursor-pointer text-xs text-fuchsia-200"><input type="checkbox" checked={expressData.priority_access} onChange={e=>setExpressData({...expressData, priority_access: e.target.checked})} className="accent-fuchsia-600 w-4 h-4" /> 開啟特權通道 (隱藏於會計監控)</label>
                    <button onClick={async()=>{ if(!expressData.phone || !expressData.name) return showToast("必填",true); await setDoc(doc(db,'artifacts',appId,'public','data','partners',`p_${expressData.phone}`), { id: `p_${expressData.phone}`, name: expressData.name, phone: expressData.phone, pin: '0000', status: 'approved', priority_access: expressData.priority_access, total_del: 0, total_pkp: 0, history: []}); showToast("部署完成"); setExpressData({phone:'',name:'',priority_access:false}); sendLineNotify(`✅ 新增核心成員: ${expressData.name}`); }} className="w-full py-4 bg-fuchsia-600 rounded-xl text-white text-sm">一鍵寫入系統</button>
                  </div>
                </div>
              )}

              {aR === 'super_admin' && (
                <div className="bg-slate-800/50 p-6 rounded-2xl border border-white/5">
                  <p className="text-[11px] text-emerald-400 mb-4 text-center">👁️ 上帝日誌 (僅總裁可見)</p>
                  <div className="h-40 overflow-y-auto space-y-2 pr-2">
                    {godLogs.map(g => (<div key={g.id} className="bg-black/50 p-3 rounded-lg border border-white/5 text-[10px]"><div className="flex justify-between text-slate-400 mb-1"><span>{g.actor}</span><span>{new Date(g.timestamp).toLocaleString()}</span></div><p className="text-emerald-300">[{g.action}] <span className="text-white">{g.details}</span></p></div>))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

try { createRoot(document.getElementById('root')).render(<ErrorBoundary><AppWrapper /></ErrorBoundary>); } catch (err) {}
  </script>
</body>
</html>
