<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金耀智慧營運總部 (測試版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
    .gold-border { border: 1px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.1); }
    .input-box { width: 100%; padding: 1rem; border-radius: 1rem; background: #0f172a; border: 1px solid #334155; color: white; margin-bottom: 1rem; font-weight: bold; outline: none; }
    .input-box:focus { border-color: #f59e0b; }
    .btn-prime { background: #f59e0b; color: black; font-weight: 900; padding: 1rem; border-radius: 1rem; width: 100%; transition: all 0.3s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
    .btn-prime:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); }
    .ghost-input { background: transparent; border: none; outline: none; text-align: center; font-weight: 900; }
    .admin-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    .admin-table th { padding: 12px; background: rgba(0,0,0,0.4); color: #94a3b8; font-size: 12px; }
    .admin-table td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot-online { background-color: #34d399; box-shadow: 0 0 8px #34d399; }
    .dot-leave { background-color: #f43f5e; box-shadow: 0 0 8px #f43f5e; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const MOCK_PARTNERS = [
      { id: 'p_0987654321', name: '王大明 (測試)', phone: '0987654321', pin: '1111', total_del: 45, total_pkp: 12, work_status: 'online', custom_del_price: 15, custom_pkp_price: 10, labor_fee: 650, health_fee: 400 },
      { id: 'p_0912345678', name: '李小華 (測試)', phone: '0912345678', pin: '2222', total_del: 0, total_pkp: 0, work_status: 'leave', custom_del_price: 15, custom_pkp_price: 10, labor_fee: 650, health_fee: 400 }
    ];

    function App() {
      const [role, setRole] = useState('guest'); 
      const [layer, setLayer] = useState('gate'); 
      const [toastMsg, setToastMsg] = useState("");

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(""), 3000);
      };

      const handleLogin = (phone, pin) => {
        if (phone === "0976017938" && pin === "0531") {
          setRole('admin');
          setLayer('admin');
          showToast("🔑 管理員登入成功");
        } else if (phone === "0987654321" && pin === "1111") {
          setRole('driver');
          setLayer('driver');
          showToast("🔑 夥伴登入成功");
        } else {
          alert("測試帳號提示：\n管理員：0976017938 / 0531\n司機：0987654321 / 1111");
        }
      };

      return (
        <div className="min-h-screen text-slate-200">
          <div className={`fixed left-1/2 -translate-x-1/2 bg-amber-500 text-black px-8 py-4 rounded-full font-black z-[10000] shadow-2xl transition-all duration-500 ${toastMsg ? 'top-[40px] opacity-100' : 'top-[-100px] opacity-0 pointer-events-none'}`}>
            {toastMsg}
          </div>
          {layer === 'gate' && <Gate onLogin={handleLogin} setLayer={setLayer} />}
          {layer === 'admin' && <AdminHub partners={MOCK_PARTNERS} onLogout={() => setLayer('gate')} showToast={showToast} />}
          {layer === 'driver' && <DriverHub onLogout={() => setLayer('gate')} showToast={showToast} />}
        </div>
      );
    }

    function Gate({ onLogin }) {
      const [ph, setPh] = useState("");
      const [pin, setPin] = useState("");
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 relative">
          <div className="mb-12 text-center">
            <h1 className="text-7xl font-black text-white italic tracking-tighter mb-2">在地物流</h1>
            <p className="text-amber-500 text-[10px] tracking-[0.5em] font-black border border-amber-500/30 px-4 py-1.5 rounded-full inline-block">免安裝測試版</p>
          </div>
          <div className="w-full max-w-[340px] space-y-5 relative z-10 font-bold">
            <div className="glass-panel p-8 rounded-[2.5rem] gold-border">
              <input type="tel" placeholder="測試手機: 0976017938" className="input-box" value={ph} onChange={e => setPh(e.target.value)} maxLength={10} />
              <input type="password" placeholder="測試 PIN: 0531" className="input-box" value={pin} onChange={e => setPin(e.target.value)} maxLength={4} />
              <button onClick={() => onLogin(ph, pin)} className="btn-prime italic tracking-widest mt-2">進入中心</button>
            </div>
          </div>
        </div>
      );
    }

    function AdminHub({ partners, onLogout, showToast }) {
      return (
        <div className="p-4 lg:p-10 max-w-[1200px] mx-auto overflow-x-auto">
          <div className="flex justify-between items-center mb-10">
            <h2 className="text-white font-black text-3xl md:text-5xl italic tracking-tighter">數據指揮中心</h2>
            <button onClick={onLogout} className="bg-slate-800 text-rose-500 px-4 py-2 rounded-xl text-xs font-black">退出系統</button>
          </div>
          <div className="glass-panel rounded-3xl overflow-hidden overflow-x-auto gold-border">
            <table className="admin-table">
              <thead><tr><th>狀態</th><th>夥伴資訊</th><th>預計實領</th></tr></thead>
              <tbody>
                {partners.map(p => (
                  <tr key={p.id}>
                    <td><span className={`status-dot ${p.work_status === 'leave' ? 'dot-leave' : 'dot-online'}`}></span></td>
                    <td className="text-left"><span className="text-white font-black block">{p.name}</span></td>
                    <td className="text-amber-500 font-black italic">$1,250</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function DriverHub({ onLogout, showToast }) {
      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 font-black">
          <div className="glass-panel p-10 rounded-[3rem] w-full max-w-[480px] text-center gold-border">
            <h2 className="text-3xl font-black text-white italic mb-10">夥伴工作台</h2>
            <button onClick={() => showToast("🚀 數據報帳成功！")} className="btn-prime mb-10">🚀 模擬提交數據</button>
            <button onClick={onLogout} className="text-rose-500 text-sm font-black underline underline-offset-8">🔒 安全登出系統</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
