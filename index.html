<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GGSOC 行政核心 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; font-weight: 900; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .glass { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(25px); }
    .sig-canvas { background: #050505; border: 1px dashed #333; border-radius: 24px; touch-action: none; }
    .camera-live { width: 100%; height: 300px; background: #000; border-radius: 30px; object-fit: cover; border: 1px solid #d4af37; }
    input, select { background: #111; border: 1px solid #222; border-radius: 16px; padding: 15px; color: #d4af37; font-weight: 900; width: 100%; outline: none; }
    .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    .status-badge { background: #d4af37; color: #000; padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; }
    /* 模仿真人客服的打字動畫 */
    .typing::after { content: '...'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 🖋️ 確權簽名板組件 ---
    const SignaturePad = ({ onSave }) => {
      const canvasRef = useRef(null);
      const [drawing, setDrawing] = useState(false);
      const [ctx, setCtx] = useState(null);

      useEffect(() => {
        const c = canvasRef.current;
        const x = c.getContext("2d");
        x.strokeStyle = "#d4af37"; x.lineWidth = 4; x.lineCap = "round";
        setCtx(x);
      }, []);

      const getPos = (e) => {
        const r = canvasRef.current.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - r.left, y: t.clientY - r.top };
      };

      return <canvas ref={canvasRef} width={320} height={180} className="sig-canvas w-full" 
        onTouchStart={(e)=>{e.preventDefault(); setDrawing(true); const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y);}}
        onTouchMove={(e)=>{e.preventDefault(); if(!drawing) return; const p=getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke();}}
        onTouchEnd={()=>{setDrawing(false); onSave(canvasRef.current.toDataURL());}}
      />;
    };

    function App() {
      const [view, setView] = useState('gate');
      const [user, setUser] = useState(null);
      const [agent, setAgent] = useState({ id: '801', name: '系統預選', icon: '🤖' });
      const [snap, setSnap] = useState(null);
      const videoRef = useRef(null);

      // --- 🎭 AI 自主換身分邏輯 ---
      const rotateAgent = () => {
        const surnames = ['陳', '林', '黃', '張', '李', '趙', '吳', '劉'];
        const roles = ['專員', '小姐', '先生', '助理'];
        const icons = ['👩‍💼', '👨‍💼', '👧', '👨'];
        const rIdx = Math.floor(Math.random() * surnames.length);
        const iIdx = Math.floor(Math.random() * icons.length);
        setAgent({
          id: Math.floor(800 + Math.random() * 200).toString(),
          name: surnames[rIdx] + roles[Math.floor(Math.random() * roles.length)],
          icon: icons[iIdx]
        });
      };

      useEffect(() => { rotateAgent(); }, []);

      const startCam = async () => {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        if(videoRef.current) videoRef.current.srcObject = s;
      };

      const captureReport = () => {
        const c = document.createElement('canvas');
        c.width = 600; c.height = 800;
        const ctx = c.getContext('2d');
        ctx.drawImage(videoRef.current, 0, 0, 600, 800);
        // 壓印 2026 行政水印
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 720, 600, 80);
        ctx.fillStyle = "#d4af37"; ctx.font = "bold 22px sans-serif";
        ctx.fillText(`行政確權編號: ${agent.id} | 時間: ${new Date().toLocaleString()}`, 30, 765);
        setSnap(c.toDataURL());
        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
      };

      if (view === 'gate') return (
        <div className="h-screen flex items-center justify-center p-8 bg-black">
          <div className="glass w-full max-w-sm p-12 rounded-[4rem] border-zinc-800 border text-center shadow-[0_0_50px_rgba(212,175,55,0.05)]">
            <h1 className="text-3xl font-black text-zinc-500 mb-10 italic tracking-widest">GGSOC_2026</h1>
            <input id="ph" placeholder="手機號碼" className="mb-4 text-center" />
            <button onClick={() => {setUser({name: '存證司機'}); setView('main');}} className="w-full py-5 bg-zinc-900 rounded-3xl font-black text-zinc-400 btn-active border border-white/5">進入存證系統</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen p-6 pb-32 max-w-md mx-auto">
          {/* Header：會計部權威 */}
          <div className="flex justify-between items-end mb-10">
            <div>
              <h2 className="text-2xl font-black italic tracking-tighter text-zinc-400">會計部_行政中樞</h2>
              <p className="text-[10px] text-amber-700 font-mono tracking-widest">STATUS: SYSTEM_COMMAND_ACTIVE</p>
            </div>
            <div className="status-badge">核准權：會計處</div>
          </div>

          {/* 萬事通 AI 自主身分顯示區 */}
          <div className="glass p-8 rounded-[3rem] border-amber-600/10 border mb-8 flex items-center gap-5 relative overflow-hidden">
             <div className="absolute top-0 right-0 p-4 opacity-5 text-6xl italic">{agent.icon}</div>
             <div className="w-16 h-16 bg-zinc-900 rounded-2xl flex items-center justify-center text-3xl shadow-inner">{agent.icon}</div>
             <div>
               <h4 className="text-lg font-black text-amber-600 italic">萬事通_{agent.name}</h4>
               <p className="text-[10px] text-zinc-600 font-mono uppercase">客服編號: {agent.id}</p>
             </div>
          </div>

          {/* 核心功能：拍照結算確權 */}
          <div className="space-y-6">
            {!snap ? (
              <div className="space-y-6">
                <div className="relative">
                  <video ref={videoRef} autoPlay playsInline className="camera-live" />
                  <div className="absolute top-4 left-4 bg-black/50 text-[8px] px-2 py-1 rounded text-zinc-500">LIVE_FEED</div>
                </div>
                <button onClick={()=>{startCam(); setTimeout(captureReport, 1000);}} className="w-full py-6 bg-zinc-900 rounded-[2.5rem] font-black text-amber-600 border border-amber-600/20 btn-active shadow-xl shadow-amber-900/10">📸 執行行政拍照確權</button>
              </div>
            ) : (
              <div className="space-y-6 animate-[fadeIn_0.5s]">
                <img src={snap} className="w-full rounded-[2.5rem] border border-zinc-800" />
                <div className="glass p-7 rounded-[2.5rem]">
                  <p className="text-[10px] text-zinc-600 mb-4 font-black italic uppercase">本人領取薪資與報表無誤簽章</p>
                  <SignaturePad onSave={()=>{}} />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <button onClick={()=>{alert('確權數據已封裝上傳會計部總帳。'); setView('gate'); setSnap(null);}} className="bg-emerald-900/20 text-emerald-500 py-6 rounded-3xl font-black btn-active border border-emerald-500/20">🟢 完成確權</button>
                  <button onClick={()=>setSnap(null)} className="bg-zinc-900 py-6 rounded-3xl font-black text-zinc-500 btn-active">重拍</button>
                </div>
              </div>
            )}
          </div>

          {/* 薪資精算公式顯示 (LaTeX 標註) */}
          <div className="mt-10 p-6 border-t border-zinc-900">
             <p className="text-[9px] text-zinc-700 font-mono leading-relaxed italic">
               * 薪資計算依循 2026 公式：<br/>
               $$Net = (Gross - Labor - Health) - \text{G2Health}(2.11\%)$$
               會計部保留最終數據校正權。
             </p>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
