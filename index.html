<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>在地物流 - 專業分流中控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #94a3b8; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; }
        .layer { display: none; position: fixed; inset: 0; background: #020617; z-index: 100; flex-direction: column; align-items: center; padding: 24px; overflow-y: auto; }
        .id-card { width: 100%; max-width: 500px; background: linear-gradient(165deg, #0f172a 0%, #1e293b 100%); border-radius: 2rem; padding: 30px; border: 1px solid #1e293b; margin-bottom: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .input-box { background: rgba(15, 23, 42, 0.9); border: 2px solid #334155; border-radius: 1rem; padding: 15px; width: 100%; color: #fff; outline: none; margin-bottom: 12px; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1rem; background: #0ea5e9; color: #020617; font-weight: 950; font-size: 18px; cursor: pointer; border: none; }
        .btn-outline { width: 100%; padding: 15px; border-radius: 1rem; border: 2px solid #334155; color: #94a3b8; font-weight: 700; margin-top: 10px; }
        .label-sky { font-size: 12px; color: #38bdf8; font-weight: 900; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .photo-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .photo-slot { background: #0f172a; border: 2px dashed #334155; border-radius: 12px; height: 90px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">在地物流</h1>
        <p class="text-sky-500 text-sm font-black tracking-[0.4em] mb-12 uppercase italic underline decoration-sky-600 decoration-4 underline-offset-8">物流專業人才評估系統</p>
        
        <div class="w-full max-w-[340px] space-y-4">
            <div class="bg-slate-900/80 p-6 rounded-[2.5rem] border border-slate-800 shadow-2xl">
                <input type="tel" id="login_phone" placeholder="手 機 號 碼" class="input-box text-center">
                <input type="password" id="login_pin" placeholder="PIN 安全密碼" class="input-box text-center">
                <button onclick="boot()" class="btn-prime">進入中控台</button>
            </div>

            <div class="pt-8 space-y-3">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mb-2">── 招募分流審核 ──</p>
                <button onclick="showLayer('interview-page')" class="btn-outline !border-sky-500/50 !text-sky-400">一、機車/貨車 資格評估測驗</button>
                <button onclick="showLayer('apply-page')" class="btn-outline">二、正式入職與證件補件</button>
            </div>
        </div>
    </div>

    <div id="interview-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-6 border-b-4 border-sky-500 pb-2 italic">分流資格評估</h2>
                
                <span class="label-sky">基本聯絡資訊</span>
                <input type="text" id="int_name" placeholder="您的姓名" class="input-box">
                <input type="tel" id="int_phone" placeholder="聯絡電話" class="input-box">
                
                <span class="label-sky">應徵車種 (影響面試題目)</span>
                <select id="int_vehicle_type" class="input-box bg-slate-900 text-white font-bold" onchange="toggleQ()">
                    <option value="機車">應徵：機車配送員</option>
                    <option value="貨車">應徵：貨車司機 (需職業駕照)</option>
                </select>

                <div id="truck_check" class="hidden mb-6 p-4 bg-orange-900/20 border border-orange-500/30 rounded-2xl">
                    <span class="label-sky !text-orange-400">貨車司機資格確認</span>
                    <select id="int_truck_lic" class="input-box bg-slate-950 text-white text-sm">
                        <option value="">您是否持有「職業小型車」以上駕照？</option>
                        <option value="有職業駕照">是，持有有效職業駕照</option>
                        <option value="無職業駕照">否，目前僅有普通駕照</option>
                    </select>
                </div>

                <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 my-6 shadow-inner">
                    <span id="q_title" class="label-sky !text-sky-400">機車配送模擬題：</span>
                    <p id="int_q_text" class="text-white text-sm font-bold leading-relaxed mb-4">
                       「若配送中途突發大雨，且您機車載貨量較多，請問您會如何確保包裹不淋濕且安全送達？」
                    </p>
                    <textarea id="int_answer" class="input-box h-36 !text-left text-sm mb-0 shadow-inner" placeholder="請詳細說明您的處理步驟..."></textarea>
                </div>
                
                <button onclick="submitInterview()" class="btn-prime">送出評估資料</button>
            </div>
        </div>
    </div>

    <div id="apply-page" class="layer">
        <div class="w-full max-w-[500px]">
            <div class="mb-4 text-slate-500 font-black cursor-pointer" onclick="hideAll()">← 返回首頁</div>
            <div class="id-card">
                <h2 class="text-3xl font-black text-white mb-8 border-b-4 border-orange-500 pb-2 italic">正式入職補件</h2>
                
                <span class="label-sky">證件與「職業駕照」拍照</span>
                <div class="photo-grid">
                    <div class="photo-slot" onclick="triggerCam('id_f')"><span id="t_id_f" class="text-[10px]">身分證正面</span><img id="p_id_f"></div>
                    <div class="photo-slot" onclick="triggerCam('id_b')"><span id="t_id_b" class="text-[10px]">身分證反面</span><img id="p_id_b"></div>
                    <div class="photo-slot" onclick="triggerCam('lic')"><span id="t_lic" class="text-[10px] !text-sky-400">職業駕照影本</span><img id="p_lic"></div>
                    <div class="photo-slot" onclick="triggerCam('car')"><span id="t_car" class="text-[10px]">營運車輛行照</span><img id="p_car"></div>
                    <input type="file" id="cam" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
                </div>
                <button onclick="submitApply()" class="btn-prime bg-orange-600">提交資料審核</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, serverTimestamp, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase 設定與前版相同 (略)
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let partners = [], currentImgField = '';

        // 題目切換邏輯
        window.toggleQ = () => {
            const type = document.getElementById('int_vehicle_type').value;
            const truckBox = document.getElementById('truck_check');
            const qTitle = document.getElementById('q_title');
            const qText = document.getElementById('int_q_text');

            if(type === '貨車') {
                truckBox.classList.remove('hidden');
                qTitle.innerText = "貨車駕駛專業題：";
                qTitle.style.color = "#f97316";
                qText.innerText = "「貨車載重與視線死角較多，若在巷弄配送時不慎擦撞路邊車輛，對方不在場，您的處理標準流程為何？」";
            } else {
                truckBox.classList.add('hidden');
                qTitle.innerText = "機車配送模擬題：";
                qTitle.style.color = "#38bdf8";
                qText.innerText = "「若配送中途突發大雨，且您機車載貨量較多，請問您會如何確保包裹不淋濕且安全送達？」";
            }
        };

        window.submitInterview = async () => {
            const name = document.getElementById('int_name').value;
            const type = document.getElementById('int_vehicle_type').value;
            const truckLic = document.getElementById('int_truck_lic').value;
            const ans = document.getElementById('int_answer').value;

            if(!name || !ans) return alert("請完整填寫評估內容。");
            
            let isRisk = false;
            if(type === '貨車' && truckLic === '無職業駕照') isRisk = true;

            const data = {
                name: name,
                v_type: type,
                has_pro_lic: truckLic,
                ai_response: ans,
                is_risk: isRisk,
                status: "interviewing",
                time: serverTimestamp()
            };
            await addDoc(collection(db, 'partners'), data);
            alert("評估資料已送出！"); location.reload();
        };

        // 後台審核顯示 (略，加入車種標記)
        // ...其餘邏輯與前版一致...
        window.showLayer = id => document.getElementById(id).style.display = 'flex';
        window.hideAll = () => { document.querySelectorAll('.layer').forEach(l => l.style.display='none'); };
    </script>
</body>
</html>
