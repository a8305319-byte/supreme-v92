<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlN1cHJlbmUtVjkyIiwKICAic2hvcnRfbmFtZSI6ICJTdXByZW1lIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwMjA2MTciLAogICJ0aGVtZV9jb2xvciI6ICIjMDIwNjE3IiwKICAiaWNvbnMiOiBbIHsgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yOTkxLzI5OTExMjcucmVuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9IF0KfQ==">
    <title>Supreme-V92 營運總部</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #f59e0b; --bg: #020617; }
        body { background-color: var(--bg); color: #f1f5f9; font-family: 'PingFang TC', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-supreme { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #000; font-weight: 950; border-radius: 12px; transition: 0.2s; }
        .btn-danger { background: #450a0a; color: #f87171; border: 1px solid #991b1b; border-radius: 12px; }
        .page-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.99); } to { opacity: 1; transform: scale(1); } }
        canvas { background: white; border-radius: 16px; touch-action: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 根據您的提供資訊進行配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
            authDomain: "supreme-v92.firebaseapp.com",
            projectId: "supreme-v92",
            storageBucket: "supreme-v92.firebasestorage.app",
            appId: "1:485530156296:web:6728c0ee08b98dedd800bd"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = 'supreme-v92';

        function App() {
            const [u, setU] = useState(null); 
            const [ps, setPs] = useState([]);
            const [layer, setLayer] = useState('gate'); 
            const [role, setRole] = useState(null); 
            const [toast, setToast] = useState("");
            const [broadcast, setBroadcast] = useState("營運系統穩定連線中");

            const showToast = (m) => { setToast(m); setTimeout(()=>setToast(""), 3000); };

            useEffect(() => {
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners')
                    .onSnapshot(snap => { 
                        setPs(snap.docs.map(d => ({ id: d.id, ...d.data() }))); 
                    });
                return () => unsub();
            }, []);

            return (
                <div className="min-h-screen relative">
                    <div className={`fixed left-1/2 -translate-x-1/2 z-[9999] transition-all duration-500 bg-amber-500 text-black px-8 py-3 rounded-full font-black shadow-2xl ${toast ? 'top-8 opacity-100' : '-top-20 opacity-0'}`}>{toast}</div>
                    
                    <div className="page-enter">
                        {layer === 'gate' && <Gate onLogin={(ph, pin) => {
                            const cp = ph.replace(/-/g, '');
                            if (cp === "0976017938" && pin === "8305319") { setRole('OWNER'); setLayer('admin'); return; }
                            if (cp === "0988128172" && pin === "0172") { setRole('EXECUTIVE'); setLayer('admin'); return; }
                            const t = ps.find(p => p.phone === cp && p.pin === pin);
                            if(t) { setU(t); setRole('DRIVER'); setLayer('driver'); } else alert("資訊錯誤，無法核准進入");
                        }} />}
                        
                        {layer === 'admin' && <AdminHub ps={ps} role={role} setLayer={setLayer} db={db} appId={appId} showToast={showToast} broadcast={broadcast} setBroadcast={setBroadcast} />}
                        {layer === 'driver' && <DriverHub u={u} setLayer={setLayer} db={db} appId={appId} showToast={showToast} />}
                    </div>
                </div>
            );
        }

        function Gate({ onLogin }) {
            const [ph, setPh] = useState(""); const [pin, setPin] = useState("");
            return (
                <div className="h-screen flex flex-col items-center justify-center p-6 bg-slate-950 text-center">
                    <h1 className="text-5xl font-black text-white italic mb-1">在地物流</h1>
                    <p className="text-amber-500 font-bold text-[10px] tracking-[0.5em] mb-12 uppercase">Supreme-V92 Command Hub</p>
                    <div className="w-full max-w-sm glass p-10 rounded-[3rem] border border-amber-500/20 shadow-2xl">
                        <input type="tel" className="w-full bg-slate-900 p-5 rounded-2xl mb-4 text-white font-bold outline-none focus:border-amber-500 border border-white/5 transition" placeholder="手機號碼" value={ph} onChange={e=>setPh(e.target.value)} />
                        <input type="password" title="pin" className="w-full bg-slate-900 p-5 rounded-2xl mb-8 text-amber-500 text-center text-3xl font-black tracking-widest outline-none focus:border-amber-500 border border-white/5" placeholder="••••" value={pin} onChange={e=>setPin(e.target.value)} />
                        <button onClick={()=>onLogin(ph, pin)} className="btn-supreme w-full py-5 text-xl">授權並登入</button>
                    </div>
                </div>
            );
        }

        function AdminHub({ ps, role, setLayer, db, appId, showToast, broadcast, setBroadcast }) {
            const [isAddMode, setIsAddMode] = useState(false);
            const [newP, setNewP] = useState({ name: "", phone: "", pin: "" });
            const isOwner = role === 'OWNER';

            // 💡 影子權限：會計登入時隱藏管理員，管理員登入則看見全部
            const displayList = useMemo(() => {
                return role === 'EXECUTIVE' ? ps.filter(p => p.phone !== "0976017938") : ps;
            }, [ps, role]);

            const handleDelete = async (id) => {
                if(confirm("⚠ 注意：即將永久刪除此營運帳號及所有數據。確定要執行？")) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(id).delete();
                    showToast("🗑 帳號已永久銷毀");
                }
            };

            const handleAdd = async () => {
                if(!newP.name || !newP.phone) return alert("請填寫姓名與手機");
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').add({
                    ...newP, total_del: 0, total_pkp: 0, salary_status: 'draft', bankAcc: ""
                });
                setIsAddMode(false);
                showToast("👤 成功錄入新夥伴");
            };

            return (
                <div className="p-6 lg:p-12 pb-32 max-w-7xl mx-auto page-enter">
                    <header className="flex justify-between items-end mb-12 border-b border-amber-500/10 pb-8">
                        <div>
                            <h2 className="text-3xl font-black italic text-white tracking-tighter">營運管理總部</h2>
                            <p className="text-amber-500 text-[10px] font-black tracking-[0.3em] mt-1 uppercase">
                                {isOwner ? "Owner: Core System" : "Executive: Global Operations"}
                            </p>
                        </div>
                        <button onClick={()=>setLayer('gate')} className="text-slate-600 font-bold text-xs underline uppercase">離線登出</button>
                    </header>

                    {/* 控制區：實體按鈕功能化 */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                        <div className="glass p-6 rounded-[2rem] border-l-4 border-amber-500">
                            <p className="text-slate-500 text-[9px] font-black uppercase mb-4">人員管理控制</p>
                            <button onClick={()=>setIsAddMode(true)} className="btn-supreme w-full py-4 text-xs font-black shadow-lg">➕ 新增夥伴帳號</button>
                        </div>
                        <div className="glass p-6 rounded-[2rem] border-l-4 border-sky-500">
                            <p className="text-slate-500 text-[9px] font-black uppercase mb-4">財務結算報表</p>
                            <button className="w-full py-4 bg-sky-600/10 text-sky-400 border border-sky-600/30 rounded-2xl font-black text-xs">📊 產出全球報表</button>
                        </div>
                        <div className="glass p-6 rounded-[2rem] border-l-4 border-emerald-500 text-center">
                            <p className="text-slate-500 text-[9px] font-black uppercase mb-2">本期預計支出</p>
                            <p className="text-3xl font-black text-white">${displayList.reduce((acc,p)=>acc+(p.total_del*15+p.total_pkp*10),0).toLocaleString()}</p>
                        </div>
                        <div className="glass p-6 rounded-[2rem] border-l-4 border-purple-500">
                            <p className="text-slate-500 text-[9px] font-black uppercase mb-4">系統公告管理</p>
                            <button onClick={()=>{const m=prompt("請輸入廣播內容："); if(m) setBroadcast(m)}} className="w-full py-4 bg-purple-600/10 text-purple-400 border border-purple-600/30 rounded-2xl font-black text-xs">📢 更新全站廣播</button>
                        </div>
                    </div>

                    {/* 公告條 */}
                    <div className="bg-slate-900/50 p-4 rounded-xl mb-12 flex items-center gap-3">
                        <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span></span>
                        <p className="text-xs text-slate-400 font-bold italic tracking-wide">{broadcast}</p>
                    </div>

                    {/* 管理名單 (CRUD 操作) */}
                    <div className="glass rounded-[3rem] overflow-hidden shadow-2xl">
                        <table className="w-full text-center">
                            <thead className="bg-slate-900/80 text-amber-500 text-[10px] font-black uppercase">
                                <tr><th className="p-6">管理對象</th><th>回報數據</th><th>估算薪資</th><th>控制行為</th></tr>
                            </thead>
                            <tbody>
                                {displayList.map(p => (
                                    <tr key={p.id} className="border-b border-white/5 hover:bg-white/5 transition">
                                        <td className="p-6 text-left pl-10">
                                            <p className="font-black text-white">{p.name}</p>
                                            <p className="text-[10px] text-slate-500 font-mono">{p.phone}</p>
                                        </td>
                                        <td className="p-6 font-black text-xs">
                                            <span className="text-sky-400">{p.total_del}</span> / <span className="text-orange-400">{p.total_pkp}</span>
                                        </td>
                                        <td className="p-6 font-black text-emerald-400">$ {(p.total_del*15+p.total_pkp*10).toLocaleString()}</td>
                                        <td className="p-6 space-x-2">
                                            <button className="px-4 py-2 bg-slate-800 text-white rounded-lg text-[10px] font-black">修改</button>
                                            <button onClick={()=>handleDelete(p.id)} className="px-4 py-2 btn-danger text-[10px] font-black uppercase tracking-tighter">永久刪除</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* 新增 Modal */}
                    {isAddMode && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-[10001] backdrop-blur-3xl animate-in zoom-in">
                            <div className="glass p-10 rounded-[4rem] w-full max-w-sm border border-amber-500/20 shadow-2xl">
                                <h3 className="text-2xl font-black text-white mb-8 italic">新增成員授權</h3>
                                <div className="space-y-4 mb-8">
                                    <input className="w-full bg-slate-900 p-4 rounded-xl text-white outline-none border border-white/5" placeholder="成員姓名" onChange={e=>setNewP({...newP, name:e.target.value})} />
                                    <input className="w-full bg-slate-900 p-4 rounded-xl text-white outline-none border border-white/5" placeholder="手機門號" onChange={e=>setNewP({...newP, phone:e.target.value})} />
                                    <input className="w-full bg-slate-900 p-4 rounded-xl text-amber-500 font-black outline-none border border-white/5" placeholder="設定 PIN (4-7位)" onChange={e=>setNewP({...newP, pin:e.target.value})} />
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setIsAddMode(false)} className="flex-1 text-slate-500 font-bold">取消</button>
                                    <button onClick={handleAdd} className="btn-supreme flex-[2] py-4">確認授權加入</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function DriverHub({ u, setLayer, db, appId, showToast }) {
            const [del, setDel] = useState(""); const [pkp, setPkp] = useState("");
            return (
                <div className="p-6 max-w-lg mx-auto page-enter pt-16">
                    <header className="flex justify-between items-center mb-10">
                        <h2 className="text-2xl font-black italic">工作台</h2>
                        <button onClick={()=>setLayer('gate')} className="text-slate-600 font-bold text-xs uppercase">登出</button>
                    </header>
                    <div className="glass p-10 rounded-[3rem] border border-amber-500/20 text-center mb-8">
                        <p className="text-slate-500 text-[10px] font-black uppercase mb-8 tracking-widest">今日回報數據</p>
                        <div className="grid grid-cols-2 gap-4 mb-8 text-center">
                            <div className="bg-slate-900 p-6 rounded-3xl"><p className="text-sky-400 text-[9px] font-bold mb-2 uppercase">正件</p><input type="number" className="bg-transparent text-white text-3xl font-black w-full text-center outline-none" placeholder="0" value={del} onChange={e=>setDel(e.target.value)} /></div>
                            <div className="bg-slate-900 p-6 rounded-3xl"><p className="text-orange-400 text-[9px] font-bold mb-2 uppercase">逆件</p><input type="number" className="bg-transparent text-white text-3xl font-black w-full text-center outline-none" placeholder="0" value={pkp} onChange={e=>setP(e.target.value)} /></div>
                        </div>
                        <button onClick={()=>{db.collection('artifacts').doc(appId).collection('public').doc('data').collection('partners').doc(u.id).update({total_del:Number(del), total_pkp:Number(pkp)}); showToast("🚀 數據已同步更新")}} className="btn-supreme w-full py-5 text-xl font-black">同步提交報單</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
