<script type="module">
    // 引入 Firebase 核心與資料庫模組 (使用 HTML 適用的 CDN 連結)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 你的專屬 Firebase 設定檔
    const firebaseConfig = {
      apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI",
      authDomain: "supreme-v92.firebaseapp.com",
      projectId: "supreme-v92",
      storageBucket: "supreme-v92.firebasestorage.app",
      messagingSenderId: "485530156296",
      appId: "1:485530156296:web:6728c0ee08b98dedd800bd",
      measurementId: "G-JF36CHXE9Z"
    };

    // 啟動 LOGI CORE 雲端引擎
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // 把資料庫功能綁定到全域視窗，這樣你原本按鈕的 onclick 才能抓到
    window.db = db;
    window.collection = collection;
    window.addDoc = addDoc;
    window.serverTimestamp = serverTimestamp;

    console.log("✅ LOGI CORE 雲端引擎 (supreme-v92) 啟動成功！");
  </script>

  <script>
    // 注意：這個函數要放在模組載入的下方
    async function doClockOut() {
      try {
        // 假設這是目前登入的司機資料
        const driverName = "夥伴 (測試帳號)"; 
        
        // 真正寫入你的 supreme-v92 資料庫
        await window.addDoc(window.collection(window.db, "ClockOutRecords"), {
          driver: driverName,
          status: "已下班結算",
          momoPackages: "系統帶入數值", 
          timestamp: window.serverTimestamp() // 雲端絕對時間，不怕手機時間調錯
        });

        // 成功後的畫面提示
        document.getElementById("clockOutModal").classList.add("hidden");
        showToast("🏁 結算成功！資料已同步至總控中心。");
        
      } catch (error) {
        console.error("寫入失敗:", error);
        showToast("❌ 連線異常，請檢查網路狀態");
      }
    }
  </script>
