<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 🍎 PWA 桌面 App 沈浸式標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="在地物流">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <title>在地物流 - 實時監控系統</title>
    
    <!-- 🚫 強制抗快取 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root { --accent: #0ea5e9; --bg-dark: #020617; }
        body { 
            background: radial-gradient(circle at 50% 0%, #0f172a 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: #94a3b8; font-family: "Inter", "Microsoft JhengHei", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        
        /* 🛡️ 徹底消除 iOS 藍色點點(文字選取框) */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        input, textarea, .selectable { -webkit-user-select: text; user-select: text; }

        .glass-panel { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .layer { display: none; position: fixed; inset: 0; z-index: 100; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .input-box { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 16px; width: 100%; color: #ffffff; outline: none; margin-bottom: 16px; font-size: 16px; text-align: center; }
        .btn-prime { width: 100%; padding: 18px; border-radius: 1.2rem; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #ffffff; font-weight: 800; font-size: 17px; cursor: pointer; border: none; box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4); }
        .btn-prime:active { transform: scale(0.96); }

        .admin-table-container { width: 100%; overflow-x: auto; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.8); max-height: 75vh; }
        .admin-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1300px; }
        .admin-table th { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(10px); color: #94a3b8; font-size: 11px; padding: 18px 10px; text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .admin-table td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; text-align: center; color: #e2e8f0; vertical-align: middle; }
        
        .ghost-input { background: transparent; border: 1px solid transparent; color: inherit; text-align: center; outline: none; transition: all 0.2s; border-radius: 0.5rem; }
        .ghost-input:focus { background: rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); }

        .loading-overlay { position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s ease; }
        .loader-ring { width: 60px; height: 60px; border: 4px solid rgba(14,165,233,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .custom-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(16px); z-index: 8000; display: none; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.3s ease-out; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(14, 165, 233, 0.95); color: white; padding: 16px 32px; border-radius: 99px; font-weight: 800; font-size: 15px; z-index: 10000; opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        #toast.show { top: 40px; opacity: 1; }

        /* 面試選項按鈕 */
        .option-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
        .option-card.selected { background: rgba(14, 165, 233, 0.2); border-color: var(--accent); color: white; }
        .option-card input { width: 22px; height: 22px; accent-color: var(--accent); flex-shrink: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="toast">資訊提示</div>

    <!-- 🌐 連線警告 -->
    <div id="offline-banner" class="hidden w-full bg-rose-600 text-white text-[11px] font-bold text-center py-2.5 fixed top-0 z-[6000] shadow-lg flex justify-center items-center gap-2">
        <span class="text-lg">⚠️</span> <span>雲端連線失敗！請依照教學發布 Firebase Rules 規則。</span>
    </div>

    <!-- 啟動動畫 -->
    <div id="loading-screen" class="loading-overlay">
        <div class="loader-ring"></div>
        <p class="mt-6 text-sky-400 font-black tracking-[0.4em] text-sm animate-pulse">SUPREME SYSTEM INITIALIZING...</p>
        <button onclick="window.forceEnter()" class="mt-12 text-slate-500 px-6 py-2 border border-slate-700 rounded-full text-xs">跳過並進入</button>
    </div>

    <!-- 刪除確認 -->
    <div id="delete-modal" class="custom-modal">
        <div class="glass-panel p-8 rounded-[2rem] max-w-sm w-full text-center relative shadow-2xl">
            <div class="text-rose-500 text-7xl mb-4">🗑️</div>
            <h3 class="text-white font-black text-2xl mb-4">確定永久刪除？</h3>
            <p class="text-slate-400 text-sm mb-8 leading-relaxed">此操作將從雲端移除該員所有件數與影像，司機端將立刻強制登出且無法復原。</p>
            <div class="flex gap-4">
                <button onclick="window.closeModal('delete-modal')" class="flex-1 py-4 rounded-xl bg-slate-800 text-slate-300 font-bold">取消</button>
                <button id="confirm_delete_btn" onclick="window.executeDelete()" class="flex-1 py-4 rounded-xl bg-rose-600 text-white font-black shadow-lg">確認刪除</button>
            </div>
        </div>
    </div>

    <!-- 人事詳細檔案 -->
    <div id="hr-detail-modal" class="custom-modal">
        <div class="glass-panel p-6 md:p-8 rounded-[2rem] max-w-xl w-full relative max-h-[90vh] overflow-y-auto">
            <button type="button" onclick="window.closeModal('hr-detail-modal')" class="absolute top-6 right-6 text-slate-400 text-4xl">&times;</button>
            <h3 class="text-white font-black text-2xl mb-8 flex items-center gap-3 border-b border-slate-700/50 pb-4 italic">📇 電子人事檔案</h3>
            <div id="hr_detail_content"></div>
            <button onclick="window.closeModal('hr-detail-modal')" class="w-full mt-8 py-4 rounded-xl bg-slate-800 text-white font-black">關閉檔案卡片</button>
        </div>
    </div>

    <!-- 登入頁 -->
    <div id="gate" class="min-h-screen flex flex-col items-center justify-center p-6 relative">
        <div class="mb-12 text-center relative z-10 pt-12">
            <h1 class="text-7xl font-black text-white italic tracking-tighter mb-2">在地物流</h1>
            <p class="text-sky-400 text-[10px] tracking-[0.5em] font-black bg-sky-900/30 border border-sky-500/30 px-4 py-1.5 rounded-full inline-block">CLOUD SYSTEM</p>
        </div>
        <div class="w-full max-w-[340px] space-y-4 relative z-10">
            <div class="glass-panel p-8 rounded-[2.5rem] shadow-2xl">
                <input type="tel" id="login_phone" placeholder="登入號碼" class="input-box !mb-4" maxlength="10">
                <input type="password" id="login_pin" placeholder="PIN 碼" class="input-box !mb-4" maxlength="4">
                <div class="flex items-center justify-center gap-2 pb-6">
                    <input type="checkbox" id="remember_me" class="w-4 h-4 accent-sky-500 rounded bg-slate-800">
                    <label for="remember_me" class="text-slate-400 text-sm font-bold cursor-pointer">記住我 (下次自動進入)</label>
                </div>
                <button type="button" id="login_btn" onclick="window.handleLogin()" class="btn-prime py-5 text-lg shadow-[0_15px_30px_-5px_rgba(14,165,233,0.5)]">安全登入系統</button>
            </div>
            <div class="space-y-3 pt-4">
                <button onclick="window.showLayer('onboarding')" class="w-full py-4 rounded-2xl border border-sky-500/30 text-sky-400 font-black text-sm bg-sky-900/20 backdrop-blur-md">📋 夥伴職能評估</button>
                <button onclick="window.showLayer('profile-gate')" class="w-full py-4 rounded-2xl border border-orange-500/30 text-orange-400 font-black text-sm bg-orange-900/20 backdrop-blur-md">📁 企業人事建檔</button>
            </div>
        </div>
    </div>

    <!-- 管理端 -->
    <div id="admin-panel" class="layer !px-4 lg:!px-8 !pt-6">
        <div class="w-full max-w-[1500px]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white font-black text-3xl italic tracking-tighter drop-shadow-md">Admin Console</h2>
                <button onclick="window.location.reload(true)" class="bg-slate-800 text-sky-400 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700">🔄 雲端同步</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8 text-center">
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-sky-500/50"><p class="text-slate-400 text-[10px] mb-1 font-black">DELIVERY</p><p class="text-4xl font-black text-sky-400" id="dash_del">0</p></div>
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-orange-500/50"><p class="text-slate-400 text-[10px] mb-1 font-black">RETURNS</p><p class="text-4xl font-black text-orange-400" id="dash_rev">0</p></div>
                <div class="glass-panel p-6 rounded-3xl border-t-2 border-t-emerald-500/50"><p class="text-slate-400 text-[10px] mb-1 font-black">PAYOUT</p><p class="text-4xl font-black text-emerald-400" id="dash_net">$0</p></div>
            </div>
            <div class="flex flex-wrap items-center justify-between glass-panel p-4 rounded-2xl gap-4 shadow-inner mb-6">
                <button onclick="window.toggleQuickAdd(true)" class="bg-sky-600 text-white px-5 py-3 rounded-xl text-xs font-black shadow-lg">➕ 快速新增司機</button>
                <div class="flex items-center gap-3"><span class="text-slate-500">🔍</span><input type="text" id="admin_search" placeholder="搜尋姓名..." onkeyup="window.renderAdmin()" class="bg-transparent border-none outline-none text-white text-sm w-32 font-bold selectable"></div>
                <button onclick="window.handleLogout()" class="text-rose-400 text-sm font-black underline">🔒 安全登出</button>
            </div>
            <div class="admin-table-container shadow-2xl border border-slate-700/50"><table class="admin-table"><thead><tr><th class="w-24">狀態</th><th class="text-left w-64">夥伴 & 累積件數</th><th>單價</th><th>勞健保</th><th>加扣</th><th>預計淨額</th><th>操作</th></tr></thead><tbody id="admin-list"></tbody></table></div>
        </div>
    </div>

    <!-- 司機工作台 -->
    <div id="partner-hub" class="layer !px-4">
        <div class="w-full max-w-[480px] space-y-6 mt-4">
            <div class="flex justify-between items-center mb-2 px-2">
                <h2 id="hub_title" class="text-3xl font-black text-white italic drop-shadow-md">夥伴工作台</h2>
                <button onclick="window.location.reload(true)" class="text-sky-400 bg-slate-800 border border-slate-700 p-2.5 rounded-xl flex shadow-lg">🔄</button>
            </div>
            
            <div class="glass-panel p-6 sm:p-8 rounded-[2.5rem]">
                <div class="mb-6 bg-slate-900/60 p-5 rounded-3xl border border-slate-700/50 shadow-inner">
                    <span class="text-[11px] text-slate-400 font-black mb-4 flex items-center gap-2">今日出勤狀態</span>
                    <div class="flex gap-2.5">
                        <button onclick="window.updateMyStatus('normal')" id="btn-n" class="flex-1 py-3.5 rounded-xl text-xs font-black border bg-slate-800 border-slate-700 text-slate-500">🟢 正常</button>
                        <button onclick="window.triggerStatusReason('leave')" id="btn-l" class="flex-1 py-3.5 rounded-xl text-xs font-black border bg-slate-800 border-slate-700 text-slate-500">🔴 請假</button>
                        <button onclick="window.triggerStatusReason('issue')" id="btn-i" class="flex-1 py-3.5 rounded-xl text-xs font-black border bg-slate-800 border-slate-700 text-slate-500">🟡 異常</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-5">
                    <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800 shadow-inner text-center"><p class="text-[10px] text-sky-500 font-black mb-2 uppercase">今日正件</p><input type="number" id="rep_del" placeholder="0" class="ghost-input w-full text-4xl font-black text-white p-1 selectable"></div>
                    <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800 shadow-inner text-center"><p class="text-[10px] text-orange-500 font-black mb-2 uppercase">今日逆件</p><input type="number" id="rep_rev" placeholder="0" class="ghost-input w-full text-4xl font-black text-white p-1 selectable"></div>
                </div>
                
                <button type="button" id="rep_submit_btn" onclick="window.handleSubmitReport()" class="btn-prime py-5 text-xl font-black shadow-xl">🚀 提交配送數據</button>
                
                <!-- 實時薪資跳動區 -->
                <div id="hub-payslip-area" class="mt-8"></div>
                
                <button onclick="window.handleLogout()" class="mt-10 text-rose-500 text-sm font-black block w-full text-center hover:text-white transition">🔒 安全登出系統</button>
            </div>
        </div>
    </div>

    <!-- 腳本區：同步引擎 -->
    <script>
        const FB_CONFIG = { apiKey: "AIzaSyDfasGmYqUso1SajNSs71ZjNf9R343QViI", authDomain: "supreme-v92.firebaseapp.com", projectId: "supreme-v92", storageBucket: "supreme-v92.firebasestorage.app", messagingSenderId: "485530156296", appId: "1:485530156296:web:6728c0ee08b98dedd800bd" };

        window.showToast = (m, e = false) => { const t = document.getElementById('toast'); t.innerText = m; t.style.background = e ? 'rgba(225, 29, 72, 0.95)' : 'rgba(14, 165, 233, 0.95)'; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500); };
        window.hideLoading = () => { const l = document.getElementById('loading-screen'); if(l) l.style.display = 'none'; };
        window.forceEnter = () => { window.hideLoading(); window.showLayer('gate'); };
        window.showLayer = (id) => { document.querySelectorAll('.layer, #gate').forEach(el => el.style.display = 'none'); const target = document.getElementById(id); if(target) target.style.display = 'flex'; window.scrollTo(0,0); };
        window.openModal = (id) => { document.getElementById(id).style.display = 'flex'; };
        window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
        window.triggerFile = (id) => document.getElementById(id).click();
        
        window.pickOption = (q, v) => {
            const block = document.querySelector(`.q-block[data-q="${q}"]`);
            block.querySelectorAll('.option-card').forEach(b => b.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById(`ans_${q}`).value = v;
        };

        setTimeout(() => { if (document.getElementById('loading-screen').style.display !== 'none') window.forceEnter(); }, 5000);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let app, db, auth, partnersCol, isOnline = false, driverUnsubscribe = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'logistics-live-v300';
        
        try {
            app = initializeApp(FB_CONFIG); db = getFirestore(app); auth = getAuth(app);
            partnersCol = collection(db, 'artifacts', appId, 'public', 'data', 'partners');
            isOnline = true;
        } catch (e) { document.getElementById('offline-banner').classList.remove('hidden'); }

        let partners = [], sessionUser = null, deleteTargetId = null;

        // 登入邏輯：優化非阻塞，防止記住我卡死
        window.handleLogin = async () => {
            const ph = document.getElementById('login_phone').value.trim(); const pi = document.getElementById('login_pin').value.trim();
            const rem = document.getElementById('remember_me').checked;
            
            if((ph === "0976017938" && pi === "0531") || (ph === "0988128172" && pi === "0172")) { 
                if (rem && isOnline && auth?.currentUser) setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'session'), { phone: ph, pin: pi }).catch(e=>{});
                window.showLayer('admin-panel'); return; 
            }
            const p = partners.find(x => x.phone === ph && x.pin === pi);
            if(!p) return window.showToast("帳密錯誤", true);
            if(p.status !== 'approved') return window.showToast("司機審核中", true);

            if (rem && isOnline && auth?.currentUser) setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'session'), { phone: ph, pin: pi }).catch(e=>{});
            sessionUser = p; initDriverLiveSync(p.id); window.showLayer('partner-hub');
        };

        // 核心：毫秒級同步引擎 (針對單一司機)
        const initDriverLiveSync = (id) => {
            if (driverUnsubscribe) driverUnsubscribe();
            driverUnsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'partners', id), (docSnap) => {
                if (!docSnap.exists()) {
                    window.showToast("您的帳號已被管理員移除", true);
                    window.handleLogout(); return;
                }
                const data = docSnap.data();
                sessionUser = { id: docSnap.id, ...data };
                document.getElementById('hub_title').innerText = `夥伴 ${data.name}`;
                renderPartnerLiveStats(data);
            }, (error) => { window.handleLogout(); });
        };

        // 司機薪資實時跳動渲染
        const renderPartnerLiveStats = (p) => {
            const dp = p.custom_del || 15; const d_t = (p.total_del || 0) * dp;
            const area = document.getElementById('hub-payslip-area');
            area.innerHTML = `
                <div class="p-6 bg-gradient-to-br from-slate-800 to-slate-900 rounded-[2rem] border border-sky-500/40 shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-center mb-5 border-b border-slate-700/50 pb-4"><span class="text-sky-400 font-black text-sm">📥 雲端實時計費</span><span class="text-[10px] text-slate-500 font-bold">LIVE SYNC</span></div>
                    <div class="bg-slate-950/70 p-5 rounded-2xl mb-5 text-xs text-slate-300 space-y-3 shadow-inner">
                        <div class="flex justify-between"><span>累積正件 (${p.total_del||0}件)</span><span class="text-white font-black">$${d_t.toLocaleString()}</span></div>
                        <div class="flex justify-between"><span>目前設點單價</span><span class="text-sky-400 font-black">$${dp} /件</span></div>
                        <div class="flex justify-between text-emerald-400 pt-1 border-t border-slate-800 mt-1"><span>其他補貼/加項</span><span>+$${p.custom_adj||0}</span></div>
                    </div>
                    <div class="text-center my-4"><p class="text-[10px] text-slate-500 font-black tracking-widest mb-1">本期實發淨額預估</p><p class="text-5xl font-black text-white tracking-tighter drop-shadow-xl text-sky-400">$${(d_t + (p.custom_adj||0)).toLocaleString()}</p></div>
                </div>`;
        };

        window.handleLogout = async () => { 
            if (driverUnsubscribe) driverUnsubscribe();
            sessionUser = null; 
            if (auth?.currentUser && isOnline) try { await deleteDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'settings', 'session')); } catch(e){}
            window.showLayer('gate'); window.showToast('安全登出並停止同步'); 
        };

        window.triggerDelete = (id) => { deleteTargetId = id; window.openModal('delete-modal'); };
        window.executeDelete = async () => {
            if(!deleteTargetId || !isOnline) return;
            try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partners', deleteTargetId)); window.showToast("✅ 已成功移除人員並斷開其連線"); window.closeModal('delete-modal'); } catch(e) { window.showToast("刪除失敗", true); }
        };

        window.updatePartnerField = async (id, field, value) => { try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partners', id), { [field]: value }); } catch (e) {} };

        window.renderAdmin = () => {
            const tbody = document.getElementById('admin-list'); const query = document.getElementById('admin_search').value.trim().toLowerCase();
            let filtered = partners.filter(p => p.name?.toLowerCase().includes(query) || p.phone?.includes(query));
            let sD = 0, sN = 0; if(!filtered.length){ tbody.innerHTML = '<tr><td colspan="7" class="py-32 text-center text-slate-700">查無資料</td></tr>'; return; }
            let html = '';
            filtered.forEach(p => {
                const dp = p.custom_del || 15; const d_t = (p.total_del || 0) * dp; sD += p.total_del||0; sN += d_t;
                html += `<tr class="border-b border-slate-800 hover:bg-white/5 transition">
                    <td><span class="text-2xl">${p.work_status==='leave'?'🔴':'🟢'}</span></td>
                    <td class="text-left pl-5 border-l border-slate-800/50"><span class="font-black text-white text-base">${p.name}</span><div class="mt-1 bg-slate-900/50 p-1.5 rounded border border-slate-800 w-max"><span class="text-[10px] text-slate-500">累積正件 </span><input type="number" class="ghost-input w-12 text-sky-400 font-black selectable" value="${p.total_del||0}" onchange="window.updatePartnerField('${p.id}', 'total_del', Number(this.value))"></div></td>
                    <td><input type="number" class="w-14 bg-slate-900 border border-slate-700 text-[10px] p-1.5 text-sky-400 font-black rounded-lg text-center" value="${dp}" onchange="window.updatePartnerField('${p.id}','custom_del',Number(this.value))"></td>
                    <td>-</td><td>${p.custom_adj||0}</td>
                    <td class="text-sky-400 font-black text-xl tracking-tighter">$${d_t.toLocaleString()}</td>
                    <td><div class="flex gap-2 justify-center"><button onclick="window.triggerDelete('${p.id}')" class="text-rose-500 bg-rose-900/30 p-3 rounded-2xl border border-rose-800/50 shadow-lg">🗑️</button></div></td>
                </tr>`;
            });
            tbody.innerHTML = html; document.getElementById('dash_del').innerText = sD; document.getElementById('dash_net').innerText = "$"+sN.toLocaleString();
        };

        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth);
                onAuthStateChanged(auth, async (u) => {
                    if(u){
                        try { const ss = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'settings', 'session')); if(ss.exists()){ const d = ss.data(); document.getElementById('login_phone').value = d.phone; document.getElementById('login_pin').value = d.pin; document.getElementById('remember_me').checked = true; } } catch(e){}
                        onSnapshot(partnersCol, (s) => { partners = s.docs.map(d => ({id: d.id, ...d.data()})); if(document.getElementById('admin-panel').style.display === 'flex') window.renderAdmin(); window.hideLoading(); });
                    }
                });
            } catch(e) { window.forceEnter(); }
        };
        init();
    </script>
</body>
</html>
