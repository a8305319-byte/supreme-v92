// 🛡️ 影像防偽核心 - 數位網格壓印技術
// ==========================================
const processSecureImage = (file, callback, onWarning) => {
  if (!file) return;
  const timeDiff = Date.now() - file.lastModified;
  if (timeDiff > 5 * 60 * 1000 && onWarning) onWarning();
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas'); const M = 1000;
      let w=img.width, h=img.height; if(w>M){ h=Math.round(h*M/w); w=M; }
      canvas.width=w; canvas.height=h; const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // 壓印 30x30 防修圖數位網格
      ctx.strokeStyle = "rgba(255, 255, 255, 0.04)"; ctx.lineWidth = 1;
      for(let x=0; x<w; x+=30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
      for(let y=0; y<h; y+=30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
      // 壓印不可抹除之身份足跡
      ctx.font = "bold 18px monospace"; ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; ctx.shadowColor = "black"; ctx.shadowBlur = 4;
      ctx.fillText(`[GGSOC AUTH] ${new Date().toLocaleString()} UID:${auth.currentUser?.uid?.slice(-6)}`, 20, h - 30);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    }; img.src = e.target.result;
  }; reader.readAsDataURL(file);
};

const SignaturePad = ({ onSign }) => {
  const canvasRef = useRef(null); const [isDrawing, setIsDrawing] = useState(false);
  const getPos = (e) => { const rect = canvasRef.current.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX; const cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: cx - rect.left, y: cy - rect.top }; };
  const start = (e) => { setIsDrawing(true); const ctx = canvasRef.current.getContext('2d'); const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const draw = (e) => { if(!isDrawing) return; const ctx = canvasRef.current.getContext('2d'); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  useEffect(() => { if(canvasRef.current){ const ctx = canvasRef.current.getContext('2d'); ctx.lineWidth = 3; ctx.lineCap='round'; ctx.strokeStyle='#fff'; } }, []);
  return (
    <div className="w-full">
      <div className="bg-slate-950 border border-white/20 rounded-2xl overflow-hidden shadow-inner"><canvas ref={canvasRef} width={400} height={150} className="w-full h-[150px] touch-none cursor-crosshair" onMouseDown={start} onMouseMove={draw} onMouseUp={()=>{setIsDrawing(false); onSign(canvasRef.current.toDataURL());}} onTouchStart={start} onTouchMove={draw} onTouchEnd={()=>{setIsDrawing(false); onSign(canvasRef.current.toDataURL());}} /></div>
      <button onClick={()=>{const ctx=canvasRef.current.getContext('2d'); ctx.clearRect(0,0,400,150); onSign(null);}} className="w-full py-2 text-[10px] text-slate-500 font-black tracking-widest uppercase">重設簽名</button>
    </div>
  );
};

function AdminHub({ authRole, partners, onLogout, updateField, setModalType, setSelectedPartner, showSensitive, setShowSensitive, sq, setSq, setPreviewImg, setShowHistoryFor, db, appId, globalSettings, announcement, setChatTarget, setShowLeave, setLayer }) {
  const [adminTab, setAdminTab] = useState('formal'); 
  // 🚷 老闆隱身核心：會計端看到的列表完全排除老闆號碼
  const visiblePartners = useMemo(() => authRole === 'admin' ? partners.filter(p => p.phone !== '0976017938') : partners, [partners, authRole]);
  const formalPartners = useMemo(() => visiblePartners.filter(p => (p.status === 'approved' || p.status === 'frozen') && (p.name?.toLowerCase().includes(sq.toLowerCase()) || p.phone?.includes(sq))), [visiblePartners, sq]);
  const pendingPartners = useMemo(() => visiblePartners.filter(p => p.status === 'pending' && (p.name?.toLowerCase().includes(sq.toLowerCase()) || p.phone?.includes(sq))), [visiblePartners, sq]);
  const displayList = adminTab === 'formal' ? formalPartners : pendingPartners;
  const totals = formalPartners.reduce((acc, p) => { const net = (p.total_del*(p.custom_del_price||15))+(p.total_pkp*(p.custom_pkp_price||10))+(p.custom_adj||0)-(p.labor_fee||0)-(p.health_fee||0); const hasR = p.last_report?.date===new Date().toLocaleDateString('en-CA'); return {net:acc.net+net,cod:acc.cod+(hasR?p.last_report.cod_amount||0:0)}; }, {net:0,cod:0});

  return (
    <div className="p-4 md:p-10 max-w-full mx-auto bg-[#020617] min-h-screen font-black relative animate-[fadeIn_0.5s_ease-out] font-black">
      <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6 leading-none">
         <div><h2 className="text-white text-4xl md:text-5xl italic tracking-tighter uppercase mb-2 font-black">營運指揮中心</h2><span className={`inline-block text-xs md:text-sm px-4 py-1 rounded-xl border ${authRole==='super_admin'?'text-amber-500 border-amber-500/30 bg-amber-900/30 shadow-xl':'text-fuchsia-400 border-fuchsia-500/30 bg-fuchsia-900/30 shadow-xl'}`}>{authRole==='super_admin'?'👑 總裁管理':'👑 營運總部'}</span></div>
         <div className="flex flex-wrap gap-2 w-full xl:w-auto font-black font-black font-black">
            {authRole==='super_admin' && <button onClick={()=>setLayer('driver')} className="flex-1 xl:flex-none bg-amber-500 text-black px-4 py-3 rounded-xl text-xs font-black btn-gold-glow flex items-center justify-center gap-1"><Package size={16}/> 報帳模式</button>}
            <button onClick={async() => { if(!window.confirm("發布薪資領取通知？司機端將收到確權視窗。")) return; for(const p of formalPartners) { const net = (p.total_del*(p.custom_del_price||15))+(p.total_pkp*(p.custom_pkp_price||10))+(p.custom_adj||0)-(p.labor_fee||0)-(p.health_fee||0); await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id), { salary_status: 'pending_sign', salary_record: { net, period: new Date().toLocaleDateString('zh-TW'), timestamp: Date.now() } }); } showToast("✅ 已同步推播"); }} className="flex-1 xl:flex-none bg-emerald-600 px-4 py-3 rounded-xl text-xs active:scale-95 shadow-lg flex items-center justify-center gap-1 font-black"><Banknote size={16} /> 發布薪資</button>
            <button onClick={()=>setModalType('tools')} className="flex-1 xl:flex-none bg-blue-600 px-4 py-3 rounded-xl text-xs active:scale-95 shadow-xl font-black"><Settings size={16} /> 工具箱</button>
            <button onClick={()=>setShowLeave(true)} className="flex-1 xl:flex-none bg-indigo-600 px-4 py-3 rounded-xl text-xs active:scale-95 shadow-xl font-black font-black"><Calendar size={16} /> 假勤</button>
            <button onClick={onLogout} className="w-full xl:w-auto bg-slate-800 text-rose-500 px-6 py-3 rounded-xl text-xs border border-rose-500/20 font-black">登出</button>
         </div>
      </div>
      
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-8 font-black">
         <div className="bg-slate-900/60 p-6 rounded-[2rem] border-t-4 border-t-amber-500/50 shadow-2xl flex flex-col justify-center font-black"><p className="text-slate-500 text-[10px] uppercase font-black tracking-widest font-black font-black">今日 C.O.D 總額</p><p className="text-2xl md:text-4xl text-amber-400 font-black italic font-black font-black font-black">${totals.cod.toLocaleString()}</p></div>
         <div className="bg-slate-900/60 p-6 rounded-[2rem] border-t-4 border-t-blue-500/50 shadow-2xl flex flex-col justify-center font-black"><p className="text-slate-500 text-[10px] uppercase font-black font-black font-black">現役人員數</p><p className="text-2xl md:text-4xl text-blue-400 font-black italic font-black font-black font-black">{formalPartners.length}</p></div>
         <button onClick={()=>showToast("✨ AI 正在背景監視數據安全性", false)} className="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-[2rem] shadow-2xl active:scale-95 flex flex-col items-center justify-center text-white col-span-2 lg:col-span-1 font-black"><Bot size={32}/><p className="text-lg font-black uppercase font-black italic">雲端智慧引擎</p></button>
      </div>

      <div className="bg-slate-900/60 p-5 rounded-[2rem] mb-8 flex flex-col border border-white/5 shadow-xl font-black gap-4 backdrop-blur-md">
         <div className="flex gap-2"><button onClick={()=>setAdminTab('formal')} className={`flex-1 py-4 rounded-xl transition-all font-black font-black ${adminTab==='formal'?'bg-blue-600 text-white shadow-lg shadow-blue-500/20':'bg-slate-800/50 text-slate-500'}`}>現役夥伴</button><button onClick={()=>setAdminTab('pending')} className={`flex-1 py-4 rounded-xl transition-all font-black ${adminTab==='pending'?'bg-orange-600 text-white shadow-lg font-black font-black':'bg-slate-800/50 text-slate-500 relative'}`}>待審核 {pendingPartners.length > 0 && <span className="absolute -top-1 -right-1 bg-rose-500 text-[9px] w-5 h-5 flex items-center justify-center rounded-full animate-bounce shadow-lg">{pendingPartners.length}</span>}</button></div>
         <div className="flex items-center gap-4"><div className="flex-1 flex items-center gap-4 bg-black/40 p-4 rounded-2xl w-full shadow-inner border border-white/5 font-black"><Search size={24} className="text-blue-500" /><input placeholder="搜尋姓名或手機..." className="bg-transparent border-none outline-none text-white text-lg w-full font-black placeholder:text-slate-800" value={sq} onChange={e=>setSq(e.target.value)} /></div><button onClick={()=>{const ns=!showSensitive.global; setShowSensitive({global:ns, ...visiblePartners.reduce((a,p)=>({...a,[p.id]:ns}),{})});}} className="w-full md:w-auto bg-slate-800 text-amber-400 rounded-xl px-10 py-4 text-xs font-black border border-white/10 active:scale-95 shadow-inner font-black">敏感：{showSensitive.global ? 'OFF' : 'ON'}</button></div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pb-24 font-black">
        {displayList.map(p => { 
           const p_net = (p.total_del*(p.custom_del_price||15))+(p.total_pkp*(p.custom_pkp_price||10))+(p.custom_adj||0)-(p.labor_fee||0)-(p.health_fee||0); 
           return (
             <div key={p.id} className={`bg-slate-900/80 p-5 rounded-[1.5rem] border shadow-2xl relative transition-all ${p.salary_status === 'disputed' ? 'status-alert-dispute' : 'border-white/5'}`}>
               <div className="absolute top-5 right-5 flex gap-2">
                 {p.salary_status === 'disputed' && <span className="bg-rose-600 text-white text-[8px] px-2 py-1 rounded font-black animate-pulse shadow-lg font-black">爭議</span>}
                 {p.salary_status === 'confirmed' && <span className="bg-emerald-600 text-white text-[8px] px-2 py-1 rounded font-black shadow-lg font-black font-black">簽訖</span>}
                 <button onClick={() => setChatTarget(p)} className="bg-blue-600/30 text-blue-400 p-2 rounded-lg border border-blue-500/20 active:scale-90 font-black"><MessageSquare size={16}/></button>
               </div>
               <div className="mb-4 border-b border-white/5 pb-3 font-black"><h4 className="text-xl text-white italic font-black font-black">{p.name}</h4><p className="text-[10px] text-slate-500 tracking-widest font-black font-black">{!showSensitive[p.id] ? p.phone.replace(/(\d{4})\d{3}(\d{3})/, "$1***$2") : p.phone}</p>
                 {p.salary_status === 'disputed' && <div className="mt-3 p-3 bg-rose-950/40 rounded-xl border border-rose-500/30 text-[10px] text-rose-400 font-black font-black italic">退回理由：{p.salary_dispute_reason}</div>}
               </div>
               <div className="grid grid-cols-2 gap-2 mb-4 font-black"><div className="bg-black/30 p-2 rounded-lg text-center shadow-inner font-black font-black font-black"><p className="text-[9px] text-slate-500">預計實領</p><p className="text-lg font-black text-white italic font-black font-black">${p_net.toLocaleString()}</p></div><div className="bg-black/30 p-2 rounded-lg text-center flex flex-col justify-center shadow-inner font-black font-black font-black"><p className="text-[9px] text-slate-500 font-black">電子條</p><p className="text-[10px] font-black text-blue-400 font-black">{p.apply_payslip ? '已申請' : '未要求'}</p></div></div>
               <div className="flex justify-between items-center pt-2 border-t border-white/5 font-black"><button onClick={()=>setShowHistoryFor(p)} className="bg-indigo-900/30 p-2 rounded-lg text-indigo-400 active:scale-90 font-black font-black"><HistoryLog size={18}/></button><button onClick={()=>{setSelectedPartner(p); setModalType('detail');}} className="bg-blue-600/20 p-2 px-6 rounded-lg text-[10px] text-blue-400 border border-blue-500/30 active:scale-90 font-black font-black">櫥窗/核對</button></div>
             </div>
           );
        })}
      </div>
    </div>
  );
}

// ==========================================
// 🚐 司機端工作站 (DriverHub)
// ==========================================

function DriverHub({ currentPartner, onLogout, updateField, globalSettings, authRole, db, appId, setChatTarget, setShowLeave, setLayer }) {
  const [del,setDel]=useState(""); const [pkp,setPkp]=useState(""); const [cod,setCod]=useState(""); 
  const [pData,setPData]=useState(null); const [sData,setSData]=useState(null); const [cRData,setCRData]=useState(null); 
  const [isSubmitting, setIsSubmitting]=useState(false); 
  const [showHistory, setShowHistory] = useState(null); 
  const [showProfile, setShowProfile] = useState(false);
  const [showSalaryConfirm, setShowSalaryConfirm] = useState(false);
  const p_net = (currentPartner?.total_del*(currentPartner?.custom_del_price||15))+(currentPartner?.total_pkp*(currentPartner?.custom_pkp_price||10))+(currentPartner?.custom_adj||0)-(currentPartner?.labor_fee||0)-(currentPartner?.health_fee||0);

  const submit=async ()=>{ 
    if(globalSettings?.systemLocked&&authRole!=='super_admin') return showToast("⚠️ 伺服器鎖定中",true); 
    const nd=parseInt(del,10)||0, np=parseInt(pkp,10)||0, nc=parseInt(cod,10)||0;
    if(!pData||!sData) return showToast("⚠️ 回單照片與數位簽名為必填",true);
    if(!window.confirm(`確認今日數據？\n📦 配送：${nd} | 逆收：${np} | COD：$${nc}`)) return;
    setIsSubmitting(true);
    try {
      const h = { date: new Date().toLocaleDateString('zh-TW'), time: new Date().toLocaleTimeString('zh-TW',{hour12:false}), del:nd, pkp:np, cod:nc };
      const nextH = [...(currentPartner.history||[]), h].slice(-31);
      await updateField(currentPartner.id,'total_del',(currentPartner.total_del||0)+nd); 
      await updateField(currentPartner.id,'total_pkp',(currentPartner.total_pkp||0)+np); 
      await updateField(currentPartner.id,'history', nextH); 
      await updateField(currentPartner.id,'last_report',{date:new Date().toLocaleDateString('en-CA'),photo:pData,signature:sData,cod_amount:nc,cod_receipt:cRData}); 
      setDel("");setPkp("");setCod("");setPData(null);setSData(null);setCRData(null); showToast("✅ 報帳加密傳送完成"); 
    } catch (e) { showToast("❌ 傳送失敗", true); }
    setIsSubmitting(false);
  };

  if(!currentPartner) return <div className="h-screen bg-[#020617] flex items-center justify-center font-black animate-pulse">數據載入中...</div>;

  return (
    <div className="min-h-screen bg-[#020617] flex flex-col items-center justify-start p-4 pb-24 font-black animate-[fadeIn_0.5s_ease-out] font-black font-black">
      <div className="w-full max-w-[500px] mb-6 flex justify-between items-end">
        <div className="flex flex-col">
           {authRole==='super_admin' && <button onClick={()=>setLayer('admin')} className="bg-amber-500/20 text-amber-500 border border-amber-500/30 px-3 py-1 rounded-full text-[10px] w-fit mb-2 active:scale-95 animate-pulse font-black font-black">🏛️ 返回中心</button>}
           <h2 className="text-3xl text-white italic tracking-tighter uppercase mb-1 font-black">在地物流</h2>
           <p className="text-blue-400 text-[10px] tracking-widest font-black">{currentPartner.name} 專屬工作台</p>
        </div>
        <div className="flex gap-2">
           <button onClick={()=>setChatTarget(currentPartner)} className="bg-blue-600 text-white p-3 rounded-2xl active:scale-95 shadow-xl font-black"><Support size={18} /></button>
           <button onClick={()=>setShowLeave(true)} className="bg-indigo-600 text-white p-3 rounded-2xl active:scale-95 shadow-xl font-black"><Calendar size={18} /></button>
           <button onClick={()=>setShowProfile(true)} className="bg-slate-800 border border-white/10 text-white p-3 rounded-2xl active:scale-95 shadow-xl font-black"><Settings size={18} /></button>
           <button onClick={()=>setShowHistory(currentPartner)} className="bg-slate-800 border border-white/10 text-white p-3 rounded-2xl active:scale-95 flex items-center gap-2 font-black font-black"><HistoryLog size={18} /> <span className="text-[10px]">紀錄</span></button>
        </div>
      </div>

      {currentPartner.salary_status === 'pending_sign' && (
        <div className="w-full max-w-[500px] mb-6 bg-emerald-600/95 p-5 rounded-3xl flex justify-between items-center shadow-2xl border border-emerald-400/30 animate-zoom font-black">
           <div className="flex items-center gap-3 font-black">
             <Banknote size={24}/>
             <div><p className="text-xs font-black">本期薪資已結算完成</p><p className="text-white font-black">點擊核對金額並數位簽名</p></div>
           </div>
           <button onClick={()=>setShowSalaryConfirm(true)} className="bg-white text-emerald-700 px-5 py-2 rounded-xl text-sm font-black active:scale-95 font-black">前往確權</button>
        </div>
      )}

      <div className="w-full max-w-[500px] grid grid-cols-2 gap-3 mb-6 animate-[fadeInUp_0.3s_ease-out] font-black">
         <div className="bg-slate-900/80 border border-white/10 p-4 rounded-3xl text-center shadow-2xl font-black"><p className="text-[9px] text-slate-500 uppercase mb-1 font-black">本月累積件數</p><p className="text-white text-lg font-black"><span className="text-sky-400 font-black">{currentPartner.total_del||0}</span>正 / <span className="text-orange-400 font-black">{currentPartner.total_pkp||0}</span>逆</p></div>
         <div className="bg-slate-900/80 border border-white/10 p-4 rounded-3xl text-center flex flex-col items-center justify-center shadow-2xl font-black"><p className="text-[9px] text-slate-500 uppercase mb-1 font-black">預覽實領淨額</p><p className="text-emerald-400 text-xl font-black italic font-black">${p_net.toLocaleString()}</p></div>
      </div>
      
      {showSalaryConfirm && <SalarySignModal partner={currentPartner} onClose={()=>setShowSalaryConfirm(false)} onAction={async(type,data)=>{
         if(type==='confirm') await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), { salary_status:'confirmed', salary_sign: data.sig });
         else await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id), { salary_status:'disputed', salary_dispute_reason: data.reason });
         showToast("✅ 已同步回傳"); setShowSalaryConfirm(false);
      }} />}
      {showHistory && <HistoryModal partner={showHistory} onClose={()=>setShowHistory(null)} />}
      {showProfile && <DriverProfileEditModal partner={currentPartner} onClose={()=>setShowProfile(false)} onSave={async(data)=>{await updateDoc(doc(db,'artifacts',appId,'public','data','partners',currentPartner.id),data); showToast("✅ 個人建檔更新成功"); setShowProfile(false);}} />}
      
      <div className="bg-slate-900/80 backdrop-blur-xl p-6 rounded-[2.5rem] w-full max-w-[500px] shadow-2xl border border-blue-500/20 text-center font-black animate-[fadeInUp_0.5s_ease-out]">
        <div className="grid grid-cols-2 gap-4 mb-4 font-black font-black">
           <div className="bg-black/50 p-5 rounded-2xl border border-white/5 shadow-inner font-black">
             <p className="text-[10px] text-blue-400 uppercase mb-2 font-black">今日配送</p>
             <input type="number" placeholder="0" className="w-full bg-transparent text-center text-4xl text-white outline-none font-black" value={del} onChange={e=>setDel(e.target.value)} />
           </div>
           <div className="bg-black/50 p-5 rounded-2xl border border-white/5 shadow-inner font-black">
             <p className="text-[10px] text-cyan-400 uppercase mb-2 font-black">今日逆收</p>
             <input type="number" placeholder="0" className="w-full bg-transparent text-center text-4xl text-white outline-none font-black" value={pkp} onChange={e=>setPkp(e.target.value)} />
           </div>
        </div>
        <p className="text-[10px] text-slate-500 mb-6 italic leading-tight font-black">※ 報帳件數請務必依廠商統計數據為準，個人回報僅供參考核對。</p>
        <div className="bg-amber-900/10 p-5 rounded-[2.5rem] border border-amber-500/30 mb-6 shadow-inner font-black">
           <p className="text-xs text-amber-500 mb-2 flex items-center justify-center gap-2 italic font-black font-black"><Banknote size={18}/> 今日代收 (C.O.D)</p>
           <div className="flex items-center justify-center text-3xl text-amber-400 font-black font-black">$<input type="number" placeholder="0" className="w-28 bg-transparent text-center outline-none border-b-4 border-amber-500/50 pb-1 ml-2 font-black" value={cod} onChange={e=>setCod(e.target.value)} /></div>
           <div className="flex gap-4 mt-4 h-16 animate-[fadeInUp_0.3s_ease-out] font-black">
             <input type="file" accept="image/*" capture="environment" id="cod_cam" className="hidden" onChange={e=>processSecureImage(e.target.files[0],setCRData,()=>showToast("🚨 防偽：舊照上傳偵測",true))} />
             <label htmlFor="cod_cam" className={`relative flex-1 flex flex-col items-center justify-center rounded-xl border-2 border-dashed transition-all overflow-hidden cursor-pointer ${cRData?'border-emerald-500 bg-emerald-500/10 shadow-emerald-500/10':'border-amber-500/50 text-amber-500'}`}>{cRData && <img src={cRData} className="absolute inset-0 w-full h-full object-cover opacity-30 blur-[1px]" /><div className="relative z-10 flex flex-col items-center font-black">{cRData ? <CheckCircle size={20}/> : <Receipt size={20}/><span className="text-[8px] font-black mt-1 uppercase">拍照收據</span></div>}</label>
           </div>
        </div>
        <div className="mb-6 flex gap-3 h-24 font-black font-black">
           <input type="file" accept="image/*" capture="environment" id="hub_cam" className="hidden" onChange={e=>processSecureImage(e.target.files[0],setPData,()=>showToast("🚨 防偽：舊照上傳偵測",true))} />
           <label htmlFor="hub_cam" className={`relative flex-1 flex flex-col items-center justify-center rounded-[2rem] border-2 border-dashed shadow-xl transition-all overflow-hidden cursor-pointer font-black ${pData?'border-emerald-500 bg-emerald-500/10':'border-slate-700 bg-slate-800/50 text-slate-500'}`}>{pData && <img src={pData} className="absolute inset-0 w-full h-full object-cover opacity-40 blur-[1px]" /><div className="relative z-10 flex flex-col items-center font-black font-black font-black">{pData ? <CheckCircle size={32}/> : <Camera size={32}/><span className="text-[10px] uppercase mt-1 font-black">拍今日回單</span></div>}</label>
        </div>
        <div className="mb-8 font-black"><div className="flex items-center gap-2 mb-3 justify-center text-blue-400 text-[10px] italic uppercase font-black"><PenTool size={16}/> 數位網格防偽簽章區</div><SignaturePad onSign={setSData} /></div>
        <button onClick={submit} disabled={isSubmitting} className="w-full py-5 rounded-[2rem] bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-xl shadow-xl active:scale-95 disabled:opacity-50 tracking-widest uppercase font-black">{isSubmitting?'同步中...':'確認並加密傳送'}</button>
        <button onClick={onLogout} className="mt-4 text-rose-500 text-xs underline italic flex items-center justify-center gap-2 mx-auto active:scale-90 font-black"><LogOut size={16}/> 安全退出</button>
      </div>
    </div>
  );
}

function Gate({ onLogin, isConnected }) {
  const [lp, setLp] = useState(""); const [li, setLi] = useState(""); const [lr, setLr] = useState(false);
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#020617] relative font-black animate-[fadeIn_0.5s_ease-out] font-black">

      <div className="mb-10 text-center mt-12 font-black font-black font-black"><h1 className="text-[3.5rem] md:text-8xl font-black text-white italic tracking-tighter mb-3 drop-shadow-2xl leading-none">在地物流</h1><p className="text-blue-500 text-[10px] tracking-[0.3em] bg-indigo-950/40 border border-indigo-500/30 px-5 py-2 rounded-full inline-block uppercase shadow-lg italic font-black">GGSOC v55.7 ✨</p></div>
      <div className="w-full max-w-[340px] space-y-5 z-10 font-black">
        <div className="bg-slate-900/80 backdrop-blur-xl border border-white/10 p-8 rounded-[2.5rem] shadow-2xl font-black">
          <input type="tel" placeholder="手機號碼" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-center text-white outline-none mb-4 focus:border-blue-500 font-black tracking-widest text-lg font-black font-black font-black" value={lp} onChange={e=>setLp(e.target.value.replace(/\D/g,''))} maxLength={10} />
          <input type="password" placeholder="PIN 安全碼" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-center text-white outline-none mb-4 focus:border-blue-500 font-black tracking-widest text-lg font-black font-black font-black" value={li} onChange={e=>setLi(e.target.value.replace(/\D/g,''))} maxLength={lp==='0976017938'?7:4} />
          <div className="flex items-center justify-center gap-3 mb-6 font-black font-black font-black font-black"><input type="checkbox" id="gate_rem" checked={lr} onChange={e=>setLr(e.target.checked)} className="w-5 h-5 accent-indigo-500 rounded bg-slate-800" /><label htmlFor="gate_rem" className="text-slate-400 text-[11px] font-black uppercase cursor-pointer">記住登入資訊</label></div>
          <button onClick={()=>onLogin(lp,li,lr)} className="w-full py-5 rounded-[1.2rem] bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black text-lg shadow-xl active:scale-95 flex justify-center items-center gap-3 shadow-indigo-500/20 font-black font-black font-black"><Radio size={20}/> 進入系統</button>
        </div>
      </div>
    </div>
  );
}

function AppWrapper() {
  const [u,setU]=useState(null); const [aR,setAR]=useState('guest'); const [ps,setPs]=useState([]); const [l,setL]=useState('gate'); const [ld,setLd]=useState(true); const [ann,setAnn]=useState(""); const [gs,setGs]=useState({systemLocked:false,accountantPin:"0172"}); const [spI,setSpI]=useState(null); const [isC,setIsC]=useState(false);
  
  // 補齊缺失的 state：mT (ModalType) 與 ss (ShowSensitive)
  const [mT, setMT] = useState(null);
  const [ss, setSs] = useState({global: false});
  const [sq,setSq]=useState(""); const [previewImg, setPreviewImg] = useState(null); const [showHistoryFor, setShowHistoryFor] = useState(null); const [chatTarget, setChatTarget] = useState(null); const [showLeave, setShowLeave] = useState(false);
  const cp=ps.find(p=>p.id===spI);

  useEffect(()=>{
    onAuthStateChanged(auth,(user)=>{ 
      if(user){ setU(user); const s=safeStorage.get('ggsoc_auth')||{}; if(s.phone){setAR(s.role); setSpI(`p_${s.phone}`); if(s.role==='super_admin'||s.role==='admin')setL('admin');else setL('driver');} } else signInAnonymously(auth).catch(()=>setLd(false)); 
    });
  },[]);
  useEffect(()=>{
    if(!u) return;
    const unP=onSnapshot(collection(db,'artifacts',appId,'public','data','partners'),(s)=>{setPs(s.docs.map(d=>({id:d.id,...d.data()})));setLd(false);setIsC(true);});
    const unA=onSnapshot(doc(db,'artifacts',appId,'public','data','settings','announcement'),(sn)=>{if(sn.exists())setAnn(String(sn.data().content||""));});
    const unS=onSnapshot(doc(db,'artifacts',appId,'public','data','settings','global'),(s)=>{if(s.exists()){setGs(s.data()); if(s.data().systemLocked && safeStorage.get('ggsoc_auth')?.phone!=='0976017938'){ safeStorage.remove('ggsoc_auth'); setAR('guest'); setL('gate'); } }});
    return()=>{unP();unA();unS();};
  },[u]);

  const handleLogin = (phone,pin,rem)=>{
    if(gs?.systemLocked && phone!=="0976017938") return showToast("🚫 伺服器鎖定中",true);
    if(phone==="0976017938"&&pin==="8305319"){if(rem)safeStorage.set('ggsoc_auth',{phone,role:'super_admin'}); setAR('super_admin');setL('admin');}
    else if(phone==="0988128172"&&pin===(gs?.accountantPin||"0172")){if(rem)safeStorage.set('ggsoc_auth',{phone,role:'admin'}); setAR('admin');setL('admin');}
    else{
      const p=ps.find(x=>x.phone===phone&&x.pin===pin); 
      if(p){ if(p.status==='frozen') return showToast("🚫 帳號已凍結",true); if(p.status==='pending') return showToast("⚠️ 審核中",true); if(rem)safeStorage.set('ggsoc_auth',{phone,role:'driver'}); setAR('driver');setSpI(p.id);setL('driver'); } 
      else showToast("⚠️ 帳號密碼錯誤",true);
    }
  };

  if(ld)return(<div className="min-h-screen bg-[#020617] flex flex-col items-center justify-center font-black font-black"><div className="w-16 h-16 border-4 border-blue-500/10 border-t-blue-500 rounded-full animate-spin shadow-2xl"></div><p className="mt-8 text-blue-500 animate-pulse italic text-lg font-black font-black">GGSOC ENCRYPTING...</p></div>);

  return (
    <div className="min-h-screen text-slate-200 font-black overflow-x-hidden font-black">
      <div id="global-toast" className="fixed top-[-100px] left-1/2 -translate-x-1/2 px-10 py-6 rounded-full font-black z-[999999] opacity-0 pointer-events-none text-xl shadow-2xl transition-all duration-500 text-white font-black font-black"></div>
      
      {/* 補齊缺失的組件實體化 */}
      {previewImg && <ImageViewer src={previewImg} onClose={()=>setPreviewImg(null)} />}
      {showHistoryFor && <HistoryModal partner={showHistoryFor} onClose={()=>setShowHistoryFor(null)} />}
      
      {chatTarget && <ChatWindow driverId={chatTarget.id} driverName={chatTarget.name} isAdmin={aR==='super_admin'||aR==='admin'} onClose={()=>setChatTarget(null)} />}
      {showLeave && <LeaveModal partner={cp} isAdmin={aR==='super_admin'||aR==='admin'} onClose={()=>setShowLeave(false)} />}
      {ann && l !== 'onboarding' && <div className="fixed top-0 left-0 w-full bg-blue-600/95 backdrop-blur-md z-[5000] py-2 border-b border-white/10 shadow-xl font-black font-black"><div className="animate-marquee whitespace-nowrap text-white text-xs font-black font-black"><Bell size={14}/> {ann}</div></div>}
      
      {l==='gate' && <Gate onLogin={handleLogin} isConnected={isC} />}
      {l==='admin' && <AdminHub authRole={aR} partners={ps} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} setModalType={setMT} setSelectedPartner={p=>setSpI(p.id)} showSensitive={ss} setShowSensitive={setSs} sq={sq} setSq={setSq} setPreviewImg={setPreviewImg} setShowHistoryFor={setShowHistoryFor} db={db} appId={appId} globalSettings={gs} announcement={ann} setChatTarget={setChatTarget} setShowLeave={setShowLeave} setLayer={setL} />}
      {l==='driver' && <DriverHub currentPartner={cp} onLogout={()=>{safeStorage.remove('ggsoc_auth');setAR('guest');setL('gate');}} updateField={async(id,f,v)=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',id),{[f]:v})} globalSettings={gs} authRole={aR} db={db} appId={appId} setChatTarget={setChatTarget} setShowLeave={setShowLeave} setLayer={setL} />}
      
      {mT==='system_settings' && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-amber-500/40 p-8 rounded-[2.5rem] max-w-md w-full shadow-2xl relative" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full font-black"><X size={24}/></button><h3 className="text-2xl font-black text-amber-500 mb-8 flex items-center justify-center gap-3 italic font-black font-black"><Shield size={28}/> 伺服器配置核心</h3><div className="space-y-4 font-black"><div className="flex justify-between items-center bg-black/40 p-5 rounded-[1.5rem] border border-white/5 font-black"><div><p className="text-white italic font-black">伺服器戒嚴模式</p></div><button onClick={async()=>await updateDoc(doc(db,'artifacts',appId,'public','data','settings','global'),{systemLocked:!gs.systemLocked})} className="active:scale-90 transition-all">{gs.systemLocked?<ToggleRight className="text-rose-500" size={48}/>:<ToggleLeft className="text-slate-600" size={48}/>}</button></div><div className="flex justify-between items-center bg-black/40 p-5 rounded-[1.5rem] border border-white/5 font-black"><div><p className="text-white italic font-black">開放自動結算</p></div><button onClick={async()=>await updateDoc(doc(db,'artifacts',appId,'public','data','settings','global'),{autoSettlement:!gs.autoSettlement})} className="active:scale-90 transition-all">{gs.autoSettlement?<ToggleRight className="text-indigo-500" size={48}/>:<ToggleLeft className="text-slate-600" size={48}/>}</button></div></div></div></div>}
      {mT==='tools' && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-white/10 p-6 md:p-8 rounded-[2.5rem] max-w-md w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative font-black" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full font-black"><X size={20}/></button><h3 className="text-2xl font-black text-blue-400 mb-6 text-center italic uppercase font-black font-black">系統管理工具箱</h3><div className="space-y-6 font-black font-black"><div className="bg-black/40 p-5 rounded-[2rem] border border-white/5 shadow-inner font-black"><p className="text-[11px] text-blue-400 mb-4 font-black italic uppercase text-center font-black">● 廣播公告發布</p><textarea placeholder="輸入內容..." className="w-full bg-slate-800 border border-white/10 p-4 rounded-xl text-white text-sm outline-none font-black" rows="2" value={ann} onChange={async(e)=>await setDoc(doc(db,'artifacts',appId,'public','data','settings','announcement'),{content:e.target.value})} /><button onClick={async()=>await setDoc(doc(db,'artifacts',appId,'public','data','settings','announcement'),{content:""})} className="w-full py-2 bg-rose-900/40 text-rose-400 rounded-xl text-xs mt-2">撤下公告</button></div><div className="bg-black/40 p-6 rounded-[2rem] border border-white/5 shadow-inner"><p className="text-[11px] text-fuchsia-400 mb-4 font-black italic uppercase text-center font-black font-black">● 行政密鑰管理</p><div className="flex gap-2 font-black"><input type="text" className="flex-1 bg-slate-800 border border-white/10 p-3 rounded-xl text-white font-black text-center" value={gs.accountantPin||"0172"} onChange={async(e)=>await updateDoc(doc(db,'artifacts',appId,'public','data','settings','global'),{accountantPin:e.target.value.replace(/\D/g,'')})} maxLength={4} /><div className="bg-fuchsia-600/20 text-fuchsia-400 px-4 py-3 rounded-xl text-xs flex items-center font-black font-black">Admin</div></div></div>{aR==='super_admin' && <button onClick={async()=>{if(window.confirm("核彈警告：將徹底清除全體歷史與本期數據！")){ for(const p of ps){ if(p.phone!=='0976017938') await updateDoc(doc(db,'artifacts',appId,'public','data','partners',p.id),{total_del:0,total_pkp:0,custom_adj:0,history:[],last_report:null,salary_status:'none'}); } showToast("✅ 全面洗牌成功"); }}} className="w-full py-5 bg-rose-900/20 text-rose-500 rounded-[1.5rem] border border-rose-500/20 text-xs italic font-black shadow-lg">🛑 (僅老闆) 全局物理歸零</button>}</div></div></div>}
      {mT==='detail' && <div className="fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center p-4 backdrop-blur-md animate-zoom font-black font-black font-black" onClick={()=>setMT(null)}><div className="bg-slate-900 border border-white/10 p-8 rounded-[2.5rem] max-w-2xl w-full max-h-[90vh] overflow-y-auto custom-scrollbar relative font-black font-black font-black" onClick={e=>e.stopPropagation()}><button onClick={()=>setMT(null)} className="absolute top-6 right-6 text-white p-2 bg-slate-800 rounded-full font-black"><X size={20}/></button><h3 className="text-xl text-blue-400 mb-6 font-black italic">夥伴：{ps.find(p=>p.id===spI)?.name}</h3><div className="grid grid-cols-2 gap-4 bg-black/40 p-5 rounded-2xl border border-white/5 shadow-inner font-black"><div className="col-span-2 font-black font-black"><label className="text-[10px] text-slate-500">通訊地址</label><p className="text-white text-sm font-black font-black">{ps.find(p=>p.id===spI)?.p_address || '未填'}</p></div><div><label className="text-[10px] text-slate-500 font-black font-black font-black">聯繫人</label><p className="text-white text-sm font-black font-black">{ps.find(p=>p.id===spI)?.p_emergency_name || '未填'}</p></div><div><label className="text-[10px] text-slate-500 font-black">聯繫電話</label><p className="text-white text-sm font-black font-black font-black">{ps.find(p=>p.id===spI)?.p_emergency_phone || '未填'}</p></div><div className="col-span-2 font-black font-black font-black font-black"><label className="text-[10px] text-slate-500 font-black">發薪帳戶</label><p className="text-emerald-400 text-sm font-black font-black">({ps.find(p=>p.id===spI)?.p_bank_code}) {ps.find(p=>p.id===spI)?.p_bank_acc}</p></div></div><div className="mt-6 flex gap-2 font-black font-black"><button onClick={async()=>await updateDoc(doc(db,'artifacts',appId,'public','data','partners',spI),{status:ps.find(p=>p.id===spI)?.status==='frozen'?'approved':'frozen'})} className="flex-1 py-4 bg-slate-800 border border-white/10 rounded-xl text-xs font-black font-black">{ps.find(p=>p.id===spI)?.status==='frozen'?'解凍檔案':'凍結檔案'}</button><button onClick={async()=>{if(!window.confirm("徹底刪除？"))return; await deleteDoc(doc(db,'artifacts',appId,'public','data','partners',spI)); setMT(null);}} className="flex-1 py-4 bg-rose-900/30 text-rose-500 border border-rose-500/30 rounded-xl text-xs font-black">徹底移除</button></div></div></div>}
    </div>
  );
}

try {
  const rootElement = document.getElementById('root');
  if (rootElement) createRoot(rootElement).render(<AppWrapper />);
} catch (err) { document.body.innerHTML = `<div style="color:red; padding: 20px;">啟動失敗: ${err.message}</div>`; }
  </script>
</body>
</html>
