<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#000;--accent:#00d4ff;--accent2:#7c3aed;--green:#10b981;--text:#e2e8f0;--dim:#64748b;--mid:#94a3b8;--border:rgba(255,255,255,0.08);}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;}
.wrap{max-width:520px;margin:0 auto;padding:20px 16px 40px;position:relative;z-index:1;}
.header{text-align:center;padding:28px 0 22px;}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--accent);letter-spacing:2px;}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-top:4px;letter-spacing:1px;}
.step-title{font-size:18px;font-weight:700;margin-top:10px;}
.step-sub{font-size:13px;color:var(--mid);margin-top:4px;}
.card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.2),transparent);}
.f-label{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:4px;display:block;letter-spacing:0.5px;text-transform:uppercase;}
.f-input{width:100%;padding:11px 13px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;margin-bottom:12px;}
.f-input:focus{border-color:rgba(0,212,255,0.5);background:rgba(0,212,255,0.04);}
select.f-input{-webkit-appearance:none;cursor:pointer;}
.btn{width:100%;padding:13px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-family:'Orbitron',monospace;letter-spacing:1px;transition:all 0.2s;margin-top:4px;}
.btn-p{background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.4);color:var(--accent);}
.btn-p:hover{background:rgba(0,212,255,0.22);}
.btn-p:disabled{opacity:0.4;cursor:not-allowed;}
.chat-box{height:360px;overflow-y:auto;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.chat-box::-webkit-scrollbar{width:3px;}
.chat-box::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px;}
.msg{margin-bottom:14px;}
.msg-ai .bubble{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.25);padding:10px 14px;border-radius:4px 12px 12px 12px;font-size:13px;line-height:1.7;display:inline-block;max-width:88%;}
.msg-user{text-align:right;}
.msg-user .bubble{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);padding:10px 14px;border-radius:12px 4px 12px 12px;font-size:13px;line-height:1.7;display:inline-block;max-width:88%;}
.msg-sender{font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.msg-user .msg-sender{text-align:right;}
.typing{display:flex;gap:4px;padding:10px 14px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);border-radius:4px 12px 12px 12px;width:fit-content;}
.typing span{width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:typingDot 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-row{display:flex;gap:8px;}
.chat-input{flex:1;padding:11px 13px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color 0.2s;}
.chat-input:focus{border-color:rgba(0,212,255,0.4);}
.send-btn{padding:11px 16px;background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.35);border-radius:8px;color:var(--accent);font-size:16px;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}
.progress{display:flex;gap:6px;margin-bottom:16px;}
.prog-step{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);}
.prog-step.done{background:var(--accent);}
.prog-step.active{background:linear-gradient(90deg,var(--accent2),var(--accent));animation:progPulse 1.5s infinite;}
@keyframes progPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.result-card{text-align:center;padding:24px;}
.result-score{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;margin:12px 0;}
.screen{display:none;}
.screen.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,212,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.pos-tag{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.25);color:var(--accent);margin-bottom:10px;}
.q-pill{display:inline-block;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);color:#a78bfa;font-size:10px;padding:3px 9px;border-radius:5px;font-family:'JetBrains Mono',monospace;margin:0 3px 4px 0;}
</style>
</head>

  warehouse: '倉儲 / 作業管理',
  dispatch: '派車 / 調度規劃',
  data:     '資料分析 / IT',
  cs:       '客服 / 行政',
};

// 評分面向（依職位客製）
const SCORE_CRITERIA = {
  delivery: '配送經驗(25)、路線安排能力(20)、突發處理(20)、工作態度(20)、溝通表達(15)',
  warehouse:'倉儲系統經驗(25)、盤點管理(20)、改善思維(20)、安全意識(20)、溝通表達(15)',
  dispatch: '調度規劃能力(25)、系統經驗(20)、應變能力(20)、溝通協調(20)、成果量化(15)',
  data:     '分析工具熟練度(25)、報表建立(25)、邏輯思維(20)、商業洞察(20)、溝通表達(10)',
  cs:       '客訴處理能力(25)、溝通技巧(25)、耐心與同理心(20)、流程熟悉度(20)、態度(10)',
};

let applicantData = {};
let chatHistory = [];
let questionCount = 0;
let docId = null;
let positionKey = 'delivery'; // 預設
let questionsForSession = []; // 本次面試題目（通用+專業混合）

// ══ API Key ══
async function fetchAPIKey() {
  const local = localStorage.getItem('V92_SECRET_KEY');
  if(local) return local;
  if(window._sharedAPIKey) return window._sharedAPIKey;
  try {
    const r = await fetch('https://firestore.googleapis.com/v1/projects/supreme-v92/databases/(default)/documents/config/apikey');
    if(r.ok){ const d=await r.json(); const k=d.fields?.gemini?.stringValue; if(k){ window._sharedAPIKey=k; return k; } }
  } catch(e){}
  return '';
}

async function callGemini(messages, maxTokens=600) {
  let KEY = localStorage.getItem('V92_SECRET_KEY') || window._sharedAPIKey || '';
  if(!KEY){ KEY = await fetchAPIKey(); }
  if(!KEY) throw new Error('AI 金鑰未設定，請聯絡管理員');
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: messages,
      generationConfig: { temperature: 0.7, maxOutputTokens: maxTokens }
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// ══ 建立本次題目清單 ══
function buildQuestionList(posKey) {
  const general = QUESTION_BANK.general;
  const specific = QUESTION_BANK[posKey] || QUESTION_BANK.delivery;
  // 通用前3題 + 專業全部題目，混合
  return [...general.slice(0, 3), ...specific];
}

// ══ 開始面試 ══
window.startInterview = async () => {
  const name = document.getElementById('app-name').value.trim();
  const phone = document.getElementById('app-phone').value.trim();
  if (!name || !phone) { alert('請填寫姓名和電話'); return; }

  const posSelect = document.getElementById('app-position');
  positionKey = posSelect.value || 'delivery';
  const positionLabel = posSelect.options[posSelect.selectedIndex].text;

  applicantData = {
    name, phone,
    email: document.getElementById('app-email').value.trim(),
    position: positionLabel,
    positionKey: positionKey,
    license: document.getElementById('app-license').value,
    exp: document.getElementById('app-exp').value,
  };

  // 建立本次題目
  questionsForSession = buildQuestionList(positionKey);

  docId = 'local_' + Date.now();
  if(!window._sharedAPIKey){ window._sharedAPIKey = await fetchAPIKey(); }

  // 顯示職位標籤
  const posDisplay = document.getElementById('pos-display');
  if(posDisplay){
    posDisplay.innerHTML = `<span class="pos-tag">📌 ${POS_LABELS[positionKey] || positionLabel}</span>`;
  }

  showScreen('screen-interview');

  // 背景存 Firestore
  addDoc(collection(db, 'applicants'), {
    ...applicantData, status: 'interviewing',
    createdAt: serverTimestamp(), aiScore: 0
  }).then(ref => { docId = ref.id; }).catch(e => console.warn('[Save]', e.message));

  try {
    await askFirstQuestion();
  } catch(e) {
    console.error('[Interview]', e.message);
    const fallback = `您好 ${name}！請先做個簡單的自我介紹，說說您的工作經歷，以及您為什麼想應徵${positionLabel}這個職位？`;
    addMessage('ai', fallback);
    chatHistory.push({ role: 'model', parts: [{ text: fallback }] });
    questionCount = 1;
    updateProgress();
  }
};

// ══ 第一題（系統提示 + 職位題庫注入）══
async function askFirstQuestion() {
  showTyping();

  const posLabel = POS_LABELS[positionKey] || applicantData.position;
  const specificQs = QUESTION_BANK[positionKey] || [];
  const scoreCriteria = SCORE_CRITERIA[positionKey] || SCORE_CRITERIA.delivery;

  // 將職位專屬題目格式化
  const qBankText = questionsForSession.map((q, i) => `${i+1}. ${q}`).join('\n');

  const systemPrompt = `你是「在地物流有限公司」HR 面試專員陳主任，正在進行正式 AI 面試。

【應徵者資料】
姓名：${applicantData.name}
應徵職位：${applicantData.position}（職位類別：${posLabel}）
相關年資：${applicantData.exp}
駕照：${applicantData.license}

【本次面試題目庫（請依序帶入，自然融入對話，不要照唸題目）】
${qBankText}

【面試規則】
- 每次只問一個問題，等對方回答後再繼續下一題
- 語氣自然、專業，像真正的 HR，不像機器人
- 台灣職場用語：「好的謝謝」「了解，那請問…」「您能舉個例子嗎？」
- 全程繁體中文
- 依序完成題目庫所有題目（約 8-10 題）
- 如應徵者回答過於簡短（如：「好」「可以」「沒問題」）→ 溫和追問更多細節
- 如果連續兩次敷衍 → 說明：「這個問題對我們很重要，希望您能詳細說明」
- 前三題為通用題，之後的題目是針對【${posLabel}】職位的專業問題，請確保每一題都有問到

【評分標準】
${scoreCriteria}
- 回答詳細有條理：加分；敷衍一兩個字：大扣分
- 有具體案例、數據佐證：加分
- 答非所問或亂打：大量扣分

現在從第一題開始。`;

  chatHistory = [{ role: 'user', parts: [{ text: systemPrompt }] }];

  try {
    const q = await callGemini(chatHistory);
    chatHistory.push({ role: 'model', parts: [{ text: q }] });
    hideTyping();
    addMessage('ai', q);
  } catch(e) {
    hideTyping();
    throw e;
  }
  questionCount = 1;
  updateProgress();
}

// ══ 送出回答 ══
window.sendAnswer = async () => {
  const btn = document.getElementById('send-btn');
  const input = document.getElementById('chat-input');
  const answer = input.value.trim();
  if (!answer || btn.disabled) return;

  btn.disabled = true;
  input.value = '';
  addMessage('user', answer);
  chatHistory.push({ role: 'user', parts: [{ text: answer }] });

  try {
    // 面試結束（問完所有題目）
    if (questionCount >= questionsForSession.length) {
      showTyping();
      const posLabel = POS_LABELS[positionKey] || applicantData.position;
      const scoreCriteria = SCORE_CRITERIA[positionKey] || SCORE_CRITERIA.delivery;
      const evalPrompt = `【面試結束，進行嚴格評分】

本次應徵職位：${applicantData.position}（${posLabel}）
評分面向：${scoreCriteria}

評分規則：
- 回答詳細、有具體案例：加分
- 回答敷衍、不具體：-8分/次
- 答非所問或亂填：-15分/次
- 有相關經驗且能量化：加分
- 明顯惡意測試 = 0分

評分結果格式（請嚴格照此格式回覆，不要加其他內容）：
評分:[0-100的數字]
評語:[150字以內，說明應徵者的優缺點、是否建議錄用，以及針對${posLabel}職位的適配度評估]`;

      chatHistory.push({ role: 'user', parts: [{ text: evalPrompt }] });
      const evalResult = await callGemini(chatHistory, 400);
      hideTyping();

      const scoreMatch = evalResult.match(/評分[：:]\s*(\d+)/);
      const score = scoreMatch ? Math.min(100, Math.max(0, parseInt(scoreMatch[1]))) : 50;
      const commentMatch = evalResult.match(/評語[：:]\s*([\s\S]+)/);
      const comment = commentMatch ? commentMatch[1].trim() : evalResult;

      // 感謝語
      const closingMsg = score >= 60
        ? `感謝您完成面試，${applicantData.name}！您的表現非常不錯，我們的 HR 團隊將盡快與您聯繫。請靜候佳音！`
        : `感謝您撥冗參加面試，${applicantData.name}！我們會將您的資料送交 HR 評估，如有進一步消息將主動聯繫您。`;
      addMessage('ai', closingMsg);

      // 存結果
      updateDoc(doc(db, 'applicants', docId), {
        aiScore: score, aiComment: comment,
        positionKey: positionKey,
        chatHistory: chatHistory.map(m => ({ role: m.role, text: m.parts[0].text.slice(0, 2000) })),
        status: score >= 60 ? 'recommended' : score >= 50 ? 'pending' : 'rejected',
        completedAt: serverTimestamp()
      }).catch(e => console.warn('[Score save]', e.message));

      setTimeout(() => showResult(score, comment), 1800);
      return;
    }

    // 繼續對話
    showTyping();
    const next = await callGemini(chatHistory);
    hideTyping();
    chatHistory.push({ role: 'model', parts: [{ text: next }] });
    addMessage('ai', next);

    if (next.includes('？') || next.includes('?')) {
      questionCount++;
      updateProgress();
    }

  } catch(e) {
    hideTyping();
    console.error('[sendAnswer]', e.message);
    addMessage('ai', '抱歉，連線發生問題，請再試一次。');
  } finally {
    btn.disabled = false;
    document.getElementById('chat-input').focus();
  }
};

function addMessage(role, text) {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  div.innerHTML = `<div class="msg-sender">${role === 'ai' ? '⬡ 面試專員 陳主任' : applicantData.name}</div>
    <div class="bubble">${text.replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const box = document.getElementById('chat-box');
  typingEl = document.createElement('div');
  typingEl.className = 'msg msg-ai';
  typingEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  box.appendChild(typingEl);
  box.scrollTop = box.scrollHeight;
  document.getElementById('send-btn').disabled = true;
}
function hideTyping() {
  if(typingEl){ typingEl.remove(); typingEl = null; }
  document.getElementById('send-btn').disabled = false;
}

function updateProgress() {
  const total = questionsForSession.length;
  const txt = document.getElementById('interview-progress-text');
  if(txt) txt.textContent = `第 ${questionCount} 題，共 ${total} 題`;
}

function showResult(score, comment) {
  showScreen('screen-result');
  const ob = document.getElementById('onboard-suggestion');
  if(ob && score >= 50) ob.style.display='block';

  let countdown = 8;
  const timer = setInterval(()=>{
    countdown--;
    const el = document.getElementById('redirect-countdown');
    if(el) el.textContent = countdown;
    if(countdown <= 0){ clearInterval(timer); window.location.href = './'; }
  }, 1000);

  const scoreEl = document.getElementById('result-score');
  const badgeEl = document.getElementById('result-badge');
  const msgEl = document.getElementById('result-msg');

  scoreEl.textContent = score;
  scoreEl.style.color = score >= 60 ? '#34d399' : score >= 50 ? '#fbbf24' : '#f87171';

  if(score >= 60){
    badgeEl.innerHTML = '<span style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34d399;padding:5px 14px;border-radius:6px;font-size:12px">✅ 通過初審，等待 HR 聯繫</span>';
  } else if(score >= 50){
    badgeEl.innerHTML = '<span style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;padding:5px 14px;border-radius:6px;font-size:12px">⏳ HR 將進一步評估後聯繫</span>';
  } else {
    badgeEl.innerHTML = '<span style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:5px 14px;border-radius:6px;font-size:12px">感謝參與，我們將保留您的資料</span>';
  }
  if(msgEl) msgEl.textContent = comment;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}
</script>
